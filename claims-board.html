<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Claims Board</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .claims-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid gold;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px gold;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .claims-header {
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        
        .claims-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: gold;
            text-shadow: 0 0 20px #ffaa00, 0 0 40px #ffaa00;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .claims-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid gold;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .claim-count {
            font-size: 14px;
            color: gold;
            text-align: right;
        }
        
        .claim-count span {
            color: #4affaa;
            font-weight: 600;
            font-size: 18px;
        }
        
        /* Location Bar */
        .location-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-size: 14px;
        }
        
        .current-location {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .coordinates {
            color: #a0c0ff;
            font-size: 12px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(30, 45, 70, 0.4);
            padding: 10px;
            border-radius: 60px 20px 60px 20px;
            border: 1px solid #4a8ac0;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #4a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .filter-btn.active {
            background: gold;
            border-color: #ffaa00;
            color: #0a0a1a;
            box-shadow: 0 0 20px gold;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        /* Search Bar */
        .search-bar {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 30, 50, 0.6);
            border: 2px solid #4a8ac0;
            border-radius: 60px 20px 60px 20px;
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: #a0c0ff;
            opacity: 0.6;
        }
        
        .search-input:focus {
            border-color: gold;
        }
        
        /* Claims List */
        .claims-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .claim-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .claim-card:active {
            transform: scale(0.98);
            background: rgba(50, 70, 100, 0.8);
        }
        
        .claim-card.rarity-very-rare {
            border-color: #e0b0ff;
            box-shadow: 0 0 15px rgba(224, 176, 255, 0.3);
        }
        
        .claim-card.rarity-legendary {
            border-color: gold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        
        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .planet-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .planet-name .crown-icon {
            color: gold;
            font-size: 18px;
            filter: drop-shadow(0 0 5px gold);
        }
        
        .planet-type {
            font-size: 11px;
            color: #a0c0ff;
            background: rgba(0,0,0,0.3);
            padding: 3px 8px;
            border-radius: 30px;
        }
        
        .distance-badge {
            background: rgba(74, 255, 170, 0.2);
            border: 1px solid #4affaa;
            border-radius: 30px 5px 30px 5px;
            padding: 4px 10px;
            font-size: 12px;
            color: #4affaa;
            font-weight: 600;
        }
        
        .claim-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .detail-label {
            font-size: 10px;
            color: #a0c0ff;
            letter-spacing: 0.5px;
        }
        
        .detail-value {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .owner-name {
            color: #4affaa;
        }
        
        .fee-value {
            color: #ffd966;
        }
        
        .element-name {
            color: #ffaa4a;
        }
        
        .rarity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
        }
        
        .rarity-badge.very-rare {
            color: #e0b0ff;
            border: 1px solid #e0b0ff;
        }
        
        .rarity-badge.legendary {
            color: gold;
            border: 1px solid gold;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: #a0c0ff;
        }
        
        .stat-highlight {
            color: #ffd966;
            font-weight: 600;
        }
        
        .warp-btn {
            width: 100%;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #4a8ac0;
            color: white;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 10px;
            text-align: center;
        }
        
        .warp-btn:active {
            background: #4a8ac0;
            transform: scale(0.98);
        }
        
        .warp-btn.primary {
            background: rgba(255, 215, 0, 0.3);
            border-color: gold;
            color: gold;
        }
        
        .warp-btn.primary:active {
            background: gold;
            color: #0a0a1a;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0c0ff;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        .empty-message {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 45, 70, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid gold;
            color: gold;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            z-index: 100;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .back-button:active {
            background: gold;
            color: #0a0a1a;
            transform: translateX(-50%) scale(0.98);
        }
        
        /* Rarity colors */
        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #b0ffb0; }
        .rarity-rare { color: #4169E1; }
        .rarity-very-rare { color: #e0b0ff; }
        .rarity-legendary { color: #ffd700; }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="claims-view" id="claimsView">
            <!-- Header -->
            <div class="claims-header">
                <div class="claims-title">CLAIMS BOARD</div>
                <div class="claims-subtitle">✦ public registry ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="claim-count" id="claimCount">
                    Claims: <span id="totalClaims">0</span>
                </div>
            </div>
            
            <!-- Location Bar -->
            <div class="location-bar">
                <div class="current-location">
                    <span class="current-dot"></span>
                    <span id="currentLocationText">Loading location...</span>
                </div>
                <span class="coordinates" id="sectorText">Sector --,--</span>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="window.filterClaims('all')">ALL</button>
                <button class="filter-btn" onclick="window.filterClaims('very-rare')">VERY RARE</button>
                <button class="filter-btn" onclick="window.filterClaims('legendary')">LEGENDARY</button>
                <button class="filter-btn" onclick="window.filterClaims('my-claims')">👑 MY CLAIMS</button>
            </div>
            
            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by planet or owner..." oninput="window.searchClaims()">
            </div>
            
            <!-- Claims List Container -->
            <div id="claimsContainer">
                <div class="claims-list" id="claimsList">
                    <!-- Filled by JavaScript -->
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-title">No Claims Found</div>
                        <div class="empty-message">There are no claimed planets in this sector yet. Be the first to discover a Very Rare or Legendary element!</div>
                    </div>
                </div>
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToPrevious()">← BACK</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">loading claims board...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- Load all JavaScript files -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/planet-status.js"></script>
    <script type="module" src="js/claim-system.js"></script>
    <script type="module" src="js/claim-notifications.js"></script>

    <script type="module">
        import { getClaimedPlanets, getClaimsSortedByDistance, getPlayerClaims } from './js/planet-status.js';
        import { markNotificationAsRead } from './js/claim-notifications.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const claimsList = document.getElementById('claimsList');
        const totalClaimsSpan = document.getElementById('totalClaims');
        const currentLocationText = document.getElementById('currentLocationText');
        const sectorText = document.getElementById('sectorText');
        const creditsDisplay = document.getElementById('creditsDisplay');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToPrevious = returnToPrevious;
        window.filterClaims = filterClaims;
        window.searchClaims = searchClaims;
        window.warpToPlanet = warpToPlanet;

        // ===== STATE =====
        let allClaims = [];
        let filteredClaims = [];
        let currentFilter = 'all';
        let searchTerm = '';
        let currentPlayerId = null;
        let currentSector = { x: 30, y: 40 }; // Default to Orion Arm
        let currentRegion = 'Orion Arm';

        // ===== LOAD PLAYER LOCATION =====
        async function loadPlayerLocation() {
            try {
                // Get current sector coordinates
                const sectorX = parseInt(localStorage.getItem('voidfarer_current_sector_x')) || 30;
                const sectorY = parseInt(localStorage.getItem('voidfarer_current_sector_y')) || 40;
                currentSector = { x: sectorX, y: sectorY };
                
                // Get current region name
                currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                currentLocationText.textContent = currentRegion;
                sectorText.textContent = `Sector ${sectorX},${sectorY}`;
                
            } catch (error) {
                console.error('Error loading player location:', error);
            }
        }

        // ===== LOAD CLAIMS =====
        async function loadClaims() {
            try {
                loadingText.textContent = 'scanning claims registry...';
                
                // Get player ID
                currentPlayerId = localStorage.getItem('voidfarer_player_id') || 'player_' + Date.now();
                
                // Get all claims sorted by distance
                allClaims = await getClaimsSortedByDistance(currentSector.x, currentSector.y);
                
                // Update total claims count
                totalClaimsSpan.textContent = allClaims.length;
                
                // Apply current filter and render
                applyFilter();
                
                // Mark notifications as read when viewing the board
                await markNotificationAsRead(currentPlayerId, 'board_viewed');
                
                console.log(`Loaded ${allClaims.length} claims`);
                
            } catch (error) {
                console.error('Error loading claims:', error);
                showEmptyState('Error loading claims', 'Please try again later.');
            }
        }

        // ===== LOAD CREDITS =====
        async function loadCredits() {
            try {
                let credits = 5000;
                if (typeof window.getCredits === 'function') {
                    credits = await window.getCredits();
                }
                creditsDisplay.innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;
            } catch (error) {
                console.error('Error loading credits:', error);
            }
        }

        // ===== APPLY FILTER =====
        function applyFilter() {
            let filtered = [...allClaims];
            
            // Apply rarity filter
            if (currentFilter === 'very-rare') {
                filtered = filtered.filter(claim => claim.rarity === 'very-rare');
            } else if (currentFilter === 'legendary') {
                filtered = filtered.filter(claim => claim.rarity === 'legendary');
            } else if (currentFilter === 'my-claims') {
                filtered = filtered.filter(claim => claim.ownerId === currentPlayerId);
            }
            
            // Apply search filter
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(claim => 
                    claim.planetName.toLowerCase().includes(term) ||
                    (claim.ownerName && claim.ownerName.toLowerCase().includes(term))
                );
            }
            
            filteredClaims = filtered;
            renderClaims();
        }

        // ===== FILTER CLAIMS =====
        function filterClaims(filter) {
            currentFilter = filter;
            
            // Update active button state
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilter();
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== SEARCH CLAIMS =====
        function searchClaims() {
            searchTerm = document.getElementById('searchInput').value;
            applyFilter();
        }

        // ===== RENDER CLAIMS =====
        function renderClaims() {
            if (filteredClaims.length === 0) {
                showEmptyState(
                    'No Claims Found',
                    getEmptyMessage()
                );
                return;
            }
            
            let html = '';
            
            filteredClaims.forEach(claim => {
                const distance = claim.distance || 0;
                const planetType = claim.planetType || 'unknown';
                const typeDisplay = planetType.charAt(0).toUpperCase() + planetType.slice(1);
                
                // Format numbers
                const totalEarned = claim.totalEarned || 0;
                const totalMiners = claim.totalMiners || 0;
                
                // Determine if this is the player's own claim
                const isOwnClaim = claim.ownerId === currentPlayerId;
                
                html += `
                    <div class="claim-card rarity-${claim.rarity}" onclick="window.warpToPlanet('${claim.planetName}', ${claim.sectorX || 30}, ${claim.sectorY || 40})">
                        <div class="claim-header">
                            <div class="planet-name">
                                ${isOwnClaim ? '<span class="crown-icon">👑</span>' : ''}
                                ${claim.planetName}
                                <span class="planet-type">${typeDisplay}</span>
                            </div>
                            <div class="distance-badge">${distance} LY</div>
                        </div>
                        
                        <div class="claim-details">
                            <div class="detail-item">
                                <span class="detail-label">OWNER</span>
                                <span class="detail-value owner-name">${claim.ownerName || 'Unknown'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">FEE</span>
                                <span class="detail-value fee-value">${claim.currentFee || 10}%</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">DISCOVERED</span>
                                <span class="detail-value element-name">${claim.discoveredElement || 'Unknown'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">RARITY</span>
                                <span class="detail-value">
                                    <span class="rarity-badge ${claim.rarity}">${claim.rarity || 'common'}</span>
                                </span>
                            </div>
                        </div>
                        
                        <div class="stats-row">
                            <span>💰 Total Earned: <span class="stat-highlight">${totalEarned.toLocaleString()}⭐</span></span>
                            <span>👥 Miners: <span class="stat-highlight">${totalMiners}</span></span>
                        </div>
                        
                        <div class="warp-btn primary">🚀 WARP TO PLANET</div>
                    </div>
                `;
            });
            
            claimsList.innerHTML = html;
        }

        // ===== SHOW EMPTY STATE =====
        function showEmptyState(title, message) {
            let icon = '📋';
            let customMessage = message;
            
            if (currentFilter === 'very-rare') {
                icon = '🟣';
                customMessage = customMessage || 'No Very Rare claims found in this sector.';
            } else if (currentFilter === 'legendary') {
                icon = '✨';
                customMessage = customMessage || 'No Legendary claims found in this sector.';
            } else if (currentFilter === 'my-claims') {
                icon = '👑';
                customMessage = customMessage || 'You haven\'t claimed any planets yet. Discover all elements on a planet to claim it!';
            }
            
            claimsList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${icon}</div>
                    <div class="empty-title">${title}</div>
                    <div class="empty-message">${customMessage}</div>
                </div>
            `;
        }

        // ===== GET EMPTY MESSAGE =====
        function getEmptyMessage() {
            if (currentFilter === 'very-rare') {
                return 'No Very Rare claims found matching your criteria.';
            } else if (currentFilter === 'legendary') {
                return 'No Legendary claims found matching your criteria.';
            } else if (currentFilter === 'my-claims') {
                return 'You haven\'t claimed any planets yet. Discover all elements on a planet to claim it!';
            } else if (searchTerm) {
                return 'No claims match your search term.';
            } else {
                return 'There are no claimed planets in this sector yet. Be the first to discover a Very Rare or Legendary element!';
            }
        }

        // ===== WARP TO PLANET =====
        async function warpToPlanet(planetName, sectorX, sectorY) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'calculating warp route...';
            
            try {
                // Get current location
                const currentSectorX = parseInt(localStorage.getItem('voidfarer_current_sector_x')) || 30;
                const currentSectorY = parseInt(localStorage.getItem('voidfarer_current_sector_y')) || 40;
                const currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                const currentStarSector = localStorage.getItem('voidfarer_current_starSector') || 'Orion Molecular Cloud';
                const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
                const currentPlanet = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                
                // Calculate distance
                const dx = Math.abs(sectorX - currentSectorX);
                const dy = Math.abs(sectorY - currentSectorY);
                const sectorDistance = Math.sqrt(dx * dx + dy * dy);
                const distance = sectorDistance * 2.3;
                
                // Get planet details (this would ideally come from the claim data)
                // For now, we'll use placeholder data
                const planetType = 'unknown';
                const planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen']; // Default
                
                const warpCycles = Math.min(5, Math.ceil(distance / 1.5));
                const fuelCost = Math.floor(distance * 4) + 5;
                
                // Prepare warp data
                const warpData = {
                    destination: planetName,
                    destinationType: planetType,
                    startLocation: currentPlanet,
                    startLocationType: 'planet',
                    totalDistance: distance,
                    warpCycles: warpCycles,
                    fuelCost: fuelCost,
                    returnPage: 'surface.html',
                    isHubReturn: false,
                    
                    // Store destination details
                    destSector: getSectorIdFromCoordinates(sectorX, sectorY),
                    destRegion: 'Unknown Region', // Would need mapping
                    destStarSector: 'Unknown Star Sector',
                    destStar: 'Unknown Star',
                    destPlanet: planetName,
                    destPlanetType: planetType,
                    destPlanetResources: planetResources
                };
                
                // Save warp data
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                // Navigate to warp
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error calculating warp:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to calculate warp route. Please try again.');
            }
        }

        // ===== GET SECTOR ID FROM COORDINATES =====
        function getSectorIdFromCoordinates(x, y) {
            // Simple mapping - in production you'd have a proper lookup
            const sectorMap = {
                '30,40': 'B2',
                '31,41': 'B3',
                '29,39': 'A2'
            };
            
            const key = `${x},${y}`;
            return sectorMap[key] || 'B2';
        }

        // ===== RETURN TO PREVIOUS PAGE =====
        function returnToPrevious() {
            // Try to determine where we came from
            const referrer = document.referrer;
            
            if (referrer.includes('earth-hub.html')) {
                window.location.href = 'earth-hub.html';
            } else if (referrer.includes('ship-bridge.html')) {
                window.location.href = 'ship-bridge.html';
            } else {
                // Default fallback
                window.location.href = 'ship-bridge.html';
            }
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'accessing claims registry...';
                
                // Load all data
                await loadPlayerLocation();
                await loadCredits();
                await loadClaims();
                
                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'ship-bridge.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
