<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Planetary Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* Fullscreen Planet Image */
        .planet-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.9) saturate(1.2);
        }
        
        /* Dynamic starfield overlay */
        .star-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, transparent 30%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 2;
        }
        
        /* Top Status Bar - Glass morphism */
        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 10px 18px;
            z-index: 10;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .planet-name {
            display: flex;
            flex-direction: column;
        }
        
        .planet-name-main {
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px #4affaa;
        }
        
        .planet-name-type {
            font-size: 10px;
            color: #a0c0ff;
            letter-spacing: 1px;
        }
        
        .cargo-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .cargo-label {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .cargo-value {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #4affaa;
        }
        
        .cargo-value span {
            color: #a0c0ff;
            font-size: 12px;
        }
        
        /* Top Controls Row - Extractor and Return */
        .top-controls {
            position: absolute;
            top: 90px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        /* Auto-Extractor Status */
        .extractor-status {
            background: rgba(10, 10, 26, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 40px 10px 40px 10px;
            padding: 6px 16px;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .extractor-pulse {
            width: 8px;
            height: 8px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 10px #4affaa;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        /* Return to Ship Icon */
        .return-icon {
            background: rgba(10, 10, 26, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 170, 74, 0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.1s;
            font-size: 20px;
            color: white;
            box-shadow: 0 0 15px rgba(255, 170, 74, 0.3);
        }
        
        .return-icon:active {
            background: rgba(255, 170, 74, 0.3);
            transform: scale(0.9);
        }
        
        /* Toast Notifications - Float over landscape */
        .toast-container {
            position: absolute;
            top: 140px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            pointer-events: none;
        }
        
        .toast {
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateX(120%);
            animation: slideIn 0.3s forwards, fadeOut 0.3s 2.7s forwards;
            max-width: 200px;
            box-shadow: 0 0 20px rgba(74, 255, 170, 0.3);
        }
        
        .toast.success {
            border-color: #4affaa;
        }
        
        .toast.fail {
            border-color: #ff6b6b;
        }
        
        .toast-icon {
            font-size: 18px;
        }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        /* Resource Toggles - Bottom bar */
        .resource-bar {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 15px;
            z-index: 10;
        }
        
        .resource-label {
            color: #a0c0ff;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .resource-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .resource-toggle {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #4a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 70px;
            justify-content: center;
        }
        
        .resource-toggle.active {
            border-color: #4affaa;
            background: rgba(74, 255, 170, 0.1);
            box-shadow: 0 0 15px rgba(74, 255, 170, 0.3);
        }
        
        .resource-toggle:active {
            transform: scale(0.95);
        }
        
        .resource-icon {
            font-size: 18px;
        }
        
        .resource-name {
            color: white;
            font-size: 13px;
            font-weight: 500;
        }
        
        .resource-chance {
            color: #ffd966;
            font-size: 11px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 20px;
        }
        
        .active-count {
            text-align: center;
            margin-top: 10px;
            color: #4affaa;
            font-size: 12px;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <!-- Fullscreen Planet Image -->
            <img src="assets/images/earth-view.jpg" class="planet-canvas" id="planetImage" alt="Planet surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            <div class="star-overlay"></div>
            
            <!-- Top Status Bar -->
            <div class="status-bar">
                <div class="planet-name">
                    <span class="planet-name-main" id="planetName">Loading...</span>
                    <span class="planet-name-type" id="planetType">Loading...</span>
                </div>
                <div class="cargo-display">
                    <span class="cargo-label">CARGO</span>
                    <span class="cargo-value" id="cargoMass"><span>0</span>/1000 AMU</span>
                </div>
            </div>
            
            <!-- Top Controls Row - Extractor and Return Icon -->
            <div class="top-controls">
                <div class="extractor-status" id="extractorStatus">
                    <span class="extractor-pulse"></span>
                    <span id="extractorText">Auto-extractor active</span>
                </div>
                <div class="return-icon" onclick="returnToShip()" id="returnIcon">
                    🚀
                </div>
            </div>
            
            <!-- Toast Notifications Container -->
            <div class="toast-container" id="toastContainer"></div>
            
            <!-- Resource Toggles Bar -->
            <div class="resource-bar">
                <div class="resource-label">⚡ TAP TO TOGGLE EXTRACTION</div>
                <div class="resource-grid" id="resourceGrid">
                    <!-- Filled by JavaScript -->
                </div>
                <div class="active-count" id="activeCount">Extracting: 0 resources</div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">landing on surface...</div>
            </div>
        </div>
    </div>

    <!-- Load all JS files -->
    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>

    <!-- Fallback Functions -->
    <script>
    (function() {
        window.getCredits = window.getCredits || function() { 
            return parseInt(localStorage.getItem('voidfarer_credits')) || 5000; 
        };

        window.getCollection = window.getCollection || function() {
            const saved = localStorage.getItem('voidfarer_collection');
            return saved ? JSON.parse(saved) : {};
        };

        window.addElementToCollection = window.addElementToCollection || function(elementName, count) {
            let collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
            if (collection[elementName]) {
                collection[elementName].count = (collection[elementName].count || 1) + count;
            } else {
                collection[elementName] = { count: count, firstFound: new Date().toISOString() };
            }
            localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
            return { success: true };
        };

        window.getElementMass = window.getElementMass || function(elementName) {
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Lithium': 6.94, 'Beryllium': 9.012,
                'Boron': 10.81, 'Carbon': 12.01, 'Nitrogen': 14.01, 'Oxygen': 16.00,
                'Fluorine': 19.00, 'Neon': 20.18, 'Sodium': 22.99, 'Magnesium': 24.31,
                'Aluminum': 26.98, 'Silicon': 28.09, 'Phosphorus': 30.97, 'Sulfur': 32.06,
                'Chlorine': 35.45, 'Argon': 39.95, 'Potassium': 39.10, 'Calcium': 40.08,
                'Iron': 55.85, 'Nickel': 58.69, 'Copper': 63.55, 'Zinc': 65.38,
                'Silver': 107.9, 'Gold': 197.0, 'Platinum': 195.1, 'Titanium': 47.87,
                'Uranium': 238.0, 'Thorium': 232.0, 'Plutonium': 244.0, 'Promethium': 145.0,
                'default': 100.0
            };
            return masses[elementName] || masses.default;
        };
    })();
    </script>

    <script>
        // ===== MAIN SURFACE SCRIPT =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== CONSTANTS =====
        const CARGO_MASS_LIMIT = 1000;
        const EXTRACTION_INTERVAL = 5000; // 5 seconds

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const planetImage = document.getElementById('planetImage');
        const planetName = document.getElementById('planetName');
        const planetType = document.getElementById('planetType');
        const cargoMass = document.getElementById('cargoMass');
        const resourceGrid = document.getElementById('resourceGrid');
        const activeCount = document.getElementById('activeCount');
        const toastContainer = document.getElementById('toastContainer');
        const extractorText = document.getElementById('extractorText');

        // ===== STATE =====
        let currentPlanet = {
            name: 'Earth',
            type: 'lush',
            typeName: 'Lush',
            resources: []
        };
        
        // Resource states: all active by default
        let resourceStates = {};
        let currentMass = 0;
        let extractionTimer = null;
        let isExtracting = true;

        // ===== ELEMENT ICONS =====
        const elementIcons = {
            'Hydrogen': '💧', 'Helium': '🎈', 'Lithium': '🔋', 'Beryllium': '💎',
            'Boron': '🧪', 'Carbon': '⚫', 'Nitrogen': '🌬️', 'Oxygen': '💨',
            'Fluorine': '🧪', 'Neon': '💡', 'Sodium': '🧂', 'Magnesium': '✨',
            'Aluminum': '🥫', 'Silicon': '💻', 'Phosphorus': '✨', 'Sulfur': '🟡',
            'Chlorine': '🧪', 'Argon': '🎈', 'Potassium': '🍌', 'Calcium': '🥛',
            'Iron': '⚙️', 'Nickel': '🔩', 'Copper': '🔴', 'Zinc': '⚪',
            'Silver': '⚪', 'Gold': '🟡', 'Platinum': '⬜', 'Titanium': '🔷',
            'Uranium': '🟣', 'Thorium': '🔮', 'Plutonium': '☢️', 'Promethium': '✨',
            'default': '🔹'
        };

        // ===== RESOURCE CHANCES =====
        function getResourceChance(resource) {
            // Higher chance for common resources, lower for rare
            if (['Iron', 'Carbon', 'Oxygen', 'Silicon', 'Hydrogen'].includes(resource)) {
                return Math.floor(Math.random() * 20) + 80; // 80-100%
            } else if (['Gold', 'Silver', 'Platinum', 'Titanium'].includes(resource)) {
                return Math.floor(Math.random() * 30) + 50; // 50-80%
            } else if (['Uranium', 'Thorium'].includes(resource)) {
                return Math.floor(Math.random() * 30) + 20; // 20-50%
            } else if (['Promethium'].includes(resource)) {
                return Math.floor(Math.random() * 15) + 5; // 5-20%
            }
            return 70; // Default
        }

        // ===== LOAD PLANET DATA =====
        async function loadPlanetData() {
            try {
                // Get planet data from localStorage
                const planetNameStr = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                const planetTypeStr = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
                
                // Get resources
                let planetResources = [];
                const savedResources = localStorage.getItem('voidfarer_current_planet_resources');
                
                if (savedResources) {
                    try {
                        planetResources = JSON.parse(savedResources);
                    } catch (e) {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                } else {
                    // Generate resources based on planet type
                    if (planetTypeStr.includes('lush')) {
                        planetResources = ['Carbon', 'Oxygen', 'Iron', 'Silicon', 'Hydrogen'];
                    } else if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                        planetResources = ['Iron', 'Sulfur', 'Copper', 'Gold', 'Uranium'];
                    } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                        planetResources = ['Hydrogen', 'Helium', 'Oxygen', 'Carbon'];
                    } else if (planetTypeStr.includes('barren')) {
                        planetResources = ['Iron', 'Silicon', 'Aluminum', 'Titanium'];
                    } else {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                }
                
                // Set planet icon based on type
                let imageFile = 'earth-view.jpg';
                if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                    imageFile = 'pyros-surface.jpg';
                } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                    imageFile = 'glacier-surface.jpg';
                } else if (planetTypeStr.includes('lush')) {
                    imageFile = 'verdant-surface.jpg';
                } else if (planetTypeStr.includes('barren')) {
                    imageFile = 'barren-surface.jpg';
                }
                
                // Update planet image
                planetImage.src = 'assets/images/' + imageFile;
                planetImage.onerror = function() {
                    this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
                };
                
                currentPlanet = {
                    name: planetNameStr,
                    type: planetTypeStr,
                    typeName: planetTypeStr.charAt(0).toUpperCase() + planetTypeStr.slice(1),
                    resources: planetResources
                };
                
                planetName.textContent = currentPlanet.name;
                planetType.textContent = currentPlanet.typeName;
                
                // Initialize all resources as active by default
                currentPlanet.resources.forEach(resource => {
                    resourceStates[resource] = true;
                });
                
                // Render resource toggles
                renderResourceToggles();
                
                return true;
                
            } catch (error) {
                console.error('Error loading planet data:', error);
                return false;
            }
        }

        // ===== LOAD CARGO DATA =====
        async function loadCargoData() {
            try {
                // Get collection
                let collection = {};
                if (typeof window.getCollection === 'function') {
                    collection = await window.getCollection();
                } else {
                    const saved = localStorage.getItem('voidfarer_collection');
                    collection = saved ? JSON.parse(saved) : {};
                }
                
                // Calculate total mass
                currentMass = 0;
                for (const [name, data] of Object.entries(collection)) {
                    const count = data.count || 1;
                    const mass = window.getElementMass(name);
                    currentMass += count * mass;
                }
                
                // Update cargo display
                updateCargoDisplay();
                
                return true;
                
            } catch (error) {
                console.error('Error loading cargo:', error);
                return false;
            }
        }

        // ===== UPDATE CARGO DISPLAY =====
        function updateCargoDisplay() {
            const massPercent = (currentMass / CARGO_MASS_LIMIT) * 100;
            cargoMass.innerHTML = `<span>${currentMass.toFixed(0)}</span>/${CARGO_MASS_LIMIT} AMU`;
            
            // Stop extraction if cargo is full
            if (currentMass >= CARGO_MASS_LIMIT && isExtracting) {
                isExtracting = false;
                extractorText.textContent = 'Cargo full - extraction paused';
                if (extractionTimer) {
                    clearInterval(extractionTimer);
                    extractionTimer = null;
                }
            } else if (currentMass < CARGO_MASS_LIMIT && !isExtracting && extractionTimer === null) {
                // Restart extraction if space available
                isExtracting = true;
                extractorText.textContent = 'Auto-extractor active';
                startExtraction();
            }
        }

        // ===== RENDER RESOURCE TOGGLES =====
        function renderResourceToggles() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) {
                resourceGrid.innerHTML = '<div style="color: #a0c0ff; padding: 20px;">No resources found</div>';
                return;
            }
            
            let html = '';
            currentPlanet.resources.forEach(resource => {
                const icon = elementIcons[resource] || '🔹';
                const chance = getResourceChance(resource);
                const isActive = resourceStates[resource];
                
                html += `
                    <div class="resource-toggle ${isActive ? 'active' : ''}" onclick="toggleResource('${resource}')">
                        <span class="resource-icon">${icon}</span>
                        <span class="resource-name">${resource}</span>
                        <span class="resource-chance">${chance}%</span>
                    </div>
                `;
            });
            
            resourceGrid.innerHTML = html;
            updateActiveCount();
        }

        // ===== TOGGLE RESOURCE =====
        window.toggleResource = function(resource) {
            resourceStates[resource] = !resourceStates[resource];
            renderResourceToggles();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        // ===== UPDATE ACTIVE COUNT =====
        function updateActiveCount() {
            const activeResources = Object.values(resourceStates).filter(v => v).length;
            activeCount.textContent = `Extracting: ${activeResources} resource${activeResources !== 1 ? 's' : ''}`;
        }

        // ===== SHOW TOAST NOTIFICATION =====
        function showToast(resource, success) {
            const icon = elementIcons[resource] || '🔹';
            const toast = document.createElement('div');
            toast.className = `toast ${success ? 'success' : 'fail'}`;
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span>${success ? '+' : '✗'} ${resource} ${success ? 'extracted' : 'failed'}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            // Remove after animation
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        // ===== ATTEMPT EXTRACTION =====
        async function attemptExtraction() {
            if (!isExtracting) return;
            if (currentMass >= CARGO_MASS_LIMIT) {
                isExtracting = false;
                extractorText.textContent = 'Cargo full - extraction paused';
                return;
            }
            
            // Get active resources
            const activeResources = currentPlanet.resources.filter(r => resourceStates[r]);
            if (activeResources.length === 0) {
                extractorText.textContent = 'No resources selected';
                return;
            }
            
            // Pick a random active resource
            const randomIndex = Math.floor(Math.random() * activeResources.length);
            const resource = activeResources[randomIndex];
            
            // Determine success based on chance
            const chance = getResourceChance(resource);
            const success = Math.random() * 100 < chance;
            
            if (success) {
                const mass = window.getElementMass(resource);
                
                // Check if we have space
                if (currentMass + mass <= CARGO_MASS_LIMIT) {
                    // Add to collection
                    if (typeof window.addElementToCollection === 'function') {
                        await window.addElementToCollection(resource, 1);
                    }
                    
                    currentMass += mass;
                    updateCargoDisplay();
                    showToast(resource, true);
                } else {
                    // Cargo would overflow
                    isExtracting = false;
                    extractorText.textContent = 'Cargo full - extraction paused';
                    showToast(resource, false);
                }
            } else {
                showToast(resource, false);
            }
        }

        // ===== START EXTRACTION TIMER =====
        function startExtraction() {
            if (extractionTimer) {
                clearInterval(extractionTimer);
            }
            extractionTimer = setInterval(attemptExtraction, EXTRACTION_INTERVAL);
            extractorText.textContent = 'Auto-extractor active';
        }

        // ===== RETURN TO SHIP =====
        window.returnToShip = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Stop extraction timer
            if (extractionTimer) {
                clearInterval(extractionTimer);
                extractionTimer = null;
            }
            
            window.location.href = 'ship-bridge.html';
        };

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'landing on surface...';
                
                // Load planet data
                const planetLoaded = await loadPlanetData();
                
                if (!planetLoaded) {
                    throw new Error('Failed to load planet data');
                }
                
                // Load cargo data
                await loadCargoData();
                
                // Start extraction timer
                startExtraction();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error landing';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (extractionTimer) {
                clearInterval(extractionTimer);
            }
        });

        // ===== START =====
        init();
    </script>
</body>
</html>
