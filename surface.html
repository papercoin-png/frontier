<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Planetary Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        .planet-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.9) saturate(1.2);
        }
        
        .star-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, transparent 30%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 2;
        }
        
        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 10px 18px;
            z-index: 10;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .planet-name {
            display: flex;
            flex-direction: column;
        }
        
        .planet-name-main {
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px #4affaa;
        }
        
        .planet-name-type {
            font-size: 10px;
            color: #a0c0ff;
            letter-spacing: 1px;
        }
        
        .cargo-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .cargo-label {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .cargo-value {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #4affaa;
        }
        
        .cargo-value span {
            color: #a0c0ff;
            font-size: 12px;
        }
        
        .top-controls {
            position: absolute;
            top: 90px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .extractor-status {
            background: rgba(10, 10, 26, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 40px 10px 40px 10px;
            padding: 6px 16px;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .extractor-pulse {
            width: 8px;
            height: 8px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 10px #4affaa;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        .return-button {
            background: rgba(10, 10, 26, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 170, 74, 0.5);
            border-radius: 40px 10px 40px 10px;
            padding: 6px 16px;
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.1s;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        
        .return-button:active {
            background: rgba(255, 170, 74, 0.3);
            transform: scale(0.95);
        }
        
        .toast-container {
            position: absolute;
            top: 140px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            pointer-events: none;
        }
        
        .toast {
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateX(120%);
            animation: slideIn 0.3s forwards, fadeOut 0.3s 2.7s forwards;
            max-width: 220px;
            box-shadow: 0 0 20px currentColor;
        }
        
        .toast.success {
            border-color: #4affaa;
        }
        
        .toast.fail {
            border-color: #ff6b6b;
        }
        
        .toast-icon {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .toast-name {
            font-weight: 500;
        }
        
        .toast-name.rarity-common { color: #ffffff; }
        .toast-name.rarity-uncommon { color: #b0ffb0; }
        .toast-name.rarity-rare { color: #b0b0ff; }
        .toast-name.rarity-very-rare { color: #e0b0ff; }
        .toast-name.rarity-legendary { color: #ffd700; }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        .resource-bar {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 12px;
            z-index: 10;
        }
        
        .resource-label {
            color: #a0c0ff;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .resource-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .resource-toggle {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 110px;
            justify-content: space-between;
            position: relative;
        }
        
        .resource-toggle:active {
            transform: scale(0.95);
        }
        
        .resource-toggle.active {
            background: rgba(74, 255, 170, 0.1);
            box-shadow: 0 0 15px currentColor;
            opacity: 1;
        }
        
        .resource-toggle:not(.active) {
            opacity: 0.5;
            filter: grayscale(0.7);
        }
        
        .resource-symbol {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            min-width: 30px;
        }
        
        .resource-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }
        
        .resource-chance {
            color: #ffd966;
            font-size: 11px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 40px;
            text-align: center;
        }
        
        .resource-icon {
            font-size: 14px;
        }
        
        .rarity-common { 
            border-color: #ffffff; 
            color: #ffffff;
        }
        .rarity-common.active { 
            border-color: #ffffff; 
        }
        
        .rarity-uncommon { 
            border-color: #b0ffb0; 
            color: #b0ffb0;
        }
        .rarity-uncommon.active { 
            border-color: #b0ffb0; 
        }
        
        .rarity-rare { 
            border-color: #b0b0ff; 
            color: #b0b0ff;
        }
        .rarity-rare.active { 
            border-color: #b0b0ff; 
        }
        
        .rarity-very-rare { 
            border-color: #e0b0ff; 
            color: #e0b0ff;
        }
        .rarity-very-rare.active { 
            border-color: #e0b0ff; 
        }
        
        .rarity-legendary { 
            border-color: #ffd700; 
            color: #ffd700;
        }
        .rarity-legendary.active { 
            border-color: #ffd700; 
        }
        
        .active-count {
            text-align: center;
            margin-top: 8px;
            color: #4affaa;
            font-size: 12px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <img src="assets/images/earth-view.jpg" class="planet-canvas" id="planetImage" alt="Planet surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            <div class="star-overlay"></div>
            
            <div class="status-bar">
                <div class="planet-name">
                    <span class="planet-name-main" id="planetName">Loading...</span>
                    <span class="planet-name-type" id="planetType">Loading...</span>
                </div>
                <div class="cargo-display">
                    <span class="cargo-label">CARGO</span>
                    <span class="cargo-value" id="cargoMass"><span>0</span>/5000 AMU</span>
                </div>
            </div>
            
            <div class="top-controls">
                <div class="extractor-status" id="extractorStatus">
                    <span class="extractor-pulse"></span>
                    <span id="extractorText">Auto-extractor active</span>
                </div>
                <div class="return-button" onclick="window.returnToShip()" id="returnButton">
                    RETURN TO SHIP
                </div>
            </div>
            
            <div class="toast-container" id="toastContainer"></div>
            
            <div class="resource-bar">
                <div class="resource-label">⚡ TAP TO TOGGLE EXTRACTION</div>
                <div class="resource-grid" id="resourceGrid"></div>
                <div class="active-count" id="activeCount">Extracting: 0 resources</div>
            </div>
            
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">landing on surface...</div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>

    <script>
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== CONSTANTS =====
        const EXTRACTION_INTERVAL = 5000; // 5 seconds
        
        // ===== RARITY CONFIGURATION =====
        const RARITY_CONFIG = {
            'common': {
                baseChance: 65,
                massTarget: 28,
                variety: 0.6,
                icon: '⚪',
                color: '#ffffff'
            },
            'uncommon': {
                baseChance: 45,
                massTarget: 20,
                variety: 0.5,
                icon: '🟢',
                color: '#b0ffb0'
            },
            'rare': {
                baseChance: 25,
                massTarget: 12,
                variety: 0.4,
                icon: '🔵',
                color: '#b0b0ff'
            },
            'very-rare': {
                baseChance: 12,
                massTarget: 7,
                variety: 0.3,
                icon: '🟣',
                color: '#e0b0ff'
            },
            'legendary': {
                baseChance: 4,
                massTarget: 4,
                variety: 0.2,
                icon: '✨',
                color: '#ffd700'
            }
        };

        // ===== PITY COUNTER SYSTEM =====
        let pityCounters = {}; // Track attempts per resource
        
        const PITY_CONFIG = {
            'common': { threshold: 2 },    // 65% chance → guarantee after 2 failures
            'uncommon': { threshold: 3 },   // 45% chance → guarantee after 3 failures
            'rare': { threshold: 4 },       // 25% chance → guarantee after 4 failures
            'very-rare': { threshold: 9 },  // 12% chance → guarantee after 9 failures
            'legendary': { threshold: 25 }  // 4% chance → guarantee after 25 failures
        };

        function initializePityCounters() {
            currentPlanet.resources.forEach(resource => {
                const rarity = getResourceRarity(resource);
                pityCounters[resource] = {
                    attempts: 0,
                    threshold: PITY_CONFIG[rarity].threshold
                };
            });
            console.log('Pity counters initialized:', pityCounters);
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const planetImage = document.getElementById('planetImage');
        const planetName = document.getElementById('planetName');
        const planetType = document.getElementById('planetType');
        const cargoMass = document.getElementById('cargoMass');
        const resourceGrid = document.getElementById('resourceGrid');
        const activeCount = document.getElementById('activeCount');
        const toastContainer = document.getElementById('toastContainer');
        const extractorText = document.getElementById('extractorText');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.toggleResource = toggleResource;
        window.returnToShip = returnToShip;

        // ===== STATE =====
        let currentPlanet = {
            name: 'Earth',
            type: 'lush',
            typeName: 'Lush',
            resources: []
        };
        
        let resourceStates = {};
        let resourceChances = {};
        let isExtracting = true;
        let extractionTimer = null;
        
        // Cache for cargo mass
        let cachedCargoMass = 0;
        let lastMassUpdate = 0;
        const MASS_UPDATE_INTERVAL = 2000;
        
        // ===== RESOURCE RARITY MAPPING =====
        function getResourceRarity(resourceName) {
            const rareMap = {
                'Gold': 'rare', 'Silver': 'rare', 'Platinum': 'rare', 'Titanium': 'rare',
                'Uranium': 'very-rare', 'Thorium': 'very-rare', 'Plutonium': 'very-rare',
                'Promethium': 'legendary', 'Technetium': 'legendary',
                'Carbon': 'uncommon', 'Iron': 'uncommon', 'Copper': 'uncommon',
                'Nickel': 'uncommon', 'Lead': 'uncommon'
            };
            return rareMap[resourceName] || 'common';
        }

        // ===== ELEMENT DATA =====
        const elementData = {
            'Hydrogen': { symbol: 'H', rarity: 'common' },
            'Helium': { symbol: 'He', rarity: 'common' },
            'Lithium': { symbol: 'Li', rarity: 'common' },
            'Beryllium': { symbol: 'Be', rarity: 'common' },
            'Boron': { symbol: 'B', rarity: 'common' },
            'Sodium': { symbol: 'Na', rarity: 'common' },
            'Magnesium': { symbol: 'Mg', rarity: 'common' },
            'Aluminum': { symbol: 'Al', rarity: 'common' },
            'Silicon': { symbol: 'Si', rarity: 'common' },
            'Potassium': { symbol: 'K', rarity: 'common' },
            'Calcium': { symbol: 'Ca', rarity: 'common' },
            'Carbon': { symbol: 'C', rarity: 'uncommon' },
            'Nitrogen': { symbol: 'N', rarity: 'uncommon' },
            'Oxygen': { symbol: 'O', rarity: 'uncommon' },
            'Fluorine': { symbol: 'F', rarity: 'uncommon' },
            'Neon': { symbol: 'Ne', rarity: 'uncommon' },
            'Phosphorus': { symbol: 'P', rarity: 'uncommon' },
            'Sulfur': { symbol: 'S', rarity: 'uncommon' },
            'Chlorine': { symbol: 'Cl', rarity: 'uncommon' },
            'Argon': { symbol: 'Ar', rarity: 'uncommon' },
            'Iron': { symbol: 'Fe', rarity: 'uncommon' },
            'Nickel': { symbol: 'Ni', rarity: 'uncommon' },
            'Lead': { symbol: 'Pb', rarity: 'uncommon' },
            'Copper': { symbol: 'Cu', rarity: 'rare' },
            'Zinc': { symbol: 'Zn', rarity: 'rare' },
            'Silver': { symbol: 'Ag', rarity: 'rare' },
            'Gold': { symbol: 'Au', rarity: 'rare' },
            'Platinum': { symbol: 'Pt', rarity: 'rare' },
            'Titanium': { symbol: 'Ti', rarity: 'rare' },
            'Uranium': { symbol: 'U', rarity: 'very-rare' },
            'Thorium': { symbol: 'Th', rarity: 'very-rare' },
            'Plutonium': { symbol: 'Pu', rarity: 'very-rare' },
            'Promethium': { symbol: 'Pm', rarity: 'legendary' }
        };

        function getElementSymbol(resource) {
            return elementData[resource]?.symbol || resource.substring(0, 2);
        }

        function getElementMass(elementName) {
            const masses = {
                'Iron': 55.85, 'Gold': 197.0, 'Silver': 107.9, 'Platinum': 195.1,
                'Carbon': 12.01, 'Oxygen': 16.00, 'Hydrogen': 1.008, 'Uranium': 238.0,
                'Titanium': 47.87, 'Copper': 63.55, 'Aluminum': 26.98, 'Silicon': 28.09,
                'Nickel': 58.69, 'Lead': 207.2, 'Thorium': 232.0, 'Plutonium': 244.0,
                'Promethium': 145.0, 'Helium': 4.003, 'Lithium': 6.94, 'Beryllium': 9.012,
                'Boron': 10.81, 'Sodium': 22.99, 'Magnesium': 24.31, 'Potassium': 39.10,
                'Calcium': 40.08, 'Nitrogen': 14.01, 'Fluorine': 19.00, 'Neon': 20.18,
                'Phosphorus': 30.97, 'Sulfur': 32.06, 'Chlorine': 35.45, 'Argon': 39.95,
                'Zinc': 65.38, 'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        async function getCurrentCargoMass() {
            const now = Date.now();
            if (cachedCargoMass > 0 && now - lastMassUpdate < MASS_UPDATE_INTERVAL) {
                return cachedCargoMass;
            }
            
            try {
                if (typeof window.getCollection !== 'function') {
                    return cachedCargoMass || 0;
                }
                
                const collection = await window.getCollection();
                let mass = 0;
                for (const [name, data] of Object.entries(collection)) {
                    mass += (data.count || 1) * getElementMass(name);
                }
                cachedCargoMass = mass;
                lastMassUpdate = now;
                return mass;
            } catch (error) {
                console.error('Error getting cargo mass:', error);
                return cachedCargoMass || 0;
            }
        }

        async function updateCargoDisplay() {
            const mass = await getCurrentCargoMass();
            cargoMass.innerHTML = `<span>${Math.round(mass)}</span>/5000 AMU`;
            return mass;
        }

        async function loadPlanetData() {
            try {
                const planetNameStr = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                const planetTypeStr = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
                
                let planetResources = [];
                const savedResources = localStorage.getItem('voidfarer_current_planet_resources');
                
                if (savedResources) {
                    try {
                        planetResources = JSON.parse(savedResources);
                    } catch (e) {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                } else {
                    if (planetTypeStr.includes('lush')) {
                        planetResources = ['Carbon', 'Oxygen', 'Iron', 'Silicon', 'Hydrogen', 'Gold'];
                    } else if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                        planetResources = ['Iron', 'Sulfur', 'Copper', 'Gold', 'Uranium', 'Platinum'];
                    } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                        planetResources = ['Hydrogen', 'Helium', 'Oxygen', 'Carbon', 'Ice'];
                    } else if (planetTypeStr.includes('barren')) {
                        planetResources = ['Iron', 'Silicon', 'Aluminum', 'Titanium', 'Nickel'];
                    } else {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                }
                
                let imageFile = 'earth-view.jpg';
                if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                    imageFile = 'pyros-surface.jpg';
                } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                    imageFile = 'glacier-surface.jpg';
                } else if (planetTypeStr.includes('lush')) {
                    imageFile = 'verdant-surface.jpg';
                } else if (planetTypeStr.includes('barren')) {
                    imageFile = 'barren-surface.jpg';
                }
                
                planetImage.src = 'assets/images/' + imageFile;
                planetImage.onerror = function() {
                    this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
                };
                
                currentPlanet = {
                    name: planetNameStr,
                    type: planetTypeStr,
                    typeName: planetTypeStr.charAt(0).toUpperCase() + planetTypeStr.slice(1),
                    resources: planetResources
                };
                
                planetName.textContent = currentPlanet.name;
                planetType.textContent = currentPlanet.typeName;
                
                // Initialize all resources as active by default
                currentPlanet.resources.forEach(resource => {
                    resourceStates[resource] = true;
                    const rarity = getResourceRarity(resource);
                    resourceChances[resource] = RARITY_CONFIG[rarity].baseChance;
                });
                
                // Initialize pity counters
                initializePityCounters();
                
                renderResourceToggles();
                await updateCargoDisplay();
                
                return true;
                
            } catch (error) {
                console.error('Error loading planet data:', error);
                return false;
            }
        }

        function renderResourceToggles() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) {
                resourceGrid.innerHTML = '<div style="color: #a0c0ff; padding: 20px;">No resources found</div>';
                return;
            }
            
            let html = '';
            currentPlanet.resources.forEach(resource => {
                const rarity = getResourceRarity(resource);
                const config = RARITY_CONFIG[rarity];
                const symbol = getElementSymbol(resource);
                const chance = resourceChances[resource] || config.baseChance;
                const isActive = resourceStates[resource];
                
                html += `
                    <div class="resource-toggle rarity-${rarity} ${isActive ? 'active' : ''}" 
                         onclick="window.toggleResource('${resource}')"
                         title="Chance: ${chance}%">
                        <span class="resource-symbol">${symbol}</span>
                        <span class="resource-name">${resource}</span>
                        <span class="resource-chance">${chance}%</span>
                        <span class="resource-icon">${config.icon}</span>
                    </div>
                `;
            });
            
            resourceGrid.innerHTML = html;
            updateActiveCount();
        }

        function toggleResource(resource) {
            resourceStates[resource] = !resourceStates[resource];
            renderResourceToggles();
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch (e) {}
            }
        }

        function updateActiveCount() {
            const activeResources = Object.values(resourceStates).filter(v => v).length;
            activeCount.textContent = `Extracting: ${activeResources} resource${activeResources !== 1 ? 's' : ''}`;
        }

        // ===== TOAST FUNCTIONS =====
        function showSuccessToast(resource, quantity, isRichFind, isPity) {
            const rarity = getResourceRarity(resource);
            const config = RARITY_CONFIG[rarity];
            
            const toast = document.createElement('div');
            toast.className = `toast success rarity-${rarity}`;
            
            let icon = isPity ? '🎯' : (isRichFind ? '✨' : config.icon);
            let text = `+${quantity} ${resource}`;
            if (isRichFind) text += ' RICH FIND!';
            if (isPity) text += ' (PITY)';
            
            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <span class="toast-name">${text}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        function showFailToast(resource, attempts, threshold) {
            const rarity = getResourceRarity(resource);
            
            const toast = document.createElement('div');
            toast.className = `toast fail rarity-${rarity}`;
            
            const progressPercent = Math.floor((attempts / threshold) * 100);
            const remainingAttempts = threshold - attempts;
            
            toast.innerHTML = `
                <span class="toast-icon">⏳</span>
                <span class="toast-name" style="display: flex; flex-direction: column; align-items: flex-start;">
                    <span>No ${resource} found</span>
                    <span style="font-size: 8px; color: #a0c0ff;">Pity: ${remainingAttempts} more</span>
                    <div style="width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 2px;">
                        <div style="width: ${progressPercent}%; height: 2px; background: #ffaa4a;"></div>
                    </div>
                </span>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        function showErrorToast() {
            const toast = document.createElement('div');
            toast.className = 'toast fail';
            toast.innerHTML = `
                <span class="toast-icon">⚠️</span>
                <span class="toast-name">Extraction error</span>
            `;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        // ===== MAIN EXTRACTION FUNCTION =====
        async function attemptExtraction() {
            console.log('⏱️ Extraction attempt at:', new Date().toLocaleTimeString());
            
            if (!isExtracting) {
                console.log('Extraction paused');
                return;
            }
            
            try {
                const currentMass = await getCurrentCargoMass();
                const cargoLimit = window.CARGO_MASS_LIMIT || 5000;
                
                if (currentMass >= cargoLimit) {
                    console.log('Cargo full - stopping extraction');
                    isExtracting = false;
                    extractorText.textContent = 'Cargo full - extraction paused';
                    if (extractionTimer) {
                        clearInterval(extractionTimer);
                        extractionTimer = null;
                    }
                    return;
                }
                
                const activeResources = currentPlanet.resources.filter(r => resourceStates[r]);
                if (activeResources.length === 0) {
                    extractorText.textContent = 'No resources selected';
                    return;
                } else {
                    extractorText.textContent = 'Auto-extractor active';
                }
                
                // Weighted selection based on rarity
                let weightedResources = [];
                activeResources.forEach(resource => {
                    const rarity = getResourceRarity(resource);
                    let weight = 1;
                    
                    if (rarity === 'uncommon') weight = 0.7;
                    else if (rarity === 'rare') weight = 0.4;
                    else if (rarity === 'very-rare') weight = 0.2;
                    else if (rarity === 'legendary') weight = 0.1;
                    
                    for (let i = 0; i < weight * 10; i++) {
                        weightedResources.push(resource);
                    }
                });
                
                const randomIndex = Math.floor(Math.random() * weightedResources.length);
                const resource = weightedResources[randomIndex];
                const rarity = getResourceRarity(resource);
                const config = RARITY_CONFIG[rarity];
                const massPerUnit = getElementMass(resource);
                
                // Initialize pity counter if not exists
                if (!pityCounters[resource]) {
                    pityCounters[resource] = {
                        attempts: 0,
                        threshold: PITY_CONFIG[rarity].threshold
                    };
                }
                
                // Increment attempt counter
                pityCounters[resource].attempts++;
                
                // Check if guaranteed by pity
                let isGuaranteed = false;
                let wasPity = false;
                let success = false;
                
                if (pityCounters[resource].attempts >= pityCounters[resource].threshold) {
                    // FORCE SUCCESS - no random roll needed
                    isGuaranteed = true;
                    wasPity = true;
                    success = true;
                    console.log(`🎯 PITY TRIGGERED for ${resource} after ${pityCounters[resource].attempts} attempts - FORCED SUCCESS`);
                } else {
                    // Normal random roll
                    let roll = Math.random() * 100;
                    success = roll < config.baseChance;
                    console.log(`Normal roll for ${resource}: ${roll.toFixed(1)}% vs ${config.baseChance}% = ${success ? 'SUCCESS' : 'FAIL'}`);
                }
                
                let quantity = 0;
                
                if (success) {
                    // Reset pity counter on success
                    pityCounters[resource].attempts = 0;
                    
                    // Calculate base quantity to reach mass target - USE CEIL TO ENSURE AT LEAST 1
                    let baseQuantity = Math.ceil(config.massTarget / massPerUnit);
                    baseQuantity = Math.max(1, baseQuantity);
                    
                    // Apply variety
                    const minVariety = 1 - (config.variety / 2);
                    const maxVariety = 1 + (config.variety / 2);
                    const varietyFactor = minVariety + (Math.random() * (maxVariety - minVariety));
                    
                    quantity = Math.floor(baseQuantity * varietyFactor);
                    quantity = Math.max(1, quantity); // Ensure at least 1
                    
                    // Cap maximum quantity (but ensure at least 1)
                    const maxQuantity = Math.max(1, Math.floor((config.massTarget * 2) / massPerUnit));
                    quantity = Math.min(quantity, maxQuantity);
                    
                    // Bonus for pity success (50% extra)
                    if (wasPity) {
                        quantity = Math.max(1, Math.floor(quantity * 1.5));
                        console.log(`✨ PITY BONUS: Quantity increased to ${quantity}`);
                    }
                }
                
                if (quantity === 0) {
                    // Show failure toast with pity info
                    showFailToast(resource, pityCounters[resource].attempts, pityCounters[resource].threshold);
                    return;
                }
                
                const totalMass = massPerUnit * quantity;
                
                if (currentMass + totalMass <= cargoLimit) {
                    if (typeof window.addElementToCollection !== 'function') {
                        console.warn('window.addElementToCollection not available');
                        return;
                    }
                    
                    const avgQuantity = Math.floor(config.massTarget / massPerUnit);
                    const isRichFind = quantity > avgQuantity * 1.5;
                    
                    const result = await window.addElementToCollection(resource, quantity);
                    
                    if (result && result.success) {
                        cachedCargoMass = currentMass + totalMass;
                        lastMassUpdate = Date.now();
                        await updateCargoDisplay();
                        showSuccessToast(resource, quantity, isRichFind, wasPity);
                    } else {
                        showFailToast(resource, pityCounters[resource].attempts, pityCounters[resource].threshold);
                    }
                } else {
                    showFailToast(resource, pityCounters[resource].attempts, pityCounters[resource].threshold);
                }
            } catch (error) {
                console.error('Extraction error:', error);
                showErrorToast();
            }
        }

        function startExtraction() {
            console.log('Starting extraction timer...');
            if (extractionTimer) {
                console.log('Clearing existing timer');
                clearInterval(extractionTimer);
                extractionTimer = null;
            }
            
            isExtracting = true;
            extractorText.textContent = 'Auto-extractor active';
            
            // Do an immediate extraction
            console.log('Performing initial extraction...');
            attemptExtraction().catch(console.error);
            
            // Then set up the interval
            extractionTimer = setInterval(() => {
                console.log('Extraction interval triggered');
                if (isExtracting) {
                    attemptExtraction().catch(console.error);
                } else {
                    console.log('Extraction paused, skipping');
                }
            }, EXTRACTION_INTERVAL);
            
            console.log('Extraction timer set with interval:', EXTRACTION_INTERVAL);
        }

        function returnToShip() {
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch (e) {}
            }
            
            if (extractionTimer) {
                clearInterval(extractionTimer);
                extractionTimer = null;
            }
            
            window.location.href = 'ship-bridge.html';
        }

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'landing on surface...';
                
                const planetLoaded = await loadPlanetData();
                
                if (!planetLoaded) {
                    throw new Error('Failed to load planet data');
                }
                
                // Start extraction immediately
                startExtraction();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error landing';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (extractionTimer) {
                clearInterval(extractionTimer);
            }
        });

        init();
    </script>
</body>
</html>
