<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Planetary Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .surface-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .surface-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .surface-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Planet Info Card */
        .planet-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .planet-icon {
            font-size: 48px;
            min-width: 60px;
            text-align: center;
            filter: drop-shadow(0 0 15px #6a8ac0);
        }
        
        .planet-info {
            flex: 1;
        }
        
        .planet-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
            margin-bottom: 4px;
        }
        
        .planet-type {
            color: #a0c0ff;
            font-size: 14px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .cargo-mass {
            font-size: 14px;
            color: #a0c0ff;
            text-align: right;
        }
        
        .cargo-mass span {
            color: #4affaa;
            font-weight: 600;
        }
        
        /* Auto-Extract Log */
        .auto-extract-log {
            background: rgba(74, 255, 170, 0.1);
            border: 2px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .auto-extract-log.visible {
            display: block;
        }
        
        .log-title {
            color: #4affaa;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            font-family: 'Exo 2', sans-serif;
            text-align: center;
        }
        
        .log-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .log-item {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .log-item-icon {
            font-size: 18px;
        }
        
        .log-item-name {
            color: #ffffff;
        }
        
        .log-item-qty {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Extraction Section */
        .extraction-section {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            font-family: 'Exo 2', sans-serif;
            border-bottom: 1px solid #6a8ac0;
            padding-bottom: 8px;
        }
        
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .resource-card {
            background: rgba(0,0,0,0.3);
            border: 2px solid #4a8ac0;
            border-radius: 30% 10% 30% 10%;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .resource-card:active {
            background: rgba(74, 138, 192, 0.3);
            transform: scale(0.97);
        }
        
        .resource-card.selected {
            border-color: #ffaa4a;
            box-shadow: 0 0 20px #ffaa4a;
        }
        
        .resource-icon {
            font-size: 32px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px #4a8ac0);
        }
        
        .resource-name {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .resource-chance {
            color: #ffd966;
            font-size: 12px;
        }
        
        .extraction-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .qty-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qty-btn:active {
            background: #6a8ac0;
            transform: scale(0.9);
        }
        
        .qty-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        #extractQuantity {
            width: 80px;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #6a8ac0;
            border-radius: 30px 8px 30px 8px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            font-family: 'Exo 2', sans-serif;
        }
        
        .extract-info {
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
            color: #a0c0ff;
        }
        
        .extract-mass {
            color: #4affaa;
            font-weight: 600;
            font-size: 18px;
        }
        
        .extract-btn {
            width: 100%;
            background: #4affaa;
            border: none;
            color: #0a0a1a;
            padding: 18px;
            border-radius: 60px 20px 60px 20px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 30px #4affaa;
        }
        
        .extract-btn:active {
            transform: scale(0.97);
            background: #6affcc;
        }
        
        .extract-btn:disabled {
            background: #2a4a6a;
            color: #a0c0ff;
            box-shadow: none;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Success Message */
        .success-message {
            background: rgba(74, 255, 170, 0.2);
            border: 2px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            color: #4affaa;
            font-weight: 600;
            display: none;
        }
        
        .success-message.visible {
            display: block;
        }
        
        /* Capacity Bar */
        .capacity-bar-container {
            margin: 10px 0;
        }
        
        .capacity-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #a0c0ff;
            margin-bottom: 4px;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            transition: width 0.3s;
        }
        
        /* Mass warning */
        .mass-warning {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
            display: none;
        }
        
        .mass-warning.visible {
            display: block;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 16px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 260px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin-top: 20px;
            animation: subtle-pulse 3s infinite;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <!-- Header -->
            <div class="surface-header">
                <div class="surface-title">Surface</div>
                <div class="surface-subtitle">✦ extract resources ✦</div>
            </div>
            
            <!-- Planet Info Card -->
            <div class="planet-card">
                <div class="planet-icon" id="planetIcon">🌍</div>
                <div class="planet-info">
                    <div class="planet-name" id="planetName">Loading...</div>
                    <div class="planet-type" id="planetType">Loading...</div>
                </div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="cargo-mass" id="cargoMassDisplay">
                    Cargo: <span>--/--</span> AMU
                </div>
            </div>
            
            <!-- Auto-Extract Log -->
            <div class="auto-extract-log" id="autoExtractLog">
                <div class="log-title">✨ Auto-extracted on landing</div>
                <div class="log-items" id="autoExtractItems"></div>
            </div>
            
            <!-- Extraction Section -->
            <div class="extraction-section">
                <div class="section-title">⚡ Available Resources</div>
                
                <div class="resources-grid" id="resourcesGrid">
                    <!-- Filled by JavaScript -->
                    <div style="color: #a0c0ff; text-align: center; grid-column: span 2; padding: 20px;">Loading resources...</div>
                </div>
                
                <div class="extraction-controls">
                    <button class="qty-btn" id="decrementBtn" onclick="decrementQty()">−</button>
                    <input type="number" id="extractQuantity" value="1" min="1" max="10" readonly>
                    <button class="qty-btn" id="incrementBtn" onclick="incrementQty()">+</button>
                </div>
                
                <div class="extract-info">
                    <span>Mass per unit: <span class="extract-mass" id="massPerUnit">0</span> AMU</span>
                    <span style="margin-left: 15px;">Total: <span class="extract-mass" id="totalMass">0</span> AMU</span>
                </div>
                
                <div class="capacity-bar-container">
                    <div class="capacity-labels">
                        <span>Cargo Capacity</span>
                        <span id="capacityText">0/1000 AMU</span>
                    </div>
                    <div class="capacity-bar-bg">
                        <div class="capacity-bar-fill" id="capacityBar" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="mass-warning" id="massWarning">
                    ⚠️ Not enough cargo space
                </div>
                
                <button class="extract-btn" id="extractBtn" onclick="extractResource()">⛏️ EXTRACT</button>
            </div>
            
            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                ✨ Resources added to cargo!
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="returnToShip()">
                <span class="back-arrow">←</span>
                <span class="back-text">RETURN TO SHIP</span>
                <span class="back-icon">🚀</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">extracting...</div>
            </div>
            
            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- Load all JS files -->
    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>

    <!-- FALLBACK FUNCTIONS -->
    <script>
    (function() {
        console.log('Surface.html initializing with fallbacks');
        
        // Define fallback functions
        window.getCredits = window.getCredits || function() { 
            return parseInt(localStorage.getItem('voidfarer_credits')) || 5000; 
        };

        window.getCollection = window.getCollection || function() {
            const saved = localStorage.getItem('voidfarer_collection');
            return saved ? JSON.parse(saved) : {};
        };

        window.addElementToCollection = window.addElementToCollection || function(elementName, count) {
            let collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
            if (collection[elementName]) {
                collection[elementName].count = (collection[elementName].count || 1) + count;
            } else {
                collection[elementName] = { count: count, firstFound: new Date().toISOString() };
            }
            localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
            return { success: true };
        };

        window.getElementMass = window.getElementMass || function(elementName) {
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Lithium': 6.94, 'Beryllium': 9.012,
                'Boron': 10.81, 'Carbon': 12.01, 'Nitrogen': 14.01, 'Oxygen': 16.00,
                'Fluorine': 19.00, 'Neon': 20.18, 'Sodium': 22.99, 'Magnesium': 24.31,
                'Aluminum': 26.98, 'Silicon': 28.09, 'Phosphorus': 30.97, 'Sulfur': 32.06,
                'Chlorine': 35.45, 'Argon': 39.95, 'Potassium': 39.10, 'Calcium': 40.08,
                'Iron': 55.85, 'Nickel': 58.69, 'Copper': 63.55, 'Zinc': 65.38,
                'Silver': 107.9, 'Gold': 197.0, 'Platinum': 195.1, 'Titanium': 47.87,
                'Uranium': 238.0, 'Thorium': 232.0, 'Plutonium': 244.0, 'Promethium': 145.0,
                'default': 100.0
            };
            return masses[elementName] || masses.default;
        };
    })();
    </script>

    <script>
        // ===== MAIN SURFACE SCRIPT =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }

        // ===== CONSTANTS =====
        const CARGO_MASS_LIMIT = 1000;

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const resourcesGrid = document.getElementById('resourcesGrid');
        const extractQuantity = document.getElementById('extractQuantity');
        const decrementBtn = document.getElementById('decrementBtn');
        const incrementBtn = document.getElementById('incrementBtn');
        const massPerUnitSpan = document.getElementById('massPerUnit');
        const totalMassSpan = document.getElementById('totalMass');
        const extractBtn = document.getElementById('extractBtn');
        const successMessage = document.getElementById('successMessage');
        const capacityBar = document.getElementById('capacityBar');
        const capacityText = document.getElementById('capacityText');
        const massWarning = document.getElementById('massWarning');
        const autoExtractLog = document.getElementById('autoExtractLog');
        const autoExtractItems = document.getElementById('autoExtractItems');
        const cargoMassDisplay = document.getElementById('cargoMassDisplay');

        // ===== STATE =====
        let currentPlanet = {
            name: 'Unknown',
            type: 'unknown',
            typeName: 'Unknown',
            icon: '🌍',
            resources: []
        };
        
        let selectedResource = null;
        let currentCredits = 5000;
        let currentMass = 0;
        let autoExtracted = [];

        // ===== ELEMENT ICONS =====
        const elementIcons = {
            'Hydrogen': '💧', 'Helium': '🎈', 'Lithium': '🔋', 'Beryllium': '💎',
            'Boron': '🧪', 'Carbon': '⚫', 'Nitrogen': '🌬️', 'Oxygen': '💨',
            'Fluorine': '🧪', 'Neon': '💡', 'Sodium': '🧂', 'Magnesium': '✨',
            'Aluminum': '🥫', 'Silicon': '💻', 'Phosphorus': '✨', 'Sulfur': '🟡',
            'Chlorine': '🧪', 'Argon': '🎈', 'Potassium': '🍌', 'Calcium': '🥛',
            'Iron': '⚙️', 'Nickel': '🔩', 'Copper': '🔴', 'Zinc': '⚪',
            'Silver': '⚪', 'Gold': '🟡', 'Platinum': '⬜', 'Titanium': '🔷',
            'Uranium': '🟣', 'Thorium': '🔮', 'Plutonium': '☢️', 'Promethium': '✨',
            'default': '🔹'
        };

        // ===== GET ELEMENT ICON =====
        function getElementIcon(elementName) {
            return elementIcons[elementName] || elementIcons.default;
        }

        // ===== LOAD PLANET DATA =====
        async function loadPlanetData() {
            try {
                console.log('Loading planet data from localStorage:');
                console.log('- Planet:', localStorage.getItem('voidfarer_current_planet'));
                console.log('- Type:', localStorage.getItem('voidfarer_current_planet_type'));
                console.log('- Resources:', localStorage.getItem('voidfarer_current_planet_resources'));
                
                // Get planet data from localStorage
                const planetName = localStorage.getItem('voidfarer_current_planet');
                const planetType = localStorage.getItem('voidfarer_current_planet_type');
                
                // If no planet data exists, set Earth as default
                if (!planetName || !planetType) {
                    console.log('No planet data found, setting Earth as default');
                    localStorage.setItem('voidfarer_current_planet', 'Earth');
                    localStorage.setItem('voidfarer_current_planet_type', 'lush');
                    localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                    
                    // Reload data
                    return loadPlanetData();
                }
                
                // Get resources
                let planetResources = [];
                const savedResources = localStorage.getItem('voidfarer_current_planet_resources');
                
                if (savedResources) {
                    try {
                        planetResources = JSON.parse(savedResources);
                    } catch (e) {
                        console.error('Error parsing resources, using defaults');
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                } else {
                    // Generate resources based on planet type
                    if (planetType.includes('lush')) {
                        planetResources = ['Carbon', 'Oxygen', 'Iron', 'Silicon', 'Hydrogen'];
                    } else if (planetType.includes('scorched') || planetType.includes('volcanic')) {
                        planetResources = ['Iron', 'Sulfur', 'Copper', 'Gold', 'Uranium'];
                    } else if (planetType.includes('frozen') || planetType.includes('ice')) {
                        planetResources = ['Hydrogen', 'Helium', 'Oxygen', 'Carbon'];
                    } else if (planetType.includes('barren')) {
                        planetResources = ['Iron', 'Silicon', 'Aluminum', 'Titanium'];
                    } else {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                }
                
                // Set planet icon based on type
                let icon = '🌍';
                if (planetType.includes('scorched') || planetType.includes('volcanic')) icon = '🌋';
                else if (planetType.includes('frozen') || planetType.includes('ice')) icon = '❄️';
                else if (planetType.includes('gas')) icon = '🌪️';
                else if (planetType.includes('barren')) icon = '🪨';
                else if (planetType.includes('lush')) icon = '🌱';
                
                currentPlanet = {
                    name: planetName,
                    type: planetType,
                    typeName: planetType.charAt(0).toUpperCase() + planetType.slice(1),
                    icon: icon,
                    resources: planetResources
                };
                
                document.getElementById('planetName').textContent = currentPlanet.name;
                document.getElementById('planetType').textContent = currentPlanet.typeName;
                document.getElementById('planetIcon').textContent = currentPlanet.icon;
                
                console.log('Planet data loaded successfully:', currentPlanet);
                return true;
                
            } catch (error) {
                console.error('Error loading planet data:', error);
                return false;
            }
        }

        // ===== LOAD CARGO DATA =====
        async function loadCargoData() {
            try {
                // Get credits
                if (typeof window.getCredits === 'function') {
                    currentCredits = await window.getCredits();
                } else {
                    currentCredits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                }
                
                // Get collection
                let collection = {};
                if (typeof window.getCollection === 'function') {
                    collection = await window.getCollection();
                } else {
                    const saved = localStorage.getItem('voidfarer_collection');
                    collection = saved ? JSON.parse(saved) : {};
                }
                
                // Update credits display
                document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${currentCredits.toLocaleString()}`;
                
                // Calculate total mass
                currentMass = 0;
                for (const [name, data] of Object.entries(collection)) {
                    const count = data.count || 1;
                    const mass = window.getElementMass(name);
                    currentMass += count * mass;
                }
                
                // Update cargo display
                updateCargoDisplay();
                
                return true;
                
            } catch (error) {
                console.error('Error loading cargo:', error);
                return false;
            }
        }

        // ===== UPDATE CARGO DISPLAY =====
        function updateCargoDisplay() {
            const massPercent = (currentMass / CARGO_MASS_LIMIT) * 100;
            cargoMassDisplay.innerHTML = `Cargo: <span>${currentMass.toFixed(1)}/${CARGO_MASS_LIMIT}</span> AMU`;
            capacityBar.style.width = Math.min(100, massPercent) + '%';
            capacityText.textContent = `${currentMass.toFixed(1)}/${CARGO_MASS_LIMIT} AMU`;
        }

        // ===== RENDER RESOURCES =====
        function renderResources() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) {
                resourcesGrid.innerHTML = '<div style="color: #a0c0ff; text-align: center; grid-column: span 2; padding: 20px;">No resources found on this planet</div>';
                return;
            }
            
            let html = '';
            currentPlanet.resources.forEach(resource => {
                const chance = Math.floor(Math.random() * 30) + 70; // 70-100% for demo
                const icon = getElementIcon(resource);
                
                html += `
                    <div class="resource-card" onclick="selectResource('${resource}')">
                        <div class="resource-icon">${icon}</div>
                        <div class="resource-name">${resource}</div>
                        <div class="resource-chance">${chance}% chance</div>
                    </div>
                `;
            });
            
            resourcesGrid.innerHTML = html;
            
            // Select first resource by default
            if (currentPlanet.resources.length > 0 && !selectedResource) {
                selectResource(currentPlanet.resources[0]);
            }
        }

        // ===== PERFORM AUTO-EXTRACT ON LANDING =====
        async function performAutoExtract() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) return;
            
            // Auto-extract 1-3 units of random resources
            const extractCount = Math.floor(Math.random() * 3) + 1;
            const extracted = [];
            
            for (let i = 0; i < extractCount; i++) {
                const randomIndex = Math.floor(Math.random() * currentPlanet.resources.length);
                const resource = currentPlanet.resources[randomIndex];
                const quantity = Math.floor(Math.random() * 3) + 1;
                
                const mass = window.getElementMass(resource);
                const totalMass = mass * quantity;
                
                if (currentMass + totalMass <= CARGO_MASS_LIMIT) {
                    if (typeof window.addElementToCollection === 'function') {
                        await window.addElementToCollection(resource, quantity);
                    }
                    
                    extracted.push({ resource, quantity, icon: getElementIcon(resource) });
                    currentMass += totalMass;
                }
            }
            
            if (extracted.length > 0) {
                let logHtml = '';
                extracted.forEach(item => {
                    logHtml += `
                        <div class="log-item">
                            <span class="log-item-icon">${item.icon}</span>
                            <span class="log-item-name">${item.resource}</span>
                            <span class="log-item-qty">+${item.quantity}</span>
                        </div>
                    `;
                });
                autoExtractItems.innerHTML = logHtml;
                autoExtractLog.classList.add('visible');
                
                updateCargoDisplay();
                
                successMessage.classList.add('visible');
                setTimeout(() => {
                    successMessage.classList.remove('visible');
                }, 3000);
            }
        }

        // ===== SELECT RESOURCE =====
        function selectResource(resource) {
            selectedResource = resource;
            
            document.querySelectorAll('.resource-card').forEach(card => {
                card.classList.remove('selected');
                if (card.querySelector('.resource-name').textContent === resource) {
                    card.classList.add('selected');
                }
            });
            
            const mass = window.getElementMass(resource);
            massPerUnitSpan.textContent = mass.toFixed(1);
            updateTotalMass();
            validateExtraction();
        }

        // ===== UPDATE TOTAL MASS =====
        function updateTotalMass() {
            const qty = parseInt(extractQuantity.value);
            const mass = parseFloat(massPerUnitSpan.textContent);
            totalMassSpan.textContent = (qty * mass).toFixed(1);
        }

        // ===== INCREMENT QUANTITY =====
        function incrementQty() {
            let current = parseInt(extractQuantity.value);
            if (current < 10) {
                current++;
                extractQuantity.value = current;
                updateTotalMass();
                validateExtraction();
            }
        }

        // ===== DECREMENT QUANTITY =====
        function decrementQty() {
            let current = parseInt(extractQuantity.value);
            if (current > 1) {
                current--;
                extractQuantity.value = current;
                updateTotalMass();
                validateExtraction();
            }
        }

        // ===== VALIDATE EXTRACTION =====
        function validateExtraction() {
            if (!selectedResource) {
                extractBtn.disabled = true;
                return;
            }
            
            const qty = parseInt(extractQuantity.value);
            const mass = parseFloat(massPerUnitSpan.textContent);
            const totalMass = qty * mass;
            
            if (currentMass + totalMass > CARGO_MASS_LIMIT) {
                extractBtn.disabled = true;
                massWarning.classList.add('visible');
            } else {
                extractBtn.disabled = false;
                massWarning.classList.remove('visible');
            }
        }

        // ===== EXTRACT RESOURCE =====
        async function extractResource() {
            if (!selectedResource || extractBtn.disabled) return;
            
            const quantity = parseInt(extractQuantity.value);
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'extracting resources...';
            
            try {
                let result;
                
                if (typeof window.addElementToCollection === 'function') {
                    result = await window.addElementToCollection(selectedResource, quantity);
                } else {
                    result = { success: true };
                }
                
                if (result && result.success) {
                    successMessage.classList.add('visible');
                    setTimeout(() => {
                        successMessage.classList.remove('visible');
                    }, 3000);
                    
                    await loadCargoData();
                    validateExtraction();
                    
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Failed to extract resources');
                }
                
            } catch (error) {
                console.error('Extraction error:', error);
                alert('Error extracting resources');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== RETURN TO SHIP =====
        function returnToShip() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'scanning surface...';
                
                // Load planet data
                const planetLoaded = await loadPlanetData();
                
                if (!planetLoaded) {
                    throw new Error('Failed to load planet data');
                }
                
                // Load cargo data
                await loadCargoData();
                
                // Render resources
                renderResources();
                
                // Set default quantity
                extractQuantity.value = 1;
                if (selectedResource) {
                    const mass = window.getElementMass(selectedResource);
                    massPerUnitSpan.textContent = mass.toFixed(1);
                    updateTotalMass();
                }
                
                validateExtraction();
                
                // Auto-extract on landing
                await performAutoExtract();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading surface';
                
                // If no planet data, set defaults and reload
                if (!localStorage.getItem('voidfarer_current_planet')) {
                    localStorage.setItem('voidfarer_current_planet', 'Earth');
                    localStorage.setItem('voidfarer_current_planet_type', 'lush');
                    localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                    
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    setTimeout(() => {
                        loadingOverlay.classList.remove('active');
                    }, 2000);
                }
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
