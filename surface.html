<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        .surface-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.7;
        }
        
        .atmosphere {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 20, 30, 0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        .planet-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 28px;
            text-shadow: 0 0 20px #000, 0 0 40px #4a8ac0;
            background: rgba(0,0,0,0.4);
            padding: 8px 30px;
            border-radius: 60px 15px 60px 15px;
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            z-index: 10;
        }
        
        .location-info {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 4px 16px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #8ac0d0;
            z-index: 10;
            font-family: monospace;
        }
        
        .auto-notice {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #8aa0aa;
            color: #e0f0f0;
            padding: 8px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .auto-notice.show {
            opacity: 1;
            animation: notice-pulse 2s ease-in-out;
        }
        
        @keyframes notice-pulse {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        
        .resource-log {
            position: absolute;
            bottom: 150px;
            left: 20px;
            z-index: 20;
            font-family: monospace;
            font-size: 14px;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 30px 10px 30px 10px;
            border: 1px solid #8ac0d0;
            min-width: 180px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .collection {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            font-size: 24px;
            font-family: 'WindSong', cursive;
            color: #e0f0f0;
            text-shadow: 0 0 20px #8aa0aa;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 60px 15px 60px 15px;
            border: 2px solid #8ac0d0;
            min-width: 100px;
            text-align: center;
        }
        
        .return-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8aa0aa;
            color: #e0f0f0;
            padding: 12px 24px;
            border-radius: 60px 15px 60px 15px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
        }
        
        .return-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        .resource-indicator {
            position: absolute;
            top: 210px;
            right: 20px;
            z-index: 15;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #8ac0d0;
            border-radius: 40px 10px 40px 10px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 12px;
        }
        
        .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin-top: 5px;
        }
        
        .colony-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            color: #e0f0f0;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .colony-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #8ac0d0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view">
            <img src="assets/images/surface-bg.jpg" class="surface-bg" id="surfaceBg" alt="Surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            
            <div class="atmosphere"></div>
            
            <div class="planet-name" id="planetName">Verdant Prime</div>
            <div class="location-info" id="locationInfo">Sector B2 • Orion Nebula</div>
            
            <button class="colony-btn" id="colonyBtn" onclick="toggleColony()">🏭 ESTABLISH COLONY</button>
            
            <div class="auto-notice" id="autoNotice">⚙️ Auto-extractor active</div>
            
            <div class="resource-indicator">
                <div>📦 This planet:</div>
                <div class="planet-resources" id="planetResources">Carbon, Iron, Gold</div>
            </div>
            
            <div class="resource-log" id="resourceLog">
                <div class="log-entry" style="color:#aaa;">⚙️ Ready to extract...</div>
            </div>
            
            <div class="collection" id="collectionCount">✨ 0</div>
            
            <button class="return-btn" onclick="returnToShip()">← RETURN TO SHIP</button>
            
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();
        
        // Load location data
        const planetName = localStorage.getItem('voidfarer_current_planet') || 'Verdant Prime';
        const planetType = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
        const planetResources = JSON.parse(localStorage.getItem('voidfarer_current_planet_resources')) || ['Carbon', 'Iron', 'Gold'];
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        const currentNebula = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
        
        document.getElementById('planetName').textContent = planetName;
        document.getElementById('locationInfo').textContent = `${currentStar} • ${currentNebula} • Sector ${currentSector}`;
        document.getElementById('planetResources').textContent = planetResources.slice(0, 5).join(', ');
        
        // Element data
        const elements = {
            'Carbon': { value: 250, color: '#b0ffb0' },
            'Iron': { value: 250, color: '#b0ffb0' },
            'Gold': { value: 1000, color: '#b0b0ff' },
            'Silver': { value: 1000, color: '#b0b0ff' },
            'Platinum': { value: 1000, color: '#b0b0ff' },
            'Uranium': { value: 5000, color: '#e0b0ff' },
            'Titanium': { value: 1000, color: '#b0b0ff' },
            'Silicon': { value: 100, color: '#ffffff' },
            'Oxygen': { value: 250, color: '#b0ffb0' }
        };
        
        // Storage helpers
        function getCollection() {
            return JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
        }
        
        function saveCollection(c) {
            localStorage.setItem('voidfarer_collection', JSON.stringify(c));
        }
        
        function getCredits() {
            return parseInt(localStorage.getItem('voidfarer_credits')) || 12450;
        }
        
        function saveCredits(c) {
            localStorage.setItem('voidfarer_credits', c.toString());
        }
        
        // State
        let collectedCount = Object.keys(getCollection()).length;
        let sessionElements = 0;
        let gatherInterval = null;
        
        const resourceLog = document.getElementById('resourceLog');
        const collectionSpan = document.getElementById('collectionCount');
        const autoNotice = document.getElementById('autoNotice');
        
        collectionSpan.textContent = `✨ ${collectedCount}`;
        
        function showNotice(msg) {
            autoNotice.textContent = msg;
            autoNotice.classList.add('show');
            setTimeout(() => autoNotice.classList.remove('show'), 2000);
        }
        
        function saveElement(name) {
            const collection = getCollection();
            collection[name] = (collection[name] || 0) + 1;
            saveCollection(collection);
            
            const credits = getCredits() + (elements[name]?.value || 100);
            saveCredits(credits);
            
            return Object.keys(collection).length;
        }
        
        function extractResource() {
            if (!planetResources.length) return;
            
            const element = planetResources[Math.floor(Math.random() * planetResources.length)];
            const data = elements[element] || { value: 100, color: '#ffffff' };
            
            collectedCount = saveElement(element);
            sessionElements++;
            collectionSpan.textContent = `✨ ${collectedCount}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = data.color;
            entry.innerHTML = `✨ +1 ${element} (${data.value}⭐)`;
            
            resourceLog.insertBefore(entry, resourceLog.firstChild);
            while (resourceLog.children.length > 5) {
                resourceLog.removeChild(resourceLog.lastChild);
            }
            
            showNotice(`Found ${element}`);
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // *** FIXED: This is the only function that needed to change ***
        function startAutoGather() {
            if (gatherInterval) clearInterval(gatherInterval);
            
            // Direct localStorage check - no missing function
            const autoGather = localStorage.getItem('voidfarer_auto_gather') !== 'false';
            
            if (!autoGather) {
                showNotice('⚠️ Auto-extractor disabled');
                return;
            }
            
            showNotice('⚙️ Auto-extractor active');
            
            gatherInterval = setInterval(() => {
                extractResource();
            }, 4000);
            
            // Do first extraction immediately
            setTimeout(extractResource, 1000);
        }
        
        // Colony functions
        function getColonies() {
            return JSON.parse(localStorage.getItem('voidfarer_colonies')) || [];
        }
        
        function saveColonies(c) {
            localStorage.setItem('voidfarer_colonies', JSON.stringify(c));
        }
        
        function checkForColony() {
            const colonies = getColonies();
            if (colonies.some(c => c.planet === planetName && c.star === currentStar)) {
                document.getElementById('colonyBtn').innerHTML = '🏭 COLONY ESTABLISHED';
            }
        }
        
        function toggleColony() {
            const colonies = getColonies();
            const exists = colonies.findIndex(c => c.planet === planetName && c.star === currentStar);
            
            if (exists >= 0) {
                if (confirm('Abandon colony?')) {
                    colonies.splice(exists, 1);
                    saveColonies(colonies);
                    document.getElementById('colonyBtn').innerHTML = '🏭 ESTABLISH COLONY';
                    showNotice('Colony abandoned');
                }
            } else {
                const name = prompt('Name your colony:', planetName + ' Outpost');
                if (name) {
                    colonies.push({
                        name, planet: planetName, star: currentStar,
                        nebula: currentNebula, sector: currentSector,
                        established: new Date().toISOString()
                    });
                    saveColonies(colonies);
                    document.getElementById('colonyBtn').innerHTML = '🏭 COLONY ESTABLISHED';
                    
                    const credits = getCredits() + 5000;
                    saveCredits(credits);
                    showNotice('+5000⭐');
                }
            }
        }
        
        function returnToShip() {
            if (gatherInterval) clearInterval(gatherInterval);
            document.getElementById('loadingOverlay').classList.add('active');
            setTimeout(() => window.location.href = 'system-view.html', 800);
        }
        
        // Initialize
        function init() {
            if (!localStorage.getItem('voidfarer_player')) {
                window.location.href = 'index.html';
                return;
            }
            
            checkForColony();
            resourceLog.innerHTML = '<div class="log-entry" style="color:#aaa;">⚙️ Ready</div>';
            setTimeout(startAutoGather, 1000);
        }
        
        init();
        
        window.addEventListener('beforeunload', () => {
            if (gatherInterval) clearInterval(gatherInterval);
        });
    </script>
</body>
</html>
