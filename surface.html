<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Planetary Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
            margin: 0 auto;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            background: #000;
            -webkit-overflow-scrolling: touch;
        }
        
        .content {
            position: relative;
            min-height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        
        .planet-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.9) saturate(1.2);
            pointer-events: none;
            border-radius: 40px;
        }
        
        .planet-canvas.landscape {
            object-fit: contain;
            background: #000;
        }
        
        .star-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, transparent 30%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 2;
            border-radius: 40px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 10px 18px;
            z-index: 10;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .status-bar.flash {
            border-color: #4affaa;
            box-shadow: 0 0 20px #4affaa;
        }
        
        .planet-name {
            display: flex;
            flex-direction: column;
        }
        
        .planet-name-main {
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px #4affaa;
        }
        
        .planet-name-type {
            font-size: 10px;
            color: #a0c0ff;
            letter-spacing: 1px;
        }
        
        .tier-badge {
            font-size: 9px;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 2px;
            display: inline-block;
        }
        
        .cargo-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .cargo-label {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .cargo-value {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #4affaa;
        }
        
        .cargo-value span {
            color: #a0c0ff;
            font-size: 12px;
        }
        
        .extractor-status {
            background: rgba(10, 10, 26, 0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 40px 10px 40px 10px;
            padding: 6px 16px;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }
        
        .extractor-pulse {
            width: 8px;
            height: 8px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 10px #4affaa;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            position: relative;
            z-index: 30;
        }
        
        .nav-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .nav-btn {
            flex: 1;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 0;
            border-radius: 60px 20px 60px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            text-align: center;
            box-shadow: 0 0 20px rgba(106, 138, 192, 0.5);
        }
        
        .nav-btn:active {
            background: #6a8ac0;
            transform: scale(0.96);
        }
        
        .nav-btn.system-btn {
            border-color: #4affaa;
            color: #4affaa;
        }
        
        .nav-btn.system-btn:active {
            background: #4affaa;
            color: #0a0a1a;
        }
        
        .claim-btn {
            width: 100%;
            background: rgba(255, 215, 0, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid gold;
            color: #0a0a1a;
            padding: 14px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 0 30px gold;
            display: none;
            position: relative;
            margin-top: 10px;
            z-index: 35;
        }
        
        .claim-btn.visible {
            display: block;
        }
        
        .claim-btn:active {
            background: gold;
            transform: scale(0.96);
        }
        
        .claim-btn:disabled {
            opacity: 0.5;
            background: rgba(100, 100, 100, 0.5);
            border-color: #888;
            color: #ccc;
            box-shadow: none;
            pointer-events: none;
        }
        
        .extraction-notification {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) translateX(100%);
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid;
            border-radius: 60px 20px 60px 20px;
            padding: 20px 40px;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.2s ease-out;
            pointer-events: none;
            min-width: 280px;
            text-align: center;
        }
        
        .extraction-notification.success {
            border-color: currentColor;
        }
        
        .extraction-notification.success.rarity-very-rare {
            color: #e0b0ff;
            box-shadow: 0 0 30px #e0b0ff;
        }
        
        .extraction-notification.success.rarity-legendary {
            color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }
        
        .extraction-notification.success.rarity-common {
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: none;
        }
        
        .extraction-notification.success.rarity-uncommon {
            color: #b0ffb0;
            border-color: #b0ffb0;
            box-shadow: none;
        }
        
        .extraction-notification.success.rarity-rare {
            color: #4169E1;
            border-color: #4169E1;
            box-shadow: none;
        }
        
        .extraction-notification.fail {
            min-width: 200px;
            padding: 15px 25px;
            border-width: 1px;
            box-shadow: 0 0 20px #ff6b6b;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        
        .extraction-notification.fail .notification-icon {
            font-size: 32px;
            filter: grayscale(0.8);
            opacity: 0.7;
        }
        
        .extraction-notification.fail .notification-title {
            font-size: 18px;
            color: #aaaaaa;
            opacity: 0.7;
        }
        
        .extraction-notification.fail .notification-resource {
            font-size: 14px;
            color: #aaaaaa;
            opacity: 0.7;
        }
        
        .extraction-notification.fail .notification-quantity {
            font-size: 12px;
            color: #888888;
        }
        
        .extraction-notification.fail .notification-rarity {
            font-size: 11px;
            background: rgba(100, 100, 100, 0.2);
            color: #999999;
        }
        
        .extraction-notification.fail .notification-pity {
            font-size: 12px;
            color: #ffaaaa;
            margin-top: 2px;
        }
        
        .extraction-notification.show {
            transform: translate(-50%, -50%) translateX(0);
            opacity: 1;
        }
        
        .notification-icon {
            font-size: 48px;
            margin-bottom: 5px;
        }
        
        .notification-title {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .notification-resource {
            font-size: 18px;
            font-family: 'Libre Baskerville', serif;
            margin-top: 5px;
            font-weight: 700;
        }
        
        .notification-quantity {
            font-size: 16px;
            font-family: 'Exo 2', sans-serif;
            opacity: 0.9;
        }
        
        .notification-rarity {
            font-size: 14px;
            text-transform: capitalize;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 60px 20px 60px 20px;
            margin-top: 5px;
        }
        
        .notification-pity {
            font-size: 14px;
            color: #ffd700;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .resource-bar {
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 255, 170, 0.3);
            border-radius: 60px 20px 60px 20px;
            padding: 15px;
            margin-top: 280px;
            margin-bottom: 20px;
            width: 100%;
            left: 0;
            right: 0;
            z-index: 20;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .resource-label {
            color: #a0c0ff;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .resource-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding: 3px;
        }
        
        .resource-toggle {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 5px;
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.1s;
            justify-content: space-between;
            font-size: 11px;
            width: 100%;
            position: relative;
            min-width: 0;
        }
        
        .resource-toggle:active {
            transform: scale(0.95);
        }
        
        .resource-toggle.explored::after {
            content: "✓";
            position: absolute;
            top: -5px;
            right: -5px;
            background: #4affaa;
            color: #0a0a1a;
            font-size: 12px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0a0a1a;
            box-shadow: 0 0 10px #4affaa;
            z-index: 5;
        }
        
        .resource-toggle.active {
            opacity: 1;
            filter: none;
            border-color: currentColor;
            background: rgba(30, 45, 70, 0.8);
        }
        
        .resource-toggle.active.rarity-very-rare {
            box-shadow: 0 0 15px #e0b0ff;
        }
        
        .resource-toggle.active.rarity-legendary {
            box-shadow: 0 0 15px #ffd700;
        }
        
        .resource-toggle.active.rarity-common,
        .resource-toggle.active.rarity-uncommon,
        .resource-toggle.active.rarity-rare {
            box-shadow: none;
        }
        
        .resource-toggle:not(.active) {
            opacity: 0.4;
            filter: grayscale(0.9) brightness(0.7);
            border-color: #ff3333 !important;
            box-shadow: 0 0 15px #ff3333, 0 0 5px #ff0000 inset;
            background: rgba(20, 20, 30, 0.9);
        }
        
        .resource-symbol {
            font-size: 12px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            min-width: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .resource-name {
            font-size: 10px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50px;
            min-width: 0;
        }
        
        .resource-chance {
            color: #ffd966;
            font-size: 9px;
            background: rgba(0,0,0,0.3);
            padding: 2px 3px;
            border-radius: 20px;
            min-width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .resource-icon {
            font-size: 10px;
            flex-shrink: 0;
        }
        
        .rarity-common { border-color: #ffffff; color: #ffffff; }
        .rarity-uncommon { border-color: #b0ffb0; color: #b0ffb0; }
        .rarity-rare { border-color: #4169E1; color: #4169E1; }
        .rarity-very-rare { border-color: #e0b0ff; color: #e0b0ff; }
        .rarity-legendary { border-color: #ffd700; color: #ffd700; }
        
        .resource-toggle:not(.active) .resource-symbol,
        .resource-toggle:not(.active) .resource-name {
            color: #aaaaaa !important;
            opacity: 0.7;
        }
        
        .resource-toggle:not(.active) .resource-chance {
            background: rgba(50, 30, 30, 0.5);
            color: #ff9999;
        }
        
        .resource-toggle:not(.active) .resource-icon {
            opacity: 0.5;
        }
        
        .explored-count {
            text-align: center;
            margin-top: 6px;
            color: #4affaa;
            font-size: 10px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .explored-count span {
            background: rgba(74, 255, 170, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
            color: #4affaa;
        }
        
        .active-count {
            text-align: center;
            margin-top: 4px;
            color: #a0c0ff;
            font-size: 9px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <img src="assets/images/fallback/default-surface.jpg" class="planet-canvas" id="planetImage" alt="Planet surface">
            <div class="star-overlay"></div>
            
            <div class="content">
                <div class="status-bar" id="statusBar">
                    <div class="planet-name">
                        <span class="planet-name-main" id="planetName">Loading...</span>
                        <span class="planet-name-type" id="planetType">Loading...</span>
                        <span class="tier-badge" id="planetTierBadge">Tier 1</span>
                    </div>
                    <div class="cargo-display">
                        <span class="cargo-label">CARGO</span>
                        <span class="cargo-value" id="cargoMass"><span>0</span>/5000 AMU</span>
                    </div>
                </div>
                
                <div class="extractor-status">
                    <span class="extractor-pulse"></span>
                    <span id="extractorText">Auto-extractor active</span>
                </div>
                
                <div class="action-buttons" style="position: relative;">
                    <div class="nav-row">
                        <button class="nav-btn system-btn" id="systemBtn" onclick="window.returnToSystem()">🪐 SYSTEM VIEW</button>
                        <button class="nav-btn" id="shipBtn" onclick="window.returnToShip()">🚀 RETURN TO SHIP</button>
                    </div>
                    
                    <button class="claim-btn" id="claimBtn" onclick="window.claimCurrentPlanet()">✨ CLAIM PLANET</button>
                </div>
                
                <div class="resource-bar">
                    <div class="resource-label">⚡ TAP TO TOGGLE EXTRACTION</div>
                    <div class="resource-grid" id="resourceGrid"></div>
                    <div class="explored-count" id="exploredCount">
                        <span id="exploredProgress">0/4</span> ELEMENTS EXPLORED
                    </div>
                    <div class="active-count" id="activeCount">Extracting: 0 resources</div>
                </div>
            </div>
            
            <div class="extraction-notification" id="extractionNotification">
                <div class="notification-icon" id="notificationIcon">✨</div>
                <div class="notification-title" id="notificationTitle">SUCCESS</div>
                <div class="notification-resource" id="notificationResource"></div>
                <div class="notification-quantity" id="notificationQuantity"></div>
                <div class="notification-rarity" id="notificationRarity"></div>
                <div class="notification-pity" id="notificationPity"></div>
            </div>
            
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">processing...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getPlanetStatus, claimPlanet } from './js/planet-status.js';
        import { getAndLoadPlanetImage, EXTERNAL_FALLBACK_URL } from './js/planet-utils.js';
        import { TIERS, TIER_1_ELEMENTS, TIER_2_ELEMENTS, TIER_3_ELEMENTS, TIER_4_ELEMENTS, TIER_5_ELEMENTS } from './js/galaxy-data.js';
        import { getCollection, addElementToCollection, removeElementFromCollection } from './js/storage.js';

        // Expose storage functions to window for non-module code
        window.getCollection = getCollection;
        window.addElementToCollection = addElementToCollection;
        window.removeElementFromCollection = removeElementFromCollection;

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const EXTRACTION_INTERVAL = 5000;
        const CARGO_MASS_LIMIT = 5000;
        
        // Rarity configuration with base chances
        const RARITY_CONFIG = {
            'common': { baseChance: 65, massTarget: 28, variety: 0.6, icon: '⚪', color: '#ffffff', tier: 1 },
            'uncommon': { baseChance: 45, massTarget: 20, variety: 0.5, icon: '🟢', color: '#b0ffb0', tier: 2 },
            'rare': { baseChance: 25, massTarget: 12, variety: 0.4, icon: '🔵', color: '#4169E1', tier: 3 },
            'very-rare': { baseChance: 12, massTarget: 7, variety: 0.3, icon: '🟣', color: '#e0b0ff', tier: 4 },
            'legendary': { baseChance: 4, massTarget: 4, variety: 0.2, icon: '✨', color: '#ffd700', tier: 5 }
        };

        // Pity system thresholds
        const PITY_CONFIG = {
            'common': { threshold: 2 },
            'uncommon': { threshold: 3 },
            'rare': { threshold: 4 },
            'very-rare': { threshold: 9 },
            'legendary': { threshold: 25 }
        };

        // Tier-based rarity boost (higher tier = better chance for rare elements)
        const TIER_RARITY_BOOST = {
            1: { common: 1.0, uncommon: 0.5, rare: 0.2, veryRare: 0.1, legendary: 0.05 },
            2: { common: 0.9, uncommon: 1.0, rare: 0.6, veryRare: 0.3, legendary: 0.1 },
            3: { common: 0.8, uncommon: 0.9, rare: 1.0, veryRare: 0.5, legendary: 0.2 },
            4: { common: 0.6, uncommon: 0.8, rare: 0.9, veryRare: 1.0, legendary: 0.4 },
            5: { common: 0.4, uncommon: 0.6, rare: 0.8, veryRare: 0.9, legendary: 1.0 },
            6: { common: 0.3, uncommon: 0.5, rare: 0.7, veryRare: 0.8, legendary: 1.2 },
            7: { common: 0.2, uncommon: 0.4, rare: 0.6, veryRare: 0.7, legendary: 1.5 },
            8: { common: 0.1, uncommon: 0.3, rare: 0.5, veryRare: 0.6, legendary: 2.0 },
            9: { common: 0.05, uncommon: 0.2, rare: 0.4, veryRare: 0.5, legendary: 3.0 },
            10: { common: 0, uncommon: 0.1, rare: 0.3, veryRare: 0.4, legendary: 5.0 }
        };

        let pityCounters = {};
        let currentPlanetTier = 1;

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const planetImage = document.getElementById('planetImage');
        const planetName = document.getElementById('planetName');
        const planetType = document.getElementById('planetType');
        const planetTierBadge = document.getElementById('planetTierBadge');
        const cargoMass = document.getElementById('cargoMass');
        const resourceGrid = document.getElementById('resourceGrid');
        const activeCount = document.getElementById('activeCount');
        const extractorText = document.getElementById('extractorText');
        const claimBtn = document.getElementById('claimBtn');
        const statusBar = document.getElementById('statusBar');
        
        const extractionNotification = document.getElementById('extractionNotification');
        const notificationIcon = document.getElementById('notificationIcon');
        const notificationTitle = document.getElementById('notificationTitle');
        const notificationResource = document.getElementById('notificationResource');
        const notificationQuantity = document.getElementById('notificationQuantity');
        const notificationRarity = document.getElementById('notificationRarity');
        const notificationPity = document.getElementById('notificationPity');

        let currentPlanet = {
            name: 'Earth',
            type: 'lush',
            typeName: 'Lush',
            resources: [],
            galaxyTier: 1
        };
        
        let resourceStates = {};
        let resourceChances = {};
        let isExtracting = true;
        let extractionTimer = null;
        
        let exploredElements = {};
        let totalElements = 4;
        
        // ===== TIER-BASED RARITY FUNCTION (USING IMPORTED TIER DATA) =====
        function getElementRarity(elementName) {
            if (TIER_1_ELEMENTS.includes(elementName)) return 'common';
            if (TIER_2_ELEMENTS.includes(elementName)) return 'uncommon';
            if (TIER_3_ELEMENTS.includes(elementName)) return 'rare';
            if (TIER_4_ELEMENTS.includes(elementName)) return 'very-rare';
            if (TIER_5_ELEMENTS.includes(elementName)) return 'legendary';
            return 'common';
        }
        
        function getElementRarityChance(elementName) {
            const rarity = getElementRarity(elementName);
            const config = RARITY_CONFIG[rarity] || RARITY_CONFIG['common'];
            const boost = TIER_RARITY_BOOST[currentPlanetTier] || TIER_RARITY_BOOST[1];
            const boostMultiplier = boost[rarity] || 1.0;
            
            let chance = config.baseChance * boostMultiplier;
            chance = Math.min(95, Math.max(1, chance));
            
            return Math.round(chance);
        }

        function initializePityCounters() {
            currentPlanet.resources.forEach(resource => {
                const rarity = getElementRarity(resource);
                pityCounters[resource] = {
                    attempts: 0,
                    threshold: PITY_CONFIG[rarity].threshold
                };
            });
        }

        // ===== PLANET IMAGE LOADING =====
        async function loadPlanetSurfaceImage(planetName, planetType) {
            try {
                loadingText.textContent = 'loading surface view...';
                const result = await getAndLoadPlanetImage(planetName, planetType);
                
                if (result.success) {
                    planetImage.src = result.url;
                    if (result.pathInfo.isGasGiant) {
                        planetImage.classList.add('landscape');
                    } else {
                        planetImage.classList.remove('landscape');
                    }
                    return true;
                } else {
                    planetImage.src = EXTERNAL_FALLBACK_URL;
                    planetImage.classList.remove('landscape');
                    return false;
                }
            } catch (error) {
                console.error('Failed to load planet image:', error);
                planetImage.src = EXTERNAL_FALLBACK_URL;
                planetImage.classList.remove('landscape');
                return false;
            }
        }

        // ===== EXPLORED STATE =====
        function loadExploredState() {
            const saved = localStorage.getItem(`explored_${currentPlanet.name}`);
            if (saved) {
                exploredElements = JSON.parse(saved);
            } else {
                exploredElements = {};
                currentPlanet.resources.forEach(resource => {
                    exploredElements[resource] = false;
                });
            }
            updateExploredCount();
        }

        function saveExploredState() {
            localStorage.setItem(`explored_${currentPlanet.name}`, JSON.stringify(exploredElements));
        }

        // ===== NOTIFICATION SYSTEM =====
        let notificationTimeout = null;

        function showExtractionNotification(result) {
            if (notificationTimeout) clearTimeout(notificationTimeout);
            
            extractionNotification.classList.remove('show', 'success', 'fail', 'rarity-common', 'rarity-uncommon', 'rarity-rare', 'rarity-very-rare', 'rarity-legendary');
            
            if (result.success) {
                extractionNotification.classList.add('success');
                const rarity = getElementRarity(result.resource);
                extractionNotification.classList.add(`rarity-${rarity}`);
                
                notificationIcon.textContent = '✨';
                notificationTitle.textContent = 'SUCCESS';
                const config = RARITY_CONFIG[rarity];
                
                notificationResource.textContent = result.resource;
                notificationQuantity.textContent = `+${result.quantity} units • ${Math.round(result.mass)} AMU`;
                notificationRarity.textContent = `${rarity} • ${config.icon}`;
                notificationPity.textContent = result.wasPity ? '⚡ PITY BONUS! ⚡' : '';
            } else {
                extractionNotification.classList.add('fail');
                notificationIcon.textContent = '⚠️';
                notificationTitle.textContent = 'FAIL';
                
                if (result.resource) {
                    const rarity = getElementRarity(result.resource);
                    notificationResource.textContent = result.resource;
                    notificationQuantity.textContent = `Extraction failed`;
                    notificationRarity.textContent = `${rarity}`;
                    notificationPity.textContent = result.pityCount ? `Pity: ${result.pityCount}/${result.pityThreshold}` : '';
                } else if (result.reason === 'cargo_full') {
                    notificationResource.textContent = 'Cargo Full';
                    notificationQuantity.textContent = '';
                    notificationRarity.textContent = '';
                    notificationPity.textContent = '';
                }
            }
            
            extractionNotification.classList.add('show');
            const hideDelay = result.success ? 2000 : 1500;
            notificationTimeout = setTimeout(() => {
                extractionNotification.classList.remove('show');
            }, hideDelay);
        }

        window.toggleResource = toggleResource;
        window.returnToShip = returnToShip;
        window.returnToSystem = returnToSystem;
        window.claimCurrentPlanet = claimCurrentPlanet;

        function initializeExplorationTracking() {
            totalElements = currentPlanet.resources.length;
            loadExploredState();
        }

        function checkElementExplored(resource) {
            return exploredElements[resource] || false;
        }

        function markElementExplored(resource) {
            if (!exploredElements[resource]) {
                exploredElements[resource] = true;
                saveExploredState();
                updateExploredCount();
                renderResourceToggles();
                
                // DIRECT CHECK - show claim button immediately when all elements are explored
                const allExplored = currentPlanet.resources.every(r => exploredElements[r] === true);
                if (allExplored) {
                    claimBtn.classList.add('visible');
                    claimBtn.disabled = false;
                    claimBtn.textContent = '✨ CLAIM PLANET';
                    showExtractionNotification({
                        success: true,
                        resource: 'All Elements',
                        quantity: 0,
                        mass: 0,
                        wasPity: false
                    });
                }
            }
        }

        function updateExploredCount() {
            const explored = Object.values(exploredElements).filter(v => v).length;
            const exploredProgress = document.getElementById('exploredProgress');
            if (exploredProgress) {
                exploredProgress.textContent = `${explored}/${totalElements}`;
            }
            return explored;
        }

        const elementData = {
            'Hydrogen': { symbol: 'H' }, 'Helium': { symbol: 'He' }, 'Lithium': { symbol: 'Li' },
            'Beryllium': { symbol: 'Be' }, 'Boron': { symbol: 'B' }, 'Sodium': { symbol: 'Na' },
            'Magnesium': { symbol: 'Mg' }, 'Aluminum': { symbol: 'Al' }, 'Silicon': { symbol: 'Si' },
            'Potassium': { symbol: 'K' }, 'Calcium': { symbol: 'Ca' }, 'Scandium': { symbol: 'Sc' },
            'Vanadium': { symbol: 'V' }, 'Manganese': { symbol: 'Mn' }, 'Carbon': { symbol: 'C' },
            'Nitrogen': { symbol: 'N' }, 'Oxygen': { symbol: 'O' }, 'Fluorine': { symbol: 'F' },
            'Neon': { symbol: 'Ne' }, 'Phosphorus': { symbol: 'P' }, 'Sulfur': { symbol: 'S' },
            'Chlorine': { symbol: 'Cl' }, 'Argon': { symbol: 'Ar' }, 'Iron': { symbol: 'Fe' },
            'Nickel': { symbol: 'Ni' }, 'Lead': { symbol: 'Pb' }, 'Copper': { symbol: 'Cu' },
            'Zinc': { symbol: 'Zn' }, 'Silver': { symbol: 'Ag' }, 'Gold': { symbol: 'Au' },
            'Platinum': { symbol: 'Pt' }, 'Titanium': { symbol: 'Ti' }, 'Cobalt': { symbol: 'Co' },
            'Chromium': { symbol: 'Cr' }, 'Tin': { symbol: 'Sn' }, 'Mercury': { symbol: 'Hg' },
            'Uranium': { symbol: 'U' }, 'Thorium': { symbol: 'Th' }, 'Plutonium': { symbol: 'Pu' },
            'Radium': { symbol: 'Ra' }, 'Polonium': { symbol: 'Po' }, 'Promethium': { symbol: 'Pm' },
            'Technetium': { symbol: 'Tc' }, 'Astatine': { symbol: 'At' }, 'Francium': { symbol: 'Fr' },
            'Californium': { symbol: 'Cf' }, 'Einsteinium': { symbol: 'Es' }, 'Fermium': { symbol: 'Fm' },
            'Mendelevium': { symbol: 'Md' }, 'Nobelium': { symbol: 'No' }, 'Lawrencium': { symbol: 'Lr' },
            'Selenium': { symbol: 'Se' }, 'Bismuth': { symbol: 'Bi' }, 'Thallium': { symbol: 'Tl' },
            'Tungsten': { symbol: 'W' }, 'Ruthenium': { symbol: 'Ru' }, 'Rhodium': { symbol: 'Rh' },
            'Palladium': { symbol: 'Pd' }, 'Osmium': { symbol: 'Os' }, 'Iridium': { symbol: 'Ir' },
            'Rhenium': { symbol: 'Re' }, 'Hafnium': { symbol: 'Hf' }
        };

        function getElementSymbol(resource) {
            return elementData[resource]?.symbol || resource.substring(0, 2);
        }

        function getElementMass(elementName) {
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Lithium': 6.94, 'Beryllium': 9.012,
                'Boron': 10.81, 'Sodium': 22.99, 'Magnesium': 24.31, 'Aluminum': 26.98,
                'Silicon': 28.09, 'Potassium': 39.10, 'Calcium': 40.08, 'Scandium': 44.96,
                'Vanadium': 50.94, 'Manganese': 54.94, 'Carbon': 12.01, 'Nitrogen': 14.01,
                'Oxygen': 16.00, 'Fluorine': 19.00, 'Neon': 20.18, 'Phosphorus': 30.97,
                'Sulfur': 32.06, 'Chlorine': 35.45, 'Argon': 39.95, 'Iron': 55.85,
                'Nickel': 58.69, 'Lead': 207.2, 'Copper': 63.55, 'Zinc': 65.38,
                'Silver': 107.9, 'Gold': 197.0, 'Platinum': 195.1, 'Titanium': 47.87,
                'Cobalt': 58.93, 'Chromium': 52.00, 'Tin': 118.7, 'Mercury': 200.6,
                'Uranium': 238.0, 'Thorium': 232.0, 'Plutonium': 244.0, 'Radium': 226.0,
                'Polonium': 209.0, 'Promethium': 145.0, 'Technetium': 98.0,
                'Californium': 251.0, 'Einsteinium': 252.0, 'Fermium': 257.0,
                'Mendelevium': 258.0, 'Nobelium': 259.0, 'Lawrencium': 262.0,
                'Selenium': 78.97, 'Bismuth': 209.0, 'Thallium': 204.4, 'Tungsten': 183.8,
                'Ruthenium': 101.1, 'Rhodium': 102.9, 'Palladium': 106.4, 'Osmium': 190.2,
                'Iridium': 192.2, 'Rhenium': 186.2, 'Hafnium': 178.5,
                'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        async function getFreshCargoMass() {
            try {
                const collection = await getCollection();
                let mass = 0;
                for (const [name, data] of Object.entries(collection)) {
                    mass += (data.count || 1) * getElementMass(name);
                }
                return mass;
            } catch (error) {
                console.error('Error getting fresh cargo mass:', error);
                return 0;
            }
        }

        async function updateCargoDisplay() {
            const mass = await getFreshCargoMass();
            cargoMass.innerHTML = `<span>${Math.round(mass)}</span>/5000 AMU`;
            return mass;
        }

        function generateFallbackResources(planetType) {
            const fallbackPools = {
                'scorched': ['Iron', 'Sulfur', 'Copper', 'Gold'],
                'volcanic': ['Iron', 'Sulfur', 'Copper', 'Gold'],
                'barren': ['Iron', 'Silicon', 'Aluminum', 'Titanium'],
                'lush': ['Carbon', 'Oxygen', 'Hydrogen', 'Silicon'],
                'frozen': ['Hydrogen', 'Helium', 'Oxygen', 'Methane'],
                'ice': ['Hydrogen', 'Helium', 'Oxygen', 'Methane'],
                'gas': ['Hydrogen', 'Helium', 'Methane', 'Ammonia'],
                'oceanic': ['Hydrogen', 'Oxygen', 'Sodium', 'Chlorine'],
                'toxic': ['Sulfur', 'Chlorine', 'Mercury', 'Arsenic'],
                'asteroid': ['Iron', 'Nickel', 'Cobalt', 'Platinum']
            };
            return fallbackPools[planetType] || fallbackPools['barren'];
        }

        async function loadPlanetData() {
            try {
                let planetNameStr = localStorage.getItem('voidfarer_current_planet');
                let planetTypeStr = localStorage.getItem('voidfarer_current_planet_type');
                let planetResources = [];
                let planetTier = parseInt(localStorage.getItem('voidfarer_current_planet_tier')) || 1;
                
                const savedResources = localStorage.getItem('voidfarer_current_planet_resources');
                if (savedResources) {
                    try {
                        planetResources = JSON.parse(savedResources);
                    } catch (e) {}
                }
                
                if (!planetNameStr || !planetTypeStr) {
                    const warpData = localStorage.getItem('voidfarer_warp_data');
                    if (warpData) {
                        try {
                            const data = JSON.parse(warpData);
                            planetNameStr = data.destPlanet || data.destination;
                            planetTypeStr = data.destPlanetType || data.destinationType;
                            planetResources = data.destPlanetResources || [];
                            planetTier = data.destPlanetTier || 1;
                        } catch (e) {}
                    }
                }
                
                if (!planetNameStr) planetNameStr = 'Earth';
                if (!planetTypeStr) planetTypeStr = 'lush';
                
                if (!planetResources || planetResources.length === 0) {
                    planetResources = generateFallbackResources(planetTypeStr);
                }
                
                if (planetResources.length > 4) {
                    planetResources = planetResources.slice(0, 4);
                }
                
                currentPlanetTier = planetTier;
                
                currentPlanet = {
                    name: planetNameStr,
                    type: planetTypeStr,
                    typeName: planetTypeStr.charAt(0).toUpperCase() + planetTypeStr.slice(1),
                    resources: planetResources,
                    galaxyTier: planetTier
                };
                
                planetName.textContent = currentPlanet.name;
                planetType.textContent = currentPlanet.typeName;
                
                const tierInfo = TIERS.find(t => t.tier === currentPlanetTier) || TIERS[0];
                planetTierBadge.textContent = `Tier ${currentPlanetTier} • ${tierInfo?.rarity || 'Common'}`;
                planetTierBadge.style.backgroundColor = tierInfo?.color || '#4affaa';
                
                await loadPlanetSurfaceImage(currentPlanet.name, currentPlanet.type);
                
                currentPlanet.resources.forEach(resource => {
                    resourceStates[resource] = true;
                    const chance = getElementRarityChance(resource);
                    resourceChances[resource] = chance > 0 ? chance : 5;
                });
                
                initializePityCounters();
                initializeExplorationTracking();
                
                await updateClaimButton();
                
                renderResourceToggles();
                await updateCargoDisplay();
                
                return true;
                
            } catch (error) {
                console.error('Error loading planet data:', error);
                return false;
            }
        }

        async function updateClaimButton() {
            try {
                const status = await getPlanetStatus(currentPlanet.name);
                if (status) {
                    if (status.fullyExplored && !status.claimed) {
                        claimBtn.classList.add('visible');
                        claimBtn.disabled = false;
                        claimBtn.textContent = '✨ CLAIM PLANET';
                    } else if (status.claimed) {
                        claimBtn.classList.add('visible');
                        claimBtn.disabled = true;
                        claimBtn.textContent = '✓ CLAIMED';
                    } else {
                        claimBtn.classList.remove('visible');
                    }
                } else {
                    claimBtn.classList.remove('visible');
                }
            } catch (error) {}
        }

        function renderResourceToggles() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) {
                resourceGrid.innerHTML = '<div style="color: #a0c0ff; padding: 20px;">No resources found</div>';
                return;
            }
            
            let html = '';
            currentPlanet.resources.forEach(resource => {
                const rarity = getElementRarity(resource);
                const config = RARITY_CONFIG[rarity] || RARITY_CONFIG['common'];
                const symbol = getElementSymbol(resource);
                const chance = resourceChances[resource] || config.baseChance;
                const isActive = resourceStates[resource];
                const isExplored = checkElementExplored(resource);
                
                html += `
                    <div class="resource-toggle rarity-${rarity} ${isActive ? 'active' : ''} ${isExplored ? 'explored' : ''}" 
                         onclick="window.toggleResource('${resource}')"
                         title="Chance: ${chance}%">
                        <span class="resource-symbol">${symbol}</span>
                        <span class="resource-name">${resource}</span>
                        <span class="resource-chance">${chance}%</span>
                        <span class="resource-icon">${config.icon}</span>
                    </div>
                `;
            });
            
            resourceGrid.innerHTML = html;
            updateActiveCount();
        }

        function toggleResource(resource) {
            resourceStates[resource] = !resourceStates[resource];
            renderResourceToggles();
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch (e) {}
            }
        }

        function updateActiveCount() {
            const activeResources = Object.values(resourceStates).filter(v => v).length;
            activeCount.textContent = `Extracting: ${activeResources} resource${activeResources !== 1 ? 's' : ''}`;
        }

        async function attemptExtraction() {
            if (!isExtracting) return;
            
            try {
                const currentMass = await getFreshCargoMass();
                const cargoLimit = CARGO_MASS_LIMIT;
                
                if (currentMass >= cargoLimit) {
                    isExtracting = false;
                    extractorText.textContent = 'Cargo full - extraction paused';
                    if (extractionTimer) {
                        clearInterval(extractionTimer);
                        extractionTimer = null;
                    }
                    showExtractionNotification({ success: false, resource: null, reason: 'cargo_full' });
                    return;
                }
                
                const activeResources = currentPlanet.resources.filter(r => resourceStates[r]);
                if (activeResources.length === 0) {
                    extractorText.textContent = 'No resources selected';
                    return;
                } else {
                    extractorText.textContent = 'Auto-extractor active';
                }
                
                const resource = activeResources[Math.floor(Math.random() * activeResources.length)];
                const rarity = getElementRarity(resource);
                const config = RARITY_CONFIG[rarity] || RARITY_CONFIG['common'];
                const massPerUnit = getElementMass(resource);
                
                if (!pityCounters[resource]) {
                    pityCounters[resource] = {
                        attempts: 0,
                        threshold: PITY_CONFIG[rarity].threshold
                    };
                }
                
                pityCounters[resource].attempts++;
                
                let wasPity = false;
                let success = false;
                
                if (pityCounters[resource].attempts >= pityCounters[resource].threshold) {
                    wasPity = true;
                    success = true;
                } else {
                    let roll = Math.random() * 100;
                    const chance = resourceChances[resource] || config.baseChance;
                    success = roll < chance;
                }
                
                if (success) {
                    pityCounters[resource].attempts = 0;
                    
                    let baseQuantity = Math.ceil(config.massTarget / massPerUnit);
                    baseQuantity = Math.max(1, baseQuantity);
                    const varietyFactor = 0.7 + (Math.random() * 0.6);
                    let quantity = Math.floor(baseQuantity * varietyFactor);
                    quantity = Math.max(1, quantity);
                    if (wasPity) quantity = Math.floor(quantity * 1.5);
                    
                    const totalMass = massPerUnit * quantity;
                    
                    if (currentMass + totalMass <= cargoLimit) {
                        const locationData = {
                            planet: currentPlanet.name,
                            planetType: currentPlanet.type,
                            galaxyTier: currentPlanetTier,
                            quantity: quantity,
                            rarity: rarity,
                            timestamp: Date.now(),
                            discoveredDate: new Date().toISOString(),
                            value: RARITY_CONFIG[rarity]?.basePrice || 100
                        };
                        
                        const result = await addElementToCollection(resource, quantity, locationData);
                        
                        if (result && result.success) {
                            const currentDisplay = cargoMass.innerHTML;
                            const match = currentDisplay.match(/<span>(\d+)<\/span>/);
                            const currentMassValue = match ? parseInt(match[1]) : 0;
                            const newMass = currentMassValue + totalMass;
                            cargoMass.innerHTML = `<span>${Math.round(newMass)}</span>/5000 AMU`;
                            
                            statusBar.classList.add('flash');
                            setTimeout(() => statusBar.classList.remove('flash'), 500);
                            
                            window.dispatchEvent(new CustomEvent('cargo-updated', { detail: { element: resource, quantity, mass: totalMass } }));
                            markElementExplored(resource);
                            
                            showExtractionNotification({
                                success: true,
                                resource: resource,
                                quantity: quantity,
                                mass: totalMass,
                                wasPity: wasPity
                            });
                            
                            await updateClaimButton();
                        }
                    } else {
                        showExtractionNotification({
                            success: false,
                            resource: resource,
                            reason: 'cargo_full',
                            pityCount: pityCounters[resource].attempts,
                            pityThreshold: pityCounters[resource].threshold
                        });
                    }
                } else {
                    showExtractionNotification({
                        success: false,
                        resource: resource,
                        pityCount: pityCounters[resource].attempts,
                        pityThreshold: pityCounters[resource].threshold,
                        reason: 'failed_roll'
                    });
                }
            } catch (error) {
                console.error('Extraction error:', error);
            }
        }

        function startExtraction() {
            if (extractionTimer) {
                clearInterval(extractionTimer);
                extractionTimer = null;
            }
            
            isExtracting = true;
            extractorText.textContent = 'Auto-extractor active';
            attemptExtraction();
            extractionTimer = setInterval(() => {
                if (isExtracting) attemptExtraction();
            }, EXTRACTION_INTERVAL);
        }

        function returnToShip() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if (extractionTimer) clearInterval(extractionTimer);
            window.location.href = 'ship-bridge.html';
        }

        function returnToSystem() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            if (extractionTimer) clearInterval(extractionTimer);
            window.location.href = 'system-view.html';
        }

        async function claimCurrentPlanet() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'claiming planet...';
                
                const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
                const playerName = localStorage.getItem('voidfarer_player_name') || 'Voidfarer';
                const discoveryElement = currentPlanet.resources[0] || 'Unknown';
                const discoveryRarity = getElementRarity(discoveryElement) || 'common';
                
                const success = await claimPlanet(currentPlanet.name, playerId, playerName, discoveryElement, discoveryRarity);
                
                if (success) {
                    showExtractionNotification({ success: true, resource: 'Planet', quantity: 0, mass: 0, wasPity: false });
                    await updateClaimButton();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    showExtractionNotification({ success: false, resource: null, reason: 'claim_failed' });
                }
            } catch (error) {
                console.error('Claim error:', error);
                showExtractionNotification({ success: false, resource: null, reason: 'error' });
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'landing on surface...';
                
                const planetLoaded = await loadPlanetData();
                if (!planetLoaded) throw new Error('Failed to load planet data');
                
                startExtraction();
                setTimeout(() => loadingOverlay.classList.remove('active'), 500);
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error landing';
                setTimeout(() => loadingOverlay.classList.remove('active'), 2000);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (extractionTimer) clearInterval(extractionTimer);
        });

        init();
    </script>
</body>
