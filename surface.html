<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a1a0a, #1a2a3a);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a9a8a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #4a9a8a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .surface-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .surface-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #4a9a8a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .surface-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .planet-name {
            font-size: 14px;
            color: #a0d0c0;
            text-align: right;
        }
        
        /* Resource Display */
        .resource-card {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .resource-icon {
            font-size: 64px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px #4a9a8a);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .resource-name {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .resource-quantity {
            font-size: 18px;
            color: #ffd966;
            margin-bottom: 15px;
        }
        
        .resource-progress {
            margin: 15px 0;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9a8a, #7ac0b0);
            transition: width 0.3s;
        }
        
        .progress-text {
            color: #a0d0c0;
            font-size: 12px;
        }
        
        /* Extract Button */
        .extract-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a9a8a, #2a7a6a);
            border: 2px solid #7ac0b0;
            color: #ffffff;
            padding: 20px;
            border-radius: 60px 20px 60px 20px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            margin-bottom: 20px;
            box-shadow: 0 0 30px #2a5a4a;
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px #2a5a4a; }
            50% { box-shadow: 0 0 40px #4a9a8a; }
            100% { box-shadow: 0 0 20px #2a5a4a; }
        }
        
        .extract-btn:active {
            transform: scale(0.97);
            background: #2a7a6a;
        }
        
        .extract-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            animation: none;
        }
        
        /* Center Toast Notification - KEPT (slides right to left) */
        .toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .toast {
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #4affaa;
            border-radius: 60px 20px 60px 20px;
            padding: 15px 25px;
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            text-align: center;
            box-shadow: 0 0 30px #4affaa;
            width: 100%;
            animation: slideInRight 0.3s ease-out, fadeOut 0.3s ease-in 1.7s forwards;
            transform-origin: center;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.8);
            }
        }
        
        /* Toggle Auto-Gather - UPDATED: removed sticky padding, placed below toast */
        .toggle-container {
            background: rgba(30, 60, 70, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffaa4a;
            border-radius: 40px 10px 40px 10px;
            margin: 10px auto 20px auto;
            width: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .toggle-container:active {
            transform: scale(0.98);
            background: rgba(50, 80, 90, 0.9);
        }
        
        .toggle-icon {
            font-size: 18px;
            padding: 8px 12px;
            background: rgba(255, 170, 74, 0.2);
            border-radius: 40px 5px 40px 5px;
            color: #ffaa4a;
        }
        
        .toggle-text {
            padding: 8px 15px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .toggle-status {
            padding: 8px 15px;
            background: rgba(74, 255, 170, 0.2);
            border-radius: 40px 5px 40px 5px;
            color: #4affaa;
            font-size: 14px;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }
        
        .toggle-status.active {
            background: #4affaa;
            color: #0a1a2a;
        }
        
        /* Recent Finds */
        .recent-finds {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .recent-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            font-family: 'Exo 2', sans-serif;
            border-bottom: 1px solid #4a9a8a;
            padding-bottom: 8px;
        }
        
        .finds-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .find-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(74, 154, 138, 0.3);
        }
        
        .find-item:last-child {
            border-bottom: none;
        }
        
        .find-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .find-icon {
            font-size: 20px;
        }
        
        .find-name {
            color: #ffffff;
            font-size: 14px;
        }
        
        .find-quantity {
            color: #ffd966;
            font-size: 14px;
            font-weight: 600;
        }
        
        /* Back button */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <!-- Header -->
            <div class="surface-header">
                <div class="surface-title">Surface</div>
                <div class="surface-subtitle" id="planetTypeDisplay">✦ unknown world ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="planet-name" id="planetNameDisplay">Loading...</div>
            </div>
            
            <!-- Resource Card -->
            <div class="resource-card" id="resourceCard">
                <div class="resource-icon" id="resourceIcon">🪨</div>
                <div class="resource-name" id="resourceName">Loading...</div>
                <div class="resource-quantity" id="resourceQuantity">0 in cargo</div>
                
                <div class="resource-progress">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="resourceProgress" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="resourceProgressText">0/0 AMU</div>
                </div>
                
                <button class="extract-btn" id="extractBtn" onclick="window.extractResource()">⛏️ EXTRACT</button>
            </div>
            
            <!-- Toast Container for Notifications (KEPT - slides right to left) -->
            <div class="toast-container" id="toastContainer"></div>
            
            <!-- Toggle Auto-Gather (UPDATED: removed sticky padding, placed below toast) -->
            <div class="toggle-container" id="autoGatherToggle" onclick="window.toggleAutoGather()">
                <span class="toggle-icon">⚙️</span>
                <span class="toggle-text">Auto-Gather</span>
                <span class="toggle-status" id="autoGatherStatus">OFF</span>
            </div>
            
            <!-- Recent Finds -->
            <div class="recent-finds">
                <div class="recent-title">📋 Recent Extractions</div>
                <div class="finds-list" id="recentFindsList">
                    <div class="find-item">
                        <span style="color:#a0d0c0; text-align:center; width:100%;">No extractions yet</span>
                    </div>
                </div>
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToShip()">
                <span class="back-arrow">←</span>
                <span class="back-text">SHIP BRIDGE</span>
                <span class="back-icon">🚀</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">exploring surface...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- Load all JavaScript files -->
    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>

    <script>
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const toastContainer = document.getElementById('toastContainer');
        const recentFindsList = document.getElementById('recentFindsList');
        const extractBtn = document.getElementById('extractBtn');
        const autoGatherStatus = document.getElementById('autoGatherStatus');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToShip = returnToShip;
        window.extractResource = extractResource;
        window.toggleAutoGather = toggleAutoGather;

        // ===== STATE =====
        let currentPlanet = 'Unknown';
        let planetType = 'unknown';
        let resources = [];
        let currentResourceIndex = 0;
        let autoGatherEnabled = false;
        let autoGatherInterval = null;
        let recentFinds = [];

        // ===== PLANET TYPE DATA =====
        const planetTypeData = {
            'scorched': {
                name: 'Scorched World',
                icon: '🔥',
                color: '#ff6b6b',
                bgImage: 'pyros-surface.jpg',
                resourceIcons: {
                    'Iron': '⚙️', 'Copper': '🔴', 'Sulfur': '🟡', 'Uranium': '☢️',
                    'Lead': '⚖️', 'Mercury': '💧', 'Tungsten': '⚙️'
                }
            },
            'barren': {
                name: 'Barren World',
                icon: '🪨',
                color: '#8a8a8a',
                bgImage: 'barren-surface.jpg',
                resourceIcons: {
                    'Iron': '⚙️', 'Silicon': '💻', 'Aluminum': '🥫', 'Nickel': '🔩',
                    'Cobalt': '🔵', 'Titanium': '🔷', 'Magnesium': '✨'
                }
            },
            'lush': {
                name: 'Lush World',
                icon: '🌱',
                color: '#6bff6b',
                bgImage: 'verdant-surface.jpg',
                resourceIcons: {
                    'Carbon': '⚫', 'Oxygen': '💨', 'Hydrogen': '💧', 'Nitrogen': '🌬️',
                    'Calcium': '🥛', 'Potassium': '🍌', 'Phosphorus': '✨'
                }
            },
            'frozen': {
                name: 'Frozen World',
                icon: '❄️',
                color: '#6bd6ff',
                bgImage: 'glacier-surface.jpg',
                resourceIcons: {
                    'Water': '💧', 'Methane': '🔥', 'Ammonia': '⚗️', 'Nitrogen': '🌬️',
                    'Helium': '🎈', 'Hydrogen': '💧', 'Oxygen': '💨'
                }
            },
            'gas': {
                name: 'Gas Giant',
                icon: '🌪️',
                color: '#d4a373',
                bgImage: 'gas-surface.jpg',
                resourceIcons: {
                    'Hydrogen': '💧', 'Helium': '🎈', 'Methane': '🔥', 'Ammonia': '⚗️',
                    'Nitrogen': '🌬️', 'Neon': '💡', 'Argon': '🎈'
                }
            },
            'oceanic': {
                name: 'Ocean World',
                icon: '💧',
                color: '#4a9aff',
                bgImage: 'oceanic-surface.jpg',
                resourceIcons: {
                    'Water': '💧', 'Salt': '🧂', 'Sodium': '🧂', 'Chlorine': '🧪',
                    'Magnesium': '✨', 'Calcium': '🥛', 'Potassium': '🍌'
                }
            },
            'toxic': {
                name: 'Toxic World',
                icon: '☣️',
                color: '#9a4aff',
                bgImage: 'toxic-surface.jpg',
                resourceIcons: {
                    'Sulfur': '🟡', 'Chlorine': '🧪', 'Mercury': '💧', 'Lead': '⚖️',
                    'Arsenic': '☠️', 'Cadmium': '🔩', 'Fluorine': '🧪'
                }
            },
            'asteroid': {
                name: 'Asteroid Field',
                icon: '🪐',
                color: '#b0a090',
                bgImage: 'asteroid-field.jpg',
                resourceIcons: {
                    'Iron': '⚙️', 'Nickel': '🔩', 'Cobalt': '🔵', 'Platinum': '⬜',
                    'Gold': '🟡', 'Silver': '⚪', 'Titanium': '🔷'
                }
            }
        };

        // ===== LOAD PLANET DATA =====
        function loadPlanetData() {
            // Get planet data from warp destination or current planet
            const destPlanet = localStorage.getItem('voidfarer_warp_destination_planet');
            const destPlanetType = localStorage.getItem('voidfarer_warp_destination_planet_type');
            
            if (destPlanet && destPlanetType) {
                currentPlanet = destPlanet;
                planetType = destPlanetType;
                
                // Clear destination after loading
                localStorage.removeItem('voidfarer_warp_destination_planet');
                localStorage.removeItem('voidfarer_warp_destination_planet_type');
            } else {
                // Fallback to current planet
                currentPlanet = localStorage.getItem('voidfarer_current_planet') || 'Unknown';
                planetType = localStorage.getItem('voidfarer_current_planet_type') || 'unknown';
            }
            
            // Get resources for this planet
            const resourcesStr = localStorage.getItem('voidfarer_current_planet_resources');
            if (resourcesStr) {
                resources = JSON.parse(resourcesStr);
            } else {
                // Default resources based on planet type
                if (planetType === 'lush') resources = ['Carbon', 'Oxygen', 'Hydrogen', 'Nitrogen'];
                else if (planetType === 'scorched') resources = ['Iron', 'Copper', 'Sulfur', 'Lead'];
                else if (planetType === 'frozen') resources = ['Water', 'Methane', 'Ammonia', 'Nitrogen'];
                else if (planetType === 'gas') resources = ['Hydrogen', 'Helium', 'Methane', 'Ammonia'];
                else if (planetType === 'oceanic') resources = ['Water', 'Salt', 'Sodium', 'Magnesium'];
                else if (planetType === 'toxic') resources = ['Sulfur', 'Chlorine', 'Mercury', 'Lead'];
                else if (planetType === 'asteroid') resources = ['Iron', 'Nickel', 'Cobalt', 'Platinum'];
                else resources = ['Iron', 'Silicon', 'Aluminum', 'Nickel'];
            }
            
            // Update display
            document.getElementById('planetNameDisplay').textContent = currentPlanet;
            
            const typeData = planetTypeData[planetType] || planetTypeData['barren'];
            document.getElementById('planetTypeDisplay').textContent = '✦ ' + typeData.name + ' ✦';
            
            // Update background if needed
            document.querySelector('.surface-view').style.background = 
                `linear-gradient(135deg, #2a1a0a, #1a2a3a)`;
            
            // Set first resource
            currentResourceIndex = 0;
            updateResourceDisplay();
        }

        // ===== UPDATE RESOURCE DISPLAY =====
        async function updateResourceDisplay() {
            if (resources.length === 0) return;
            
            const resource = resources[currentResourceIndex];
            const typeData = planetTypeData[planetType] || planetTypeData['barren'];
            const icon = typeData.resourceIcons[resource] || '🔹';
            
            document.getElementById('resourceIcon').textContent = icon;
            document.getElementById('resourceName').textContent = resource;
            
            // Get current quantity from cargo
            let collection = {};
            if (typeof window.getCollection === 'function') {
                collection = await window.getCollection();
            } else {
                collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
            }
            
            const quantity = collection[resource]?.count || 0;
            document.getElementById('resourceQuantity').textContent = quantity + ' in cargo';
            
            // Update cargo mass progress
            const totalMass = await getTotalCargoMass();
            const massLimit = 5000;
            const percent = (totalMass / massLimit) * 100;
            document.getElementById('resourceProgress').style.width = Math.min(100, percent) + '%';
            document.getElementById('resourceProgressText').textContent = 
                `${totalMass.toFixed(1)}/${massLimit} AMU`;
        }

        // ===== GET TOTAL CARGO MASS (FIXED - NO RECURSION) =====
        async function getTotalCargoMass() {
            // Use the global function from storage.js if available AND it's not this same function
            if (typeof window.getTotalCargoMass === 'function' && window.getTotalCargoMass !== getTotalCargoMass) {
                return await window.getTotalCargoMass();
            }
            
            // Fallback to localStorage
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
            let total = 0;
            for (const [name, data] of Object.entries(collection)) {
                const count = data.count || 1;
                total += count * getElementMass(name);
            }
            return total;
        }

        // ===== GET ELEMENT MASS =====
        function getElementMass(elementName) {
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Carbon': 12.01, 'Nitrogen': 14.01,
                'Oxygen': 16.00, 'Sodium': 22.99, 'Magnesium': 24.31, 'Aluminum': 26.98,
                'Silicon': 28.09, 'Phosphorus': 30.97, 'Sulfur': 32.06, 'Chlorine': 35.45,
                'Potassium': 39.10, 'Calcium': 40.08, 'Iron': 55.85, 'Copper': 63.55,
                'Zinc': 65.38, 'Silver': 107.9, 'Gold': 197.0, 'Platinum': 195.1,
                'Titanium': 47.87, 'Nickel': 58.69, 'Cobalt': 58.93, 'Lead': 207.2,
                'Mercury': 200.6, 'Uranium': 238.0, 'Thorium': 232.0, 'Plutonium': 244.0,
                'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        // ===== SHOW TOAST NOTIFICATION (KEPT - slides right to left) =====
        function showToast(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, duration);
        }

        // ===== EXTRACT RESOURCE =====
        async function extractResource() {
            if (resources.length === 0) return;
            
            const resource = resources[currentResourceIndex];
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = `extracting ${resource}...`;
            
            try {
                // Generate random quantity (1-5)
                const quantity = Math.floor(Math.random() * 5) + 1;
                
                // Add to collection
                const locationData = {
                    fromPlanet: true,
                    planet: currentPlanet,
                    planetType: planetType
                };
                
                let result;
                if (typeof window.addElementToCollection === 'function') {
                    result = await window.addElementToCollection(resource, quantity, locationData);
                } else {
                    // Fallback to localStorage
                    const collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
                    if (collection[resource]) {
                        if (typeof collection[resource] === 'object') {
                            collection[resource].count = (collection[resource].count || 0) + quantity;
                        } else {
                            collection[resource] = collection[resource] + quantity;
                        }
                    } else {
                        collection[resource] = { count: quantity };
                    }
                    localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                    result = { success: true };
                }
                
                if (result && result.success) {
                    // Show toast notification (KEPT)
                    showToast(`+${quantity} ${resource}`);
                    
                    // Add to recent finds
                    addToRecentFinds(resource, quantity);
                    
                    // Cycle to next resource
                    currentResourceIndex = (currentResourceIndex + 1) % resources.length;
                    
                    // Update display
                    await updateResourceDisplay();
                    
                    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                } else {
                    alert('Failed to extract resource: ' + (result?.reason || 'Unknown error'));
                }
                
            } catch (error) {
                console.error('Extraction error:', error);
                alert('Error during extraction');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== ADD TO RECENT FINDS =====
        function addToRecentFinds(resource, quantity) {
            const typeData = planetTypeData[planetType] || planetTypeData['barren'];
            const icon = typeData.resourceIcons[resource] || '🔹';
            
            recentFinds.unshift({
                name: resource,
                quantity: quantity,
                icon: icon,
                timestamp: Date.now()
            });
            
            // Keep only last 5
            if (recentFinds.length > 5) {
                recentFinds.pop();
            }
            
            // Update display
            let html = '';
            recentFinds.forEach(find => {
                html += `
                    <div class="find-item">
                        <div class="find-info">
                            <span class="find-icon">${find.icon}</span>
                            <span class="find-name">${find.name}</span>
                        </div>
                        <span class="find-quantity">+${find.quantity}</span>
                    </div>
                `;
            });
            
            recentFindsList.innerHTML = html;
        }

        // ===== TOGGLE AUTO-GATHER =====
        function toggleAutoGather() {
            autoGatherEnabled = !autoGatherEnabled;
            
            if (autoGatherEnabled) {
                autoGatherStatus.textContent = 'ON';
                autoGatherStatus.classList.add('active');
                
                // Start auto-gather interval (every 3 seconds)
                if (autoGatherInterval) clearInterval(autoGatherInterval);
                autoGatherInterval = setInterval(() => {
                    extractResource();
                }, 3000);
                
                showToast('Auto-Gather ENABLED');
            } else {
                autoGatherStatus.textContent = 'OFF';
                autoGatherStatus.classList.remove('active');
                
                if (autoGatherInterval) {
                    clearInterval(autoGatherInterval);
                    autoGatherInterval = null;
                }
                
                showToast('Auto-Gather DISABLED');
            }
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== RETURN TO SHIP =====
        function returnToShip() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Clear any auto-gather
            if (autoGatherInterval) {
                clearInterval(autoGatherInterval);
                autoGatherInterval = null;
            }
            
            window.location.href = 'ship-bridge.html';
        }

        // ===== LOAD CREDITS =====
        async function loadCredits() {
            let credits = 5000;
            if (typeof window.getCredits === 'function') {
                credits = await window.getCredits();
            } else {
                credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
            }
            document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'descending to surface...';
                
                // Load planet data
                loadPlanetData();
                
                // Load credits
                await loadCredits();
                
                // Update resource display
                await updateResourceDisplay();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                    
                    // Welcome toast
                    setTimeout(() => {
                        showToast(`Welcome to ${currentPlanet}`);
                    }, 500);
                }, 1000);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - returning to ship...';
                setTimeout(() => {
                    window.location.href = 'ship-bridge.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
