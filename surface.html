<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Planetary Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ... (keep all existing styles the same) ... */
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view" id="surfaceView">
            <img src="assets/images/earth-view.jpg" class="planet-canvas" id="planetImage" alt="Planet surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            <div class="star-overlay"></div>
            
            <div class="status-bar">
                <div class="planet-name">
                    <span class="planet-name-main" id="planetName">Loading...</span>
                    <span class="planet-name-type" id="planetType">Loading...</span>
                </div>
                <div class="cargo-display">
                    <span class="cargo-label">CARGO</span>
                    <span class="cargo-value" id="cargoMass"><span>0</span>/5000 AMU</span>
                </div>
            </div>
            
            <div class="top-controls">
                <div class="extractor-status" id="extractorStatus">
                    <span class="extractor-pulse"></span>
                    <span id="extractorText">Auto-extractor active</span>
                </div>
                <div class="return-button" onclick="returnToShip()" id="returnButton">
                    RETURN TO SHIP
                </div>
            </div>
            
            <div class="toast-container" id="toastContainer"></div>
            
            <div class="resource-bar">
                <div class="resource-label">⚡ TAP TO TOGGLE EXTRACTION</div>
                <div class="resource-grid" id="resourceGrid"></div>
                <div class="active-count" id="activeCount">Extracting: 0 resources</div>
            </div>
            
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">landing on surface...</div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>

    <script>
        const { openDB } = idb;
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const CARGO_MASS_LIMIT = 5000;
        const EXTRACTION_INTERVAL = 5000; // 5 seconds
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const planetImage = document.getElementById('planetImage');
        const planetName = document.getElementById('planetName');
        const planetType = document.getElementById('planetType');
        const cargoMass = document.getElementById('cargoMass');
        const resourceGrid = document.getElementById('resourceGrid');
        const activeCount = document.getElementById('activeCount');
        const toastContainer = document.getElementById('toastContainer');
        const extractorText = document.getElementById('extractorText');

        let currentPlanet = {
            name: 'Earth',
            type: 'lush',
            typeName: 'Lush',
            resources: []
        };
        
        let resourceStates = {};
        let resourceChances = {};
        let isExtracting = true;
        let extractionTimer = null;
        let isExtractionInProgress = false;
        
        const elementData = {
            'Hydrogen': { symbol: 'H', rarity: 'common' },
            'Helium': { symbol: 'He', rarity: 'common' },
            'Lithium': { symbol: 'Li', rarity: 'common' },
            'Beryllium': { symbol: 'Be', rarity: 'common' },
            'Boron': { symbol: 'B', rarity: 'common' },
            'Sodium': { symbol: 'Na', rarity: 'common' },
            'Magnesium': { symbol: 'Mg', rarity: 'common' },
            'Aluminum': { symbol: 'Al', rarity: 'common' },
            'Silicon': { symbol: 'Si', rarity: 'common' },
            'Potassium': { symbol: 'K', rarity: 'common' },
            'Calcium': { symbol: 'Ca', rarity: 'common' },
            'Carbon': { symbol: 'C', rarity: 'uncommon' },
            'Nitrogen': { symbol: 'N', rarity: 'uncommon' },
            'Oxygen': { symbol: 'O', rarity: 'uncommon' },
            'Fluorine': { symbol: 'F', rarity: 'uncommon' },
            'Neon': { symbol: 'Ne', rarity: 'uncommon' },
            'Phosphorus': { symbol: 'P', rarity: 'uncommon' },
            'Sulfur': { symbol: 'S', rarity: 'uncommon' },
            'Chlorine': { symbol: 'Cl', rarity: 'uncommon' },
            'Argon': { symbol: 'Ar', rarity: 'uncommon' },
            'Iron': { symbol: 'Fe', rarity: 'uncommon' },
            'Nickel': { symbol: 'Ni', rarity: 'uncommon' },
            'Copper': { symbol: 'Cu', rarity: 'rare' },
            'Zinc': { symbol: 'Zn', rarity: 'rare' },
            'Silver': { symbol: 'Ag', rarity: 'rare' },
            'Gold': { symbol: 'Au', rarity: 'rare' },
            'Platinum': { symbol: 'Pt', rarity: 'rare' },
            'Titanium': { symbol: 'Ti', rarity: 'rare' },
            'Uranium': { symbol: 'U', rarity: 'very-rare' },
            'Thorium': { symbol: 'Th', rarity: 'very-rare' },
            'Plutonium': { symbol: 'Pu', rarity: 'very-rare' },
            'Promethium': { symbol: 'Pm', rarity: 'legendary' }
        };

        function calculateResourceChance(resource) {
            if (['Iron', 'Carbon', 'Oxygen', 'Silicon', 'Hydrogen'].includes(resource)) {
                return Math.floor(Math.random() * 20) + 80;
            } else if (['Gold', 'Silver', 'Platinum', 'Titanium'].includes(resource)) {
                return Math.floor(Math.random() * 30) + 50;
            } else if (['Uranium', 'Thorium'].includes(resource)) {
                return Math.floor(Math.random() * 30) + 20;
            } else if (['Promethium'].includes(resource)) {
                return Math.floor(Math.random() * 15) + 5;
            }
            return 70;
        }

        function getRarityClass(resource) {
            const rarity = elementData[resource]?.rarity || 'common';
            return `rarity-${rarity}`;
        }

        function getElementSymbol(resource) {
            return elementData[resource]?.symbol || resource.substring(0, 2);
        }

        function getElementMass(elementName) {
            if (typeof window.getElementMass === 'function') {
                return window.getElementMass(elementName);
            }
            const masses = {
                'Iron': 55.85, 'Gold': 197.0, 'Silver': 107.9, 'Platinum': 195.1,
                'Carbon': 12.01, 'Oxygen': 16.00, 'Hydrogen': 1.008, 'Uranium': 238.0,
                'Titanium': 47.87, 'Copper': 63.55, 'Aluminum': 26.98, 'Silicon': 28.09,
                'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        async function getCurrentCargoMass() {
            try {
                const collection = await window.getCollection();
                let mass = 0;
                for (const [name, data] of Object.entries(collection)) {
                    mass += (data.count || 1) * getElementMass(name);
                }
                return mass;
            } catch (error) {
                console.error('Error getting cargo mass:', error);
                return 0;
            }
        }

        async function updateCargoDisplay() {
            const mass = await getCurrentCargoMass();
            cargoMass.innerHTML = `<span>${Math.round(mass)}</span>/5000 AMU`;
            return mass;
        }

        async function loadPlanetData() {
            try {
                const planetNameStr = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                const planetTypeStr = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
                
                let planetResources = [];
                const savedResources = localStorage.getItem('voidfarer_current_planet_resources');
                
                if (savedResources) {
                    try {
                        planetResources = JSON.parse(savedResources);
                    } catch (e) {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                } else {
                    if (planetTypeStr.includes('lush')) {
                        planetResources = ['Carbon', 'Oxygen', 'Iron', 'Silicon', 'Hydrogen'];
                    } else if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                        planetResources = ['Iron', 'Sulfur', 'Copper', 'Gold', 'Uranium'];
                    } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                        planetResources = ['Hydrogen', 'Helium', 'Oxygen', 'Carbon'];
                    } else if (planetTypeStr.includes('barren')) {
                        planetResources = ['Iron', 'Silicon', 'Aluminum', 'Titanium'];
                    } else {
                        planetResources = ['Iron', 'Carbon', 'Silicon', 'Oxygen'];
                    }
                }
                
                let imageFile = 'earth-view.jpg';
                if (planetTypeStr.includes('scorched') || planetTypeStr.includes('volcanic')) {
                    imageFile = 'pyros-surface.jpg';
                } else if (planetTypeStr.includes('frozen') || planetTypeStr.includes('ice')) {
                    imageFile = 'glacier-surface.jpg';
                } else if (planetTypeStr.includes('lush')) {
                    imageFile = 'verdant-surface.jpg';
                } else if (planetTypeStr.includes('barren')) {
                    imageFile = 'barren-surface.jpg';
                }
                
                planetImage.src = 'assets/images/' + imageFile;
                planetImage.onerror = function() {
                    this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
                };
                
                currentPlanet = {
                    name: planetNameStr,
                    type: planetTypeStr,
                    typeName: planetTypeStr.charAt(0).toUpperCase() + planetTypeStr.slice(1),
                    resources: planetResources
                };
                
                planetName.textContent = currentPlanet.name;
                planetType.textContent = currentPlanet.typeName;
                
                currentPlanet.resources.forEach(resource => {
                    resourceStates[resource] = true;
                    resourceChances[resource] = calculateResourceChance(resource);
                });
                
                renderResourceToggles();
                await updateCargoDisplay();
                
                return true;
                
            } catch (error) {
                console.error('Error loading planet data:', error);
                return false;
            }
        }

        function renderResourceToggles() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) {
                resourceGrid.innerHTML = '<div style="color: #a0c0ff; padding: 20px;">No resources found</div>';
                return;
            }
            
            let html = '';
            currentPlanet.resources.forEach(resource => {
                const symbol = getElementSymbol(resource);
                const chance = resourceChances[resource] || 70;
                const isActive = resourceStates[resource];
                const rarityClass = getRarityClass(resource);
                
                html += `
                    <div class="resource-toggle ${rarityClass} ${isActive ? 'active' : ''}" onclick="toggleResource('${resource}')">
                        <span class="resource-symbol">${symbol}</span>
                        <span class="resource-name">${resource}</span>
                        <span class="resource-chance">${chance}%</span>
                    </div>
                `;
            });
            
            resourceGrid.innerHTML = html;
            updateActiveCount();
        }

        window.toggleResource = function(resource) {
            resourceStates[resource] = !resourceStates[resource];
            renderResourceToggles();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        function updateActiveCount() {
            const activeResources = Object.values(resourceStates).filter(v => v).length;
            activeCount.textContent = `Extracting: ${activeResources} resource${activeResources !== 1 ? 's' : ''}`;
        }

        function showToast(resource, success) {
            const symbol = getElementSymbol(resource);
            const rarityClass = getRarityClass(resource);
            const toast = document.createElement('div');
            toast.className = `toast ${success ? 'success' : 'fail'}`;
            toast.innerHTML = `
                <span class="toast-icon">${symbol}</span>
                <span class="toast-name ${rarityClass}">${resource}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 3000);
        }

        // FIXED: Self-scheduling extraction instead of setInterval with async
        async function scheduleNextExtraction() {
            if (!isExtracting) return;
            
            try {
                await attemptExtraction();
            } catch (error) {
                console.error('Extraction error:', error);
            }
            
            // Schedule the next extraction only if still extracting
            if (isExtracting) {
                extractionTimer = setTimeout(scheduleNextExtraction, EXTRACTION_INTERVAL);
            }
        }

        async function attemptExtraction() {
            if (!isExtracting || isExtractionInProgress) return;
            
            isExtractionInProgress = true;
            
            try {
                const currentMass = await updateCargoDisplay();
                
                if (currentMass >= CARGO_MASS_LIMIT) {
                    isExtracting = false;
                    extractorText.textContent = 'Cargo full - extraction paused';
                    if (extractionTimer) {
                        clearTimeout(extractionTimer);
                        extractionTimer = null;
                    }
                    return;
                }
                
                const activeResources = currentPlanet.resources.filter(r => resourceStates[r]);
                if (activeResources.length === 0) {
                    extractorText.textContent = 'No resources selected';
                    return;
                }
                
                const randomIndex = Math.floor(Math.random() * activeResources.length);
                const resource = activeResources[randomIndex];
                const chance = resourceChances[resource] || 70;
                const success = Math.random() * 100 < chance;
                
                if (success) {
                    const mass = getElementMass(resource);
                    
                    if (currentMass + mass <= CARGO_MASS_LIMIT) {
                        if (typeof window.addElementToCollection === 'function') {
                            const result = await window.addElementToCollection(resource, 1);
                            
                            if (result && result.success) {
                                await updateCargoDisplay();
                                showToast(resource, true);
                                extractorText.textContent = 'Auto-extractor active';
                            } else {
                                showToast(resource, false);
                            }
                        }
                    } else {
                        isExtracting = false;
                        extractorText.textContent = 'Cargo full - extraction paused';
                        if (extractionTimer) {
                            clearTimeout(extractionTimer);
                            extractionTimer = null;
                        }
                    }
                } else {
                    showToast(resource, false);
                }
            } catch (error) {
                console.error('Extraction error:', error);
            } finally {
                isExtractionInProgress = false;
            }
        }

        function startExtraction() {
            if (extractionTimer) {
                clearTimeout(extractionTimer);
                extractionTimer = null;
            }
            isExtracting = true;
            extractorText.textContent = 'Auto-extractor active';
            // Start the first extraction immediately, then schedule subsequent ones
            scheduleNextExtraction();
        }

        window.returnToShip = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            if (extractionTimer) {
                clearTimeout(extractionTimer);
                extractionTimer = null;
            }
            
            window.location.href = 'ship-bridge.html';
        };

        async function performAutoExtract() {
            if (!currentPlanet.resources || currentPlanet.resources.length === 0) return;
            
            const extractCount = Math.floor(Math.random() * 3) + 1;
            
            for (let i = 0; i < extractCount; i++) {
                const randomIndex = Math.floor(Math.random() * currentPlanet.resources.length);
                const resource = currentPlanet.resources[randomIndex];
                const mass = getElementMass(resource);
                
                const currentMass = await updateCargoDisplay();
                
                if (currentMass + mass <= CARGO_MASS_LIMIT) {
                    if (typeof window.addElementToCollection === 'function') {
                        const result = await window.addElementToCollection(resource, 1);
                        if (result && result.success) {
                            await updateCargoDisplay();
                            showToast(resource, true);
                        }
                    }
                }
            }
        }

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'landing on surface...';
                
                const planetLoaded = await loadPlanetData();
                
                if (!planetLoaded) {
                    throw new Error('Failed to load planet data');
                }
                
                startExtraction();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                    performAutoExtract();
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error landing';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (extractionTimer) {
                clearTimeout(extractionTimer);
            }
        });

        init();
    </script>
</body>
</html>
