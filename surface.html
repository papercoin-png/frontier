<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        /* Planet surface background */
        .surface-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.7;
        }
        
        /* Dark overlay for mood */
        .atmosphere {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 20, 30, 0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Planet name overlay */
        .planet-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 28px;
            text-shadow: 0 0 20px #000, 0 0 40px #4a8ac0;
            background: rgba(0,0,0,0.4);
            padding: 8px 30px;
            border-radius: 60px 15px 60px 15px;
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            z-index: 10;
        }
        
        /* Location Info */
        .location-info {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 4px 16px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #8ac0d0;
            z-index: 10;
            font-family: monospace;
        }
        
        /* Auto-extractor notice */
        .auto-notice {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #8aa0aa;
            color: #e0f0f0;
            padding: 8px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .auto-notice.show {
            opacity: 1;
            animation: notice-pulse 2s ease-in-out;
        }
        
        @keyframes notice-pulse {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        
        /* Resource log */
        .resource-log {
            position: absolute;
            bottom: 150px;
            left: 20px;
            z-index: 20;
            font-family: monospace;
            font-size: 14px;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 30px 10px 30px 10px;
            border: 1px solid #8ac0d0;
            min-width: 180px;
            max-width: 220px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        /* Collection counter */
        .collection {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            font-size: 24px;
            font-family: 'WindSong', cursive;
            color: #e0f0f0;
            text-shadow: 0 0 20px #8aa0aa;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 60px 15px 60px 15px;
            border: 2px solid #8ac0d0;
            min-width: 100px;
            text-align: center;
        }
        
        /* Return button */
        .return-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8aa0aa;
            color: #e0f0f0;
            padding: 12px 24px;
            border-radius: 60px 15px 60px 15px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
        }
        
        .return-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        /* Resource indicator */
        .resource-indicator {
            position: absolute;
            top: 210px;
            right: 20px;
            z-index: 15;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #8ac0d0;
            border-radius: 40px 10px 40px 10px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 12px;
        }
        
        .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin-top: 5px;
        }
        
        /* Colony button */
        .colony-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            color: #e0f0f0;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .colony-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        .colony-btn.established {
            background: rgba(74, 154, 106, 0.5);
            border-color: #4affaa;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #8ac0d0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 15px #8ac0d0;
            margin-top: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Element colors */
        .text-common { color: #ffffff; }
        .text-uncommon { color: #b0ffb0; }
        .text-rare { color: #b0b0ff; }
        .text-very-rare { color: #e0b0ff; }
        .text-legendary { color: #ffd700; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view">
            <!-- Planet surface background -->
            <img src="assets/images/surface-bg.jpg" class="surface-bg" id="surfaceBg" alt="Surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            
            <!-- Atmosphere overlay -->
            <div class="atmosphere"></div>
            
            <!-- Planet name -->
            <div class="planet-name" id="planetName">Verdant Prime</div>
            
            <!-- Location Info -->
            <div class="location-info" id="locationInfo">Sector B2 • Orion Nebula</div>
            
            <!-- Colony Button -->
            <button class="colony-btn" id="colonyBtn" onclick="toggleColony()">🏭 ESTABLISH COLONY</button>
            
            <!-- Auto notice -->
            <div class="auto-notice" id="autoNotice">⚙️ Auto-extractor active</div>
            
            <!-- Resource indicator -->
            <div class="resource-indicator">
                <div>📦 This planet:</div>
                <div class="planet-resources" id="planetResources">Carbon, Iron, Gold</div>
            </div>
            
            <!-- Resource log -->
            <div class="resource-log" id="resourceLog">
                <div class="log-entry" style="color:#aaa;">⚙️ Ready to extract...</div>
            </div>
            
            <!-- Collection counter -->
            <div class="collection" id="collectionCount">✨ 0</div>
            
            <!-- Return button -->
            <button class="return-btn" onclick="returnToShip()">← RETURN TO SHIP</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">extracting...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            // Common
            'Carbon': { value: 100, rarity: 'common', color: '#ffffff' },
            'Silicon': { value: 100, rarity: 'common', color: '#ffffff' },
            'Hydrogen': { value: 100, rarity: 'common', color: '#ffffff' },
            'Helium': { value: 100, rarity: 'common', color: '#ffffff' },
            
            // Uncommon
            'Iron': { value: 250, rarity: 'uncommon', color: '#b0ffb0' },
            'Oxygen': { value: 250, rarity: 'uncommon', color: '#b0ffb0' },
            'Nickel': { value: 250, rarity: 'uncommon', color: '#b0ffb0' },
            
            // Rare
            'Gold': { value: 1000, rarity: 'rare', color: '#b0b0ff' },
            'Silver': { value: 1000, rarity: 'rare', color: '#b0b0ff' },
            'Platinum': { value: 1000, rarity: 'rare', color: '#b0b0ff' },
            
            // Very Rare
            'Uranium': { value: 5000, rarity: 'very-rare', color: '#e0b0ff' },
            
            // Legendary
            'Promethium': { value: 25000, rarity: 'legendary', color: '#ffd700' }
        };
        
        // ===== LOAD LOCATION DATA =====
        const planetName = localStorage.getItem('voidfarer_current_planet') || 'Verdant Prime';
        const planetType = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        const currentNebula = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
        
        // Planet-specific resources (in real game, these would come from the planet data)
        const planetResources = {
            'Verdant Prime': ['Carbon', 'Iron', 'Silicon', 'Gold', 'Oxygen'],
            'Pyros': ['Iron', 'Gold', 'Silver', 'Uranium'],
            'Glacier-7': ['Hydrogen', 'Helium', 'Ice'],
            'Aether': ['Hydrogen', 'Helium', 'Methane']
        };
        
        const availableResources = planetResources[planetName] || ['Carbon', 'Iron', 'Silicon'];
        
        // Update UI
        document.getElementById('planetName').textContent = planetName;
        document.getElementById('locationInfo').textContent = `${currentStar} • ${currentNebula} • Sector ${currentSector}`;
        document.getElementById('planetResources').textContent = availableResources.slice(0, 5).join(', ');
        
        // Set background based on planet type
        const filters = {
            'scorched': 'hue-rotate(20deg) saturate(1.3)',
            'lush': 'hue-rotate(0deg) saturate(1.1)',
            'frozen': 'hue-rotate(180deg) brightness(1.1)',
            'barren': 'grayscale(0.5) brightness(0.9)',
            'gas': 'hue-rotate(280deg) saturate(1.2)'
        };
        document.getElementById('surfaceBg').style.filter = filters[planetType] || 'none';
        
        // ===== STORAGE HELPERS =====
        function getCollection() {
            return JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
        }
        
        function saveCollection(collection) {
            localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
        }
        
        function getCredits() {
            return parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
        }
        
        function saveCredits(credits) {
            localStorage.setItem('voidfarer_credits', credits.toString());
        }
        
        function getColonies() {
            return JSON.parse(localStorage.getItem('voidfarer_colonies')) || [];
        }
        
        function saveColonies(colonies) {
            localStorage.setItem('voidfarer_colonies', JSON.stringify(colonies));
        }
        
        // ===== UPDATE DISPLAY =====
        function updateDisplay() {
            const collection = getCollection();
            const totalItems = Object.values(collection).reduce((sum, item) => sum + (item.count || 1), 0);
            document.getElementById('collectionCount').textContent = `✨ ${totalItems}`;
        }
        
        // ===== SHOW NOTICE =====
        function showNotice(message) {
            const notice = document.getElementById('autoNotice');
            notice.textContent = message;
            notice.classList.add('show');
            setTimeout(() => notice.classList.remove('show'), 2000);
        }
        
        // ===== EXTRACT RESOURCE =====
        function extractResource() {
            // Pick random resource from available
            const elementName = availableResources[Math.floor(Math.random() * availableResources.length)];
            const elementData = elementDatabase[elementName] || { value: 100, rarity: 'common', color: '#ffffff' };
            
            // Get current collection (FRESH from localStorage)
            let collection = getCollection();
            
            // Add element to collection
            if (!collection[elementName]) {
                collection[elementName] = { count: 1, firstFound: new Date().toISOString() };
            } else {
                collection[elementName].count++;
            }
            
            // Save collection
            saveCollection(collection);
            
            // Add credits
            let credits = getCredits();
            credits += elementData.value;
            saveCredits(credits);
            
            // Update display
            updateDisplay();
            sessionElements++;
            
            // Add to log
            const log = document.getElementById('resourceLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = elementData.color;
            entry.innerHTML = `✨ +1 ${elementName} (${elementData.value}⭐)`;
            
            log.insertBefore(entry, log.firstChild);
            while (log.children.length > 5) {
                log.removeChild(log.lastChild);
            }
            
            showNotice(`Found ${elementName}`);
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            console.log('Extracted:', elementName, 'Total:', collection[elementName]?.count);
        }
        
        // ===== AUTO-EXTRACT =====
        let gatherInterval = null;
        let sessionElements = 0;
        
        function startAutoExtract() {
            if (gatherInterval) clearInterval(gatherInterval);
            
            const autoGather = localStorage.getItem('voidfarer_auto_gather') !== 'false';
            
            if (!autoGather) {
                showNotice('⚠️ Auto-extractor disabled');
                return;
            }
            
            showNotice('⚙️ Auto-extractor active');
            
            // Extract every 4 seconds
            gatherInterval = setInterval(() => {
                extractResource();
            }, 4000);
            
            // Do first extraction immediately
            setTimeout(() => extractResource(), 1000);
        }
        
        // ===== COLONY FUNCTIONS =====
        function checkForColony() {
            const colonies = getColonies();
            const exists = colonies.some(c => 
                c.planet === planetName && 
                c.star === currentStar
            );
            
            const btn = document.getElementById('colonyBtn');
            if (exists) {
                btn.innerHTML = '🏭 COLONY ESTABLISHED';
                btn.classList.add('established');
            } else {
                btn.innerHTML = '🏭 ESTABLISH COLONY';
                btn.classList.remove('established');
            }
        }
        
        function toggleColony() {
            const colonies = getColonies();
            const existingIndex = colonies.findIndex(c => 
                c.planet === planetName && 
                c.star === currentStar
            );
            
            if (existingIndex >= 0) {
                // Remove colony
                if (confirm('Abandon this colony?')) {
                    colonies.splice(existingIndex, 1);
                    saveColonies(colonies);
                    checkForColony();
                    showNotice('Colony abandoned');
                }
            } else {
                // Establish colony
                const name = prompt('Name your colony:', planetName + ' Outpost');
                if (name) {
                    colonies.push({
                        name: name,
                        planet: planetName,
                        star: currentStar,
                        nebula: currentNebula,
                        sector: currentSector,
                        established: new Date().toISOString()
                    });
                    saveColonies(colonies);
                    checkForColony();
                    
                    // Bonus credits
                    let credits = getCredits();
                    credits += 5000;
                    saveCredits(credits);
                    updateDisplay();
                    
                    showNotice('Colony established! +5000⭐');
                }
            }
        }
        
        // ===== RETURN TO SHIP =====
        function returnToShip() {
            if (gatherInterval) {
                clearInterval(gatherInterval);
            }
            
            loadingOverlay.classList.add('active');
            setTimeout(() => {
                window.location.href = 'system-view.html';
            }, 800);
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            updateDisplay();
            checkForColony();
            sessionElements = 0;
            
            // Clear log
            document.getElementById('resourceLog').innerHTML = '<div class="log-entry" style="color:#aaa;">⚙️ Ready</div>';
            
            // Start auto-extract
            setTimeout(startAutoExtract, 1000);
        }
        
        init();
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (gatherInterval) clearInterval(gatherInterval);
        });
    </script>
</body>
</html>
