<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Surface</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ... keep all existing styles ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .surface-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        /* Planet surface background */
        .surface-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.7;
        }
        
        /* Dark overlay for mood */
        .atmosphere {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 20, 30, 0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Planet name overlay */
        .planet-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 28px;
            text-shadow: 0 0 20px #000, 0 0 40px #4a8ac0;
            background: rgba(0,0,0,0.4);
            padding: 8px 30px;
            border-radius: 60px 15px 60px 15px;
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            z-index: 10;
            font-weight: 600;
        }
        
        /* Location Info */
        .location-info {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 4px 16px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #8ac0d0;
            z-index: 10;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* Auto-extractor notice */
        .auto-notice {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #8aa0aa;
            color: #e0f0f0;
            padding: 8px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
            font-family: 'Exo 2', sans-serif;
        }
        
        .auto-notice.show {
            opacity: 1;
            animation: notice-pulse 2s ease-in-out;
        }
        
        @keyframes notice-pulse {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        
        /* Resource log */
        .resource-log {
            position: absolute;
            bottom: 150px;
            left: 20px;
            z-index: 20;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 30px 10px 30px 10px;
            border: 1px solid #8ac0d0;
            min-width: 180px;
            max-width: 220px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        /* Collection counter */
        .collection {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            font-size: 24px;
            font-family: 'Exo 2', sans-serif;
            color: #e0f0f0;
            text-shadow: 0 0 20px #8aa0aa;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 60px 15px 60px 15px;
            border: 2px solid #8ac0d0;
            min-width: 100px;
            text-align: center;
            font-weight: 600;
        }
        
        /* Return button */
        .return-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8aa0aa;
            color: #e0f0f0;
            padding: 12px 24px;
            border-radius: 60px 15px 60px 15px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .return-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        /* Resource indicator */
        .resource-indicator {
            position: absolute;
            top: 210px;
            right: 20px;
            z-index: 15;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid #8ac0d0;
            border-radius: 40px 10px 40px 10px;
            padding: 10px 15px;
            color: #ffffff;
            font-size: 12px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin-top: 5px;
        }
        
        /* Colony button */
        .colony-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            z-index: 20;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 2px solid #8ac0d0;
            color: #e0f0f0;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
        }
        
        .colony-btn:active {
            background: rgba(138, 160, 170, 0.3);
            transform: scale(0.97);
        }
        
        .colony-btn.established {
            background: rgba(74, 154, 106, 0.5);
            border-color: #4affaa;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8ac0d0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 15px #8ac0d0;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Element colors */
        .text-common { color: #ffffff; }
        .text-uncommon { color: #b0ffb0; }
        .text-rare { color: #b0b0ff; }
        .text-very-rare { color: #e0b0ff; }
        .text-legendary { color: #ffd700; }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="surface-view">
            <!-- Planet surface background -->
            <img src="assets/images/surface-bg.jpg" class="surface-bg" id="surfaceBg" alt="Surface" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
            
            <!-- Atmosphere overlay -->
            <div class="atmosphere"></div>
            
            <!-- Planet name -->
            <div class="planet-name" id="planetName">Loading...</div>
            
            <!-- Location Info -->
            <div class="location-info" id="locationInfo">Loading location...</div>
            
            <!-- Colony Button -->
            <button class="colony-btn" id="colonyBtn" onclick="toggleColony()">🏭 ESTABLISH COLONY</button>
            
            <!-- Auto notice -->
            <div class="auto-notice" id="autoNotice">⚙️ Auto-extractor active</div>
            
            <!-- Resource indicator -->
            <div class="resource-indicator">
                <div>📦 This planet:</div>
                <div class="planet-resources" id="planetResources">Loading...</div>
            </div>
            
            <!-- Resource log -->
            <div class="resource-log" id="resourceLog">
                <div class="log-entry" style="color:#aaa;">⚙️ Ready to extract...</div>
            </div>
            
            <!-- Collection counter -->
            <div class="collection" id="collectionCount">✨ 0</div>
            
            <!-- Return button -->
            <button class="return-btn" onclick="returnToShip()">← RETURN TO SHIP</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">scanning surface...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const autoNotice = document.getElementById('autoNotice');

        // ===== STATE =====
        let gatherInterval = null;
        let sessionElements = 0;
        let currentPlanet = 'Verdant Prime';
        let currentStar = 'Sol';
        let currentSector = 'B2';
        let currentNebula = 'Orion Nebula';
        let planetType = 'lush';
        let availableResources = [];

        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            // Common
            'Carbon': { value: 100, rarity: 'common', color: '#ffffff', icon: '⚫' },
            'Silicon': { value: 100, rarity: 'common', color: '#ffffff', icon: '💎' },
            'Hydrogen': { value: 100, rarity: 'common', color: '#ffffff', icon: '💧' },
            'Helium': { value: 100, rarity: 'common', color: '#ffffff', icon: '🎈' },
            'Sodium': { value: 100, rarity: 'common', color: '#ffffff', icon: '🧂' },
            'Lithium': { value: 100, rarity: 'common', color: '#ffffff', icon: '🔋' },
            'Magnesium': { value: 100, rarity: 'common', color: '#ffffff', icon: '✨' },
            
            // Uncommon
            'Iron': { value: 250, rarity: 'uncommon', color: '#b0ffb0', icon: '⚙️' },
            'Oxygen': { value: 250, rarity: 'uncommon', color: '#b0ffb0', icon: '💨' },
            'Nickel': { value: 250, rarity: 'uncommon', color: '#b0ffb0', icon: '🔩' },
            'Sulfur': { value: 250, rarity: 'uncommon', color: '#b0ffb0', icon: '🟡' },
            
            // Rare
            'Gold': { value: 1000, rarity: 'rare', color: '#b0b0ff', icon: '🟡' },
            'Silver': { value: 1000, rarity: 'rare', color: '#b0b0ff', icon: '⚪' },
            'Platinum': { value: 1000, rarity: 'rare', color: '#b0b0ff', icon: '⬜' },
            'Titanium': { value: 1000, rarity: 'rare', color: '#b0b0ff', icon: '🔷' },
            
            // Very Rare
            'Uranium': { value: 5000, rarity: 'very-rare', color: '#e0b0ff', icon: '🟣' },
            'Thorium': { value: 5000, rarity: 'very-rare', color: '#e0b0ff', icon: '🔮' },
            
            // Legendary
            'Promethium': { value: 25000, rarity: 'legendary', color: '#ffd700', icon: '✨' },
            'Technetium': { value: 25000, rarity: 'legendary', color: '#ffd700', icon: '🧪' }
        };

        // Planet-specific resources (fallback if none provided)
        const planetResourcesMap = {
            'Verdant Prime': ['Carbon', 'Iron', 'Silicon', 'Gold', 'Oxygen', 'Titanium'],
            'Pyros': ['Iron', 'Gold', 'Silver', 'Uranium', 'Sulfur', 'Copper'],
            'Pyros-Deep': ['Uranium', 'Plutonium', 'Thorium', 'Gold'],
            'Glacier-7': ['Hydrogen', 'Helium', 'Ice', 'Methane', 'Nitrogen'],
            'Aether': ['Hydrogen', 'Helium', 'Methane', 'Promethium'],
            'Aether-Veil': ['Promethium', 'Technetium', 'Helium'],
            'Europa': ['Uranium', 'Ice', 'Hydrogen'],
            'Titanis': ['Promethium', 'Titanium', 'Iron']
        };

        // ===== LOAD LOCATION DATA =====
        async function loadLocationData() {
            try {
                // Load all location data with fallbacks
                let planet = 'Verdant Prime';
                if (typeof getCurrentPlanet === 'function') {
                    planet = await getCurrentPlanet();
                } else {
                    planet = localStorage.getItem('voidfarer_current_planet') || 'Verdant Prime';
                }
                console.log('Surface loading planet:', planet);

                let star = 'Sol';
                if (typeof getCurrentStar === 'function') {
                    star = await getCurrentStar();
                } else {
                    star = localStorage.getItem('voidfarer_current_star') || 'Sol';
                }

                let sector = 'B2';
                if (typeof getCurrentSector === 'function') {
                    sector = await getCurrentSector();
                } else {
                    sector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                }

                let nebula = 'Orion Nebula';
                if (typeof getCurrentNebula === 'function') {
                    nebula = await getCurrentNebula();
                } else {
                    nebula = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
                }

                let type = 'lush';
                if (typeof getCurrentPlanetType === 'function') {
                    type = await getCurrentPlanetType();
                } else {
                    type = localStorage.getItem('voidfarer_current_planet_type') || 'lush';
                }

                let resources = [];
                if (typeof getCurrentPlanetResources === 'function') {
                    resources = await getCurrentPlanetResources() || [];
                } else {
                    try {
                        resources = JSON.parse(localStorage.getItem('voidfarer_current_planet_resources')) || [];
                    } catch (e) {
                        resources = [];
                    }
                }
                console.log('Loaded resources:', resources);

                currentPlanet = planet || 'Verdant Prime';
                currentStar = star || 'Sol';
                currentSector = sector || 'B2';
                currentNebula = nebula || 'Orion Nebula';
                planetType = type || 'lush';

                // Determine available resources
                if (resources && resources.length > 0) {
                    availableResources = resources;
                    console.log('Using provided resources:', availableResources);
                } else {
                    availableResources = planetResourcesMap[currentPlanet] || 
                        ['Carbon', 'Iron', 'Silicon', 'Gold', 'Oxygen'];
                    console.log('Using fallback resources:', availableResources);
                }

                // Update UI
                document.getElementById('planetName').textContent = currentPlanet;
                document.getElementById('locationInfo').textContent = 
                    `${currentStar} • ${currentNebula} • Sector ${currentSector}`;
                document.getElementById('planetResources').textContent = 
                    availableResources.slice(0, 5).join(', ');
                
                // Set background based on planet type
                const filters = {
                    'scorched': 'hue-rotate(20deg) saturate(1.3)',
                    'lush': 'hue-rotate(0deg) saturate(1.1)',
                    'frozen': 'hue-rotate(180deg) brightness(1.1)',
                    'barren': 'grayscale(0.5) brightness(0.9)',
                    'gas': 'hue-rotate(280deg) saturate(1.2)'
                };
                document.getElementById('surfaceBg').style.filter = filters[planetType] || 'none';

            } catch (error) {
                console.error('Error loading location:', error);
                // Use defaults
                currentPlanet = 'Verdant Prime';
                availableResources = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Oxygen'];
                document.getElementById('planetName').textContent = currentPlanet;
                document.getElementById('planetResources').textContent = 'Carbon, Iron, Silicon, Gold, Oxygen';
            }
        }

        // ===== UPDATE DISPLAY =====
        async function updateDisplay() {
            try {
                let collection = {};
                if (typeof getCollection === 'function') {
                    collection = await getCollection();
                } else {
                    try {
                        collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                    } catch (e) {
                        collection = {};
                    }
                }
                const totalItems = Object.values(collection).reduce((sum, item) => sum + (item.count || 1), 0);
                document.getElementById('collectionCount').textContent = `✨ ${totalItems}`;
                console.log('Collection updated, total items:', totalItems);
                return collection;
            } catch (error) {
                console.error('Error updating display:', error);
                return {};
            }
        }

        // ===== SHOW NOTICE =====
        function showNotice(message) {
            autoNotice.textContent = message;
            autoNotice.classList.add('show');
            setTimeout(() => autoNotice.classList.remove('show'), 2000);
        }

        // ===== EXTRACT RESOURCE =====
        async function extractResource() {
            // Pick random resource from available
            const elementName = availableResources[Math.floor(Math.random() * availableResources.length)];
            const elementData = elementDatabase[elementName] || { 
                value: 100, 
                rarity: 'common', 
                color: '#ffffff',
                icon: '🔹'
            };

            try {
                console.log('Extracting:', elementName);
                
                // Add element to collection using the storage function
                if (typeof addElementToCollection === 'function') {
                    await addElementToCollection(elementName, 1);
                    console.log('Added to collection via function:', elementName);
                } else {
                    // Fallback: manually update localStorage
                    console.log('Using localStorage fallback for extraction');
                    let collection = {};
                    try {
                        collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                    } catch (e) {
                        collection = {};
                    }
                    
                    if (!collection[elementName]) {
                        collection[elementName] = { count: 1, firstFound: new Date().toISOString() };
                    } else {
                        collection[elementName].count = (collection[elementName].count || 1) + 1;
                    }
                    
                    localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                    
                    // Also add credits
                    let credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                    credits += elementData.value;
                    localStorage.setItem('voidfarer_credits', credits.toString());
                    
                    console.log('Saved to localStorage:', elementName);
                }
                
                // Update mission progress
                if (typeof updateMissionProgress === 'function') {
                    await updateMissionProgress(elementName, 1);
                }

                // Update display and get updated collection
                const updatedCollection = await updateDisplay();
                sessionElements++;

                // Verify the element was added
                if (updatedCollection[elementName]) {
                    console.log(`Verification: ${elementName} count is now ${updatedCollection[elementName].count}`);
                }

                // Add to log
                const log = document.getElementById('resourceLog');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.style.color = elementData.color;
                entry.innerHTML = `✨ +1 ${elementName} (${elementData.value}⭐)`;
                
                log.insertBefore(entry, log.firstChild);
                while (log.children.length > 5) {
                    log.removeChild(log.lastChild);
                }

                showNotice(`Found ${elementName}`);

                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }

            } catch (error) {
                console.error('Extraction error:', error);
                showNotice('⚠️ Extraction failed');
            }
        }

        // ===== AUTO-EXTRACT =====
        function startAutoExtract() {
            if (gatherInterval) clearInterval(gatherInterval);
            
            const autoGather = localStorage.getItem('voidfarer_auto_gather') !== 'false';
            
            if (!autoGather) {
                showNotice('⚠️ Auto-extractor disabled');
                return;
            }

            showNotice('⚙️ Auto-extractor active');
            
            // Extract every 4 seconds
            gatherInterval = setInterval(() => {
                extractResource();
            }, 4000);
            
            // Do first extraction immediately
            setTimeout(() => extractResource(), 1000);
        }

        // ===== COLONY FUNCTIONS =====
        async function toggleColony() {
            try {
                let colonies = [];
                if (typeof getColonies === 'function') {
                    colonies = await getColonies();
                } else {
                    try {
                        colonies = JSON.parse(localStorage.getItem('voidfarer_colonies')) || [];
                    } catch (e) {
                        colonies = [];
                    }
                }

                const existingIndex = colonies.findIndex(c => 
                    c.planet === currentPlanet && 
                    c.star === currentStar
                );
                
                const colonyBtn = document.getElementById('colonyBtn');
                
                if (existingIndex >= 0) {
                    // Remove colony
                    if (confirm('Abandon this colony?')) {
                        loadingOverlay.classList.add('active');
                        loadingText.textContent = 'abandoning colony...';
                        
                        colonies.splice(existingIndex, 1);
                        if (typeof saveColonies === 'function') {
                            await saveColonies(colonies);
                        } else {
                            localStorage.setItem('voidfarer_colonies', JSON.stringify(colonies));
                        }
                        
                        colonyBtn.innerHTML = '🏭 ESTABLISH COLONY';
                        colonyBtn.classList.remove('established');
                        
                        showNotice('Colony abandoned');
                        
                        loadingOverlay.classList.remove('active');
                    }
                } else {
                    // Establish colony
                    const name = prompt('Name your colony:', currentPlanet + ' Outpost');
                    if (name) {
                        loadingOverlay.classList.add('active');
                        loadingText.textContent = 'establishing colony...';
                        
                        const newColony = {
                            id: 'colony_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: name,
                            planet: currentPlanet,
                            star: currentStar,
                            nebula: currentNebula,
                            sector: currentSector,
                            established: new Date().toISOString()
                        };
                        
                        colonies.push(newColony);
                        if (typeof saveColonies === 'function') {
                            await saveColonies(colonies);
                        } else {
                            localStorage.setItem('voidfarer_colonies', JSON.stringify(colonies));
                        }
                        
                        // Bonus credits
                        let credits = 5000;
                        if (typeof getCredits === 'function') {
                            credits = await getCredits();
                        } else {
                            credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                        }
                        
                        credits += 5000;
                        
                        if (typeof saveCredits === 'function') {
                            await saveCredits(credits);
                        } else {
                            localStorage.setItem('voidfarer_credits', credits.toString());
                        }
                        
                        colonyBtn.innerHTML = '🏭 COLONY ESTABLISHED';
                        colonyBtn.classList.add('established');
                        
                        await updateDisplay();
                        showNotice('Colony established! +5000⭐');
                        
                        loadingOverlay.classList.remove('active');
                    }
                }
            } catch (error) {
                console.error('Colony error:', error);
                loadingOverlay.classList.remove('active');
                showNotice('⚠️ Colony operation failed');
            }
        }

        // ===== CHECK FOR EXISTING COLONY =====
        async function checkForColony() {
            try {
                let colonies = [];
                if (typeof getColonies === 'function') {
                    colonies = await getColonies();
                } else {
                    try {
                        colonies = JSON.parse(localStorage.getItem('voidfarer_colonies')) || [];
                    } catch (e) {
                        colonies = [];
                    }
                }

                const exists = colonies.some(c => 
                    c.planet === currentPlanet && 
                    c.star === currentStar
                );
                
                const btn = document.getElementById('colonyBtn');
                if (exists) {
                    btn.innerHTML = '🏭 COLONY ESTABLISHED';
                    btn.classList.add('established');
                } else {
                    btn.innerHTML = '🏭 ESTABLISH COLONY';
                    btn.classList.remove('established');
                }
            } catch (error) {
                console.error('Error checking colony:', error);
            }
        }

        // ===== RETURN TO SHIP =====
        function returnToShip() {
            if (gatherInterval) {
                clearInterval(gatherInterval);
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'returning to ship...';
            setTimeout(() => {
                window.location.href = 'ship-bridge.html';
            }, 800);
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'scanning surface...';

                // Load location data - this will get the planet you selected
                await loadLocationData();

                // Update display
                await updateDisplay();

                // Check for existing colony
                await checkForColony();

                // Clear log
                document.getElementById('resourceLog').innerHTML = '<div class="log-entry" style="color:#aaa;">⚙️ Ready</div>';
                
                sessionElements = 0;

                // Hide loading
                loadingOverlay.classList.remove('active');

                // Start auto-extract
                setTimeout(startAutoExtract, 1000);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading data';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // ===== START =====
        init();

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (gatherInterval) clearInterval(gatherInterval);
        });
    </script>

    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
