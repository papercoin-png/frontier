<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOIDFARER - SHIPYARD</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #000000;
        }
        
        .phone-frame::-webkit-scrollbar {
            width: 4px;
        }
        
        .phone-frame::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .phone-frame::-webkit-scrollbar-thumb {
            background: #8a6aff;
            border-radius: 4px;
        }
        
        .phone-frame::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(138, 106, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 100px 20px;
            color: white;
            min-height: 100%;

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);

        .top-bar-left {

            gap: 20px;
        }

<body>
    <div class="phone-frame">
        <div class="content">
            <div class="top-bar">
                <div class="top-bar-left">
                    <span>✦ SHIPYARD</span>
                    <span>✦ MINING FLEET</span>
                </div>
                <div class="top-bar-right">v6.0.0 <span class="market-update-badge">⚡ ORDER SYSTEM</span></div>
            </div>
            
            <div class="shipyard-title">
                <div class="title-icon">⛏️</div>
                <div class="title-main">MINING SHIPS</div>
                <div class="title-sub">TIER 1 - TIER 10</div>
            </div>
            
            <div class="cognatus-presence">
                <div class="cognatus-pulse"></div>
                <div class="cognatus-label">COGNATUS ONLINE • ORDER MATERIALS FROM MARKET</div>
            </div>
            
            <div class="player-card">
                <div class="player-row">
                    <span class="player-name" id="playerName">VOIDFARER #1234</span>
                    <span class="player-badge">MINER</span>
                </div>
                <div class="credits-row">
                    <span>Available Credits</span>
                    <span class="credits-value" id="credits">Loading...</span>
                </div>
                <div class="fuel-row">
                    <span>⚡ Fuel Cells</span>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="fuel-value" id="fuelCells">0</span>
                        <button class="buy-fuel-btn" onclick="buyFuel()">BUY FUEL (10⭐)</button>
                    </div>
                </div>
            </div>
            
            <div class="ships-grid" id="shipsContainer">
                <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Loading shipyard...</div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="back-btn-fixed" onclick="returnToEarthHub()">
                <span class="back-icon">←</span>
                <span class="back-text">RETURN TO EARTH HUB</span>
            </div>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">PROCESSING...</div>
        </div>
    </div>

    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/ship-data.js"></script>
    <script type="module" src="js/market-dynamics.js"></script>

    <script type="module">
        import { getCredits, getPlayer, getCollection, addCredits, spendCredits } from './js/storage.js';
        import { recordTrade, getAskPrice, getBidPrice, updatePrices } from './js/market-dynamics.js';
        import { getAllShips, getShipStats, getVariantsForTier, getVariantStats, getFullShipStats, getWarpSpeed, getFuelCostPer100LY } from './js/ship-data.js';

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== GET PLAYER ID =====
        function getPlayerId() {
            return localStorage.getItem('voidfarer_player_id') || 'main';
        }

        // ===== PLAYER-SPECIFIC ORDER STORAGE =====
        function getShipyardOrdersKey() {
            const playerId = getPlayerId();
            return `voidfarer_shipyard_orders_${playerId}`;
        }
        
        function getShipyardOrders() {
            try {
                const orders = localStorage.getItem(getShipyardOrdersKey());
                return orders ? JSON.parse(orders) : {};
            } catch (e) {
                return {};
            }
        }
        
        function saveShipyardOrders(orders) {
            localStorage.setItem(getShipyardOrdersKey(), JSON.stringify(orders));
        }
        
        function addOrder(element, quantity, pricePerUnit) {
            const orders = getShipyardOrders();
            if (!orders[element]) {
                orders[element] = { quantity: 0, totalCost: 0 };
            }
            orders[element].quantity += quantity;
            orders[element].totalCost += quantity * pricePerUnit;
            saveShipyardOrders(orders);
        }
        
        function removeOrder(element, quantity, refundPricePerUnit) {
            const orders = getShipyardOrders();
            if (orders[element]) {
                orders[element].quantity -= quantity;
                if (orders[element].quantity <= 0) {
                    delete orders[element];
                } else {
                    orders[element].totalCost -= quantity * refundPricePerUnit;
                }
                saveShipyardOrders(orders);
            }
        }
        
        function clearAllOrders() {
            localStorage.removeItem(getShipyardOrdersKey());
        }
        
        function getOrderedQuantity(element) {
            const orders = getShipyardOrders();
            return orders[element]?.quantity || 0;
        }
        
        function getTotalMaterialsCost() {
            const orders = getShipyardOrders();
            let total = 0;
            for (const element in orders) {
                total += orders[element].totalCost;
            }
            return total;
        }

        // ===== CREDIT FUNCTIONS =====
        let currentCredits = 0;
        
        async function updateCreditsDisplay() {
            try {
                const playerId = getPlayerId();
                currentCredits = await getCredits(playerId);
                const creditsElement = document.getElementById('credits');
                if (creditsElement) {
                    creditsElement.textContent = currentCredits.toLocaleString() + ' ⭐';
                }
                return currentCredits;
            } catch (error) {
                console.error('Error loading credits:', error);
                return 5000;
            }
        }

        // ===== MARKET PRICE FUNCTIONS =====
        
        function getMarketAskPrice(element) {
            try {
                const price = getAskPrice(element);
                return price;
            } catch (e) {
                return getFallbackPrice(element);
            }
        }
        
        function getMarketBidPrice(element) {
            try {
                const price = getBidPrice(element);
                return price;
            } catch (e) {
                return getFallbackPrice(element) * 0.98;
            }
        }
        
        function getFallbackPrice(element) {
            const rare = ['Titanium', 'Chromium', 'Nickel', 'Gold', 'Silver', 'Platinum', 'Copper', 'Zinc', 'Tin', 'Cobalt', 'Lead', 'Iridium', 'Manganese', 'Uranium', 'Thorium', 'Neodymium', 'Plutonium', 'Rhodium', 'Palladium', 'Osmium', 'Ruthenium', 'Technetium', 'Rhenium', 'Hafnium', 'Promethium'];
            const veryRare = ['Uranium', 'Thorium', 'Plutonium', 'Technetium', 'Promethium', 'Polonium', 'Radium', 'Actinium'];
            const legendary = ['Californium', 'Einsteinium', 'Fermium', 'Mendelevium', 'Nobelium', 'Lawrencium'];
            const uncommon = ['Carbon', 'Oxygen', 'Nitrogen', 'Iron', 'Silicon', 'Aluminum', 'Sulfur'];
            
            if (legendary.includes(element)) return 25000;
            if (veryRare.includes(element)) return 5000;
            if (rare.includes(element)) return 1000;
            if (uncommon.includes(element)) return 250;
            return 100;
        }

        function getElementIcon(element) {
            const icons = { 
                'Iron': '⚙️', 'Copper': '🔴', 'Titanium': '🔷', 'Carbon': '⚫', 'Aluminum': '🛸', 'Silicon': '💾', 
                'Nickel': '🔩', 'Chromium': '⚙️', 'Steel': '⚒️', 'Zinc': '⚡', 'Silver': '🥈', 'Cobalt': '🔵', 
                'Iridium': '💎', 'Manganese': '🔶', 'Lead': '⚪', 'Uranium': '☢️', 'Thorium': '🌡️', 'Neodymium': '🧲', 
                'Plutonium': '⚠️', 'Rhodium': '✨', 'Palladium': '🔘', 'Osmium': '💠', 'Ruthenium': '🔮', 'Technetium': '⚛️', 
                'Rhenium': '💠', 'Hafnium': '🔷', 'Promethium': '🔥', 'Californium': '⚛️', 'Einsteinium': '⚛️', 
                'Fermium': '⚛️', 'Mendelevium': '⚛️', 'Nobelium': '⚛️', 'Lawrencium': '⚛️'
            };
            return icons[element] || '📦';
        }

        // ===== ORDER MATERIALS FUNCTION =====
        window.orderMaterials = async function(element, neededAmount) {
            event.stopPropagation();
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.classList.add('active');
            loadingText.textContent = `ORDERING ${neededAmount} ${element.toUpperCase()}...`;
            
            try {
                const price = getMarketAskPrice(element);
                const totalCost = neededAmount * price;
                const playerId = getPlayerId();
                const currentCredits = await getCredits(playerId);
                
                if (currentCredits < totalCost) {
                    alert(`Insufficient credits! Need ${totalCost.toLocaleString()}⭐`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Spend credits
                const spent = await spendCredits(totalCost, playerId, `Ordered ${neededAmount} ${element} for ship construction`);
                if (!spent) {
                    alert('Failed to spend credits');
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Add to shipyard orders
                addOrder(element, neededAmount, price);
                
                // Record trade for market dynamics
                if (typeof recordTrade === 'function') {
                    recordTrade(element, neededAmount, 'buy');
                    console.log(`📈 Recorded trade: ordered ${neededAmount}x ${element} for ship construction`);
                }
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                await updateCreditsDisplay();
                await refreshShipCards();
                
                loadingOverlay.classList.remove('active');
                
            } catch (error) {
                console.error('Order error:', error);
                loadingOverlay.classList.remove('active');
                alert('Order failed: ' + error.message);
            }
        };
        
        // ===== CLEAR ALL ORDERS =====
        window.clearAllOrders = async function() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'CLEARING ORDERS...';
            
            try {
                const orders = getShipyardOrders();
                let refundTotal = 0;
                
                // Calculate refund at current market bid prices
                for (const [element, order] of Object.entries(orders)) {
                    const currentBid = getMarketBidPrice(element);
                    refundTotal += order.quantity * currentBid;
                    
                    // Record sell trade for market dynamics
                    if (typeof recordTrade === 'function') {
                        recordTrade(element, order.quantity, 'sell');
                    }
                }
                
                // Add refund to player credits
                const playerId = getPlayerId();
                await addCredits(refundTotal, playerId);
                
                // Clear orders
                clearAllOrders();
                
                await updateCreditsDisplay();
                await refreshShipCards();
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                alert(`Orders cancelled. Refunded ${refundTotal.toLocaleString()}⭐ at current market prices.`);
                loadingOverlay.classList.remove('active');
                
            } catch (error) {
                console.error('Clear orders error:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to clear orders: ' + error.message);
            }
        };
        
        // ===== CHECK IF PLAYER ALREADY OWNS A SHIP =====
        function getOwnedShips() {
            try {
                const playerId = getPlayerId();
                const ownedShips = JSON.parse(localStorage.getItem(`voidfarer_owned_ships_${playerId}`)) || [];
                return ownedShips;
            } catch (error) {
                console.error('Error getting owned ships:', error);
                return [];
            }
        }
        
        function ownsShip(shipName) {
            const ownedShips = getOwnedShips();
            return ownedShips.some(ship => ship.startsWith(shipName));
        }

        // ===== BUILD SHIP FUNCTION =====
        window.buildShip = async function(shipName, tier, variantId = null) {
            const ship = getShipStats(shipName);
            if (!ship) return;
            
            const isStarter = shipName === 'Prospector' || tier === 1;
            
            // Check if player already owns this ship
            if (ownsShip(shipName)) {
                alert(`⚠️ You already own a ${shipName}! Cannot purchase another.`);
                return;
            }
            
            // For non-starter ships, check orders
            if (!isStarter) {
                const orders = getShipyardOrders();
                
                // Check if all required materials are ordered
                let allOrdered = true;
                for (const [element, needed] of Object.entries(ship.elements)) {
                    const ordered = orders[element]?.quantity || 0;
                    if (ordered < needed) {
                        allOrdered = false;
                        break;
                    }
                }
                
                if (!allOrdered) {
                    alert('Not all materials have been ordered! Please order missing materials first.');
                    return;
                }
            }
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.classList.add('active');
            loadingText.textContent = `CONSTRUCTING ${shipName.toUpperCase()}...`;
            
            try {
                const playerId = getPlayerId();
                
                // For starter ship, no cost
                if (isStarter) {
                    // Format ship string for storage
                    let shipString = shipName;
                    if (variantId) {
                        shipString = `${shipName} (${variantId})`;
                    }
                    
                    // Add ship to fleet
                    const playerShipsKey = `voidfarer_owned_ships_${playerId}`;
                    const playerShips = JSON.parse(localStorage.getItem(playerShipsKey) || '[]');
                    
                    if (!playerShips.includes(shipString)) {
                        playerShips.push(shipString);
                        localStorage.setItem(playerShipsKey, JSON.stringify(playerShips));
                    }
                    
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred?.('success');
                    }
                    
                    loadingOverlay.classList.remove('active');
                    alert(`✅ ${shipName} acquired! It has been added to your fleet.`);
                    
                    await updateCreditsDisplay();
                    await refreshShipCards();
                    return;
                }
                
                // For regular ships
                const orders = getShipyardOrders();
                const materialCost = getTotalMaterialsCost();
                const laborCost = materialCost;
                const currentCredits = await getCredits(playerId);
                
                if (currentCredits < laborCost) {
                    alert(`Insufficient credits for labor! Need ${laborCost.toLocaleString()}⭐`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Spend labor cost
                const spent = await spendCredits(laborCost, playerId, `Labor for ${shipName} construction`);
                if (!spent) {
                    alert('Failed to spend credits for labor');
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Add labor cost to certificate holders (if function exists)
                if (typeof window.addPlayerLaborEarnings === 'function') {
                    console.log(`📊 Labor cost ${laborCost}⭐ would be distributed to certificate holders`);
                }
                
                // Format ship string for storage
                let shipString = shipName;
                if (variantId) {
                    shipString = `${shipName} (${variantId})`;
                }
                
                // Add ship to fleet
                const playerShipsKey = `voidfarer_owned_ships_${playerId}`;
                const playerShips = JSON.parse(localStorage.getItem(playerShipsKey) || '[]');
                playerShips.push(shipString);
                localStorage.setItem(playerShipsKey, JSON.stringify(playerShips));
                
                // Clear orders
                clearAllOrders();
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                loadingOverlay.classList.remove('active');
                
                let message = `✅ ${shipName} successfully constructed!\n\n`;
                message += `Materials Cost: ${materialCost.toLocaleString()}⭐\n`;
                message += `Labor Cost: ${laborCost.toLocaleString()}⭐\n`;
                message += `Total: ${(materialCost + laborCost).toLocaleString()}⭐\n\n`;
                message += `Ship added to your fleet.`;
                alert(message);
                
                await updateCreditsDisplay();
                await refreshShipCards();
                
            } catch (error) {
                console.error('Build error:', error);
                loadingOverlay.classList.remove('active');
                alert('Construction failed: ' + error.message);
            }
        };
        
        // ===== OTHER FUNCTIONS =====
        window.selectVariant = async function(tier, variantId) {
            selectedVariants[tier] = variantId;
            localStorage.setItem('voidfarer_selected_variants', JSON.stringify(selectedVariants));
            await refreshShipCards();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };
        
        window.buyFuel = async function() {
            const credits = await getCredits(getPlayerId());
            const fuelCells = parseInt(localStorage.getItem('voidfarer_fuel_cells') || '0');
            if (credits >= 10) {
                const spent = await spendCredits(10, getPlayerId(), 'Fuel purchase');
                if (spent) {
                    localStorage.setItem('voidfarer_fuel_cells', (fuelCells + 1).toString());
                    await updateCreditsDisplay();
                    document.getElementById('fuelCells').textContent = fuelCells + 1;
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Failed to purchase fuel');
                }
            } else {
                alert('Insufficient credits! Need 10⭐ for 1 fuel cell.');
            }
        };
        
        window.returnToEarthHub = function() {
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'RETURNING TO HUB...';
            setTimeout(() => { window.location.href = 'earth-hub.html'; }, 500);
        };
        
        // ===== VARIANT TRACKING =====
        let selectedVariants = {};
        
        // ===== SHIP MATERIAL REQUIREMENTS =====
        const SHIP_MATERIALS = {
            'Deep Miner': { 'Iron': 800, 'Copper': 400, 'Titanium': 200, 'Nickel': 250, 'Chromium': 180, 'Steel': 150 },
            'Excavator': { 'Titanium': 350, 'Steel': 450, 'Nickel': 350, 'Chromium': 280, 'Zinc': 250, 'Silver': 150, 'Cobalt': 140 },
            'Borealis': { 'Steel': 800, 'Titanium': 600, 'Nickel': 550, 'Silver': 350, 'Iridium': 220, 'Manganese': 350, 'Lead': 300 },
            'Core Digger': { 'Steel': 1200, 'Titanium': 1000, 'Iridium': 400, 'Uranium': 200, 'Thorium': 150, 'Neodymium': 120 },
            'Abyss Miner': { 'Uranium': 400, 'Thorium': 300, 'Plutonium': 200, 'Rhodium': 160, 'Palladium': 120, 'Neodymium': 200 },
            'Void Excavator': { 'Plutonium': 400, 'Rhodium': 300, 'Osmium': 240, 'Ruthenium': 200, 'Technetium': 160, 'Palladium': 240 },
            'Singularity Miner': { 'Osmium': 400, 'Ruthenium': 360, 'Rhenium': 240, 'Hafnium': 200, 'Promethium': 160, 'Technetium': 200 },
            'Quasar Drill': { 'Rhenium': 500, 'Hafnium': 400, 'Californium': 200, 'Einsteinium': 160, 'Fermium': 120, 'Promethium': 240 },
            'Event Horizon': { 'Californium': 400, 'Einsteinium': 300, 'Fermium': 200, 'Mendelevium': 160, 'Nobelium': 120, 'Lawrencium': 100 }
        };

        // ===== GENERATE SHIP CARD =====
        async function generateShipCard(ship) {
            const stats = getShipStats(ship.name);
            if (!stats) return '';
            
            const isStarter = ship.name === 'Prospector' || stats.tier === 1;
            const alreadyOwned = ownsShip(ship.name);
            
            const variantId = selectedVariants[stats.tier];
            const variant = variantId ? getVariantStats(variantId) : null;
            
            let miningBonus = variant ? variant.miningBonus : stats.miningBonus;
            let cargo = variant ? variant.cargo : stats.cargo;
            let hull = variant ? variant.hull : stats.hull;
            let fuelMult = variant ? variant.fuelMult : stats.fuelMult;
            
            const orders = getShipyardOrders();
            const materialCost = getTotalMaterialsCost();
            const laborCost = materialCost;
            const playerCredits = await getCredits(getPlayerId());
            const canAffordLabor = playerCredits >= laborCost;
            
            const shipMaterials = SHIP_MATERIALS[ship.name] || {};
            
            // Check if all materials are ordered
            let allOrdered = true;
            for (const [element, needed] of Object.entries(shipMaterials)) {
                const ordered = orders[element]?.quantity || 0;
                if (ordered < needed) {
                    allOrdered = false;
                    break;
                }
            }
            
            let requirementsHtml = '';
            
            if (!isStarter) {
                for (const [element, needed] of Object.entries(shipMaterials)) {
                    const ordered = orders[element]?.quantity || 0;
                    const missing = Math.max(0, needed - ordered);
                    const price = getMarketAskPrice(element);
                    const buyCost = missing * price;
                    
                    const isOrdered = ordered >= needed;
                    
                    requirementsHtml += `
                        <div class="requirement-item">
                            <div class="requirement-info">
                                <span class="requirement-icon">${getElementIcon(element)}</span>
                                <div>
                                    <div class="requirement-name">${element}</div>
                                    <div class="requirement-need">Need ${needed.toLocaleString()} units</div>
                                </div>
                            </div>
                            <div class="requirement-status">
                                ${isOrdered ? 
                                    `<div class="requirement-ordered">✓ ORDERED: ${ordered}/${needed}</div>` :
                                    `<div class="requirement-have">Ordered: ${ordered}/${needed}</div>`
                                }
                                <div class="requirement-cost">${(needed * price).toLocaleString()}⭐</div>
                            </div>
                            <span class="${isOrdered ? 'requirement-met' : 'requirement-unmet'}">${isOrdered ? '✓' : '✗'}</span>
                        </div>
                    `;
                    
                    if (!isOrdered && missing > 0) {
                        requirementsHtml += `
                            <div class="order-row">
                                <div class="order-info">
                                    <span class="order-text">Order ${missing.toLocaleString()} ${element}</span>
                                    <span class="order-cost">${buyCost.toLocaleString()}⭐</span>
                                </div>
                                <button class="order-btn" onclick="orderMaterials('${element}', ${missing})">ORDER</button>
                            </div>
                        `;
                    }
                }
            }
            
            let variantHtml = '';
            let variantDescHtml = '';
            const variants = getVariantsForTier(stats.tier);
            
            if (variants.length > 0 && stats.tier >= 5 && !isStarter) {
                variantHtml = `
                    <div class="variant-selector">
                        ${variants.map(v => `
                            <div class="variant-btn ${selectedVariants[stats.tier] === v.id ? 'active' : ''}" 
                                 onclick="selectVariant(${stats.tier}, '${v.id}')">${v.name}</div>
                        `).join('')}
                    </div>
                `;
                if (variant) variantDescHtml = `<div class="variant-desc">✨ ${variant.description}</div>`;
            }
            
            const canBuild = isStarter ? true : (allOrdered && canAffordLabor);
            const starterBadge = isStarter ? '<span class="tier-badge starter-badge">⭐ STARTER SHIP • FREE</span>' : `<span class="tier-badge">TIER ${stats.tier} MINING VESSEL</span>`;
            const warpSpeed = getWarpSpeed(25, fuelMult);
            const fuelCostPer100LY = getFuelCostPer100LY(fuelMult);
            const hasOrders = Object.keys(orders).length > 0;
            
            let buildButtonHtml = '';
            
            if (alreadyOwned) {
                buildButtonHtml = `<button class="build-btn disabled" style="background:rgba(74,255,170,0.1);">✓ ALREADY OWNED</button>`;
            } else if (isStarter) {
                buildButtonHtml = `<button class="build-btn ready free-btn" onclick="buildShip('${ship.name}', ${stats.tier}, '${variantId || ''}')">🎁 ACQUIRE STARTER SHIP (FREE)</button>`;
            } else {
                buildButtonHtml = `
                    <button class="build-btn ${!canBuild ? 'disabled' : 'ready'}" onclick="${canBuild ? `buildShip('${ship.name}', ${stats.tier}, '${variantId || ''}')` : ''}">
                        ${canBuild ? '🚀 BUY SHIP' : (allOrdered ? '⚠️ INSUFFICIENT CREDITS' : '⚠️ ORDER MATERIALS FIRST')}
                    </button>
                `;
            }
            
            const shipClass = stats.tier === 1 ? 'free-ship' : '';
            
            return `
                <div class="ship-card ${shipClass}">
                    ${starterBadge}
                    <div class="ship-header">
                        <div class="ship-icon">${stats.icon}</div>
                        <div class="ship-title">
                            <div class="ship-name">${ship.name}${alreadyOwned ? ' <span class="free-badge">✓ OWNED</span>' : ''}</div>
                            <div class="ship-tier">+${miningBonus}% Mining Yield</div>
                        </div>
                    </div>
                    ${variantHtml}
                    ${variantDescHtml}
                    <div class="ship-stats">
                        <div class="stat-row"><span class="stat-label">MINING BONUS</span><span class="stat-value">+${miningBonus}%</span></div>
                        <div class="stat-row"><span class="stat-label">CARGO (AMU)</span><span class="stat-value">${cargo.toLocaleString()}</span></div>
                        <div class="stat-row"><span class="stat-label">HULL</span><span class="stat-value">${hull}</span></div>
                        <div class="stat-row"><span class="stat-label">WARP SPEED</span><span class="stat-value">${warpSpeed} LY/min</span></div>
                    </div>
                    ${!isStarter && !alreadyOwned ? `
                        <div class="cost-summary">
                            <div class="cost-row"><span class="cost-label">Materials Ordered:</span><span class="cost-value">${materialCost.toLocaleString()} ⭐</span></div>
                            <div class="cost-row"><span class="cost-label">Labor Cost:</span><span class="cost-value">${laborCost.toLocaleString()} ⭐</span></div>
                            <div class="cost-row total-row"><span class="cost-label">TOTAL DUE AT BUILD:</span><span class="cost-total">${laborCost.toLocaleString()} ⭐</span></div>
                            <div class="labor-note">👷 Labor fees distributed to certificate holders</div>
                            <div class="fuel-note">⚡ Fuel cost: ${fuelCostPer100LY}⭐ per 100 LY</div>
                            <div class="price-note">📊 Market prices update every 60 seconds</div>
                        </div>
                        <div class="requirements-section">
                            <div class="requirements-title">⚒️ MATERIALS REQUIRED</div>
                            ${requirementsHtml}
                        </div>
                    ` : ''}
                    <div class="action-buttons">
                        ${!isStarter && !alreadyOwned && hasOrders ? `<button class="clear-btn" onclick="clearAllOrders()">🗑️ CLEAR ALL</button>` : ''}
                        ${buildButtonHtml}
                    </div>
                    ${stats.tier === 10 ? '<div class="achievement-badge">🏆 ENDGAME VESSEL</div>' : ''}
                    ${stats.tier === 5 ? '<div class="achievement-badge">⚡ VARIANT SYSTEM UNLOCKED</div>' : ''}
                </div>
            `;
        }
        
        async function refreshShipCards() {
            const container = document.getElementById('shipsContainer');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Loading shipyard...</div>';
            
            const ships = getAllShips();
            let html = '';
            
            for (const ship of ships) {
                html += await generateShipCard(ship);
            }
            
            container.innerHTML = html;
        }
        
        async function loadShips() {
            const savedVariants = localStorage.getItem('voidfarer_selected_variants');
            if (savedVariants) selectedVariants = JSON.parse(savedVariants);
            
            await updateCreditsDisplay();
            
            const fuelCells = localStorage.getItem('voidfarer_fuel_cells') || '0';
            document.getElementById('fuelCells').textContent = fuelCells;
            
            const playerId = getPlayerId();
            const player = await getPlayer(playerId);
            document.getElementById('playerName').textContent = player?.name || `VOIDFARER #${playerId.slice(-4)}`;
            
            await refreshShipCards();
        }
        
        // ===== AUTO MARKET UPDATE =====
        let marketUpdateInterval = null;
        
        function startMarketUpdates() {
            if (marketUpdateInterval) clearInterval(marketUpdateInterval);
            marketUpdateInterval = setInterval(async () => {
                try {
                    if (typeof updatePrices === 'function') {
                        await updatePrices();
                        await refreshShipCards();
                        console.log('📊 Market prices updated (60s interval)');
                    }
                } catch (error) {
                    console.error('Market update failed:', error);
                }
            }, 60000);
            console.log('✅ Auto market updates started (every 60 seconds)');
        }
        
        function stopMarketUpdates() {
            if (marketUpdateInterval) {
                clearInterval(marketUpdateInterval);
                marketUpdateInterval = null;
            }
        }
        
        window.addEventListener('beforeunload', () => {
            stopMarketUpdates();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            loadShips();
            startMarketUpdates();
        });
        
        // Attach functions to window
        window.orderMaterials = orderMaterials;
        window.clearAllOrders = clearAllOrders;
        window.buildShip = buildShip;
        window.selectVariant = selectVariant;
        window.buyFuel = buyFuel;
        window.returnToEarthHub = returnToEarthHub;
    </script>
</body>
</html>
