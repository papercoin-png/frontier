<body>
    <div class="phone-frame">
        <div class="content">

                </div>
                <div class="top-bar-right">v4.0.0</div>
            </div>
            
            <div class="shipyard-title">
                <div class="title-icon">⛏️</div>
                <div class="title-main">MINING SHIPS</div>
                <div class="title-sub">TIER 1 - TIER 10</div>
            </div>

            </div>

                <div class="player-row">
                    <span class="player-name" id="playerName">VOIDFARER #1234</span>
                    <span class="player-badge">MINER</span>
                </div>
                <div class="credits-row">
                    <span>Available Credits</span>
                    <span class="credits-value" id="credits">5,000 ⭐</span>
                </div>
                <div class="fuel-row">
                    <span>⚡ Fuel Cells</span>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="fuel-value" id="fuelCells">0</span>
                        <button class="buy-fuel-btn" onclick="buyFuel()">BUY FUEL (10⭐)</button>
                    </div>
                </div>
            </div>
            
            <div class="ships-grid" id="shipsContainer">
                <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Loading shipyard...</div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="back-btn-fixed" onclick="returnToEarthHub()">
                <span class="back-icon">←</span>
                <span class="back-text">RETURN TO EARTH HUB</span>
            </div>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">PROCESSING...</div>
        </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== MARKET PRICE FUNCTIONS =====
        
        function getMarketPrice(element) {
            try {
                const pricesData = localStorage.getItem('voidfarer_current_prices');
                if (pricesData) {
                    const prices = JSON.parse(pricesData);
                    if (prices[element]) {
                        return prices[element].ask || prices[element].current || 100;
                    }
                }
            } catch (e) {}
            
            // Fallback prices based on rarity
            const rare = ['Titanium', 'Chromium', 'Nickel', 'Gold', 'Silver', 'Platinum', 'Copper', 'Zinc', 'Tin', 'Cobalt', 'Lead', 'Iridium', 'Manganese', 'Uranium', 'Thorium', 'Neodymium', 'Plutonium', 'Rhodium', 'Palladium', 'Osmium', 'Ruthenium', 'Technetium', 'Rhenium', 'Hafnium', 'Promethium'];
            const veryRare = ['Uranium', 'Thorium', 'Plutonium', 'Technetium', 'Promethium', 'Polonium', 'Radium', 'Actinium'];
            const legendary = ['Californium', 'Einsteinium', 'Fermium', 'Mendelevium', 'Nobelium', 'Lawrencium'];
            const uncommon = ['Carbon', 'Oxygen', 'Nitrogen', 'Iron', 'Silicon', 'Aluminum', 'Sulfur'];
            
            if (legendary.includes(element)) return 25000;
            if (veryRare.includes(element)) return 5000;
            if (rare.includes(element)) return 1000;
            if (uncommon.includes(element)) return 250;
            return 100;
        }
        
        function getPlayerCredits() {
            return parseInt(localStorage.getItem('voidfarer_credits') || '5000');
        }
        
        function updateCreditsDisplay() {
            document.getElementById('credits').textContent = getPlayerCredits().toLocaleString() + ' ⭐';
        }
        
        function getPlayerCollection() {
            try {
                return JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
            } catch (e) {
                return {};
            }
        }
        
        function addToCollection(element, quantity) {
            const collection = getPlayerCollection();
            if (!collection[element]) collection[element] = { count: 0 };
            collection[element].count = (collection[element].count || 0) + quantity;
            localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
        }
        
        function removeFromCollection(element, quantity) {
            const collection = getPlayerCollection();
            if (collection[element] && collection[element].count >= quantity) {
                collection[element].count -= quantity;
                if (collection[element].count <= 0) delete collection[element];
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                return true;
            }
            return false;
        }

        // ===== SHIP DATA =====
        
        const CARGO_CAPACITY = {
            1: 3700, 2: 4200, 3: 4800, 4: 5500,
            5: { drill: 6300, hauler: 12600, tank: 6300 },
            6: { drill: 7200, hauler: 14400, tank: 7200 },
            7: { drill: 8200, hauler: 16400, tank: 8200 },
            8: { drill: 9300, hauler: 18600, tank: 9300 },
            9: { drill: 10500, hauler: 21000, tank: 10500 },
            10: { drill: 11800, hauler: 23600, tank: 11800 }
        };
        
        const MINING_BONUS = {
            1: 0, 2: 20, 3: 40, 4: 60,
            5: { drill: 80, hauler: 40, tank: 80 },
            6: { drill: 100, hauler: 50, tank: 100 },
            7: { drill: 120, hauler: 60, tank: 120 },
            8: { drill: 140, hauler: 70, tank: 140 },
            9: { drill: 160, hauler: 80, tank: 160 },
            10: { drill: 180, hauler: 90, tank: 180 }
        };
        
        const HULL = {
            1: 100, 2: 110, 3: 120, 4: 130,
            5: { drill: 140, hauler: 140, tank: 196 },
            6: { drill: 150, hauler: 150, tank: 240 },
            7: { drill: 160, hauler: 160, tank: 288 },
            8: { drill: 170, hauler: 170, tank: 340 },
            9: { drill: 180, hauler: 180, tank: 396 },
            10: { drill: 200, hauler: 200, tank: 500 }
        };
        
        const FUEL_EFFICIENCY = {
            1: 1.0, 2: 0.97, 3: 0.94, 4: 0.91,
            5: { drill: 0.88, hauler: 1.05, tank: 0.82 },
            6: { drill: 0.85, hauler: 1.02, tank: 0.79 },
            7: { drill: 0.82, hauler: 0.99, tank: 0.76 },
            8: { drill: 0.79, hauler: 0.96, tank: 0.73 },
            9: { drill: 0.76, hauler: 0.93, tank: 0.70 },
            10: { drill: 0.73, hauler: 0.90, tank: 0.67 }
        };
        
        const BASE_WARP_SPEED = 25;
        
        const MINING_SHIPS = [

              variants: [

              ],

              variants: [
                  { id: 'singularity_drill', name: '⚡ Singularity Drill', miningBonus: MINING_BONUS[8].drill, cargo: CARGO_CAPACITY[8].drill, hull: HULL[8].drill, fuelEfficiency: FUEL_EFFICIENCY[8].drill, desc: '+140% mining speed • Standard cargo' },
                  { id: 'mass_hauler', name: '📦 Mass Hauler', miningBonus: MINING_BONUS[8].hauler, cargo: CARGO_CAPACITY[8].hauler, hull: HULL[8].hauler, fuelEfficiency: FUEL_EFFICIENCY[8].hauler, desc: '+70% mining speed • 2x cargo' },
                  { id: 'event_shield', name: '🛡️ Event Shield', miningBonus: MINING_BONUS[8].tank, cargo: CARGO_CAPACITY[8].tank, hull: HULL[8].tank, fuelEfficiency: FUEL_EFFICIENCY[8].tank, desc: '+140% mining speed • +100% hull' }
              ],
              elements: { 'Osmium': 400, 'Ruthenium': 360, 'Rhenium': 240, 'Hafnium': 200, 'Promethium': 160, 'Technetium': 200 } },
            { tier: 9, name: 'Quasar Drill', totalCost: 15000000, miningBonus: MINING_BONUS[9].drill, cargo: CARGO_CAPACITY[9].drill, hull: HULL[9].drill, speed: '0.76x',
              variants: [
                  { id: 'quasar_beam', name: '⚡ Quasar Beam', miningBonus: MINING_BONUS[9].drill, cargo: CARGO_CAPACITY[9].drill, hull: HULL[9].drill, fuelEfficiency: FUEL_EFFICIENCY[9].drill, desc: '+160% mining speed • Standard cargo' },
                  { id: 'void_freighter', name: '📦 Void Freighter', miningBonus: MINING_BONUS[9].hauler, cargo: CARGO_CAPACITY[9].hauler, hull: HULL[9].hauler, fuelEfficiency: FUEL_EFFICIENCY[9].hauler, desc: '+80% mining speed • 2x cargo' },
                  { id: 'quasar_armor', name: '🛡️ Quasar Armor', miningBonus: MINING_BONUS[9].tank, cargo: CARGO_CAPACITY[9].tank, hull: HULL[9].tank, fuelEfficiency: FUEL_EFFICIENCY[9].tank, desc: '+160% mining speed • +120% hull' }
              ],
              elements: { 'Rhenium': 500, 'Hafnium': 400, 'Californium': 200, 'Einsteinium': 160, 'Fermium': 120, 'Promethium': 240 } },
            { tier: 10, name: 'Event Horizon', totalCost: 40000000, miningBonus: MINING_BONUS[10].drill, cargo: CARGO_CAPACITY[10].drill, hull: HULL[10].drill, speed: '0.73x',
              variants: [
                  { id: 'horizon_drill', name: '⚡ Horizon Drill', miningBonus: MINING_BONUS[10].drill, cargo: CARGO_CAPACITY[10].drill, hull: HULL[10].drill, fuelEfficiency: FUEL_EFFICIENCY[10].drill, desc: '+180% mining speed • Standard cargo' },
                  { id: 'singularity_barge', name: '📦 Singularity Barge', miningBonus: MINING_BONUS[10].hauler, cargo: CARGO_CAPACITY[10].hauler, hull: HULL[10].hauler, fuelEfficiency: FUEL_EFFICIENCY[10].hauler, desc: '+90% mining speed • 2x cargo' },
                  { id: 'absolute_core', name: '🛡️ Absolute Core', miningBonus: MINING_BONUS[10].tank, cargo: CARGO_CAPACITY[10].tank, hull: HULL[10].tank, fuelEfficiency: FUEL_EFFICIENCY[10].tank, desc: '+180% mining speed • +150% hull' }
              ],
              elements: { 'Californium': 400, 'Einsteinium': 300, 'Fermium': 200, 'Mendelevium': 160, 'Nobelium': 120, 'Lawrencium': 100 } }
        ];
        
        let selectedVariants = {};
        
        function getElementIcon(element) {
            const icons = { 
                'Iron': '⚙️', 'Copper': '🔴', 'Titanium': '🔷', 'Carbon': '⚫', 'Aluminum': '🛸', 'Silicon': '💾', 
                'Nickel': '🔩', 'Chromium': '⚙️', 'Steel': '⚒️', 'Zinc': '⚡', 'Silver': '🥈', 'Cobalt': '🔵', 
                'Iridium': '💎', 'Manganese': '🔶', 'Lead': '⚪', 'Uranium': '☢️', 'Thorium': '🌡️', 'Neodymium': '🧲', 
                'Plutonium': '⚠️', 'Rhodium': '✨', 'Palladium': '🔘', 'Osmium': '💠', 'Ruthenium': '🔮', 'Technetium': '⚛️', 
                'Rhenium': '💠', 'Hafnium': '🔷', 'Promethium': '🔥', 'Californium': '⚛️', 'Einsteinium': '⚛️', 
                'Fermium': '⚛️', 'Mendelevium': '⚛️', 'Nobelium': '⚛️', 'Lawrencium': '⚛️'
            };
            return icons[element] || '📦';
        }
        
        function getCurrentVariant(ship) {
            if (!ship.variants) return null;
            const saved = selectedVariants[ship.tier];
            if (saved) return ship.variants.find(v => v.id === saved);
            return ship.variants[0];
        }
        
        function calculateMaterialCost(elements) {
            let total = 0;
            for (const [element, amount] of Object.entries(elements)) {
                total += amount * getMarketPrice(element);
            }
            return total;
        }
        
        // ===== AUTO-BUY FUNCTION (FIXED) =====
        window.autoBuyElement = async function(element, missingAmount) {
            event.stopPropagation();
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.classList.add('active');
            loadingText.textContent = `BUYING ${missingAmount} ${element.toUpperCase()}...`;
            
            try {
                const price = getMarketPrice(element);
                const totalCost = missingAmount * price;
                const currentCredits = getPlayerCredits();
                
                if (currentCredits < totalCost) {
                    alert(`Insufficient credits! Need ${totalCost.toLocaleString()}⭐`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Deduct credits
                localStorage.setItem('voidfarer_credits', (currentCredits - totalCost).toString());
                updateCreditsDisplay();
                
                // Add elements to inventory
                addToCollection(element, missingAmount);
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                // Refresh the ship cards to update counts
                await refreshShipCards();
                
                loadingOverlay.classList.remove('active');
                
            } catch (error) {
                console.error('Auto-buy error:', error);
                loadingOverlay.classList.remove('active');
                alert('Purchase failed: ' + error.message);
            }
        };
        
        // ===== BUILD SHIP FUNCTION =====
        window.buildShip = async function(shipName, tier) {
            const ship = MINING_SHIPS.find(s => s.tier === tier);
            if (!ship) return;
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            loadingOverlay.classList.add('active');
            loadingText.textContent = `CONSTRUCTING ${shipName.toUpperCase()}...`;
            
            try {
                const collection = getPlayerCollection();
                let allMet = true;
                for (const [element, needed] of Object.entries(ship.elements)) {
                    const have = collection[element]?.count || 0;
                    if (have < needed) { allMet = false; break; }
                }
                
                if (!allMet) {
                    alert('Insufficient materials! Use AUTO-BUY to purchase missing elements.');
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                const materialCost = calculateMaterialCost(ship.elements);
                const totalCost = materialCost * 2;
                const currentCredits = getPlayerCredits();
                
                if (currentCredits < totalCost) {
                    alert(`Insufficient credits! Need ${totalCost.toLocaleString()}⭐`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                // Remove materials
                for (const [element, amount] of Object.entries(ship.elements)) {
                    removeFromCollection(element, amount);
                }
                
                // Deduct credits
                localStorage.setItem('voidfarer_credits', (currentCredits - totalCost).toString());
                updateCreditsDisplay();
                
                // Add to fleet
                const playerShips = JSON.parse(localStorage.getItem('voidfarer_ships') || '[]');
                playerShips.push({
                    id: ship.tier,
                    name: ship.name,
                    variant: getCurrentVariant(ship)?.id || null,
                    builtAt: Date.now()
                });
                localStorage.setItem('voidfarer_ships', JSON.stringify(playerShips));
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                loadingOverlay.classList.remove('active');
                
                let message = `✅ ${shipName} successfully constructed!\n\n`;
                message += `Materials: ${materialCost.toLocaleString()}⭐\n`;
                message += `Labor: ${materialCost.toLocaleString()}⭐\n`;
                message += `Total: ${totalCost.toLocaleString()}⭐`;
                alert(message);
                
                await refreshShipCards();
                
            } catch (error) {
                console.error('Build error:', error);
                loadingOverlay.classList.remove('active');
                alert('Construction failed: ' + error.message);
            }
        };
        
        // ===== OTHER FUNCTIONS =====
        window.selectVariant = async function(tier, variantId) {
            selectedVariants[tier] = variantId;
            localStorage.setItem('voidfarer_selected_variants', JSON.stringify(selectedVariants));
            await refreshShipCards();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };
        
        window.buyFuel = function() {
            const credits = getPlayerCredits();
            const fuelCells = parseInt(localStorage.getItem('voidfarer_fuel_cells') || '0');
            if (credits >= 10) {
                localStorage.setItem('voidfarer_credits', (credits - 10).toString());
                localStorage.setItem('voidfarer_fuel_cells', (fuelCells + 1).toString());
                updateCreditsDisplay();
                document.getElementById('fuelCells').textContent = fuelCells + 1;
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                alert('Insufficient credits! Need 10⭐ for 1 fuel cell.');
            }
        };
        
        window.returnToEarthHub = function() {
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'RETURNING TO HUB...';
            setTimeout(() => { window.location.href = 'earth-hub.html'; }, 500);
        };
        
        // ===== GENERATE SHIP CARD =====
        async function generateShipCard(ship) {
            const variant = getCurrentVariant(ship);
            let miningBonus = variant ? variant.miningBonus : ship.miningBonus;
            let cargo = variant ? variant.cargo : ship.cargo;
            let hull = variant ? variant.hull : ship.hull;
            let fuelEfficiency = variant ? variant.fuelEfficiency : ship.fuelEfficiency;
            
            const materialCost = calculateMaterialCost(ship.elements);
            const totalCost = materialCost * 2;
            const playerCredits = getPlayerCredits();
            const canAfford = playerCredits >= totalCost;
            const collection = getPlayerCollection();
            
            let requirementsHtml = '';
            let allMet = true;
            
            for (const [element, needed] of Object.entries(ship.elements)) {
                const have = collection[element]?.count || 0;
                const met = have >= needed;
                if (!met) allMet = false;
                const price = getMarketPrice(element);
                const missing = Math.max(0, needed - have);
                const buyCost = missing * price;
                
                requirementsHtml += `
                    <div class="requirement-item">
                        <div class="requirement-info">
                            <span class="requirement-icon">${getElementIcon(element)}</span>
                            <div>
                                <div class="requirement-name">${element}</div>
                                <div class="requirement-need">Need ${needed.toLocaleString()} units</div>
                            </div>
                        </div>
                        <div class="requirement-status">
                            <div class="requirement-have">${have.toLocaleString()}/${needed.toLocaleString()}</div>
                            <div class="requirement-cost">${(needed * price).toLocaleString()}⭐</div>
                        </div>
                        <span class="${met ? 'requirement-met' : 'requirement-unmet'}">${met ? '✓' : '✗'}</span>
                    </div>
                `;
                
                if (!met) {
                    requirementsHtml += `
                        <div class="auto-buy-row">
                            <div class="auto-buy-info">
                                <span class="auto-buy-text">Missing ${missing.toLocaleString()} ${element}</span>
                                <span class="auto-buy-cost">${buyCost.toLocaleString()}⭐</span>
                            </div>
                            <button class="auto-buy-btn" onclick="autoBuyElement('${element}', ${missing})">AUTO-BUY</button>
                        </div>
                    `;
                }
            }
            
            let variantHtml = '';
            let variantDescHtml = '';
            if (ship.variants) {
                variantHtml = `
                    <div class="variant-selector">
                        ${ship.variants.map(v => `
                            <div class="variant-btn ${selectedVariants[ship.tier] === v.id ? 'active' : ''}" 
                                 onclick="selectVariant(${ship.tier}, '${v.id}')">${v.name}</div>
                        `).join('')}
                    </div>
                `;
                if (variant) variantDescHtml = `<div class="variant-desc">✨ ${variant.desc}</div>`;
            }
            
            const canBuild = allMet && canAfford;
            const starterBadge = ship.starter ? '<span class="tier-badge starter-badge">⭐ STARTER SHIP • NO BONUSES</span>' : `<span class="tier-badge">TIER ${ship.tier} MINING VESSEL</span>`;
            const warpSpeed = Math.round(BASE_WARP_SPEED / fuelEfficiency);
            const fuelCostPer100LY = Math.round(10 * fuelEfficiency);
            
            return `
                <div class="ship-card">
                    ${starterBadge}
                    <div class="ship-header">
                        <div class="ship-icon">${ship.tier === 1 ? '🛸' : ship.tier === 2 ? '⛏️' : ship.tier === 3 ? '⚙️' : ship.tier === 4 ? '🔷' : ship.tier === 5 ? '💎' : ship.tier === 6 ? '🌑' : ship.tier === 7 ? '🌀' : ship.tier === 8 ? '⚫' : ship.tier === 9 ? '💫' : '🌌'}</div>
                        <div class="ship-title">
                            <div class="ship-name">${ship.name}</div>
                            <div class="ship-tier">+${miningBonus}% Mining Yield</div>
                        </div>
                    </div>
                    ${variantHtml}
                    ${variantDescHtml}
                    <div class="ship-stats">
                        <div class="stat-row"><span class="stat-label">MINING BONUS</span><span class="stat-value">+${miningBonus}%</span></div>
                        <div class="stat-row"><span class="stat-label">CARGO (AMU)</span><span class="stat-value">${cargo.toLocaleString()}</span></div>
                        <div class="stat-row"><span class="stat-label">HULL</span><span class="stat-value">${hull}</span></div>
                        <div class="stat-row"><span class="stat-label">WARP SPEED</span><span class="stat-value">${warpSpeed} LY/min</span></div>
                    </div>
                    <div class="cost-summary">
                        <div class="cost-row"><span class="cost-label">Materials Cost:</span><span class="cost-value">${materialCost.toLocaleString()} ⭐</span></div>
                        <div class="cost-row"><span class="cost-label">Labor Cost:</span><span class="cost-value">${materialCost.toLocaleString()} ⭐</span></div>
                        <div class="cost-row total-row"><span class="cost-label">TOTAL COST:</span><span class="cost-total">${totalCost.toLocaleString()} ⭐</span></div>
                        <div class="labor-note">👷 Labor fees distributed to certificate holders</div>
                        <div class="fuel-note">⚡ Fuel cost: ${fuelCostPer100LY}⭐ per 100 LY</div>
                        <div class="price-note">📊 Prices update dynamically from VoidEx market</div>
                    </div>
                    <div class="requirements-section">
                        <div class="requirements-title">⚒️ CONSTRUCTION REQUIREMENTS</div>
                        ${requirementsHtml}
                    </div>
                    <div class="build-btn ${!canBuild ? 'disabled' : ''}" onclick="${canBuild ? `buildShip('${ship.name}', ${ship.tier})` : ''}">
                        ${canBuild ? '🚀 CONSTRUCT SHIP' : (allMet ? '⚠️ INSUFFICIENT CREDITS' : '⚠️ MISSING MATERIALS')}
                    </div>
                    ${ship.tier === 10 ? '<div class="achievement-badge">🏆 ENDGAME VESSEL</div>' : ''}
                    ${ship.tier === 5 ? '<div class="achievement-badge">⚡ VARIANT SYSTEM UNLOCKED</div>' : ''}
                </div>
            `;
        }
        
        async function refreshShipCards() {
            const container = document.getElementById('shipsContainer');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Loading shipyard...</div>';
            let html = '';
            for (const ship of MINING_SHIPS) {
                html += await generateShipCard(ship);
            }
            container.innerHTML = html;
        }
        
        async function loadShips() {
            const savedVariants = localStorage.getItem('voidfarer_selected_variants');
            if (savedVariants) selectedVariants = JSON.parse(savedVariants);
            updateCreditsDisplay();
            document.getElementById('fuelCells').textContent = localStorage.getItem('voidfarer_fuel_cells') || '0';
            const playerId = localStorage.getItem('voidfarer_player_id') || '1234';
            document.getElementById('playerName').textContent = `VOIDFARER #${playerId.slice(-4)}`;
            await refreshShipCards();
        }
        
        document.addEventListener('DOMContentLoaded', () => loadShips());
    </script>
