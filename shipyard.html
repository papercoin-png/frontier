        const tg = window.Telegram?.WebApp;

        // ===== MARKET PRICE FUNCTIONS =====
        
        /**
         * Get current market price for a single element
         * @param {string} element - Element name
         * @returns {Promise<number>} Current price in credits
         */
        async function getMarketPrice(element) {
            try {
                // Check localStorage first (updated by VoidEx or auto-refresh)
                const savedPrices = localStorage.getItem('voidfarer_market_prices');
                if (savedPrices) {
                    const prices = JSON.parse(savedPrices);
                    if (prices[element] !== undefined) {
                        return prices[element];
                    }
                }
                
                // Fallback to default
                console.log(`No market price found for ${element}, using default 5⭐`);
                return 5;
            } catch (error) {
                console.error('Error fetching market price:', error);
                return 5;
            }
        }

        /**
         * Get current market prices for multiple elements
         * @param {Array} elements - Array of element names
         * @returns {Promise<Object>} Object with element-price pairs
         */
        async function getMarketPrices(elements) {
            const prices = {};
            const uniqueElements = [...new Set(elements)]; // Remove duplicates
            
            // Fetch prices in parallel for efficiency
            const pricePromises = uniqueElements.map(async (element) => {
                prices[element] = await getMarketPrice(element);
            });
            
            await Promise.all(pricePromises);
            return prices;
        }

        /**
         * Auto-update market prices with random walk simulation
         * This ensures prices change even if no one visits VoidEx
         */
        function autoUpdateMarketPrices() {
            try {
                const savedPrices = localStorage.getItem('voidfarer_market_prices');
                if (!savedPrices) {
                    // Initialize with default prices if none exist
                    const defaultPrices = {
                        'Iron': 2, 'Copper': 3, 'Titanium': 8, 'Aluminum': 4,
                        'Carbon': 5, 'Silicon': 6, 'Gold': 25, 'Platinum': 40,
                        'Nickel': 7, 'Chromium': 9, 'Tin': 10, 'Zinc': 8,
                        'Steel': 6, 'Tungsten': 15
                    };
                    localStorage.setItem('voidfarer_market_prices', JSON.stringify(defaultPrices));
                    return;
                }
                
                const prices = JSON.parse(savedPrices);
                
                // Random walk price changes (-3% to +3%)
                for (const [element, price] of Object.entries(prices)) {
                    // More volatile for rare elements
                    const volatility = element.includes('Gold') || element.includes('Platinum') || element.includes('Tungsten') ? 0.05 : 0.03;
                    const change = (Math.random() * volatility * 2 - volatility);
                    // Ensure price never goes below 1
                    prices[element] = Math.max(1, Math.round(price * (1 + change)));
                }
                
                localStorage.setItem('voidfarer_market_prices', JSON.stringify(prices));
                console.log('📈 Market prices auto-updated at', new Date().toLocaleTimeString());
            } catch (error) {
                console.error('Error auto-updating prices:', error);
            }
        }

        // ===== CALCULATE TOTAL COST USING LIVE MARKET PRICES =====
        async function calculateTotalCost(requirements) {
            let total = 0;
            const elements = Object.keys(requirements);
            const prices = await getMarketPrices(elements);
            
            for (const [element, amount] of Object.entries(requirements)) {
                const price = prices[element] || 5;
                total += amount * price;
            }
            return total;
        }

        // ===== CHECK IF PLAYER HAS ENOUGH ELEMENTS =====
        async function checkElementAvailability(requirements) {
            const collection = await window.getCollection?.() || {};
            const elements = Object.keys(requirements);
            const prices = await getMarketPrices(elements);
            
            const availability = {};
            let allMet = true;
            
            for (const [element, needed] of Object.entries(requirements)) {
                const have = collection[element]?.count || 0;
                const met = have >= needed;
                availability[element] = {
                    have,
                    needed,
                    met,
                    price: prices[element] || 5
                };
                if (!met) allMet = false;
            }
            
            return { availability, allMet };
        }

        // ===== GET ELEMENT ICON =====
        function getElementIcon(element) {
            const icons = {
                'Iron': '⚙️',
                'Copper': '🔴',
                'Titanium': '🔷',
                'Aluminum': '🛸',
                'Carbon': '⚫',
                'Silicon': '💾',
                'Gold': '🟡',
                'Platinum': '⚪',
                'Nickel': '🔩',
                'Chromium': '⚙️',
                'Tin': '🥫',
                'Zinc': '⚡',
                'Steel': '⚒️',
                'Tungsten': '💎'
            };
            return icons[element] || '📦';
        }

        // ===== GENERATE SHIP CARD HTML =====
        async function generateShipCard(ship) {
            const { availability, allMet } = await checkElementAvailability(ship.requirements);
            const materialCost = await calculateTotalCost(ship.requirements);
            const laborCost = materialCost; // Labor cost equals material cost
            const totalCost = materialCost + laborCost;
            const playerCredits = parseInt(localStorage.getItem('voidfarer_credits') || '5000');
            const canAfford = playerCredits >= totalCost;
            
            // Get current timestamp for display
            const lastUpdate = localStorage.getItem('voidfarer_prices_last_update') 
                ? new Date(parseInt(localStorage.getItem('voidfarer_prices_last_update'))).toLocaleTimeString() 
                : 'just now';
            
            let requirementsHtml = '';
            for (const [element, needed] of Object.entries(ship.requirements)) {
                const have = availability[element]?.have || 0;
                const price = availability[element]?.price || 5;
                const met = have >= needed;
                const missing = Math.max(0, needed - have);
                const buyCost = missing * price;
                
                requirementsHtml += `
                    <div class="requirement-item">
                        <div class="requirement-info">
                            <span class="requirement-icon">${getElementIcon(element)}</span>
                            <div>
                                <div class="requirement-name">${element}</div>
                                <div class="requirement-need">Need ${needed}</div>
                            </div>
                        </div>
                        <div class="requirement-status">
                            <div class="requirement-have">${have}/${needed}</div>
                            <div class="requirement-cost">${(needed * price).toLocaleString()}⭐</div>
                        </div>
                        <span class="${met ? 'requirement-met' : 'requirement-unmet'}">${met ? '✓' : '✗'}</span>
                    </div>
                `;
                
                if (!met) {
                    requirementsHtml += `
                        <div class="auto-buy-row" onclick="event.stopPropagation()">
                            <div class="auto-buy-info">
                                <span class="auto-buy-text">Missing ${missing} ${element}</span>
                                <span class="auto-buy-cost">${buyCost.toLocaleString()}⭐</span>
                            </div>
                            <button class="auto-buy-btn" onclick="autoBuyElement('${element}', ${missing}, '${ship.id}')">
                                AUTO-BUY
                            </button>
                        </div>
                    `;
                }
            }
            
            const canBuild = allMet && canAfford;
            
            return `
                <div class="ship-card" id="ship-${ship.id}">
                    <div class="ship-header">
                        <div class="ship-icon">${ship.icon}</div>
                        <div class="ship-title">
                            <div class="ship-name">${ship.name}</div>
                            <div class="ship-tier">${ship.type}</div>
                        </div>
                    </div>
                    
                    <div class="ship-stats">
                        <div class="stat-row">
                            <span class="stat-label">CARGO</span>
                            <span class="stat-value">${ship.stats.cargo}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">MINING</span>
                            <span class="stat-value">${ship.stats.mining || '1.0x'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">SPEED</span>
                            <span class="stat-value">${ship.stats.speed || '1.0x'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">FUEL</span>
                            <span class="stat-value">${ship.stats.fuel || 'Standard'}</span>
                        </div>
                    </div>
                    
                    <div class="requirements-section">
                        <div class="requirements-title">⚒️ Construction Requirements</div>
                        ${requirementsHtml}
                        <div class="market-note">* Prices reflect current market value</div>
                        <div class="price-update-note">⏱️ Updated: ${lastUpdate}</div>
                    </div>
                    
                    <div class="cost-summary">
                        <div class="cost-row">
                            <span class="cost-label">Materials Cost:</span>
                            <span class="cost-value">${materialCost.toLocaleString()} ⭐</span>
                        </div>
                        <div class="cost-row">
                            <span class="cost-label">Labor Cost:</span>
                            <span class="cost-value">${laborCost.toLocaleString()} ⭐</span>
                        </div>
                        <div class="cost-row total-row">
                            <span class="cost-label">TOTAL COST:</span>
                            <span class="cost-total">${totalCost.toLocaleString()} ⭐</span>
                        </div>
                        <div class="labor-note">
                            👷 ${laborCost.toLocaleString()}⭐ goes to ${ship.requiredCertificate} certificate holders
                        </div>
                        <div class="cost-note">Labor equals material cost • Market prices update automatically</div>
                    </div>
                    
                    <div class="build-btn ${!canBuild ? 'disabled' : ''}" 
                         onclick="${canBuild ? `buildShip('${ship.id}')` : ''}">
                        ${canBuild ? '🚀 BUILD NOW' : allMet ? '⚠️ INSUFFICIENT CREDITS' : '⚠️ MISSING MATERIALS'}
                    </div>
                </div>
            `;
        }

        // ===== AUTO-BUY FUNCTION =====
        window.autoBuyElement = async function(element, quantity, shipId) {
            event.stopPropagation();
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = `BUYING ${quantity} ${element.toUpperCase()}...`;
            
            try {
                const price = await getMarketPrice(element);
                const totalCost = quantity * price;
                const currentCredits = parseInt(localStorage.getItem('voidfarer_credits') || '5000');
                
                if (currentCredits < totalCost) {
                    alert(`Insufficient credits! Need ${totalCost.toLocaleString()}⭐`);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    return;
                }
                
                // Deduct credits
                localStorage.setItem('voidfarer_credits', (currentCredits - totalCost).toString());
                
                // Add elements to inventory
                await window.addElementToCollection?.(element, quantity);
                
                // Success feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                // Refresh ship cards
                await refreshShipCards();
                
                // Update credits display
                document.getElementById('credits').textContent = parseInt(localStorage.getItem('voidfarer_credits') || '5000').toLocaleString() + ' ⭐';
                
                document.getElementById('loadingOverlay').classList.remove('active');
                
            } catch (error) {
                console.error('Auto-buy error:', error);
                document.getElementById('loadingOverlay').classList.remove('active');
                alert('Purchase failed: ' + error.message);
            }
        };

        // ===== BUILD SHIP =====
        window.buildShip = async function(shipId) {
            const ship = TIER1_SHIPS.find(s => s.id === shipId);
            if (!ship) return;
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = `CONSTRUCTING ${ship.name.toUpperCase()}...`;
            
            try {
                // Check materials again
                const { allMet } = await checkElementAvailability(ship.requirements);
                if (!allMet) {
                    alert('Insufficient materials!');
                    document.getElementById('loadingOverlay').classList.remove('active');
                    return;
                }
                
                // Calculate total cost with current market prices
                const materialCost = await calculateTotalCost(ship.requirements);
                const laborCost = materialCost;
                const totalCost = materialCost + laborCost;
                const currentCredits = parseInt(localStorage.getItem('voidfarer_credits') || '5000');
                
                if (currentCredits < totalCost) {
                    alert(`Insufficient credits! Need ${totalCost.toLocaleString()}⭐`);
                    document.getElementById('loadingOverlay').classList.remove('active');
                    return;
                }
                
                // Remove materials from inventory
                for (const [element, amount] of Object.entries(ship.requirements)) {
                    await window.removeElementFromCollection?.(element, amount);
                }
                
                // Deduct total cost
                localStorage.setItem('voidfarer_credits', (currentCredits - totalCost).toString());
                
                // Add labor cost to labor pool for certificate holders
                if (typeof window.addLaborFromBuild === 'function') {
                    window.addLaborFromBuild(ship.id, laborCost);
                    console.log(`Added ${laborCost}⭐ labor to pool for ${ship.requiredCertificate} holders`);
                } else {
                    console.warn('Labor pool function not available');
                }
                
                // Add ship to player's fleet
                const playerShips = JSON.parse(localStorage.getItem('voidfarer_ships') || '[]');
                playerShips.push({
                    id: ship.id,
                    name: ship.name,
                    builtAt: Date.now(),
                    builtDate: new Date().toISOString()
                });
                localStorage.setItem('voidfarer_ships', JSON.stringify(playerShips));
                
                // Show success
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.remove('active');
                    
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred?.('success');
                    }
                    
                    alert(`✅ ${ship.name} successfully constructed!\n\nShip added to your fleet.\nTotal cost: ${totalCost.toLocaleString()}⭐\nLabor: ${laborCost.toLocaleString()}⭐ distributed to ${ship.requiredCertificate} certificate holders`);
                    
                    // Refresh the page to update counts
                    window.location.reload();
                }, 1500);
                
            } catch (error) {
                console.error('Error building ship:', error);
                document.getElementById('loadingOverlay').classList.remove('active');
                alert('Construction failed: ' + error.message);
            }
        };

        // ===== REFRESH SHIP CARDS =====
        async function refreshShipCards() {
            const container = document.getElementById('shipsContainer');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Updating prices...</div>';
            
            let html = '';
            for (const ship of TIER1_SHIPS) {
                const cardHtml = await generateShipCard(ship);
                html += cardHtml;
            }
            container.innerHTML = html;
            
            // Update timestamp
            localStorage.setItem('voidfarer_prices_last_update', Date.now().toString());
        }

        // ===== NAVIGATION =====
        window.returnToEarthHub = function() {
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'RETURNING TO HUB...';
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Navigate back to Earth Hub
            setTimeout(() => {
                window.location.href = 'earth-hub.html';
            }, 500);
        };

        // ===== LOAD SHIPS =====
        async function loadShips() {
            try {
                const container = document.getElementById('shipsContainer');
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Loading shipyard...</div>';
                
                // Load each ship card sequentially
                let html = '';
                for (const ship of TIER1_SHIPS) {
                    const cardHtml = await generateShipCard(ship);
                    html += cardHtml;
                }
                container.innerHTML = html;
                
                // Update player credits display
                const credits = localStorage.getItem('voidfarer_credits') || '5000';
                document.getElementById('credits').textContent = parseInt(credits).toLocaleString() + ' ⭐';
                
                // Update player name
                const playerId = localStorage.getItem('voidfarer_player_id') || '1234';
                document.getElementById('playerName').textContent = `VOIDFARER #${playerId.slice(-4)}`;
                
            } catch (error) {
                console.error('Error loading ships:', error);
                document.getElementById('shipsContainer').innerHTML = '<div style="text-align: center; padding: 40px; color: #ff6b6b;">Error loading shipyard</div>';
            }
        }

        // ===== AUTO-REFRESH PRICES =====
        let priceRefreshInterval;
        let autoUpdateInterval;
        
        function startPriceRefresh() {
            // Clear any existing intervals
            if (priceRefreshInterval) {
                clearInterval(priceRefreshInterval);
            }
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
            }
            
            // Refresh display every 30 seconds (reads from localStorage)
            priceRefreshInterval = setInterval(async () => {
                console.log('Refreshing ship display with current prices...');
                await refreshShipCards();
            }, 30000);
            
            // Auto-update market prices every 5 minutes (simulates market activity)
            autoUpdateInterval = setInterval(() => {
                console.log('Auto-updating market prices...');
                autoUpdateMarketPrices();
                // Also update the timestamp
                localStorage.setItem('voidfarer_prices_last_update', Date.now().toString());
            }, 300000); // 5 minutes
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            loadShips();
            startPriceRefresh();
        });

        // Clean up intervals on page unload
        window.addEventListener('beforeunload', () => {
            if (priceRefreshInterval) {
                clearInterval(priceRefreshInterval);
            }
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
            }
        });
    </script>
</body>
</html>
