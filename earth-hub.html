<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Earth Hub</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .earth-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a2a3a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #4a8a9a;
            animation: pulse 1.5s infinite;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #4a9a8a;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .earth-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .earth-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #c0e0ff;
            text-shadow: 0 0 20px #4a8a6a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
        }
        
        .earth-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .cargo-value {
            font-size: 14px;
            color: #a0d0c0;
            text-align: right;
        }
        
        /* Location Bar */
        .location-bar {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-size: 14px;
        }
        
        /* ===== MARKET CARD ===== */
        .market-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px #2a5a5a;
        }
        
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .market-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .market-title span {
            font-size: 24px;
        }
        
        .market-value {
            color: #ffd966;
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Rarity Groups */
        .rarity-group {
            margin-bottom: 12px;
            border: 1px solid #4a9a8a;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
        }
        
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(30, 70, 80, 0.5);
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .group-header:active {
            background: rgba(50, 110, 120, 0.7);
        }
        
        .group-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .group-name {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            min-width: 80px;
        }
        
        .group-count {
            color: #ffd966;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 30px;
        }
        
        .group-price {
            color: #4affaa;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
        }
        
        .group-arrow {
            color: #a0d0c0;
            font-size: 18px;
            transition: transform 0.3s;
        }
        
        .group-header.expanded .group-arrow {
            transform: rotate(90deg);
        }
        
        /* Expanded Items */
        .group-items {
            display: none;
            padding: 10px;
            background: rgba(20, 50, 60, 0.4);
            border-top: 1px solid #4a9a8a;
        }
        
        .group-items.show {
            display: block;
        }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(74, 154, 138, 0.3);
        }
        
        .item-row:last-child {
            border-bottom: none;
        }
        
        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .item-icon {
            font-size: 24px;
            min-width: 30px;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 16px;
        }
        
        .item-quantity {
            color: #ffd966;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .item-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .item-price {
            color: #4affaa;
            font-size: 14px;
            font-weight: 600;
            min-width: 60px;
            text-align: right;
        }
        
        .sell-btn {
            background: rgba(74, 154, 138, 0.3);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 30px 8px 30px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 50px;
            text-align: center;
        }
        
        .sell-btn:active {
            background: #4a9a8a;
            transform: scale(0.95);
        }
        
        .sell-btn.small {
            padding: 4px 8px;
            font-size: 11px;
            min-width: 40px;
        }
        
        /* Group Actions */
        .group-actions {
            display: flex;
            gap: 10px;
            padding: 10px;
            justify-content: flex-end;
        }
        
        .group-action-btn {
            background: rgba(74, 154, 138, 0.2);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 30px 8px 30px 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .group-action-btn:active {
            background: #4a9a8a;
            transform: scale(0.95);
        }
        
        /* Quick Sell Bar */
        .quick-sell {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #4a9a8a;
        }
        
        .quick-sell-btn {
            flex: 1;
            background: rgba(255, 170, 74, 0.2);
            border: 1px solid #ffaa4a;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        
        .quick-sell-btn:active {
            background: #ffaa4a;
            transform: scale(0.96);
        }
        
        /* Total Value Row */
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px 8px 30px 8px;
            color: #ffffff;
        }
        
        .total-label {
            color: #a0d0c0;
        }
        
        .total-amount {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Hub Cards */
        .hub-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .hub-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .hub-card:active {
            background: rgba(50, 100, 110, 0.7);
            transform: scale(0.99);
            border-color: #7ac0b0;
        }
        
        .card-icon {
            font-size: 42px;
            min-width: 60px;
            text-align: center;
            filter: drop-shadow(0 0 15px #4a9a8a);
        }
        
        .card-content {
            flex: 1;
        }
        
        .card-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            font-family: 'Libre Baskerville', serif;
        }
        
        .card-desc {
            color: #a0d0c0;
            font-size: 14px;
            line-height: 1.3;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 60, 70, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #6aa0a0;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
            width: fit-content;
            box-shadow: 0 0 30px #2a5a5a;
            z-index: 100;
            margin-top: 10px;
        }
        
        .back-button:active {
            background: #4a9a8a;
            transform: translateX(-50%) scale(0.98);
        }
        
        /* Rarity colors */
        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #b0ffb0; }
        .rarity-rare { color: #b0b0ff; }
        .rarity-very-rare { color: #e0b0ff; }
        .rarity-legendary { color: #ffd700; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="earth-view" id="earthView">
            <!-- Header -->
            <div class="earth-header">
                <div class="earth-title">Earth Central</div>
                <div class="earth-subtitle">✦ home port ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar" id="statsBar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> 12,450
                </div>
                <div class="cargo-value" id="cargoDisplay">
                    Cargo: 45/100<br>
                    47 items
                </div>
            </div>
            
            <!-- Location Bar -->
            <div class="location-bar">
                <span>📍 Earth • Sol System</span>
                <span class="coordinates">Sector B2</span>
            </div>
            
            <!-- MARKET CARD -->
            <div class="market-card">
                <div class="market-header">
                    <div class="market-title">
                        <span>🏪</span> Element Market
                    </div>
                    <div class="market-value" id="totalMarketValue">0⭐</div>
                </div>
                
                <!-- Rarity Groups Container -->
                <div id="marketGroups"></div>
                
                <!-- Quick Sell Bar -->
                <div class="quick-sell">
                    <button class="quick-sell-btn" onclick="quickSell(100)">100⭐</button>
                    <button class="quick-sell-btn" onclick="quickSell(500)">500⭐</button>
                    <button class="quick-sell-btn" onclick="quickSell(1000)">1000⭐</button>
                    <button class="quick-sell-btn" onclick="quickSell('all')">ALL</button>
                </div>
                
                <!-- Total Value Row -->
                <div class="total-row">
                    <span class="total-label">Your Credits:</span>
                    <span class="total-amount" id="creditsAmount">12,450⭐</span>
                </div>
            </div>
            
            <!-- Other Hub Cards -->
            <div class="hub-grid">
                <div class="hub-card" onclick="navigateTo('ship-bridge.html')">
                    <div class="card-icon">🚀</div>
                    <div class="card-content">
                        <div class="card-title">Return to Ship</div>
                        <div class="card-desc">Back to the bridge</div>
                    </div>
                </div>
                
                <div class="hub-card" onclick="navigateTo('cargo.html')">
                    <div class="card-icon">📦</div>
                    <div class="card-content">
                        <div class="card-title">Cargo Hold</div>
                        <div class="card-desc">Manage inventory</div>
                    </div>
                </div>
                
                <div class="hub-card" onclick="navigateTo('settings.html')">
                    <div class="card-icon">⚙️</div>
                    <div class="card-content">
                        <div class="card-title">Settings</div>
                        <div class="card-desc">Game options</div>
                    </div>
                </div>
            </div>
            
            <!-- Back button to main menu -->
            <button class="back-button" onclick="returnToMenu()">← MAIN MENU</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">trading...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a2a3a');
            tg.setBackgroundColor('#0a2a3a');
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Navigation
        function navigateTo(screen) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            loadingOverlay.classList.add('active');
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = screen;
            }, 300);
        }
        
        function returnToMenu() {
            navigateTo('index.html');
        }
        
        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            // Common
            'Carbon': { icon: '⚫', rarity: 'common', value: 100 },
            'Silicon': { icon: '💎', rarity: 'common', value: 100 },
            'Hydrogen': { icon: '💧', rarity: 'common', value: 100 },
            'Helium': { icon: '🎈', rarity: 'common', value: 100 },
            'Sodium': { icon: '🧂', rarity: 'common', value: 100 },
            
            // Uncommon
            'Iron': { icon: '⚙️', rarity: 'uncommon', value: 250 },
            'Oxygen': { icon: '💨', rarity: 'uncommon', value: 250 },
            'Nickel': { icon: '🔩', rarity: 'uncommon', value: 250 },
            'Sulfur': { icon: '🟡', rarity: 'uncommon', value: 250 },
            
            // Rare
            'Gold': { icon: '🟡', rarity: 'rare', value: 1000 },
            'Silver': { icon: '⚪', rarity: 'rare', value: 1000 },
            'Platinum': { icon: '⬜', rarity: 'rare', value: 1000 },
            'Titanium': { icon: '🔷', rarity: 'rare', value: 1000 },
            'Copper': { icon: '🔴', rarity: 'rare', value: 1000 },
            
            // Very Rare
            'Uranium': { icon: '🟣', rarity: 'very-rare', value: 5000 },
            'Thorium': { icon: '🔮', rarity: 'very-rare', value: 5000 },
            'Plutonium': { icon: '☢️', rarity: 'very-rare', value: 5000 },
            
            // Legendary
            'Promethium': { icon: '✨', rarity: 'legendary', value: 25000 },
            'Technetium': { icon: '🧪', rarity: 'legendary', value: 25000 }
        };
        
        // State
        let expandedGroup = null;
        let collection = {};
        let credits = 0;
        
        // Load data
        function loadData() {
            collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            credits = parseInt(localStorage.getItem('voidfarer_credits')) || 12450;
            
            document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;
            document.getElementById('creditsAmount').textContent = credits.toLocaleString() + '⭐';
            
            const itemCount = Object.keys(collection).length;
            const cargoUsed = Math.min(itemCount * 2, 100);
            document.getElementById('cargoDisplay').innerHTML = `Cargo: ${cargoUsed}/100<br>${itemCount} items`;
            
            renderMarket();
        }
        
        // Group elements by rarity
        function groupElements() {
            const groups = {
                common: { name: 'Common', elements: [], totalCount: 0, totalValue: 0 },
                uncommon: { name: 'Uncommon', elements: [], totalCount: 0, totalValue: 0 },
                rare: { name: 'Rare', elements: [], totalCount: 0, totalValue: 0 },
                'very-rare': { name: 'Very Rare', elements: [], totalCount: 0, totalValue: 0 },
                legendary: { name: 'Legendary', elements: [], totalCount: 0, totalValue: 0 }
            };
            
            Object.keys(collection).forEach(elementName => {
                const elementData = elementDatabase[elementName] || { 
                    icon: '🔹', 
                    rarity: 'common', 
                    value: 100 
                };
                const count = collection[elementName].count || 1;
                
                if (groups[elementData.rarity]) {
                    groups[elementData.rarity].elements.push({
                        name: elementName,
                        count: count,
                        icon: elementData.icon,
                        value: elementData.value,
                        totalValue: count * elementData.value
                    });
                    groups[elementData.rarity].totalCount += count;
                    groups[elementData.rarity].totalValue += count * elementData.value;
                }
            });
            
            return groups;
        }
        
        // Render market
        function renderMarket() {
            const groups = groupElements();
            const container = document.getElementById('marketGroups');
            container.innerHTML = '';
            
            let totalMarketValue = 0;
            const rarityOrder = ['legendary', 'very-rare', 'rare', 'uncommon', 'common'];
            
            rarityOrder.forEach(rarity => {
                const group = groups[rarity];
                if (group.elements.length === 0) return;
                
                totalMarketValue += group.totalValue;
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'rarity-group';
                groupDiv.id = `group-${rarity}`;
                
                // Group Header
                const header = document.createElement('div');
                header.className = `group-header ${expandedGroup === rarity ? 'expanded' : ''}`;
                header.onclick = () => toggleGroup(rarity);
                
                let rarityColor = 'rarity-common';
                if (rarity === 'uncommon') rarityColor = 'rarity-uncommon';
                else if (rarity === 'rare') rarityColor = 'rarity-rare';
                else if (rarity === 'very-rare') rarityColor = 'rarity-very-rare';
                else if (rarity === 'legendary') rarityColor = 'rarity-legendary';
                
                header.innerHTML = `
                    <div class="group-info">
                        <span class="group-name ${rarityColor}">${group.name}</span>
                        <span class="group-count">${group.totalCount}</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="group-price">${group.totalValue.toLocaleString()}⭐</span>
                        <span class="group-arrow">▶</span>
                    </div>
                `;
                
                groupDiv.appendChild(header);
                
                // Group Items (expanded)
                const itemsDiv = document.createElement('div');
                itemsDiv.className = `group-items ${expandedGroup === rarity ? 'show' : ''}`;
                
                group.elements.forEach(element => {
                    const itemRow = document.createElement('div');
                    itemRow.className = 'item-row';
                    itemRow.innerHTML = `
                        <div class="item-info">
                            <span class="item-icon">${element.icon}</span>
                            <span class="item-name">${element.name}</span>
                            <span class="item-quantity">x${element.count}</span>
                        </div>
                        <div class="item-actions">
                            <span class="item-price">${element.value}⭐</span>
                            <button class="sell-btn small" onclick="sellElement('${element.name}', 1, event)">SELL</button>
                        </div>
                    `;
                    itemsDiv.appendChild(itemRow);
                });
                
                // Group Actions
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'group-actions';
                actionsDiv.innerHTML = `
                    <button class="group-action-btn" onclick="sellGroup('${rarity}', 1, event)">SELL 1</button>
                    <button class="group-action-btn" onclick="sellGroup('${rarity}', 'half', event)">SELL HALF</button>
                    <button class="group-action-btn" onclick="sellGroup('${rarity}', 'all', event)">SELL ALL</button>
                `;
                itemsDiv.appendChild(actionsDiv);
                
                groupDiv.appendChild(itemsDiv);
                container.appendChild(groupDiv);
            });
            
            document.getElementById('totalMarketValue').textContent = totalMarketValue.toLocaleString() + '⭐';
        }
        
        // Toggle group expansion
        function toggleGroup(rarity) {
            if (expandedGroup === rarity) {
                expandedGroup = null;
            } else {
                expandedGroup = rarity;
            }
            renderMarket();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // Sell single element
        function sellElement(elementName, quantity, event) {
            if (event) event.stopPropagation();
            
            const element = collection[elementName];
            if (!element) return;
            
            const elementData = elementDatabase[elementName] || { value: 100 };
            const available = element.count || 1;
            const sellQuantity = Math.min(quantity, available);
            
            if (sellQuantity <= 0) return;
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Update collection
                element.count -= sellQuantity;
                if (element.count <= 0) {
                    delete collection[elementName];
                }
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                
                // Update credits
                const earnings = sellQuantity * elementData.value;
                credits += earnings;
                localStorage.setItem('voidfarer_credits', credits.toString());
                
                // Refresh display
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
            }, 300);
        }
        
        // Sell entire group
        function sellGroup(rarity, quantity, event) {
            if (event) event.stopPropagation();
            
            const groups = groupElements();
            const group = groups[rarity];
            if (!group || group.elements.length === 0) return;
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                group.elements.forEach(element => {
                    let sellQuantity = 0;
                    if (quantity === 'all') {
                        sellQuantity = element.count;
                    } else if (quantity === 'half') {
                        sellQuantity = Math.floor(element.count / 2);
                    } else {
                        sellQuantity = Math.min(quantity, element.count);
                    }
                    
                    if (sellQuantity > 0) {
                        collection[element.name].count -= sellQuantity;
                        if (collection[element.name].count <= 0) {
                            delete collection[element.name];
                        }
                        credits += sellQuantity * element.value;
                    }
                });
                
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                localStorage.setItem('voidfarer_credits', credits.toString());
                
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
            }, 300);
        }
        
        // Quick sell by credit amount
        function quickSell(amount) {
            const groups = groupElements();
            let totalEarned = 0;
            let itemsToRemove = [];
            
            // Flatten all elements
            const allElements = [];
            Object.values(groups).forEach(group => {
                group.elements.forEach(element => {
                    allElements.push(element);
                });
            });
            
            // Sort by value (lowest first) to sell cheapest first
            allElements.sort((a, b) => a.value - b.value);
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                for (let element of allElements) {
                    if (amount === 'all') {
                        // Sell everything
                        totalEarned += element.totalValue;
                        delete collection[element.name];
                    } else {
                        // Sell until we reach the amount
                        const maxCanSell = Math.floor(amount / element.value);
                        const sellQuantity = Math.min(maxCanSell, element.count);
                        
                        if (sellQuantity > 0) {
                            totalEarned += sellQuantity * element.value;
                            collection[element.name].count -= sellQuantity;
                            if (collection[element.name].count <= 0) {
                                delete collection[element.name];
                            }
                            amount -= sellQuantity * element.value;
                        }
                        
                        if (amount <= 0) break;
                    }
                }
                
                credits += totalEarned;
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                localStorage.setItem('voidfarer_credits', credits.toString());
                
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
            }, 300);
        }
        
        // Initialize
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            loadData();
        }
        
        init();
    </script>
