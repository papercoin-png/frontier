<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Canvas for star map */
        #clusterCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            touch-action: none;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0d0ff;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 20px #b09aff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 40px 15px 40px 15px;
            border: 1px solid rgba(160, 150, 200, 0.3);
            z-index: 20;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(160, 150, 200, 0.3);
            color: #d0c0ff;
            padding: 10px 20px;
            border-radius: 40px 15px 40px 15px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 20;
            min-width: 90px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 150, 200, 0.2);
            transform: scale(0.96);
        }
        
        .cluster-info {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(160, 150, 200, 0.3);
            color: #c0b0e0;
            padding: 10px 14px;
            border-radius: 30px 10px 30px 10px;
            font-size: 12px;
            z-index: 20;
            text-align: center;
            min-width: 110px;
        }
        
        .cluster-name {
            font-family: 'WindSong', cursive;
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 2px;
        }
        
        /* Star markers */
        .star-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .star-marker:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        
        .star-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 11;
        }
        
        .star-core {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 20px currentColor;
            z-index: 12;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        
        .star-label {
            position: absolute;
            top: 28px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'WindSong', cursive;
            font-size: 9px;
            text-shadow: 0 0 6px #ffffff;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(2px);
            padding: 2px 6px;
            border-radius: 20px 5px 20px 5px;
            border: 1px solid rgba(255,255,255,0.15);
            white-space: nowrap;
            z-index: 13;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .star-marker:hover .star-label {
            opacity: 1;
        }
        
        /* Star type colors */
        .star-blue .star-glow {
            background: radial-gradient(circle, rgba(100, 150, 255, 0.3), transparent 80%);
        }
        .star-blue .star-core {
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #6ba5ff);
            box-shadow: 0 0 15px #6ba5ff;
        }
        
        .star-white .star-glow {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent 80%);
        }
        .star-white .star-core {
            width: 9px;
            height: 9px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0ff);
            box-shadow: 0 0 15px #ffffff;
        }
        
        .star-yellow .star-glow {
            background: radial-gradient(circle, rgba(255, 220, 100, 0.3), transparent 80%);
        }
        .star-yellow .star-core {
            width: 11px;
            height: 11px;
            background: radial-gradient(circle at 30% 30%, #ffffc0, #ffd700);
            box-shadow: 0 0 15px #ffd700;
        }
        
        .star-orange .star-glow {
            background: radial-gradient(circle, rgba(255, 160, 80, 0.25), transparent 80%);
        }
        .star-orange .star-core {
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #ffcc99, #ff8c42);
            box-shadow: 0 0 15px #ff8c42;
        }
        
        .star-red .star-glow {
            background: radial-gradient(circle, rgba(255, 100, 100, 0.2), transparent 80%);
        }
        .star-red .star-core {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 30% 30%, #ffb6b6, #ff6b6b);
            box-shadow: 0 0 12px #ff6b6b;
        }
        
        .star-purple .star-glow {
            background: radial-gradient(circle, rgba(180, 100, 255, 0.2), transparent 80%);
        }
        .star-purple .star-core {
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #e0b0ff, #b080ff);
            box-shadow: 0 0 15px #b080ff;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 15px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #b09aff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0d0ff;
            font-family: 'WindSong', cursive;
            font-size: 18px;
            text-shadow: 0 0 15px #b09aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .cluster-info { bottom: max(20px, env(safe-area-inset-bottom)); right: max(15px, env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <canvas id="clusterCanvas"></canvas>
        
        <div class="ui-header" id="clusterTitle">Star Cluster</div>
        <button class="back-btn" onclick="returnToSectors()">← Sectors</button>
        
        <div class="cluster-info" id="clusterInfo">
            <div class="cluster-name" id="clusterName">Orion Molecular Cloud</div>
            <div id="starCount">85 stars</div>
            <div id="clusterType" style="font-size:10px; margin-top:2px; opacity:0.8;">Star-forming region</div>
        </div>
        
        <div id="starMarkers"></div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">entering system...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clusterCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ===== SEEDED RANDOM (matches universe seed) =====
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index = 0) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function seededRandomRange(seed, index, min, max) {
            return Math.floor(seededRandom(seed, index) * (max - min + 1)) + min;
        }
        
        function seededRandomChoice(seed, index, array) {
            return array[Math.floor(seededRandom(seed, index) * array.length)];
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // ===== LOAD CLUSTER DATA =====
        const clusterName = localStorage.getItem('voidfarer_current_nebula') || 'Orion Molecular Cloud';
        const sectorType = localStorage.getItem('voidfarer_current_sector_type') || 'Star-forming';
        const starCount = parseInt(localStorage.getItem('voidfarer_current_sector_stars')) || 85;
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'Orion';
        
        document.getElementById('clusterTitle').textContent = clusterName;
        document.getElementById('clusterName').textContent = clusterName;
        document.getElementById('starCount').textContent = starCount + ' stars';
        document.getElementById('clusterType').textContent = sectorType;
        
        // ===== GENERATE SEED FOR THIS CLUSTER =====
        const clusterSeed = UNIVERSE_SEED + 
                           hashString(currentSector) + 
                           hashString(clusterName) % 100000;
        
        // ===== PROCEDURAL STAR NAME GENERATION =====
        const namePrefixes = [
            'Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
            'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon',
            'Phi', 'Chi', 'Psi', 'Omega', 'Alpha', 'Beta', 'Prox', 'Sol', 'Rig', 'Veg',
            'Ald', 'Betel', 'Rigel', 'Sir', 'Arc', 'Den', 'Alt', 'Vega', 'Poll', 'Cast'
        ];
        
        const nameSuffixes = [
            'Majoris', 'Minoris', 'Prime', 'Secundus', 'Tertius', 'A', 'B', 'C', 'Alpha', 'Beta',
            'Gamma', 'Delta', 'Epsilon', 'Centauri', 'Orionis', 'Cygnii', 'Andromedae', 
            'Australis', 'Borealis', 'Galactica', 'Nova', 'Magnus', 'Parvus'
        ];
        
        function generateStarName(seed, index) {
            const style = seededRandomRange(seed, index, 1, 3);
            
            if (style === 1) {
                // Classic: Alpha Centauri
                const prefix = seededRandomChoice(seed, index * 2, namePrefixes);
                const suffix = seededRandomChoice(seed, index * 2 + 1, nameSuffixes);
                return prefix + ' ' + suffix;
            } else if (style === 2) {
                // Catalog style: HD 40307
                const catalogs = ['HD', 'HIP', 'HR', 'GJ', 'LHS', 'BD'];
                const catalog = seededRandomChoice(seed, index * 3, catalogs);
                const number = seededRandomRange(seed, index * 3 + 1, 1000, 99999);
                return catalog + ' ' + number;
            } else {
                // Simple: Algol Prime
                const simples = ['Algol', 'Mira', 'Caph', 'Aludra', 'Bellatrix', 'Mintaka'];
                const simple = seededRandomChoice(seed, index * 4, simples);
                const suffix = seededRandomChoice(seed, index * 4 + 1, ['Prime', 'Major', 'Minor']);
                return simple + ' ' + suffix;
            }
        }
        
        // ===== GENERATE STARS PROCEDURALLY =====
        function generateStars() {
            const stars = [];
            
            // Star type probabilities (realistic distribution)
            const typeProbabilities = [
                { type: 'white', prob: 0.35 },   // Most common
                { type: 'yellow', prob: 0.20 },   // Common
                { type: 'blue', prob: 0.15 },      // Hot stars
                { type: 'orange', prob: 0.15 },    // Cooler stars
                { type: 'red', prob: 0.10 },        // Red dwarfs/giants
                { type: 'purple', prob: 0.05 }      // Rare/exotic
            ];
            
            for (let i = 0; i < starCount; i++) {
                // Determine star type based on probabilities
                const rand = seededRandom(clusterSeed, i * 10);
                let cumulative = 0;
                let starType = 'white';
                
                for (const t of typeProbabilities) {
                    cumulative += t.prob;
                    if (rand < cumulative) {
                        starType = t.type;
                        break;
                    }
                }
                
                // Generate unique name for each star
                const name = generateStarName(clusterSeed, i * 100);
                
                // Position in a cluster (more stars near center)
                const clusterFactor = Math.pow(seededRandom(clusterSeed, i * 10 + 1), 1.5);
                const distance = clusterFactor * 35; // Max 35% from center
                const angle = seededRandom(clusterSeed, i * 10 + 2) * Math.PI * 2;
                
                const centerX = 50;
                const centerY = 50;
                
                let x = centerX + Math.cos(angle) * distance;
                let y = centerY + Math.sin(angle) * distance;
                
                // Add some random outliers
                x += (seededRandom(clusterSeed, i * 10 + 3) - 0.5) * 10;
                y += (seededRandom(clusterSeed, i * 10 + 4) - 0.5) * 10;
                
                // Clamp to visible area
                x = Math.min(95, Math.max(5, x));
                y = Math.min(95, Math.max(5, y));
                
                // Size varies by type
                const sizeMap = {
                    'blue': 1.2,
                    'yellow': 1.1,
                    'white': 1.0,
                    'orange': 0.9,
                    'red': 0.8,
                    'purple': 1.0
                };
                
                // Planet count varies by star type
                let planetCount;
                if (starType === 'blue') planetCount = seededRandomRange(clusterSeed, i * 10 + 5, 5, 12);
                else if (starType === 'yellow') planetCount = seededRandomRange(clusterSeed, i * 10 + 6, 3, 8);
                else if (starType === 'orange') planetCount = seededRandomRange(clusterSeed, i * 10 + 7, 2, 6);
                else if (starType === 'red') planetCount = seededRandomRange(clusterSeed, i * 10 + 8, 2, 5);
                else if (starType === 'white') planetCount = seededRandomRange(clusterSeed, i * 10 + 9, 3, 7);
                else planetCount = seededRandomRange(clusterSeed, i * 10 + 10, 4, 9); // purple
                
                stars.push({
                    name: name,
                    type: starType,
                    x: x,
                    y: y,
                    size: sizeMap[starType],
                    planets: planetCount,
                    seed: clusterSeed + i * 1000
                });
            }
            
            return stars;
        }
        
        const stars = generateStars();
        
        // ===== DRAW BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBackground();
        }
        
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Distant background stars - very faint
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.2;
                const opacity = Math.random() * 0.06 + 0.02;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Cluster nebula glow - based on cluster seed
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.4
            );
            
            // Color based on cluster type and seed
            const hue = (seededRandom(clusterSeed, 999) * 60 + 240) % 360; // Blue-purple range
            
            if (sectorType.includes('Star-forming') || sectorType.includes('Emission')) {
                gradient.addColorStop(0, `rgba(100, 80, 140, 0.08)`);
                gradient.addColorStop(0.5, `rgba(70, 50, 100, 0.04)`);
            } else if (sectorType.includes('Reflection')) {
                gradient.addColorStop(0, `rgba(80, 100, 140, 0.08)`);
                gradient.addColorStop(0.5, `rgba(50, 70, 100, 0.04)`);
            } else {
                gradient.addColorStop(0, `rgba(90, 70, 120, 0.06)`);
                gradient.addColorStop(0.5, `rgba(60, 50, 80, 0.03)`);
            }
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw faint connection lines between nearby stars
            ctx.strokeStyle = `rgba(100, 80, 140, 0.08)`;
            ctx.lineWidth = 0.5;
            
            for (let i = 0; i < stars.length; i += 3) {
                for (let j = i + 1; j < Math.min(i + 4, stars.length); j++) {
                    const x1 = (stars[i].x / 100) * canvas.width;
                    const y1 = (stars[i].y / 100) * canvas.height;
                    const x2 = (stars[j].x / 100) * canvas.width;
                    const y2 = (stars[j].y / 100) * canvas.height;
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }
        }
        
        // ===== CREATE STAR MARKERS =====
        function createStarMarkers() {
            const container = document.getElementById('starMarkers');
            container.innerHTML = '';
            
            stars.forEach((star, index) => {
                const marker = document.createElement('div');
                marker.className = `star-marker star-${star.type}`;
                marker.style.left = star.x + '%';
                marker.style.top = star.y + '%';
                marker.setAttribute('onclick', `selectStar(${index})`);
                
                marker.innerHTML = `
                    <div class="star-glow"></div>
                    <div class="star-core"></div>
                    <span class="star-label">${star.name}</span>
                `;
                
                container.appendChild(marker);
            });
        }
        
        // ===== STAR SELECTION =====
        function selectStar(index) {
            const star = stars[index];
            if (!star) return;
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            localStorage.setItem('voidfarer_current_star', star.name);
            localStorage.setItem('voidfarer_current_star_type', star.type);
            localStorage.setItem('voidfarer_current_star_planets', star.planets);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'system-view.html';
            }, 800);
        }
        
        function returnToSectors() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'star-sectors.html';
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            resizeCanvas();
            createStarMarkers();
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                createStarMarkers();
            });
        }
        
        init();
    </script>
</body>
</html>
