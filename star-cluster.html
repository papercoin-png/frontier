<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: auto;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .ui-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #6a8ac0;
        }
        
        .ui-header h1 {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        .current-location {
            position: sticky;
            top: 70px;
            z-index: 25;
            margin: 10px 15px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 10px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .current-dot {
            width: 12px;
            height: 12px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 40;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Star Grid */
        .stars-grid {
            padding: 20px 15px 100px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .star-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        
        .star-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.98);
        }
        
        .star-card.current {
            border-color: #4affaa;
            box-shadow: 0 0 30px rgba(74, 255, 170, 0.3);
        }
        
        .star-icon {
            font-size: 48px;
            min-width: 70px;
            text-align: center;
            filter: drop-shadow(0 0 15px currentColor);
        }
        
        .star-info {
            flex: 1;
        }
        
        .star-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'WindSong', cursive;
            margin-bottom: 5px;
        }
        
        .star-type {
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .star-details {
            display: flex;
            gap: 20px;
            color: #ffd966;
            font-size: 14px;
        }
        
        .distance-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffaa4a;
            color: black;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <div class="ui-header">
            <h1 id="clusterTitle">Star Cluster</h1>
        </div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading current star...</span>
        </div>
        
        <div class="stars-grid" id="starsGrid">
            <!-- Stars will be loaded here -->
        </div>
        
        <button class="back-btn" onclick="returnToSectors()">← SECTORS</button>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">warping to system...</div>
        </div>
    </div>

    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        const starsGrid = document.getElementById('starsGrid');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ===== SEEDED RANDOM =====
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // ===== LOAD CLUSTER DATA =====
        const clusterName = localStorage.getItem('voidfarer_current_nebula') || 'Orion Molecular Cloud';
        const sectorType = localStorage.getItem('voidfarer_current_sector_type') || 'Star-forming';
        const starCount = parseInt(localStorage.getItem('voidfarer_current_sector_stars')) || 85;
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'Orion';
        
        // Current star location (if any)
        let currentStarName = localStorage.getItem('voidfarer_current_star') || '';
        
        document.getElementById('clusterTitle').textContent = clusterName;
        document.getElementById('currentLocationText').textContent = currentStarName || 'No star selected';
        
        // ===== GENERATE SEED =====
        const clusterSeed = UNIVERSE_SEED + 
                           hashString(currentSector) * 100 + 
                           hashString(clusterName) % 100000;
        
        // ===== STAR DATA =====
        const starTypes = [
            { type: 'Blue Giant', icon: '🔵', color: '#6ba5ff', prob: 0.15, planets: '5-12' },
            { type: 'White Star', icon: '⚪', color: '#ffffff', prob: 0.35, planets: '3-7' },
            { type: 'Yellow Star', icon: '🟡', color: '#ffd700', prob: 0.20, planets: '3-8' },
            { type: 'Orange Star', icon: '🟠', color: '#ff8c42', prob: 0.15, planets: '2-6' },
            { type: 'Red Dwarf', icon: '🔴', color: '#ff6b6b', prob: 0.10, planets: '2-5' },
            { type: 'Neutron Star', icon: '💫', color: '#b0b0ff', prob: 0.03, planets: '0' },
            { type: 'Black Hole', icon: '⚫', color: '#4a4a4a', prob: 0.02, planets: '0' }
        ];
        
        const namePrefixes = [
            'Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
            'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon',
            'Phi', 'Chi', 'Psi', 'Omega', 'Alpha', 'Beta', 'Prox', 'Rig', 'Veg', 'Sir',
            'Arc', 'Den', 'Alt', 'Poll', 'Cast', 'Ant', 'Mira', 'Algol'
        ];
        
        const nameSuffixes = [
            'Majoris', 'Minoris', 'Prime', 'Secundus', 'Tertius', 'A', 'B', 'C', 'Alpha', 'Beta',
            'Gamma', 'Delta', 'Centauri', 'Orionis', 'Cygnii', 'Andromedae', 'Australis', 'Borealis',
            'Galactica', 'Nova', 'Magnus', 'Parvus'
        ];
        
        function getStarType() {
            const rand = seededRandom(clusterSeed, Math.floor(Math.random() * 1000));
            let cumulative = 0;
            for (const t of starTypes) {
                cumulative += t.prob;
                if (rand < cumulative) return t;
            }
            return starTypes[1]; // Default to white star
        }
        
        function generateStarName(index) {
            const prefix = namePrefixes[Math.floor(seededRandom(clusterSeed, index) * namePrefixes.length)];
            const suffix = nameSuffixes[Math.floor(seededRandom(clusterSeed, index + 100) * nameSuffixes.length)];
            return prefix + ' ' + suffix;
        }
        
        // Generate stars
        const stars = [];
        for (let i = 0; i < starCount; i++) {
            const type = getStarType();
            const name = generateStarName(i);
            
            stars.push({
                name: name,
                type: type.type,
                icon: type.icon,
                color: type.color,
                planets: type.planets,
                index: i
            });
        }
        
        // Sort stars: Current star first, then alphabetically
        stars.sort((a, b) => {
            if (a.name === currentStarName) return -1;
            if (b.name === currentStarName) return 1;
            return a.name.localeCompare(b.name);
        });
        
        // ===== RENDER STARS =====
        stars.forEach((star, index) => {
            const card = document.createElement('div');
            card.className = 'star-card';
            if (star.name === currentStarName) {
                card.classList.add('current');
            }
            card.setAttribute('onclick', `selectStar(${star.index})`);
            
            // Calculate distance from current star (if any)
            let distanceDisplay = '';
            if (currentStarName && star.name !== currentStarName) {
                // Random distance for demo - in real implementation, this would be calculated
                const dist = (Math.floor(Math.random() * 30) + 5) / 10;
                const cycles = dist < 1 ? 1 : dist < 2 ? 2 : dist < 3 ? 3 : 4;
                distanceDisplay = `<div class="distance-badge">${dist.toFixed(1)} LY • ${cycles} cycle${cycles > 1 ? 's' : ''}</div>`;
            } else if (star.name === currentStarName) {
                distanceDisplay = `<div class="distance-badge" style="background:#4affaa; color:black;">📍 CURRENT</div>`;
            }
            
            card.innerHTML = `
                ${distanceDisplay}
                <div class="star-icon" style="text-shadow: 0 0 20px ${star.color}">${star.icon}</div>
                <div class="star-info">
                    <div class="star-name" style="color: ${star.color}">${star.name}</div>
                    <div class="star-type">${star.type}</div>
                    <div class="star-details">⏺️ ${star.planets} planets</div>
                </div>
            `;
            
            starsGrid.appendChild(card);
        });
        
        // ===== STAR SELECTION =====
        function selectStar(index) {
            const star = stars.find(s => s.index === index);
            if (!star) return;
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Save star data
            localStorage.setItem('voidfarer_current_star', star.name);
            localStorage.setItem('voidfarer_current_star_type', star.type);
            localStorage.setItem('voidfarer_current_star_index', star.index);
            
            // For warp calculation (simplified - would be real distance in full version)
            const warpCycles = 1; // Default to 1 cycle for star-to-star
            localStorage.setItem('voidfarer_warp_cycles', warpCycles);
            localStorage.setItem('voidfarer_warp_destination', star.name);
            localStorage.setItem('voidfarer_warp_return', 'star-cluster.html');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'system-view.html';
            }, 500);
        }
        
        // ===== NAVIGATION =====
        function returnToSectors() {
            window.location.href = 'star-sectors.html';
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
        }
        
        init();
    </script>
</body>
</html>
