<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        .canvas-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            touch-action: none;
            background: #0a0a1a;
        }
        
        #clusterCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            cursor: grab;
            position: relative;
            z-index: 1;
        }
        
        #clusterCanvas:active {
            cursor: grabbing;
        }
        
        .star-markers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        
        .star-marker {
            position: absolute;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 25;
            /* Bright border for debugging - remove later */
            border: 2px solid rgba(255, 0, 0, 0.5);
        }
        
        .star-marker:active {
            transform: translate(-50%, -50%) scale(0.9);
        }
        
        .star-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 26;
            pointer-events: none;
            opacity: 1;
            background: radial-gradient(circle, rgba(255, 255, 0, 1), transparent 80%);
        }
        
        .star-core {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffaa00);
            box-shadow: 0 0 50px #ffaa00;
            z-index: 27;
            border: 4px solid rgba(255,255,255,0.9);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .star-label {
            position: absolute;
            top: 60px;
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 16px;
            text-shadow: 0 0 10px #000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            border: 2px solid rgba(255,255,255,0.5);
            white-space: nowrap;
            z-index: 28;
            pointer-events: none;
            font-weight: bold;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #b09aff;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            padding: 10px 25px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid rgba(200, 180, 255, 0.5);
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        
        .back-btn:active {
            background: rgba(200, 180, 255, 0.3);
            transform: scale(0.96);
        }
        
        .cluster-info {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 30px 10px 30px 10px;
            font-size: 16px;
            z-index: 30;
            text-align: center;
            min-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .cluster-name {
            font-family: 'WindSong', cursive;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 5px;
        }
        
        .zoom-controls {
            position: absolute;
            top: 50%;
            right: max(15px, env(safe-area-inset-right));
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 35;
        }
        
        .zoom-btn {
            width: 60px;
            height: 60px;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: white;
            border-radius: 50%;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.1s;
            font-weight: bold;
            z-index: 35;
        }
        
        .zoom-btn:active {
            background: rgba(200, 180, 255, 0.3);
            transform: scale(0.9);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 15px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #b09aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 15px #b09aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .debug-info {
            position: absolute;
            top: 100px;
            left: 20px;
            color: yellow;
            font-size: 14px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            z-index: 100;
            border-radius: 10px;
            border: 2px solid yellow;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <div class="debug-info" id="debugInfo">Loading...</div>
        
        <div class="canvas-container" id="canvasContainer">
            <canvas id="clusterCanvas"></canvas>
        </div>
        
        <div class="star-markers-container" id="starMarkersContainer"></div>
        
        <div class="ui-header" id="clusterTitle">Star Cluster</div>
        
        <div class="cluster-info" id="clusterInfo">
            <div class="cluster-name" id="clusterName">Loading...</div>
            <div id="starCount">0 stars</div>
            <div id="clusterType" style="font-size:12px; margin-top:4px;">-</div>
        </div>
        
        <button class="back-btn" onclick="returnToSectors()">← Sectors</button>
        
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <button class="zoom-btn" onclick="resetZoom()">⟲</button>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">entering system...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clusterCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const markersContainer = document.getElementById('starMarkersContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const debugInfo = document.getElementById('debugInfo');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index = 0) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function seededRandomRange(seed, index, min, max) {
            return Math.floor(seededRandom(seed, index) * (max - min + 1)) + min;
        }
        
        function seededRandomChoice(seed, index, array) {
            return array[Math.floor(seededRandom(seed, index) * array.length)];
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // Load cluster data
        const clusterName = localStorage.getItem('voidfarer_current_nebula') || 'Test Cluster';
        const sectorType = localStorage.getItem('voidfarer_current_sector_type') || 'Test';
        const starCount = parseInt(localStorage.getItem('voidfarer_current_sector_stars')) || 20;
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'Orion';
        
        document.getElementById('clusterTitle').textContent = clusterName;
        document.getElementById('clusterName').textContent = clusterName;
        document.getElementById('starCount').textContent = starCount + ' stars';
        document.getElementById('clusterType').textContent = sectorType;
        
        const clusterSeed = UNIVERSE_SEED + 
                           hashString(currentSector) * 100 + 
                           hashString(clusterName) % 100000;
        
        debugInfo.innerHTML = `
            <b>Debug Info:</b><br>
            Cluster: ${clusterName}<br>
            Type: ${sectorType}<br>
            Star Count: ${starCount}<br>
            Region: ${currentSector}<br>
            Seed: ${clusterSeed}<br>
        `;
        
        // Generate stars
        const stars = [];
        
        // Add a TEST STAR at 50%,50% to verify visibility
        stars.push({
            name: '★ TEST STAR ★',
            type: 'yellow',
            x: 50,
            y: 50,
            size: 40,
            planets: 5
        });
        
        // Generate random stars
        const namePrefixes = ['Al', 'Bet', 'Gamma', 'Delta', 'Epsilon'];
        const nameSuffixes = ['Majoris', 'Minoris', 'Prime', 'A', 'B'];
        
        for (let i = 1; i < starCount; i++) {
            const prefix = namePrefixes[Math.floor(Math.random() * namePrefixes.length)];
            const suffix = nameSuffixes[Math.floor(Math.random() * nameSuffixes.length)];
            const name = prefix + ' ' + suffix;
            
            const x = 20 + Math.random() * 60;
            const y = 20 + Math.random() * 60;
            
            stars.push({
                name: name,
                type: 'yellow',
                x: x,
                y: y,
                size: 35,
                planets: 3
            });
        }
        
        debugInfo.innerHTML += `Generated ${stars.length} stars<br>`;
        
        // Initialize Panzoom
        let panzoomInstance;
        
        function initPanzoom() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            panzoomInstance = Panzoom(canvas, {
                maxScale: 4,
                minScale: 1,
                contain: 'outside',
                canvas: true,
                startScale: 1,
                startX: 0,
                startY: 0
            });
            
            container.addEventListener('wheel', panzoomInstance.zoomWithWheel);
            
            canvas.addEventListener('panzoom', function(e) {
                if (panzoomInstance) {
                    const scale = panzoomInstance.getScale();
                    const pan = panzoomInstance.getPan();
                    markersContainer.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${scale})`;
                }
            });
        }
        
        // Draw background
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background stars
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Create star markers
        function createStarMarkers() {
            markersContainer.innerHTML = '';
            
            stars.forEach((star, index) => {
                const marker = document.createElement('div');
                marker.className = 'star-marker';
                marker.style.left = star.x + '%';
                marker.style.top = star.y + '%';
                marker.setAttribute('onclick', `selectStar(${index})`);
                
                marker.innerHTML = `
                    <div class="star-glow"></div>
                    <div class="star-core"></div>
                    <span class="star-label">${star.name}</span>
                `;
                
                markersContainer.appendChild(marker);
            });
            
            debugInfo.innerHTML += `Created ${stars.length} markers<br>`;
            debugInfo.innerHTML += `<b style="color:lime;">✓ Stars should be visible!</b>`;
        }
        
        function zoomIn() {
            if (panzoomInstance) panzoomInstance.zoomTo(panzoomInstance.getScale() + 0.5);
        }
        
        function zoomOut() {
            if (panzoomInstance && panzoomInstance.getScale() > 1) {
                panzoomInstance.zoomTo(panzoomInstance.getScale() - 0.5);
            }
        }
        
        function resetZoom() {
            if (panzoomInstance) {
                panzoomInstance.zoomTo(1);
                panzoomInstance.panTo(0, 0);
                markersContainer.style.transform = 'translate(0px, 0px) scale(1)';
            }
        }
        
        function selectStar(index) {
            const star = stars[index];
            alert(`Selected: ${star.name}\nPlanets: ${star.planets}`);
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Uncomment to enable navigation
            /*
            loadingOverlay.classList.add('active');
            localStorage.setItem('voidfarer_current_star', star.name);
            localStorage.setItem('voidfarer_current_star_planets', star.planets);
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'system-view.html';
            }, 800);
            */
        }
        
        function returnToSectors() {
            window.location.href = 'star-sectors.html';
        }
        
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            initPanzoom();
            drawBackground();
            createStarMarkers();
        }
        
        init();
    </script>
</body>
</html>
