<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: auto;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .ui-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #6a8ac0;
        }
        
        .ui-header h1 {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 600;
        }
        
        .current-location {
            position: sticky;
            top: 70px;
            z-index: 25;
            margin: 10px 15px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 10px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .current-dot {
            width: 12px;
            height: 12px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .journey-info {
            position: sticky;
            top: 130px;
            z-index: 25;
            margin: 10px 15px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 15px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            color: white;
        }
        
        .journey-distance {
            color: #4affaa;
            font-weight: 600;
        }
        
        .journey-total {
            position: sticky;
            top: 170px;
            z-index: 25;
            margin: 10px 15px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 15px;
            font-size: 12px;
            display: none;
            justify-content: space-between;
            color: white;
        }
        
        .journey-total.visible {
            display: flex;
        }
        
        .journey-total-label {
            color: #a0c0ff;
        }
        
        .journey-total-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 40;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Star Grid */
        .stars-grid {
            padding: 20px 15px 100px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .star-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        
        .star-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.98);
        }
        
        .star-card.current {
            border-color: #4affaa;
            box-shadow: 0 0 30px rgba(74, 255, 170, 0.3);
        }
        
        .star-icon {
            font-size: 48px;
            min-width: 70px;
            text-align: center;
            filter: drop-shadow(0 0 15px currentColor);
        }
        
        .star-info {
            flex: 1;
        }
        
        .star-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
            margin-bottom: 5px;
        }
        
        .star-type {
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .star-details {
            display: flex;
            gap: 20px;
            color: #ffd966;
            font-size: 14px;
        }
        
        .distance-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffaa4a;
            color: black;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
        }
        
        /* Info panel for selected star */
        .star-info-panel {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #ffaa4a;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            z-index: 50;
            display: none;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 30px #ffaa4a;
        }
        
        .star-info-panel.visible {
            display: block;
        }
        
        .star-info-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .star-info-type {
            color: #a0c0ff;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .star-info-planets {
            color: #ffd966;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .star-info-distance {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        
        .distance-value {
            color: #4affaa;
            font-weight: 700;
            font-size: 20px;
        }
        
        .cumulative-info {
            background: rgba(255, 170, 74, 0.15);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ffaa4a;
            display: none;
        }
        
        .cumulative-info.visible {
            display: block;
        }
        
        .cumulative-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 13px;
        }
        
        .cumulative-label {
            color: #a0c0ff;
        }
        
        .cumulative-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        .star-info-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .star-info-btn {
            flex: 1;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
        }
        
        .star-info-btn:active {
            background: #6aa0e0;
            transform: scale(0.96);
        }
        
        .star-info-btn.primary {
            background: #ffaa4a;
            color: #0a0a1a;
        }
        
        .star-info-btn.primary:active {
            background: #ffcc6a;
        }
        
        .star-info-btn.secondary {
            background: transparent;
            border: 1px solid #6a8ac0;
        }
        
        .star-info-btn.secondary:active {
            background: rgba(106, 138, 192, 0.3);
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <div class="ui-header">
            <h1 id="clusterTitle">Loading Star Cluster...</h1>
        </div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading current star...</span>
        </div>
        
        <div class="journey-info" id="journeyInfo">
            <span>Journey so far:</span>
            <span class="journey-distance" id="journeyDistance">0.0 LY</span>
        </div>
        
        <div class="journey-total" id="journeyTotal">
            <span class="journey-total-label">Total with star leg:</span>
            <span class="journey-total-value" id="totalJourneyDistance">0.0 LY</span>
        </div>
        
        <div class="stars-grid" id="starsGrid">
            <div style="color: white; text-align: center; padding: 50px;">Loading stars...</div>
        </div>
        
        <button class="back-btn" onclick="window.returnToSectors()">← STAR SECTORS</button>
        
        <!-- Star Info Panel -->
        <div class="star-info-panel" id="starInfoPanel">
            <div class="star-info-name" id="starInfoName">Star Name</div>
            <div class="star-info-type" id="starInfoType">Star Type</div>
            <div class="star-info-planets" id="starInfoPlanets">0 planets</div>
            <div class="star-info-distance">
                <div>Distance from current:</div>
                <span class="distance-value" id="starDistance">0.0</span> LY
            </div>
            
            <!-- Cumulative info (shown only in plot mode) -->
            <div class="cumulative-info" id="cumulativeInfo">
                <div class="cumulative-row">
                    <span class="cumulative-label">Previous legs:</span>
                    <span class="cumulative-value" id="previousDistance">0.0 LY</span>
                </div>
                <div class="cumulative-row">
                    <span class="cumulative-label">After this leg:</span>
                    <span class="cumulative-value" id="afterThisLeg">0.0 LY</span>
                </div>
            </div>
            
            <div class="star-info-buttons">
                <button class="star-info-btn" id="actionBtn" onclick="window.handleStarAction()">🚀 VIEW SYSTEM</button>
                <button class="star-info-btn secondary" onclick="window.hideStarInfo()">CLOSE</button>
            </div>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">entering system...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <!-- CRITICAL: All scripts loaded as modules -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/planet-utils.js"></script>
    <script type="module" src="js/planet-names.js"></script>
    <script type="module" src="js/procedural-universe.js"></script>
    <script type="module" src="js/planet-status.js"></script>

    <script type="module">
        import { 
            UNIVERSE_SEED, 
            seededRandom, 
            seededRandomRange, 
            seededRandomChoice, 
            hashString,
            getStarType,
            generateStar as generateProceduralStar,
            getGalaxyStatistics
        } from './js/procedural-universe.js';
        
        import { generatePlanetName } from './js/planet-names.js';
        import { generatePlanetResources, PLANET_TYPE_DATA } from './js/planet-utils.js';
        import { getPlanetStatus } from './js/planet-status.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const starsGrid = document.getElementById('starsGrid');
        const starInfoPanel = document.getElementById('starInfoPanel');
        const journeyDistanceSpan = document.getElementById('journeyDistance');
        const journeyTotalEl = document.getElementById('journeyTotal');
        const totalJourneyDistanceEl = document.getElementById('totalJourneyDistance');
        const cumulativeInfoEl = document.getElementById('cumulativeInfo');
        const previousDistanceEl = document.getElementById('previousDistance');
        const afterThisLegEl = document.getElementById('afterThisLeg');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToSectors = returnToSectors;
        window.handleStarAction = handleStarAction;
        window.hideStarInfo = hideStarInfo;

        // ===== STATE =====
        let stars = [];
        let currentStarName = '';
        let clusterName = 'Unknown Cluster';
        let clusterType = '';
        let clusterStars = 0;
        let starCount = 50;
        let selectedStar = null;
        let journeyDistance = 0;
        let cumulativeBefore = 0;
        let currentSectorId = 'B2'; // Default to Orion Arm
        
        // Cache for planet statuses to check explored systems
        let exploredPlanetsCache = new Set();

        // ===== CHECK FOR PLOT MODE =====
        const urlParams = new URLSearchParams(window.location.search);
        const isPlotMode = urlParams.get('mode') === 'plot';

        // ===== LOAD EXPLORED PLANETS =====
        async function loadExploredPlanets() {
            try {
                const locations = await window.getPlayerLocations();
                locations.forEach(loc => {
                    if (loc.planet) {
                        exploredPlanetsCache.add(loc.planet);
                    }
                });
                console.log(`Loaded ${exploredPlanetsCache.size} explored planets`);
            } catch (error) {
                console.error('Error loading explored planets:', error);
            }
        }

        // ===== CHECK IF STAR SYSTEM HAS ANY EXPLORED PLANETS =====
        function hasExploredPlanets(star) {
            return star.planets.some(planet => exploredPlanetsCache.has(planet.name));
        }

        // ===== LOAD JOURNEY DISTANCE =====
        function loadJourneyDistance() {
            const saved = localStorage.getItem('voidfarer_journey_distance');
            journeyDistance = saved ? parseFloat(saved) : 0;
            journeyDistanceSpan.textContent = journeyDistance.toFixed(1) + ' LY';
        }

        // ===== LOAD CUMULATIVE DISTANCE (for plot mode) =====
        function loadCumulativeDistance() {
            cumulativeBefore = parseFloat(localStorage.getItem('voidfarer_plot_cumulative_distance') || '0');
            
            if (isPlotMode && cumulativeBefore > 0) {
                journeyTotalEl.classList.add('visible');
                totalJourneyDistanceEl.textContent = cumulativeBefore.toFixed(1) + ' LY';
            }
        }

        // ===== GENERATE STAR DISTANCE =====
        function generateStarDistance(index, isCurrent) {
            if (isCurrent) return 0;
            
            const baseDistance = 0.5 + (index / starCount) * 3.0;
            const seed = UNIVERSE_SEED + index * 100;
            const randomFactor = seededRandom(seed, 0) * 0.5;
            
            return parseFloat((baseDistance + randomFactor).toFixed(1));
        }

        // ===== GENERATE PLANETS FOR A STAR =====
        function generatePlanetsForStar(starSeed, starType, starName, sectorId) {
            const planets = [];
            const planetCount = starType.maxPlanets > 0 ? 
                seededRandomRange(starSeed, 100, starType.minPlanets, Math.min(starType.maxPlanets, 8)) : 0;
            
            for (let i = 0; i < planetCount; i++) {
                const planetSeed = starSeed + i * 1000;
                
                // Determine planet type with weighted probabilities
                const planetTypeRoll = seededRandom(planetSeed, 0);
                let planetType = 'barren'; // default
                
                // Planet type probabilities (all 8 types)
                if (planetTypeRoll < 0.12) planetType = 'scorched';
                else if (planetTypeRoll < 0.27) planetType = 'barren';
                else if (planetTypeRoll < 0.37) planetType = 'lush';
                else if (planetTypeRoll < 0.49) planetType = 'frozen';
                else if (planetTypeRoll < 0.64) planetType = 'gas';
                else if (planetTypeRoll < 0.74) planetType = 'oceanic';
                else if (planetTypeRoll < 0.82) planetType = 'toxic';
                else planetType = 'asteroid';
                
                const planetData = PLANET_TYPE_DATA[planetType];
                
                // Generate unique planet name
                const planetName = generatePlanetName(planetSeed, i, sectorId, planetType);
                
                // Generate resources (max 4)
                const resources = generatePlanetResources(planetSeed, planetType);
                
                planets.push({
                    index: i,
                    name: planetName,
                    type: planetType,
                    typeName: planetData.name,
                    icon: planetData.icon,
                    color: planetData.color,
                    temp: planetData.temp,
                    atmos: planetData.atmos,
                    gravity: planetData.gravity,
                    landable: planetData.landable,
                    description: planetData.description,
                    resources: resources,
                    distanceFromStar: 0.5 + (i * 0.8),
                    orbitRadius: 70 + i * 40,
                    orbitSpeed: 0.002 - (i * 0.0002)
                });
            }
            
            return planets;
        }

        // ===== GENERATE UNIQUE STAR NAME BASED ON CLUSTER =====
        function generateStarName(clusterSeed, index) {
            // Use cluster seed + index to create a unique hash for this star
            const starHash = clusterSeed + index * 7919; // Use a prime multiplier
            
            // Star name components that vary by cluster
            const prefixes = [
                'ALPHA', 'BETA', 'GAMMA', 'DELTA', 'EPSILON', 'ZETA', 'ETA', 'THETA',
                'IOTA', 'KAPPA', 'LAMBDA', 'MU', 'NU', 'XI', 'OMICRON', 'PI',
                'RHO', 'SIGMA', 'TAU', 'UPSILON', 'PHI', 'CHI', 'PSI', 'OMEGA'
            ];
            
            const suffixes = [
                'PRIME', 'SECUNDUS', 'TERTIUS', 'QUARTUS', 'QUINTUS',
                'MAJOR', 'MINOR', 'AUSTRALIS', 'BOREALIS', 'ORIENTALIS',
                'OCCIDENTALIS', 'INFERIOR', 'SUPERIOR', 'MEDIA'
            ];
            
            // Use the cluster name to influence the naming
            const clusterHash = hashString(clusterName);
            
            // Combine hashes to make names unique per cluster
            const combinedHash = (starHash + clusterHash) % 1000000;
            
            // Select prefix and suffix based on combined hash
            const prefixIndex = Math.floor(seededRandom(combinedHash, 0) * prefixes.length);
            const suffixIndex = Math.floor(seededRandom(combinedHash, 1) * suffixes.length);
            const numberPart = Math.floor(seededRandom(combinedHash, 2) * 100) + 1;
            
            // Occasionally use a different naming convention
            const namingStyle = Math.floor(seededRandom(combinedHash, 3) * 3);
            
            if (namingStyle === 0) {
                return `${prefixes[prefixIndex]} ${suffixes[suffixIndex]}`;
            } else if (namingStyle === 1) {
                return `${clusterName} ${prefixes[prefixIndex]}`;
            } else {
                return `${prefixes[prefixIndex]}-${numberPart}`;
            }
        }

        // ===== LOAD CLUSTER DATA =====
        async function loadClusterData() {
            try {
                console.log('Loading cluster data...');
                console.log('Is plot mode:', isPlotMode);
                
                // First check if we're in plot mode with a selected star sector
                let targetCluster = null;
                let targetClusterType = null;
                let targetClusterStars = null;
                
                if (isPlotMode) {
                    // Get the destination star sector from plot data (saved in star-sectors.html)
                    targetCluster = localStorage.getItem('voidfarer_plot_nebula');
                    targetClusterType = localStorage.getItem('voidfarer_plot_nebula_type');
                    targetClusterStars = localStorage.getItem('voidfarer_plot_nebula_stars');
                    
                    console.log('Plot mode target cluster:', { 
                        name: targetCluster, 
                        type: targetClusterType, 
                        stars: targetClusterStars 
                    });
                }
                
                // If no plot target, check for current location from normal navigation
                if (!targetCluster) {
                    // Try to get from navigation functions
                    if (typeof window.getCurrentStarSector === 'function') {
                        targetCluster = await window.getCurrentStarSector();
                        targetClusterType = await window.getCurrentStarSectorType?.() || '';
                        targetClusterStars = await window.getCurrentStarSectorStars?.() || '';
                    }
                    
                    // Fallback to localStorage
                    if (!targetCluster) {
                        targetCluster = localStorage.getItem('voidfarer_current_starSector') || 'Orion Molecular Cloud';
                        targetClusterType = localStorage.getItem('voidfarer_current_sector_type') || 'Star-forming';
                        targetClusterStars = localStorage.getItem('voidfarer_current_sector_stars') || '85';
                    }
                    
                    console.log('Using current cluster:', targetCluster);
                }
                
                // Load current star
                if (typeof window.getCurrentStar === 'function') {
                    currentStarName = await window.getCurrentStar() || '';
                } else {
                    currentStarName = localStorage.getItem('voidfarer_current_star') || '';
                }
                
                // Get star count - use the one from the star sector if available
                if (targetClusterStars) {
                    starCount = parseInt(targetClusterStars) || 85;
                } else if (typeof window.getCurrentSectorStars === 'function') {
                    starCount = await window.getCurrentSectorStars() || 85;
                } else {
                    starCount = parseInt(localStorage.getItem('voidfarer_current_sector_stars')) || 85;
                }
                
                // Get current sector ID for planet naming
                if (typeof window.getCurrentSector === 'function') {
                    currentSectorId = await window.getCurrentSector() || 'B2';
                } else {
                    currentSectorId = localStorage.getItem('voidfarer_current_sector') || 'B2';
                }

                clusterName = targetCluster || 'Orion Molecular Cloud';
                clusterType = targetClusterType || 'Star-forming';
                clusterStars = starCount;

                // Update UI
                document.getElementById('clusterTitle').textContent = clusterName + ' Cluster';
                document.getElementById('currentLocationText').textContent = 
                    currentStarName || 'No star selected';

                // Load journey distance
                loadJourneyDistance();
                
                // Load cumulative distance for plot mode
                if (isPlotMode) {
                    loadCumulativeDistance();
                }

                // Load explored planets
                await loadExploredPlanets();

                console.log('Cluster data loaded:', {
                    cluster: clusterName,
                    type: clusterType,
                    stars: clusterStars,
                    currentStar: currentStarName,
                    sectorId: currentSectorId
                });

                return true;

            } catch (error) {
                console.error('Error loading cluster data:', error);
                clusterName = 'Orion Molecular Cloud';
                document.getElementById('clusterTitle').textContent = clusterName + ' Cluster';
                return false;
            }
        }

        // ===== GENERATE STARS =====
        function generateStars() {
            stars = [];
            
            // Use cluster name to create a unique seed - this ensures different clusters have different stars
            const clusterSeed = UNIVERSE_SEED + hashString(clusterName) % 100000;
            
            console.log(`Generating stars for cluster: ${clusterName} with seed: ${clusterSeed}`);
            
            for (let i = 0; i < starCount; i++) {
                const starSeed = clusterSeed + i * 1000;
                const starType = getStarType(starSeed, i);
                
                // Generate unique star name based on cluster
                const starName = generateStarName(clusterSeed, i);
                const isCurrent = (starName === currentStarName);
                const distance = generateStarDistance(i, isCurrent);
                
                // Generate planets for this star
                const planets = generatePlanetsForStar(starSeed, starType, starName, currentSectorId);
                
                stars.push({
                    index: i,
                    name: starName,
                    type: starType.name,
                    typeKey: starType.type,
                    icon: starType.icon,
                    color: starType.color,
                    planets: planets,
                    planetCount: planets.length,
                    distance: distance,
                    isCurrent: isCurrent,
                    seed: starSeed,
                    hasExplored: false // Will be set after checking cache
                });
            }

            // Check which stars have explored planets
            stars.forEach(star => {
                star.hasExplored = hasExploredPlanets(star);
            });

            // Sort stars: Current star first, then by distance
            stars.sort((a, b) => {
                if (a.isCurrent) return -1;
                if (b.isCurrent) return 1;
                return a.distance - b.distance;
            });
            
            console.log(`Generated ${stars.length} stars for cluster ${clusterName}`);
            console.log('First star:', stars[0]?.name);
            console.log('Last star:', stars[stars.length-1]?.name);
        }

        // ===== SHOW STAR INFO =====
        function showStarInfo(star) {
            selectedStar = star;
            
            document.getElementById('starInfoName').textContent = star.name;
            document.getElementById('starInfoType').textContent = star.type;
            document.getElementById('starInfoPlanets').textContent = star.planetCount + ' planets';
            document.getElementById('starDistance').textContent = star.distance.toFixed(1);
            
            // Update cumulative info for plot mode
            if (isPlotMode) {
                const afterThisLeg = cumulativeBefore + star.distance;
                previousDistanceEl.textContent = cumulativeBefore.toFixed(1) + ' LY';
                afterThisLegEl.textContent = afterThisLeg.toFixed(1) + ' LY';
                cumulativeInfoEl.classList.add('visible');
            } else {
                cumulativeInfoEl.classList.remove('visible');
            }
            
            // Update action button based on mode
            const actionBtn = document.getElementById('actionBtn');
            
            if (isPlotMode) {
                actionBtn.classList.add('primary');
                actionBtn.textContent = '⭐ SELECT THIS STAR';
            } else {
                actionBtn.classList.remove('primary');
                actionBtn.textContent = '🚀 VIEW SYSTEM';
            }
            
            starInfoPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HIDE STAR INFO =====
        function hideStarInfo() {
            starInfoPanel.classList.remove('visible');
            selectedStar = null;
        }

        // ===== HANDLE STAR ACTION =====
        function handleStarAction() {
            if (!selectedStar) return;
            
            if (isPlotMode) {
                selectStarForJourney();
            } else {
                viewSystem();
            }
        }

        // ===== VIEW SYSTEM (normal mode) =====
        async function viewSystem() {
            if (!selectedStar) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'entering system...';
            
            try {
                // Prepare system data with all planets and their resources
                const systemData = {
                    star: {
                        name: selectedStar.name,
                        type: selectedStar.type,
                        typeKey: selectedStar.typeKey,
                        color: selectedStar.color,
                        icon: selectedStar.icon,
                        index: selectedStar.index,
                        seed: selectedStar.seed
                    },
                    planets: selectedStar.planets.map(p => ({
                        ...p,
                        // Ensure resources are included
                        resources: p.resources || []
                    })),
                    clusterName: clusterName,
                    sectorId: currentSectorId,
                    timestamp: Date.now()
                };
                
                // Save system data to localStorage
                localStorage.setItem('voidfarer_system_data', JSON.stringify(systemData));
                
                // Add this star's distance to journey total
                const newTotal = journeyDistance + selectedStar.distance;
                localStorage.setItem('voidfarer_journey_distance', newTotal.toString());
                
                // Navigate to system view
                setTimeout(() => {
                    window.location.href = 'system-view.html';
                }, 500);

            } catch (error) {
                console.error('Error entering system:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to enter system. Please try again.');
            }
        }

        // ===== SELECT STAR FOR JOURNEY (plot mode) =====
        async function selectStarForJourney() {
            if (!selectedStar) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'adding star leg...';
            
            try {
                // Prepare system data with all planets and their resources
                const systemData = {
                    star: {
                        name: selectedStar.name,
                        type: selectedStar.type,
                        typeKey: selectedStar.typeKey,
                        color: selectedStar.color,
                        icon: selectedStar.icon,
                        index: selectedStar.index,
                        seed: selectedStar.seed
                    },
                    planets: selectedStar.planets.map(p => ({
                        ...p,
                        // Ensure resources are included
                        resources: p.resources || []
                    })),
                    clusterName: clusterName,
                    sectorId: currentSectorId,
                    timestamp: Date.now()
                };
                
                // Save system data to localStorage
                localStorage.setItem('voidfarer_system_data', JSON.stringify(systemData));
                
                // Get current cumulative distance
                const currentCumulative = parseFloat(localStorage.getItem('voidfarer_plot_cumulative_distance') || '0');
                
                // Calculate new cumulative
                const newCumulative = currentCumulative + selectedStar.distance;
                
                console.log('Star leg:', {
                    star: selectedStar.name,
                    distance: selectedStar.distance,
                    previousCumulative: currentCumulative,
                    newCumulative: newCumulative
                });
                
                // Save star data
                localStorage.setItem('voidfarer_plot_star', selectedStar.name);
                localStorage.setItem('voidfarer_plot_star_distance', selectedStar.distance.toString());
                
                // Update cumulative distance
                localStorage.setItem('voidfarer_plot_cumulative_distance', newCumulative.toString());
                
                // Navigate to system view in plot mode
                setTimeout(() => {
                    window.location.href = 'system-view.html?mode=plot';
                }, 500);
                
            } catch (error) {
                console.error('Error selecting star:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to select star. Please try again.');
            }
        }

        // ===== RENDER STARS =====
        function renderStars() {
            starsGrid.innerHTML = '';

            if (stars.length === 0) {
                starsGrid.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">No stars found in this cluster</div>';
                return;
            }

            stars.forEach((star) => {
                const card = document.createElement('div');
                card.className = 'star-card';
                if (star.isCurrent) {
                    card.classList.add('current');
                }
                
                // Add a subtle indicator if system has explored planets
                if (star.hasExplored) {
                    card.style.borderColor = '#4affaa';
                    card.style.boxShadow = '0 0 15px rgba(74, 255, 170, 0.3)';
                }
                
                card.onclick = function() { showStarInfo(star); };
                
                let distanceDisplay = '';
                if (star.isCurrent) {
                    distanceDisplay = `<div class="distance-badge" style="background:#4affaa; color:black;">📍 CURRENT</div>`;
                } else {
                    distanceDisplay = `<div class="distance-badge">${star.distance.toFixed(1)} LY</div>`;
                }
                
                // Get planet icons for preview (max 3)
                const planetIcons = star.planets.slice(0, 3).map(p => p.icon).join(' ');
                
                // Add exploration indicator
                const exploredIndicator = star.hasExplored ? ' ✦' : '';
                
                card.innerHTML = `
                    ${distanceDisplay}
                    <div class="star-icon" style="text-shadow: 0 0 20px ${star.color}">${star.icon}</div>
                    <div class="star-info">
                        <div class="star-name" style="color: ${star.color}">${star.name}${exploredIndicator}</div>
                        <div class="star-type">${star.type}</div>
                        <div class="star-details">
                            <span>⏺️ ${star.planetCount} planets</span>
                            <span>${planetIcons}</span>
                        </div>
                    </div>
                `;
                
                starsGrid.appendChild(card);
            });
        }

        // ===== RETURN TO STAR SECTORS =====
        function returnToSectors() {
            if (isPlotMode) {
                window.location.href = 'star-sectors.html?mode=plot';
            } else {
                window.location.href = 'star-sectors.html';
            }
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star cluster...';

                const credits = typeof window.getCredits === 'function' ? await window.getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                await loadClusterData();
                generateStars();
                renderStars();

                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
