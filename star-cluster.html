<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: auto;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .ui-header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #6a8ac0;
        }
        
        .ui-header h1 {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        .current-location {
            position: sticky;
            top: 70px;
            z-index: 25;
            margin: 10px 15px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 10px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .current-dot {
            width: 12px;
            height: 12px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 40;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Star Grid */
        .stars-grid {
            padding: 20px 15px 100px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .star-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        
        .star-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.98);
        }
        
        .star-card.current {
            border-color: #4affaa;
            box-shadow: 0 0 30px rgba(74, 255, 170, 0.3);
        }
        
        .star-icon {
            font-size: 48px;
            min-width: 70px;
            text-align: center;
            filter: drop-shadow(0 0 15px currentColor);
        }
        
        .star-info {
            flex: 1;
        }
        
        .star-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'WindSong', cursive;
            margin-bottom: 5px;
        }
        
        .star-type {
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .star-details {
            display: flex;
            gap: 20px;
            color: #ffd966;
            font-size: 14px;
        }
        
        .distance-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffaa4a;
            color: black;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <div class="ui-header">
            <h1 id="clusterTitle">Loading Cluster...</h1>
        </div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading current star...</span>
        </div>
        
        <div class="stars-grid" id="starsGrid">
            <div style="color: white; text-align: center; padding: 50px;">Loading stars...</div>
        </div>
        
        <button class="back-btn" onclick="returnToSectors()">← SECTORS</button>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">warping to system...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script type="module">
        // ===== IMPORTS =====
        import { 
            getCurrentStar,
            setCurrentStar,
            getCurrentNebula,
            getCurrentSector,
            getCurrentSectorType,
            getCurrentSectorStars,
            getCredits,
            setWarpData
        } from './js/storage.js';
        import { 
            UNIVERSE_SEED,
            generateStar,
            getNebulaSeed,
            getSectorSeed
        } from './js/procedural-universe.js';
        import { isMigrationComplete } from './js/db.js';
        import { calculateStarTrip } from './js/warp-calculator.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const starsGrid = document.getElementById('starsGrid');

        // ===== STATE =====
        let stars = [];
        let currentStarName = '';
        let clusterName = 'Unknown Cluster';
        let sectorType = 'Unknown';
        let starCount = 50;
        let currentSector = 'B2';
        let clusterSeed = UNIVERSE_SEED;

        // ===== LOAD CLUSTER DATA =====
        async function loadClusterData() {
            try {
                // Load all data in parallel
                const [
                    star,
                    nebula,
                    sector,
                    type,
                    count
                ] = await Promise.all([
                    getCurrentStar(),
                    getCurrentNebula(),
                    getCurrentSector(),
                    getCurrentSectorType(),
                    getCurrentSectorStars()
                ]);

                currentStarName = star || '';
                clusterName = nebula || 'Orion Molecular Cloud';
                sectorType = type || 'Star-forming';
                starCount = count || 85;
                currentSector = sector || 'Orion';

                // Update UI
                document.getElementById('clusterTitle').textContent = clusterName;
                document.getElementById('currentLocationText').textContent = 
                    currentStarName || 'No star selected';

                // Generate cluster seed
                clusterSeed = UNIVERSE_SEED + 
                             hashString(currentSector) * 100 + 
                             hashString(clusterName) % 100000;

                return true;

            } catch (error) {
                console.error('Error loading cluster data:', error);
                // Use defaults
                clusterName = 'Orion Molecular Cloud';
                document.getElementById('clusterTitle').textContent = clusterName;
                return false;
            }
        }

        // ===== HASH FUNCTION =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        // ===== GENERATE STARS =====
        function generateStars() {
            stars = [];
            
            // Generate stars using procedural generation
            for (let i = 0; i < starCount; i++) {
                const star = generateStar(clusterSeed, i);
                stars.push({
                    name: star.name,
                    type: star.typeName,
                    icon: getStarIcon(star.type),
                    color: star.color,
                    planets: star.planetCount,
                    index: i,
                    seed: star.seed,
                    position: star.position
                });
            }

            // Sort stars: Current star first, then alphabetically
            stars.sort((a, b) => {
                if (a.name === currentStarName) return -1;
                if (b.name === currentStarName) return 1;
                return a.name.localeCompare(b.name);
            });
        }

        // ===== GET STAR ICON =====
        function getStarIcon(starType) {
            const icons = {
                'main': '🟡',
                'red': '🔴',
                'blue': '🔵',
                'neutron': '💫',
                'blackhole': '⚫'
            };
            return icons[starType] || '⭐';
        }

        // ===== RENDER STARS =====
        function renderStars() {
            starsGrid.innerHTML = '';

            if (stars.length === 0) {
                starsGrid.innerHTML = '<div style="color: white; text-align: center; padding: 50px;">No stars found in this cluster</div>';
                return;
            }

            stars.forEach((star, index) => {
                const card = document.createElement('div');
                card.className = 'star-card';
                if (star.name === currentStarName) {
                    card.classList.add('current');
                }
                card.setAttribute('onclick', `selectStar(${star.index})`);
                
                // Calculate distance from current star (if any)
                let distanceDisplay = '';
                if (currentStarName && star.name !== currentStarName) {
                    // Generate deterministic distance based on star seeds
                    const distance = generateStarDistance(star.index);
                    const trip = calculateStarTrip(0, 0, distance, distance);
                    distanceDisplay = `<div class="distance-badge">${trip.distanceFormatted} • ${trip.cyclesFormatted}</div>`;
                } else if (star.name === currentStarName) {
                    distanceDisplay = `<div class="distance-badge" style="background:#4affaa; color:black;">📍 CURRENT</div>`;
                }
                
                card.innerHTML = `
                    ${distanceDisplay}
                    <div class="star-icon" style="text-shadow: 0 0 20px ${star.color}">${star.icon}</div>
                    <div class="star-info">
                        <div class="star-name" style="color: ${star.color}">${star.name}</div>
                        <div class="star-type">${star.type}</div>
                        <div class="star-details">⏺️ ${star.planets} planets</div>
                    </div>
                `;
                
                starsGrid.appendChild(card);
            });
        }

        // ===== GENERATE STAR DISTANCE =====
        function generateStarDistance(starIndex) {
            // Deterministic "random" distance based on star index
            const seed = clusterSeed + starIndex * 1000;
            const rand = Math.sin(seed) * 10000;
            return (Math.abs(rand) % 30 + 5) / 10; // 0.5 to 3.5 LY
        }

        // ===== SELECT STAR =====
        window.selectStar = async function(index) {
            const star = stars.find(s => s.index === index);
            if (!star) return;

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'calculating warp...';

            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            try {
                // Calculate warp data
                const distance = generateStarDistance(star.index);
                const trip = calculateStarTrip(0, 0, distance, distance);

                // Save star data
                await setCurrentStar(
                    star.name,
                    star.type,
                    star.index,
                    star.planets + ' planets',
                    star.position.x,
                    star.position.y
                );

                // Save warp data
                setWarpData(
                    star.name,
                    'star-cluster.html',
                    trip.cycles,
                    trip.distance,
                    trip.fuel
                );

                // Navigate to system view
                setTimeout(() => {
                    window.location.href = 'system-view.html';
                }, 500);

            } catch (error) {
                console.error('Error selecting star:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to select star. Please try again.');
            }
        };

        // ===== NAVIGATION =====
        window.returnToSectors = function() {
            window.location.href = 'star-sectors.html';
        };

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star cluster...';

                // Check for player data
                const credits = await getCredits();
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load cluster data
                await loadClusterData();

                // Generate stars
                generateStars();

                // Render stars
                renderStars();

                // Check migration status
                const migrated = await isMigrationComplete();
                migrationStatus.textContent = migrated ? '✓ DB Ready' : '⚡ Loading';
                migrationStatus.style.display = 'block';
                setTimeout(() => {
                    migrationStatus.style.display = 'none';
                }, 3000);

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
