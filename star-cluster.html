<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .stars-grid {
            position: relative;
            width: 100%;
            min-height: 200%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .star-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        
        .star-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.98);
        }
        
        .star-icon {
            font-size: 40px;
            min-width: 60px;
            text-align: center;
        }
        
        .star-info {
            flex: 1;
        }
        
        .star-name {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'WindSong', cursive;
            margin-bottom: 5px;
        }
        
        .star-details {
            color: #a0c0ff;
            font-size: 14px;
        }
        
        .star-planets {
            color: #ffd966;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .ui-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #6a8ac0;
        }
        
        .ui-header h1 {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
        }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.9);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
        }
        
        .cluster-info {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.9);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 20px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 20;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <div class="ui-header">
            <h1 id="clusterTitle">Star Cluster</h1>
        </div>
        
        <div class="stars-grid" id="starsGrid"></div>
        
        <button class="back-btn" onclick="returnToSectors()">← Sectors</button>
        
        <div class="cluster-info" id="clusterInfo">
            <div class="cluster-name" id="clusterName">Loading...</div>
            <div id="starCount">0 stars</div>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();
        
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // Load data
        const clusterName = localStorage.getItem('voidfarer_current_nebula') || 'Unknown Cluster';
        const starCount = parseInt(localStorage.getItem('voidfarer_current_sector_stars')) || 40;
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'Orion';
        
        document.getElementById('clusterTitle').textContent = clusterName;
        document.getElementById('clusterName').textContent = clusterName;
        document.getElementById('starCount').textContent = starCount + ' stars';
        
        const clusterSeed = UNIVERSE_SEED + hashString(currentSector) * 100 + hashString(clusterName) % 100000;
        
        // Star types with proper colors and icons
        const starTypes = [
            { type: 'Blue Giant', icon: '🔵', color: '#6ba5ff', prob: 0.15, planets: '5-12' },
            { type: 'White Star', icon: '⚪', color: '#ffffff', prob: 0.35, planets: '3-7' },
            { type: 'Yellow Star', icon: '🟡', color: '#ffd700', prob: 0.20, planets: '3-8' },
            { type: 'Orange Star', icon: '🟠', color: '#ff8c42', prob: 0.15, planets: '2-6' },
            { type: 'Red Dwarf', icon: '🔴', color: '#ff6b6b', prob: 0.10, planets: '2-5' },
            { type: 'Black Hole', icon: '⚫', color: '#4a4a4a', prob: 0.03, planets: '0' },
            { type: 'Neutron Star', icon: '💫', color: '#b0b0ff', prob: 0.02, planets: '0' }
        ];
        
        // Star names
        const prefixes = ['Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
                         'Alpha', 'Beta', 'Prox', 'Rig', 'Veg', 'Sir', 'Arc', 'Den', 'Alt', 'Poll'];
        const suffixes = ['Majoris', 'Minoris', 'Prime', 'A', 'B', 'C', 'Alpha', 'Beta', 'Centauri', 'Orionis'];
        
        function getStarType() {
            const rand = seededRandom(clusterSeed, Math.random() * 1000);
            let cum = 0;
            for (const t of starTypes) {
                cum += t.prob;
                if (rand < cum) return t;
            }
            return starTypes[1];
        }
        
        // Generate stars
        const stars = [];
        for (let i = 0; i < starCount; i++) {
            const type = getStarType();
            const prefix = prefixes[Math.floor(seededRandom(clusterSeed, i) * prefixes.length)];
            const suffix = suffixes[Math.floor(seededRandom(clusterSeed, i + 100) * suffixes.length)];
            const name = prefix + ' ' + suffix;
            
            stars.push({
                name: name,
                type: type.type,
                icon: type.icon,
                color: type.color,
                planets: type.planets
            });
        }
        
        // Sort stars by type (Blue giants first, black holes last)
        stars.sort((a, b) => {
            const order = { 'Blue Giant': 1, 'White Star': 2, 'Yellow Star': 3, 'Orange Star': 4, 'Red Dwarf': 5, 'Neutron Star': 6, 'Black Hole': 7 };
            return (order[a.type] || 99) - (order[b.type] || 99);
        });
        
        // Render stars as cards
        const grid = document.getElementById('starsGrid');
        stars.forEach((star, index) => {
            const card = document.createElement('div');
            card.className = 'star-card';
            card.onclick = () => selectStar(index);
            
            card.innerHTML = `
                <div class="star-icon" style="text-shadow: 0 0 20px ${star.color}">${star.icon}</div>
                <div class="star-info">
                    <div class="star-name" style="color: ${star.color}">${star.name}</div>
                    <div class="star-details">${star.type}</div>
                    <div class="star-planets">⏺️ ${star.planets} planets</div>
                </div>
            `;
            
            grid.appendChild(card);
        });
        
        function selectStar(index) {
            const star = stars[index];
            loadingOverlay.classList.add('active');
            
            localStorage.setItem('voidfarer_current_star', star.name);
            localStorage.setItem('voidfarer_current_star_type', star.type);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'system-view.html';
            }, 500);
        }
        
        function returnToSectors() {
            window.location.href = 'star-sectors.html';
        }
    </script>
</body>
</html>
