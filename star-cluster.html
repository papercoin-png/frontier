<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Cluster</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .cluster-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Canvas container */
        .canvas-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            touch-action: none;
            background: #0a0a1a;
        }
        
        #clusterCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            cursor: grab;
        }
        
        #clusterCanvas:active {
            cursor: grabbing;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #b09aff, 0 0 40px #8a6aff;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            padding: 10px 25px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid rgba(200, 180, 255, 0.5);
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: bold;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        
        .back-btn:active {
            background: rgba(200, 180, 255, 0.3);
            transform: scale(0.96);
        }
        
        .cluster-info {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 30px 10px 30px 10px;
            font-size: 16px;
            z-index: 30;
            text-align: center;
            min-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .cluster-name {
            font-family: 'WindSong', cursive;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 5px;
        }
        
        /* Star markers container */
        .star-markers-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        
        .star-marker {
            position: absolute;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .star-marker:active {
            transform: translate(-50%, -50%) scale(0.9);
        }
        
        .star-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 21;
            pointer-events: none;
            opacity: 0.8;
        }
        
        .star-core {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 40px currentColor;
            z-index: 22;
            border: 3px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .star-label {
            position: absolute;
            top: 55px;
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 16px;
            text-shadow: 0 0 15px #000;
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            border: 2px solid rgba(255,255,255,0.5);
            white-space: nowrap;
            z-index: 23;
            pointer-events: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* Star type colors */
        .star-blue .star-glow {
            background: radial-gradient(circle, rgba(100, 150, 255, 0.8), transparent 80%);
        }
        .star-blue .star-core {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #4a8aff);
        }
        
        .star-white .star-glow {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent 80%);
        }
        .star-white .star-core {
            width: 26px;
            height: 26px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0ff);
        }
        
        .star-yellow .star-glow {
            background: radial-gradient(circle, rgba(255, 220, 100, 0.8), transparent 80%);
        }
        .star-yellow .star-core {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #ffffc0, #ffaa00);
        }
        
        .star-orange .star-glow {
            background: radial-gradient(circle, rgba(255, 160, 80, 0.7), transparent 80%);
        }
        .star-orange .star-core {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ffcc99, #ff8c42);
        }
        
        .star-red .star-glow {
            background: radial-gradient(circle, rgba(255, 100, 100, 0.6), transparent 80%);
        }
        .star-red .star-core {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #ffb6b6, #ff4d4d);
        }
        
        .star-purple .star-glow {
            background: radial-gradient(circle, rgba(180, 100, 255, 0.7), transparent 80%);
        }
        .star-purple .star-core {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #e0b0ff, #a06aff);
        }
        
        /* Zoom controls */
        .zoom-controls {
            position: absolute;
            top: 50%;
            right: max(15px, env(safe-area-inset-right));
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 35;
        }
        
        .zoom-btn {
            width: 60px;
            height: 60px;
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 180, 255, 0.5);
            color: white;
            border-radius: 50%;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.1s;
            font-weight: bold;
        }
        
        .zoom-btn:active {
            background: rgba(200, 180, 255, 0.3);
            transform: scale(0.9);
        }
        
        /* Debug info (remove after fixing) */
        .debug-info {
            position: absolute;
            top: 100px;
            left: 20px;
            color: yellow;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            z-index: 100;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 15px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #b09aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 15px #b09aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .cluster-info { bottom: max(20px, env(safe-area-inset-bottom)); right: max(15px, env(safe-area-inset-right)); }
            .zoom-controls { right: max(15px, env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>
    <div class="cluster-view">
        <!-- Debug info (remove after fixing) -->
        <div class="debug-info" id="debugInfo">Loading...</div>
        
        <div class="canvas-container" id="canvasContainer">
            <canvas id="clusterCanvas"></canvas>
        </div>
        
        <!-- Star markers container -->
        <div class="star-markers-container" id="starMarkersContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="clusterTitle">Star Cluster</div>
        
        <div class="cluster-info" id="clusterInfo">
            <div class="cluster-name" id="clusterName">Loading...</div>
            <div id="starCount">0 stars</div>
            <div id="clusterType" style="font-size:12px; margin-top:4px;">-</div>
        </div>
        
        <button class="back-btn" onclick="returnToSectors()">← Sectors</button>
        
        <!-- Zoom controls -->
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <button class="zoom-btn" onclick="resetZoom()">⟲</button>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">entering system...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clusterCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const markersContainer = document.getElementById('starMarkersContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const debugInfo = document.getElementById('debugInfo');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ===== SEEDED RANDOM =====
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index = 0) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function seededRandomRange(seed, index, min, max) {
            return Math.floor(seededRandom(seed, index) * (max - min + 1)) + min;
        }
        
        function seededRandomChoice(seed, index, array) {
            return array[Math.floor(seededRandom(seed, index) * array.length)];
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // ===== DEBUG: CHECK LOCALSTORAGE =====
        debugInfo.innerHTML = 'Checking localStorage...<br>';
        
        // ===== LOAD CLUSTER DATA =====
        const clusterName = localStorage.getItem('voidfarer_current_nebula');
        const sectorType = localStorage.getItem('voidfarer_current_sector_type');
        const starCount = localStorage.getItem('voidfarer_current_sector_stars');
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector');
        
        debugInfo.innerHTML += `clusterName: ${clusterName}<br>`;
        debugInfo.innerHTML += `sectorType: ${sectorType}<br>`;
        debugInfo.innerHTML += `starCount: ${starCount}<br>`;
        debugInfo.innerHTML += `currentSector: ${currentSector}<br>`;
        
        // Use defaults if not found
        const finalClusterName = clusterName || 'Orion Molecular Cloud';
        const finalSectorType = sectorType || 'Star-forming';
        const finalStarCount = parseInt(starCount) || 85;
        const finalCurrentSector = currentSector || 'Orion';
        
        document.getElementById('clusterTitle').textContent = finalClusterName;
        document.getElementById('clusterName').textContent = finalClusterName;
        document.getElementById('starCount').textContent = finalStarCount + ' stars';
        document.getElementById('clusterType').textContent = finalSectorType;
        
        debugInfo.innerHTML += `Using: ${finalStarCount} stars<br>`;
        
        // ===== GENERATE SEED =====
        const clusterSeed = UNIVERSE_SEED + 
                           hashString(finalCurrentSector) * 100 + 
                           hashString(finalClusterName) % 100000;
        
        debugInfo.innerHTML += `clusterSeed: ${clusterSeed}<br>`;
        
        // ===== STAR NAME GENERATION =====
        const namePrefixes = [
            'Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
            'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon',
            'Phi', 'Chi', 'Psi', 'Omega', 'Alpha', 'Beta', 'Prox', 'Rig', 'Veg', 'Sir'
        ];
        
        const nameSuffixes = [
            'Majoris', 'Minoris', 'Prime', 'Secundus', 'Tertius', 'A', 'B', 'C', 'Alpha', 'Beta',
            'Gamma', 'Delta', 'Centauri', 'Orionis', 'Cygnii', 'Andromedae', 'Australis', 'Borealis'
        ];
        
        function generateStarName(seed, index) {
            const prefix = seededRandomChoice(seed, index * 2, namePrefixes);
            const suffix = seededRandomChoice(seed, index * 2 + 1, nameSuffixes);
            return prefix + ' ' + suffix;
        }
        
        // ===== GENERATE STARS =====
        const stars = [];
        const typeProbabilities = [
            { type: 'white', prob: 0.35 },
            { type: 'yellow', prob: 0.20 },
            { type: 'blue', prob: 0.15 },
            { type: 'orange', prob: 0.15 },
            { type: 'red', prob: 0.10 },
            { type: 'purple', prob: 0.05 }
        ];
        
        debugInfo.innerHTML += `Generating ${finalStarCount} stars...<br>`;
        
        for (let i = 0; i < finalStarCount; i++) {
            const rand = seededRandom(clusterSeed, i * 10);
            let cumulative = 0;
            let starType = 'white';
            
            for (const t of typeProbabilities) {
                cumulative += t.prob;
                if (rand < cumulative) {
                    starType = t.type;
                    break;
                }
            }
            
            const name = generateStarName(clusterSeed, i * 100);
            
            // Spread stars across the canvas
            const x = seededRandomRange(clusterSeed, i * 10 + 1, 10, 90);
            const y = seededRandomRange(clusterSeed, i * 10 + 2, 10, 90);
            
            const sizeMap = {
                'blue': 30, 'yellow': 32, 'white': 28, 'orange': 28, 'red': 26, 'purple': 30
            };
            
            let planetCount;
            if (starType === 'blue') planetCount = seededRandomRange(clusterSeed, i * 10 + 3, 5, 12);
            else if (starType === 'yellow') planetCount = seededRandomRange(clusterSeed, i * 10 + 4, 3, 8);
            else if (starType === 'orange') planetCount = seededRandomRange(clusterSeed, i * 10 + 5, 2, 6);
            else if (starType === 'red') planetCount = seededRandomRange(clusterSeed, i * 10 + 6, 2, 5);
            else if (starType === 'white') planetCount = seededRandomRange(clusterSeed, i * 10 + 7, 3, 7);
            else planetCount = seededRandomRange(clusterSeed, i * 10 + 8, 4, 9);
            
            stars.push({
                name: name,
                type: starType,
                x: x,
                y: y,
                size: sizeMap[starType],
                planets: planetCount
            });
        }
        
        debugInfo.innerHTML += `Generated ${stars.length} stars<br>`;
        
        // ===== PANZOOM INITIALIZATION =====
        let panzoomInstance;
        
        function initPanzoom() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            panzoomInstance = Panzoom(canvas, {
                maxScale: 4,
                minScale: 1,
                contain: 'outside',
                canvas: true,
                startScale: 1,
                startX: 0,
                startY: 0
            });
            
            container.addEventListener('wheel', panzoomInstance.zoomWithWheel);
            
            canvas.addEventListener('panzoom', function(e) {
                if (panzoomInstance) {
                    const scale = panzoomInstance.getScale();
                    const pan = panzoomInstance.getPan();
                    markersContainer.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${scale})`;
                }
            });
        }
        
        // ===== DRAW BACKGROUND =====
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background stars
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.2 + 0.1;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw bright dots for stars
            stars.forEach(star => {
                const x = (star.x / 100) * canvas.width;
                const y = (star.y / 100) * canvas.height;
                
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
            });
        }
        
        // ===== CREATE STAR MARKERS =====
        function createStarMarkers() {
            markersContainer.innerHTML = '';
            
            stars.forEach((star, index) => {
                const marker = document.createElement('div');
                marker.className = `star-marker star-${star.type}`;
                marker.style.left = star.x + '%';
                marker.style.top = star.y + '%';
                marker.setAttribute('onclick', `selectStar(${index})`);
                
                marker.innerHTML = `
                    <div class="star-glow"></div>
                    <div class="star-core"></div>
                    <span class="star-label">${star.name}</span>
                `;
                
                markersContainer.appendChild(marker);
            });
            
            debugInfo.innerHTML += `Created ${stars.length} markers<br>`;
        }
        
        // ===== ZOOM CONTROLS =====
        function zoomIn() {
            if (panzoomInstance) {
                const scale = panzoomInstance.getScale();
                panzoomInstance.zoomTo(scale + 0.5);
            }
        }
        
        function zoomOut() {
            if (panzoomInstance) {
                const scale = panzoomInstance.getScale();
                if (scale > 1) {
                    panzoomInstance.zoomTo(scale - 0.5);
                }
            }
        }
        
        function resetZoom() {
            if (panzoomInstance) {
                panzoomInstance.zoomTo(1);
                panzoomInstance.panTo(0, 0);
                markersContainer.style.transform = 'translate(0px, 0px) scale(1)';
            }
        }
        
        // ===== STAR SELECTION =====
        function selectStar(index) {
            const star = stars[index];
            if (!star) return;
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            localStorage.setItem('voidfarer_current_star', star.name);
            localStorage.setItem('voidfarer_current_star_type', star.type);
            localStorage.setItem('voidfarer_current_star_planets', star.planets);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'system-view.html';
            }, 800);
        }
        
        function returnToSectors() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'star-sectors.html';
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            initPanzoom();
            drawBackground();
            createStarMarkers();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drawBackground();
            });
        }
        
        init();
    </script>
</body>
</html>
