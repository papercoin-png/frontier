<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Real Estate</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .estate-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a2a3a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a9a8a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #4a9a8a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .estate-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .estate-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #c0e0ff;
            text-shadow: 0 0 20px #4a8a6a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .estate-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .total-capacity {
            font-size: 14px;
            color: #a0d0c0;
            text-align: right;
        }
        
        /* Ship Cargo Card */
        .ship-cargo-card {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #3a5a8a;
        }
        
        .ship-cargo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            border-bottom: 1px solid #6a8ac0;
            padding-bottom: 8px;
        }
        
        .ship-cargo-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ship-cargo-title span {
            font-size: 24px;
        }
        
        .ship-cargo-stats {
            color: #a0c0ff;
            font-size: 14px;
        }
        
        .ship-items-preview {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .ship-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(106, 138, 192, 0.3);
        }
        
        .ship-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ship-item-icon {
            font-size: 20px;
        }
        
        .ship-item-name {
            color: #ffffff;
            font-size: 14px;
        }
        
        .ship-item-count {
            color: #ffd966;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 20px;
        }
        
        /* Unload Cargo Button */
        .unload-cargo-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a9a8a, #2a6a5a);
            border: 2px solid #4affaa;
            color: #ffffff;
            padding: 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            margin-top: 10px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .unload-cargo-btn:active {
            transform: scale(0.97);
            background: #2a6a5a;
        }
        
        .unload-cargo-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .view-all-cargo {
            text-align: center;
            margin-top: 10px;
        }
        
        .view-all-btn {
            background: rgba(74, 138, 192, 0.2);
            border: 1px solid #6a8ac0;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
            display: inline-block;
        }
        
        .view-all-btn:active {
            background: #6a8ac0;
            transform: scale(0.96);
        }
        
        /* Properties Section */
        .section-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            font-family: 'Exo 2', sans-serif;
            border-bottom: 1px solid #4a9a8a;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title span {
            color: #ffd966;
            font-size: 16px;
        }
        
        .properties-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .property-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 18px;
            box-shadow: 0 0 20px #2a5a5a;
        }
        
        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .property-name {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .property-type {
            color: #a0d0c0;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 30px;
        }
        
        .property-details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #a0d0c0;
            font-size: 14px;
        }
        
        .property-capacity {
            color: #ffd966;
            font-weight: 600;
        }
        
        .property-capacity-unit {
            color: #4affaa;
            font-size: 11px;
            margin-left: 2px;
        }
        
        .property-date {
            color: #4a9a8a;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #4a9a8a;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9a8a, #7ac0b0);
            transition: width 0.3s;
        }
        
        .property-actions {
            display: flex;
            gap: 10px;
        }
        
        .property-btn {
            flex: 1;
            background: rgba(74, 154, 138, 0.2);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 10px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .property-btn:active {
            background: #4a9a8a;
            transform: scale(0.96);
        }
        
        .property-btn.primary {
            background: rgba(74, 154, 138, 0.4);
            border-color: #7ac0b0;
        }
        
        /* Available Properties */
        .market-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .market-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .market-card:active {
            background: rgba(50, 100, 110, 0.7);
            transform: scale(0.99);
        }
        
        .market-card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .market-name {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .market-price {
            color: #ffd966;
            font-size: 18px;
            font-weight: 600;
        }
        
        .market-details {
            display: flex;
            gap: 20px;
            color: #a0d0c0;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .market-capacity {
            color: #4affaa;
            font-weight: 600;
        }
        
        .market-capacity-unit {
            color: #a0d0c0;
            font-size: 11px;
            margin-left: 2px;
        }
        
        .market-desc {
            color: #a0d0c0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .purchase-btn {
            width: 100%;
            background: rgba(255, 170, 74, 0.2);
            border: 1px solid #ffaa4a;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .purchase-btn:active {
            background: #ffaa4a;
            transform: scale(0.97);
        }
        
        .purchase-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0b0c0;
            background: rgba(30, 60, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #4a9a8a;
            font-style: italic;
        }
        
        /* Scroll Hint */
        .scroll-hint {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin: 20px 0 80px;
            font-style: italic;
            font-family: 'Exo 2', sans-serif;
            animation: fade-in-out 2s infinite;
            letter-spacing: 1px;
        }
        
        @keyframes fade-in-out {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Enhanced Back Button - Fixed positioning */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
            pointer-events: auto;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="estate-view" id="estateView">
            <!-- Header -->
            <div class="estate-header">
                <div class="estate-title">Real Estate</div>
                <div class="estate-subtitle">✦ Earth Hub Storage Expansion ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="total-capacity" id="totalCapacity">
                    Hub Storage: --/-- AMU
                </div>
            </div>
            
            <!-- Ship Cargo Card -->
            <div class="ship-cargo-card" id="shipCargoCard">
                <div class="ship-cargo-header">
                    <div class="ship-cargo-title">
                        <span>🚀</span> Ship Cargo Hold
                    </div>
                    <div class="ship-cargo-stats" id="shipCargoStats">
                        --/-- AMU
                    </div>
                </div>
                
                <!-- Preview of ship items (no transfer buttons) -->
                <div class="ship-items-preview" id="shipItemsPreview">
                    <div class="empty-state" style="padding: 15px;">Loading ship cargo...</div>
                </div>
                
                <!-- UNLOAD CARGO BUTTON - Single button for all transfers -->
                <button class="unload-cargo-btn" id="unloadCargoBtn" onclick="window.unloadAllCargo()">📦 UNLOAD CARGO</button>
                
                <!-- View all cargo button -->
                <div class="view-all-cargo">
                    <button class="view-all-btn" onclick="window.viewAllCargo()">VIEW FULL CARGO</button>
                </div>
            </div>
            
            <!-- Your Properties Section -->
            <div class="section-title">
                ✦ Your Earth Hub Properties
                <span id="hubItemCount"></span>
            </div>
            <div class="properties-grid" id="propertiesContainer">
                <div class="empty-state">Loading your properties...</div>
            </div>
            
            <!-- Available Properties Section -->
            <div class="section-title">✦ Available for Purchase</div>
            <div class="market-grid" id="marketContainer">
                <div class="empty-state">Loading available properties...</div>
            </div>
            
            <!-- Scroll Hint -->
            <div class="scroll-hint">▼ scroll down to return to Earth Hub ▼</div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToEarthHub()">
                <span class="back-arrow">←</span>
                <span class="back-text">EARTH HUB</span>
                <span class="back-icon">🌍</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">processing...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- CRITICAL FIX: Added type="module" to all script tags -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>

    <script type="module">
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a2a3a');
            tg.setBackgroundColor('#0a2a3a');
        }

        // ===== IMPORT STORAGE FUNCTIONS =====
        import { getPlayerId, getCredits, spendCredits, getCollection, addElementToHub, removeElementFromCollection, addElementToCollection, getRemainingHubStorage, getRealEstate, saveRealEstate } from './js/storage.js';

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToEarthHub = returnToEarthHub;
        window.purchaseProperty = purchaseProperty;
        window.viewProperty = viewProperty;
        window.transferToProperty = transferToProperty;
        window.viewAllCargo = viewAllCargo;
        window.unloadAllCargo = unloadAllCargo;

        // ===== PLAYER ID =====
        let currentPlayerId = null;

        // ===== PROPERTY TYPES (with mass capacity) =====
        const PROPERTY_TYPES = {
            'storage_locker': {
                name: 'Storage Locker',
                capacity: 500,
                price: 10000,
                icon: '🔐',
                desc: 'Basic personal storage unit at Earth Hub. Adds 500 AMU to your hub storage.'
            },
            'small_warehouse': {
                name: 'Small Warehouse',
                capacity: 2000,
                price: 50000,
                icon: '🏢',
                desc: 'Secure storage facility at Earth Hub. Adds 2,000 AMU to your hub storage.'
            },
            'commercial_depot': {
                name: 'Commercial Depot',
                capacity: 10000,
                price: 200000,
                icon: '🏭',
                desc: 'Industrial-sized warehouse at Earth Hub. Adds 10,000 AMU to your hub storage.'
            },
            'orbital_platform': {
                name: 'Orbital Platform',
                capacity: 50000,
                price: 1000000,
                icon: '🛰️',
                desc: 'Zero-G storage in Earth orbit. Adds 50,000 AMU to your hub storage.'
            }
        };

        // ===== STORAGE KEYS =====
        const STORAGE_KEYS = {
            HUB_STORAGE_MAX: 'voidfarer_hub_storage_max',
            HUB_STORAGE_USED: 'voidfarer_hub_storage_used',
            SHIP_STORAGE_MAX: 'voidfarer_ship_storage_max',
            SHIP_STORAGE_USED: 'voidfarer_ship_storage_used'
        };

        // ===== ELEMENT ICONS =====
        const elementIcons = {
            'Hydrogen': '💧', 'Helium': '🎈', 'Lithium': '🔋', 'Beryllium': '💎',
            'Boron': '🧪', 'Sodium': '🧂', 'Magnesium': '✨', 'Aluminum': '🥫',
            'Silicon': '💻', 'Potassium': '🍌', 'Calcium': '🥛',
            'Carbon': '⚫', 'Nitrogen': '🌬️', 'Oxygen': '💨', 'Fluorine': '🧪',
            'Neon': '💡', 'Phosphorus': '✨', 'Sulfur': '🟡', 'Chlorine': '🧪',
            'Argon': '🎈', 'Iron': '⚙️', 'Nickel': '🔩', 'Lead': '🔘',
            'Gold': '🟡', 'Silver': '⚪', 'Platinum': '⬜', 'Titanium': '🔷',
            'Copper': '🔴', 'Zinc': '⚪', 'Tin': '🥫', 'Cobalt': '🔵',
            'Chromium': '✨', 'Mercury': '💧', 'Uranium': '🟣', 'Thorium': '🔮',
            'Plutonium': '☢️', 'Promethium': '✨',
            'default': '🔹'
        };

        function getElementIcon(elementName) {
            return elementIcons[elementName] || elementIcons.default;
        }

        // ===== GET ELEMENT MASS =====
        function getElementMass(elementName) {
            if (typeof window.getElementMass === 'function') {
                return window.getElementMass(elementName);
            }
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Carbon': 12.01, 'Oxygen': 16.00,
                'Iron': 55.85, 'Gold': 197.0, 'Silver': 107.9, 'Copper': 63.55,
                'Uranium': 238.0, 'Plutonium': 244.0, 'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        // ===== GET ELEMENT RARITY =====
        function getElementRarity(elementName) {
            if (['Gold', 'Silver', 'Platinum', 'Titanium', 'Copper'].includes(elementName)) return 'rare';
            if (['Uranium', 'Thorium', 'Plutonium'].includes(elementName)) return 'very-rare';
            if (['Promethium'].includes(elementName)) return 'legendary';
            if (['Carbon', 'Oxygen', 'Iron'].includes(elementName)) return 'uncommon';
            return 'common';
        }

        // ===== STATE =====
        let currentShipItems = [];

        // ===== GET CURRENT PLAYER ID =====
        function getCurrentPlayerId() {
            if (!currentPlayerId) {
                currentPlayerId = getPlayerId();
            }
            return currentPlayerId;
        }

        // ===== LOAD SHIP CARGO =====
        async function loadShipCargo() {
            try {
                const playerId = getCurrentPlayerId();
                let collection = await getCollection(playerId);
                
                currentShipItems = [];
                for (const [name, data] of Object.entries(collection)) {
                    const count = typeof data === 'object' ? data.count : data;
                    currentShipItems.push({
                        name: name,
                        count: count,
                        massPerUnit: getElementMass(name),
                        icon: getElementIcon(name),
                        rarity: getElementRarity(name)
                    });
                }
                
                currentShipItems.sort((a, b) => b.count - a.count);
                
                let totalMass = 0;
                for (const item of currentShipItems) {
                    totalMass += item.count * item.massPerUnit;
                }
                
                document.getElementById('shipCargoStats').textContent = `${totalMass.toFixed(1)}/5000 AMU`;
                
                renderShipPreview();
                
            } catch (error) {
                console.error('Error loading ship cargo:', error);
            }
        }

        // ===== RENDER SHIP PREVIEW (NO TRANSFER BUTTONS) =====
        function renderShipPreview() {
            const previewEl = document.getElementById('shipItemsPreview');
            
            if (currentShipItems.length === 0) {
                previewEl.innerHTML = '<div class="empty-state" style="padding: 15px;">No items in ship cargo</div>';
                return;
            }
            
            let html = '';
            const previewItems = currentShipItems.slice(0, 5);
            
            previewItems.forEach(item => {
                html += `
                    <div class="ship-item-row">
                        <div class="ship-item-info">
                            <span class="ship-item-icon">${item.icon}</span>
                            <span class="ship-item-name">${item.name}</span>
                            <span class="ship-item-count">${item.count}</span>
                        </div>
                    </div>
                `;
            });
            
            if (currentShipItems.length > 5) {
                html += `<div style="text-align: center; padding: 8px; color: #a0c0ff; font-size: 12px;">+${currentShipItems.length - 5} more items</div>`;
            }
            
            previewEl.innerHTML = html;
        }

        // ===== EARTH HUB STORAGE UPDATE FUNCTION =====
        async function updateHubStorage(propertyData) {
            try {
                const properties = propertyData.properties || [];
                let totalCapacity = 0;
                
                properties.forEach(prop => {
                    totalCapacity += prop.capacity || 0;
                });
                
                let usedStorage = await getCurrentHubStorageUsed();
                
                localStorage.setItem(STORAGE_KEYS.HUB_STORAGE_MAX, totalCapacity.toString());
                localStorage.setItem(STORAGE_KEYS.HUB_STORAGE_USED, usedStorage.toString());
                
                try {
                    let hubData = {};
                    const hubJson = localStorage.getItem('voidfarer_hub_data');
                    if (hubJson) {
                        hubData = JSON.parse(hubJson);
                    }
                    hubData.storageMax = totalCapacity;
                    hubData.storageUsed = usedStorage;
                    localStorage.setItem('voidfarer_hub_data', JSON.stringify(hubData));
                } catch (e) {
                    console.log('Could not update hub data:', e);
                }
                
                window.dispatchEvent(new CustomEvent('hub-storage-updated', {
                    detail: { max: totalCapacity, used: usedStorage }
                }));
                
                return { totalCapacity, usedStorage };
            } catch (error) {
                console.error('Error updating hub storage:', error);
                return { totalCapacity: 0, usedStorage: 0 };
            }
        }

        async function getCurrentHubStorageUsed() {
            let used = 0;
            const storedUsed = localStorage.getItem(STORAGE_KEYS.HUB_STORAGE_USED);
            if (storedUsed) {
                used = parseFloat(storedUsed);
                return used;
            }
            return used;
        }

        async function getHubAvailable() {
            try {
                return await getRemainingHubStorage();
            } catch (error) {
                const max = parseFloat(localStorage.getItem(STORAGE_KEYS.HUB_STORAGE_MAX) || '0');
                const used = parseFloat(localStorage.getItem(STORAGE_KEYS.HUB_STORAGE_USED) || '0');
                return Math.max(0, max - used);
            }
        }

        // ===== UNLOAD ALL CARGO - SINGLE BUTTON FUNCTION =====
        async function unloadAllCargo() {
            if (currentShipItems.length === 0) {
                alert('No cargo to unload');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'unloading cargo to hub...';
            
            try {
                let currentAvailable = await getHubAvailable();
                let totalMassToTransfer = 0;
                
                for (const item of currentShipItems) {
                    totalMassToTransfer += item.count * item.massPerUnit;
                }
                
                if (totalMassToTransfer > currentAvailable) {
                    alert(`Not enough hub storage space!\n\nNeed: ${totalMassToTransfer.toFixed(1)} AMU\nAvailable: ${currentAvailable.toFixed(1)} AMU\n\nBuy more properties to expand hub storage.`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                let transferred = 0;
                
                for (const item of currentShipItems) {
                    const removeResult = await removeElementFromCollection(item.name, item.count);
                    if (removeResult.success) {
                        const addResult = await addElementToHub(item.name, item.count);
                        if (addResult.success) {
                            transferred += item.count;
                        } else {
                            await addElementToCollection(item.name, item.count);
                        }
                    }
                }
                
                await loadAllData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                alert(`✅ Unloaded ${transferred} items to Earth Hub storage`);
                
            } catch (error) {
                console.error('Unload error:', error);
                alert('Error unloading cargo');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== NAVIGATION =====
        function returnToEarthHub() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateHubStorageBeforeLeave();
            window.location.href = 'earth-hub.html';
        }

        async function updateHubStorageBeforeLeave() {
            try {
                const propertyData = await getRealEstate(getCurrentPlayerId());
                await updateHubStorage(propertyData);
            } catch (e) {
                console.log('Final hub storage update:', e);
            }
        }

        function navigateTo(screen) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'navigating...';
            
            updateHubStorageBeforeLeave().then(() => {
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                    window.location.href = screen;
                }, 300);
            });
        }

        function viewAllCargo() {
            navigateTo('cargo.html');
        }

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                const playerId = getCurrentPlayerId();
                let credits = await getCredits(playerId);
                let propertyData = await getRealEstate(playerId);
                let usedStorage = await getCurrentHubStorageUsed();

                document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;

                renderProperties(propertyData, usedStorage);
                renderMarket(propertyData, credits);
                await updateTotalCapacityDisplay(propertyData, usedStorage);
                
                await loadShipCargo();

                const shipMax = localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_MAX) || '500';
                const shipUsed = localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_USED) || '0';
                console.log(`🚀 Ship cargo hold: ${shipUsed}/${shipMax} AMU`);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('propertiesContainer').innerHTML = 
                    '<div class="empty-state">Error loading properties</div>';
                document.getElementById('marketContainer').innerHTML = 
                    '<div class="empty-state">Error loading market</div>';
            }
        }

        function renderProperties(propertyData, usedStorage) {
            const container = document.getElementById('propertiesContainer');
            container.innerHTML = '';

            if (!propertyData.properties || propertyData.properties.length === 0) {
                container.innerHTML = '<div class="empty-state">You don\'t own any Earth Hub properties yet</div>';
                document.getElementById('hubItemCount').textContent = '';
                return;
            }

            const totalCapacity = propertyData.properties.reduce((sum, p) => sum + p.capacity, 0);
            document.getElementById('hubItemCount').textContent = `📦 ${propertyData.properties.length} properties`;
            
            propertyData.properties.forEach(prop => {
                const propType = PROPERTY_TYPES[prop.type];
                if (!propType) return;

                const propUsed = totalCapacity > 0 ? (prop.capacity / totalCapacity) * usedStorage : 0;
                const usedPercent = (propUsed / prop.capacity) * 100;

                const card = document.createElement('div');
                card.className = 'property-card';
                card.innerHTML = `
                    <div class="property-header">
                        <span class="property-name">${prop.name}</span>
                        <span class="property-type">${propType.icon} Earth Hub</span>
                    </div>
                    <div class="property-details">
                        <span>Adds: <span class="property-capacity">+${prop.capacity}</span> <span class="property-capacity-unit">AMU</span></span>
                        <span class="property-date">${new Date(prop.purchaseDate).toLocaleDateString()}</span>
                    </div>
                    <div class="capacity-bar-bg">
                        <div class="capacity-bar-fill" style="width: ${usedPercent}%"></div>
                    </div>
                    <div class="property-actions">
                        <button class="property-btn" onclick="window.viewProperty('${prop.id}')">HUB STORAGE</button>
                        <button class="property-btn primary" onclick="window.transferToProperty('${prop.id}')">VIEW HUB</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function renderMarket(propertyData, credits) {
            const container = document.getElementById('marketContainer');
            container.innerHTML = '';

            const ownedTypes = new Set((propertyData.properties || []).map(p => p.type));

            Object.keys(PROPERTY_TYPES).forEach(type => {
                const prop = PROPERTY_TYPES[type];
                const alreadyOwned = ownedTypes.has(type);

                const card = document.createElement('div');
                card.className = `market-card ${alreadyOwned ? 'disabled' : ''}`;

                card.innerHTML = `
                    <div class="market-header">
                        <span class="market-name">${prop.icon} ${prop.name}</span>
                        <span class="market-price">${prop.price.toLocaleString()}⭐</span>
                    </div>
                    <div class="market-details">
                        <span class="market-capacity">🏭 +${prop.capacity.toLocaleString()} <span class="market-capacity-unit">AMU</span></span>
                    </div>
                    <div class="market-desc">${prop.desc}</div>
                    <button class="purchase-btn" 
                        onclick="window.purchaseProperty('${type}')" 
                        ${alreadyOwned || credits < prop.price ? 'disabled' : ''}>
                        ${alreadyOwned ? '✓ OWNED' : 'EXPAND HUB STORAGE'}
                    </button>
                `;

                container.appendChild(card);
            });
        }

        async function updateTotalCapacityDisplay(propertyData, usedStorage) {
            let totalCapacity = 0;

            (propertyData.properties || []).forEach(prop => {
                totalCapacity += prop.capacity;
            });

            document.getElementById('totalCapacity').textContent = `Hub Storage: ${usedStorage.toFixed(1)}/${totalCapacity} AMU`;
        }

        async function purchaseProperty(type) {
            const propType = PROPERTY_TYPES[type];
            if (!propType) return;

            const playerId = getCurrentPlayerId();
            let credits = await getCredits(playerId);

            if (credits < propType.price) {
                alert('Not enough credits!');
                return;
            }

            let propertyData = await getRealEstate(playerId);

            if (propertyData.properties?.some(p => p.type === type)) {
                alert('You already own this type of property!');
                return;
            }

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'expanding hub storage...';

            try {
                const spent = await spendCredits(propType.price, playerId);
                if (!spent) {
                    throw new Error('Failed to spend credits');
                }

                let currentUsed = await getCurrentHubStorageUsed();

                const newProp = {
                    id: 'prop_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    type: type,
                    name: propType.name,
                    capacity: propType.capacity,
                    used: 0,
                    purchaseDate: new Date().toISOString(),
                    cost: propType.price,
                    location: 'earth_hub'
                };

                if (!propertyData.properties) {
                    propertyData.properties = [];
                }

                propertyData.properties.push(newProp);
                
                await saveRealEstate(propertyData, playerId);

                const { totalCapacity } = await updateHubStorage(propertyData);

                const shipMax = localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_MAX) || '500';
                const shipUsed = localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_USED) || '0';

                await loadAllData();

                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                alert(`✅ EARTH HUB STORAGE EXPANDED!\n\nYou've purchased ${propType.name} at Earth Hub.\n\n🏭 HUB STORAGE:\n• Added: +${propType.capacity} AMU\n• Total Hub Capacity: ${totalCapacity} AMU\n• Hub Used: ${currentUsed} AMU\n• Hub Available: ${(totalCapacity - currentUsed).toFixed(1)} AMU\n\n🚀 SHIP CARGO HOLD (Unchanged):\n• Ship Capacity: ${shipMax} AMU\n• Ship Used: ${shipUsed} AMU`);

            } catch (error) {
                console.error('Purchase error:', error);
                alert('Failed to purchase property');
            }

            loadingOverlay.classList.remove('active');
        }

        function viewProperty(propertyId) {
            const prop = PROPERTY_TYPES[propertyId.split('_')[1]];
            if (prop) {
                alert(`📍 Earth Hub: ${prop.name}\n\nThis property adds ${prop.capacity} AMU to your Earth Hub storage.\n\nAll your Earth Hub items share this space collectively.\n\n🚫 Does NOT affect your ship's cargo hold.`);
            } else {
                alert(`Earth Hub Property\n\nThis is part of your Earth Hub storage pool.\n\nShip cargo space remains separate.`);
            }
        }

        function transferToProperty(propertyId) {
            navigateTo(`hub-inventory.html`);
        }

        async function loadAllData() {
            await loadData();
        }

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading earth hub real estate...';

                currentPlayerId = getPlayerId();
                console.log('Real Estate loading for player:', currentPlayerId);

                if (!localStorage.getItem(STORAGE_KEYS.HUB_STORAGE_MAX)) {
                    localStorage.setItem(STORAGE_KEYS.HUB_STORAGE_MAX, '0');
                }
                if (!localStorage.getItem(STORAGE_KEYS.HUB_STORAGE_USED)) {
                    localStorage.setItem(STORAGE_KEYS.HUB_STORAGE_USED, '0');
                }

                if (!localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_MAX)) {
                    localStorage.setItem(STORAGE_KEYS.SHIP_STORAGE_MAX, '500');
                }
                if (!localStorage.getItem(STORAGE_KEYS.SHIP_STORAGE_USED)) {
                    localStorage.setItem(STORAGE_KEYS.SHIP_STORAGE_USED, '0');
                }

                await loadAllData();

                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading data';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
