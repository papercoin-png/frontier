<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Hub Storage</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .storage-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a2a3a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a9a8a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #4a9a8a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .storage-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .storage-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #c0e0ff;
            text-shadow: 0 0 20px #4a8a6a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .storage-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .hub-capacity {
            font-size: 14px;
            color: #a0d0c0;
            text-align: right;
        }
        
        /* Ship Cargo Card */
        .ship-cargo-card {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #3a5a8a;
        }
        
        .ship-cargo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            border-bottom: 1px solid #6a8ac0;
            padding-bottom: 8px;
        }
        
        .ship-cargo-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ship-cargo-title span {
            font-size: 24px;
        }
        
        .ship-cargo-stats {
            color: #a0c0ff;
            font-size: 14px;
        }
        
        .ship-items-preview {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .ship-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(106, 138, 192, 0.3);
        }
        
        .ship-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ship-item-icon {
            font-size: 20px;
        }
        
        .ship-item-name {
            color: #ffffff;
            font-size: 14px;
        }
        
        .ship-item-count {
            color: #ffd966;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 20px;
        }
        
        /* Unload Cargo Button */
        .unload-cargo-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a9a8a, #2a6a5a);
            border: 2px solid #4affaa;
            color: #ffffff;
            padding: 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            margin-top: 10px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .unload-cargo-btn:active {
            transform: scale(0.97);
            background: #2a6a5a;
        }
        
        .unload-cargo-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .view-all-cargo {
            text-align: center;
            margin-top: 10px;
        }
        
        .view-all-btn {
            background: rgba(74, 138, 192, 0.2);
            border: 1px solid #6a8ac0;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
            display: inline-block;
        }
        
        .view-all-btn:active {
            background: #6a8ac0;
            transform: scale(0.96);
        }
        
        /* Storage Card - Simple Upgrade UI */
        .storage-card {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #2a5a5a;
        }
        
        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .storage-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .storage-tier {
            background: rgba(74, 255, 170, 0.2);
            border: 1px solid #4affaa;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 12px;
            color: #4affaa;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #4a9a8a;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9a8a, #7ac0b0);
            transition: width 0.3s;
        }
        
        .capacity-numbers {
            text-align: center;
            color: #ffd966;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .upgrade-info {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 10px 30px 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        
        .next-tier-name {
            color: #4affaa;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .next-tier-details {
            color: #a0d0c0;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .upgrade-cost {
            color: #ffd966;
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .upgrade-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffaa4a, #cc8833);
            border: 2px solid #ffd966;
            color: #0a2a3a;
            padding: 14px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            margin-top: 10px;
        }
        
        .upgrade-btn:active {
            transform: scale(0.97);
        }
        
        .upgrade-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .max-tier-message {
            text-align: center;
            color: #4affaa;
            font-size: 18px;
            font-weight: 700;
            padding: 20px;
            background: rgba(74, 255, 170, 0.1);
            border-radius: 30px 10px 30px 10px;
            margin-top: 10px;
        }
        
        .view-hub-btn {
            width: 100%;
            background: rgba(74, 154, 138, 0.3);
            border: 2px solid #4a9a8a;
            color: #ffffff;
            padding: 14px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            margin-top: 15px;
        }
        
        .view-hub-btn:active {
            background: #4a9a8a;
            transform: scale(0.97);
        }
        
        /* Scroll Hint */
        .scroll-hint {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin: 20px 0 80px;
            font-style: italic;
            font-family: 'Exo 2', sans-serif;
            animation: fade-in-out 2s infinite;
            letter-spacing: 1px;
        }
        
        @keyframes fade-in-out {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Back button */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
            pointer-events: auto;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="storage-view" id="storageView">
            <!-- Header -->
            <div class="storage-header">
                <div class="storage-title">Hub Storage</div>
                <div class="storage-subtitle">✦ Earth Hub Warehouse ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="hub-capacity" id="hubCapacityDisplay">
                    Used: --/-- AMU
                </div>
            </div>
            
            <!-- Ship Cargo Card -->
            <div class="ship-cargo-card" id="shipCargoCard">
                <div class="ship-cargo-header">
                    <div class="ship-cargo-title">
                        <span>🚀</span> Ship Cargo Hold
                    </div>
                    <div class="ship-cargo-stats" id="shipCargoStats">
                        --/-- AMU
                    </div>
                </div>
                
                <!-- Preview of ship items -->
                <div class="ship-items-preview" id="shipItemsPreview">
                    <div class="empty-state" style="padding: 15px;">Loading ship cargo...</div>
                </div>
                
                <!-- UNLOAD CARGO BUTTON -->
                <button class="unload-cargo-btn" id="unloadCargoBtn" onclick="window.unloadAllCargo()">📦 UNLOAD CARGO</button>
                
                <!-- View all cargo button -->
                <div class="view-all-cargo">
                    <button class="view-all-btn" onclick="window.viewAllCargo()">VIEW FULL CARGO</button>
                </div>
            </div>
            
            <!-- Storage Card - Simple Upgrade UI -->
            <div class="storage-card">
                <div class="storage-header">
                    <span class="storage-title">🏭 Hub Warehouse</span>
                    <span class="storage-tier" id="currentTierDisplay">Starter</span>
                </div>
                
                <div class="capacity-bar-bg">
                    <div class="capacity-bar-fill" id="capacityBar" style="width: 0%"></div>
                </div>
                <div class="capacity-numbers" id="capacityText">0 / 1,000 AMU used</div>
                
                <div id="upgradeSection">
                    <!-- Filled by JavaScript -->
                </div>
                
                <button class="view-hub-btn" onclick="window.viewHubInventory()">📦 VIEW HUB INVENTORY</button>
            </div>
            
            <!-- Scroll Hint -->
            <div class="scroll-hint">▼ scroll down to return to Earth Hub ▼</div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToEarthHub()">
                <span class="back-arrow">←</span>
                <span class="back-text">EARTH HUB</span>
                <span class="back-icon">🌍</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">processing...</div>
            </div>
        </div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>

    <script type="module">
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        import { getPlayerId, getCredits, spendCredits, getCollection, addElementToHub, removeElementFromCollection, addElementToCollection, getRemainingHubStorage, getHubStorageMax, getHubStorageUsed, setHubStorageCapacity } from './js/storage.js';

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        window.returnToEarthHub = returnToEarthHub;
        window.viewAllCargo = viewAllCargo;
        window.unloadAllCargo = unloadAllCargo;
        window.upgradeStorage = upgradeStorage;
        window.viewHubInventory = viewHubInventory;

        let currentPlayerId = null;
        let currentShipItems = [];
        let currentStorageTier = 0;
        let currentHubMax = 1000;
        let currentHubUsed = 0;
        let currentCreditsAmount = 0;

        // Storage tiers (cost, capacity, name)
        const STORAGE_TIERS = [
            { tier: 0, cost: 0, capacity: 1000, name: 'Starter' },
            { tier: 1, cost: 10000, capacity: 10000, name: 'Small' },
            { tier: 2, cost: 50000, capacity: 50000, name: 'Medium' },
            { tier: 3, cost: 200000, capacity: 200000, name: 'Large' },
            { tier: 4, cost: 500000, capacity: 500000, name: 'Huge' },
            { tier: 5, cost: 1000000, capacity: 1000000, name: 'Massive' }
        ];

        function getCurrentTier(capacity) {
            for (let i = STORAGE_TIERS.length - 1; i >= 0; i--) {
                if (capacity >= STORAGE_TIERS[i].capacity) {
                    return i;
                }
            }
            return 0;
        }

        function getNextTier(currentTier) {
            if (currentTier >= STORAGE_TIERS.length - 1) return null;
            return STORAGE_TIERS[currentTier + 1];
        }

        function getElementIcon(elementName) {
            const icons = {
                'Hydrogen': '💧', 'Helium': '🎈', 'Carbon': '⚫', 'Oxygen': '💨',
                'Iron': '⚙️', 'Gold': '🟡', 'Silver': '⚪', 'Copper': '🔴',
                'Titanium': '🔷', 'Uranium': '🟣', 'Plutonium': '☢️', 'default': '🔹'
            };
            return icons[elementName] || icons.default;
        }

        function getElementMass(elementName) {
            const masses = {
                'Hydrogen': 1.008, 'Helium': 4.003, 'Carbon': 12.01, 'Oxygen': 16.00,
                'Iron': 55.85, 'Gold': 197.0, 'Silver': 107.9, 'Copper': 63.55,
                'Titanium': 47.87, 'Uranium': 238.0, 'Plutonium': 244.0, 'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        async function loadShipCargo() {
            try {
                const playerId = getCurrentPlayerId();
                let collection = await getCollection(playerId);
                
                currentShipItems = [];
                for (const [name, data] of Object.entries(collection)) {
                    const count = typeof data === 'object' ? data.count : data;
                    currentShipItems.push({
                        name: name,
                        count: count,
                        massPerUnit: getElementMass(name),
                        icon: getElementIcon(name)
                    });
                }
                
                currentShipItems.sort((a, b) => b.count - a.count);
                
                let totalMass = 0;
                for (const item of currentShipItems) {
                    totalMass += item.count * item.massPerUnit;
                }
                
                const shipMax = 5000;
                document.getElementById('shipCargoStats').textContent = `${totalMass.toFixed(1)}/${shipMax} AMU`;
                
                renderShipPreview();
                
            } catch (error) {
                console.error('Error loading ship cargo:', error);
            }
        }

        function renderShipPreview() {
            const previewEl = document.getElementById('shipItemsPreview');
            
            if (currentShipItems.length === 0) {
                previewEl.innerHTML = '<div class="empty-state" style="padding: 15px;">No items in ship cargo</div>';
                return;
            }
            
            let html = '';
            const previewItems = currentShipItems.slice(0, 5);
            
            previewItems.forEach(item => {
                html += `
                    <div class="ship-item-row">
                        <div class="ship-item-info">
                            <span class="ship-item-icon">${item.icon}</span>
                            <span class="ship-item-name">${item.name}</span>
                            <span class="ship-item-count">${item.count}</span>
                        </div>
                    </div>
                `;
            });
            
            if (currentShipItems.length > 5) {
                html += `<div style="text-align: center; padding: 8px; color: #a0c0ff; font-size: 12px;">+${currentShipItems.length - 5} more items</div>`;
            }
            
            previewEl.innerHTML = html;
        }

        async function unloadAllCargo() {
            if (currentShipItems.length === 0) {
                alert('No cargo to unload');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'unloading cargo to hub...';
            
            try {
                let currentAvailable = await getRemainingHubStorage();
                let totalMassToTransfer = 0;
                
                for (const item of currentShipItems) {
                    totalMassToTransfer += item.count * item.massPerUnit;
                }
                
                if (totalMassToTransfer > currentAvailable) {
                    alert(`Not enough hub storage space!\n\nNeed: ${totalMassToTransfer.toFixed(1)} AMU\nAvailable: ${currentAvailable.toFixed(1)} AMU\n\nUpgrade your hub storage to unlock more space.`);
                    loadingOverlay.classList.remove('active');
                    return;
                }
                
                let transferred = 0;
                
                for (const item of currentShipItems) {
                    const removeResult = await removeElementFromCollection(item.name, item.count);
                    if (removeResult.success) {
                        const addResult = await addElementToHub(item.name, item.count);
                        if (addResult.success) {
                            transferred += item.count;
                        } else {
                            await addElementToCollection(item.name, item.count);
                        }
                    }
                }
                
                await loadAllData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                alert(`✅ Unloaded ${transferred} items to Earth Hub storage`);
                
            } catch (error) {
                console.error('Unload error:', error);
                alert('Error unloading cargo');
            }
            
            loadingOverlay.classList.remove('active');
        }

        async function upgradeStorage() {
            const nextTier = getNextTier(currentStorageTier);
            if (!nextTier) {
                alert('Maximum storage already reached!');
                return;
            }
            
            if (currentCreditsAmount < nextTier.cost) {
                alert(`Not enough credits!\n\nNeed: ${nextTier.cost.toLocaleString()}⭐\nYou have: ${currentCreditsAmount.toLocaleString()}⭐`);
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'upgrading hub storage...';
            
            try {
                const spent = await spendCredits(nextTier.cost, getCurrentPlayerId(), `Upgraded hub storage to ${nextTier.name}`);
                if (!spent) {
                    throw new Error('Failed to spend credits');
                }
                
                await setHubStorageCapacity(nextTier.capacity);
                
                await loadAllData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                alert(`✅ Hub Storage Upgraded!\n\nNew Capacity: ${nextTier.capacity.toLocaleString()} AMU\n\nYou can now store more items at Earth Hub.`);
                
            } catch (error) {
                console.error('Upgrade error:', error);
                alert('Failed to upgrade storage');
            }
            
            loadingOverlay.classList.remove('active');
        }

        async function loadHubData() {
            try {
                currentHubMax = await getHubStorageMax();
                currentHubUsed = await getHubStorageUsed();
                currentCreditsAmount = await getCredits(getCurrentPlayerId());
                currentStorageTier = getCurrentTier(currentHubMax);
                
                document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${currentCreditsAmount.toLocaleString()}`;
                document.getElementById('hubCapacityDisplay').textContent = `Used: ${currentHubUsed.toFixed(1)}/${currentHubMax.toLocaleString()} AMU`;
                document.getElementById('capacityText').textContent = `${currentHubUsed.toFixed(1)} / ${currentHubMax.toLocaleString()} AMU used`;
                document.getElementById('currentTierDisplay').textContent = STORAGE_TIERS[currentStorageTier].name;
                
                const percentUsed = (currentHubUsed / currentHubMax) * 100;
                document.getElementById('capacityBar').style.width = Math.min(100, percentUsed) + '%';
                
                renderUpgradeSection();
                
            } catch (error) {
                console.error('Error loading hub data:', error);
            }
        }

        function renderUpgradeSection() {
            const upgradeSection = document.getElementById('upgradeSection');
            const nextTier = getNextTier(currentStorageTier);
            
            if (!nextTier) {
                upgradeSection.innerHTML = `
                    <div class="max-tier-message">
                        🏆 MAXIMUM STORAGE ACHIEVED!<br>
                        Capacity: ${currentHubMax.toLocaleString()} AMU
                    </div>
                `;
                return;
            }
            
            upgradeSection.innerHTML = `
                <div class="upgrade-info">
                    <div class="next-tier-name">⬆️ UPGRADE TO ${nextTier.name}</div>
                    <div class="next-tier-details">Current: ${currentHubMax.toLocaleString()} AMU → Next: ${nextTier.capacity.toLocaleString()} AMU</div>
                    <div class="upgrade-cost">Cost: ${nextTier.cost.toLocaleString()} ⭐</div>
                    <button class="upgrade-btn" onclick="window.upgradeStorage()">UPGRADE STORAGE</button>
                </div>
            `;
        }

        function viewHubInventory() {
            navigateTo('hub-inventory.html');
        }

        function viewAllCargo() {
            navigateTo('cargo.html');
        }

        function returnToEarthHub() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'earth-hub.html';
        }

        function navigateTo(screen) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'loading...';
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = screen;
            }, 300);
        }

        function getCurrentPlayerId() {
            if (!currentPlayerId) {
                currentPlayerId = getPlayerId();
            }
            return currentPlayerId;
        }

        async function loadAllData() {
            await loadHubData();
            await loadShipCargo();
        }

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading hub storage...';

                currentPlayerId = getPlayerId();
                
                let currentMax = await getHubStorageMax();
                if (currentMax === 0) {
                    await setHubStorageCapacity(1000);
                }
                
                await loadAllData();

                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading data';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
