<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Nebulae Map</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .nebulae-map {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Star field background */
        .star-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Nebulae canvas */
        .nebulae-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        /* Map container */
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        
        /* Nebula regions - Moonlit theme */
        .nebula-region {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            width: 100px;
            height: 100px;
        }
        
        .nebula-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.5;
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(160, 176, 192, 0.3);
        }
        
        .nebula-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #a0b0c0);
            box-shadow: 0 0 30px currentColor;
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .nebula-name {
            position: absolute;
            left: 50%;
            top: 60px;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 14px;
            white-space: nowrap;
            text-shadow: 0 0 10px #a0b0c0;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            pointer-events: none;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 4px 12px;
            border-radius: 30px 5px 30px 5px;
            border: 1px solid #a0b0c0;
        }
        
        .nebula-count {
            position: absolute;
            left: 50%;
            top: 85px;
            transform: translateX(-50%);
            color: #a0b0c0;
            font-size: 10px;
            white-space: nowrap;
            text-shadow: 0 0 5px #a0b0c0;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .nebula-sector {
            position: absolute;
            left: 50%;
            top: 100px;
            transform: translateX(-50%);
            color: #6a8ac0;
            font-size: 9px;
            white-space: nowrap;
            opacity: 0.5;
            transition: opacity 0.3s ease;
            pointer-events: none;
            font-family: monospace;
        }
        
        .nebula-region:hover .nebula-name,
        .nebula-region:hover .nebula-count,
        .nebula-region:hover .nebula-sector,
        .nebula-region.selected .nebula-name,
        .nebula-region.selected .nebula-count,
        .nebula-region.selected .nebula-sector {
            opacity: 1;
        }
        
        .nebula-region.selected .nebula-core {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 50px currentColor;
        }
        
        .nebula-region.selected .nebula-glow {
            opacity: 0.8;
            width: 100px;
            height: 100px;
            filter: blur(20px);
        }
        
        /* Connection lines */
        .connection-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(160, 176, 192, 0.2), rgba(208, 224, 240, 0.3), rgba(160, 176, 192, 0.2), transparent);
            transform-origin: 0 0;
            filter: blur(1px);
            z-index: 5;
            pointer-events: none;
        }
        
        /* UI Controls */
        .map-controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .map-btn {
            width: 50px;
            height: 50px;
            border-radius: 40% 20% 40% 20%;
            background: rgba(10, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.3);
            transition: all 0.1s;
        }
        
        .map-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.92);
        }
        
        .back-btn {
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 20px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
        }
        
        .back-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .galaxy-btn {
            position: absolute;
            top: 30px;
            right: 20px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 20px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
        }
        
        .galaxy-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .sector-indicator {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 6px 20px;
            border-radius: 40% 20% 40% 20%;
            font-size: 14px;
            font-family: 'WindSong', cursive;
        }
        
        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid #a0b0c0;
            border-radius: 40% 20% 40% 20%;
            padding: 20px;
            z-index: 100;
            color: #d0e0f0;
            display: none;
            transform: translateY(0);
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(160, 176, 192, 0.3);
        }
        
        .info-panel.visible {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .info-title {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #a0b0c0;
            text-align: center;
        }
        
        .info-desc {
            color: #c0d0f0;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
            padding: 0 10px;
        }
        
        .info-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .info-item {
            background: rgba(0,0,0,0.3);
            border-radius: 30% 20% 30% 20%;
            padding: 8px;
            text-align: center;
            border: 1px solid #a0b0c0;
        }
        
        .info-label {
            font-size: 10px;
            color: #a0b0c0;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .info-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-btn {
            flex: 1;
            background: rgba(10, 10, 26, 0.6);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
        }
        
        .info-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #a0b0c0;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .close-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #a0b0c0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 20px;
            text-shadow: 0 0 20px #a0b0c0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="nebulae-map" id="nebulaeMap">
            <!-- Star field -->
            <div class="star-field" id="starField"></div>
            
            <!-- Canvas for nebulae effects -->
            <canvas class="nebulae-canvas" id="nebulaeCanvas"></canvas>
            
            <!-- Map container with regions -->
            <div class="map-container" id="mapContainer"></div>
            
            <!-- UI Controls -->
            <button class="back-btn" onclick="returnToShip()">← SHIP</button>
            <button class="galaxy-btn" onclick="returnToGalaxy()">🌌 GALAXY</button>
            
            <div class="sector-indicator" id="sectorIndicator">Orion Arm • Sector B2</div>
            
            <div class="map-controls">
                <button class="map-btn" onclick="zoomIn()">+</button>
                <button class="map-btn" onclick="zoomOut()">-</button>
                <button class="map-btn" onclick="resetView()">⟲</button>
            </div>
            
            <!-- Info Panel -->
            <div class="info-panel" id="infoPanel">
                <div class="close-btn" onclick="closeInfo()">✕</div>
                <div class="info-title" id="infoTitle">Orion Nebula</div>
                <div class="info-desc" id="infoDesc">A stellar nursery where new stars are born. Rich in rare elements.</div>
                <div class="info-details">
                    <div class="info-item">
                        <div class="info-label">SYSTEMS</div>
                        <div class="info-value" id="infoSystems">50</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">EXPLORED</div>
                        <div class="info-value" id="infoExplored">12</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">SECTOR</div>
                        <div class="info-value" id="infoSector">B2</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">TYPE</div>
                        <div class="info-value" id="infoType">Emission</div>
                    </div>
                </div>
                <div class="info-buttons">
                    <button class="info-btn" onclick="exploreNebula()">🚀 EXPLORE SECTOR</button>
                    <button class="info-btn" onclick="closeInfo()">CLOSE</button>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">entering sector...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a0a1a');
            tg.setBackgroundColor('#0a0a1a');
        }
        
        // ===== CONSTANTS =====
        const UNIVERSE_SEED = 42793;
        const CURRENT_SECTOR = localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        
        // ===== NEBULA DATA (6 per sector, procedural from seed) =====
        function generateNebulaeForSector(sector) {
            // Use sector to seed nebula generation
            const sectorSeed = UNIVERSE_SEED + (sector.charCodeAt(0) * 1000) + (parseInt(sector[1]) * 100);
            
            const nebulaNames = [
                'Orion', 'Cygnus', 'Sagittarius', 'Perseus', 'Carina', 'Eagle',
                'Omega', 'Trifid', 'Lagoon', 'Veil', 'Crab', 'Helix',
                'Rosette', 'Tarantula', 'Pelican', 'North America', 'Elephant Trunk', 'Bubble'
            ];
            
            const nebulaTypes = ['Emission', 'Supernova', 'Dark', 'Reflection', 'Planetary', 'Star-forming'];
            const colors = ['#8a6aff', '#ff6a9a', '#ffaa4a', '#4affaa', '#c06aff', '#6a8aff'];
            
            const nebulae = [];
            
            // Generate 6 nebulae for this sector
            for (let i = 0; i < 6; i++) {
                const nameIndex = (sectorSeed + i * 7) % nebulaNames.length;
                const typeIndex = (sectorSeed + i * 13) % nebulaTypes.length;
                const colorIndex = (sectorSeed + i * 23) % colors.length;
                
                nebulae.push({
                    id: `nebula-${sector}-${i}`,
                    name: nebulaNames[nameIndex] + ' Nebula',
                    type: nebulaTypes[typeIndex],
                    color: colors[colorIndex],
                    systems: 50, // Fixed: 50 stars per nebula
                    explored: Math.floor(Math.random() * 20) + 1, // Random for demo
                    posX: 20 + (i * 12), // Position in grid
                    posY: 30 + (i % 2 === 0 ? 0 : 20)
                });
            }
            
            return nebulae;
        }
        
        // Generate nebulae for current sector
        const nebulae = generateNebulaeForSector(CURRENT_SECTOR);
        
        // ===== STAR FIELD GENERATION =====
        function generateStars() {
            const starField = document.getElementById('starField');
            starField.innerHTML = '';
            
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                starField.appendChild(star);
            }
        }
        
        // ===== NEBULAE CANVAS =====
        const canvas = document.getElementById('nebulaeCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawNebulae();
        }
        
        function drawNebulae() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw nebulae backgrounds
            nebulae.forEach((nebula, index) => {
                const x = nebula.posX / 100 * canvas.width;
                const y = nebula.posY / 100 * canvas.height;
                const radius = canvas.width * 0.25;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, nebula.color + '40');
                gradient.addColorStop(0.5, nebula.color + '10');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw connection lines
            ctx.strokeStyle = '#a0b0c020';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            
            for (let i = 0; i < nebulae.length; i++) {
                for (let j = i + 1; j < nebulae.length; j++) {
                    const x1 = nebulae[i].posX / 100 * canvas.width;
                    const y1 = nebulae[i].posY / 100 * canvas.height;
                    const x2 = nebulae[j].posX / 100 * canvas.width;
                    const y2 = nebulae[j].posY / 100 * canvas.height;
                    
                    const dx = x1 - x2;
                    const dy = y1 - y2;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < canvas.width * 0.4) {
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }
            }
        }
        
        // ===== RENDER NEBULAE REGIONS =====
        function renderNebulae() {
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.innerHTML = '';
            
            nebulae.forEach((nebula, index) => {
                const region = document.createElement('div');
                region.className = 'nebula-region';
                region.id = nebula.id;
                region.style.left = nebula.posX + '%';
                region.style.top = nebula.posY + '%';
                region.setAttribute('onclick', `selectNebula('${nebula.id}')`);
                
                region.innerHTML = `
                    <div class="nebula-glow" style="background: radial-gradient(circle at center, ${nebula.color}, transparent 80%);"></div>
                    <div class="nebula-core" style="background: ${nebula.color}; box-shadow: 0 0 30px ${nebula.color};"></div>
                    <span class="nebula-name">${nebula.name}</span>
                    <span class="nebula-count">${nebula.systems} systems</span>
                    <span class="nebula-sector">Sector ${CURRENT_SECTOR}</span>
                `;
                
                mapContainer.appendChild(region);
            });
            
            // Update sector indicator
            document.getElementById('sectorIndicator').textContent = `Orion Arm • Sector ${CURRENT_SECTOR}`;
        }
        
        // ===== MAP STATE =====
        let scale = 1;
        let currentNebula = null;
        const mapContainer = document.getElementById('mapContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const infoPanel = document.getElementById('infoPanel');
        
        function selectNebula(id) {
            // Remove previous selection
            document.querySelectorAll('.nebula-region').forEach(el => {
                el.classList.remove('selected');
            });
            
            // Add selection
            const element = document.getElementById(id);
            if (element) {
                element.classList.add('selected');
                
                // Find nebula data
                const nebula = nebulae.find(n => n.id === id);
                if (!nebula) return;
                
                currentNebula = nebula;
                
                // Update info panel
                document.getElementById('infoTitle').textContent = nebula.name;
                document.getElementById('infoDesc').textContent = `A ${nebula.type.toLowerCase()} nebula in Sector ${CURRENT_SECTOR}. ${nebula.systems} star systems to explore.`;
                document.getElementById('infoSystems').textContent = nebula.systems;
                document.getElementById('infoExplored').textContent = nebula.explored;
                document.getElementById('infoSector').textContent = CURRENT_SECTOR;
                document.getElementById('infoType').textContent = nebula.type;
                
                // Show panel
                infoPanel.classList.add('visible');
                
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function closeInfo() {
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.nebula-region').forEach(el => {
                el.classList.remove('selected');
            });
            currentNebula = null;
        }
        
        function exploreNebula() {
            if (!currentNebula) {
                alert('Please select a nebula first');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                
                // Save the selected nebula
                localStorage.setItem('voidfarer_current_nebula', currentNebula.name);
                localStorage.setItem('voidfarer_current_galaxy_sector', CURRENT_SECTOR);
                
                // Navigate to sector map
                window.location.href = 'nebula-sector.html';
                
                closeInfo();
            }, 1500);
        }
        
        function returnToShip() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }
        
        function returnToGalaxy() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'galaxy-map.html';
        }
        
        // Zoom controls
        function zoomIn() {
            scale = Math.min(scale + 0.2, 2);
            mapContainer.style.transform = `scale(${scale})`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function zoomOut() {
            scale = Math.max(scale - 0.2, 0.5);
            mapContainer.style.transform = `scale(${scale})`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function resetView() {
            scale = 1;
            mapContainer.style.transform = `scale(1)`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // Initialize
        function init() {
            generateStars();
            resizeCanvas();
            renderNebulae();
            
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            
            // Check player
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
            }
        }
        
        init();
    </script>
</body>
</html>
