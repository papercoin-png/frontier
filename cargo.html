<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Cargo Hold</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .cargo-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Header */
        .cargo-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .cargo-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
        }
        
        .cargo-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Capacity Card */
        .capacity-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #2a4a7a;
        }
        
        .capacity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .capacity-label {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }
        
        .capacity-numbers {
            color: #ffd966;
            font-size: 18px;
            font-weight: 700;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #6a8ac0;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            transition: width 0.3s;
            border-radius: 8px;
        }
        
        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #6a8ac0;
        }
        
        .stat-block {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            font-family: 'WindSong', cursive;
        }
        
        .stat-label {
            color: #a0c0ff;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(30, 40, 60, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .filter-btn.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 20px #3a5a8a;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        /* Search Box */
        .search-box {
            width: 100%;
            padding: 15px 20px;
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            color: #ffffff;
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        
        .search-box::placeholder {
            color: #a0c0ff;
            opacity: 0.6;
        }
        
        /* Sort Bar */
        .sort-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .sort-select {
            background: rgba(30, 45, 70, 0.6);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-family: 'Libre Baskerville', serif;
            font-size: 14px;
            outline: none;
        }
        
        .sort-select option {
            background: #0a1a2a;
        }
        
        /* Cargo Grid */
        .cargo-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .cargo-item {
            background: rgba(30, 45, 70, 0.6);
            border: 2px solid #6a8ac0;
            border-radius: 40px 12px 40px 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.1s;
        }
        
        .cargo-item:active {
            background: rgba(60, 90, 140, 0.5);
            transform: scale(0.99);
        }
        
        .item-icon {
            font-size: 36px;
            min-width: 50px;
            text-align: center;
            filter: drop-shadow(0 0 10px #6a8ac0);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'WindSong', cursive;
        }
        
        .item-details {
            display: flex;
            gap: 20px;
            color: #a0c0ff;
            font-size: 13px;
        }
        
        .item-quantity {
            color: #ffd966;
            font-weight: 600;
        }
        
        .item-value {
            color: #4affaa;
        }
        
        .item-rarity {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid currentColor;
            min-width: 70px;
            text-align: center;
        }
        
        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #b0ffb0; }
        .rarity-rare { color: #b0b0ff; }
        .rarity-very-rare { color: #e0b0ff; }
        .rarity-legendary { color: #ffd700; }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .action-btn {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        
        .action-btn:active {
            background: #6a8ac0;
            transform: scale(0.96);
        }
        
        .action-btn.sell {
            background: rgba(255, 170, 74, 0.2);
            border-color: #ffaa4a;
        }
        
        .action-btn.sell:active {
            background: #ffaa4a;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #6a8ac0;
            font-style: italic;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 20px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #6a8ac0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="cargo-view" id="cargoView">
            <!-- Header -->
            <div class="cargo-header">
                <div class="cargo-title">Cargo Hold</div>
                <div class="cargo-subtitle">✦ inventory management ✦</div>
            </div>
            
            <!-- Capacity Card -->
            <div class="capacity-card">
                <div class="capacity-header">
                    <span class="capacity-label">Storage Capacity</span>
                    <span class="capacity-numbers" id="capacityText">0 / 100</span>
                </div>
                <div class="capacity-bar-bg">
                    <div class="capacity-bar-fill" id="capacityBar" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat-block">
                    <div class="stat-value" id="totalItems">0</div>
                    <div class="stat-label">ITEMS</div>
                </div>
                <div class="stat-block">
                    <div class="stat-value" id="uniqueItems">0</div>
                    <div class="stat-label">UNIQUE</div>
                </div>
                <div class="stat-block">
                    <div class="stat-value" id="totalValue">0</div>
                    <div class="stat-label">VALUE ⭐</div>
                </div>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterCargo('all')">ALL</button>
                <button class="filter-btn" onclick="filterCargo('common')">COMMON</button>
                <button class="filter-btn" onclick="filterCargo('uncommon')">UNCOMMON</button>
                <button class="filter-btn" onclick="filterCargo('rare')">RARE</button>
                <button class="filter-btn" onclick="filterCargo('very-rare')">VERY RARE</button>
                <button class="filter-btn" onclick="filterCargo('legendary')">LEGENDARY</button>
            </div>
            
            <!-- Search Box -->
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search cargo..." oninput="searchCargo()">
            
            <!-- Sort Bar -->
            <div class="sort-bar">
                <select class="sort-select" id="sortSelect" onchange="sortCargo()">
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="quantity-desc">Quantity (High-Low)</option>
                    <option value="quantity-asc">Quantity (Low-High)</option>
                    <option value="value-desc">Value (High-Low)</option>
                    <option value="value-asc">Value (Low-High)</option>
                    <option value="rarity-desc">Rarity (Legendary first)</option>
                    <option value="rarity-asc">Rarity (Common first)</option>
                </select>
            </div>
            
            <!-- Cargo Grid -->
            <div class="cargo-grid" id="cargoGrid">
                <!-- Filled by JavaScript -->
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="action-btn" onclick="sellAllCommon()">💰 SELL ALL COMMON</button>
                <button class="action-btn sell" onclick="quickSell()">⚡ QUICK SELL</button>
            </div>
            
            <!-- Back Button -->
            <button class="back-button" onclick="returnToBridge()">← RETURN TO BRIDGE</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">updating...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Navigation
        function returnToBridge() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }
        
        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            'Carbon': { icon: '⚫', rarity: 'uncommon', value: 250, size: 1 },
            'Iron': { icon: '⚙️', rarity: 'uncommon', value: 250, size: 1 },
            'Gold': { icon: '🟡', rarity: 'rare', value: 1000, size: 2 },
            'Silver': { icon: '⚪', rarity: 'rare', value: 1000, size: 2 },
            'Platinum': { icon: '⬜', rarity: 'rare', value: 1000, size: 2 },
            'Uranium': { icon: '🟣', rarity: 'very-rare', value: 5000, size: 3 },
            'Promethium': { icon: '✨', rarity: 'legendary', value: 25000, size: 5 },
            'Titanium': { icon: '🔷', rarity: 'rare', value: 1000, size: 2 },
            'Silicon': { icon: '💎', rarity: 'common', value: 100, size: 1 },
            'Oxygen': { icon: '💨', rarity: 'uncommon', value: 250, size: 1 },
            'Hydrogen': { icon: '💧', rarity: 'common', value: 100, size: 1 },
            'Helium': { icon: '🎈', rarity: 'common', value: 100, size: 1 },
            'Uranium': { icon: '🟣', rarity: 'very-rare', value: 5000, size: 3 },
            'Thorium': { icon: '🔮', rarity: 'very-rare', value: 5000, size: 3 },
            'Plutonium': { icon: '☢️', rarity: 'legendary', value: 25000, size: 5 },
            'Astatine': { icon: '🧪', rarity: 'legendary', value: 25000, size: 5 }
        };
        
        // ===== STATE =====
        let cargoItems = [];
        let filteredItems = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentSort = 'name-asc';
        
        // ===== LOAD CARGO =====
        function loadCargo() {
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            
            cargoItems = Object.keys(collection).map(name => {
                const data = collection[name];
                const elementData = elementDatabase[name] || {
                    icon: '🔹',
                    rarity: 'common',
                    value: 100,
                    size: 1
                };
                
                return {
                    name: name,
                    count: data.count || 1,
                    icon: elementData.icon,
                    rarity: elementData.rarity,
                    value: elementData.value,
                    size: elementData.size,
                    totalValue: (data.count || 1) * elementData.value
                };
            });
            
            // Calculate stats
            updateStats();
            
            // Apply filters and sorting
            applyFilters();
        }
        
        // ===== UPDATE STATS =====
        function updateStats() {
            const totalItems = cargoItems.reduce((sum, item) => sum + item.count, 0);
            const uniqueItems = cargoItems.length;
            const totalValue = cargoItems.reduce((sum, item) => sum + item.totalValue, 0);
            
            // Calculate cargo usage (each item takes size * count space)
            const cargoUsed = cargoItems.reduce((sum, item) => sum + (item.size * item.count), 0);
            const cargoMax = 100;
            const cargoPercent = Math.min(100, (cargoUsed / cargoMax) * 100);
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('uniqueItems').textContent = uniqueItems;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString();
            document.getElementById('capacityText').textContent = `${cargoUsed} / ${cargoMax}`;
            document.getElementById('capacityBar').style.width = cargoPercent + '%';
        }
        
        // ===== FILTER CARGO =====
        function filterCargo(rarity) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            currentFilter = rarity;
            applyFilters();
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ===== SEARCH CARGO =====
        function searchCargo() {
            currentSearch = document.getElementById('searchBox').value.toLowerCase();
            applyFilters();
        }
        
        // ===== SORT CARGO =====
        function sortCargo() {
            currentSort = document.getElementById('sortSelect').value;
            applyFilters();
        }
        
        // ===== APPLY FILTERS AND SORTING =====
        function applyFilters() {
            // Apply rarity filter
            let filtered = cargoItems;
            if (currentFilter !== 'all') {
                filtered = cargoItems.filter(item => item.rarity === currentFilter);
            }
            
            // Apply search filter
            if (currentSearch) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(currentSearch)
                );
            }
            
            // Apply sorting
            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'quantity-desc':
                        return b.count - a.count;
                    case 'quantity-asc':
                        return a.count - b.count;
                    case 'value-desc':
                        return b.totalValue - a.totalValue;
                    case 'value-asc':
                        return a.totalValue - b.totalValue;
                    case 'rarity-desc': {
                        const rarityOrder = { 'legendary': 0, 'very-rare': 1, 'rare': 2, 'uncommon': 3, 'common': 4 };
                        return (rarityOrder[a.rarity] || 5) - (rarityOrder[b.rarity] || 5);
                    }
                    case 'rarity-asc': {
                        const rarityOrder = { 'common': 0, 'uncommon': 1, 'rare': 2, 'very-rare': 3, 'legendary': 4 };
                        return (rarityOrder[a.rarity] || 5) - (rarityOrder[b.rarity] || 5);
                    }
                    default:
                        return 0;
                }
            });
            
            filteredItems = filtered;
            renderCargo();
        }
        
        // ===== RENDER CARGO =====
        function renderCargo() {
            const grid = document.getElementById('cargoGrid');
            grid.innerHTML = '';
            
            if (filteredItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">No cargo matches your filters</div>';
                return;
            }
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'cargo-item';
                card.setAttribute('onclick', `showItemOptions('${item.name}')`);
                
                let rarityClass = 'rarity-common';
                if (item.rarity === 'uncommon') rarityClass = 'rarity-uncommon';
                else if (item.rarity === 'rare') rarityClass = 'rarity-rare';
                else if (item.rarity === 'very-rare') rarityClass = 'rarity-very-rare';
                else if (item.rarity === 'legendary') rarityClass = 'rarity-legendary';
                
                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">
                            <span class="item-quantity">📦 ${item.count}</span>
                            <span class="item-value">💰 ${item.value}⭐</span>
                        </div>
                    </div>
                    <div class="item-rarity ${rarityClass}">${item.rarity}</div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // ===== ITEM OPTIONS =====
        function showItemOptions(itemName) {
            const item = cargoItems.find(i => i.name === itemName);
            if (!item) return;
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Simple menu for now - could be expanded later
            const action = confirm(`${itemName}\nQuantity: ${item.count}\nValue: ${item.value}⭐ each\n\nSell one unit for ${item.value}⭐?`);
            
            if (action) {
                sellItem(itemName, 1);
            }
        }
        
        // ===== SELL ITEM =====
        function sellItem(itemName, quantity) {
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            const item = collection[itemName];
            
            if (!item || item.count < quantity) {
                alert('Not enough items to sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Update collection
                item.count -= quantity;
                if (item.count <= 0) {
                    delete collection[itemName];
                }
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                
                // Add credits
                const elementData = elementDatabase[itemName] || { value: 100 };
                const credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                const newCredits = credits + (elementData.value * quantity);
                localStorage.setItem('voidfarer_credits', newCredits.toString());
                
                // Reload cargo
                loadCargo();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                loadingOverlay.classList.remove('active');
                alert(`Sold ${quantity} ${itemName} for ${elementData.value * quantity}⭐`);
            }, 300);
        }
        
        // ===== SELL ALL COMMON =====
        function sellAllCommon() {
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            let totalCredits = 0;
            let itemsSold = 0;
            
            Object.keys(collection).forEach(name => {
                const elementData = elementDatabase[name] || { rarity: 'common', value: 100 };
                if (elementData.rarity === 'common') {
                    totalCredits += collection[name].count * elementData.value;
                    itemsSold += collection[name].count;
                    delete collection[name];
                }
            });
            
            if (itemsSold === 0) {
                alert('No common items to sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Update collection
                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                
                // Add credits
                const credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                const newCredits = credits + totalCredits;
                localStorage.setItem('voidfarer_credits', newCredits.toString());
                
                // Reload cargo
                loadCargo();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                loadingOverlay.classList.remove('active');
                alert(`Sold ${itemsSold} common items for ${totalCredits}⭐`);
            }, 500);
        }
        
        // ===== QUICK SELL =====
        function quickSell() {
            // This could be configured to sell lowest value items, etc.
            // For now, just sell one random common item
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            const commonItems = Object.keys(collection).filter(name => {
                const elementData = elementDatabase[name] || { rarity: 'common' };
                return elementData.rarity === 'common';
            });
            
            if (commonItems.length === 0) {
                alert('No common items to quick sell');
                return;
            }
            
            const randomItem = commonItems[Math.floor(Math.random() * commonItems.length)];
            sellItem(randomItem, 1);
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            loadCargo();
        }
        
        init();
    </script>
</body>
</html>
