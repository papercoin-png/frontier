<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Cargo Hold</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .cargo-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .cargo-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .cargo-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .cargo-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .cargo-capacity {
            font-size: 14px;
            color: #a0c0ff;
            text-align: right;
        }
        
        /* Capacity Card */
        .capacity-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .capacity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .capacity-label {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .capacity-numbers {
            color: #ffd966;
            font-size: 16px;
            font-weight: 600;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #6a8ac0;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            transition: width 0.3s;
        }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 30% 10% 30% 10%;
            padding: 12px 5px;
            text-align: center;
        }
        
        .stat-value {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
        }
        
        .stat-label {
            color: #a0c0ff;
            font-size: 10px;
            letter-spacing: 1px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .filter-btn.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 15px #3a5a8a;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        /* Search Box */
        .search-container {
            margin-bottom: 15px;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 15px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: #a0c0ff;
            opacity: 0.6;
        }
        
        /* Sort Bar */
        .sort-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .sort-select {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-family: 'Exo 2', sans-serif;
            font-size: 13px;
            outline: none;
            width: 100%;
            max-width: 200px;
        }
        
        .sort-select option {
            background: #0a1a2a;
        }
        
        /* Cargo Grid */
        .cargo-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .cargo-item {
            background: rgba(30, 45, 70, 0.6);
            border: 2px solid #6a8ac0;
            border-radius: 40px 12px 40px 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
        }
        
        .cargo-item:active {
            background: rgba(60, 90, 140, 0.7);
            transform: scale(0.99);
        }
        
        .item-icon {
            font-size: 36px;
            min-width: 50px;
            text-align: center;
            filter: drop-shadow(0 0 10px #6a8ac0);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .item-details {
            display: flex;
            gap: 15px;
            color: #a0c0ff;
            font-size: 13px;
        }
        
        .item-quantity {
            color: #ffd966;
            font-weight: 600;
        }
        
        .item-value {
            color: #4affaa;
        }
        
        .item-market {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-right: 10px;
        }
        
        .item-market-price {
            color: #4affaa;
            font-size: 14px;
            font-weight: 600;
        }
        
        .item-market-change {
            font-size: 11px;
        }
        
        .price-up { color: #4affaa; }
        .price-down { color: #ff6b6b; }
        
        .item-rarity {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid currentColor;
            min-width: 70px;
            text-align: center;
        }
        
        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #b0ffb0; }
        .rarity-rare { color: #b0b0ff; }
        .rarity-very-rare { color: #e0b0ff; }
        .rarity-legendary { color: #ffd700; }
        
        /* Property Selector */
        .property-selector {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .property-selector h3 {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 10px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .property-select {
            width: 100%;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }
        
        .property-select option {
            background: #0a1a2a;
        }
        
        .property-stats {
            display: flex;
            justify-content: space-between;
            color: #a0c0ff;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .transfer-btn {
            width: 100%;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .transfer-btn:active {
            background: #6a8ac0;
            transform: scale(0.98);
        }
        
        .transfer-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Item Actions Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(15px);
            border: 3px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 25px;
            width: 280px;
            text-align: center;
            color: #ffffff;
        }
        
        .modal-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .modal-details {
            color: #a0c0ff;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .modal-market-price {
            color: #4affaa;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .modal-price-change {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .modal-btn {
            flex: 1;
            min-width: 80px;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .modal-btn:active {
            background: #6a8ac0;
            transform: scale(0.95);
        }
        
        .modal-btn.sell {
            background: rgba(255, 170, 74, 0.3);
            border-color: #ffaa4a;
        }
        
        .modal-btn.sell:active {
            background: #ffaa4a;
        }
        
        .modal-btn.transfer {
            background: rgba(74, 154, 138, 0.3);
            border-color: #4a9a8a;
        }
        
        .modal-btn.transfer:active {
            background: #4a9a8a;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .action-btn {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .action-btn:active {
            background: #6a8ac0;
            transform: scale(0.97);
        }
        
        .action-btn.sell {
            background: rgba(255, 170, 74, 0.2);
            border-color: #ffaa4a;
        }
        
        .action-btn.sell:active {
            background: #ffaa4a;
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #6a8ac0;
            font-style: italic;
        }
        
        /* Scroll Hint */
        .scroll-hint {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin: 20px 0 10px;
            font-style: italic;
            font-family: 'Exo 2', sans-serif;
            animation: fade-in-out 2s infinite;
            letter-spacing: 1px;
        }
        
        @keyframes fade-in-out {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Enhanced Back Button */
        .back-button {
            position: sticky;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 30px auto 20px;
            animation: subtle-pulse 3s infinite;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a; }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966; }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a; }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="cargo-view" id="cargoView">
            <!-- Header -->
            <div class="cargo-header">
                <div class="cargo-title">Cargo Hold</div>
                <div class="cargo-subtitle">✦ inventory management ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="cargo-capacity" id="cargoCapacityDisplay">
                    Used: --/100
                </div>
            </div>
            
            <!-- Capacity Card -->
            <div class="capacity-card">
                <div class="capacity-header">
                    <span class="capacity-label">Ship Storage</span>
                    <span class="capacity-numbers" id="capacityText">-- / 100</span>
                </div>
                <div class="capacity-bar-bg">
                    <div class="capacity-bar-fill" id="capacityBar" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="totalItems">0</div>
                    <div class="stat-label">ITEMS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uniqueItems">0</div>
                    <div class="stat-label">UNIQUE</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalValue">0</div>
                    <div class="stat-label">VALUE</div>
                </div>
            </div>
            
            <!-- Property Selector -->
            <div class="property-selector" id="propertySelector" style="display: none;">
                <h3>🏢 Transfer to Property</h3>
                <select class="property-select" id="propertySelect">
                    <option value="">Select a property...</option>
                </select>
                <div class="property-stats" id="propertyStats">
                    <span>Used: <span id="propertyUsed">0</span></span>
                    <span>Capacity: <span id="propertyCapacity">0</span></span>
                </div>
                <button class="transfer-btn" id="transferBtn" onclick="transferSelectedItem()" disabled>TRANSFER</button>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterCargo('all')">ALL</button>
                <button class="filter-btn" onclick="filterCargo('common')">COMMON</button>
                <button class="filter-btn" onclick="filterCargo('uncommon')">UNCOMMON</button>
                <button class="filter-btn" onclick="filterCargo('rare')">RARE</button>
                <button class="filter-btn" onclick="filterCargo('very-rare')">VERY RARE</button>
                <button class="filter-btn" onclick="filterCargo('legendary')">LEGENDARY</button>
            </div>
            
            <!-- Search Box -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search cargo..." oninput="searchCargo()">
            </div>
            
            <!-- Sort Bar -->
            <div class="sort-bar">
                <select class="sort-select" id="sortSelect" onchange="sortCargo()">
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="quantity-desc">Quantity (High-Low)</option>
                    <option value="quantity-asc">Quantity (Low-High)</option>
                    <option value="value-desc">Value (High-Low)</option>
                    <option value="value-asc">Value (Low-High)</option>
                    <option value="rarity-desc">Rarity (Rarest first)</option>
                    <option value="rarity-asc">Rarity (Common first)</option>
                </select>
            </div>
            
            <!-- Cargo Grid -->
            <div class="cargo-grid" id="cargoGrid">
                <div class="empty-state">Loading cargo...</div>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="action-btn" id="sellCommonBtn" onclick="sellAllCommon()" disabled>💰 SELL ALL COMMON</button>
                <button class="action-btn sell" id="quickSellBtn" onclick="quickSell()" disabled>⚡ QUICK SELL (500⭐)</button>
            </div>
            
            <!-- Scroll Hint -->
            <div class="scroll-hint">▼ scroll down to return to bridge ▼</div>
            
            <!-- Enhanced Back Button -->
            <button class="back-button" onclick="returnToBridge()">
                <span class="back-arrow">←</span>
                <span class="back-text">RETURN TO BRIDGE</span>
                <span class="back-icon">🚀</span>
            </button>
            
            <!-- Item Action Modal -->
            <div class="modal-overlay" id="itemModal">
                <div class="modal-content">
                    <div class="modal-title" id="modalItemName">Item Name</div>
                    <div class="modal-details" id="modalItemDetails">Quantity: 0</div>
                    <div class="modal-market-price" id="modalMarketPrice">0⭐</div>
                    <div class="modal-price-change" id="modalPriceChange">0%</div>
                    <div class="modal-buttons">
                        <button class="modal-btn" onclick="closeModal()">CANCEL</button>
                        <button class="modal-btn sell" id="modalSellBtn" onclick="sellFromModal()">SELL 1</button>
                        <button class="modal-btn transfer" id="modalTransferBtn" style="display: none;">TRANSFER</button>
                    </div>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">loading cargo...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const modal = document.getElementById('itemModal');

        // ===== STATE =====
        let cargoItems = [];
        let filteredItems = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentSort = 'name-asc';
        let properties = [];
        let currentItem = null;
        let selectedPropertyId = null;
        let currentCollection = {};
        let currentCredits = 0;

        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            // Common
            'Carbon': { icon: '⚫', rarity: 'common', size: 1 },
            'Silicon': { icon: '💎', rarity: 'common', size: 1 },
            'Hydrogen': { icon: '💧', rarity: 'common', size: 1 },
            'Helium': { icon: '🎈', rarity: 'common', size: 1 },
            'Sodium': { icon: '🧂', rarity: 'common', size: 1 },
            'Lithium': { icon: '🔋', rarity: 'common', size: 1 },
            
            // Uncommon
            'Iron': { icon: '⚙️', rarity: 'uncommon', size: 1 },
            'Oxygen': { icon: '💨', rarity: 'uncommon', size: 1 },
            'Nickel': { icon: '🔩', rarity: 'uncommon', size: 1 },
            'Sulfur': { icon: '🟡', rarity: 'uncommon', size: 1 },
            'Magnesium': { icon: '✨', rarity: 'uncommon', size: 1 },
            
            // Rare
            'Gold': { icon: '🟡', rarity: 'rare', size: 2 },
            'Silver': { icon: '⚪', rarity: 'rare', size: 2 },
            'Platinum': { icon: '⬜', rarity: 'rare', size: 2 },
            'Titanium': { icon: '🔷', rarity: 'rare', size: 2 },
            'Copper': { icon: '🔴', rarity: 'rare', size: 2 },
            
            // Very Rare
            'Uranium': { icon: '🟣', rarity: 'very-rare', size: 3 },
            'Thorium': { icon: '🔮', rarity: 'very-rare', size: 3 },
            'Plutonium': { icon: '☢️', rarity: 'very-rare', size: 3 },
            
            // Legendary
            'Promethium': { icon: '✨', rarity: 'legendary', size: 5 },
            'Technetium': { icon: '🧪', rarity: 'legendary', size: 5 },
            'Astatine': { icon: '☣️', rarity: 'legendary', size: 5 }
        };

        // ===== NAVIGATION =====
        function returnToBridge() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                loadingText.textContent = 'loading cargo...';
                
                // Update daily prices if needed
                if (typeof updateDailyPrices === 'function') {
                    await updateDailyPrices();
                }

                // Load all data with fallbacks - try both storage methods
                let credits = 5000;
                let collection = {};
                let realEstateData = { properties: [] };

                // Try to get from storage functions first
                if (typeof getCredits === 'function') {
                    try {
                        credits = await getCredits();
                        console.log('Got credits from function:', credits);
                    } catch (e) {
                        console.warn('Error getting credits from function:', e);
                    }
                }

                if (typeof getCollection === 'function') {
                    try {
                        collection = await getCollection();
                        console.log('Got collection from function:', collection);
                    } catch (e) {
                        console.warn('Error getting collection from function:', e);
                    }
                }

                if (typeof getRealEstate === 'function') {
                    try {
                        realEstateData = await getRealEstate();
                        console.log('Got real estate from function');
                    } catch (e) {
                        console.warn('Error getting real estate from function:', e);
                    }
                }

                // If no collection from functions, try localStorage
                if (Object.keys(collection).length === 0) {
                    try {
                        const localCollection = localStorage.getItem('voidfarer_collection');
                        if (localCollection) {
                            collection = JSON.parse(localCollection);
                            console.log('Got collection from localStorage:', collection);
                        }
                    } catch (e) {
                        console.warn('Error parsing localStorage collection:', e);
                    }
                }

                // If still no credits, try localStorage
                if (credits === 5000) {
                    try {
                        const localCredits = localStorage.getItem('voidfarer_credits');
                        if (localCredits) {
                            credits = parseInt(localCredits);
                            console.log('Got credits from localStorage:', credits);
                        }
                    } catch (e) {
                        console.warn('Error getting credits from localStorage:', e);
                    }
                }

                // Store in global state
                currentCredits = credits;
                currentCollection = collection;

                // Update header
                document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;

                // Build cargo items with market data
                cargoItems = [];
                for (const [name, data] of Object.entries(collection)) {
                    const elementData = elementDatabase[name] || {
                        icon: '🔹',
                        rarity: 'common',
                        size: 1
                    };
                    const count = data.count || 1;
                    
                    let marketPrice = 100;
                    if (typeof getLatestPrice === 'function') {
                        try {
                            marketPrice = await getLatestPrice(name) || 100;
                        } catch (e) {
                            console.warn('Error getting price for', name, e);
                        }
                    }
                    
                    let priceChange = 0;
                    if (typeof calculatePriceChange === 'function') {
                        try {
                            priceChange = await calculatePriceChange(name, 1) || 0;
                        } catch (e) {
                            console.warn('Error getting price change for', name, e);
                        }
                    }
                    
                    cargoItems.push({
                        name: name,
                        count: count,
                        icon: elementData.icon,
                        rarity: elementData.rarity,
                        size: elementData.size,
                        marketPrice: marketPrice,
                        priceChange: priceChange,
                        totalValue: count * marketPrice
                    });
                    
                    console.log(`Loaded cargo item: ${name} x${count}`);
                }

                // Update stats and UI
                updateStats();
                applyFilters();
                
                properties = realEstateData.properties || [];
                updatePropertySelector();

            } catch (error) {
                console.error('Error loading data:', error);
                loadingText.textContent = 'error loading cargo';
            }
        }

        // ===== UPDATE STATS =====
        function updateStats() {
            const totalItems = cargoItems.reduce((sum, item) => sum + item.count, 0);
            const uniqueItems = cargoItems.length;
            const totalValue = cargoItems.reduce((sum, item) => sum + item.totalValue, 0);
            
            // Calculate cargo usage (each item takes size * count space)
            const cargoUsed = cargoItems.reduce((sum, item) => sum + (item.size * item.count), 0);
            const cargoMax = 100;
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('uniqueItems').textContent = uniqueItems;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString();
            document.getElementById('capacityText').textContent = `${cargoUsed} / ${cargoMax}`;
            document.getElementById('cargoCapacityDisplay').textContent = `Used: ${cargoUsed}/${cargoMax}`;
            document.getElementById('capacityBar').style.width = Math.min(100, (cargoUsed / cargoMax) * 100) + '%';
            
            console.log(`Stats updated: ${totalItems} total items, ${uniqueItems} unique`);
        }

        // ===== UPDATE PROPERTY SELECTOR =====
        function updatePropertySelector() {
            const selector = document.getElementById('propertySelector');
            const select = document.getElementById('propertySelect');
            const transferBtn = document.getElementById('transferBtn');
            
            if (properties.length === 0) {
                selector.style.display = 'none';
                return;
            }
            
            selector.style.display = 'block';
            select.innerHTML = '<option value="">Select a property...</option>';
            
            properties.forEach(prop => {
                const option = document.createElement('option');
                option.value = prop.id;
                option.textContent = `${prop.name} (${prop.used || 0}/${prop.capacity})`;
                select.appendChild(option);
            });
            
            // Reset selection
            selectedPropertyId = null;
            transferBtn.disabled = true;
            document.getElementById('propertyUsed').textContent = '0';
            document.getElementById('propertyCapacity').textContent = '0';
        }

        // ===== PROPERTY SELECTION =====
        document.getElementById('propertySelect').addEventListener('change', function(e) {
            selectedPropertyId = e.target.value;
            const transferBtn = document.getElementById('transferBtn');
            
            if (selectedPropertyId && currentItem) {
                const property = properties.find(p => p.id === selectedPropertyId);
                if (property) {
                    document.getElementById('propertyUsed').textContent = property.used || 0;
                    document.getElementById('propertyCapacity').textContent = property.capacity;
                    
                    // Check if there's space
                    const itemSize = (elementDatabase[currentItem.name]?.size || 1) * 1;
                    const spaceLeft = property.capacity - (property.used || 0);
                    transferBtn.disabled = spaceLeft < itemSize;
                }
                transferBtn.disabled = false;
            } else {
                transferBtn.disabled = true;
            }
        });

        // ===== FILTER CARGO =====
        function filterCargo(rarity) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            currentFilter = rarity;
            applyFilters();
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== SEARCH CARGO =====
        function searchCargo() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }

        // ===== SORT CARGO =====
        function sortCargo() {
            currentSort = document.getElementById('sortSelect').value;
            applyFilters();
        }

        // ===== APPLY FILTERS =====
        function applyFilters() {
            // Apply rarity filter
            let filtered = cargoItems;
            if (currentFilter !== 'all') {
                filtered = cargoItems.filter(item => item.rarity === currentFilter);
            }
            
            // Apply search filter
            if (currentSearch) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(currentSearch)
                );
            }
            
            // Apply sorting
            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'quantity-desc':
                        return b.count - a.count;
                    case 'quantity-asc':
                        return a.count - b.count;
                    case 'value-desc':
                        return b.totalValue - a.totalValue;
                    case 'value-asc':
                        return a.totalValue - b.totalValue;
                    case 'rarity-desc': {
                        const order = { 'legendary': 0, 'very-rare': 1, 'rare': 2, 'uncommon': 3, 'common': 4 };
                        return (order[a.rarity] || 5) - (order[b.rarity] || 5);
                    }
                    case 'rarity-asc': {
                        const order = { 'common': 0, 'uncommon': 1, 'rare': 2, 'very-rare': 3, 'legendary': 4 };
                        return (order[a.rarity] || 5) - (order[b.rarity] || 5);
                    }
                    default:
                        return 0;
                }
            });
            
            filteredItems = filtered;
            renderCargo();
        }

        // ===== RENDER CARGO =====
        function renderCargo() {
            const grid = document.getElementById('cargoGrid');
            grid.innerHTML = '';
            
            if (filteredItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">No cargo matches your filters</div>';
                return;
            }
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'cargo-item';
                card.onclick = function() { showItemModal(item.name); };
                
                let rarityClass = 'rarity-common';
                if (item.rarity === 'uncommon') rarityClass = 'rarity-uncommon';
                else if (item.rarity === 'rare') rarityClass = 'rarity-rare';
                else if (item.rarity === 'very-rare') rarityClass = 'rarity-very-rare';
                else if (item.rarity === 'legendary') rarityClass = 'rarity-legendary';
                
                const changeClass = item.priceChange >= 0 ? 'price-up' : 'price-down';
                const changeSymbol = item.priceChange >= 0 ? '▲' : '▼';
                
                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">
                            <span class="item-quantity">📦 ${item.count}</span>
                            <span class="item-value">💰 ${item.marketPrice}⭐</span>
                        </div>
                    </div>
                    <div class="item-market">
                        <span class="item-market-price">${item.marketPrice}⭐</span>
                        <span class="item-market-change ${changeClass}">${changeSymbol} ${Math.abs(item.priceChange)}%</span>
                    </div>
                    <div class="item-rarity ${rarityClass}">${item.rarity}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        // ===== MODAL FUNCTIONS =====
        function showItemModal(itemName) {
            const item = cargoItems.find(i => i.name === itemName);
            if (!item) return;
            
            currentItem = item;
            
            const changeClass = item.priceChange >= 0 ? 'price-up' : 'price-down';
            const changeSymbol = item.priceChange >= 0 ? '▲' : '▼';
            
            document.getElementById('modalItemName').textContent = item.name;
            document.getElementById('modalItemDetails').textContent = `Quantity: ${item.count}`;
            document.getElementById('modalMarketPrice').textContent = `${item.marketPrice}⭐ each`;
            document.getElementById('modalPriceChange').textContent = `${changeSymbol} ${Math.abs(item.priceChange)}% (24h)`;
            document.getElementById('modalPriceChange').className = `modal-price-change ${changeClass}`;
            
            // Show transfer button if properties exist
            const transferBtn = document.getElementById('modalTransferBtn');
            if (properties.length > 0) {
                transferBtn.style.display = 'block';
            } else {
                transferBtn.style.display = 'none';
            }
            
            modal.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('propertySelector').style.display = 'none';
            currentItem = null;
        }

        function sellFromModal() {
            if (!currentItem) return;
            sellItem(currentItem.name, 1);
            closeModal();
        }

        function showTransferFromModal() {
            document.getElementById('propertySelector').style.display = 'block';
        }

        async function transferSelectedItem() {
            if (!currentItem || !selectedPropertyId) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'transferring...';
            
            try {
                const quantity = 1;
                let result = { success: false, reason: 'function not available' };
                if (typeof transferToProperty === 'function') {
                    result = await transferToProperty(selectedPropertyId, currentItem.name, quantity);
                }
                
                if (result.success) {
                    await loadData();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Transfer failed: ' + (result.reason || 'unknown error'));
                }
            } catch (error) {
                console.error('Transfer error:', error);
                alert('Error during transfer');
            }
            
            loadingOverlay.classList.remove('active');
            closeModal();
        }

        // ===== SELL ITEM =====
        async function sellItem(itemName, quantity) {
            const item = cargoItems.find(i => i.name === itemName);
            if (!item || item.count < quantity) {
                alert('Not enough items to sell!');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'selling...';
            
            try {
                let result = { success: false, reason: 'function not available' };
                if (typeof safeSellElement === 'function') {
                    result = await safeSellElement(itemName, quantity, item.marketPrice);
                } else {
                    // Fallback: update localStorage directly
                    console.log('Using localStorage fallback for selling');
                    let collection = {};
                    try {
                        collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                    } catch (e) {
                        collection = {};
                    }
                    
                    if (collection[itemName] && collection[itemName].count >= quantity) {
                        collection[itemName].count -= quantity;
                        if (collection[itemName].count <= 0) {
                            delete collection[itemName];
                        }
                        localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                        
                        let credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                        credits += quantity * item.marketPrice;
                        localStorage.setItem('voidfarer_credits', credits.toString());
                        
                        result = { success: true, earnings: quantity * item.marketPrice };
                    }
                }
                
                if (result.success) {
                    if (typeof recordTrade === 'function') {
                        await recordTrade(itemName, quantity, item.marketPrice);
                    }
                    await loadData();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Sale failed: ' + (result.reason || 'unknown error'));
                }
            } catch (error) {
                console.error('Sell error:', error);
                alert('Error selling item');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== SELL ALL COMMON =====
        async function sellAllCommon() {
            const commonItems = cargoItems.filter(item => item.rarity === 'common');
            
            if (commonItems.length === 0) {
                alert('No common items to sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'selling commons...';
            
            try {
                let totalEarnings = 0;
                let itemsSold = 0;
                
                for (const item of commonItems) {
                    if (item.count > 0) {
                        let result = { success: false };
                        if (typeof safeSellElement === 'function') {
                            result = await safeSellElement(item.name, item.count, item.marketPrice);
                        } else {
                            // Fallback
                            let collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                            if (collection[item.name]) {
                                delete collection[item.name];
                                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                                
                                let credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                                credits += item.count * item.marketPrice;
                                localStorage.setItem('voidfarer_credits', credits.toString());
                                
                                result = { success: true, earnings: item.count * item.marketPrice };
                            }
                        }
                        
                        if (result.success) {
                            totalEarnings += result.earnings;
                            itemsSold += item.count;
                            if (typeof recordTrade === 'function') {
                                await recordTrade(item.name, item.count, item.marketPrice);
                            }
                        }
                    }
                }
                
                if (itemsSold > 0) {
                    await loadData();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    alert(`Sold ${itemsSold} common items for ${totalEarnings}⭐`);
                }
            } catch (error) {
                console.error('Sell all common error:', error);
                alert('Error selling common items');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== QUICK SELL =====
        async function quickSell() {
            const targetAmount = 500;
            let earned = 0;
            let soldItems = [];
            
            // Sort by value (cheapest first)
            const sortedItems = [...cargoItems].sort((a, b) => a.marketPrice - b.marketPrice);
            
            if (sortedItems.length === 0) {
                alert('No items to sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'quick selling...';
            
            try {
                for (const item of sortedItems) {
                    if (earned >= targetAmount) break;
                    
                    const maxNeeded = Math.ceil((targetAmount - earned) / item.marketPrice);
                    const sellQuantity = Math.min(maxNeeded, item.count);
                    
                    if (sellQuantity > 0) {
                        let result = { success: false };
                        if (typeof safeSellElement === 'function') {
                            result = await safeSellElement(item.name, sellQuantity, item.marketPrice);
                        } else {
                            // Fallback
                            let collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                            if (collection[item.name] && collection[item.name].count >= sellQuantity) {
                                collection[item.name].count -= sellQuantity;
                                if (collection[item.name].count <= 0) {
                                    delete collection[item.name];
                                }
                                localStorage.setItem('voidfarer_collection', JSON.stringify(collection));
                                
                                let credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                                credits += sellQuantity * item.marketPrice;
                                localStorage.setItem('voidfarer_credits', credits.toString());
                                
                                result = { success: true, earnings: sellQuantity * item.marketPrice };
                            }
                        }
                        
                        if (result.success) {
                            earned += result.earnings;
                            soldItems.push({ name: item.name, quantity: sellQuantity });
                            if (typeof recordTrade === 'function') {
                                await recordTrade(item.name, sellQuantity, item.marketPrice);
                            }
                        }
                    }
                }
                
                if (earned > 0) {
                    await loadData();
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    alert(`Quick sold for ${earned}⭐`);
                } else {
                    alert('Not enough items to quick sell');
                }
            } catch (error) {
                console.error('Quick sell error:', error);
                alert('Error during quick sell');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'accessing cargo hold...';

                // Load all data
                await loadData();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading data';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/market-dynamics.js"></script>
