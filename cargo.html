<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Cargo Hold</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .cargo-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Header */
        .cargo-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .cargo-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
        }
        
        .cargo-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .cargo-capacity {
            font-size: 14px;
            color: #a0c0ff;
            text-align: right;
        }
        
        /* Capacity Card */
        .capacity-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .capacity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .capacity-label {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .capacity-numbers {
            color: #ffd966;
            font-size: 16px;
            font-weight: 600;
        }
        
        .capacity-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #6a8ac0;
        }
        
        .capacity-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            transition: width 0.3s;
        }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 30% 10% 30% 10%;
            padding: 12px 5px;
            text-align: center;
        }
        
        .stat-value {
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            font-family: 'WindSong', cursive;
        }
        
        .stat-label {
            color: #a0c0ff;
            font-size: 10px;
            letter-spacing: 1px;
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .filter-btn.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 15px #3a5a8a;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        /* Search Box */
        .search-container {
            margin-bottom: 15px;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            color: #ffffff;
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: #a0c0ff;
            opacity: 0.6;
        }
        
        /* Sort Bar */
        .sort-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .sort-select {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-family: 'Libre Baskerville', serif;
            font-size: 13px;
            outline: none;
            width: 100%;
            max-width: 200px;
        }
        
        .sort-select option {
            background: #0a1a2a;
        }
        
        /* Cargo Grid */
        .cargo-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .cargo-item {
            background: rgba(30, 45, 70, 0.6);
            border: 2px solid #6a8ac0;
            border-radius: 40px 12px 40px 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
        }
        
        .cargo-item:active {
            background: rgba(60, 90, 140, 0.7);
            transform: scale(0.99);
        }
        
        .item-icon {
            font-size: 36px;
            min-width: 50px;
            text-align: center;
            filter: drop-shadow(0 0 10px #6a8ac0);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'WindSong', cursive;
        }
        
        .item-details {
            display: flex;
            gap: 15px;
            color: #a0c0ff;
            font-size: 13px;
        }
        
        .item-quantity {
            color: #ffd966;
            font-weight: 600;
        }
        
        .item-value {
            color: #4affaa;
        }
        
        .item-market {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-right: 10px;
        }
        
        .item-market-price {
            color: #4affaa;
            font-size: 14px;
            font-weight: 600;
        }
        
        .item-market-change {
            font-size: 11px;
        }
        
        .price-up { color: #4affaa; }
        .price-down { color: #ff6b6b; }
        
        .item-rarity {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid currentColor;
            min-width: 70px;
            text-align: center;
        }
        
        .rarity-common { color: #ffffff; }
        .rarity-uncommon { color: #b0ffb0; }
        .rarity-rare { color: #b0b0ff; }
        .rarity-very-rare { color: #e0b0ff; }
        .rarity-legendary { color: #ffd700; }
        
        /* Property Selector */
        .property-selector {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .property-selector h3 {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 10px;
            font-family: 'WindSong', cursive;
        }
        
        .property-select {
            width: 100%;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-family: 'Libre Baskerville', serif;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }
        
        .property-select option {
            background: #0a1a2a;
        }
        
        .property-stats {
            display: flex;
            justify-content: space-between;
            color: #a0c0ff;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .transfer-btn {
            width: 100%;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .transfer-btn:active {
            background: #6a8ac0;
            transform: scale(0.98);
        }
        
        .transfer-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Item Actions Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(15px);
            border: 3px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 25px;
            width: 280px;
            text-align: center;
            color: #ffffff;
        }
        
        .modal-title {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .modal-details {
            color: #a0c0ff;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .modal-market-price {
            color: #4affaa;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .modal-price-change {
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .modal-btn {
            flex: 1;
            min-width: 80px;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .modal-btn:active {
            background: #6a8ac0;
            transform: scale(0.95);
        }
        
        .modal-btn.sell {
            background: rgba(255, 170, 74, 0.3);
            border-color: #ffaa4a;
        }
        
        .modal-btn.sell:active {
            background: #ffaa4a;
        }
        
        .modal-btn.transfer {
            background: rgba(74, 154, 138, 0.3);
            border-color: #4a9a8a;
        }
        
        .modal-btn.transfer:active {
            background: #4a9a8a;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .action-btn {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        
        .action-btn:active {
            background: #6a8ac0;
            transform: scale(0.97);
        }
        
        .action-btn.sell {
            background: rgba(255, 170, 74, 0.2);
            border-color: #ffaa4a;
        }
        
        .action-btn.sell:active {
            background: #ffaa4a;
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #6a8ac0;
            font-style: italic;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 20px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #6a8ac0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            margin-top: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="cargo-view" id="cargoView">
            <!-- Header -->
            <div class="cargo-header">
                <div class="cargo-title">Cargo Hold</div>
                <div class="cargo-subtitle">✦ inventory management ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> 5,000
                </div>
                <div class="cargo-capacity" id="cargoCapacityDisplay">
                    Used: 0/100
                </div>
            </div>
            
            <!-- Capacity Card -->
            <div class="capacity-card">
                <div class="capacity-header">
                    <span class="capacity-label">Ship Storage</span>
                    <span class="capacity-numbers" id="capacityText">0 / 100</span>
                </div>
                <div class="capacity-bar-bg">
                    <div class="capacity-bar-fill" id="capacityBar" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="totalItems">0</div>
                    <div class="stat-label">ITEMS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uniqueItems">0</div>
                    <div class="stat-label">UNIQUE</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalValue">0</div>
                    <div class="stat-label">VALUE</div>
                </div>
            </div>
            
            <!-- Property Selector -->
            <div class="property-selector" id="propertySelector" style="display: none;">
                <h3>🏢 Transfer to Property</h3>
                <select class="property-select" id="propertySelect">
                    <option value="">Select a property...</option>
                </select>
                <div class="property-stats" id="propertyStats">
                    <span>Used: <span id="propertyUsed">0</span></span>
                    <span>Capacity: <span id="propertyCapacity">0</span></span>
                </div>
                <button class="transfer-btn" id="transferBtn" onclick="transferSelectedItem()" disabled>TRANSFER</button>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterCargo('all')">ALL</button>
                <button class="filter-btn" onclick="filterCargo('common')">COMMON</button>
                <button class="filter-btn" onclick="filterCargo('uncommon')">UNCOMMON</button>
                <button class="filter-btn" onclick="filterCargo('rare')">RARE</button>
                <button class="filter-btn" onclick="filterCargo('very-rare')">VERY RARE</button>
                <button class="filter-btn" onclick="filterCargo('legendary')">LEGENDARY</button>
            </div>
            
            <!-- Search Box -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search cargo..." oninput="searchCargo()">
            </div>
            
            <!-- Sort Bar -->
            <div class="sort-bar">
                <select class="sort-select" id="sortSelect" onchange="sortCargo()">
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="quantity-desc">Quantity (High-Low)</option>
                    <option value="quantity-asc">Quantity (Low-High)</option>
                    <option value="value-desc">Value (High-Low)</option>
                    <option value="value-asc">Value (Low-High)</option>
                    <option value="rarity-desc">Rarity (Rarest first)</option>
                    <option value="rarity-asc">Rarity (Common first)</option>
                </select>
            </div>
            
            <!-- Cargo Grid -->
            <div class="cargo-grid" id="cargoGrid">
                <!-- Filled by JavaScript -->
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="action-btn" id="sellCommonBtn" onclick="sellAllCommon()">💰 SELL ALL COMMON</button>
                <button class="action-btn sell" id="quickSellBtn" onclick="quickSell()">⚡ QUICK SELL (500⭐)</button>
            </div>
            
            <!-- Back Button -->
            <button class="back-button" onclick="returnToBridge()">← RETURN TO BRIDGE</button>
            
            <!-- Item Action Modal -->
            <div class="modal-overlay" id="itemModal">
                <div class="modal-content">
                    <div class="modal-title" id="modalItemName">Item Name</div>
                    <div class="modal-details" id="modalItemDetails">Quantity: 0</div>
                    <div class="modal-market-price" id="modalMarketPrice">0⭐</div>
                    <div class="modal-price-change" id="modalPriceChange">0%</div>
                    <div class="modal-buttons">
                        <button class="modal-btn" onclick="closeModal()">CANCEL</button>
                        <button class="modal-btn sell" id="modalSellBtn" onclick="sellFromModal()">SELL 1</button>
                        <button class="modal-btn transfer" id="modalTransferBtn" onclick="showTransferFromModal()">TRANSFER</button>
                    </div>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">updating...</div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/market-dynamics.js"></script>
    
    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Modal
        const modal = document.getElementById('itemModal');
        let currentItem = null;
        let transferMode = false;
        let selectedPropertyId = null;
        
        // Navigation
        function returnToBridge() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }
        
        // ===== ELEMENT DATABASE =====
        const elementDatabase = {
            // Common
            'Carbon': { icon: '⚫', rarity: 'common', size: 1 },
            'Silicon': { icon: '💎', rarity: 'common', size: 1 },
            'Hydrogen': { icon: '💧', rarity: 'common', size: 1 },
            'Helium': { icon: '🎈', rarity: 'common', size: 1 },
            'Sodium': { icon: '🧂', rarity: 'common', size: 1 },
            'Lithium': { icon: '🔋', rarity: 'common', size: 1 },
            
            // Uncommon
            'Iron': { icon: '⚙️', rarity: 'uncommon', size: 1 },
            'Oxygen': { icon: '💨', rarity: 'uncommon', size: 1 },
            'Nickel': { icon: '🔩', rarity: 'uncommon', size: 1 },
            'Sulfur': { icon: '🟡', rarity: 'uncommon', size: 1 },
            'Magnesium': { icon: '✨', rarity: 'uncommon', size: 1 },
            
            // Rare
            'Gold': { icon: '🟡', rarity: 'rare', size: 2 },
            'Silver': { icon: '⚪', rarity: 'rare', size: 2 },
            'Platinum': { icon: '⬜', rarity: 'rare', size: 2 },
            'Titanium': { icon: '🔷', rarity: 'rare', size: 2 },
            'Copper': { icon: '🔴', rarity: 'rare', size: 2 },
            
            // Very Rare
            'Uranium': { icon: '🟣', rarity: 'very-rare', size: 3 },
            'Thorium': { icon: '🔮', rarity: 'very-rare', size: 3 },
            'Plutonium': { icon: '☢️', rarity: 'very-rare', size: 3 },
            
            // Legendary
            'Promethium': { icon: '✨', rarity: 'legendary', size: 5 },
            'Technetium': { icon: '🧪', rarity: 'legendary', size: 5 },
            'Astatine': { icon: '☣️', rarity: 'legendary', size: 5 }
        };
        
        // ===== STATE =====
        let cargoItems = [];
        let filteredItems = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentSort = 'name-asc';
        let properties = [];
        
        // ===== LOAD DATA =====
        function loadData() {
            const collection = getCollection();
            const credits = getCredits();
            const realEstate = getRealEstate();
            properties = realEstate.properties || [];
            
            // Update header
            document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;
            
            // Build cargo items with market data
            cargoItems = [];
            Object.keys(collection).forEach(name => {
                const elementData = elementDatabase[name] || {
                    icon: '🔹',
                    rarity: 'common',
                    size: 1
                };
                const count = collection[name].count || 1;
                const marketPrice = typeof getLatestPrice === 'function' ? 
                    (getLatestPrice(name) || 100) : 100;
                const priceChange = typeof calculatePriceChange === 'function' ? 
                    calculatePriceChange(name, 1) : 0;
                
                cargoItems.push({
                    name: name,
                    count: count,
                    icon: elementData.icon,
                    rarity: elementData.rarity,
                    size: elementData.size,
                    marketPrice: marketPrice,
                    priceChange: priceChange,
                    totalValue: count * marketPrice
                });
            });
            
            updateStats();
            applyFilters();
            updatePropertySelector();
            
            // Enable/disable quick action buttons
            const hasItems = cargoItems.length > 0;
            document.getElementById('sellCommonBtn').disabled = !hasItems;
            document.getElementById('quickSellBtn').disabled = !hasItems;
        }
        
        // ===== UPDATE STATS =====
        function updateStats() {
            const totalItems = cargoItems.reduce((sum, item) => sum + item.count, 0);
            const uniqueItems = cargoItems.length;
            const totalValue = cargoItems.reduce((sum, item) => sum + item.totalValue, 0);
            
            // Calculate cargo usage (each item takes size * count space)
            const cargoUsed = cargoItems.reduce((sum, item) => sum + (item.size * item.count), 0);
            const cargoMax = 100;
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('uniqueItems').textContent = uniqueItems;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString();
            document.getElementById('capacityText').textContent = `${cargoUsed} / ${cargoMax}`;
            document.getElementById('cargoCapacityDisplay').textContent = `Used: ${cargoUsed}/${cargoMax}`;
            document.getElementById('capacityBar').style.width = Math.min(100, (cargoUsed / cargoMax) * 100) + '%';
        }
        
        // ===== UPDATE PROPERTY SELECTOR =====
        function updatePropertySelector() {
            const selector = document.getElementById('propertySelector');
            const select = document.getElementById('propertySelect');
            const transferBtn = document.getElementById('transferBtn');
            
            if (properties.length === 0) {
                selector.style.display = 'none';
                return;
            }
            
            selector.style.display = 'block';
            select.innerHTML = '<option value="">Select a property...</option>';
            
            properties.forEach(prop => {
                const option = document.createElement('option');
                option.value = prop.id;
                option.textContent = `${prop.name} (${prop.used || 0}/${prop.capacity})`;
                select.appendChild(option);
            });
            
            // Reset selection
            selectedPropertyId = null;
            transferBtn.disabled = true;
            document.getElementById('propertyUsed').textContent = '0';
            document.getElementById('propertyCapacity').textContent = '0';
        }
        
        // ===== PROPERTY SELECTION =====
        document.getElementById('propertySelect').addEventListener('change', function(e) {
            selectedPropertyId = e.target.value;
            const transferBtn = document.getElementById('transferBtn');
            
            if (selectedPropertyId && currentItem) {
                const property = properties.find(p => p.id === selectedPropertyId);
                if (property) {
                    document.getElementById('propertyUsed').textContent = property.used || 0;
                    document.getElementById('propertyCapacity').textContent = property.capacity;
                    
                    // Check if there's space
                    const itemSize = (elementDatabase[currentItem.name]?.size || 1) * 1;
                    const spaceLeft = property.capacity - (property.used || 0);
                    transferBtn.disabled = spaceLeft < itemSize;
                }
                transferBtn.disabled = false;
            } else {
                transferBtn.disabled = true;
            }
        });
        
        // ===== FILTER CARGO =====
        function filterCargo(rarity) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            currentFilter = rarity;
            applyFilters();
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ===== SEARCH CARGO =====
        function searchCargo() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }
        
        // ===== SORT CARGO =====
        function sortCargo() {
            currentSort = document.getElementById('sortSelect').value;
            applyFilters();
        }
        
        // ===== APPLY FILTERS =====
        function applyFilters() {
            // Apply rarity filter
            let filtered = cargoItems;
            if (currentFilter !== 'all') {
                filtered = cargoItems.filter(item => item.rarity === currentFilter);
            }
            
            // Apply search filter
            if (currentSearch) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(currentSearch)
                );
            }
            
            // Apply sorting
            filtered.sort((a, b) => {
                switch(currentSort) {
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'quantity-desc':
                        return b.count - a.count;
                    case 'quantity-asc':
                        return a.count - b.count;
                    case 'value-desc':
                        return b.totalValue - a.totalValue;
                    case 'value-asc':
                        return a.totalValue - b.totalValue;
                    case 'rarity-desc': {
                        const order = { 'legendary': 0, 'very-rare': 1, 'rare': 2, 'uncommon': 3, 'common': 4 };
                        return (order[a.rarity] || 5) - (order[b.rarity] || 5);
                    }
                    case 'rarity-asc': {
                        const order = { 'common': 0, 'uncommon': 1, 'rare': 2, 'very-rare': 3, 'legendary': 4 };
                        return (order[a.rarity] || 5) - (order[b.rarity] || 5);
                    }
                    default:
                        return 0;
                }
            });
            
            filteredItems = filtered;
            renderCargo();
        }
        
        // ===== RENDER CARGO =====
        function renderCargo() {
            const grid = document.getElementById('cargoGrid');
            grid.innerHTML = '';
            
            if (filteredItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">No cargo matches your filters</div>';
                return;
            }
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'cargo-item';
                card.setAttribute('onclick', `showItemModal('${item.name}')`);
                
                let rarityClass = 'rarity-common';
                if (item.rarity === 'uncommon') rarityClass = 'rarity-uncommon';
                else if (item.rarity === 'rare') rarityClass = 'rarity-rare';
                else if (item.rarity === 'very-rare') rarityClass = 'rarity-very-rare';
                else if (item.rarity === 'legendary') rarityClass = 'rarity-legendary';
                
                const changeClass = item.priceChange >= 0 ? 'price-up' : 'price-down';
                const changeSymbol = item.priceChange >= 0 ? '▲' : '▼';
                
                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">
                            <span class="item-quantity">📦 ${item.count}</span>
                            <span class="item-value">💰 ${item.marketPrice}⭐</span>
                        </div>
                    </div>
                    <div class="item-market">
                        <span class="item-market-price">${item.marketPrice}⭐</span>
                        <span class="item-market-change ${changeClass}">${changeSymbol} ${Math.abs(item.priceChange)}%</span>
                    </div>
                    <div class="item-rarity ${rarityClass}">${item.rarity}</div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // ===== MODAL FUNCTIONS =====
        function showItemModal(itemName) {
            const item = cargoItems.find(i => i.name === itemName);
            if (!item) return;
            
            currentItem = item;
            transferMode = false;
            
            const changeClass = item.priceChange >= 0 ? 'price-up' : 'price-down';
            const changeSymbol = item.priceChange >= 0 ? '▲' : '▼';
            
            document.getElementById('modalItemName').textContent = item.name;
            document.getElementById('modalItemDetails').textContent = `Quantity: ${item.count}`;
            document.getElementById('modalMarketPrice').textContent = `${item.marketPrice}⭐ each`;
            document.getElementById('modalPriceChange').textContent = `${changeSymbol} ${Math.abs(item.priceChange)}% (24h)`;
            document.getElementById('modalPriceChange').className = `modal-price-change ${changeClass}`;
            
            document.getElementById('modalSellBtn').style.display = 'block';
            document.getElementById('modalTransferBtn').style.display = properties.length > 0 ? 'block' : 'none';
            
            modal.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function showTransferFromModal() {
            transferMode = true;
            document.getElementById('propertySelector').style.display = 'block';
            document.getElementById('modalSellBtn').style.display = 'none';
            document.getElementById('modalTransferBtn').style.display = 'none';
        }
        
        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('propertySelector').style.display = 'none';
            currentItem = null;
            transferMode = false;
        }
        
        function sellFromModal() {
            if (!currentItem) return;
            sellItem(currentItem.name, 1);
            closeModal();
        }
        
        function transferSelectedItem() {
            if (!currentItem || !selectedPropertyId) return;
            
            const quantity = 1; // Default to 1 for now, could add quantity input later
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                const result = transferToProperty(selectedPropertyId, currentItem.name, quantity);
                
                if (result.success) {
                    // Remove from ship cargo
                    const collection = getCollection();
                    collection[currentItem.name].count -= quantity;
                    if (collection[currentItem.name].count <= 0) {
                        delete collection[currentItem.name];
                    }
                    saveCollection(collection);
                    
                    loadData();
                    
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Transfer failed: ' + (result.reason || 'unknown error'));
                }
                
                loadingOverlay.classList.remove('active');
                closeModal();
            }, 300);
        }
        
        // ===== SELL ITEM =====
        function sellItem(itemName, quantity) {
            let collection = getCollection();
            let credits = getCredits();
            
            if (!collection[itemName] || collection[itemName].count < quantity) {
                alert('Not enough items to sell!');
                return;
            }
            
            const marketPrice = typeof getLatestPrice === 'function' ? 
                (getLatestPrice(itemName) || 100) : 100;
            const earnings = quantity * marketPrice;
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Update collection
                collection[itemName].count -= quantity;
                if (collection[itemName].count <= 0) {
                    delete collection[itemName];
                }
                saveCollection(collection);
                
                // Update credits
                credits += earnings;
                saveCredits(credits);
                
                // Record trade for market dynamics
                if (typeof recordTrade === 'function') {
                    recordTrade(itemName, quantity, marketPrice);
                }
                
                // Reload data
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
            }, 300);
        }
        
        // ===== SELL ALL COMMON =====
        function sellAllCommon() {
            let collection = getCollection();
            let credits = getCredits();
            
            let totalEarnings = 0;
            let itemsSold = 0;
            let soldItems = [];
            
            Object.keys(collection).forEach(name => {
                const rarity = (elementDatabase[name]?.rarity) || 
                    (typeof getElementRarity === 'function' ? getElementRarity(name) : 'common');
                
                if (rarity === 'common') {
                    const marketPrice = typeof getLatestPrice === 'function' ? 
                        (getLatestPrice(name) || 100) : 100;
                    const quantity = collection[name].count;
                    
                    totalEarnings += quantity * marketPrice;
                    itemsSold += quantity;
                    soldItems.push({ name: name, quantity: quantity, price: marketPrice });
                    
                    delete collection[name];
                }
            });
            
            if (itemsSold === 0) {
                alert('No common items to sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                saveCollection(collection);
                credits += totalEarnings;
                saveCredits(credits);
                
                // Record trades
                if (typeof recordTrade === 'function') {
                    soldItems.forEach(item => {
                        recordTrade(item.name, item.quantity, item.price);
                    });
                }
                
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
                
                alert(`Sold ${itemsSold} common items for ${totalEarnings}⭐`);
            }, 300);
        }
        
        // ===== QUICK SELL =====
        function quickSell() {
            let collection = getCollection();
            let credits = getCredits();
            
            const targetAmount = 500;
            let earned = 0;
            let soldItems = [];
            
            // Flatten all elements
            const allElements = [];
            Object.keys(collection).forEach(name => {
                const marketPrice = typeof getLatestPrice === 'function' ? 
                    (getLatestPrice(name) || 100) : 100;
                allElements.push({
                    name: name,
                    count: collection[name].count,
                    price: marketPrice
                });
            });
            
            if (allElements.length === 0) {
                alert('No items to sell');
                return;
            }
            
            // Sort by value (cheapest first)
            allElements.sort((a, b) => a.price - b.price);
            
            for (let element of allElements) {
                if (earned >= targetAmount) break;
                
                const maxNeeded = Math.ceil((targetAmount - earned) / element.price);
                const sellQuantity = Math.min(maxNeeded, element.count);
                
                if (sellQuantity > 0) {
                    earned += sellQuantity * element.price;
                    soldItems.push({ name: element.name, quantity: sellQuantity, price: element.price });
                }
            }
            
            if (earned === 0) {
                alert('Not enough items to quick sell');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Update collection
                soldItems.forEach(sold => {
                    collection[sold.name].count -= sold.quantity;
                    if (collection[sold.name].count <= 0) {
                        delete collection[sold.name];
                    }
                    if (typeof recordTrade === 'function') {
                        recordTrade(sold.name, sold.quantity, sold.price);
                    }
                });
                
                saveCollection(collection);
                credits += earned;
                saveCredits(credits);
                
                loadData();
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                loadingOverlay.classList.remove('active');
                
                alert(`Quick sold for ${earned}⭐`);
            }, 300);
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            // Update daily prices if needed
            if (typeof updateDailyPrices === 'function') {
                updateDailyPrices();
            }
            
            loadData();
        }
        
        init();
    </script>
</body>
</html>
