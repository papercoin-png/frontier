<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Ship Bridge</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .bridge-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .bridge-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bridge-title {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0;
            letter-spacing: 1px;
        }
        
        .ship-status-badge {
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(30, 50, 80, 0.5);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #6a8ac0;
        }
        
        /* Economic Alert Banner */
        .alert-banner {
            background: rgba(255, 170, 74, 0.15);
            border: 2px solid #ffaa4a;
            border-radius: 40px 10px 40px 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: glow 2s infinite alternate;
            cursor: pointer;
        }
        
        .alert-banner:active {
            background: rgba(255, 170, 74, 0.3);
            transform: scale(0.99);
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 5px #ffaa4a; }
            to { box-shadow: 0 0 15px #ffaa4a; }
        }
        
        .alert-icon {
            font-size: 24px;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            color: #ffaa4a;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .alert-message {
            color: #ffffff;
            font-size: 12px;
        }
        
        /* Window View */
        .window-container {
            background: #0a1a2a;
            border-radius: 60px 20px 60px 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #6a8ac0;
            box-shadow: 0 0 30px #3a5a8a80;
            position: relative;
            overflow: hidden;
        }
        
        .window-view {
            position: relative;
            width: 100%;
            height: 160px;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        .planet-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) saturate(1.2);
            border-radius: 40px 10px 40px 10px;
        }
        
        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 26, 42, 0.3) 100%);
            pointer-events: none;
        }
        
        .window-label {
            position: absolute;
            bottom: 10px;
            left: 20px;
            color: #ffffff;
            font-size: 18px;
            font-family: 'WindSong', cursive;
            text-shadow: 0 0 15px #000;
            background: rgba(0,0,0,0.3);
            padding: 4px 16px;
            border-radius: 30px 5px 30px 5px;
            backdrop-filter: blur(5px);
        }
        
        /* Mission Card */
        .mission-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px #2a4a7a;
        }
        
        .mission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .mission-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .mission-planet {
            color: #a0c0ff;
            font-size: 16px;
            font-family: 'WindSong', cursive;
        }
        
        .mission-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .mission-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .item-icon {
            font-size: 20px;
            min-width: 30px;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6a8ac0, #aac8ff);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .item-count {
            color: #a0c0ff;
            font-size: 14px;
            min-width: 50px;
            text-align: right;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label {
            color: #a0c0ff;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Button Grid - 4x2 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .nav-button {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 25px 8px 25px 8px;
            padding: 16px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.1s;
            color: #ffffff;
        }
        
        .nav-button:active {
            background: rgba(60, 90, 140, 0.9);
            transform: scale(0.96);
            border-color: #aac8ff;
        }
        
        .button-icon {
            font-size: 26px;
            filter: drop-shadow(0 0 8px #6a8ac0);
        }
        
        .button-label {
            font-size: 12px;
            font-weight: 500;
            color: #c0d0ff;
            text-align: center;
        }
        
        /* Tax Banner */
        .tax-banner {
            background: rgba(74, 138, 192, 0.15);
            border: 2px solid #4a8ac0;
            border-radius: 40px 10px 40px 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .tax-banner:active {
            background: rgba(74, 138, 192, 0.3);
            transform: scale(0.99);
        }
        
        .tax-icon {
            font-size: 24px;
        }
        
        .tax-content {
            flex: 1;
        }
        
        .tax-title {
            color: #4a8ac0;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .tax-stats {
            color: #ffffff;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }
        
        .tax-amount {
            color: #ffd966;
        }
        
        /* Stats Footer */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            color: #a0b0c0;
            font-size: 14px;
            padding: 15px 5px;
            border-top: 1px solid #3a5a7a;
            margin-bottom: 20px;
        }
        
        .collection-stat {
            color: #ffffff;
            font-weight: 600;
        }
        
        .fuel-stat {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 10px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        /* Element colors */
        .icon-gold { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .icon-uranium { color: #7ac0b0; text-shadow: 0 0 10px #7ac0b0; }
        .icon-promethium { color: #ff9e5e; text-shadow: 0 0 10px #ff9e5e; }

        /* Migration status (hidden by default) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="bridge-view" id="bridgeView">
            <!-- Header -->
            <div class="bridge-header">
                <div class="bridge-title">Bridge</div>
                <div class="ship-status-badge" id="shipPower">⚡ --</div>
            </div>
            
            <!-- Economic Alert Banner (dynamic) -->
            <div class="alert-banner" id="alertBanner" onclick="navigateTo('economy-dashboard.html')">
                <div class="alert-icon">📈</div>
                <div class="alert-content">
                    <div class="alert-title" id="alertTitle">Economic Alert</div>
                    <div class="alert-message" id="alertMessage">Loading...</div>
                </div>
            </div>
            
            <!-- Window View -->
            <div class="window-container">
                <div class="window-view">
                    <img src="assets/images/planet-verdant.jpg" class="planet-view" id="currentPlanetImage" alt="Current planet" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
                    <div class="window-overlay"></div>
                    <div class="window-label" id="currentPlanetName">Loading...</div>
                </div>
            </div>
            
            <!-- Active Mission Card -->
            <div class="mission-card">
                <div class="mission-header">
                    <span class="mission-title">Active Missions</span>
                    <span class="mission-planet" id="missionPlanet">---</span>
                </div>
                <div class="mission-list" id="missionList">
                    <div style="color:#a0c0ff; text-align:center; padding:20px;">Loading missions...</div>
                </div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Fuel</span>
                    <span class="stat-value" id="fuelAmount">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Credits</span>
                    <span class="stat-value" id="creditAmount">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Elements</span>
                    <span class="stat-value" id="elementCount">--</span>
                </div>
            </div>
            
            <!-- Button Grid (4x2 - 8 buttons) -->
            <div class="button-grid">
                <!-- Row 1 -->
                <div class="nav-button" onclick="navigateTo('galaxy-map.html')">
                    <span class="button-icon">🌌</span>
                    <span class="button-label">Galaxy</span>
                </div>
                
                <div class="nav-button" onclick="navigateToSurface()">
                    <span class="button-icon">🚀</span>
                    <span class="button-label">Surface</span>
                </div>
                
                <div class="nav-button" onclick="navigateTo('system-view.html')">
                    <span class="button-icon">🪐</span>
                    <span class="button-label">System</span>
                </div>
                
                <div class="nav-button" onclick="navigateTo('cargo.html')">
                    <span class="button-icon">📦</span>
                    <span class="button-label">Cargo</span>
                </div>
                
                <!-- Row 2 -->
                <div class="nav-button" onclick="navigateTo('ship-status.html')">
                    <span class="button-icon">📊</span>
                    <span class="button-label">Status</span>
                </div>
                
                <div class="nav-button" onclick="navigateTo('scanner.html')">
                    <span class="button-icon">📡</span>
                    <span class="button-label">Scanner</span>
                </div>
                
                <div class="nav-button" onclick="navigateTo('earth-hub.html')">
                    <span class="button-icon">🌍</span>
                    <span class="button-label">Earth</span>
                </div>
                
                <div class="nav-button" onclick="navigateTo('settings.html')">
                    <span class="button-icon">⚙️</span>
                    <span class="button-label">Settings</span>
                </div>
            </div>
            
            <!-- Tax Banner -->
            <div class="tax-banner" onclick="navigateTo('tax-center.html')">
                <div class="tax-icon">💰</div>
                <div class="tax-content">
                    <div class="tax-title">Tax Center</div>
                    <div class="tax-stats">
                        <span>Paid this month: <span class="tax-amount" id="monthlyTax">--⭐</span></span>
                        <span>Rate: <span id="taxRate">--</span></span>
                    </div>
                </div>
                <div class="tax-icon">→</div>
            </div>
            
            <!-- Stats Footer -->
            <div class="stats-footer">
                <span>Elements found</span>
                <span class="collection-stat" id="collectionCount">-- / 118</span>
            </div>
            
            <!-- Back button to Earth Hub -->
            <button class="back-button" onclick="navigateTo('earth-hub.html')">← EARTH HUB</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">loading bridge...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <script type="module">
        // ===== IMPORTS =====
        import { 
            getPlayer, 
            getShipFuel, 
            getShipPower, 
            getCredits, 
            getCollection,
            getCurrentPlanet,
            getCurrentStar,
            getCurrentSector,
            getCurrentNebula
        } from './js/storage.js';
        import { getActiveEvents, checkAndExpireEvents } from './js/economic-events.js';
        import { getCurrentRates } from './js/tax-system.js';
        import { getMissions } from './js/missions.js';
        import { isMigrationComplete } from './js/db.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // ===== NAVIGATION =====
        window.navigateTo = function(screen) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'navigating...';
            
            setTimeout(() => {
                window.location.href = screen;
            }, 300);
        };

        // Special navigation for surface (checks if on gas giant)
        window.navigateToSurface = async function() {
            const planet = await getCurrentPlanet();
            
            if (planet.includes('Aether') || planet.includes('Gas')) {
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                alert('Cannot land on gas giant. Choose a different planet from System View.');
                return;
            }
            
            navigateTo('surface.html');
        };

        // ===== LOAD ALL DATA =====
        async function loadAllData() {
            try {
                loadingText.textContent = 'loading ship data...';
                
                // Load all data in parallel for speed
                const [
                    player,
                    fuel,
                    power,
                    credits,
                    collection,
                    planet,
                    star,
                    sector,
                    nebula,
                    missions,
                    events,
                    rates
                ] = await Promise.all([
                    getPlayer(),
                    getShipFuel(),
                    getShipPower(),
                    getCredits(),
                    getCollection(),
                    getCurrentPlanet(),
                    getCurrentStar(),
                    getCurrentSector(),
                    getCurrentNebula(),
                    getMissions(),
                    getActiveEvents(),
                    getCurrentRates()
                ]);

                loadingText.textContent = 'updating displays...';

                // Update UI with loaded data
                updateShipStatus(power);
                updateFuelDisplay(fuel);
                updateCreditsDisplay(credits);
                updateCollectionDisplay(collection);
                updateLocationDisplay(planet, star, sector, nebula);
                updateMissionsDisplay(missions);
                updateTaxDisplay(rates);
                updateEventAlerts(events);

                // Check migration status (debug)
                const migrated = await isMigrationComplete();
                migrationStatus.textContent = migrated ? '✓ DB Ready' : '⚡ Loading';
                migrationStatus.style.display = 'block';
                setTimeout(() => {
                    migrationStatus.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error('Error loading data:', error);
                loadingText.textContent = 'error loading data';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // ===== UPDATE FUNCTIONS =====
        function updateShipStatus(power) {
            const powerValue = power || 100;
            document.getElementById('shipPower').textContent = `⚡ ${powerValue}%`;
        }

        function updateFuelDisplay(fuel) {
            const fuelValue = fuel || 100;
            document.getElementById('fuelAmount').textContent = fuelValue;
        }

        function updateCreditsDisplay(credits) {
            const creditsValue = credits || 0;
            document.getElementById('creditAmount').textContent = creditsValue.toLocaleString();
        }

        function updateCollectionDisplay(collection) {
            const count = Object.keys(collection || {}).length;
            document.getElementById('elementCount').textContent = count;
            document.getElementById('collectionCount').textContent = `${count} / 118`;
        }

        function updateLocationDisplay(planet, star, sector, nebula) {
            document.getElementById('currentPlanetName').textContent = planet || 'Unknown';
            
            // Update planet image based on name
            const planetImage = document.getElementById('currentPlanetImage');
            const planetName = (planet || '').toLowerCase();
            
            if (planetName.includes('verdant') || planetName.includes('earth')) {
                planetImage.src = 'assets/images/planet-verdant.jpg';
            } else if (planetName.includes('pyros') || planetName.includes('lava')) {
                planetImage.src = 'assets/images/planet-pyros.jpg';
            } else if (planetName.includes('glacier') || planetName.includes('ice')) {
                planetImage.src = 'assets/images/planet-glacier.jpg';
            } else if (planetName.includes('aether') || planetName.includes('gas')) {
                planetImage.src = 'assets/images/planet-aether.jpg';
            } else {
                planetImage.src = 'assets/images/planet-verdant.jpg';
            }
        }

        function updateMissionsDisplay(missions) {
            const missionList = document.getElementById('missionList');
            const missionPlanet = document.getElementById('missionPlanet');
            
            if (!missions || missions.length === 0) {
                missionList.innerHTML = '<div style="color:#a0c0ff; text-align:center; padding:20px;">No active missions</div>';
                missionPlanet.textContent = 'None';
                return;
            }

            // Show first mission's planet
            missionPlanet.textContent = missions[0].planet || 'Unknown';

            // Build mission list
            missionList.innerHTML = '';
            missions.slice(0, 3).forEach(mission => {
                const percent = (mission.current / mission.target) * 100;
                let icon = '🟡';
                
                if (mission.element === 'Uranium') icon = '🟣';
                else if (mission.element === 'Promethium') icon = '✨';
                else if (mission.element === 'Gold') icon = '🟡';
                else if (mission.element === 'Silver') icon = '⚪';
                else if (mission.element === 'Platinum') icon = '⬜';
                
                const item = document.createElement('div');
                item.className = 'mission-item';
                item.innerHTML = `
                    <span class="item-icon">${icon}</span>
                    <div class="item-details">
                        <div class="item-name">${mission.element}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <span class="item-count">${mission.current}/${mission.target}</span>
                `;
                missionList.appendChild(item);
            });

            // If more than 3 missions, show indicator
            if (missions.length > 3) {
                const more = document.createElement('div');
                more.style.color = '#a0c0ff';
                more.style.textAlign = 'center';
                more.style.padding = '10px';
                more.style.fontSize = '12px';
                more.textContent = `+${missions.length - 3} more missions`;
                missionList.appendChild(more);
            }
        }

        function updateTaxDisplay(rates) {
            // Simulated monthly tax (in real implementation, would come from tax history)
            const monthlyTax = Math.floor(Math.random() * 5000) + 1000;
            const rate = rates?.transaction || 0.02;
            
            document.getElementById('monthlyTax').textContent = formatMoney(monthlyTax);
            document.getElementById('taxRate').textContent = (rate * 100).toFixed(1) + '%';
        }

        function updateEventAlerts(events) {
            const banner = document.getElementById('alertBanner');
            
            if (!events || events.length === 0) {
                banner.style.display = 'none';
                return;
            }

            // Show most severe event
            const severityOrder = { 'epic': 0, 'major': 1, 'moderate': 2, 'minor': 3 };
            const sortedEvents = [...events].sort((a, b) => 
                (severityOrder[a.severity] || 99) - (severityOrder[b.severity] || 99)
            );
            
            const event = sortedEvents[0];
            document.getElementById('alertTitle').textContent = event.name;
            document.getElementById('alertMessage').textContent = event.description;
            banner.style.display = 'flex';
        }

        // ===== FORMATTING HELPER =====
        function formatMoney(amount) {
            if (amount >= 1e6) return (amount / 1e6).toFixed(2) + 'M';
            if (amount >= 1e3) return (amount / 1e3).toFixed(2) + 'K';
            return amount.toString();
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'initializing bridge...';

                // Check for player data
                const player = await getPlayer();
                if (!player) {
                    // No player, redirect to main menu
                    window.location.href = 'index.html';
                    return;
                }

                // Load all data
                await loadAllData();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

                // Set up periodic refresh (every 60 seconds)
                setInterval(async () => {
                    const events = await getActiveEvents();
                    updateEventAlerts(events);
                    
                    // Check for expired events
                    await checkAndExpireEvents();
                }, 60000);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
