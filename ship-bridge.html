<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Ship Bridge</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .bridge-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .bridge-header {
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        
        .bridge-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .bridge-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Home Button */
        .home-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(74, 255, 170, 0.2);
            border: 2px solid #4affaa;
            color: white;
            padding: 8px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
        }
        
        .home-btn:active {
            background: #4affaa;
            color: #0a0a1a;
            transform: scale(0.95);
        }
        
        .home-icon {
            font-size: 16px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .location {
            font-size: 14px;
            color: #a0c0ff;
            text-align: right;
        }
        
        .location span {
            color: #4affaa;
            font-weight: 600;
        }
        
        /* Window Frame */
        .window-frame {
            background: #1a2a3a;
            border-radius: 60px 20px 60px 20px;
            padding: 15px;
            margin-bottom: 30px;
            border: 3px solid #4a8a9a;
            box-shadow: 0 0 40px #2a5a6a80;
        }
        
        .window-view {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        .planet-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) saturate(1.2);
            animation: slow-rotate 60s linear infinite;
        }
        
        @keyframes slow-rotate {
            from { transform: scale(1.2) rotate(0deg); }
            to { transform: scale(1.2) rotate(360deg); }
        }
        
        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 26, 42, 0.4) 100%);
            pointer-events: none;
        }
        
        .window-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #ffffff;
            font-size: 20px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 15px #000, 0 0 30px #4a8a9a;
            background: rgba(0,0,0,0.3);
            padding: 5px 20px;
            border-radius: 40px 5px 40px 5px;
            backdrop-filter: blur(5px);
            border: 1px solid #8ac0d0;
            font-weight: 500;
        }
        
        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .action-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .action-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.97);
            border-color: #8ac0ff;
        }
        
        .action-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 10px #6a8ac0);
        }
        
        .action-label {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .action-desc {
            color: #a0c0ff;
            font-size: 11px;
            text-align: center;
        }
        
        /* Ship Status Card */
        .status-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .status-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: 'Exo 2', sans-serif;
            border-bottom: 1px solid #6a8ac0;
            padding-bottom: 8px;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            color: #a0c0ff;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .status-value {
            color: #ffd966;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .status-unit {
            color: #6a8ac0;
            font-size: 10px;
            margin-left: 2px;
        }
        
        /* Progress bars */
        .progress-container {
            margin: 15px 0 5px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            color: #a0c0ff;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            transition: width 0.3s;
        }
        
        .progress-fill.fuel {
            background: linear-gradient(90deg, #4affaa, #6affcc);
        }
        
        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .quick-btn {
            flex: 1;
            background: rgba(74, 138, 192, 0.2);
            border: 1px solid #6a8ac0;
            color: white;
            padding: 10px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        
        .quick-btn:active {
            background: #6a8ac0;
            transform: scale(0.96);
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="bridge-view" id="bridgeView">
            <!-- Header with Home Button -->
            <div class="bridge-header">
                <div class="bridge-title">Ship Bridge</div>
                <div class="bridge-subtitle">✦ command center ✦</div>
                <button class="home-btn" onclick="warpHome()">
                    <span class="home-icon">🏠</span>
                    <span>HOME</span>
                </button>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="location" id="locationDisplay">
                    <span id="currentPlanet">Loading...</span>
                </div>
            </div>
            
            <!-- Window with Planet View -->
            <div class="window-frame">
                <div class="window-view">
                    <img src="assets/images/earth-view.jpg" class="planet-image" id="planetImage" alt="Planet view" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
                    <div class="window-overlay"></div>
                    <div class="window-label" id="planetLabel">Loading...</div>
                </div>
            </div>
            
            <!-- Action Grid - UPDATED: Ship Status changed to Journal -->
            <div class="action-grid">
                <div class="action-card" onclick="goToSurface()">
                    <div class="action-icon">🪐</div>
                    <div class="action-label">SURFACE</div>
                    <div class="action-desc">Extract resources</div>
                </div>
                <div class="action-card" onclick="goToCargo()">
                    <div class="action-icon">📦</div>
                    <div class="action-label">CARGO</div>
                    <div class="action-desc">Manage inventory</div>
                </div>
                <div class="action-card" onclick="goToGalaxyMap()">
                    <div class="action-icon">🌌</div>
                    <div class="action-label">GALAXY MAP</div>
                    <div class="action-desc">Plot long courses</div>
                </div>
                <div class="action-card" onclick="goToJournal()">
                    <div class="action-icon">📖</div>
                    <div class="action-label">JOURNAL</div>
                    <div class="action-desc">Discovered elements</div>
                </div>
            </div>
            
            <!-- Ship Status Card -->
            <div class="status-card">
                <div class="status-title">⚡ Ship Systems</div>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">FUEL</div>
                        <div class="status-value" id="fuelValue">--</div>
                        <span class="status-unit">%</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">POWER</div>
                        <div class="status-value" id="powerValue">--</div>
                        <span class="status-unit">%</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">CARGO</div>
                        <div class="status-value" id="cargoValue">--</div>
                        <span class="status-unit">AMU</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">LIMIT</div>
                        <div class="status-value" id="cargoLimit">1000</div>
                        <span class="status-unit">AMU</span>
                    </div>
                </div>
                
                <!-- Fuel Progress Bar -->
                <div class="progress-container">
                    <div class="progress-header">
                        <span>Fuel</span>
                        <span id="fuelPercent">--%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fuel" id="fuelBar" style="width: 0%"></div>
                    </div>
                </div>
                
                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickRefuel()">⛽ REFUEL</button>
                    <button class="quick-btn" onclick="quickRepair()">🔧 REPAIR</button>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">loading...</div>
            </div>
            
            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }

        // ===== CONSTANTS =====
        const CARGO_MASS_LIMIT = 1000;

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // ===== LOAD SHIP DATA =====
        async function loadShipData() {
            try {
                // Get credits
                let credits = 5000;
                if (typeof window.getCredits === 'function') {
                    credits = await window.getCredits();
                } else {
                    credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                }
                document.getElementById('creditsDisplay').innerHTML = `<span>⭐</span> ${credits.toLocaleString()}`;
                
                // Get ship fuel
                let fuel = 100;
                if (typeof window.getShipFuel === 'function') {
                    fuel = window.getShipFuel();
                } else {
                    fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
                }
                document.getElementById('fuelValue').textContent = fuel;
                document.getElementById('fuelPercent').textContent = fuel + '%';
                document.getElementById('fuelBar').style.width = fuel + '%';
                
                // Get ship power
                let power = 100;
                if (typeof window.getShipPower === 'function') {
                    power = window.getShipPower();
                } else {
                    power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 100;
                }
                document.getElementById('powerValue').textContent = power;
                
                // Get cargo mass
                let cargoMass = 0;
                if (typeof window.getTotalCargoMass === 'function') {
                    cargoMass = await window.getTotalCargoMass();
                } else {
                    // Calculate from localStorage
                    const collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
                    for (const [name, data] of Object.entries(collection)) {
                        const count = data.count || 1;
                        const mass = getElementMass(name);
                        cargoMass += count * mass;
                    }
                }
                document.getElementById('cargoValue').textContent = cargoMass.toFixed(1);
                document.getElementById('cargoLimit').textContent = CARGO_MASS_LIMIT;
                
            } catch (error) {
                console.error('Error loading ship data:', error);
            }
        }

        // ===== GET ELEMENT MASS (fallback) =====
        function getElementMass(elementName) {
            const masses = {
                'Gold': 197.0, 'Silver': 107.9, 'Platinum': 195.1, 'Uranium': 238.0,
                'Promethium': 145.0, 'Iron': 55.85, 'Carbon': 12.01, 'Oxygen': 16.00,
                'Hydrogen': 1.008, 'Helium': 4.003, 'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        // ===== LOAD CURRENT LOCATION =====
        function loadCurrentLocation() {
            // Get current planet - if none exists, set Earth as default
            let planet = localStorage.getItem('voidfarer_current_planet');
            let planetType = localStorage.getItem('voidfarer_current_planet_type');
            let planetImage = localStorage.getItem('voidfarer_current_planet_image');
            
            if (!planet) {
                console.log('No planet data found, initializing with Earth');
                planet = 'Earth';
                planetType = 'lush';
                planetImage = 'earth-view.jpg';
                
                // Save default planet data
                localStorage.setItem('voidfarer_current_planet', planet);
                localStorage.setItem('voidfarer_current_planet_type', planetType);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                localStorage.setItem('voidfarer_current_planet_image', planetImage);
                
                // Also set location data
                localStorage.setItem('voidfarer_current_sector', 'B2');
                localStorage.setItem('voidfarer_current_region', 'Orion Arm');
                localStorage.setItem('voidfarer_current_starSector', 'Orion Molecular Cloud');
                localStorage.setItem('voidfarer_current_star', 'Sol');
            }
            
            // Update display
            document.getElementById('currentPlanet').textContent = planet;
            document.getElementById('planetLabel').textContent = planet + ' • ' + planetType;
            
            // Update image
            const imgElement = document.getElementById('planetImage');
            imgElement.src = 'assets/images/' + planetImage;
            imgElement.onerror = function() {
                this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
            };
            
            console.log('Current planet loaded:', planet);
        }

        // ===== GO TO SURFACE (with guaranteed planet data) =====
        function goToSurface() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Ensure planet data exists before navigating
            let currentPlanet = localStorage.getItem('voidfarer_current_planet');
            let currentPlanetType = localStorage.getItem('voidfarer_current_planet_type');
            let currentPlanetResources = localStorage.getItem('voidfarer_current_planet_resources');
            
            // If any planet data is missing, set Earth as default
            if (!currentPlanet || !currentPlanetType || !currentPlanetResources) {
                console.log('Missing planet data, setting default Earth before navigation');
                
                localStorage.setItem('voidfarer_current_planet', 'Earth');
                localStorage.setItem('voidfarer_current_planet_type', 'lush');
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                localStorage.setItem('voidfarer_current_planet_image', 'earth-view.jpg');
                
                // Also ensure location data exists
                if (!localStorage.getItem('voidfarer_current_sector')) {
                    localStorage.setItem('voidfarer_current_sector', 'B2');
                    localStorage.setItem('voidfarer_current_region', 'Orion Arm');
                    localStorage.setItem('voidfarer_current_starSector', 'Orion Molecular Cloud');
                    localStorage.setItem('voidfarer_current_star', 'Sol');
                }
            }
            
            // Double-check data was saved
            console.log('Navigating to surface with planet:', localStorage.getItem('voidfarer_current_planet'));
            console.log('Planet type:', localStorage.getItem('voidfarer_current_planet_type'));
            console.log('Resources:', localStorage.getItem('voidfarer_current_planet_resources'));
            
            window.location.href = 'surface.html';
        }

        // ===== WARP HOME (now goes to Earth Hub) =====
        async function warpHome() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'calculating route home...';
            
            try {
                // Get current location
                const currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                const currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                const currentStarSector = localStorage.getItem('voidfarer_current_starSector') || 'Orion Molecular Cloud';
                const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
                const currentPlanet = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                
                // Calculate distance to Earth (simplified for demo)
                let totalDistance = 0;
                
                if (currentSector !== 'B2') {
                    totalDistance += 4.6; // Sector distance
                }
                if (currentStarSector !== 'Orion Molecular Cloud') {
                    totalDistance += 2.3; // Star sector distance
                }
                if (currentStar !== 'Sol') {
                    totalDistance += 1.5; // Star distance
                }
                if (currentPlanet !== 'Earth') {
                    totalDistance += 0.8 + 0.5; // Planet distance + descent
                }
                
                if (totalDistance === 0) totalDistance = 0.5; // Already at Earth
                
                const warpCycles = Math.min(5, Math.ceil(totalDistance / 1.5));
                const fuelCost = Math.floor(totalDistance * 4) + 5;
                
                // Prepare warp data for home - NOW GOES TO EARTH HUB
                const warpData = {
                    destination: 'Earth',
                    destinationType: 'lush planet',
                    startLocation: currentPlanet,
                    startLocationType: 'planet',
                    totalDistance: totalDistance,
                    warpCycles: warpCycles,
                    fuelCost: fuelCost,
                    returnPage: 'earth-hub.html',
                    
                    // Store home destination
                    destSector: 'B2',
                    destRegion: 'Orion Arm',
                    destStarSector: 'Orion Molecular Cloud',
                    destStar: 'Sol',
                    destPlanet: 'Earth',
                    destPlanetType: 'lush'
                };
                
                // Save and go to warp
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error warping home:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to calculate route home');
            }
        }

        // ===== NAVIGATION FUNCTIONS =====
        function goToCargo() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'cargo.html';
        }

        function goToGalaxyMap() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'galaxy-map.html';
        }

        // NEW: Go to Journal (replaces Ship Status)
        function goToJournal() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'journal.html';
        }

        // ===== QUICK ACTIONS =====
        function quickRefuel() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Get current fuel
            let fuel = 100;
            if (typeof window.getShipFuel === 'function') {
                fuel = window.getShipFuel();
            } else {
                fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
            }
            
            if (fuel >= 100) {
                alert('Fuel tank already full!');
                return;
            }
            
            // Check credits
            let credits = 5000;
            if (typeof window.getCredits === 'function') {
                credits = window.getCredits();
            }
            
            if (credits < 50) {
                alert('Not enough credits! Need 50⭐');
                return;
            }
            
            // Spend credits
            if (typeof window.spendCredits === 'function') {
                window.spendCredits(50);
            } else {
                localStorage.setItem('voidfarer_credits', (credits - 50).toString());
            }
            
            // Refuel
            if (typeof window.refuelShip === 'function') {
                window.refuelShip(100 - fuel);
            } else {
                localStorage.setItem('voidfarer_ship_fuel', '100');
            }
            
            // Reload display
            loadShipData();
            
            alert('Ship refueled! (50⭐)');
        }

        function quickRepair() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Get current power
            let power = 100;
            if (typeof window.getShipPower === 'function') {
                power = window.getShipPower();
            } else {
                power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 100;
            }
            
            if (power >= 100) {
                alert('Ship already at full power!');
                return;
            }
            
            // Check credits
            let credits = 5000;
            if (typeof window.getCredits === 'function') {
                credits = window.getCredits();
            }
            
            if (credits < 100) {
                alert('Not enough credits! Need 100⭐');
                return;
            }
            
            // Spend credits
            if (typeof window.spendCredits === 'function') {
                window.spendCredits(100);
            } else {
                localStorage.setItem('voidfarer_credits', (credits - 100).toString());
            }
            
            // Repair
            if (typeof window.repairShip === 'function') {
                window.repairShip(100 - power);
            } else {
                localStorage.setItem('voidfarer_ship_power', '100');
            }
            
            // Reload display
            loadShipData();
            
            alert('Ship repaired! (100⭐)');
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading bridge...';
                
                // Load all data
                await loadShipData();
                loadCurrentLocation();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading bridge';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>

</body>
