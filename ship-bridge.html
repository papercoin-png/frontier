<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOIDFARER | Ship Bridge</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #030514;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #030514;
        }
        
        .bridge-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #030514;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Ambient background glow */
        .bridge-view::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(200, 100, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(30px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s ease;
            flex-direction: column;
            gap: 30px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Header */
        .bridge-header {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            z-index: 10;
        }
        
        .bridge-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0ff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        
        .bridge-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Home Button */
        .home-btn {
            position: absolute;
            top: 10px;
            right: 0;
            background: rgba(20, 20, 25, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
            letter-spacing: 0.5px;
        }
        
        .home-btn:hover {
            background: rgba(40, 40, 50, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .home-btn:active {
            transform: scale(0.96);
        }
        
        .home-icon {
            font-size: 14px;
            opacity: 0.7;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(10, 10, 12, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            position: relative;
            z-index: 10;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .credits span {
            color: #ffffff;
            font-size: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }
        
        .location {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            letter-spacing: 0.5px;
        }
        
        .location span {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }
        
        /* Window Frame */
        .window-frame {
            background: rgba(10, 10, 12, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }
        
        .window-view {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: 24px;
            overflow: hidden;
            background: #030514;
        }
        
        .planet-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8) saturate(1.2) contrast(1.1);
            animation: slow-rotate 90s linear infinite;
        }
        
        @keyframes slow-rotate {
            from { transform: scale(1.2) rotate(0deg); }
            to { transform: scale(1.2) rotate(360deg); }
        }
        
        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(3, 5, 20, 0.6) 100%);
            pointer-events: none;
        }
        
        .window-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #ffffff;
            font-size: 18px;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
            z-index: 10;
        }
        
        .action-card {
            background: rgba(10, 10, 12, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .action-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.02), 
                transparent
            );
            transition: left 0.5s ease;
        }
        
        .action-card:hover::before {
            left: 100%;
        }
        
        .action-card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(15, 15, 18, 0.4);
        }
        
        .action-card:active {
            transform: scale(0.97);
        }
        
        .action-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            opacity: 0.9;
        }
        
        .action-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        
        .action-desc {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        
        /* Ship Status Card */
        .status-card {
            background: rgba(10, 10, 12, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }
        
        .status-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .status-value {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        
        .status-unit {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            margin-left: 2px;
        }
        
        /* Progress bars */
        .progress-container {
            margin: 16px 0 8px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.5));
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .progress-fill.fuel {
            background: linear-gradient(90deg, #ffffff, #a0a0ff);
        }
        
        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .quick-btn {
            flex: 1;
            background: rgba(20, 20, 25, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            padding: 12px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        
        .quick-btn:hover {
            background: rgba(30, 30, 35, 0.4);
            border-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }
        
        .quick-btn:active {
            transform: scale(0.96);
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            z-index: 1001;
            display: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="bridge-view" id="bridgeView">
            <!-- Header with Home Button -->
            <div class="bridge-header">
                <div class="bridge-title">BRIDGE</div>
                <div class="bridge-subtitle">✦ COMMAND CENTER ✦</div>
                <button class="home-btn" onclick="window.warpHome()">
                    <span class="home-icon">🏠</span>
                    <span>RETURN HOME</span>
                </button>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⏣</span> --
                </div>
                <div class="location" id="locationDisplay">
                    <span id="currentPlanet">Loading...</span>
                </div>
            </div>
            
            <!-- Window with Planet View -->
            <div class="window-frame">
                <div class="window-view">
                    <img src="assets/images/earth-view.jpg" class="planet-image" id="planetImage" alt="Planet view" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
                    <div class="window-overlay"></div>
                    <div class="window-label" id="planetLabel">Loading...</div>
                </div>
            </div>
            
            <!-- Action Grid -->
            <div class="action-grid">
                <div class="action-card" onclick="window.goToSurface()">
                    <div class="action-icon">🪐</div>
                    <div class="action-label">SURFACE</div>
                    <div class="action-desc">Extract resources</div>
                </div>
                <div class="action-card" onclick="window.goToCargo()">
                    <div class="action-icon">📦</div>
                    <div class="action-label">CARGO</div>
                    <div class="action-desc">Manage inventory</div>
                </div>
                <div class="action-card" onclick="window.goToGalaxyMap()">
                    <div class="action-icon">🌌</div>
                    <div class="action-label">GALAXY MAP</div>
                    <div class="action-desc">Plot long courses</div>
                </div>
                <div class="action-card" onclick="window.goToJournal()">
                    <div class="action-icon">📖</div>
                    <div class="action-label">JOURNAL</div>
                    <div class="action-desc">Discovered elements</div>
                </div>
            </div>
            
            <!-- Ship Status Card -->
            <div class="status-card">
                <div class="status-title">SYSTEM STATUS</div>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">FUEL</div>
                        <div class="status-value" id="fuelValue">--</div>
                        <span class="status-unit">%</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">POWER</div>
                        <div class="status-value" id="powerValue">--</div>
                        <span class="status-unit">%</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">CARGO</div>
                        <div class="status-value" id="cargoValue">--</div>
                        <span class="status-unit">AMU</span>
                    </div>
                    <div class="status-item">
                        <div class="status-label">LIMIT</div>
                        <div class="status-value" id="cargoLimit">1000</div>
                        <span class="status-unit">AMU</span>
                    </div>
                </div>
                
                <!-- Fuel Progress Bar -->
                <div class="progress-container">
                    <div class="progress-header">
                        <span>FUEL RESERVES</span>
                        <span id="fuelPercent">--%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fuel" id="fuelBar" style="width: 0%"></div>
                    </div>
                </div>
                
                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-btn" onclick="window.quickRefuel()">REFUEL</button>
                    <button class="quick-btn" onclick="window.quickRepair()">REPAIR</button>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">LOADING</div>
            </div>
            
            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- CRITICAL FIX: Added type="module" to all script tags -->
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/migration.js"></script>

    <script type="module">
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== CONSTANTS =====
        const CARGO_MASS_LIMIT = 1000;

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.goToSurface = goToSurface;
        window.goToCargo = goToCargo;
        window.goToGalaxyMap = goToGalaxyMap;
        window.goToJournal = goToJournal;
        window.warpHome = warpHome;
        window.quickRefuel = quickRefuel;
        window.quickRepair = quickRepair;

        // ===== LOAD SHIP DATA =====
        async function loadShipData() {
            try {
                // Get credits
                let credits = 5000;
                if (typeof window.getCredits === 'function') {
                    credits = await window.getCredits();
                } else {
                    credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                }
                document.getElementById('creditsDisplay').innerHTML = `<span>⏣</span> ${credits.toLocaleString()}`;
                
                // Get ship fuel
                let fuel = 100;
                if (typeof window.getShipFuel === 'function') {
                    fuel = window.getShipFuel();
                } else {
                    fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
                }
                document.getElementById('fuelValue').textContent = fuel;
                document.getElementById('fuelPercent').textContent = fuel + '%';
                document.getElementById('fuelBar').style.width = fuel + '%';
                
                // Get ship power
                let power = 100;
                if (typeof window.getShipPower === 'function') {
                    power = window.getShipPower();
                } else {
                    power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 100;
                }
                document.getElementById('powerValue').textContent = power;
                
                // Get cargo mass
                let cargoMass = 0;
                if (typeof window.getTotalCargoMass === 'function') {
                    cargoMass = await window.getTotalCargoMass();
                } else {
                    const collection = JSON.parse(localStorage.getItem('voidfarer_collection') || '{}');
                    for (const [name, data] of Object.entries(collection)) {
                        const count = data.count || 1;
                        const mass = getElementMass(name);
                        cargoMass += count * mass;
                    }
                }
                document.getElementById('cargoValue').textContent = cargoMass.toFixed(1);
                document.getElementById('cargoLimit').textContent = CARGO_MASS_LIMIT;
                
            } catch (error) {
                console.error('Error loading ship data:', error);
            }
        }

        // ===== GET ELEMENT MASS (fallback) =====
        function getElementMass(elementName) {
            const masses = {
                'Gold': 197.0, 'Silver': 107.9, 'Platinum': 195.1, 'Uranium': 238.0,
                'Promethium': 145.0, 'Iron': 55.85, 'Carbon': 12.01, 'Oxygen': 16.00,
                'Hydrogen': 1.008, 'Helium': 4.003, 'default': 100.0
            };
            return masses[elementName] || masses.default;
        }

        // ===== LOAD CURRENT LOCATION =====
        function loadCurrentLocation() {
            let planet = localStorage.getItem('voidfarer_current_planet');
            let planetType = localStorage.getItem('voidfarer_current_planet_type');
            let planetImage = localStorage.getItem('voidfarer_current_planet_image');
            
            if (!planet) {
                planet = 'Earth';
                planetType = 'lush';
                planetImage = 'earth-view.jpg';
                
                localStorage.setItem('voidfarer_current_planet', planet);
                localStorage.setItem('voidfarer_current_planet_type', planetType);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                localStorage.setItem('voidfarer_current_planet_image', planetImage);
                
                localStorage.setItem('voidfarer_current_sector', 'B2');
                localStorage.setItem('voidfarer_current_region', 'Orion Arm');
                localStorage.setItem('voidfarer_current_starSector', 'Orion Molecular Cloud');
                localStorage.setItem('voidfarer_current_star', 'Sol');
            }
            
            document.getElementById('currentPlanet').textContent = planet;
            document.getElementById('planetLabel').textContent = planet;
            
            const imgElement = document.getElementById('planetImage');
            imgElement.src = 'assets/images/' + planetImage;
            imgElement.onerror = function() {
                this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
            };
        }

        // ===== GO TO SURFACE =====
        function goToSurface() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            let currentPlanet = localStorage.getItem('voidfarer_current_planet');
            let currentPlanetType = localStorage.getItem('voidfarer_current_planet_type');
            let currentPlanetResources = localStorage.getItem('voidfarer_current_planet_resources');
            
            if (!currentPlanet || !currentPlanetType || !currentPlanetResources) {
                localStorage.setItem('voidfarer_current_planet', 'Earth');
                localStorage.setItem('voidfarer_current_planet_type', 'lush');
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(['Iron', 'Carbon', 'Silicon', 'Oxygen']));
                localStorage.setItem('voidfarer_current_planet_image', 'earth-view.jpg');
                
                if (!localStorage.getItem('voidfarer_current_sector')) {
                    localStorage.setItem('voidfarer_current_sector', 'B2');
                    localStorage.setItem('voidfarer_current_region', 'Orion Arm');
                    localStorage.setItem('voidfarer_current_starSector', 'Orion Molecular Cloud');
                    localStorage.setItem('voidfarer_current_star', 'Sol');
                }
            }
            
            window.location.href = 'surface.html';
        }

        // ===== WARP HOME =====
        async function warpHome() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'CALCULATING ROUTE';
            
            try {
                const currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                const currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                const currentStarSector = localStorage.getItem('voidfarer_current_starSector') || 'Orion Molecular Cloud';
                const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
                const currentPlanet = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                
                let totalDistance = 0;
                
                if (currentSector !== 'B2') totalDistance += 4.6;
                if (currentStarSector !== 'Orion Molecular Cloud') totalDistance += 2.3;
                if (currentStar !== 'Sol') totalDistance += 1.5;
                if (currentPlanet !== 'Earth') totalDistance += 1.3;
                
                if (totalDistance === 0) totalDistance = 0.5;
                
                const warpCycles = Math.min(5, Math.ceil(totalDistance / 1.5));
                const fuelCost = Math.floor(totalDistance * 4) + 5;
                
                const warpData = {
                    destination: 'Earth',
                    destinationType: 'lush planet',
                    startLocation: currentPlanet,
                    startLocationType: 'planet',
                    totalDistance: totalDistance,
                    warpCycles: warpCycles,
                    fuelCost: fuelCost,
                    returnPage: 'ship-bridge.html',
                    
                    destSector: 'B2',
                    destRegion: 'Orion Arm',
                    destStarSector: 'Orion Molecular Cloud',
                    destStar: 'Sol',
                    destPlanet: 'Earth',
                    destPlanetType: 'lush'
                };
                
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error warping home:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to calculate route home');
            }
        }

        // ===== NAVIGATION FUNCTIONS =====
        function goToCargo() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'cargo.html';
        }

        function goToGalaxyMap() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'galaxy-map.html';
        }

        function goToJournal() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'journal.html';
        }

        // ===== QUICK ACTIONS =====
        function quickRefuel() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            let fuel = 100;
            if (typeof window.getShipFuel === 'function') {
                fuel = window.getShipFuel();
            } else {
                fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
            }
            
            if (fuel >= 100) {
                alert('Fuel tank already full');
                return;
            }
            
            let credits = 5000;
            if (typeof window.getCredits === 'function') {
                credits = window.getCredits();
            }
            
            if (credits < 50) {
                alert('Insufficient credits - need 50⏣');
                return;
            }
            
            if (typeof window.spendCredits === 'function') {
                window.spendCredits(50);
            } else {
                localStorage.setItem('voidfarer_credits', (credits - 50).toString());
            }
            
            if (typeof window.refuelShip === 'function') {
                window.refuelShip(100 - fuel);
            } else {
                localStorage.setItem('voidfarer_ship_fuel', '100');
            }
            
            loadShipData();
            alert('Ship refueled (50⏣)');
        }

        function quickRepair() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            let power = 100;
            if (typeof window.getShipPower === 'function') {
                power = window.getShipPower();
            } else {
                power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 100;
            }
            
            if (power >= 100) {
                alert('Ship at full power');
                return;
            }
            
            let credits = 5000;
            if (typeof window.getCredits === 'function') {
                credits = window.getCredits();
            }
            
            if (credits < 100) {
                alert('Insufficient credits - need 100⏣');
                return;
            }
            
            if (typeof window.spendCredits === 'function') {
                window.spendCredits(100);
            } else {
                localStorage.setItem('voidfarer_credits', (credits - 100).toString());
            }
            
            if (typeof window.repairShip === 'function') {
                window.repairShip(100 - power);
            } else {
                localStorage.setItem('voidfarer_ship_power', '100');
            }
            
            loadShipData();
            alert('Ship repaired (100⏣)');
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'LOADING';
                
                await loadShipData();
                loadCurrentLocation();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'ERROR';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
