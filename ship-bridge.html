<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Ship Bridge</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/voidfarer.css">
    
    <style>
        /* Screen-specific styles */
        .bridge-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Header */
        .bridge-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bridge-title {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0;
            letter-spacing: 1px;
        }
        
        .ship-status {
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(30, 50, 80, 0.5);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #6a8ac0;
        }
        
        /* Window View */
        .window-container {
            background: #0a1a2a;
            border-radius: 60px 20px 60px 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #6a8ac0;
            box-shadow: 0 0 30px #3a5a8a80;
            position: relative;
            overflow: hidden;
        }
        
        .window-view {
            position: relative;
            width: 100%;
            height: 160px;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        .planet-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) saturate(1.2);
            border-radius: 40px 10px 40px 10px;
        }
        
        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 26, 42, 0.3) 100%);
            pointer-events: none;
        }
        
        .window-label {
            position: absolute;
            bottom: 10px;
            left: 20px;
            color: #ffffff;
            font-size: 18px;
            font-family: 'WindSong', cursive;
            text-shadow: 0 0 15px #000;
            background: rgba(0,0,0,0.3);
            padding: 4px 16px;
            border-radius: 30px 5px 30px 5px;
            backdrop-filter: blur(5px);
        }
        
        /* Active Mission Card */
        .mission-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px #2a4a7a;
        }
        
        .mission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .mission-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .mission-planet {
            color: #a0c0ff;
            font-size: 16px;
            font-family: 'WindSong', cursive;
        }
        
        .mission-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .item-icon {
            font-size: 20px;
            min-width: 30px;
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6a8ac0, #aac8ff);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .item-count {
            color: #a0c0ff;
            font-size: 14px;
            min-width: 50px;
            text-align: right;
        }
        
        /* Button Grid - 4x2 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .nav-button {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 25px 8px 25px 8px;
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffffff;
        }
        
        .nav-button:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.97);
            border-color: #aac8ff;
        }
        
        .button-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #6a8ac0);
        }
        
        .button-label {
            font-size: 11px;
            font-weight: 500;
            color: #c0d0ff;
            text-align: center;
        }
        
        /* Stats Footer */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            color: #a0b0c0;
            font-size: 13px;
            padding: 10px 5px;
            border-top: 1px solid #3a5a7a;
            margin-bottom: 15px;
        }
        
        .collection-stat {
            color: #ffffff;
            font-weight: 600;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 10px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.98);
        }
        
        /* Element colors */
        .icon-gold { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .icon-uranium { color: #7ac0b0; text-shadow: 0 0 10px #7ac0b0; }
        .icon-promethium { color: #ff9e5e; text-shadow: 0 0 10px #ff9e5e; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="bridge-view" id="bridgeView">
            <!-- Header -->
            <div class="bridge-header">
                <div class="bridge-title">Bridge</div>
                <div class="ship-status" id="shipPower">⚡ 87%</div>
            </div>
            
            <!-- Window View -->
            <div class="window-container">
                <div class="window-view">
                    <img src="assets/images/planet-verdant.jpg" class="planet-view" id="currentPlanetImage" alt="Current planet" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
                    <div class="window-overlay"></div>
                    <div class="window-label" id="currentPlanetName">Verdant Prime</div>
                </div>
            </div>
            
            <!-- Active Mission Card -->
            <div class="mission-card">
                <div class="mission-header">
                    <span class="mission-title">Active Mission</span>
                    <span class="mission-planet" id="missionPlanet">Pyros</span>
                </div>
                <div class="mission-list" id="missionList">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <!-- Main Button Grid (8 buttons) - ALL CONNECTIONS VERIFIED -->
            <div class="button-grid">
                <!-- Button 1: Journal -->
                <div class="nav-button" onclick="openJournal()">
                    <span class="button-icon">📚</span>
                    <span class="button-label">Journal</span>
                </div>
                
                <!-- Button 2: Nebulae Map (was Galaxy) -->
                <div class="nav-button" onclick="openNebulaeMap()">
                    <span class="button-icon">🌌</span>
                    <span class="button-label">Nebulae</span>
                </div>
                
                <!-- Button 3: System View -->
                <div class="nav-button" onclick="openSystemView()">
                    <span class="button-icon">🪐</span>
                    <span class="button-label">System</span>
                </div>
                
                <!-- Button 4: Surface -->
                <div class="nav-button" onclick="goToSurface()">
                    <span class="button-icon">🚀</span>
                    <span class="button-label">Surface</span>
                </div>
                
                <!-- Button 5: Earth -->
                <div class="nav-button" onclick="returnToEarth()">
                    <span class="button-icon">🌍</span>
                    <span class="button-label">Earth</span>
                </div>
                
                <!-- Button 6: Rest -->
                <div class="nav-button" onclick="rest()">
                    <span class="button-icon">🛏️</span>
                    <span class="button-label">Rest</span>
                </div>
                
                <!-- Button 7: Settings -->
                <div class="nav-button" onclick="openSettings()">
                    <span class="button-icon">⚙️</span>
                    <span class="button-label">Settings</span>
                </div>
                
                <!-- Button 8: Status -->
                <div class="nav-button" onclick="openShipStatus()">
                    <span class="button-icon">📊</span>
                    <span class="button-label">Status</span>
                </div>
            </div>
            
            <!-- Stats Footer -->
            <div class="stats-footer">
                <span>Elements found</span>
                <span class="collection-stat" id="collectionCount">0 / 118</span>
            </div>
            
            <!-- Back button to Earth Hub -->
            <button class="back-button" onclick="returnToEarthHub()">← EARTH HUB</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-text">warping...</div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/voidfarer.js"></script>
    <script src="js/missions.js"></script>
    
    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Load current planet
        function loadCurrentPlanet() {
            const planet = getCurrentPlanet();
            document.getElementById('currentPlanetName').textContent = planet;
            
            // Update planet image based on name
            const planetImage = document.getElementById('currentPlanetImage');
            const planetName = planet.toLowerCase();
            
            if (planetName.includes('verdant')) {
                planetImage.src = 'assets/images/planet-verdant.jpg';
            } else if (planetName.includes('pyros')) {
                planetImage.src = 'assets/images/planet-pyros.jpg';
            } else if (planetName.includes('glacier')) {
                planetImage.src = 'assets/images/planet-glacier.jpg';
            } else if (planetName.includes('aether')) {
                planetImage.src = 'assets/images/planet-aether.jpg';
            } else {
                planetImage.src = 'assets/images/planet-verdant.jpg';
            }
            
            // Fallback to postimage if local images don't exist
            planetImage.onerror = function() {
                this.src = 'https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg';
            };
        }
        
        // Load missions
        function loadMissions() {
            const missions = getMissions();
            
            if (missions.length === 0) {
                document.getElementById('missionList').innerHTML = '<div style="color:#a0c0ff; text-align:center; padding:20px;">No active missions</div>';
                document.getElementById('missionPlanet').textContent = 'None';
                return;
            }
            
            // Update mission planet display
            document.getElementById('missionPlanet').textContent = missions[0].planet;
            
            const missionList = document.getElementById('missionList');
            missionList.innerHTML = '';
            
            missions.slice(0, 3).forEach(mission => {
                const percent = (mission.current / mission.target) * 100;
                let icon = '🟡';
                let iconClass = 'icon-gold';
                
                if (mission.element === 'Uranium') {
                    icon = '🟣';
                    iconClass = 'icon-uranium';
                } else if (mission.element === 'Promethium') {
                    icon = '✨';
                    iconClass = 'icon-promethium';
                } else if (mission.element === 'Carbon') {
                    icon = '⚫';
                } else if (mission.element === 'Iron') {
                    icon = '⚙️';
                } else if (mission.element === 'Silver') {
                    icon = '🔘';
                } else if (mission.element === 'Platinum') {
                    icon = '⬜';
                }
                
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span class="item-icon ${iconClass}">${icon}</span>
                    <div class="item-details">
                        <div class="item-name">${mission.element} (${mission.planet})</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <span class="item-count">${mission.current}/${mission.target}</span>
                `;
                missionList.appendChild(item);
            });
            
            if (missions.length > 3) {
                const more = document.createElement('div');
                more.style.color = '#a0c0ff';
                more.style.textAlign = 'center';
                more.style.padding = '10px';
                more.style.fontSize = '12px';
                more.textContent = `+${missions.length - 3} more missions`;
                missionList.appendChild(more);
            }
        }
        
        // Load collection stats
        function loadCollectionStats() {
            const collection = getCollection();
            const count = Object.keys(collection).length;
            document.getElementById('collectionCount').textContent = `${count} / 118`;
        }
        
        // Load ship power
        function loadShipPower() {
            const power = getShipPower();
            document.getElementById('shipPower').textContent = `⚡ ${power}%`;
        }
        
        // ===== NAVIGATION HANDLERS - ALL 8 BUTTONS VERIFIED =====
        
        // Button 1: Journal
        function openJournal() {
            console.log('Journal button clicked'); // Debug
            hapticLight();
            navigateTo('journal.html');
        }
        
        // Button 2: Nebulae Map (formerly Galaxy)
        function openNebulaeMap() {
            console.log('Nebulae button clicked'); // Debug
            hapticLight();
            navigateTo('nebulae-map.html');
        }
        
        // Button 3: System View
        function openSystemView() {
            console.log('System button clicked'); // Debug
            hapticLight();
            navigateTo('system-view.html', true);
        }
        
        // Button 4: Surface
        function goToSurface() {
            console.log('Surface button clicked'); // Debug
            const planet = getCurrentPlanet();
            
            // Check if planet is gas giant
            if (planet.includes('Aether')) {
                hapticError();
                alert('Cannot land on gas giant Aether. Choose a different planet from System View.');
                return;
            }
            
            hapticMedium();
            navigateTo('surface.html', true);
        }
        
        // Button 5: Earth
        function returnToEarth() {
            console.log('Earth button clicked'); // Debug
            hapticMedium();
            
            if (confirm('Return to Earth? This will end your current expedition.')) {
                setCurrentPlanet('Earth');
                navigateTo('earth-hub.html', true);
            }
        }
        
        // Button 6: Rest
        function rest() {
            console.log('Rest button clicked'); // Debug
            hapticLight();
            
            // Restore ship power
            setShipPower(100);
            document.getElementById('shipPower').textContent = '⚡ 100%';
            
            alert('Crew rested. Ship power restored to 100%.');
        }
        
        // Button 7: Settings
        function openSettings() {
            console.log('Settings button clicked'); // Debug
            hapticLight();
            navigateTo('settings.html');
        }
        
        // Button 8: Status
        function openShipStatus() {
            console.log('Status button clicked'); // Debug
            hapticLight();
            
            const player = getPlayer();
            const collection = getCollection();
            const credits = getCredits();
            const missions = getMissions();
            
            alert(`🚢 SHIP STATUS\n\nCaptain: ${player?.name || 'Voidfarer'}\nShip: ${player?.ship || 'Prospector'}\nCredits: ${credits.toLocaleString()}⭐\nElements: ${Object.keys(collection).length}/118\nActive Missions: ${missions.length}\nShip Power: ${getShipPower()}%\n\nMining Bonus: +50%\nCargo Capacity: 8,200c`);
        }
        
        // Back button to Earth Hub
        function returnToEarthHub() {
            console.log('Earth Hub button clicked'); // Debug
            hapticLight();
            navigateTo('earth-hub.html');
        }
        
        // Initialize
        function init() {
            console.log('Bridge initializing'); // Debug
            // Check if player exists
            if (!checkPlayer()) return;
            
            loadCurrentPlanet();
            loadMissions();
            loadCollectionStats();
            loadShipPower();
            
            // Update missions from collection
            updateAllMissionsFromCollection();
        }
        
        // Run initialization
        init();
    </script>
</body>
</html>
