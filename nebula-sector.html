<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Nebula Sector</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .sector-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 30px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #6a8ac0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .sector-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .sector-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 4px;
        }
        
        .sector-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Location Bar */
        .location-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            font-size: 14px;
        }
        
        .coordinates {
            color: #a0c0ff;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #6a8ac0;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 30% 10% 30% 10%;
            padding: 12px 4px;
            text-align: center;
        }
        
        .stat-value {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            font-family: 'WindSong', cursive;
        }
        
        .stat-label {
            color: #a0c0ff;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Stars Grid */
        .stars-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .star-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .star-card:active {
            background: rgba(60, 90, 140, 0.8);
            transform: scale(0.98);
            border-color: #aac8ff;
        }
        
        .star-card::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(106, 138, 192, 0.2), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .star-icon {
            font-size: 42px;
            min-width: 60px;
            text-align: center;
            filter: drop-shadow(0 0 15px #6a8ac0);
        }
        
        .star-info {
            flex: 1;
        }
        
        .star-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            font-family: 'WindSong', cursive;
        }
        
        .star-details {
            display: flex;
            gap: 15px;
            color: #a0c0ff;
            font-size: 13px;
        }
        
        .star-type-badge {
            background: rgba(106, 138, 192, 0.3);
            border: 1px solid #6a8ac0;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 30px 8px 30px 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* Planet indicator */
        .planet-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4affaa;
            box-shadow: 0 0 10px #4affaa;
            margin-right: 4px;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #6a8ac0;
            font-style: italic;
            font-size: 16px;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 45, 70, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 10px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        /* Star type colors */
        .star-main .star-icon { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .star-red .star-icon { color: #ff6b6b; text-shadow: 0 0 20px #ff6b6b; }
        .star-blue .star-icon { color: #6ba5ff; text-shadow: 0 0 20px #6ba5ff; }
        .star-neutron .star-icon { color: #ffffff; text-shadow: 0 0 20px #ffffff; animation: pulse-neutron 1s infinite; }
        .star-blackhole .star-icon { color: #000000; text-shadow: 0 0 20px #ff4d4d; }
        
        @keyframes pulse-neutron {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.7; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="sector-view" id="sectorView">
            <!-- Header -->
            <div class="sector-header">
                <div class="sector-title" id="sectorTitle">Orion Nebula</div>
                <div class="sector-subtitle" id="sectorSubtitle">✦ star systems ✦</div>
            </div>
            
            <!-- Location Bar -->
            <div class="location-bar">
                <span>📍 <span id="nebulaName">Orion Nebula</span></span>
                <span class="coordinates" id="sectorCoord">Sector B2</span>
            </div>
            
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="starCount">0</div>
                    <div class="stat-label">STARS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="exploredCount">0</div>
                    <div class="stat-label">EXPLORED</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="planetCount">0</div>
                    <div class="stat-label">PLANETS</div>
                </div>
            </div>
            
            <!-- Stars Grid -->
            <div class="stars-grid" id="starsGrid">
                <!-- Stars will be loaded here -->
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="returnToNebulae()">← BACK TO NEBULAE</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">warping to system...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }
        
        // ===== SIMPLE SEEDED RANDOM =====
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index = 0) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
        
        // ===== LOAD DATA FROM STORAGE =====
        function getCurrentSector() {
            return localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        }
        
        function getCurrentNebula() {
            return localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        }
        
        const currentSector = getCurrentSector();
        const nebulaName = getCurrentNebula();
        
        document.getElementById('nebulaName').textContent = nebulaName;
        document.getElementById('sectorTitle').textContent = nebulaName;
        document.getElementById('sectorCoord').textContent = `Sector ${currentSector}`;
        
        // ===== GENERATE STARS =====
        function generateStars() {
            const stars = [];
            const STARS_PER_NEBULA = 50;
            
            // Create seed for this nebula
            const nebulaSeed = UNIVERSE_SEED + 
                              (currentSector.charCodeAt(0) * 10000) + 
                              (parseInt(currentSector[1]) * 1000) +
                              hashString(nebulaName) % 10000;
            
            const starPrefixes = ['Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa',
                                 'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon',
                                 'Phi', 'Chi', 'Psi', 'Omega', 'Alpha', 'Beta', 'Prox', 'Sol', 'Rig', 'Veg'];
            
            const starSuffixes = ['Majoris', 'Minoris', 'Prime', 'Secundus', 'Tertius', 'A', 'B', 'C', 'Alpha', 'Beta',
                                 'Gamma', 'Delta', 'Centauri', 'Orionis', 'Cygnii', 'Andromedae', 'Cassiopeiae'];
            
            let totalPlanets = 0;
            
            for (let i = 0; i < STARS_PER_NEBULA; i++) {
                // Determine star type
                const typeRand = seededRandom(nebulaSeed, i * 10);
                let type = 'main';
                let typeName = 'Main Sequence';
                let icon = '⭐';
                let color = '#ffd700';
                let planetCount = 0;
                
                if (typeRand < 0.6) {
                    type = 'main';
                    typeName = 'Main Sequence';
                    icon = '⭐';
                    color = '#ffd700';
                    planetCount = Math.floor(seededRandom(nebulaSeed, i * 10 + 1) * 6) + 3; // 3-8
                } else if (typeRand < 0.85) {
                    type = 'red';
                    typeName = 'Red Dwarf';
                    icon = '🔴';
                    color = '#ff6b6b';
                    planetCount = Math.floor(seededRandom(nebulaSeed, i * 10 + 2) * 4) + 2; // 2-5
                } else if (typeRand < 0.95) {
                    type = 'blue';
                    typeName = 'Blue Giant';
                    icon = '🔵';
                    color = '#6ba5ff';
                    planetCount = Math.floor(seededRandom(nebulaSeed, i * 10 + 3) * 8) + 5; // 5-12
                } else if (typeRand < 0.98) {
                    type = 'neutron';
                    typeName = 'Neutron Star';
                    icon = '⚪';
                    color = '#ffffff';
                    planetCount = 0;
                } else {
                    type = 'blackhole';
                    typeName = 'Black Hole';
                    icon = '⚫';
                    color = '#000000';
                    planetCount = 0;
                }
                
                totalPlanets += planetCount;
                
                // Generate star name
                const prefixIndex = Math.floor(seededRandom(nebulaSeed, i * 10 + 4) * starPrefixes.length);
                const suffixIndex = Math.floor(seededRandom(nebulaSeed, i * 10 + 5) * starSuffixes.length);
                const name = starPrefixes[prefixIndex] + ' ' + starSuffixes[suffixIndex];
                
                stars.push({
                    index: i,
                    name: name,
                    type: type,
                    typeName: typeName,
                    icon: icon,
                    color: color,
                    planetCount: planetCount
                });
            }
            
            // Update stats
            document.getElementById('starCount').textContent = STARS_PER_NEBULA;
            document.getElementById('planetCount').textContent = totalPlanets;
            document.getElementById('exploredCount').textContent = Math.floor(STARS_PER_NEBULA * 0.3); // 30% explored for demo
            
            return stars;
        }
        
        // Generate stars
        const stars = generateStars();
        
        // ===== RENDER STARS =====
        function renderStars() {
            const starsGrid = document.getElementById('starsGrid');
            starsGrid.innerHTML = '';
            
            stars.forEach(star => {
                const card = document.createElement('div');
                card.className = `star-card star-${star.type}`;
                card.setAttribute('onclick', `selectStar(${star.index})`);
                
                // Create planet indicators
                const planetIndicators = [];
                for (let i = 0; i < Math.min(star.planetCount, 5); i++) {
                    planetIndicators.push('<span class="planet-indicator"></span>');
                }
                if (star.planetCount > 5) {
                    planetIndicators.push('<span style="color:#a0c0ff; font-size:10px;">+' + (star.planetCount - 5) + '</span>');
                }
                
                card.innerHTML = `
                    <div class="star-icon">${star.icon}</div>
                    <div class="star-info">
                        <div class="star-name">${star.name}</div>
                        <div class="star-details">
                            <span>${star.typeName}</span>
                            <span>•</span>
                            <span>${star.planetCount} planets</span>
                        </div>
                        <div style="margin-top: 6px;">
                            ${planetIndicators.join(' ')}
                        </div>
                    </div>
                    <span class="star-type-badge">${star.type}</span>
                `;
                
                starsGrid.appendChild(card);
            });
        }
        
        // ===== STAR SELECTION =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function selectStar(index) {
            const star = stars[index];
            if (!star) return;
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                
                // Save star data
                localStorage.setItem('voidfarer_current_star', star.name);
                localStorage.setItem('voidfarer_current_star_index', star.index);
                localStorage.setItem('voidfarer_current_star_type', star.type);
                
                // Clear any existing planet data
                localStorage.removeItem('voidfarer_current_planet');
                localStorage.removeItem('voidfarer_current_planet_type');
                localStorage.removeItem('voidfarer_current_planet_resources');
                
                // Navigate to system view
                window.location.href = 'system-view.html';
            }, 1000);
        }
        
        // ===== NAVIGATION =====
        function returnToNebulae() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'nebulae-map.html';
        }
        
        // ===== INITIALIZE =====
        function init() {
            // Check if player exists
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            renderStars();
        }
        
        init();
    </script>
</body>
</html>
