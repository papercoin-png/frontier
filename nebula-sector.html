<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidfarer - Nebula Sector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0a0a1a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .phone-frame {
            max-width: 390px;
            margin: 0 auto;
            background: #0a1a2a;
            border-radius: 40px;
            padding: 20px;
            min-height: 800px;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            color: #8a6aff;
        }
        .star-card {
            background: #1a2a3a;
            border: 2px solid #8a6aff;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
        }
        .star-card:active {
            background: #2a3a4a;
        }
        .back-btn {
            background: #1a2a3a;
            border: 2px solid #8a6aff;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <h1 id="title">Loading...</h1>
        <div id="stars"></div>
        <div class="back-btn" onclick="goBack()">← BACK TO NEBULAE</div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Get data from localStorage
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        const nebulaName = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        
        document.getElementById('title').textContent = nebulaName;

        // Generate 10 stars (simplified)
        const stars = [
            { name: 'Algol Prime', type: 'Main Sequence', planets: 5 },
            { name: 'Betelgeuse', type: 'Red Giant', planets: 3 },
            { name: 'Rigel', type: 'Blue Giant', planets: 7 },
            { name: 'Sirius A', type: 'Main Sequence', planets: 4 },
            { name: 'Proxima', type: 'Red Dwarf', planets: 2 },
            { name: 'Vega', type: 'Main Sequence', planets: 6 },
            { name: 'Altair', type: 'Main Sequence', planets: 4 },
            { name: 'Deneb', type: 'Blue Giant', planets: 8 },
            { name: 'Antares', type: 'Red Giant', planets: 3 },
            { name: 'Pollux', type: 'Orange Giant', planets: 5 }
        ];

        // Display stars
        const starsDiv = document.getElementById('stars');
        stars.forEach((star, index) => {
            const card = document.createElement('div');
            card.className = 'star-card';
            card.innerHTML = `
                <strong>${star.name}</strong><br>
                ${star.type} • ${star.planets} planets
            `;
            card.onclick = () => {
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                localStorage.setItem('voidfarer_current_star', star.name);
                localStorage.setItem('voidfarer_current_star_index', index);
                localStorage.setItem('voidfarer_current_star_type', star.type.toLowerCase());
                window.location.href = 'system-view.html';
            };
            starsDiv.appendChild(card);
        });

        function goBack() {
            window.location.href = 'nebulae-map.html';
        }
    </script>
</body>
</html>
