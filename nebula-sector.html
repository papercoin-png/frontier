<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Nebula Sector Map</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .sector-map {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Nebula background */
        .nebula-bg {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            filter: blur(40px);
            opacity: 0.4;
            animation: drift 60s infinite alternate;
            z-index: 1;
        }
        
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -5%); }
        }
        
        /* Star field */
        .star-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Map container */
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform-origin: center;
            transition: transform 0.3s ease;
        }
        
        /* ===== CELESTIAL OBJECTS ===== */
        .celestial-object {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s ease;
            width: 60px;
            height: 60px;
        }
        
        .object-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.5;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .object-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-shadow: 0 0 30px currentColor;
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .object-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 10px #a0b0c0;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 2px 8px;
            border-radius: 20px 5px 20px 5px;
            border: 1px solid #a0b0c0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 30;
        }
        
        .celestial-object:hover .object-label {
            opacity: 1;
        }
        
        .celestial-object.selected .object-core {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 50px currentColor;
        }
        
        .celestial-object.selected .object-glow {
            opacity: 0.8;
            filter: blur(15px);
        }
        
        /* Star types */
        .star-main .object-glow {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at center, #ffd700, transparent 80%);
        }
        .star-main .object-core {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ffd700);
        }
        .star-main .object-label { top: 25px; }
        
        .star-red .object-glow {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at center, #ff6b6b, transparent 80%);
        }
        .star-red .object-core {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 30% 30%, #ffb6b6, #ff6b6b);
        }
        .star-red .object-label { top: 20px; }
        
        .star-blue .object-glow {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at center, #6ba5ff, transparent 80%);
        }
        .star-blue .object-core {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #6ba5ff);
        }
        .star-blue .object-label { top: 30px; }
        
        .star-neutron .object-glow {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at center, #ffffff, transparent 80%);
            animation: pulse-neutron 0.5s infinite alternate;
        }
        .star-neutron .object-core {
            width: 6px;
            height: 6px;
            background: #ffffff;
            box-shadow: 0 0 40px #ffffff;
        }
        .star-neutron .object-label { top: 15px; }
        
        @keyframes pulse-neutron {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }
        
        /* Anomalies */
        .anomaly-blackhole .object-glow {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at center, #ff4d4d20, #000000 80%);
            border: 1px solid #ff4d4d40;
        }
        .anomaly-blackhole .object-core {
            width: 20px;
            height: 20px;
            background: #000000;
            border: 2px solid #ff4d4d;
            box-shadow: 0 0 40px #ff4d4d;
        }
        .anomaly-blackhole .object-label { top: 40px; color: #ffb6b6; }
        
        .anomaly-nebula .object-glow {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at center, #c06aff60, transparent 80%);
            filter: blur(20px);
        }
        .anomaly-nebula .object-core {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #e0b0ff, #c06aff);
        }
        .anomaly-nebula .object-label { top: 45px; }
        
        .anomaly-pulsar .object-glow {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at center, #4affaa, transparent 80%);
            animation: pulse-pulsar 0.2s infinite alternate;
        }
        .anomaly-pulsar .object-core {
            width: 14px;
            height: 14px;
            background: #ffffff;
            box-shadow: 0 0 40px #4affaa;
        }
        .anomaly-pulsar .object-label { top: 30px; }
        
        @keyframes pulse-pulsar {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
        }
        
        .anomaly-wormhole .object-glow {
            width: 55px;
            height: 55px;
            background: conic-gradient(from 0deg, #ff6aff, #6a6aff, #ff6aff);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
        }
        .anomaly-wormhole .object-core {
            width: 18px;
            height: 18px;
            background: #ffffff;
            box-shadow: 0 0 40px #ff6aff;
        }
        .anomaly-wormhole .object-label { top: 35px; }
        
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .anomaly-asteroid .object-glow {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at center, #b0a080, transparent 80%);
        }
        .anomaly-asteroid .object-core {
            width: 12px;
            height: 12px;
            background: #8b7a5a;
            border-radius: 30% 70% 50% 50% / 30% 40% 60% 70%;
            transform: translate(-50%, -50%) rotate(45deg);
        }
        .anomaly-asteroid .object-label { top: 25px; }
        
        .station-station .object-glow {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at center, #4aaaff60, transparent 80%);
        }
        .station-station .object-core {
            width: 10px;
            height: 10px;
            background: #4aaaff;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        .station-station .object-label { top: 20px; }
        
        /* Connection lines */
        .connection-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(160, 176, 192, 0.2), rgba(208, 224, 240, 0.3), rgba(160, 176, 192, 0.2), transparent);
            transform-origin: 0 0;
            filter: blur(1px);
            z-index: 5;
            pointer-events: none;
        }
        
        /* UI Controls */
        .map-controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .map-btn {
            width: 50px;
            height: 50px;
            border-radius: 40% 20% 40% 20%;
            background: rgba(10, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.3);
            transition: all 0.1s;
        }
        
        .map-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.92);
        }
        
        .back-btn {
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 20px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
        }
        
        .back-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .sector-title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 6px 20px;
            border-radius: 40% 20% 40% 20%;
            font-size: 18px;
            font-family: 'WindSong', cursive;
            white-space: nowrap;
        }
        
        /* Info Panel */
        .info-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid #a0b0c0;
            border-radius: 40% 20% 40% 20%;
            padding: 20px;
            z-index: 100;
            color: #d0e0f0;
            display: none;
            transform: translateY(0);
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(160, 176, 192, 0.3);
        }
        
        .info-panel.visible {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .info-title {
            font-family: 'WindSong', cursive;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #a0b0c0;
            text-align: center;
        }
        
        .info-type {
            color: #a0b0c0;
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .info-desc {
            color: #c0d0f0;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .info-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .info-item {
            background: rgba(0,0,0,0.3);
            border-radius: 30% 20% 30% 20%;
            padding: 8px;
            text-align: center;
            border: 1px solid #a0b0c0;
        }
        
        .info-label {
            font-size: 10px;
            color: #a0b0c0;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .info-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .info-btn {
            flex: 1;
            background: rgba(10, 10, 26, 0.6);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
        }
        
        .info-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            color: #a0b0c0;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:active {
            color: #ffffff;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #a0b0c0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 20px;
            text-shadow: 0 0 20px #a0b0c0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Filter buttons */
        .filter-bar {
            position: absolute;
            top: 100px;
            left: 20px;
            right: 20px;
            z-index: 45;
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #a0b0c0;
            color: #d0e0f0;
            padding: 6px 10px;
            border-radius: 30% 10% 30% 10%;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .filter-btn.active {
            background: #a0b0c0;
            color: #0a0a1a;
        }
        
        .filter-btn:active {
            transform: scale(0.94);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="sector-map" id="sectorMap">
            <!-- Nebula background -->
            <div class="nebula-bg" id="nebulaBg"></div>
            
            <!-- Star field -->
            <div class="star-field" id="starField"></div>
            
            <!-- Map container -->
            <div class="map-container" id="mapContainer"></div>
            
            <!-- Filter Bar -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" onclick="filterObjects('all')">ALL</button>
                <button class="filter-btn" onclick="filterObjects('star')">⭐ STARS</button>
                <button class="filter-btn" onclick="filterObjects('anomaly')">🌀 ANOMALIES</button>
                <button class="filter-btn" onclick="filterObjects('station')">🛸 STATIONS</button>
            </div>
            
            <!-- UI Controls -->
            <button class="back-btn" onclick="returnToNebulae()">← NEBULAE</button>
            
            <div class="sector-title" id="sectorTitle">Orion Sector</div>
            
            <div class="map-controls">
                <button class="map-btn" onclick="zoomIn()">+</button>
                <button class="map-btn" onclick="zoomOut()">-</button>
                <button class="map-btn" onclick="resetView()">⟲</button>
            </div>
            
            <!-- Info Panel -->
            <div class="info-panel" id="infoPanel">
                <div class="close-btn" onclick="closeInfo()">✕</div>
                <div class="info-title" id="infoTitle">Object Name</div>
                <div class="info-type" id="infoType">Star</div>
                <div class="info-desc" id="infoDesc">Description here</div>
                <div class="info-details">
                    <div class="info-item">
                        <div class="info-label">DISTANCE</div>
                        <div class="info-value" id="infoDistance">2.3 ly</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">RESOURCES</div>
                        <div class="info-value" id="infoResources">⭐⭐⭐</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">DANGER</div>
                        <div class="info-value" id="infoDanger">⚡⚡</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">INTEREST</div>
                        <div class="info-value" id="infoInterest">✨✨✨</div>
                    </div>
                </div>
                <div class="info-buttons">
                    <button class="info-btn" id="travelBtn" onclick="travelToObject()">🚀 TRAVEL</button>
                    <button class="info-btn" onclick="closeInfo()">CLOSE</button>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">traveling...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a0a1a');
            tg.setBackgroundColor('#0a0a1a');
        }
        
        // ===== GET SELECTED NEBULA =====
        const nebulaName = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        document.getElementById('sectorTitle').textContent = nebulaName + ' Sector';
        
        // Set nebula background color based on name
        const nebulaBg = document.getElementById('nebulaBg');
        if (nebulaName.includes('Orion')) {
            nebulaBg.style.background = 'radial-gradient(circle at 30% 40%, #8a6aff40 0%, transparent 60%), radial-gradient(circle at 70% 60%, #b08aff40 0%, transparent 60%)';
        } else if (nebulaName.includes('Cygnus')) {
            nebulaBg.style.background = 'radial-gradient(circle at 40% 30%, #ff6a9a40 0%, transparent 60%), radial-gradient(circle at 60% 70%, #ff9aba40 0%, transparent 60%)';
        } else if (nebulaName.includes('Sagittarius')) {
            nebulaBg.style.background = 'radial-gradient(circle at 20% 60%, #ffaa4a40 0%, transparent 60%), radial-gradient(circle at 80% 40%, #ffc08a40 0%, transparent 60%)';
        } else if (nebulaName.includes('Perseus')) {
            nebulaBg.style.background = 'radial-gradient(circle at 50% 30%, #4affaa40 0%, transparent 60%), radial-gradient(circle at 30% 70%, #8affc040 0%, transparent 60%)';
        } else if (nebulaName.includes('Carina')) {
            nebulaBg.style.background = 'radial-gradient(circle at 70% 30%, #c06aff40 0%, transparent 60%), radial-gradient(circle at 40% 80%, #d09aff40 0%, transparent 60%)';
        } else {
            nebulaBg.style.background = 'radial-gradient(circle at 60% 40%, #8a8aaa40 0%, transparent 60%), radial-gradient(circle at 30% 50%, #b0b0d040 0%, transparent 60%)';
        }
        
        // ===== STAR FIELD GENERATION =====
        function generateStars() {
            const starField = document.getElementById('starField');
            starField.innerHTML = '';
            
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                starField.appendChild(star);
            }
        }
        
        // ===== GLOBAL OBJECTS ARRAY =====
        let sectorObjects = [];
        
        // ===== GENERATE CELESTIAL OBJECTS =====
        function generateObjects() {
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.innerHTML = '';
            
            const objectCount = 25;
            const objects = [];
            
            // Generate stars and anomalies
            for (let i = 0; i < objectCount; i++) {
                // Determine object type
                let type = 'star';
                let subtype = 'main';
                let name = '';
                
                const rand = Math.random();
                
                if (rand < 0.5) { // Stars
                    type = 'star';
                    const starRand = Math.random();
                    if (starRand < 0.6) subtype = 'main';
                    else if (starRand < 0.85) subtype = 'red';
                    else if (starRand < 0.95) subtype = 'blue';
                    else subtype = 'neutron';
                    
                    // Generate star name
                    const prefixes = ['Al', 'Bet', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Eta', 'Theta', 'Iota', 'Kappa', 'Lambda', 'Mu', 'Nu', 'Xi', 'Omicron', 'Pi', 'Rho', 'Sigma', 'Tau', 'Upsilon', 'Phi', 'Chi', 'Psi', 'Omega'];
                    const suffixes = ['Majoris', 'Minoris', 'Prime', 'Secundus', 'A', 'B', 'C', 'Alpha', 'Beta', 'Gamma'];
                    name = prefixes[Math.floor(Math.random() * prefixes.length)] + ' ' + suffixes[Math.floor(Math.random() * suffixes.length)];
                    
                } else if (rand < 0.8) { // Anomalies
                    type = 'anomaly';
                    const anomalyRand = Math.random();
                    if (anomalyRand < 0.3) subtype = 'blackhole';
                    else if (anomalyRand < 0.5) subtype = 'nebula';
                    else if (anomalyRand < 0.7) subtype = 'pulsar';
                    else if (anomalyRand < 0.85) subtype = 'wormhole';
                    else subtype = 'asteroid';
                    
                    // Generate anomaly name
                    const anomalyPrefix = ['Dark', 'Veil', 'Crimson', 'Void', 'Mystic', 'Ancient', 'Forgotten', 'Eternal', 'Silent', 'Whispering'];
                    const anomalySuffix = ['Reach', 'Expanse', 'Void', 'Abyss', 'Maw', 'Heart', 'Eye', 'Core', 'Rift', 'Hollow'];
                    name = anomalyPrefix[Math.floor(Math.random() * anomalyPrefix.length)] + ' ' + anomalySuffix[Math.floor(Math.random() * anomalySuffix.length)];
                    
                } else { // Stations
                    type = 'station';
                    subtype = 'station';
                    
                    // Generate station name
                    const stationPrefix = ['Port', 'Station', 'Outpost', 'Colony', 'Hold', 'Base', 'Haven', 'Refuge', 'Post', 'Depot'];
                    const stationSuffix = ['Alpha', 'Prime', 'Central', 'Nova', 'Vega', 'Orion', 'Cygnus', 'Lyra', 'Aurora', 'Eclipse'];
                    name = stationPrefix[Math.floor(Math.random() * stationPrefix.length)] + ' ' + stationSuffix[Math.floor(Math.random() * stationSuffix.length)];
                }
                
                // Calculate position in a spiral pattern
                const angle = (i / objectCount) * Math.PI * 8;
                const radius = 20 + (i % 15) * 3;
                const centerX = 50 + Math.sin(angle * 2) * 15;
                const centerY = 50 + Math.cos(angle * 3) * 15;
                
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                // Ensure within bounds
                const safeX = Math.min(95, Math.max(5, x));
                const safeY = Math.min(95, Math.max(5, y));
                
                const obj = {
                    id: `obj-${i}`,
                    type: type,
                    subtype: subtype,
                    name: name,
                    x: safeX,
                    y: safeY,
                    distance: Math.floor(Math.random() * 50 + 10) / 10 + ' ly',
                    resources: Math.floor(Math.random() * 5) + 1,
                    danger: Math.floor(Math.random() * 5) + 1,
                    interest: Math.floor(Math.random() * 5) + 1,
                    desc: getDescription(type, subtype)
                };
                
                objects.push(obj);
            }
            
            // Store globally
            sectorObjects = objects;
            
            // Create connection lines
            for (let i = 0; i < objects.length; i += 3) {
                if (i + 1 < objects.length) {
                    const line = document.createElement('div');
                    line.className = 'connection-line';
                    
                    const x1 = objects[i].x;
                    const y1 = objects[i].y;
                    const x2 = objects[i+1].x;
                    const y2 = objects[i+1].y;
                    
                    const dx = x2 - x1;
                    const dy = y2 - y1;
                    const length = Math.sqrt(dx*dx + dy*dy);
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    
                    line.style.left = x1 + '%';
                    line.style.top = y1 + '%';
                    line.style.width = length + '%';
                    line.style.transform = `rotate(${angle}deg)`;
                    
                    mapContainer.appendChild(line);
                }
            }
            
            // Create objects
            objects.forEach(obj => {
                const el = document.createElement('div');
                el.className = `celestial-object ${obj.type}-${obj.subtype}`;
                el.id = obj.id;
                el.style.left = obj.x + '%';
                el.style.top = obj.y + '%';
                el.setAttribute('data-type', obj.type);
                el.setAttribute('data-subtype', obj.subtype);
                el.setAttribute('data-id', obj.id);
                el.setAttribute('onclick', `selectObject('${obj.id}')`);
                
                el.innerHTML = `
                    <div class="object-glow"></div>
                    <div class="object-core"></div>
                    <span class="object-label">${obj.name}</span>
                `;
                
                mapContainer.appendChild(el);
            });
        }
        
        function getDescription(type, subtype) {
            if (type === 'star') {
                if (subtype === 'main') return 'A stable main sequence star. Rich in hydrogen and helium.';
                if (subtype === 'red') return 'A cool red dwarf. Ancient and stable. Possible rocky planets.';
                if (subtype === 'blue') return 'A hot blue giant. Short-lived but rich in heavy elements.';
                if (subtype === 'neutron') return 'The collapsed core of a massive star. Extremely dense.';
            } else if (type === 'anomaly') {
                if (subtype === 'blackhole') return 'A gravitational singularity. Extreme danger, exotic resources.';
                if (subtype === 'nebula') return 'A dense gas cloud. New stars forming within.';
                if (subtype === 'pulsar') return 'A rapidly rotating neutron star. Regular energy pulses.';
                if (subtype === 'wormhole') return 'A spacetime tunnel. Possible shortcut to distant regions.';
                if (subtype === 'asteroid') return 'A dense asteroid field. Rich in minerals.';
            } else {
                return 'A deep space station. Trade, rest, and refuel here.';
            }
            return 'Unknown celestial object.';
        }
        
        // ===== OBJECT SELECTION =====
        let currentObject = null;
        const infoPanel = document.getElementById('infoPanel');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function selectObject(id) {
            // Remove previous selection
            document.querySelectorAll('.celestial-object').forEach(el => {
                el.classList.remove('selected');
            });
            
            // Add selection
            const element = document.getElementById(id);
            if (element) {
                element.classList.add('selected');
                
                // Find object data
                const obj = sectorObjects.find(o => o.id === id);
                if (!obj) return;
                
                currentObject = obj;
                
                // Update info panel
                document.getElementById('infoTitle').textContent = obj.name;
                
                let typeText = '';
                if (obj.type === 'star') {
                    if (obj.subtype === 'main') typeText = 'Main Sequence Star';
                    else if (obj.subtype === 'red') typeText = 'Red Dwarf Star';
                    else if (obj.subtype === 'blue') typeText = 'Blue Giant Star';
                    else if (obj.subtype === 'neutron') typeText = 'Neutron Star';
                } else if (obj.type === 'anomaly') {
                    if (obj.subtype === 'blackhole') typeText = 'Black Hole';
                    else if (obj.subtype === 'nebula') typeText = 'Proto-Nebula';
                    else if (obj.subtype === 'pulsar') typeText = 'Pulsar';
                    else if (obj.subtype === 'wormhole') typeText = 'Wormhole';
                    else if (obj.subtype === 'asteroid') typeText = 'Asteroid Field';
                } else {
                    typeText = 'Space Station';
                }
                
                document.getElementById('infoType').textContent = typeText;
                document.getElementById('infoDesc').textContent = obj.desc;
                document.getElementById('infoDistance').textContent = obj.distance;
                document.getElementById('infoResources').innerHTML = '⭐'.repeat(obj.resources);
                document.getElementById('infoDanger').innerHTML = '⚡'.repeat(obj.danger);
                document.getElementById('infoInterest').innerHTML = '✨'.repeat(obj.interest);
                
                // Show panel
                infoPanel.classList.add('visible');
                
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function closeInfo() {
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.celestial-object').forEach(el => {
                el.classList.remove('selected');
            });
            currentObject = null;
        }
        
        function travelToObject() {
            if (!currentObject) {
                alert('Please select an object first');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                
                // Save the selected object as current location
                localStorage.setItem('voidfarer_current_planet', currentObject.name);
                localStorage.setItem('voidfarer_current_object_type', currentObject.type);
                
                // Navigate to system view
                window.location.href = 'system-view.html';
                
                closeInfo();
            }, 2000);
        }
        
        // ===== FILTERING =====
        function filterObjects(filter) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter objects
            document.querySelectorAll('.celestial-object').forEach(el => {
                const type = el.classList.contains('star-') ? 'star' : 
                            el.classList.contains('anomaly-') ? 'anomaly' : 
                            el.classList.contains('station-') ? 'station' : '';
                
                if (filter === 'all') {
                    el.style.display = 'block';
                } else if (filter === 'star') {
                    el.style.display = type === 'star' ? 'block' : 'none';
                } else if (filter === 'anomaly') {
                    el.style.display = type === 'anomaly' ? 'block' : 'none';
                } else if (filter === 'station') {
                    el.style.display = type === 'station' ? 'block' : 'none';
                }
            });
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ===== NAVIGATION =====
        function returnToNebulae() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'nebulae-map.html';
        }
        
        // ===== ZOOM CONTROLS =====
        let scale = 1;
        const mapContainer = document.getElementById('mapContainer');
        
        function zoomIn() {
            scale = Math.min(scale + 0.2, 2);
            mapContainer.style.transform = `scale(${scale})`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function zoomOut() {
            scale = Math.max(scale - 0.2, 0.5);
            mapContainer.style.transform = `scale(${scale})`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function resetView() {
            scale = 1;
            mapContainer.style.transform = `scale(1)`;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ===== INITIALIZE =====
        function init() {
            generateStars();
            generateObjects();
            
            // Check player
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
            }
        }
        
        init();
    </script>
</body>
</html>
