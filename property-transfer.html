<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Transfer Items</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .transfer-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a2a3a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a9a8a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #4a9a8a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .transfer-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .transfer-title {
            font-family: 'WindSong', cursive;
            font-size: 32px;
            color: #c0e0ff;
            text-shadow: 0 0 20px #4a8a6a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
        }
        
        .transfer-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Property Info */
        .property-info {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .property-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'WindSong', cursive;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .property-stats {
            display: flex;
            justify-content: space-between;
            color: #a0d0c0;
            font-size: 14px;
        }
        
        .property-capacity {
            color: #ffd966;
        }
        
        /* Transfer Controls */
        .transfer-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .direction-btn {
            flex: 1;
            background: rgba(30, 60, 70, 0.6);
            border: 2px solid #4a9a8a;
            color: #a0d0c0;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        
        .direction-btn.active {
            background: #4a9a8a;
            color: #ffffff;
            border-color: #7ac0b0;
        }
        
        .direction-btn:active {
            transform: scale(0.97);
        }
        
        /* Items Grid */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .item-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 12px 40px 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .item-icon {
            font-size: 32px;
            min-width: 45px;
            text-align: center;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'WindSong', cursive;
        }
        
        .item-quantity {
            color: #ffd966;
            font-size: 14px;
        }
        
        .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .quantity-input {
            width: 60px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            font-family: 'Libre Baskerville', serif;
        }
        
        .transfer-item-btn {
            background: rgba(74, 154, 138, 0.3);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 30px 8px 30px 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 70px;
        }
        
        .transfer-item-btn:active {
            background: #4a9a8a;
            transform: scale(0.95);
        }
        
        .transfer-item-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .quick-btn {
            background: rgba(255, 170, 74, 0.2);
            border: 1px solid #ffaa4a;
            color: #ffffff;
            padding: 14px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        
        .quick-btn:active {
            background: #ffaa4a;
            transform: scale(0.97);
        }
        
        .quick-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0b0c0;
            background: rgba(30, 60, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #4a9a8a;
            font-style: italic;
        }
        
        /* Back button */
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 60, 70, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #6aa0a0;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
            width: fit-content;
            box-shadow: 0 0 30px #2a5a5a;
            z-index: 100;
            margin-top: 10px;
        }
        
        .back-button:active {
            background: #4a9a8a;
            transform: translateX(-50%) scale(0.98);
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="transfer-view" id="transferView">
            <!-- Header -->
            <div class="transfer-header">
                <div class="transfer-title">Transfer Items</div>
                <div class="transfer-subtitle">✦ move cargo ✦</div>
            </div>
            
            <!-- Property Info -->
            <div class="property-info" id="propertyInfo">
                <div class="property-name" id="propertyName">Loading...</div>
                <div class="property-stats">
                    <span>Used: <span class="property-capacity" id="propertyUsed">0</span></span>
                    <span>Capacity: <span class="property-capacity" id="propertyCapacity">0</span></span>
                </div>
            </div>
            
            <!-- Transfer Direction -->
            <div class="transfer-controls">
                <button class="direction-btn active" id="toPropertyBtn" onclick="setDirection('toProperty')">🚀 TO PROPERTY</button>
                <button class="direction-btn" id="toShipBtn" onclick="setDirection('toShip')">🚢 TO SHIP</button>
            </div>
            
            <!-- Items Grid -->
            <div class="items-grid" id="itemsGrid">
                <div class="empty-state">Loading items...</div>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" id="moveAllBtn" onclick="moveAll()">📦 MOVE ALL</button>
                <button class="quick-btn" id="resetBtn" onclick="resetQuantities()">⟲ RESET</button>
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="returnToRealEstate()">← BACK TO PROPERTIES</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">transferring...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <script type="module">
        // ===== IMPORTS =====
        import { 
            getCollection,
            getRealEstate,
            getPlayer,
            transferToProperty as storageTransferToProperty,
            transferFromProperty as storageTransferFromProperty
        } from './js/storage.js';
        import { isMigrationComplete } from './js/db.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a2a3a');
            tg.setBackgroundColor('#0a2a3a');
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // ===== GET PROPERTY ID FROM URL =====
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('property');

        // ===== STATE =====
        let currentProperty = null;
        let shipItems = [];
        let propertyItems = [];
        let currentDirection = 'toProperty'; // 'toProperty' or 'toShip'
        let propertyData = null;

        // ===== ELEMENT ICONS DATABASE =====
        const elementIcons = {
            'Carbon': '⚫', 'Silicon': '💎', 'Hydrogen': '💧', 'Helium': '🎈',
            'Iron': '⚙️', 'Oxygen': '💨', 'Nickel': '🔩', 'Gold': '🟡',
            'Silver': '⚪', 'Platinum': '⬜', 'Titanium': '🔷', 'Uranium': '🟣',
            'Promethium': '✨', 'Technetium': '🧪', 'Astatine': '☣️',
            'Sodium': '🧂', 'Lithium': '🔋', 'Magnesium': '✨',
            'Sulfur': '🟡', 'Copper': '🔴', 'Lead': '🔘', 'Mercury': '💧',
            'Thorium': '🔮', 'Plutonium': '☢️'
        };

        // ===== NAVIGATION =====
        window.returnToRealEstate = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'real-estate.html';
        };

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                if (!propertyId) {
                    alert('No property selected');
                    returnToRealEstate();
                    return;
                }

                // Load all data in parallel
                const [collection, propertyDataResult] = await Promise.all([
                    getCollection(),
                    getRealEstate()
                ]);

                propertyData = propertyDataResult;
                currentProperty = propertyData.properties?.find(p => p.id === propertyId);

                if (!currentProperty) {
                    alert('Property not found');
                    returnToRealEstate();
                    return;
                }

                // Initialize items if not exists
                if (!currentProperty.items) {
                    currentProperty.items = {};
                }

                // Calculate used space
                const propertyUsed = Object.values(currentProperty.items).reduce((sum, item) => sum + (item.count || 0), 0);
                currentProperty.used = propertyUsed;

                // Update UI
                document.getElementById('propertyName').textContent = currentProperty.name;
                document.getElementById('propertyUsed').textContent = propertyUsed;
                document.getElementById('propertyCapacity').textContent = currentProperty.capacity;

                // Load items
                loadItems(collection);

                // Check migration status
                const migrated = await isMigrationComplete();
                migrationStatus.textContent = migrated ? '✓ DB Ready' : '⚡ Loading';
                migrationStatus.style.display = 'block';
                setTimeout(() => {
                    migrationStatus.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('itemsGrid').innerHTML = 
                    '<div class="empty-state">Error loading items</div>';
            }
        }

        // ===== LOAD ITEMS =====
        function loadItems(collection) {
            shipItems = Object.keys(collection).map(name => ({
                name: name,
                count: collection[name].count || 1,
                icon: elementIcons[name] || '🔹'
            }));

            propertyItems = Object.keys(currentProperty.items || {}).map(name => ({
                name: name,
                count: currentProperty.items[name].count || 1,
                icon: elementIcons[name] || '🔹'
            }));

            renderItems();
        }

        // ===== RENDER ITEMS =====
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';

            const sourceItems = currentDirection === 'toProperty' ? shipItems : propertyItems;
            const targetItems = currentDirection === 'toProperty' ? propertyItems : shipItems;
            
            const collection = currentDirection === 'toProperty' ? 
                shipItems.reduce((acc, item) => ({ ...acc, [item.name]: item }), {}) :
                propertyItems.reduce((acc, item) => ({ ...acc, [item.name]: item }), {});

            const targetUsed = currentDirection === 'toProperty' ? 
                (currentProperty.used || 0) : 
                shipItems.reduce((sum, item) => sum + item.count, 0);

            const targetCapacity = currentDirection === 'toProperty' ? 
                currentProperty.capacity : 
                Infinity; // Ship has no capacity limit in this view

            if (sourceItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">No items available to transfer</div>';
                return;
            }

            sourceItems.sort((a, b) => a.name.localeCompare(b.name));

            sourceItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';

                const availableSpace = targetCapacity - targetUsed;
                const maxTransfer = Math.min(item.count, availableSpace);

                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-quantity">Available: ${item.count}</div>
                    </div>
                    <div class="item-controls">
                        <input type="number" class="quantity-input" id="qty_${item.name.replace(/\s/g, '_')}" value="1" min="1" max="${item.count}" ${maxTransfer <= 0 ? 'disabled' : ''}>
                        <button class="transfer-item-btn" 
                            onclick="transferItem('${item.name}')"
                            ${maxTransfer <= 0 ? 'disabled' : ''}>
                            TRANSFER
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // ===== SET TRANSFER DIRECTION =====
        window.setDirection = async function(direction) {
            currentDirection = direction;

            document.getElementById('toPropertyBtn').classList.remove('active');
            document.getElementById('toShipBtn').classList.remove('active');

            if (direction === 'toProperty') {
                document.getElementById('toPropertyBtn').classList.add('active');
            } else {
                document.getElementById('toShipBtn').classList.add('active');
            }

            // Reload data to refresh items
            const collection = await getCollection();
            loadItems(collection);

            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        // ===== TRANSFER ITEM =====
        window.transferItem = async function(itemName) {
            const safeName = itemName.replace(/\s/g, '_');
            const qtyInput = document.getElementById(`qty_${safeName}`);
            
            if (!qtyInput) {
                console.error('Input not found for:', itemName);
                return;
            }

            const quantity = parseInt(qtyInput.value);

            if (!quantity || quantity < 1) {
                alert('Please enter a valid quantity');
                return;
            }

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'transferring...';

            try {
                let result;
                
                if (currentDirection === 'toProperty') {
                    result = await storageTransferToProperty(propertyId, itemName, quantity);
                } else {
                    result = await storageTransferFromProperty(propertyId, itemName, quantity);
                }

                if (result.success) {
                    // Reload data
                    const collection = await getCollection();
                    const propertyDataResult = await getRealEstate();
                    
                    propertyData = propertyDataResult;
                    currentProperty = propertyData.properties?.find(p => p.id === propertyId);
                    
                    if (currentProperty) {
                        const propertyUsed = Object.values(currentProperty.items || {}).reduce((sum, item) => sum + (item.count || 0), 0);
                        currentProperty.used = propertyUsed;
                        
                        document.getElementById('propertyUsed').textContent = propertyUsed;
                    }

                    loadItems(collection);

                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Transfer failed: ' + (result.reason || 'unknown error'));
                }

            } catch (error) {
                console.error('Transfer error:', error);
                alert('Error during transfer');
            }

            loadingOverlay.classList.remove('active');
        };

        // ===== MOVE ALL ITEMS =====
        window.moveAll = async function() {
            const sourceItems = currentDirection === 'toProperty' ? shipItems : propertyItems;

            if (sourceItems.length === 0) {
                alert('No items to move');
                return;
            }

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'moving all items...';

            try {
                let successCount = 0;
                let failCount = 0;

                for (const item of sourceItems) {
                    const quantity = item.count;
                    
                    let result;
                    if (currentDirection === 'toProperty') {
                        result = await storageTransferToProperty(propertyId, item.name, quantity);
                    } else {
                        result = await storageTransferFromProperty(propertyId, item.name, quantity);
                    }

                    if (result.success) {
                        successCount++;
                    } else {
                        failCount++;
                        console.warn(`Failed to transfer ${item.name}:`, result.reason);
                    }
                }

                // Reload data
                const collection = await getCollection();
                const propertyDataResult = await getRealEstate();

                propertyData = propertyDataResult;
                currentProperty = propertyData.properties?.find(p => p.id === propertyId);

                if (currentProperty) {
                    const propertyUsed = Object.values(currentProperty.items || {}).reduce((sum, item) => sum + (item.count || 0), 0);
                    currentProperty.used = propertyUsed;
                    document.getElementById('propertyUsed').textContent = propertyUsed;
                }

                loadItems(collection);

                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                if (failCount > 0) {
                    alert(`Moved ${successCount} items, ${failCount} failed`);
                } else {
                    alert(`Successfully moved ${successCount} items`);
                }

            } catch (error) {
                console.error('Move all error:', error);
                alert('Error during bulk transfer');
            }

            loadingOverlay.classList.remove('active');
        };

        // ===== RESET QUANTITIES =====
        window.resetQuantities = function() {
            const inputs = document.querySelectorAll('.quantity-input');
            inputs.forEach(input => {
                input.value = '1';
            });

            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading transfer interface...';

                // Check for player data
                const player = await getPlayer();
                if (!player) {
                    window.location.href = 'index.html';
                    return;
                }

                // Check if property ID exists
                if (!propertyId) {
                    alert('No property selected');
                    window.location.href = 'real-estate.html';
                    return;
                }

                // Load data
                await loadData();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'real-estate.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
