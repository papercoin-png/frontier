<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Element Journal</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .journal-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 30px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #4a8a9a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .journal-header {
            margin-bottom: 24px;
            text-align: center;
        }
        
        .journal-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .journal-stats {
            color: #c0d0f0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            background: rgba(30, 40, 60, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 40px 10px 40px 10px;
            display: inline-block;
            border: 1px solid #6a8ac0;
            box-shadow: 0 0 15px #3a5a8a80;
        }
        
        .search-container {
            margin-bottom: 20px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 22px;
            background: rgba(20, 30, 50, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            color: #ffffff;
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .search-input:focus {
            border-color: #9ac0ff;
            box-shadow: 0 0 25px #4a6a9a;
            background: rgba(30, 40, 70, 0.9);
        }
        
        .search-input::placeholder {
            color: #b0c8f0;
            font-size: 15px;
            font-weight: 400;
            opacity: 0.8;
        }
        
        .rarity-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-pill {
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(30, 40, 60, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .filter-pill.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 20px #3a5a8a;
            font-weight: 700;
        }
        
        .filter-pill.common.active { background: #ffffff; color: #000000; border-color: #ffffff; }
        .filter-pill.uncommon.active { background: #6aff6a; color: #000000; border-color: #ffffff; }
        .filter-pill.rare.active { background: #6a6aff; color: #ffffff; border-color: #ffffff; }
        .filter-pill.very-rare.active { background: #c06aff; color: #ffffff; border-color: #ffffff; }
        .filter-pill.legendary.active { background: #ffc06a; color: #000000; border-color: #ffffff; }
        
        .element-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }
        
        .element-card {
            background: rgba(20, 35, 55, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 30px 10px 30px 10px;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .element-card.expanded {
            box-shadow: 0 0 25px #4a6a9a;
            border-color: #9ac0ff;
        }
        
        .element-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(30, 45, 70, 0.5);
        }
        
        .element-header:active {
            background: rgba(60, 90, 140, 0.5);
        }
        
        .element-rarity {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 15px currentColor;
        }
        
        .element-symbol {
            font-size: 26px;
            font-weight: bold;
            min-width: 55px;
            font-family: monospace;
            text-shadow: 0 0 15px currentColor;
            letter-spacing: 1px;
        }
        
        .element-name {
            flex: 2;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
            padding-right: 8px;
        }
        
        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: auto;
            box-shadow: 0 0 10px currentColor;
        }
        
        .status-found {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        
        .status-not-found {
            background: #808080;
            box-shadow: 0 0 10px #808080;
        }
        
        .expand-icon {
            font-size: 22px;
            color: #c0d0ff;
            transition: transform 0.3s;
            text-shadow: 0 0 10px #6a8ac0;
            margin-left: 4px;
            flex-shrink: 0;
        }
        
        .element-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .element-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            border-top: 0 solid #6a8ac0;
            background: rgba(15, 25, 40, 0.9);
        }
        
        .element-card.expanded .element-details {
            max-height: 600px;
            border-top-width: 2px;
            border-top-style: solid;
            border-top-color: #6a8ac0;
        }
        
        .details-content {
            padding: 20px;
        }
        
        .atomic-info {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            background: rgba(40, 60, 90, 0.5);
            padding: 10px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #8aa8d0;
            flex-wrap: wrap;
        }
        
        .planet-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .planet-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(20, 35, 55, 0.8);
            border-radius: 30px 8px 30px 8px;
            border: 1px solid #7a9ac0;
        }
        
        .planet-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 8px #aac8ff);
        }
        
        .planet-name {
            flex: 1;
            font-weight: bold;
            color: #ffffff;
            font-size: 17px;
            white-space: normal;
            word-break: break-word;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        .planet-type {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            padding: 4px 10px;
            background: rgba(90, 120, 170, 0.5);
            border-radius: 30px;
            border: 1px solid #aac8ff;
            white-space: nowrap;
        }
        
        .many-planets-note {
            color: #ffffff;
            font-style: italic;
            padding: 20px;
            text-align: center;
            background: rgba(30, 50, 80, 0.5);
            border-radius: 30px 8px 30px 8px;
            font-size: 15px;
            border: 1px solid #7a9ac0;
            font-weight: 500;
            line-height: 1.6;
        }
        
        .count-badge {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            color: #aac8ff;
            margin-left: 8px;
        }
        
        .text-common { color: #ffffff; text-shadow: 0 0 15px #ffffff; }
        .text-uncommon { color: #b0ffb0; text-shadow: 0 0 15px #80ff80; }
        .text-rare { color: #b0b0ff; text-shadow: 0 0 15px #8080ff; }
        .text-very-rare { color: #e0b0ff; text-shadow: 0 0 15px #b080ff; }
        .text-legendary { color: #ffd700; text-shadow: 0 0 15px #ffaa00; }
        
        .rarity-common { background: #ffffff; box-shadow: 0 0 20px #ffffff; }
        .rarity-uncommon { background: #80ff80; box-shadow: 0 0 20px #40ff40; }
        .rarity-rare { background: #8080ff; box-shadow: 0 0 20px #4040ff; }
        .rarity-very-rare { background: #b080ff; box-shadow: 0 0 20px #8040ff; }
        .rarity-legendary { background: #ffd700; box-shadow: 0 0 20px #ffaa00; }
        
        .sort-indicator {
            text-align: right;
            color: #c0d0ff;
            font-size: 13px;
            margin-bottom: 8px;
            font-style: italic;
            font-weight: 500;
            text-shadow: 0 0 8px #6a8ac0;
        }
        
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.2s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.98);
            box-shadow: 0 0 40px #8ab0ff;
        }
    </style>
</head>

            { name: 'Zirconium', symbol: 'Zr', atomic: 40, mass: '91.22', rarity: 'rare', planets: 4, value: 1000 }
        ];
        
        // Planet location examples
        const planetLocations = {
            'Gold': ['Pyros', 'Verdant Prime', 'Aether Moons'],
            'Silver': ['Pyros', 'Aether Moons'],
            'Platinum': ['Pyros', 'Aether Core'],
            'Uranium': ['Pyros', 'Glacier-7', 'Aether Moons'],
            'Promethium': ['Aether Moons'],
            'Carbon': ['Verdant Prime', 'Glacier-7', 'Everywhere'],
            'Iron': ['Verdant Prime', 'Pyros', 'Everywhere'],
            'Oxygen': ['Verdant Prime', 'Glacier-7', 'Aether Moons'],
            'Silicon': ['Verdant Prime', 'Pyros', 'Everywhere'],
            'Helium': ['Aether', 'Everywhere'],
            'Hydrogen': ['Aether', 'Everywhere']
        };
        
        let currentFilter = 'all';
        let searchTerm = '';
        let collection = {};
        
        // Load collection from localStorage
        function loadCollection() {
            collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            return collection;
        }
        
        function renderElements() {
            const list = document.getElementById('elementList');
            const statsSpan = document.getElementById('journalStats');
            const sortIndicator = document.getElementById('sortIndicator');
            
            // Load latest collection
            collection = loadCollection();
            
            // Calculate stats
            const foundCount = Object.keys(collection).length;
            
            statsSpan.textContent = `${foundCount} / ${elements.length} elements collected`;
            
            sortIndicator.textContent = currentFilter === 'all' 
                ? '▼ All elements (A-Z)' 
                : `▼ ${currentFilter} elements (A-Z)`;
            
            // Filter
            let filtered = elements;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(e => e.rarity === currentFilter);
            }
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(e => 
                    e.name.toLowerCase().includes(term) ||
                    e.symbol.toLowerCase().includes(term)
                );
            }
            
            // Render
            list.innerHTML = '';
            
            filtered.forEach(element => {
                const card = document.createElement('div');
                card.className = 'element-card';
                
                const isFound = !!collection[element.name];
                
                const header = document.createElement('div');
                header.className = 'element-header';
                header.onclick = () => card.classList.toggle('expanded');
                
                header.innerHTML = `
                    <div class="element-rarity rarity-${element.rarity}"></div>
                    <div class="element-symbol text-${element.rarity}">${element.symbol}</div>
                    <div class="element-name">${element.name}</div>
                    <div class="status-dot ${isFound ? 'status-found' : 'status-not-found'}"></div>
                    <div class="expand-icon">▼</div>
                `;
                
                const details = document.createElement('div');
                details.className = 'element-details';
                
                // Get planet locations
                let locationHtml = '';
                const locations = planetLocations[element.name] || 
                    (element.planets > 10 ? ['Multiple planets', 'Common element'] : ['Unknown location']);
                
                if (element.planets > 20) {
                    locationHtml = `
                        <div class="many-planets-note">
                            ✦ Found on ${element.planets} planets
                            <span style="display:block; font-size:12px; margin-top:4px;">Common element - found throughout galaxy</span>
                        </div>
                    `;
                } else {
                    locationHtml = '<div class="planet-list">';
                    locations.forEach(loc => {
                        locationHtml += `
                            <div class="planet-item">
                                <span class="planet-icon">🪐</span>
                                <span class="planet-name">${loc}</span>
                                <span class="planet-type">${element.rarity}</span>
                            </div>
                        `;
                    });
                    locationHtml += '</div>';
                }
                
                const count = collection[element.name]?.count || 0;
                
                details.innerHTML = `
                    <div class="details-content">
                        <div class="atomic-info">
                            <span>⚛️ Atomic ${element.atomic}</span>
                            <span>⚖️ Mass ${element.mass}</span>
                            <span>💰 ${element.value}⭐</span>
                        </div>
                        ${locationHtml}
                        ${isFound ? `<div style="text-align:center; margin-top:15px; color:#8ac0ff;">Collected: ${count} × ${element.value}⭐ = ${count * element.value}⭐</div>` : ''}
                    </div>
                `;
                
                card.appendChild(header);
                card.appendChild(details);
                list.appendChild(card);
            });
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="many-planets-note" style="padding:40px;">No elements found</div>';
            }
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderElements();
        });
        
        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentFilter = pill.dataset.rarity;
                renderElements();
            });
        });
        
        function goBack() {
            navigateTo('ship-bridge.html');
        }
        
        // Initialize
        function init() {
            // Check if player exists
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            renderElements();
        }
        
        init();
    </script>
