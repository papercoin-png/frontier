<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Journal</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .journal-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .journal-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .journal-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .journal-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .collection-stats {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: space-around;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Exo 2', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffd966;
        }
        
        .stat-label {
            font-size: 10px;
            color: #a0c0ff;
            letter-spacing: 1px;
        }
        
        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .filter-btn.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 15px #3a5a8a;
        }
        
        .filter-btn:active {
            transform: scale(0.95);
        }
        
        .rarity-group {
            margin-bottom: 20px;
        }
        
        .rarity-header {
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 8px 15px;
            margin-bottom: 10px;
            border-radius: 40px 10px 40px 10px;
            background: rgba(30, 45, 70, 0.8);
            border-left: 4px solid;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .rarity-header.common { border-left-color: #ffffff; color: #ffffff; }
        .rarity-header.uncommon { border-left-color: #b0ffb0; color: #b0ffb0; }
        .rarity-header.rare { border-left-color: #b0b0ff; color: #b0b0ff; }
        .rarity-header.very-rare { border-left-color: #e0b0ff; color: #e0b0ff; }
        .rarity-header.legendary { border-left-color: #ffd700; color: #ffd700; }
        
        .elements-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .element-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid;
            border-radius: 40px 15px 40px 15px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .element-card:active {
            transform: scale(0.99);
            background: rgba(60, 90, 140, 0.7);
        }
        
        .element-main-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .element-symbol {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            min-width: 50px;
            text-align: center;
        }
        
        .element-info {
            flex: 1;
        }
        
        .element-name-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        
        .element-name {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .element-count {
            font-size: 14px;
            color: #ffd966;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .element-details {
            display: flex;
            gap: 15px;
            color: #a0c0ff;
            font-size: 12px;
        }
        
        .element-first-found {
            color: #6a8ac0;
        }
        
        .element-mass {
            color: #4affaa;
        }
        
        .expand-icon {
            color: #a0c0ff;
            font-size: 20px;
            transition: transform 0.3s;
            margin-left: 10px;
        }
        
        .expand-icon.expanded {
            transform: rotate(90deg);
        }
        
        .locations-section {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(74, 138, 192, 0.3);
        }
        
        .locations-section.show {
            display: block;
        }
        
        .locations-title {
            color: #a0c0ff;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .location-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid #4a8ac0;
            border-radius: 30px 8px 30px 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .location-item:active {
            background: rgba(74, 138, 192, 0.3);
            transform: scale(0.98);
        }
        
        .location-planet {
            color: #ffaa4a;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
        }
        
        .location-date {
            color: #6a8ac0;
            font-size: 11px;
        }
        
        .warp-hint {
            color: #4affaa;
            font-size: 11px;
            text-align: right;
            font-style: italic;
        }
        
        .rarity-common { border-color: #ffffff; }
        .rarity-uncommon { border-color: #b0ffb0; }
        .rarity-rare { border-color: #b0b0ff; }
        .rarity-very-rare { border-color: #e0b0ff; }
        .rarity-legendary { border-color: #ffd700; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(20, 30, 50, 0.95);
            backdrop-filter: blur(15px);
            border: 3px solid #4affaa;
            border-radius: 60px 20px 60px 20px;
            padding: 25px;
            width: 280px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 0 30px #4affaa;
        }
        
        .modal-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 600;
            color: #4affaa;
        }
        
        .modal-destination {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #ffaa4a;
        }
        
        .modal-planet-type {
            color: #a0c0ff;
            font-size: 12px;
            margin-bottom: 20px;
        }
        
        .modal-distance {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 15px 0;
        }
        
        .modal-distance-value {
            color: #4affaa;
            font-size: 24px;
            font-weight: 700;
        }
        
        .modal-cycles {
            color: #ffd966;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 14px;
            border-radius: 40px 10px 40px 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
        }
        
        .modal-btn:active {
            background: #6a8ac0;
            transform: scale(0.95);
        }
        
        .modal-btn.warp {
            background: rgba(74, 255, 170, 0.2);
            border-color: #4affaa;
            color: #4affaa;
        }
        
        .modal-btn.warp:active {
            background: #4affaa;
            color: #0a0a1a;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #6a8ac0;
            font-style: italic;
        }
        
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a; }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966; }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a; }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }
        
        .tab-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .tab-btn {
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #6a8ac0;
            color: #e0f0ff;
            padding: 12px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            flex: 1;
            text-align: center;
        }
        
        .tab-btn.active {
            background: #6a8ac0;
            color: #ffffff;
            border-color: #aac8ff;
            box-shadow: 0 0 15px #3a5a8a;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="journal-view" id="journalView">
            <div class="journal-header">
                <div class="journal-title">Journal</div>
                <div class="journal-subtitle">✦ extraction archive ✦</div>
            </div>
            
            <div class="tab-bar">
                <button class="tab-btn active" id="discoveriesTab">📖 DISCOVERIES</button>
            </div>
            
            <div class="stats-bar" id="statsBar">
                <div class="collection-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalElements">0</div>
                        <div class="stat-label">TOTAL</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="uniqueElements">0</div>
                        <div class="stat-label">UNIQUE</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalMass">0</div>
                        <div class="stat-label">MASS (AMU)</div>
                    </div>
                </div>
            </div>
            
            <div class="filter-bar" id="filterBar">
                <span class="filter-btn active" data-rarity="all" onclick="window.filterElements('all', this)">ALL</span>
                <span class="filter-btn" data-rarity="common" onclick="window.filterElements('common', this)">COMMON</span>
                <span class="filter-btn" data-rarity="uncommon" onclick="window.filterElements('uncommon', this)">UNCOMMON</span>
                <span class="filter-btn" data-rarity="rare" onclick="window.filterElements('rare', this)">RARE</span>
                <span class="filter-btn" data-rarity="very-rare" onclick="window.filterElements('very-rare', this)">VERY RARE</span>
                <span class="filter-btn" data-rarity="legendary" onclick="window.filterElements('legendary', this)">LEGENDARY</span>
            </div>
            
            <div id="contentContainer"></div>
            
            <button class="back-button" onclick="window.returnToBridge()">
                <span class="back-arrow">←</span>
                <span class="back-text">SHIP BRIDGE</span>
                <span class="back-icon">🚀</span>
            </button>
        </div>
        
        <div class="modal-overlay" id="warpModal">
            <div class="modal-content">
                <div class="modal-title">🚀 WARP TO PLANET</div>
                <div class="modal-destination" id="modalPlanet">Earth</div>
                <div class="modal-planet-type" id="modalPlanetType">Lush Planet</div>
                <div class="modal-distance">
                    <div>Estimated Distance</div>
                    <div class="modal-distance-value" id="modalDistance">0.0 LY</div>
                    <div class="modal-cycles" id="modalCycles">0 cycles • 0⭐</div>
                </div>
                <p class="warning-text">This will start a warp journey</p>
                <div class="modal-buttons">
                    <button class="modal-btn warp" onclick="window.confirmWarp()">WARP</button>
                    <button class="modal-btn" onclick="window.closeWarpModal()">CANCEL</button>
                </div>
            </div>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">loading journal...</div>
        </div>
    </div>

    <script type="module">
        // Import storage functions from storage.js
        import { 
            getElementLocations, 
            getCollection, 
            getPlayerId,
            getElementRarity,
            getElementMass,
            getPlayerLocations,
            rebuildCollectionFromLocations,
            getItem
        } from './js/storage.js';
        
        // Make them available globally for onclick handlers
        window.getElementLocations = getElementLocations;
        window.getCollection = getCollection;
        window.getPlayerId = getPlayerId;
        window.getElementRarity = getElementRarity;
        window.getElementMass = getElementMass;
        window.getPlayerLocations = getPlayerLocations;
        window.rebuildCollectionFromLocations = rebuildCollectionFromLocations;
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const contentContainer = document.getElementById('contentContainer');
        const warpModal = document.getElementById('warpModal');

        let allElements = [];
        let filteredElements = [];
        let currentFilter = 'all';
        let expandedElement = null;
        let locationsCache = {};
        let currentWarpTarget = null;

        // Element symbol mapping
        const elementSymbols = {
            'Hydrogen': 'H', 'Helium': 'He', 'Lithium': 'Li', 'Beryllium': 'Be',
            'Boron': 'B', 'Carbon': 'C', 'Nitrogen': 'N', 'Oxygen': 'O',
            'Fluorine': 'F', 'Neon': 'Ne', 'Sodium': 'Na', 'Magnesium': 'Mg',
            'Aluminum': 'Al', 'Silicon': 'Si', 'Phosphorus': 'P', 'Sulfur': 'S',
            'Chlorine': 'Cl', 'Argon': 'Ar', 'Potassium': 'K', 'Calcium': 'Ca',
            'Iron': 'Fe', 'Copper': 'Cu', 'Zinc': 'Zn', 'Silver': 'Ag',
            'Gold': 'Au', 'Platinum': 'Pt', 'Titanium': 'Ti', 'Uranium': 'U'
        };
        
        function getElementSymbol(name) {
            return elementSymbols[name] || name.substring(0, 2);
        }

        function getPlanetTypeIcon(planetType) {
            const icons = {
                'scorched': '🔥', 'volcanic': '🌋', 'barren': '🪨', 'lush': '🌱', 
                'frozen': '❄️', 'ice': '🧊', 'gas': '🌪️', 'oceanic': '💧', 
                'toxic': '☣️', 'asteroid': '🪐', 'unknown': '🪐'
            };
            return icons[planetType] || '🪐';
        }

        async function loadJournalData() {
            try {
                loadingText.textContent = 'loading collection...';
                
                const playerId = window.getPlayerId();
                console.log('📖 Loading journal for player:', playerId);
                
                // APPROVED CHANGE: Removed automatic rebuild that was causing cargo inflation
                // The rebuildCollectionFromLocations function should only be called manually,
                // never automatically on page load, as it was summing all location entries
                // and causing exponential cargo mass growth.
                let collection = await window.getCollection(playerId);
                
                // Log collection size for debugging - no automatic rebuild
                console.log('📦 Collection loaded:', Object.keys(collection).length, 'unique elements');
                
                allElements = [];
                let totalMass = 0;
                let totalCount = 0;
                
                for (const [name, data] of Object.entries(collection)) {
                    let count = typeof data === 'object' ? (data.count || 1) : data;
                    if (count <= 0) continue;
                    
                    let firstFound = typeof data === 'object' ? data.firstFound : null;
                    let mass = window.getElementMass ? window.getElementMass(name) : 100;
                    let rarity = window.getElementRarity ? window.getElementRarity(name) : 'common';
                    let totalElementMass = count * mass;
                    
                    totalMass += totalElementMass;
                    totalCount += count;
                    
                    let symbol = getElementSymbol(name);
                    
                    allElements.push({
                        name: name,
                        count: count,
                        mass: mass,
                        totalMass: totalElementMass,
                        firstFound: firstFound || new Date().toISOString(),
                        symbol: symbol,
                        rarity: rarity
                    });
                }
                
                allElements.sort((a, b) => a.name.localeCompare(b.name));
                
                document.getElementById('totalElements').textContent = totalCount;
                document.getElementById('uniqueElements').textContent = allElements.length;
                document.getElementById('totalMass').textContent = Math.round(totalMass);
                
                console.log(`📊 Journal stats: ${totalCount} total units, ${allElements.length} unique elements, ${Math.round(totalMass)} AMU`);
                
                // Preload all locations after collection is loaded
                await preloadAllLocations();
                
                applyFilters();
                
            } catch (error) {
                console.error('Error loading journal:', error);
                contentContainer.innerHTML = '<div class="empty-state">Error loading journal</div>';
            }
        }

        // Preload all locations for all elements using the imported getElementLocations function
        async function preloadAllLocations() {
            if (allElements.length === 0) {
                console.log('No elements to preload locations for');
                return;
            }
            
            loadingText.textContent = 'loading location data...';
            
            let loadedCount = 0;
            for (const element of allElements) {
                if (!locationsCache[element.name]) {
                    try {
                        const locations = await window.getElementLocations(element.name);
                        locationsCache[element.name] = locations || [];
                        loadedCount++;
                        console.log(`📍 Loaded ${locations?.length || 0} locations for ${element.name}`);
                    } catch (err) {
                        console.error(`Failed to load locations for ${element.name}:`, err);
                        locationsCache[element.name] = [];
                    }
                }
            }
            
            console.log(`✅ Preloaded locations for ${loadedCount} elements (total: ${allElements.length})`);
        }

        function applyFilters() {
            if (currentFilter === 'all') {
                filteredElements = [...allElements];
            } else {
                filteredElements = allElements.filter(element => element.rarity === currentFilter);
            }
            renderDiscoveries();
        }

        window.filterElements = function(rarity, btnElement) {
            currentFilter = rarity;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (btnElement) {
                btnElement.classList.add('active');
            }
            
            applyFilters();
            
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch(e) {}
            }
        };

        window.toggleExpand = async function(elementName) {
            if (expandedElement === elementName) {
                expandedElement = null;
            } else {
                expandedElement = elementName;
                // Refresh locations cache for this element
                if (window.getElementLocations) {
                    locationsCache[elementName] = await window.getElementLocations(elementName);
                }
            }
            renderDiscoveries();
            
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch(e) {}
            }
        };

        function getRarityClass(rarity) {
            return `rarity-${rarity}`;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Unknown';
            try {
                const date = new Date(timestamp);
                return date.toLocaleDateString();
            } catch {
                return 'Unknown';
            }
        }

        function renderDiscoveries() {
            if (filteredElements.length === 0) {
                contentContainer.innerHTML = '<div class="empty-state">No elements discovered yet<br>✨ Extract elements from planets to add to your journal ✨</div>';
                return;
            }
            
            const rarityOrder = ['legendary', 'very-rare', 'rare', 'uncommon', 'common'];
            const grouped = {};
            
            filteredElements.forEach(element => {
                if (!grouped[element.rarity]) grouped[element.rarity] = [];
                grouped[element.rarity].push(element);
            });
            
            Object.keys(grouped).forEach(rarity => {
                grouped[rarity].sort((a, b) => a.name.localeCompare(b.name));
            });
            
            let html = '';
            
            rarityOrder.forEach(rarity => {
                const elements = grouped[rarity];
                if (!elements || elements.length === 0) return;
                
                const rarityDisplay = rarity.charAt(0).toUpperCase() + rarity.slice(1);
                html += `
                    <div class="rarity-group">
                        <div class="rarity-header ${rarity}">✦ ${rarityDisplay} ✦</div>
                        <div class="elements-grid">
                `;
                
                elements.forEach(element => {
                    const isExpanded = expandedElement === element.name;
                    const firstFoundDate = element.firstFound ? formatDate(element.firstFound) : 'Unknown';
                    const elementLocations = locationsCache[element.name] || [];
                    
                    let locationsHtml = '';
                    if (elementLocations.length > 0) {
                        // Group locations by planet to show aggregated counts
                        const planetMap = new Map();
                        elementLocations.forEach(loc => {
                            const planet = loc.planet || loc.location?.planet || 'Unknown';
                            const planetType = loc.planetType || loc.location?.planetType || 'unknown';
                            if (!planetMap.has(planet)) {
                                planetMap.set(planet, {
                                    count: 0,
                                    planetType: planetType,
                                    lastFound: loc.timestamp || loc.discoveredAt || Date.now(),
                                    timestamps: []
                                });
                            }
                            const planetData = planetMap.get(planet);
                            planetData.count += (loc.quantity || 1);
                            const timestamp = loc.timestamp || loc.discoveredAt || 0;
                            if (timestamp > planetData.lastFound) {
                                planetData.lastFound = timestamp;
                            }
                            planetData.timestamps.push(timestamp);
                        });
                        
                        const sortedPlanets = Array.from(planetMap.entries())
                            .sort((a, b) => b[1].count - a[1].count);
                        
                        sortedPlanets.forEach(([planet, data]) => {
                            const displayDate = formatDate(data.lastFound);
                            const typeIcon = getPlanetTypeIcon(data.planetType);
                            const safePlanet = planet.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                            
                            locationsHtml += `
                                <div class="location-item" onclick="window.showWarpModal('${safePlanet}', '${data.planetType}')">
                                    <div>
                                        <div class="location-planet">${typeIcon} ${planet}</div>
                                        <div class="location-date">Extracted: ${data.count} units • Last: ${displayDate}</div>
                                    </div>
                                    <div class="warp-hint">Warp →</div>
                                </div>
                            `;
                        });
                    } else {
                        locationsHtml = `
                            <div style="color: #a0c0ff; padding: 10px; text-align: center; font-style: italic;">
                                No extraction locations recorded yet
                            </div>
                        `;
                    }
                    
                    html += `
                        <div class="element-card ${getRarityClass(element.rarity)}">
                            <div class="element-main-row" onclick="window.toggleExpand('${element.name.replace(/'/g, "\\'")}')">
                                <div class="element-symbol">${element.symbol}</div>
                                <div class="element-info">
                                    <div class="element-name-row">
                                        <span class="element-name">${element.name}</span>
                                        <span class="element-count">${element.count}</span>
                                    </div>
                                    <div class="element-details">
                                        <span class="element-mass">⚖️ ${element.totalMass.toFixed(1)} AMU</span>
                                        <span class="element-first-found">📅 ${firstFoundDate}</span>
                                    </div>
                                </div>
                                <div class="expand-icon ${isExpanded ? 'expanded' : ''}">▶</div>
                            </div>
                            <div class="locations-section ${isExpanded ? 'show' : ''}">
                                <div class="locations-title">📍 Extracted from:</div>
                                ${locationsHtml}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            contentContainer.innerHTML = html;
        }

        window.showWarpModal = function(planet, planetType) {
            currentWarpTarget = { planet: planet, planetType: planetType };
            
            const currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
            const distance = (currentSector === 'B2') ? 2.3 : 4.6;
            const cycles = Math.min(5, Math.ceil(distance / 1.5));
            const fuel = Math.floor(distance * 4) + 5;
            
            document.getElementById('modalPlanet').textContent = planet;
            let typeDisplay = planetType && planetType !== 'unknown' ? planetType.charAt(0).toUpperCase() + planetType.slice(1) + ' Planet' : 'Unknown';
            document.getElementById('modalPlanetType').textContent = typeDisplay;
            document.getElementById('modalDistance').textContent = distance.toFixed(1) + ' LY';
            document.getElementById('modalCycles').textContent = cycles + ' cycles • ' + fuel + '⭐';
            
            warpModal.classList.add('active');
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch(e) {}
            }
        };

        window.closeWarpModal = function() {
            warpModal.classList.remove('active');
            currentWarpTarget = null;
        };

        window.confirmWarp = function() {
            if (!currentWarpTarget) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'plotting course...';
            
            try {
                const currentPlanet = localStorage.getItem('voidfarer_current_planet') || 'Earth';
                const currentStar = localStorage.getItem('voidfarer_current_star') || 'Sol';
                const currentStarSector = localStorage.getItem('voidfarer_current_starSector') || 'Orion Molecular Cloud';
                const currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                const currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                
                const distanceText = document.getElementById('modalDistance').textContent;
                const distance = parseFloat(distanceText);
                const cyclesText = document.getElementById('modalCycles').textContent;
                const cycles = parseInt(cyclesText.split(' ')[0]);
                const fuelText = cyclesText.split('•')[1].trim();
                const fuel = parseInt(fuelText.replace('⭐', ''));
                
                localStorage.setItem('voidfarer_warp_destination_planet', currentWarpTarget.planet);
                localStorage.setItem('voidfarer_warp_destination_planet_type', currentWarpTarget.planetType);
                localStorage.setItem('voidfarer_warp_origin_planet', currentPlanet);
                localStorage.setItem('voidfarer_warp_origin_star', currentStar);
                localStorage.setItem('voidfarer_warp_origin_starSector', currentStarSector);
                localStorage.setItem('voidfarer_warp_origin_region', currentRegion);
                localStorage.setItem('voidfarer_warp_origin_sector', currentSector);
                
                const warpData = {
                    destination: currentWarpTarget.planet,
                    destinationType: currentWarpTarget.planetType,
                    startLocation: currentPlanet,
                    startLocationType: 'planet',
                    totalDistance: distance,
                    warpCycles: cycles,
                    fuelCost: fuel,
                    returnPage: 'surface.html',
                    destPlanet: currentWarpTarget.planet,
                    destPlanetType: currentWarpTarget.planetType,
                    destSector: currentSector,
                    destRegion: currentRegion,
                    destStarSector: currentStarSector,
                    destStar: currentStar
                };
                
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Warp error:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to plot course');
            }
            
            closeWarpModal();
        };

        window.returnToBridge = function() {
            if (tg?.HapticFeedback) {
                try {
                    tg.HapticFeedback.impactOccurred('light');
                } catch(e) {}
            }
            window.location.href = 'ship-bridge.html';
        };

        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'opening journal...';
                
                const playerId = window.getPlayerId();
                console.log('🚀 Journal initializing for player:', playerId);
                
                await loadJournalData();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading journal';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }
        
        // Make sure all functions are globally accessible
        window.filterElements = window.filterElements;
        window.toggleExpand = window.toggleExpand;
        window.showWarpModal = window.showWarpModal;
        window.closeWarpModal = window.closeWarpModal;
        window.confirmWarp = window.confirmWarp;
        window.returnToBridge = window.returnToBridge;
        
        init();
    </script>
</body>
</html>
