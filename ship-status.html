<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Ship Status</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .status-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 30px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Header */
        .status-header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status-title {
            font-family: 'WindSong', cursive;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #6a8ac0, 0 0 40px #3a5a8a;
            margin-bottom: 5px;
        }
        
        .status-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Ship Card */
        .ship-card {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #2a4a7a;
        }
        
        .ship-name {
            font-family: 'WindSong', cursive;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-item {
            background: rgba(10, 10, 26, 0.4);
            border-radius: 30% 10% 30% 10%;
            padding: 15px;
            text-align: center;
            border: 1px solid #6a8ac0;
        }
        
        .stat-label {
            color: #a0c0ff;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            font-family: 'WindSong', cursive;
        }
        
        .stat-unit {
            color: #6a8ac0;
            font-size: 12px;
            margin-left: 2px;
        }
        
        /* Progress Bars */
        .progress-section {
            margin-bottom: 25px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #6a8ac0;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .fill-green {
            background: linear-gradient(90deg, #4affaa, #6affcc);
        }
        
        .fill-blue {
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
        }
        
        .fill-orange {
            background: linear-gradient(90deg, #ffaa4a, #ffcc6a);
        }
        
        /* Upgrades Grid */
        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .upgrade-card {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 30% 10% 30% 10%;
            padding: 15px;
            text-align: center;
        }
        
        .upgrade-icon {
            font-size: 28px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px #6a8ac0);
        }
        
        .upgrade-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upgrade-level {
            color: #ffd966;
            font-size: 16px;
            font-weight: 700;
        }
        
        .upgrade-level span {
            color: #a0c0ff;
            font-size: 12px;
        }
        
        /* Cargo Section */
        .cargo-section {
            background: rgba(30, 45, 70, 0.5);
            border: 2px solid #6a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .cargo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .cargo-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }
        
        .cargo-capacity {
            color: #ffd966;
            font-size: 16px;
        }
        
        .cargo-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(106, 138, 192, 0.3);
        }
        
        .cargo-item:last-child {
            border-bottom: none;
        }
        
        .cargo-name {
            color: #ffffff;
        }
        
        .cargo-amount {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Buttons */
        .action-button {
            width: 100%;
            background: rgba(74, 138, 192, 0.3);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 16px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            margin-bottom: 15px;
        }
        
        .action-button:active {
            background: #6a8ac0;
            transform: scale(0.98);
        }
        
        .back-button {
            position: sticky;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #9ac0ff;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            width: fit-content;
            box-shadow: 0 0 30px #3a5a8a;
            z-index: 100;
            margin-top: 20px;
        }
        
        .back-button:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #6a8ac0;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #6a8ac0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-view" id="statusView">
            <!-- Header -->
            <div class="status-header">
                <div class="status-title">Ship Status</div>
                <div class="status-subtitle">✦ prospector class ✦</div>
            </div>
            
            <!-- Ship Card -->
            <div class="ship-card">
                <div class="ship-name" id="shipName">Prospector</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">FUEL</div>
                        <div class="stat-value" id="fuelValue">100</div>
                        <span class="stat-unit">⭐</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">POWER</div>
                        <div class="stat-value" id="powerValue">87</div>
                        <span class="stat-unit">%</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">CARGO</div>
                        <div class="stat-value" id="cargoValue">45</div>
                        <span class="stat-unit">/100</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">ELEMENTS</div>
                        <div class="stat-value" id="elementsValue">47</div>
                        <span class="stat-unit">/118</span>
                    </div>
                </div>
            </div>
            
            <!-- Progress Bars -->
            <div class="progress-section">
                <div class="progress-header">
                    <span>Fuel Tank</span>
                    <span id="fuelPercent">100%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-green" id="fuelBar" style="width: 100%"></div>
                </div>
            </div>
            
            <div class="progress-section">
                <div class="progress-header">
                    <span>Hull Integrity</span>
                    <span id="hullPercent">100%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-blue" id="hullBar" style="width: 100%"></div>
                </div>
            </div>
            
            <div class="progress-section">
                <div class="progress-header">
                    <span>Shield Strength</span>
                    <span id="shieldPercent">87%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-orange" id="shieldBar" style="width: 87%"></div>
                </div>
            </div>
            
            <!-- Ship Upgrades -->
            <div class="upgrades-grid">
                <div class="upgrade-card">
                    <div class="upgrade-icon">⚡</div>
                    <div class="upgrade-name">Engine</div>
                    <div class="upgrade-level">III <span>/ V</span></div>
                </div>
                <div class="upgrade-card">
                    <div class="upgrade-icon">🛡️</div>
                    <div class="upgrade-name">Shields</div>
                    <div class="upgrade-level">II <span>/ V</span></div>
                </div>
                <div class="upgrade-card">
                    <div class="upgrade-icon">⛏️</div>
                    <div class="upgrade-name">Mining Laser</div>
                    <div class="upgrade-level">IV <span>/ V</span></div>
                </div>
                <div class="upgrade-card">
                    <div class="upgrade-icon">📦</div>
                    <div class="upgrade-name">Cargo Hold</div>
                    <div class="upgrade-level">III <span>/ V</span></div>
                </div>
                <div class="upgrade-card">
                    <div class="upgrade-icon">🌌</div>
                    <div class="upgrade-name">Warp Drive</div>
                    <div class="upgrade-level">II <span>/ V</span></div>
                </div>
                <div class="upgrade-card">
                    <div class="upgrade-icon">🔍</div>
                    <div class="upgrade-name">Scanner</div>
                    <div class="upgrade-level">I <span>/ V</span></div>
                </div>
            </div>
            
            <!-- Cargo Section -->
            <div class="cargo-section">
                <div class="cargo-header">
                    <span class="cargo-title">Current Cargo</span>
                    <span class="cargo-capacity" id="cargoCapacity">45/100</span>
                </div>
                <div id="cargoList">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <!-- Action Buttons -->
            <button class="action-button" onclick="refuelShip()">⛽ REFUEL (50⭐)</button>
            <button class="action-button" onclick="repairShip()">🔧 REPAIR (100⭐)</button>
            
            <!-- Back Button -->
            <button class="back-button" onclick="returnToBridge()">← RETURN TO BRIDGE</button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">updating...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }
        
        // Loading overlay
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Navigation
        function returnToBridge() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'ship-bridge.html';
        }
        
        // Load ship data
        function loadShipData() {
            // Ship name
            const player = JSON.parse(localStorage.getItem('voidfarer_player')) || { ship: 'Prospector' };
            document.getElementById('shipName').textContent = player.ship || 'Prospector';
            
            // Fuel
            const fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
            document.getElementById('fuelValue').textContent = fuel;
            document.getElementById('fuelPercent').textContent = fuel + '%';
            document.getElementById('fuelBar').style.width = fuel + '%';
            
            // Power
            const power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 87;
            document.getElementById('powerValue').textContent = power;
            
            // Shield (from power)
            document.getElementById('shieldPercent').textContent = power + '%';
            document.getElementById('shieldBar').style.width = power + '%';
            
            // Hull (always 100 for now)
            document.getElementById('hullPercent').textContent = '100%';
            document.getElementById('hullBar').style.width = '100%';
            
            // Collection
            const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
            const elementCount = Object.keys(collection).length;
            document.getElementById('elementsValue').textContent = elementCount;
            
            // Cargo
            const cargoUsed = Math.min(elementCount * 2, 80); // Simulated cargo usage
            const cargoTotal = 100;
            document.getElementById('cargoValue').textContent = cargoUsed;
            document.getElementById('cargoCapacity').textContent = cargoUsed + '/' + cargoTotal;
            
            // Load cargo items
            loadCargoItems(collection);
        }
        
        // Load cargo items
        function loadCargoItems(collection) {
            const cargoList = document.getElementById('cargoList');
            cargoList.innerHTML = '';
            
            // Get top 5 elements by count
            const items = Object.entries(collection)
                .map(([name, data]) => ({ name, count: data.count || 1 }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 5);
            
            if (items.length === 0) {
                cargoList.innerHTML = '<div style="color:#a0c0ff; text-align:center; padding:20px;">No cargo</div>';
                return;
            }
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cargo-item';
                div.innerHTML = `
                    <span class="cargo-name">${item.name}</span>
                    <span class="cargo-amount">${item.count} units</span>
                `;
                cargoList.appendChild(div);
            });
            
            // Add "more" indicator if needed
            if (Object.keys(collection).length > 5) {
                const more = document.createElement('div');
                more.style.color = '#a0c0ff';
                more.style.textAlign = 'center';
                more.style.padding = '10px';
                more.style.fontSize = '12px';
                more.textContent = `+${Object.keys(collection).length - 5} more items`;
                cargoList.appendChild(more);
            }
        }
        
        // Refuel ship
        function refuelShip() {
            const credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
            const fuel = parseInt(localStorage.getItem('voidfarer_ship_fuel')) || 100;
            
            if (fuel >= 100) {
                alert('Fuel tank already full!');
                return;
            }
            
            if (credits < 50) {
                alert('Not enough credits! Need 50⭐');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Spend credits
                const newCredits = credits - 50;
                localStorage.setItem('voidfarer_credits', newCredits.toString());
                
                // Refuel
                const newFuel = 100;
                localStorage.setItem('voidfarer_ship_fuel', newFuel.toString());
                
                // Update display
                document.getElementById('fuelValue').textContent = newFuel;
                document.getElementById('fuelPercent').textContent = '100%';
                document.getElementById('fuelBar').style.width = '100%';
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                loadingOverlay.classList.remove('active');
                alert('Ship refueled!');
            }, 500);
        }
        
        // Repair ship
        function repairShip() {
            const credits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
            const power = parseInt(localStorage.getItem('voidfarer_ship_power')) || 87;
            
            if (power >= 100) {
                alert('Ship already at full power!');
                return;
            }
            
            if (credits < 100) {
                alert('Not enough credits! Need 100⭐');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            setTimeout(() => {
                // Spend credits
                const newCredits = credits - 100;
                localStorage.setItem('voidfarer_credits', newCredits.toString());
                
                // Repair
                const newPower = 100;
                localStorage.setItem('voidfarer_ship_power', newPower.toString());
                
                // Update display
                document.getElementById('powerValue').textContent = newPower;
                document.getElementById('shieldPercent').textContent = '100%';
                document.getElementById('shieldBar').style.width = '100%';
                
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                loadingOverlay.classList.remove('active');
                alert('Ship repaired!');
            }, 500);
        }
        
        // Initialize
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            loadShipData();
        }
        
        init();
    </script>
</body>
</html>
