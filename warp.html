<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Warp Drive</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .warp-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* Starfield canvas - subtle background */
        #starfieldCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }
        
        /* Map canvas - CENTER PIECE */
        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        /* Ripple canvas - appears at the end */
        #rippleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Journey Panel - minimal top info */
        .journey-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #4a8ac0;
            border-radius: 30px 8px 30px 8px;
            padding: 8px 16px;
            color: white;
            min-width: 240px;
            z-index: 30;
            pointer-events: none;
            text-align: center;
        }
        
        .journey-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 11px;
            color: #a0c0ff;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        
        .journey-points {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .point {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .point-icon {
            font-size: 20px;
        }
        
        .point-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            font-weight: 500;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .start-point .point-name {
            color: #4affaa;
        }
        
        .destination-point .point-name {
            color: #ffaa4a;
        }
        
        .journey-arrow {
            font-size: 16px;
            color: #4a8ac0;
            animation: pulse-arrow 2s infinite;
        }
        
        @keyframes pulse-arrow {
            0% { opacity: 0.5; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(3px); }
            100% { opacity: 0.5; transform: translateX(0); }
        }
        
        /* Stats Panel - bottom left */
        .stats-panel {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 10px);
            left: max(20px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #4a8ac0;
            border-radius: 20px 5px 20px 5px;
            padding: 8px 12px;
            color: white;
            z-index: 30;
            min-width: 90px;
            font-size: 11px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }
        
        .stat-label {
            color: #a0c0ff;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 500;
        }
        
        /* Cycle Panel - bottom right */
        .cycle-panel {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom) + 10px);
            right: max(20px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            border-radius: 30px 8px 30px 8px;
            padding: 10px 16px;
            color: white;
            z-index: 30;
            text-align: center;
            min-width: 90px;
        }
        
        .cycle-current {
            font-size: 28px;
            font-weight: 700;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            line-height: 1;
            text-shadow: 0 0 15px #4affaa;
        }
        
        .cycle-total {
            font-size: 14px;
            color: #a0c0ff;
        }
        
        .cycle-label {
            font-size: 9px;
            color: #a0c0ff;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        
        /* Status Message - appears briefly */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 30px 8px 30px 8px;
            font-size: 16px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 15px #4affaa;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 1px;
        }
        
        .status-message.visible {
            opacity: 1;
        }
        
        /* Claim Info Panel - NEW: Shows owner and fee for claimed planets */
        .claim-info-panel {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid gold;
            border-radius: 40px 10px 40px 10px;
            padding: 12px 24px;
            color: white;
            z-index: 35;
            display: none;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: glow-pulse 2s infinite alternate;
        }
        
        @keyframes glow-pulse {
            from { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
            to { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
        }
        
        .claim-info-panel.visible {
            display: flex;
        }
        
        .claim-icon {
            font-size: 24px;
            color: gold;
        }
        
        .claim-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .claim-owner {
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            color: #4affaa;
        }
        
        .claim-fee {
            color: #ffd966;
            font-weight: 600;
        }
        
        .claim-warning {
            font-size: 11px;
            color: #a0c0ff;
            margin-top: 2px;
        }
        
        /* Destination info - very bottom center */
        .dest-info {
            position: absolute;
            bottom: max(10px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid #4a8ac0;
            border-radius: 20px 5px 20px 5px;
            padding: 3px 10px;
            color: #a0c0ff;
            font-size: 8px;
            z-index: 20;
            white-space: nowrap;
        }
        
        /* Planet Info Preview (for surface) */
        .planet-preview {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 20px;
            color: white;
            z-index: 25;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            pointer-events: none;
        }
        
        .planet-preview.visible {
            display: flex;
        }
        
        .planet-preview-icon {
            font-size: 20px;
        }
        
        .planet-preview-name {
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            color: #4affaa;
        }
        
        .planet-preview-type {
            color: #a0c0ff;
            font-size: 10px;
        }
        
        @supports (padding: max(0px)) {
            .journey-panel { top: max(20px, env(safe-area-inset-top)); }
            .stats-panel { bottom: max(30px, env(safe-area-inset-bottom) + 10px); left: max(20px, env(safe-area-inset-left)); }
            .cycle-panel { bottom: max(30px, env(safe-area-inset-bottom) + 10px); right: max(20px, env(safe-area-inset-right)); }
            .claim-info-panel { top: 120px; }
            .planet-preview { top: 180px; }
            .dest-info { bottom: max(10px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="warp-container">
        <!-- Starfield canvas - subtle background -->
        <canvas id="starfieldCanvas"></canvas>
        
        <!-- Map canvas - CENTER PIECE with ship travel animation -->
        <canvas id="mapCanvas"></canvas>
        
        <!-- Ripple canvas - appears at the end -->
        <canvas id="rippleCanvas"></canvas>
        
        <div class="warp-overlay">
            <!-- Journey Panel (minimal - just shows start and destination) -->
            <div class="journey-panel">
                <div class="journey-title">✦ COURSE ✦</div>
                <div class="journey-points">
                    <div class="point start-point">
                        <span class="point-icon">🚀</span>
                        <span class="point-name" id="startName">Loading...</span>
                    </div>
                    <span class="journey-arrow">→</span>
                    <div class="point destination-point">
                        <span class="point-icon" id="destIcon">🪐</span>
                        <span class="point-name" id="destName">Loading...</span>
                    </div>
                </div>
            </div>
            
            <!-- Claim Info Panel - NEW: Shows when destination is a claimed planet -->
            <div class="claim-info-panel" id="claimInfoPanel">
                <span class="claim-icon">👑</span>
                <div class="claim-details">
                    <div><span class="claim-owner" id="claimOwner">Unknown</span> owns this planet</div>
                    <div>Mining fee: <span class="claim-fee" id="claimFee">10%</span></div>
                    <div class="claim-warning">Fee will be deducted from extractions</div>
                </div>
            </div>
            
            <!-- Planet Preview (shows when destination is a planet) -->
            <div class="planet-preview" id="planetPreview">
                <span class="planet-preview-icon" id="previewIcon">🪐</span>
                <div>
                    <div><span class="planet-preview-name" id="previewName">Earth</span></div>
                    <div><span class="planet-preview-type" id="previewType">Lush Planet</span></div>
                </div>
            </div>
            
            <!-- Stats Panel (minimal - only fuel) -->
            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">FUEL</span>
                    <span class="stat-value" id="fuelCost">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">PROG</span>
                    <span class="stat-value" id="progressPercent">0%</span>
                </div>
            </div>
            
            <!-- Cycle Panel (warp cycles) -->
            <div class="cycle-panel">
                <div>
                    <span class="cycle-current" id="currentCycle">1</span>
                    <span class="cycle-total">/<span id="totalCyclesDisplay">1</span></span>
                </div>
                <div class="cycle-label">WARP</div>
            </div>
            
            <!-- Destination Info (very small) -->
            <div class="dest-info" id="destInfo">
                <span id="destLocation">Destination: </span>
            </div>
            
            <!-- Status Message (center screen, appears briefly) -->
            <div class="status-message" id="statusMessage">INITIATING WARP</div>
        </div>
    </div>

    <!-- CRITICAL: All scripts loaded as modules -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/warp-calculator.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/planet-utils.js"></script>
    <script type="module" src="js/planet-status.js"></script>
    <script type="module" src="js/claim-system.js"></script>

    <script type="module">
        import { PLANET_TYPE_DATA } from './js/planet-utils.js';
        import { isPlanetClaimed, getPlanetClaim } from './js/planet-status.js';

        // ===== CANVAS ELEMENTS =====
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapCtx = mapCanvas.getContext('2d');
        const rippleCanvas = document.getElementById('rippleCanvas');
        const rippleCtx = rippleCanvas.getContext('2d');

        // ===== DOM ELEMENTS =====
        const statusMessage = document.getElementById('statusMessage');
        const currentCycleSpan = document.getElementById('currentCycle');
        const totalCyclesSpan = document.getElementById('totalCyclesDisplay');
        const startName = document.getElementById('startName');
        const destName = document.getElementById('destName');
        const destIcon = document.getElementById('destIcon');
        const fuelCostSpan = document.getElementById('fuelCost');
        const progressPercent = document.getElementById('progressPercent');
        const destInfo = document.getElementById('destLocation');
        const planetPreview = document.getElementById('planetPreview');
        const previewIcon = document.getElementById('previewIcon');
        const previewName = document.getElementById('previewName');
        const previewType = document.getElementById('previewType');
        
        // NEW: Claim info elements
        const claimInfoPanel = document.getElementById('claimInfoPanel');
        const claimOwner = document.getElementById('claimOwner');
        const claimFee = document.getElementById('claimFee');

        // ===== WARP STATE =====
        let warpData = {
            destination: 'Unknown',
            destinationType: 'planet',
            startLocation: 'Unknown System',
            startLocationType: 'star system',
            totalDistance: 0,
            warpCycles: 1,
            fuelCost: 0,
            returnPage: 'surface.html',
            destSector: null,
            destRegion: null,
            destStarSector: null,
            destStar: null,
            destPlanet: null,
            destPlanetType: null,
            destPlanetResources: null,
            isHubReturn: false // Flag to identify hub returns
        };
        
        let currentCycle = 1;
        let animationFrame;
        let startTime = Date.now();
        const CYCLE_DURATION = 2000;
        let warpComplete = false;

        // ===== MAP POSITIONS =====
        let startPos = { x: 0.15, y: 0.5 };
        let destPos = { x: 0.85, y: 0.5 };
        let shipPos = { x: 0.15, y: 0.5 };

        // ===== STARS FOR BACKGROUND =====
        const stars = [];
        const STAR_COUNT = 200;

        const starColors = [
            '#ffffff', '#ffe6b0', '#b0e0ff', '#ffb0b0', '#e0b0ff', '#b0ffb0'
        ];

        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                z: Math.random() * 1000,
                size: Math.random() * 1.5 + 0.3,
                baseBrightness: Math.random() * 0.5 + 0.2,
                color: starColors[Math.floor(Math.random() * starColors.length)],
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulsePhase: Math.random() * Math.PI * 2
            });
        }

        // ===== WATER COLORS FOR RIPPLE =====
        const waterColors = {
            deep: '#0a1a2a',
            mid: '#1a3a5a',
            light: '#2a5a7a',
            ripple: '#3a6a8a',
            highlight: '#5a9ac0'
        };

        // ===== CHECK IF DESTINATION IS CLAIMED =====
        async function checkDestinationClaimed() {
            try {
                // Only check if destination is a planet and not a hub return
                if (warpData.destPlanet && !warpData.isHubReturn) {
                    const claimed = await isPlanetClaimed(warpData.destPlanet);
                    
                    if (claimed) {
                        const claimData = await getPlanetClaim(warpData.destPlanet);
                        if (claimData) {
                            claimOwner.textContent = claimData.ownerName || 'Unknown';
                            claimFee.textContent = claimData.currentFee + '%';
                            claimInfoPanel.classList.add('visible');
                            console.log(`Destination planet ${warpData.destPlanet} is claimed by ${claimData.ownerName}`);
                        }
                    } else {
                        claimInfoPanel.classList.remove('visible');
                    }
                } else {
                    claimInfoPanel.classList.remove('visible');
                }
            } catch (error) {
                console.error('Error checking if destination is claimed:', error);
                claimInfoPanel.classList.remove('visible');
            }
        }

        // ===== LOAD WARP DATA =====
        async function loadWarpData() {
            try {
                const savedData = localStorage.getItem('voidfarer_warp_data');
                if (savedData) {
                    warpData = JSON.parse(savedData);
                    
                    // Ensure isHubReturn flag exists
                    if (warpData.isHubReturn === undefined) {
                        warpData.isHubReturn = false;
                    }
                } else {
                    // Fallback demo data
                    warpData = {
                        destination: 'Pyros-3',
                        destinationType: 'scorched',
                        startLocation: 'Earth',
                        startLocationType: 'planet',
                        totalDistance: 16.3,
                        warpCycles: 5,
                        fuelCost: 70,
                        returnPage: 'surface.html',
                        destSector: 'C4',
                        destRegion: 'The Fringe',
                        destStarSector: 'Tarantula Nebula',
                        destStar: 'Eta Carinae',
                        destPlanet: 'Pyros-3',
                        destPlanetType: 'scorched',
                        destPlanetResources: ['Iron', 'Sulfur', 'Gold', 'Uranium'],
                        isHubReturn: false
                    };
                }

                startName.textContent = warpData.startLocation || 'Unknown';
                destName.textContent = warpData.destination || 'Unknown';
                
                // Set destination icon based on type
                const destTypeStr = (warpData.destinationType || '').toLowerCase();
                if (destTypeStr.includes('gas')) {
                    destIcon.textContent = '🌪️';
                } else if (destTypeStr.includes('lush')) {
                    destIcon.textContent = '🌱';
                } else if (destTypeStr.includes('frozen') || destTypeStr.includes('ice')) {
                    destIcon.textContent = '❄️';
                } else if (destTypeStr.includes('scorched') || destTypeStr.includes('volcanic')) {
                    destIcon.textContent = '🔥';
                } else if (destTypeStr.includes('oceanic')) {
                    destIcon.textContent = '💧';
                } else if (destTypeStr.includes('toxic')) {
                    destIcon.textContent = '☣️';
                } else if (destTypeStr.includes('asteroid')) {
                    destIcon.textContent = '🪐';
                } else {
                    destIcon.textContent = '🪐';
                }
                
                fuelCostSpan.textContent = warpData.fuelCost;
                totalCyclesSpan.textContent = warpData.warpCycles;
                
                // Build destination path string
                let destString = '';
                if (warpData.destRegion) destString += warpData.destRegion + ' › ';
                if (warpData.destStarSector) destString += warpData.destStarSector + ' › ';
                if (warpData.destStar) destString += warpData.destStar + ' › ';
                destString += warpData.destination;
                destInfo.textContent = destString;

                // Show planet preview ONLY if this is a planet destination and NOT a hub return
                if (warpData.destPlanet && !warpData.isHubReturn) {
                    previewName.textContent = warpData.destPlanet;
                    
                    let typeDisplay = 'Unknown';
                    if (warpData.destPlanetType) {
                        const planetData = PLANET_TYPE_DATA[warpData.destPlanetType];
                        typeDisplay = planetData ? planetData.name : 
                            warpData.destPlanetType.charAt(0).toUpperCase() + warpData.destPlanetType.slice(1);
                    }
                    previewType.textContent = typeDisplay + ' Planet';
                    
                    // Set preview icon based on planet type
                    const planetType = warpData.destPlanetType || '';
                    if (planetType.includes('scorched') || planetType.includes('volcanic')) {
                        previewIcon.textContent = '🔥';
                    } else if (planetType.includes('frozen') || planetType.includes('ice')) {
                        previewIcon.textContent = '❄️';
                    } else if (planetType.includes('lush')) {
                        previewIcon.textContent = '🌱';
                    } else if (planetType.includes('barren')) {
                        previewIcon.textContent = '🪨';
                    } else if (planetType.includes('gas')) {
                        previewIcon.textContent = '🌪️';
                    } else if (planetType.includes('oceanic')) {
                        previewIcon.textContent = '💧';
                    } else if (planetType.includes('toxic')) {
                        previewIcon.textContent = '☣️';
                    } else if (planetType.includes('asteroid')) {
                        previewIcon.textContent = '🪐';
                    } else {
                        previewIcon.textContent = '🪐';
                    }
                    
                    planetPreview.classList.add('visible');
                } else {
                    planetPreview.classList.remove('visible');
                }

                // Check if destination is a claimed planet
                await checkDestinationClaimed();

                console.log('Warp data loaded:', warpData);

            } catch (error) {
                console.error('Error loading warp data:', error);
            }
        }

        // ===== RESIZE CANVASES =====
        function resizeCanvases() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            mapCanvas.width = window.innerWidth;
            mapCanvas.height = window.innerHeight;
            rippleCanvas.width = window.innerWidth;
            rippleCanvas.height = window.innerHeight;
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // ===== DRAW STARFIELD (subtle background) =====
        function drawStarfield(progress, speedFactor) {
            starfieldCtx.clearRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            const w = starfieldCanvas.width;
            const h = starfieldCanvas.height;
            
            stars.forEach(star => {
                const pulse = Math.sin(Date.now() * star.pulseSpeed + star.pulsePhase) * 0.2 + 0.8;
                const brightness = star.baseBrightness * pulse * 0.5;
                
                let x = star.x * w;
                let y = star.y * h;
                
                starfieldCtx.beginPath();
                starfieldCtx.fillStyle = star.color;
                starfieldCtx.globalAlpha = brightness;
                starfieldCtx.arc(x, y, star.size, 0, Math.PI * 2);
                starfieldCtx.fill();
            });
            
            starfieldCtx.globalAlpha = 1;
        }

        // ===== DRAW MAP (CENTER PIECE - enhanced) =====
        function drawMap(progress, speedFactor) {
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            const w = mapCanvas.width;
            const h = mapCanvas.height;
            
            // Draw star field in background of map
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.3 + 0.1;
                
                mapCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                mapCtx.beginPath();
                mapCtx.arc(x, y, size, 0, Math.PI * 2);
                mapCtx.fill();
            }
            
            // Draw path line (visible but elegant)
            mapCtx.beginPath();
            mapCtx.strokeStyle = 'rgba(74, 138, 192, 0.4)';
            mapCtx.lineWidth = 2;
            mapCtx.setLineDash([8, 12]);
            mapCtx.moveTo(startPos.x * w, startPos.y * h);
            mapCtx.lineTo(destPos.x * w, destPos.y * h);
            mapCtx.stroke();
            mapCtx.setLineDash([]);
            
            // Draw energy pulses along path (multiple)
            const pulseCount = 3;
            for (let i = 0; i < pulseCount; i++) {
                const pulsePos = (progress + i / pulseCount) % 1;
                const pulseX = startPos.x + (destPos.x - startPos.x) * pulsePos;
                const pulseY = startPos.y + (destPos.y - startPos.y) * pulsePos;
                
                mapCtx.beginPath();
                mapCtx.fillStyle = '#4affaa';
                mapCtx.shadowColor = '#4affaa';
                mapCtx.shadowBlur = 15;
                mapCtx.globalAlpha = 0.5 * (1 - pulsePos);
                mapCtx.arc(pulseX * w, pulseY * h, 6, 0, Math.PI * 2);
                mapCtx.fill();
            }
            
            // Draw start marker
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 20;
            mapCtx.fillStyle = '#4affaa';
            mapCtx.globalAlpha = 0.8;
            mapCtx.beginPath();
            mapCtx.arc(startPos.x * w, startPos.y * h, 10, 0, Math.PI * 2);
            mapCtx.fill();
            
            // Draw destination marker
            mapCtx.shadowColor = '#ffaa4a';
            mapCtx.shadowBlur = 20;
            mapCtx.fillStyle = '#ffaa4a';
            mapCtx.globalAlpha = 0.8;
            mapCtx.beginPath();
            mapCtx.arc(destPos.x * w, destPos.y * h, 10, 0, Math.PI * 2);
            mapCtx.fill();
            
            // If destination is claimed, add a crown indicator
            if (claimInfoPanel.classList.contains('visible')) {
                const crownX = destPos.x * w;
                const crownY = (destPos.y * h) - 25;
                
                mapCtx.shadowColor = 'gold';
                mapCtx.shadowBlur = 15;
                mapCtx.font = '20px "Exo 2", sans-serif';
                mapCtx.fillStyle = 'gold';
                mapCtx.globalAlpha = 0.9;
                mapCtx.fillText('👑', crownX - 10, crownY);
            }
            
            // Draw ship with trail
            const shipX = shipPos.x * w;
            const shipY = shipPos.y * h;
            
            // Ship trail
            const trailLength = 15;
            for (let i = 1; i <= trailLength; i++) {
                const trailFactor = i / trailLength;
                const trailX = shipX - (destPos.x - startPos.x) * w * speedFactor * trailFactor * 0.3;
                const trailY = shipY - (destPos.y - startPos.y) * h * speedFactor * trailFactor * 0.3;
                
                mapCtx.beginPath();
                mapCtx.fillStyle = '#4affaa';
                mapCtx.shadowColor = '#4affaa';
                mapCtx.shadowBlur = 10 * (1 - trailFactor);
                mapCtx.globalAlpha = 0.2 * (1 - trailFactor);
                mapCtx.arc(trailX, trailY, 5 * (1 - trailFactor), 0, Math.PI * 2);
                mapCtx.fill();
            }
            
            // Ship
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 30;
            mapCtx.fillStyle = '#ffffff';
            mapCtx.globalAlpha = 1;
            mapCtx.beginPath();
            mapCtx.moveTo(shipX, shipY - 12);
            mapCtx.lineTo(shipX + 10, shipY + 6);
            mapCtx.lineTo(shipX, shipY + 2);
            mapCtx.lineTo(shipX - 10, shipY + 6);
            mapCtx.closePath();
            mapCtx.fill();
            
            mapCtx.shadowBlur = 0;
            mapCtx.globalAlpha = 1;
        }

        // ===== UPDATE SHIP POSITION =====
        function updateShipPosition(progress) {
            shipPos.x = startPos.x + (destPos.x - startPos.x) * progress;
            shipPos.y = startPos.y + (destPos.y - startPos.y) * progress;
        }

        // ===== GET SPEED FACTOR =====
        function getSpeedFactor(cycleProgress) {
            if (cycleProgress < 0.2) {
                return 0.3 + (cycleProgress / 0.2) * 0.7;
            } else if (cycleProgress > 0.8) {
                return 1.0 - ((cycleProgress - 0.8) / 0.2) * 0.7;
            } else {
                return 1.0;
            }
        }

        // ===== WATER RIPPLE EFFECT =====
        function showWaterRipple() {
            return new Promise((resolve) => {
                starfieldCanvas.style.transition = 'opacity 0.5s';
                mapCanvas.style.transition = 'opacity 0.5s';
                starfieldCanvas.style.opacity = '0.2';
                mapCanvas.style.opacity = '0.2';
                
                rippleCanvas.style.display = 'block';
                rippleCanvas.style.opacity = '0';
                rippleCanvas.style.transition = 'opacity 0.5s';
                
                rippleCanvas.offsetHeight;
                rippleCanvas.style.opacity = '1';
                
                const startTime = Date.now();
                const duration = 3000;
                
                function drawRipple() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    rippleCtx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                    
                    const centerX = rippleCanvas.width / 2;
                    const centerY = rippleCanvas.height / 2;
                    
                    rippleCtx.fillStyle = waterColors.deep;
                    rippleCtx.fillRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                    
                    const ringSize = 50 + progress * 400;
                    const opacity = Math.max(0, 1 - progress * 0.3);
                    
                    for (let i = 0; i < 5; i++) {
                        const offset = i * 20;
                        const rippleSize = ringSize - offset;
                        if (rippleSize < 20) continue;
                        
                        const ringOpacity = opacity * (1 - i * 0.15);
                        
                        rippleCtx.beginPath();
                        rippleCtx.arc(centerX, centerY, rippleSize, 0, Math.PI * 2);
                        rippleCtx.strokeStyle = `rgba(90, 154, 192, ${ringOpacity})`;
                        rippleCtx.lineWidth = 4 - i * 0.7;
                        rippleCtx.stroke();
                        
                        rippleCtx.beginPath();
                        rippleCtx.arc(centerX, centerY, rippleSize - 5, 0, Math.PI * 2);
                        rippleCtx.strokeStyle = `rgba(160, 200, 255, ${ringOpacity * 0.6})`;
                        rippleCtx.lineWidth = 2;
                        rippleCtx.stroke();
                    }
                    
                    const splashSize = 30 * (1 - progress * 0.3);
                    
                    const gradient = rippleCtx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, splashSize * 4
                    );
                    gradient.addColorStop(0, `rgba(100, 180, 220, ${opacity})`);
                    gradient.addColorStop(0.3, `rgba(50, 120, 170, ${opacity * 0.7})`);
                    gradient.addColorStop(0.7, `rgba(20, 60, 100, ${opacity * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    rippleCtx.fillStyle = gradient;
                    rippleCtx.beginPath();
                    rippleCtx.arc(centerX, centerY, splashSize * 4, 0, Math.PI * 2);
                    rippleCtx.fill();
                    
                    for (let i = 0; i < 20; i++) {
                        const angle = (i / 20) * Math.PI * 2 + (elapsed * 0.002);
                        const distance = ringSize * 0.9 + Math.sin(elapsed * 0.01 + i) * 15;
                        const x = centerX + Math.cos(angle) * distance;
                        const y = centerY + Math.sin(angle) * distance;
                        
                        const dropletOpacity = opacity * 0.4 * (1 - Math.abs(distance - ringSize) / 100);
                        
                        rippleCtx.beginPath();
                        rippleCtx.fillStyle = `rgba(140, 200, 255, ${dropletOpacity})`;
                        rippleCtx.arc(x, y, 3 + Math.sin(elapsed * 0.01 + i) * 1.5, 0, Math.PI * 2);
                        rippleCtx.fill();
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(drawRipple);
                    } else {
                        setTimeout(() => {
                            rippleCanvas.style.opacity = '0';
                            setTimeout(() => {
                                rippleCanvas.style.display = 'none';
                                starfieldCanvas.style.opacity = '1';
                                mapCanvas.style.opacity = '1';
                                resolve();
                            }, 500);
                        }, 500);
                    }
                }
                
                drawRipple();
            });
        }

        // ===== UPDATE CYCLE =====
        async function updateCycle() {
            if (warpComplete) return;
            
            const elapsed = Date.now() - startTime;
            const totalDuration = warpData.warpCycles * CYCLE_DURATION;
            const progress = Math.min(elapsed / totalDuration, 1);

            const cycleElapsed = elapsed % CYCLE_DURATION;
            const cycleProgress = cycleElapsed / CYCLE_DURATION;
            const speedFactor = getSpeedFactor(cycleProgress);

            const newCycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
            if (newCycle <= warpData.warpCycles && newCycle !== currentCycle) {
                currentCycle = newCycle;
                currentCycleSpan.textContent = currentCycle;
                
                statusMessage.textContent = getStatusMessage(progress);
                statusMessage.classList.add('visible');
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 800);
            }

            updateShipPosition(progress);
            drawStarfield(progress, speedFactor);
            drawMap(progress, speedFactor);
            
            progressPercent.textContent = Math.round(progress * 100) + '%';

            if (elapsed >= totalDuration && !warpComplete) {
                warpComplete = true;
                await showWaterRipple();
                completeWarp();
            }
        }

        // ===== GET STATUS MESSAGE =====
        function getStatusMessage(progress) {
            if (progress < 0.1) return 'INITIATING WARP';
            if (progress < 0.2) return 'ACCELERATING';
            if (progress < 0.3) return 'LEAVING SYSTEM';
            if (progress < 0.4) return 'INTERSTELLAR VOID';
            if (progress < 0.5) return 'CROSSING NEBULA';
            if (progress < 0.6) return 'MAXIMUM WARP';
            if (progress < 0.7) return 'PASSING PULSAR';
            if (progress < 0.8) return 'APPROACHING';
            if (progress < 0.9) return 'DECELERATING';
            if (progress < 1) return 'FINAL APPROACH';
            return 'ARRIVING';
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            updateCycle();
            animationFrame = requestAnimationFrame(animate);
        }

        // ===== COMPLETE WARP =====
        function completeWarp() {
            console.log('Warp complete! Destination:', warpData.destination);
            console.log('Is hub return:', warpData.isHubReturn);
            
            // Update galactic sector (always update these)
            if (warpData.destSector) {
                localStorage.setItem('voidfarer_current_sector', warpData.destSector);
            }
            if (warpData.destRegion) {
                localStorage.setItem('voidfarer_current_region', warpData.destRegion);
            }
            
            // Update star sector (always update these)
            if (warpData.destStarSector) {
                localStorage.setItem('voidfarer_current_starSector', warpData.destStarSector);
                localStorage.setItem('voidfarer_current_sector_name', warpData.destStarSector);
            }
            
            // Update star (always update these)
            if (warpData.destStar) {
                localStorage.setItem('voidfarer_current_star', warpData.destStar);
            }
            
            // CRITICAL: Only set planet data if this is NOT a hub return
            // This prevents Earth Hub from getting planet data
            if (!warpData.isHubReturn && warpData.destPlanet) {
                console.log('Setting planet data for surface landing:', warpData.destPlanet);
                
                localStorage.setItem('voidfarer_current_planet', warpData.destPlanet);
                localStorage.setItem('voidfarer_current_planet_name', warpData.destPlanet);
                
                if (warpData.destPlanetType) {
                    localStorage.setItem('voidfarer_current_planet_type', warpData.destPlanetType);
                }
                
                if (warpData.destPlanetResources && warpData.destPlanetResources.length > 0) {
                    localStorage.setItem('voidfarer_current_planet_resources', 
                        JSON.stringify(warpData.destPlanetResources));
                    console.log('Saved planet resources:', warpData.destPlanetResources);
                } else {
                    // Fallback resources based on planet type
                    const fallbackResources = getFallbackResources(warpData.destPlanetType);
                    localStorage.setItem('voidfarer_current_planet_resources', 
                        JSON.stringify(fallbackResources));
                    console.log('Saved fallback resources:', fallbackResources);
                }
                
                // Set planet image based on type
                setPlanetImage(warpData.destPlanetType);
            } else if (warpData.isHubReturn) {
                console.log('Hub return detected - clearing any planet data');
                // Clear any existing planet data to ensure clean state for hub
                localStorage.removeItem('voidfarer_current_planet');
                localStorage.removeItem('voidfarer_current_planet_name');
                localStorage.removeItem('voidfarer_current_planet_type');
                localStorage.removeItem('voidfarer_current_planet_resources');
                localStorage.removeItem('voidfarer_current_planet_image');
                localStorage.removeItem('voidfarer_warp_destination_planet');
                localStorage.removeItem('voidfarer_warp_destination_planet_type');
            }
            
            // Clear warp data
            localStorage.removeItem('voidfarer_warp_data');
            
            // Navigate to return page
            const destinationPage = warpData.returnPage || 'surface.html';
            console.log('Navigating to:', destinationPage);
            window.location.href = destinationPage;
        }

        // ===== GET FALLBACK RESOURCES BY PLANET TYPE =====
        function getFallbackResources(planetType) {
            const fallbackPools = {
                'scorched': ['Iron', 'Sulfur', 'Copper', 'Gold'],
                'volcanic': ['Iron', 'Sulfur', 'Copper', 'Gold'],
                'barren': ['Iron', 'Silicon', 'Aluminum', 'Titanium'],
                'lush': ['Carbon', 'Oxygen', 'Hydrogen', 'Silicon'],
                'frozen': ['Hydrogen', 'Helium', 'Oxygen', 'Methane'],
                'ice': ['Hydrogen', 'Helium', 'Oxygen', 'Methane'],
                'gas': ['Hydrogen', 'Helium', 'Methane', 'Ammonia'],
                'oceanic': ['Hydrogen', 'Oxygen', 'Sodium', 'Chlorine'],
                'toxic': ['Sulfur', 'Chlorine', 'Mercury', 'Arsenic'],
                'asteroid': ['Iron', 'Nickel', 'Cobalt', 'Platinum']
            };
            
            return fallbackPools[planetType] || ['Iron', 'Carbon', 'Silicon'];
        }

        // ===== SET PLANET IMAGE BASED ON TYPE =====
        function setPlanetImage(planetType) {
            let imageFile = 'earth-view.jpg';
            
            if (planetType.includes('scorched') || planetType.includes('volcanic')) {
                imageFile = 'pyros-surface.jpg';
            } else if (planetType.includes('frozen') || planetType.includes('ice')) {
                imageFile = 'glacier-surface.jpg';
            } else if (planetType.includes('lush')) {
                imageFile = 'verdant-surface.jpg';
            } else if (planetType.includes('barren')) {
                imageFile = 'barren-surface.jpg';
            } else if (planetType.includes('gas')) {
                imageFile = 'gas-surface.jpg';
            } else if (planetType.includes('oceanic')) {
                imageFile = 'oceanic-surface.jpg';
            } else if (planetType.includes('toxic')) {
                imageFile = 'toxic-surface.jpg';
            } else if (planetType.includes('asteroid')) {
                imageFile = 'asteroid-field.jpg';
            }
            
            localStorage.setItem('voidfarer_current_planet_image', imageFile);
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                await loadWarpData();
                
                startPos = { x: 0.15, y: 0.5 + (Math.random() * 0.2 - 0.1) };
                destPos = { x: 0.85, y: 0.5 + (Math.random() * 0.2 - 0.1) };
                shipPos = { ...startPos };
                
                drawStarfield(0, 0);
                drawMap(0, 0);
                
                setTimeout(() => {
                    statusMessage.classList.add('visible');
                    setTimeout(() => {
                        statusMessage.classList.remove('visible');
                    }, 2000);
                }, 100);

                animate();

            } catch (error) {
                console.error('Init error:', error);
                animate();
            }
        }

        init();

        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
</body>
