<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Warp Drive</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .warp-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* Starfield canvas (background) */
        #starfieldCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Map canvas (overlay with path and ship) */
        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Route Info Panel */
        .route-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #4a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 15px;
            color: white;
            min-width: 200px;
            z-index: 30;
            pointer-events: none;
        }
        
        .route-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            color: #ffd966;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .route-point {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            font-size: 12px;
        }
        
        .route-icon {
            font-size: 16px;
            min-width: 24px;
        }
        
        .route-name {
            flex: 1;
            color: #ffffff;
        }
        
        .route-distance {
            color: #4affaa;
            font-size: 11px;
        }
        
        .route-divider {
            height: 15px;
            width: 2px;
            background: linear-gradient(180deg, #4a8ac0, transparent);
            margin-left: 12px;
        }
        
        /* Destination Info */
        .destination-info {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            text-align: right;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #ffaa4a;
            border-radius: 40px 15px 40px 15px;
            padding: 15px 25px;
            z-index: 30;
        }
        
        .destination-name {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #ffaa4a;
            text-shadow: 0 0 20px #ffaa4a;
        }
        
        .destination-type {
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            color: #a0c0ff;
            margin-top: 5px;
        }
        
        /* Journey Stats */
        .journey-stats {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #4a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 12px 20px;
            color: white;
            z-index: 30;
        }
        
        .stat-row {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        
        .stat-label {
            color: #a0c0ff;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Cycle Info */
        .cycle-info {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 50px);
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #4a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 12px 20px;
            color: white;
            text-align: center;
            z-index: 30;
        }
        
        .cycle-current {
            font-size: 32px;
            font-weight: 700;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
        }
        
        .cycle-total {
            font-size: 18px;
            color: #a0c0ff;
        }
        
        .cycle-label {
            font-size: 12px;
            color: #a0c0ff;
            margin-top: 5px;
        }
        
        /* Status Message */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #4affaa;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 20px #4affaa;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .status-message.visible {
            opacity: 1;
        }
        
        /* Skip Button */
        .skip-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 50;
            min-width: 150px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        
        .skip-btn:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        .skip-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        @supports (padding: max(0px)) {
            .route-panel { top: max(20px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); }
            .destination-info { top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); }
            .journey-stats { bottom: max(100px, env(safe-area-inset-bottom) + 50px); left: max(20px, env(safe-area-inset-left)); }
            .cycle-info { bottom: max(100px, env(safe-area-inset-bottom) + 50px); right: max(20px, env(safe-area-inset-right)); }
            .skip-btn { bottom: max(30px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="warp-container">
        <!-- Starfield background -->
        <canvas id="starfieldCanvas"></canvas>
        
        <!-- Map overlay with path and ship -->
        <canvas id="mapCanvas"></canvas>
        
        <div class="warp-overlay">
            <!-- Route Info Panel -->
            <div class="route-panel">
                <div class="route-title">✦ JOURNEY ROUTE ✦</div>
                <div id="routeList">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <!-- Destination Info -->
            <div class="destination-info">
                <div class="destination-name" id="destinationName">Loading...</div>
                <div class="destination-type" id="destinationType">planetary landing</div>
            </div>
            
            <!-- Journey Stats -->
            <div class="journey-stats">
                <div class="stat-row">
                    <span class="stat-label">Distance:</span>
                    <span class="stat-value" id="totalDistance">0</span>
                    <span class="stat-label">LY</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Fuel:</span>
                    <span class="stat-value" id="fuelCost">0</span>
                    <span class="stat-label">⭐</span>
                </div>
            </div>
            
            <!-- Cycle Info -->
            <div class="cycle-info">
                <div>
                    <span class="cycle-current" id="currentCycle">1</span>
                    <span class="cycle-total">/<span id="totalCycles">1</span></span>
                </div>
                <div class="cycle-label">WARP CYCLES</div>
            </div>
            
            <!-- Status Message -->
            <div class="status-message" id="statusMessage">INITIATING WARP</div>
            
            <!-- Skip Button -->
            <button class="skip-btn" id="skipBtn" onclick="skipWarp()">SKIP WARP</button>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== CANVAS ELEMENTS =====
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapCtx = mapCanvas.getContext('2d');

        // ===== DOM ELEMENTS =====
        const skipBtn = document.getElementById('skipBtn');
        const statusMessage = document.getElementById('statusMessage');
        const currentCycleSpan = document.getElementById('currentCycle');
        const totalCyclesSpan = document.getElementById('totalCycles');
        const destinationName = document.getElementById('destinationName');
        const destinationType = document.getElementById('destinationType');
        const totalDistanceSpan = document.getElementById('totalDistance');
        const fuelCostSpan = document.getElementById('fuelCost');
        const routeList = document.getElementById('routeList');

        // ===== WARP STATE =====
        let destination = 'Unknown';
        let returnPage = 'galaxy-map.html';
        let cycles = 1;
        let distance = 0;
        let fuel = 0;
        let currentCycle = 1;
        let animationFrame;
        let startTime = Date.now();
        const CYCLE_DURATION = 2000; // 2 seconds per cycle

        // ===== ROUTE DATA =====
        let waypoints = [];
        let shipPosition = { x: 0, y: 0 };
        let shipTarget = { x: 0, y: 0 };

        // ===== STARS FOR BACKGROUND =====
        const stars = [];
        const STAR_COUNT = 300;

        // Initialize stars
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2 + 1,
                brightness: Math.random() * 0.5 + 0.3
            });
        }

        // ===== LOAD WARP DATA =====
        async function loadWarpData() {
            try {
                // Get warp data from storage
                let warpData;
                if (typeof getWarpData === 'function') {
                    warpData = await getWarpData();
                } else {
                    warpData = {
                        destination: localStorage.getItem('voidfarer_warp_destination') || 'Unknown',
                        returnPage: localStorage.getItem('voidfarer_warp_return') || 'galaxy-map.html',
                        cycles: parseInt(localStorage.getItem('voidfarer_warp_cycles')) || 1,
                        distance: parseFloat(localStorage.getItem('voidfarer_warp_distance')) || 0,
                        fuel: parseInt(localStorage.getItem('voidfarer_warp_fuel')) || 0
                    };
                }
                
                destination = warpData.destination;
                returnPage = warpData.returnPage;
                cycles = warpData.cycles || 1;
                distance = warpData.distance || 0;
                fuel = warpData.fuel || 0;

                // Load waypoints
                const waypointsData = localStorage.getItem('voidfarer_warp_waypoints');
                if (waypointsData) {
                    waypoints = JSON.parse(waypointsData);
                } else {
                    // Create default waypoints for demo
                    createDefaultWaypoints();
                }

                // Update UI
                destinationName.textContent = destination;
                totalCyclesSpan.textContent = cycles;
                totalDistanceSpan.textContent = distance.toFixed(1);
                fuelCostSpan.textContent = fuel;
                
                // Set destination type
                if (destination.includes('Surface') || waypoints.some(w => w.type === 'planet' && w.isDestination)) {
                    destinationType.textContent = 'planetary landing';
                } else if (destination.includes('System')) {
                    destinationType.textContent = 'star system approach';
                } else {
                    destinationType.textContent = 'interstellar travel';
                }

                // Render route list
                renderRouteList();

                // Initialize ship position at start
                if (waypoints.length >= 2) {
                    shipPosition = { ...waypoints[0].position };
                    shipTarget = { ...waypoints[1].position };
                }

                // Use fuel
                if (fuel > 0 && typeof useFuel === 'function') {
                    useFuel(fuel);
                }

            } catch (error) {
                console.error('Error loading warp data:', error);
                createDefaultWaypoints();
            }
        }

        // ===== CREATE DEFAULT WAYPOINTS =====
        function createDefaultWaypoints() {
            waypoints = [
                { 
                    name: 'Sol System', 
                    type: 'system', 
                    icon: '🪐',
                    position: { x: 0.2, y: 0.5 },
                    description: 'Departure point'
                },
                { 
                    name: 'Interstellar Space', 
                    type: 'void', 
                    icon: '✨',
                    position: { x: 0.4, y: 0.4 },
                    description: 'Crossing the void'
                },
                { 
                    name: 'Orion Nebula', 
                    type: 'nebula', 
                    icon: '🌌',
                    position: { x: 0.6, y: 0.6 },
                    description: 'Star-forming region'
                },
                { 
                    name: 'Pyros System', 
                    type: 'system', 
                    icon: '🔥',
                    position: { x: 0.8, y: 0.5 },
                    description: 'Approaching destination'
                },
                { 
                    name: 'Pyros', 
                    type: 'planet', 
                    icon: '🪨',
                    position: { x: 0.9, y: 0.5 },
                    isDestination: true,
                    description: 'Final destination'
                }
            ];
        }

        // ===== RENDER ROUTE LIST =====
        function renderRouteList() {
            routeList.innerHTML = '';
            
            waypoints.forEach((wp, index) => {
                const isDestination = index === waypoints.length - 1;
                
                const item = document.createElement('div');
                item.className = 'route-point';
                item.id = `waypoint-${index}`;
                
                item.innerHTML = `
                    <span class="route-icon">${wp.icon || '●'}</span>
                    <span class="route-name">${wp.name}</span>
                    <span class="route-distance">${wp.distance ? wp.distance.toFixed(1) + ' LY' : ''}</span>
                `;
                
                routeList.appendChild(item);
                
                // Add divider between waypoints
                if (index < waypoints.length - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'route-divider';
                    routeList.appendChild(divider);
                }
            });
        }

        // ===== RESIZE CANVASES =====
        function resizeCanvases() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            mapCanvas.width = window.innerWidth;
            mapCanvas.height = window.innerHeight;
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // ===== DRAW STATIC STARFIELD =====
        function drawStarfield() {
            starfieldCtx.clearRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            stars.forEach(star => {
                starfieldCtx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                starfieldCtx.beginPath();
                starfieldCtx.arc(
                    star.x * starfieldCanvas.width,
                    star.y * starfieldCanvas.height,
                    star.size,
                    0,
                    Math.PI * 2
                );
                starfieldCtx.fill();
            });
        }

        // ===== DRAW MAP WITH PATH AND SHIP =====
        function drawMap() {
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            const w = mapCanvas.width;
            const h = mapCanvas.height;
            
            // Draw faint grid lines
            mapCtx.strokeStyle = 'rgba(74, 138, 192, 0.1)';
            mapCtx.lineWidth = 1;
            
            // Vertical lines
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * w;
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
            }
            
            // Horizontal lines
            for (let i = 0; i <= 10; i++) {
                const y = (i / 10) * h;
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }
            
            // Draw path line
            if (waypoints.length >= 2) {
                mapCtx.beginPath();
                mapCtx.strokeStyle = '#4a8ac0';
                mapCtx.lineWidth = 2;
                mapCtx.setLineDash([5, 5]);
                
                mapCtx.moveTo(waypoints[0].position.x * w, waypoints[0].position.y * h);
                for (let i = 1; i < waypoints.length; i++) {
                    mapCtx.lineTo(waypoints[i].position.x * w, waypoints[i].position.y * h);
                }
                mapCtx.stroke();
                mapCtx.setLineDash([]);
            }
            
            // Draw waypoints
            waypoints.forEach((wp, index) => {
                const x = wp.position.x * w;
                const y = wp.position.y * h;
                
                // Draw outer glow
                mapCtx.shadowColor = index === waypoints.length - 1 ? '#ffaa4a' : '#4a8ac0';
                mapCtx.shadowBlur = 20;
                
                // Draw waypoint marker
                mapCtx.beginPath();
                if (index === 0) {
                    // Start point - green
                    mapCtx.fillStyle = '#4affaa';
                    mapCtx.arc(x, y, 8, 0, Math.PI * 2);
                } else if (index === waypoints.length - 1) {
                    // Destination - orange
                    mapCtx.fillStyle = '#ffaa4a';
                    mapCtx.arc(x, y, 10, 0, Math.PI * 2);
                } else {
                    // Intermediate - blue
                    mapCtx.fillStyle = '#4a8ac0';
                    mapCtx.arc(x, y, 6, 0, Math.PI * 2);
                }
                mapCtx.fill();
                
                // Reset shadow
                mapCtx.shadowBlur = 0;
                
                // Draw label
                mapCtx.font = '12px "Exo 2", sans-serif';
                mapCtx.fillStyle = '#ffffff';
                mapCtx.shadowColor = '#000';
                mapCtx.shadowBlur = 4;
                mapCtx.fillText(wp.name, x + 15, y - 10);
                mapCtx.shadowBlur = 0;
            });
            
            // Draw ship (moving)
            const shipX = shipPosition.x * w;
            const shipY = shipPosition.y * h;
            
            // Ship glow
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 30;
            
            // Draw ship
            mapCtx.fillStyle = '#ffffff';
            mapCtx.beginPath();
            mapCtx.moveTo(shipX, shipY - 12);
            mapCtx.lineTo(shipX + 8, shipY + 6);
            mapCtx.lineTo(shipX, shipY + 2);
            mapCtx.lineTo(shipX - 8, shipY + 6);
            mapCtx.closePath();
            mapCtx.fill();
            
            // Reset shadow
            mapCtx.shadowBlur = 0;
        }

        // ===== UPDATE SHIP POSITION =====
        function updateShipPosition(progress) {
            if (waypoints.length < 2) return;
            
            // Calculate which segment we're in
            const totalSegments = waypoints.length - 1;
            const segmentProgress = progress * totalSegments;
            const currentSegment = Math.floor(segmentProgress);
            const segmentFraction = segmentProgress - currentSegment;
            
            if (currentSegment < totalSegments) {
                const start = waypoints[currentSegment].position;
                const end = waypoints[currentSegment + 1].position;
                
                // Interpolate position
                shipPosition.x = start.x + (end.x - start.x) * segmentFraction;
                shipPosition.y = start.y + (end.y - start.y) * segmentFraction;
                
                // Highlight current segment in route list
                highlightCurrentSegment(currentSegment);
            }
        }

        // ===== HIGHLIGHT CURRENT SEGMENT =====
        function highlightCurrentSegment(segmentIndex) {
            document.querySelectorAll('.route-point').forEach((el, index) => {
                el.style.opacity = index <= segmentIndex ? '1' : '0.5';
            });
        }

        // ===== UPDATE CYCLE =====
        function updateCycle() {
            const elapsed = Date.now() - startTime;
            const totalDuration = cycles * CYCLE_DURATION;
            const progress = Math.min(elapsed / totalDuration, 1);

            // Calculate current cycle
            const newCycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
            if (newCycle <= cycles && newCycle !== currentCycle) {
                currentCycle = newCycle;
                currentCycleSpan.textContent = currentCycle;
                
                // Update status message
                statusMessage.textContent = getStatusMessage(currentCycle, cycles);
                statusMessage.classList.add('visible');
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 800);

                // Haptic feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            }

            // Update ship position
            updateShipPosition(progress);

            // Redraw map
            drawMap();

            // Check if warp complete
            if (elapsed >= totalDuration) {
                completeWarp();
            }

            return progress;
        }

        // ===== GET STATUS MESSAGE =====
        function getStatusMessage(cycle, total) {
            const progress = cycle / total;
            if (progress < 0.2) return 'DEPARTING';
            if (progress < 0.4) return 'INTERSTELLAR TRANSIT';
            if (progress < 0.6) return 'CROSSING NEBULA';
            if (progress < 0.8) return 'APPROACHING SYSTEM';
            if (progress < 1) return 'FINAL APPROACH';
            return 'ARRIVING';
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            const progress = updateCycle();
            drawStarfield();
            
            animationFrame = requestAnimationFrame(animate);
        }

        // ===== COMPLETE WARP =====
        function completeWarp() {
            // Clear warp data
            if (typeof clearWarpData === 'function') {
                clearWarpData();
            } else {
                localStorage.removeItem('voidfarer_warp_destination');
                localStorage.removeItem('voidfarer_warp_return');
                localStorage.removeItem('voidfarer_warp_cycles');
                localStorage.removeItem('voidfarer_warp_distance');
                localStorage.removeItem('voidfarer_warp_fuel');
                localStorage.removeItem('voidfarer_warp_waypoints');
            }

            window.location.href = returnPage;
        }

        // ===== SKIP WARP =====
        function skipWarp() {
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            skipBtn.classList.add('hidden');
            completeWarp();
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                await loadWarpData();
                
                // Draw initial map
                drawMap();
                drawStarfield();
                
                // Start animation
                setTimeout(() => {
                    statusMessage.classList.add('visible');
                    setTimeout(() => {
                        statusMessage.classList.remove('visible');
                    }, 2000);
                }, 100);

                animate();

            } catch (error) {
                console.error('Init error:', error);
                animate();
            }
        }

        init();

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
</html>
