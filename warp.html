<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Warp Drive</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .warp-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* Starfield canvas */
        #starfieldCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Map canvas */
        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        /* Ripple canvas - appears at the end */
        #rippleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Journey Panel - keeps start/destination info */
        .journey-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #4a8ac0;
            border-radius: 40px 12px 40px 12px;
            padding: 10px 20px;
            color: white;
            min-width: 280px;
            z-index: 30;
            pointer-events: none;
            text-align: center;
        }
        
        .journey-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            color: #a0c0ff;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        
        .journey-points {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .point {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .point-icon {
            font-size: 24px;
        }
        
        .point-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            font-weight: 500;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .point-type {
            font-size: 9px;
            color: #a0c0ff;
        }
        
        .start-point .point-name {
            color: #4affaa;
        }
        
        .destination-point .point-name {
            color: #ffaa4a;
        }
        
        .journey-arrow {
            font-size: 18px;
            color: #4a8ac0;
            animation: pulse-arrow 2s infinite;
        }
        
        @keyframes pulse-arrow {
            0% { opacity: 0.5; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(3px); }
            100% { opacity: 0.5; transform: translateX(0); }
        }
        
        /* Stats Panel - minimal */
        .stats-panel {
            position: absolute;
            bottom: max(120px, env(safe-area-inset-bottom) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #4a8ac0;
            border-radius: 20px 6px 20px 6px;
            padding: 8px 12px;
            color: white;
            z-index: 30;
            min-width: 100px;
            font-size: 12px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            font-size: 11px;
        }
        
        .stat-label {
            color: #a0c0ff;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 500;
        }
        
        /* Cycle Panel - main focus */
        .cycle-panel {
            position: absolute;
            bottom: max(120px, env(safe-area-inset-bottom) + 50px);
            right: 20px;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            border-radius: 30px 8px 30px 8px;
            padding: 12px 18px;
            color: white;
            z-index: 30;
            text-align: center;
            min-width: 100px;
        }
        
        .cycle-current {
            font-size: 32px;
            font-weight: 700;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            line-height: 1;
            text-shadow: 0 0 15px #4affaa;
        }
        
        .cycle-total {
            font-size: 16px;
            color: #a0c0ff;
        }
        
        .cycle-label {
            font-size: 10px;
            color: #a0c0ff;
            margin-top: 3px;
            letter-spacing: 1px;
        }
        
        /* Status Message - center screen */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 40px 12px 40px 12px;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 15px #4affaa;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 1px;
        }
        
        .status-message.visible {
            opacity: 1;
        }
        
        /* Destination info - small at bottom */
        .dest-info {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid #4a8ac0;
            border-radius: 20px 5px 20px 5px;
            padding: 4px 12px;
            color: #a0c0ff;
            font-size: 9px;
            z-index: 20;
            white-space: nowrap;
        }
        
        @supports (padding: max(0px)) {
            .journey-panel { top: max(20px, env(safe-area-inset-top)); }
            .stats-panel { bottom: max(120px, env(safe-area-inset-bottom) + 50px); left: max(20px, env(safe-area-inset-left)); }
            .cycle-panel { bottom: max(120px, env(safe-area-inset-bottom) + 50px); right: max(20px, env(safe-area-inset-right)); }
            .dest-info { bottom: max(20px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="warp-container">
        <!-- Starfield canvas -->
        <canvas id="starfieldCanvas"></canvas>
        
        <!-- Map canvas -->
        <canvas id="mapCanvas"></canvas>
        
        <!-- Ripple canvas - appears at the end -->
        <canvas id="rippleCanvas"></canvas>
        
        <div class="warp-overlay">
            <!-- Journey Panel (minimal - just shows start and destination) -->
            <div class="journey-panel">
                <div class="journey-title">✦ COURSE ✦</div>
                <div class="journey-points">
                    <div class="point start-point">
                        <span class="point-icon">🚀</span>
                        <span class="point-name" id="startName">Loading...</span>
                        <span class="point-type" id="startType">origin</span>
                    </div>
                    <span class="journey-arrow">→</span>
                    <div class="point destination-point">
                        <span class="point-icon" id="destIcon">🪐</span>
                        <span class="point-name" id="destName">Loading...</span>
                        <span class="point-type" id="destType">destination</span>
                    </div>
                </div>
            </div>
            
            <!-- Stats Panel (minimal - only fuel and progress) -->
            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">Fuel:</span>
                    <span class="stat-value" id="fuelCost">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Progress:</span>
                    <span class="stat-value" id="progressPercent">0%</span>
                </div>
            </div>
            
            <!-- Cycle Panel (main focus) -->
            <div class="cycle-panel">
                <div>
                    <span class="cycle-current" id="currentCycle">1</span>
                    <span class="cycle-total">/<span id="totalCyclesDisplay">1</span></span>
                </div>
                <div class="cycle-label">WARP CYCLES</div>
            </div>
            
            <!-- Destination Info (small) -->
            <div class="dest-info" id="destInfo">
                <span id="destLocation">Destination: </span>
            </div>
            
            <!-- Status Message (center screen) -->
            <div class="status-message" id="statusMessage">INITIATING WARP</div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>

    <script>
        // ===== CANVAS ELEMENTS =====
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapCtx = mapCanvas.getContext('2d');
        const rippleCanvas = document.getElementById('rippleCanvas');
        const rippleCtx = rippleCanvas.getContext('2d');

        // ===== DOM ELEMENTS =====
        const statusMessage = document.getElementById('statusMessage');
        const currentCycleSpan = document.getElementById('currentCycle');
        const totalCyclesSpan = document.getElementById('totalCyclesDisplay');
        const startName = document.getElementById('startName');
        const startType = document.getElementById('startType');
        const destName = document.getElementById('destName');
        const destType = document.getElementById('destType');
        const destIcon = document.getElementById('destIcon');
        const fuelCostSpan = document.getElementById('fuelCost');
        const progressPercent = document.getElementById('progressPercent');
        const destInfo = document.getElementById('destLocation');

        // ===== WARP STATE =====
        let warpData = {
            destination: 'Unknown',
            destinationType: 'planet',
            startLocation: 'Unknown System',
            startLocationType: 'star system',
            totalDistance: 0,
            warpCycles: 1,
            fuelCost: 0,
            returnPage: 'surface.html',
            destSector: null,
            destRegion: null,
            destStarSector: null,
            destStar: null,
            destPlanet: null,
            destPlanetType: null,
            destPlanetResources: null
        };
        
        let currentCycle = 1;
        let animationFrame;
        let startTime = Date.now();
        const CYCLE_DURATION = 2000;
        let warpComplete = false;

        // ===== MAP POSITIONS =====
        let startPos = { x: 0.2, y: 0.5 };
        let destPos = { x: 0.8, y: 0.5 };
        let shipPos = { x: 0.2, y: 0.5 };

        // ===== STARS FOR BACKGROUND =====
        const stars = [];
        const STAR_COUNT = 400;

        const starColors = [
            '#ffffff', '#ffe6b0', '#b0e0ff', '#ffb0b0', '#e0b0ff', '#b0ffb0'
        ];

        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                z: Math.random() * 1000,
                size: Math.random() * 2 + 0.5,
                baseBrightness: Math.random() * 0.7 + 0.3,
                color: starColors[Math.floor(Math.random() * starColors.length)],
                pulseSpeed: Math.random() * 0.02 + 0.01,
                pulsePhase: Math.random() * Math.PI * 2
            });
        }

        // ===== WATER COLORS FOR RIPPLE =====
        const waterColors = {
            deep: '#0a1a2a',
            mid: '#1a3a5a',
            light: '#2a5a7a',
            ripple: '#3a6a8a',
            highlight: '#5a9ac0'
        };

        // ===== LOAD WARP DATA =====
        function loadWarpData() {
            try {
                const savedData = localStorage.getItem('voidfarer_warp_data');
                if (savedData) {
                    warpData = JSON.parse(savedData);
                } else {
                    warpData = {
                        destination: 'Pyros-3',
                        destinationType: 'volcanic planet',
                        startLocation: 'Earth',
                        startLocationType: 'planet',
                        totalDistance: 16.3,
                        warpCycles: 5,
                        fuelCost: 70,
                        returnPage: 'surface.html',
                        destSector: 'C4',
                        destRegion: 'The Fringe',
                        destStarSector: 'Tarantula',
                        destStar: 'Eta Carinae',
                        destPlanet: 'Pyros-3',
                        destPlanetType: 'volcanic'
                    };
                }

                startName.textContent = warpData.startLocation || 'Unknown';
                startType.textContent = warpData.startLocationType || 'origin';
                destName.textContent = warpData.destination || 'Unknown';
                destType.textContent = warpData.destinationType || 'destination';
                
                const destTypeStr = (warpData.destinationType || '').toLowerCase();
                if (destTypeStr.includes('gas')) {
                    destIcon.textContent = '🌪️';
                } else if (destTypeStr.includes('lush') || destTypeStr.includes('verdant')) {
                    destIcon.textContent = '🌱';
                } else if (destTypeStr.includes('frozen') || destTypeStr.includes('ice')) {
                    destIcon.textContent = '❄️';
                } else if (destTypeStr.includes('scorched') || destTypeStr.includes('volcanic')) {
                    destIcon.textContent = '🔥';
                } else {
                    destIcon.textContent = '🪐';
                }
                
                fuelCostSpan.textContent = warpData.fuelCost;
                totalCyclesSpan.textContent = warpData.warpCycles;
                
                let destString = 'Destination: ';
                if (warpData.destSector) destString += warpData.destRegion + ' › ';
                if (warpData.destStarSector) destString += warpData.destStarSector + ' › ';
                if (warpData.destStar) destString += warpData.destStar + ' › ';
                destString += warpData.destination;
                destInfo.textContent = destString;

                console.log('Warp data loaded:', warpData);

            } catch (error) {
                console.error('Error loading warp data:', error);
            }
        }

        // ===== RESIZE CANVASES =====
        function resizeCanvases() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            mapCanvas.width = window.innerWidth;
            mapCanvas.height = window.innerHeight;
            rippleCanvas.width = window.innerWidth;
            rippleCanvas.height = window.innerHeight;
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // ===== DRAW STARFIELD =====
        function drawStarfield(progress, speedFactor) {
            starfieldCtx.clearRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            const w = starfieldCanvas.width;
            const h = starfieldCanvas.height;
            const centerX = w / 2;
            const centerY = h / 2;
            
            stars.forEach(star => {
                const pulse = Math.sin(Date.now() * star.pulseSpeed + star.pulsePhase) * 0.2 + 0.8;
                const brightness = star.baseBrightness * pulse;
                
                if (speedFactor > 0.1) {
                    const dx = star.x * w - centerX;
                    const dy = star.y * h - centerY;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance > 0) {
                        const moveX = (dx / distance) * speedFactor * 15;
                        const moveY = (dy / distance) * speedFactor * 15;
                        
                        star.x = (star.x * w - moveX) / w;
                        star.y = (star.y * h - moveY) / h;
                        
                        if (star.x < 0 || star.x > 1 || star.y < 0 || star.y > 1) {
                            star.x = Math.random();
                            star.y = Math.random();
                            star.z = Math.random() * 1000;
                        }
                    }
                }
                
                let x = star.x * w;
                let y = star.y * h;
                
                let streakLength = 0;
                if (speedFactor > 0.3) {
                    streakLength = speedFactor * 30 * (1 - star.z / 1000);
                }
                
                if (streakLength > 2) {
                    const angle = Math.atan2(y - centerY, x - centerX);
                    const streakX = Math.cos(angle) * streakLength;
                    const streakY = Math.sin(angle) * streakLength;
                    
                    starfieldCtx.beginPath();
                    starfieldCtx.strokeStyle = star.color;
                    starfieldCtx.lineWidth = star.size * 1.5;
                    starfieldCtx.globalAlpha = brightness * 0.3;
                    starfieldCtx.moveTo(x, y);
                    starfieldCtx.lineTo(x - streakX, y - streakY);
                    starfieldCtx.stroke();
                }
                
                starfieldCtx.beginPath();
                starfieldCtx.fillStyle = star.color;
                starfieldCtx.globalAlpha = brightness;
                starfieldCtx.arc(x, y, star.size * (1 + speedFactor * 0.5), 0, Math.PI * 2);
                starfieldCtx.fill();
            });
            
            starfieldCtx.globalAlpha = 1;
        }

        // ===== DRAW MAP =====
        function drawMap(progress, speedFactor) {
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            const w = mapCanvas.width;
            const h = mapCanvas.height;
            
            // Grid lines (very faint)
            mapCtx.strokeStyle = 'rgba(74, 138, 192, 0.05)';
            mapCtx.lineWidth = 1;
            
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * w;
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
                
                const y = (i / 10) * h;
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }
            
            // Path line (very faint)
            mapCtx.beginPath();
            mapCtx.strokeStyle = 'rgba(74, 138, 192, 0.2)';
            mapCtx.lineWidth = 2;
            mapCtx.setLineDash([5, 10]);
            mapCtx.moveTo(startPos.x * w, startPos.y * h);
            mapCtx.lineTo(destPos.x * w, destPos.y * h);
            mapCtx.stroke();
            mapCtx.setLineDash([]);
            
            // Energy pulses (visible but not intrusive)
            const pulseCount = 2;
            for (let i = 0; i < pulseCount; i++) {
                const pulsePos = (progress + i / pulseCount) % 1;
                const pulseX = startPos.x + (destPos.x - startPos.x) * pulsePos;
                const pulseY = startPos.y + (destPos.y - startPos.y) * pulsePos;
                
                mapCtx.beginPath();
                mapCtx.fillStyle = '#4affaa';
                mapCtx.globalAlpha = 0.2 * (1 - pulsePos);
                mapCtx.arc(pulseX * w, pulseY * h, 3, 0, Math.PI * 2);
                mapCtx.fill();
            }
            mapCtx.globalAlpha = 1;
            
            // Ship
            const shipX = shipPos.x * w;
            const shipY = shipPos.y * h;
            
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 15;
            mapCtx.fillStyle = '#ffffff';
            mapCtx.beginPath();
            mapCtx.moveTo(shipX, shipY - 8);
            mapCtx.lineTo(shipX + 6, shipY + 4);
            mapCtx.lineTo(shipX, shipY + 2);
            mapCtx.lineTo(shipX - 6, shipY + 4);
            mapCtx.closePath();
            mapCtx.fill();
            mapCtx.shadowBlur = 0;
        }

        // ===== UPDATE SHIP POSITION =====
        function updateShipPosition(progress) {
            shipPos.x = startPos.x + (destPos.x - startPos.x) * progress;
            shipPos.y = startPos.y + (destPos.y - startPos.y) * progress;
        }

        // ===== GET SPEED FACTOR =====
        function getSpeedFactor(cycleProgress) {
            if (cycleProgress < 0.2) {
                return 0.3 + (cycleProgress / 0.2) * 0.7;
            } else if (cycleProgress > 0.8) {
                return 1.0 - ((cycleProgress - 0.8) / 0.2) * 0.7;
            } else {
                return 1.0;
            }
        }

        // ===== WATER RIPPLE EFFECT =====
        function showWaterRipple() {
            return new Promise((resolve) => {
                starfieldCanvas.style.transition = 'opacity 0.5s';
                mapCanvas.style.transition = 'opacity 0.5s';
                starfieldCanvas.style.opacity = '0.2';
                mapCanvas.style.opacity = '0.2';
                
                rippleCanvas.style.display = 'block';
                rippleCanvas.style.opacity = '0';
                rippleCanvas.style.transition = 'opacity 0.5s';
                
                rippleCanvas.offsetHeight;
                rippleCanvas.style.opacity = '1';
                
                const startTime = Date.now();
                const duration = 3000;
                
                function drawRipple() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    rippleCtx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                    
                    const centerX = rippleCanvas.width / 2;
                    const centerY = rippleCanvas.height / 2;
                    
                    rippleCtx.fillStyle = waterColors.deep;
                    rippleCtx.fillRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                    
                    const ringSize = 50 + progress * 400;
                    const opacity = Math.max(0, 1 - progress * 0.3);
                    
                    for (let i = 0; i < 5; i++) {
                        const offset = i * 20;
                        const rippleSize = ringSize - offset;
                        if (rippleSize < 20) continue;
                        
                        const ringOpacity = opacity * (1 - i * 0.15);
                        
                        rippleCtx.beginPath();
                        rippleCtx.arc(centerX, centerY, rippleSize, 0, Math.PI * 2);
                        rippleCtx.strokeStyle = `rgba(90, 154, 192, ${ringOpacity})`;
                        rippleCtx.lineWidth = 4 - i * 0.7;
                        rippleCtx.stroke();
                        
                        rippleCtx.beginPath();
                        rippleCtx.arc(centerX, centerY, rippleSize - 5, 0, Math.PI * 2);
                        rippleCtx.strokeStyle = `rgba(160, 200, 255, ${ringOpacity * 0.6})`;
                        rippleCtx.lineWidth = 2;
                        rippleCtx.stroke();
                    }
                    
                    const splashSize = 30 * (1 - progress * 0.3);
                    
                    const gradient = rippleCtx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, splashSize * 4
                    );
                    gradient.addColorStop(0, `rgba(100, 180, 220, ${opacity})`);
                    gradient.addColorStop(0.3, `rgba(50, 120, 170, ${opacity * 0.7})`);
                    gradient.addColorStop(0.7, `rgba(20, 60, 100, ${opacity * 0.3})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    rippleCtx.fillStyle = gradient;
                    rippleCtx.beginPath();
                    rippleCtx.arc(centerX, centerY, splashSize * 4, 0, Math.PI * 2);
                    rippleCtx.fill();
                    
                    for (let i = 0; i < 20; i++) {
                        const angle = (i / 20) * Math.PI * 2 + (elapsed * 0.002);
                        const distance = ringSize * 0.9 + Math.sin(elapsed * 0.01 + i) * 15;
                        const x = centerX + Math.cos(angle) * distance;
                        const y = centerY + Math.sin(angle) * distance;
                        
                        const dropletOpacity = opacity * 0.4 * (1 - Math.abs(distance - ringSize) / 100);
                        
                        rippleCtx.beginPath();
                        rippleCtx.fillStyle = `rgba(140, 200, 255, ${dropletOpacity})`;
                        rippleCtx.arc(x, y, 3 + Math.sin(elapsed * 0.01 + i) * 1.5, 0, Math.PI * 2);
                        rippleCtx.fill();
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(drawRipple);
                    } else {
                        setTimeout(() => {
                            rippleCanvas.style.opacity = '0';
                            setTimeout(() => {
                                rippleCanvas.style.display = 'none';
                                starfieldCanvas.style.opacity = '1';
                                mapCanvas.style.opacity = '1';
                                resolve();
                            }, 500);
                        }, 500);
                    }
                }
                
                drawRipple();
            });
        }

        // ===== UPDATE CYCLE =====
        async function updateCycle() {
            if (warpComplete) return;
            
            const elapsed = Date.now() - startTime;
            const totalDuration = warpData.warpCycles * CYCLE_DURATION;
            const progress = Math.min(elapsed / totalDuration, 1);

            const cycleElapsed = elapsed % CYCLE_DURATION;
            const cycleProgress = cycleElapsed / CYCLE_DURATION;
            const speedFactor = getSpeedFactor(cycleProgress);

            const newCycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
            if (newCycle <= warpData.warpCycles && newCycle !== currentCycle) {
                currentCycle = newCycle;
                currentCycleSpan.textContent = currentCycle;
                
                statusMessage.textContent = getStatusMessage(progress);
                statusMessage.classList.add('visible');
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 800);
            }

            updateShipPosition(progress);
            drawStarfield(progress, speedFactor);
            drawMap(progress, speedFactor);
            
            progressPercent.textContent = Math.round(progress * 100) + '%';

            if (elapsed >= totalDuration && !warpComplete) {
                warpComplete = true;
                await showWaterRipple();
                completeWarp();
            }
        }

        // ===== GET STATUS MESSAGE =====
        function getStatusMessage(progress) {
            if (progress < 0.1) return 'INITIATING WARP';
            if (progress < 0.2) return 'ACCELERATING';
            if (progress < 0.3) return 'LEAVING SYSTEM';
            if (progress < 0.4) return 'INTERSTELLAR VOID';
            if (progress < 0.5) return 'CROSSING NEBULA';
            if (progress < 0.6) return 'MAXIMUM WARP';
            if (progress < 0.7) return 'PASSING PULSAR';
            if (progress < 0.8) return 'APPROACHING';
            if (progress < 0.9) return 'DECELERATING';
            if (progress < 1) return 'FINAL APPROACH';
            return 'ARRIVING';
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            updateCycle();
            animationFrame = requestAnimationFrame(animate);
        }

        // ===== COMPLETE WARP =====
        function completeWarp() {
            if (warpData.destSector) {
                localStorage.setItem('voidfarer_current_sector', warpData.destSector);
                localStorage.setItem('voidfarer_current_region', warpData.destRegion || warpData.destSector);
            }
            
            if (warpData.destStarSector) {
                localStorage.setItem('voidfarer_current_nebula', warpData.destStarSector);
                localStorage.setItem('voidfarer_current_sector_name', warpData.destStarSector);
            }
            
            if (warpData.destStar) {
                localStorage.setItem('voidfarer_current_star', warpData.destStar);
            }
            
            if (warpData.destPlanet) {
                localStorage.setItem('voidfarer_current_planet', warpData.destPlanet);
                localStorage.setItem('voidfarer_current_planet_name', warpData.destPlanet);
                localStorage.setItem('voidfarer_current_planet_type', warpData.destPlanetType || warpData.destinationType);
                
                if (warpData.destPlanetResources) {
                    localStorage.setItem('voidfarer_current_planet_resources', 
                        JSON.stringify(warpData.destPlanetResources));
                }
            }
            
            localStorage.removeItem('voidfarer_warp_data');
            
            window.location.href = warpData.returnPage || 'surface.html';
        }

        // ===== INITIALIZE =====
        function init() {
            try {
                loadWarpData();
                
                startPos = { x: 0.2 + Math.random() * 0.1, y: 0.3 + Math.random() * 0.4 };
                destPos = { x: 0.7 + Math.random() * 0.1, y: 0.3 + Math.random() * 0.4 };
                shipPos = { ...startPos };
                
                drawStarfield(0, 0);
                drawMap(0, 0);
                
                setTimeout(() => {
                    statusMessage.classList.add('visible');
                    setTimeout(() => {
                        statusMessage.classList.remove('visible');
                    }, 2000);
                }, 100);

                animate();

            } catch (error) {
                console.error('Init error:', error);
                animate();
            }
        }

        init();

        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
</body>
</html>
