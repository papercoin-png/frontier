<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Warp Drive</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .warp-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Route Preview Panel */
        .route-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #4a8ac0;
            border-radius: 40px 15px 40px 15px;
            padding: 15px;
            color: white;
            min-width: 160px;
            z-index: 30;
            pointer-events: none;
        }
        
        .route-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            color: #a0c0ff;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .route-point {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            font-size: 12px;
        }
        
        .route-icon {
            font-size: 16px;
            min-width: 24px;
        }
        
        .route-name {
            flex: 1;
            color: #ffffff;
        }
        
        .route-type {
            color: #ffd966;
            font-size: 10px;
        }
        
        .route-line {
            height: 20px;
            width: 2px;
            background: linear-gradient(180deg, #4a8ac0, transparent);
            margin-left: 12px;
        }
        
        .route-destination {
            color: #4affaa;
            font-weight: 600;
        }
        
        /* Main destination info */
        .destination-info {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            color: #8ac0ff;
            font-family: 'WindSong', cursive;
            font-size: 28px;
            text-shadow: 0 0 30px #4a8ac0;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #6a8ac0;
            z-index: 20;
            max-width: 200px;
            text-align: center;
        }
        
        .destination-sub {
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            color: #a0c0ff;
            margin-top: 5px;
        }
        
        /* Journey stats */
        .journey-stats {
            position: absolute;
            top: 120px;
            right: 20px;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #4a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 10px 15px;
            color: white;
            font-size: 12px;
            z-index: 20;
            text-align: right;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Warp status */
        .warp-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            text-shadow: 0 0 20px #4a8ac0;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #8ac0ff;
            z-index: 20;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .warp-status.visible {
            opacity: 1;
        }
        
        /* Progress bar */
        .progress-container {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 50px);
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 8px;
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            border: 1px solid #4a6a9a;
            z-index: 20;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff, #4a8ac0);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            transition: width 0.3s ease;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Cycle counter */
        .cycle-counter {
            position: absolute;
            bottom: max(160px, env(safe-area-inset-bottom) + 90px);
            left: 50%;
            transform: translateX(-50%);
            color: #aac8ff;
            font-size: 16px;
            font-family: 'Exo 2', sans-serif;
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 25px;
            border-radius: 40px;
            border: 1px solid #4a6a9a;
            z-index: 20;
            font-weight: 500;
        }
        
        .cycle-highlight {
            color: #ffd966;
            font-size: 20px;
            font-weight: 700;
        }
        
        /* Skip button */
        .skip-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 50, 80, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 150px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        
        .skip-btn:active {
            background: #6a8ac0;
            transform: translateX(-50%) scale(0.96);
        }
        
        .skip-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        @supports (padding: max(0px)) {
            .route-panel { top: max(20px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); }
            .destination-info { top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); }
            .progress-container { bottom: max(100px, env(safe-area-inset-bottom) + 50px); }
            .cycle-counter { bottom: max(160px, env(safe-area-inset-bottom) + 90px); }
            .skip-btn { bottom: max(30px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <div class="warp-container">
        <canvas id="warpCanvas"></canvas>
        
        <div class="warp-overlay">
            <!-- Route Preview Panel -->
            <div class="route-panel" id="routePanel">
                <div class="route-title">✦ JOURNEY ROUTE ✦</div>
                <div id="routeContent">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <!-- Destination Info -->
            <div class="destination-info" id="destinationName">
                Loading...
                <div class="destination-sub" id="destinationType">planetary landing</div>
            </div>
            
            <!-- Journey Stats -->
            <div class="journey-stats" id="journeyStats">
                <div>Distance: <span class="stat-value" id="totalDistance">0</span> LY</div>
                <div>Fuel: <span class="stat-value" id="fuelCost">0</span> ⭐</div>
                <div>Est. time: <span class="stat-value" id="totalTime">0</span> sec</div>
            </div>
            
            <!-- Warp Status -->
            <div class="warp-status" id="warpStatus">WARP DRIVE ACTIVE</div>
            
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <!-- Cycle Counter -->
            <div class="cycle-counter" id="cycleCounter">
                Cycle <span class="cycle-highlight" id="currentCycle">1</span> of <span id="totalCycles">1</span>
            </div>
            
            <!-- Skip Button -->
            <button class="skip-btn" id="skipBtn" onclick="skipWarp()">SKIP WARP</button>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const canvas = document.getElementById('warpCanvas');
        const ctx = canvas.getContext('2d');
        const skipBtn = document.getElementById('skipBtn');
        const warpStatus = document.getElementById('warpStatus');
        const progressBar = document.getElementById('progressBar');
        const currentCycleSpan = document.getElementById('currentCycle');
        const totalCyclesSpan = document.getElementById('totalCycles');
        const destinationName = document.getElementById('destinationName');
        const destinationType = document.getElementById('destinationType');
        const totalDistanceSpan = document.getElementById('totalDistance');
        const fuelCostSpan = document.getElementById('fuelCost');
        const totalTimeSpan = document.getElementById('totalTime');
        const routeContent = document.getElementById('routeContent');

        // ===== WARP STATE =====
        let destination = 'Unknown Destination';
        let returnPage = 'galaxy-map.html';
        let cycles = 1;
        let distance = 0;
        let fuel = 0;
        let currentCycle = 1;
        let animationFrame;
        let startTime = Date.now();
        const CYCLE_DURATION = 2000; // 2 seconds per cycle

        // ===== ROUTE DATA =====
        let route = [
            { type: 'system', name: 'Sol System', icon: '🪐' },
            { type: 'space', name: 'Interstellar Space', icon: '✨' },
            { type: 'system', name: 'Pyros System', icon: '🔥' },
            { type: 'planet', name: 'Pyros', icon: '🪨', isDestination: true }
        ];

        // ===== STARS =====
        const stars = [];
        const STAR_COUNT = 400;

        // Initialize stars
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 2000,
                y: (Math.random() - 0.5) * 2000,
                z: Math.random() * 2000,
                speed: 30 + Math.random() * 40
            });
        }

        // ===== LOAD WARP DATA =====
        async function loadWarpData() {
            try {
                // Get warp data from storage
                let warpData;
                if (typeof getWarpData === 'function') {
                    warpData = await getWarpData();
                } else {
                    warpData = {
                        destination: localStorage.getItem('voidfarer_warp_destination') || 'Unknown',
                        returnPage: localStorage.getItem('voidfarer_warp_return') || 'galaxy-map.html',
                        cycles: parseInt(localStorage.getItem('voidfarer_warp_cycles')) || 1,
                        distance: parseFloat(localStorage.getItem('voidfarer_warp_distance')) || 0,
                        fuel: parseInt(localStorage.getItem('voidfarer_warp_fuel')) || 0,
                        route: JSON.parse(localStorage.getItem('voidfarer_warp_route') || '[]')
                    };
                }
                
                destination = warpData.destination;
                returnPage = warpData.returnPage;
                cycles = warpData.cycles || 1;
                distance = warpData.distance || 0;
                fuel = warpData.fuel || 0;
                
                if (warpData.route && warpData.route.length > 0) {
                    route = warpData.route;
                }

                // Update UI
                destinationName.innerHTML = `${destination}<div class="destination-sub">${getDestinationType()}</div>`;
                totalCyclesSpan.textContent = cycles;
                totalDistanceSpan.textContent = distance.toFixed(1);
                fuelCostSpan.textContent = fuel;
                totalTimeSpan.textContent = cycles * 2;
                
                // Render route
                renderRoute();

                // Check if player has enough fuel
                let credits = 5000;
                if (typeof getCredits === 'function') {
                    credits = await getCredits();
                }
                if (credits < fuel) {
                    console.warn('Not enough fuel for warp!');
                }

                // Use fuel
                if (fuel > 0 && typeof useFuel === 'function') {
                    useFuel(fuel);
                }

            } catch (error) {
                console.error('Error loading warp data:', error);
                destinationName.textContent = 'Unknown Destination';
            }
        }

        // ===== GET DESTINATION TYPE =====
        function getDestinationType() {
            if (destination.includes('Surface') || destination.includes('Landing')) {
                return 'planetary landing';
            }
            if (destination.includes('System')) {
                return 'star system approach';
            }
            if (destination.includes('Sector')) {
                return 'sector transit';
            }
            return 'interstellar travel';
        }

        // ===== RENDER ROUTE =====
        function renderRoute() {
            routeContent.innerHTML = '';
            
            route.forEach((point, index) => {
                // Add line except for first point
                if (index > 0) {
                    const line = document.createElement('div');
                    line.className = 'route-line';
                    routeContent.appendChild(line);
                }
                
                const pointDiv = document.createElement('div');
                pointDiv.className = 'route-point';
                
                let icon = point.icon || '●';
                let nameClass = point.isDestination ? 'route-destination' : 'route-name';
                
                pointDiv.innerHTML = `
                    <span class="route-icon">${icon}</span>
                    <span class="${nameClass}">${point.name}</span>
                    <span class="route-type">${point.type}</span>
                `;
                
                routeContent.appendChild(pointDiv);
            });
        }

        // ===== RESIZE CANVAS =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== UPDATE CYCLE =====
        function updateCycle() {
            const elapsed = Date.now() - startTime;
            const totalDuration = cycles * CYCLE_DURATION;
            const progress = Math.min(elapsed / totalDuration, 1);

            // Update progress bar
            progressBar.style.width = (progress * 100) + '%';

            // Calculate current cycle
            const newCycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
            if (newCycle <= cycles && newCycle !== currentCycle) {
                currentCycle = newCycle;
                currentCycleSpan.textContent = currentCycle;
                
                // Update route highlighting (optional)
                highlightRoutePoint(currentCycle);

                // Haptic feedback on cycle change
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }

                // Flash effect
                warpStatus.style.opacity = '1';
                warpStatus.textContent = getWarpStatusMessage(currentCycle, cycles);
                setTimeout(() => {
                    warpStatus.style.opacity = '0';
                }, 200);
            }

            // Check if warp complete
            if (elapsed >= totalDuration) {
                completeWarp();
            }

            return progress;
        }

        // ===== HIGHLIGHT ROUTE POINT =====
        function highlightRoutePoint(cycle) {
            // This could highlight which part of the journey we're on
            // For example, cycle 1-2: leaving origin, cycle 3-4: in transit, etc.
        }

        // ===== GET WARP STATUS MESSAGE =====
        function getWarpStatusMessage(cycle, totalCycles) {
            if (cycle === 1) return 'INITIATING WARP';
            if (cycle === totalCycles) return 'FINAL APPROACH';
            if (cycle > totalCycles) return 'ARRIVED';
            
            // More descriptive messages based on progress
            const progress = cycle / totalCycles;
            if (progress < 0.25) return 'LEAVING SYSTEM';
            if (progress < 0.5) return 'INTERSTELLAR TRANSIT';
            if (progress < 0.75) return 'APPROACHING DESTINATION';
            return 'ENTERING ORBIT';
        }

        // ===== DRAW WARP EFFECT =====
        function drawWarp(progress) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Calculate warp intensity based on progress within current cycle
            const cycleElapsed = (Date.now() - startTime) % CYCLE_DURATION;
            const cycleProgress = cycleElapsed / CYCLE_DURATION;

            // Speed factor: peak at middle of cycle
            let speedFactor;
            if (cycleProgress < 0.3) {
                // Accelerating
                speedFactor = 0.3 + (cycleProgress / 0.3) * 0.7;
            } else if (cycleProgress > 0.7) {
                // Decelerating
                speedFactor = 1.0 - ((cycleProgress - 0.7) / 0.3) * 0.7;
            } else {
                // Full speed
                speedFactor = 1.0;
            }

            // Overall progress factor (slows down near end)
            const overallProgress = (Date.now() - startTime) / (cycles * CYCLE_DURATION);
            const finalApproach = Math.max(0, 1 - overallProgress * 1.5);

            stars.forEach(s => {
                // Update star position
                s.z -= s.speed * speedFactor * (0.5 + finalApproach * 0.5);

                // Reset stars that pass by
                if (s.z < 1) {
                    s.z = 2000;
                    s.x = (Math.random() - 0.5) * 2000;
                    s.y = (Math.random() - 0.5) * 2000;
                }

                // Project to 2D
                const factor = 500 / s.z;
                const x = s.x * factor + centerX;
                const y = s.y * factor + centerY;

                // Skip if outside view
                if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) return;

                // Calculate brightness and size
                const brightness = Math.min(1, 0.3 + (2000 - s.z) / 2000);
                const size = 1 + (2000 - s.z) / 200 * speedFactor;

                // Draw star
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                // Draw streak for faster stars
                if (s.z < 800 && speedFactor > 0.5) {
                    ctx.strokeStyle = `rgba(100, 150, 255, ${brightness * 0.3})`;
                    ctx.lineWidth = size * 1.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y);

                    const streakX = (s.x / s.z) * 30 * speedFactor;
                    const streakY = (s.y / s.z) * 30 * speedFactor;
                    ctx.lineTo(x + streakX, y + streakY);
                    ctx.stroke();
                }
            });

            // Draw central glow
            const glowSize = 50 + Math.sin(Date.now() / 200) * 10;
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, glowSize
            );
            gradient.addColorStop(0, `rgba(100, 150, 255, ${0.2 * speedFactor})`);
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, glowSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            const progress = updateCycle();
            drawWarp(progress);

            animationFrame = requestAnimationFrame(animate);
        }

        // ===== COMPLETE WARP =====
        function completeWarp() {
            // Clear warp data
            if (typeof clearWarpData === 'function') {
                clearWarpData();
            } else {
                localStorage.removeItem('voidfarer_warp_destination');
                localStorage.removeItem('voidfarer_warp_return');
                localStorage.removeItem('voidfarer_warp_cycles');
                localStorage.removeItem('voidfarer_warp_distance');
                localStorage.removeItem('voidfarer_warp_fuel');
                localStorage.removeItem('voidfarer_warp_route');
            }

            // Navigate to destination
            window.location.href = returnPage;
        }

        // ===== SKIP WARP =====
        function skipWarp() {
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            skipBtn.classList.add('hidden');
            completeWarp();
        }

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Load warp data
                await loadWarpData();

                // Start animation
                setTimeout(() => {
                    warpStatus.classList.add('visible');
                    setTimeout(() => {
                        warpStatus.classList.remove('visible');
                    }, 2000);
                }, 100);

                animate();

            } catch (error) {
                console.error('Init error:', error);
                animate();
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
</html>
