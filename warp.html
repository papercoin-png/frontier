<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Warp Drive</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .warp-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        /* Starfield canvas (background) */
        #starfieldCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Map canvas (overlay with path and ship) */
        #mapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .warp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Start/Destination Panel */
        .journey-panel {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #4a8ac0;
            border-radius: 60px 20px 60px 20px;
            padding: 15px 30px;
            color: white;
            min-width: 280px;
            z-index: 30;
            pointer-events: none;
            text-align: center;
        }
        
        .journey-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            color: #a0c0ff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .journey-points {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .point {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .point-icon {
            font-size: 32px;
        }
        
        .point-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }
        
        .point-type {
            font-size: 11px;
            color: #a0c0ff;
        }
        
        .start-point .point-name {
            color: #4affaa;
        }
        
        .destination-point .point-name {
            color: #ffaa4a;
        }
        
        .journey-arrow {
            font-size: 24px;
            color: #4a8ac0;
            animation: pulse-arrow 2s infinite;
        }
        
        @keyframes pulse-arrow {
            0% { opacity: 0.5; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(5px); }
            100% { opacity: 0.5; transform: translateX(0); }
        }
        
        /* Distance Info */
        .distance-panel {
            position: absolute;
            top: max(120px, env(safe-area-inset-top) + 80px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 10px 25px;
            color: white;
            z-index: 30;
            text-align: center;
        }
        
        .distance-value {
            color: #4affaa;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
        }
        
        .distance-label {
            font-size: 12px;
            color: #a0c0ff;
        }
        
        /* Stats Panel */
        .stats-panel {
            position: absolute;
            bottom: max(150px, env(safe-area-inset-bottom) + 80px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #4a8ac0;
            border-radius: 30px 10px 30px 10px;
            padding: 15px;
            color: white;
            z-index: 30;
            min-width: 140px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .stat-label {
            color: #a0c0ff;
        }
        
        .stat-value {
            color: #ffd966;
            font-weight: 600;
        }
        
        /* Cycle Info */
        .cycle-panel {
            position: absolute;
            bottom: max(150px, env(safe-area-inset-bottom) + 80px);
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #ffaa4a;
            border-radius: 30px 10px 30px 10px;
            padding: 15px;
            color: white;
            z-index: 30;
            text-align: center;
            min-width: 120px;
        }
        
        .cycle-current {
            font-size: 36px;
            font-weight: 700;
            color: #4affaa;
            font-family: 'Exo 2', sans-serif;
            line-height: 1;
        }
        
        .cycle-total {
            font-size: 18px;
            color: #a0c0ff;
        }
        
        .cycle-label {
            font-size: 12px;
            color: #a0c0ff;
            margin-top: 5px;
        }
        
        /* Status Message */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #4affaa;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 20px #4affaa;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        
        .status-message.visible {
            opacity: 1;
        }
        
        @supports (padding: max(0px)) {
            .journey-panel { top: max(20px, env(safe-area-inset-top)); }
            .distance-panel { top: max(120px, env(safe-area-inset-top) + 80px); }
            .stats-panel { bottom: max(150px, env(safe-area-inset-bottom) + 80px); left: max(20px, env(safe-area-inset-left)); }
            .cycle-panel { bottom: max(150px, env(safe-area-inset-bottom) + 80px); right: max(20px, env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>
    <div class="warp-container">
        <!-- Starfield background -->
        <canvas id="starfieldCanvas"></canvas>
        
        <!-- Map overlay with path and ship -->
        <canvas id="mapCanvas"></canvas>
        
        <div class="warp-overlay">
            <!-- Journey Panel - Shows start and destination -->
            <div class="journey-panel">
                <div class="journey-title">✦ WARP JOURNEY ✦</div>
                <div class="journey-points">
                    <div class="point start-point">
                        <span class="point-icon">🚀</span>
                        <span class="point-name" id="startName">Loading...</span>
                        <span class="point-type" id="startType">current location</span>
                    </div>
                    <span class="journey-arrow">→</span>
                    <div class="point destination-point">
                        <span class="point-icon" id="destIcon">🪐</span>
                        <span class="point-name" id="destName">Loading...</span>
                        <span class="point-type" id="destType">destination</span>
                    </div>
                </div>
            </div>
            
            <!-- Distance Panel -->
            <div class="distance-panel">
                <span class="distance-value" id="totalDistance">0.0</span>
                <span class="distance-label"> LIGHT YEARS</span>
            </div>
            
            <!-- Stats Panel -->
            <div class="stats-panel">
                <div class="stat-row">
                    <span class="stat-label">Fuel:</span>
                    <span class="stat-value" id="fuelCost">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Duration:</span>
                    <span class="stat-value" id="totalTime">0</span>
                </div>
            </div>
            
            <!-- Cycle Panel -->
            <div class="cycle-panel">
                <div>
                    <span class="cycle-current" id="currentCycle">1</span>
                    <span class="cycle-total">/<span id="totalCycles">1</span></span>
                </div>
                <div class="cycle-label">WARP CYCLES</div>
            </div>
            
            <!-- Status Message -->
            <div class="status-message" id="statusMessage">INITIATING WARP</div>
        </div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== CANVAS ELEMENTS =====
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const mapCanvas = document.getElementById('mapCanvas');
        const mapCtx = mapCanvas.getContext('2d');

        // ===== DOM ELEMENTS =====
        const statusMessage = document.getElementById('statusMessage');
        const currentCycleSpan = document.getElementById('currentCycle');
        const totalCyclesSpan = document.getElementById('totalCycles');
        const startName = document.getElementById('startName');
        const startType = document.getElementById('startType');
        const destName = document.getElementById('destName');
        const destType = document.getElementById('destType');
        const destIcon = document.getElementById('destIcon');
        const totalDistanceSpan = document.getElementById('totalDistance');
        const fuelCostSpan = document.getElementById('fuelCost');
        const totalTimeSpan = document.getElementById('totalTime');

        // ===== WARP STATE =====
        let warpData = {
            destination: 'Unknown',
            destinationType: 'planet',
            startLocation: 'Unknown System',
            startLocationType: 'star system',
            totalDistance: 0,
            warpCycles: 1,
            fuelCost: 0,
            returnPage: 'surface.html'
        };
        
        let currentCycle = 1;
        let animationFrame;
        let startTime = Date.now();
        const CYCLE_DURATION = 2000; // 2 seconds per cycle

        // ===== MAP POSITIONS =====
        let startPos = { x: 0.2, y: 0.5 };
        let destPos = { x: 0.8, y: 0.5 };
        let shipPos = { x: 0.2, y: 0.5 };

        // ===== STARS FOR BACKGROUND =====
        const stars = [];
        const STAR_COUNT = 300;

        // Initialize stars
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2 + 1,
                brightness: Math.random() * 0.5 + 0.3
            });
        }

        // ===== LOAD WARP DATA =====
        function loadWarpData() {
            try {
                // Try to get warp data from localStorage
                const savedData = localStorage.getItem('voidfarer_warp_data');
                if (savedData) {
                    warpData = JSON.parse(savedData);
                } else {
                    // Fallback for testing
                    warpData = {
                        destination: 'Pyros',
                        destinationType: 'volcanic planet',
                        startLocation: 'Sol System',
                        startLocationType: 'star system',
                        totalDistance: 8.5,
                        warpCycles: 12,
                        fuelCost: 42,
                        returnPage: 'surface.html'
                    };
                }

                // Update UI
                startName.textContent = warpData.startLocation;
                startType.textContent = warpData.startLocationType;
                destName.textContent = warpData.destination;
                destType.textContent = warpData.destinationType;
                
                // Set appropriate icon based on destination type
                if (warpData.destinationType.includes('gas')) {
                    destIcon.textContent = '🌪️';
                } else if (warpData.destinationType.includes('lush') || warpData.destinationType.includes('verdant')) {
                    destIcon.textContent = '🌱';
                } else if (warpData.destinationType.includes('frozen') || warpData.destinationType.includes('ice')) {
                    destIcon.textContent = '❄️';
                } else if (warpData.destinationType.includes('scorched') || warpData.destinationType.includes('volcanic')) {
                    destIcon.textContent = '🔥';
                } else {
                    destIcon.textContent = '🪐';
                }
                
                totalDistanceSpan.textContent = warpData.totalDistance.toFixed(1);
                totalCyclesSpan.textContent = warpData.warpCycles;
                fuelCostSpan.textContent = warpData.fuelCost;
                totalTimeSpan.textContent = (warpData.warpCycles * 2) + ' sec';

                // Use fuel if available
                if (warpData.fuelCost > 0 && typeof useFuel === 'function') {
                    useFuel(warpData.fuelCost);
                }

            } catch (error) {
                console.error('Error loading warp data:', error);
            }
        }

        // ===== RESIZE CANVASES =====
        function resizeCanvases() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            mapCanvas.width = window.innerWidth;
            mapCanvas.height = window.innerHeight;
        }
        resizeCanvases();
        window.addEventListener('resize', resizeCanvases);

        // ===== DRAW STATIC STARFIELD =====
        function drawStarfield() {
            starfieldCtx.clearRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            stars.forEach(star => {
                starfieldCtx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                starfieldCtx.beginPath();
                starfieldCtx.arc(
                    star.x * starfieldCanvas.width,
                    star.y * starfieldCanvas.height,
                    star.size,
                    0,
                    Math.PI * 2
                );
                starfieldCtx.fill();
            });
        }

        // ===== DRAW MAP WITH PATH AND SHIP =====
        function drawMap() {
            mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            const w = mapCanvas.width;
            const h = mapCanvas.height;
            
            // Draw faint grid lines (galactic reference)
            mapCtx.strokeStyle = 'rgba(74, 138, 192, 0.1)';
            mapCtx.lineWidth = 1;
            
            // Vertical lines
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * w;
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
            }
            
            // Horizontal lines
            for (let i = 0; i <= 10; i++) {
                const y = (i / 10) * h;
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }
            
            // Draw path line (dotted)
            mapCtx.beginPath();
            mapCtx.strokeStyle = '#4a8ac0';
            mapCtx.lineWidth = 3;
            mapCtx.setLineDash([10, 15]);
            
            mapCtx.moveTo(startPos.x * w, startPos.y * h);
            mapCtx.lineTo(destPos.x * w, destPos.y * h);
            mapCtx.stroke();
            mapCtx.setLineDash([]);
            
            // Draw start marker
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 20;
            mapCtx.fillStyle = '#4affaa';
            mapCtx.beginPath();
            mapCtx.arc(startPos.x * w, startPos.y * h, 12, 0, Math.PI * 2);
            mapCtx.fill();
            
            // Draw start label
            mapCtx.shadowBlur = 0;
            mapCtx.font = 'bold 14px "Exo 2", sans-serif';
            mapCtx.fillStyle = '#ffffff';
            mapCtx.shadowColor = '#000';
            mapCtx.shadowBlur = 4;
            mapCtx.fillText('START', startPos.x * w + 20, startPos.y * h - 15);
            
            // Draw destination marker
            mapCtx.shadowColor = '#ffaa4a';
            mapCtx.shadowBlur = 20;
            mapCtx.fillStyle = '#ffaa4a';
            mapCtx.beginPath();
            mapCtx.arc(destPos.x * w, destPos.y * h, 12, 0, Math.PI * 2);
            mapCtx.fill();
            
            // Draw destination label
            mapCtx.shadowBlur = 0;
            mapCtx.font = 'bold 14px "Exo 2", sans-serif';
            mapCtx.fillStyle = '#ffffff';
            mapCtx.shadowColor = '#000';
            mapCtx.shadowBlur = 4;
            mapCtx.fillText('DESTINATION', destPos.x * w - 100, destPos.y * h - 15);
            
            // Draw ship (moving along path)
            const shipX = shipPos.x * w;
            const shipY = shipPos.y * h;
            
            // Ship glow
            mapCtx.shadowColor = '#4affaa';
            mapCtx.shadowBlur = 30;
            
            // Draw ship as a small spacecraft
            mapCtx.fillStyle = '#ffffff';
            mapCtx.beginPath();
            mapCtx.moveTo(shipX, shipY - 12);
            mapCtx.lineTo(shipX + 10, shipY + 6);
            mapCtx.lineTo(shipX, shipY + 2);
            mapCtx.lineTo(shipX - 10, shipY + 6);
            mapCtx.closePath();
            mapCtx.fill();
            
            // Reset shadow
            mapCtx.shadowBlur = 0;
        }

        // ===== UPDATE SHIP POSITION =====
        function updateShipPosition(progress) {
            // Interpolate between start and destination
            shipPos.x = startPos.x + (destPos.x - startPos.x) * progress;
            shipPos.y = startPos.y + (destPos.y - startPos.y) * progress;
        }

        // ===== UPDATE CYCLE =====
        function updateCycle() {
            const elapsed = Date.now() - startTime;
            const totalDuration = warpData.warpCycles * CYCLE_DURATION;
            const progress = Math.min(elapsed / totalDuration, 1);

            // Calculate current cycle
            const newCycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
            if (newCycle <= warpData.warpCycles && newCycle !== currentCycle) {
                currentCycle = newCycle;
                currentCycleSpan.textContent = currentCycle;
                
                // Update status message based on progress
                statusMessage.textContent = getStatusMessage(progress);
                statusMessage.classList.add('visible');
                setTimeout(() => {
                    statusMessage.classList.remove('visible');
                }, 800);

                // Haptic feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            }

            // Update ship position
            updateShipPosition(progress);

            // Redraw map
            drawMap();

            // Check if warp complete
            if (elapsed >= totalDuration) {
                completeWarp();
            }

            return progress;
        }

        // ===== GET STATUS MESSAGE =====
        function getStatusMessage(progress) {
            if (progress < 0.2) return 'DEPARTING';
            if (progress < 0.4) return 'INTERSTELLAR SPACE';
            if (progress < 0.6) return 'CROSSING VOID';
            if (progress < 0.8) return 'APPROACHING DESTINATION';
            if (progress < 1) return 'FINAL APPROACH';
            return 'ARRIVING';
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            updateCycle();
            drawStarfield();
            
            animationFrame = requestAnimationFrame(animate);
        }

        // ===== COMPLETE WARP =====
        function completeWarp() {
            // Clear warp data
            localStorage.removeItem('voidfarer_warp_data');
            
            // Navigate to destination (surface)
            window.location.href = warpData.returnPage || 'surface.html';
        }

        // ===== INITIALIZE =====
        function init() {
            try {
                // Load warp data
                loadWarpData();
                
                // Draw initial map
                drawMap();
                drawStarfield();
                
                // Start animation
                setTimeout(() => {
                    statusMessage.classList.add('visible');
                    setTimeout(() => {
                        statusMessage.classList.remove('visible');
                    }, 2000);
                }, 100);

                animate();

            } catch (error) {
                console.error('Init error:', error);
                animate();
            }
        }

        init();

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
</html>
