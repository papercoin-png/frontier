<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Sectors</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .star-map-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Canvas for star map */
        #starMapCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            touch-action: none;
        }
        
        /* Very subtle grid overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(80, 100, 180, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(80, 100, 180, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 5;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0ff;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 15px #6a8ac0;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 40px 15px 40px 15px;
            border: 1px solid rgba(160, 176, 192, 0.3);
            z-index: 20;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(160, 176, 192, 0.3);
            color: #d0e0f0;
            padding: 10px 20px;
            border-radius: 40px 15px 40px 15px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 20;
            min-width: 90px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.2);
            transform: scale(0.96);
        }
        
        .region-info {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(160, 176, 192, 0.3);
            color: #b0c0e0;
            padding: 10px 14px;
            border-radius: 30px 10px 30px 10px;
            font-size: 12px;
            z-index: 20;
            text-align: center;
            min-width: 110px;
        }
        
        .region-name {
            font-family: 'WindSong', cursive;
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 2px;
        }
        
        /* Sector markers */
        .sector-marker {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .sector-marker:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        
        .sector-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 120, 200, 0.25), transparent 80%);
            animation: breathe 4s infinite ease-in-out;
            z-index: 11;
        }
        
        .sector-core {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #8a9aff);
            box-shadow: 0 0 20px #8a9aff;
            z-index: 12;
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        .sector-label {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'WindSong', cursive;
            font-size: 11px;
            text-shadow: 0 0 8px #ffffff;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(2px);
            padding: 4px 8px;
            border-radius: 30px 8px 30px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            z-index: 13;
            letter-spacing: 0.5px;
        }
        
        .star-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: rgba(255, 170, 74, 0.9);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 10px rgba(255, 170, 74, 0.3);
            z-index: 14;
        }
        
        @keyframes breathe {
            0% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
            100% { opacity: 0.15; transform: scale(1); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 15px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #8a9aff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #d0e0ff;
            font-family: 'WindSong', cursive;
            font-size: 18px;
            text-shadow: 0 0 15px #8a9aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .region-info { bottom: max(20px, env(safe-area-inset-bottom)); right: max(15px, env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>
    <div class="star-map-view">
        <canvas id="starMapCanvas"></canvas>
        <div class="grid-overlay"></div>
        
        <div class="ui-header" id="regionTitle">Orion Sector</div>
        <button class="back-btn" onclick="returnToGalaxy()">← Galaxy</button>
        
        <div class="region-info" id="regionInfo">
            <div class="region-name" id="regionName">Orion Arm</div>
            <div id="sectorCount">6 sectors</div>
            <div id="totalStars" style="font-size:10px; margin-top:2px; opacity:0.8;">calculating...</div>
        </div>
        
        <div id="sectorMarkers"></div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">entering star cluster...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starMapCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ===== LOAD REGION DATA =====
        const currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion';
        document.getElementById('regionTitle').textContent = currentRegion + ' Sector';
        document.getElementById('regionName').textContent = currentRegion + ' Arm';
        
        // ===== SECTOR POSITIONS WITH STAR COUNTS =====
        const sectorData = {
            'Orion': [
                { name: 'Orion Molecular Cloud', x: 30, y: 40, stars: 85, type: 'Star-forming' },
                { name: 'Barnard\'s Loop', x: 60, y: 30, stars: 62, type: 'Emission' },
                { name: 'Lambda Orionis', x: 45, y: 60, stars: 48, type: 'Cluster' },
                { name: 'Sigma Orionis', x: 70, y: 55, stars: 55, type: 'Multiple' },
                { name: 'Trapezium', x: 25, y: 65, stars: 120, type: 'Young' },
                { name: 'NGC 1980', x: 55, y: 70, stars: 40, type: 'Reflection' }
            ],
            'Cygnus': [
                { name: 'Cygnus OB2', x: 35, y: 30, stars: 150, type: 'Association' },
                { name: 'Veil Nebula', x: 65, y: 35, stars: 45, type: 'Supernova' },
                { name: 'North America', x: 40, y: 60, stars: 70, type: 'Emission' },
                { name: 'Pelican', x: 60, y: 65, stars: 55, type: 'Emission' },
                { name: 'Crescent', x: 75, y: 45, stars: 35, type: 'Wolf-Rayet' },
                { name: 'Butterfly', x: 25, y: 70, stars: 25, type: 'Planetary' }
            ],
            'Sagittarius': [
                { name: 'Lagoon', x: 30, y: 35, stars: 95, type: 'Emission' },
                { name: 'Trifid', x: 55, y: 30, stars: 65, type: 'Mixed' },
                { name: 'Omega', x: 45, y: 60, stars: 110, type: 'Star-forming' },
                { name: 'Eagle', x: 70, y: 55, stars: 130, type: 'Star-forming' },
                { name: 'M18', x: 25, y: 65, stars: 40, type: 'Cluster' },
                { name: 'M25', x: 60, y: 70, stars: 55, type: 'Cluster' }
            ],
            'Perseus': [
                { name: 'Double Cluster', x: 35, y: 30, stars: 200, type: 'Open Cluster' },
                { name: 'California', x: 60, y: 35, stars: 75, type: 'Emission' },
                { name: 'Heart', x: 45, y: 60, stars: 90, type: 'Emission' },
                { name: 'Soul', x: 70, y: 55, stars: 85, type: 'Emission' },
                { name: 'Little Dumbbell', x: 25, y: 65, stars: 25, type: 'Planetary' },
                { name: 'M34', x: 55, y: 70, stars: 60, type: 'Cluster' }
            ],
            'Carina': [
                { name: 'Eta Carinae', x: 35, y: 30, stars: 180, type: 'Hypergiant' },
                { name: 'Keyhole', x: 60, y: 35, stars: 95, type: 'Emission' },
                { name: 'Homunculus', x: 45, y: 60, stars: 30, type: 'Bipolar' },
                { name: 'Southern Pleiades', x: 70, y: 55, stars: 70, type: 'Cluster' },
                { name: 'Wishing Well', x: 25, y: 65, stars: 85, type: 'Cluster' },
                { name: 'NGC 3293', x: 55, y: 70, stars: 65, type: 'Cluster' }
            ],
            'Outer': [
                { name: 'Ghost', x: 35, y: 30, stars: 45, type: 'Reflection' },
                { name: 'Witch Head', x: 60, y: 35, stars: 55, type: 'Reflection' },
                { name: 'Monkey Head', x: 45, y: 60, stars: 60, type: 'Emission' },
                { name: 'Cone', x: 70, y: 55, stars: 70, type: 'Emission' },
                { name: 'Christmas Tree', x: 25, y: 65, stars: 50, type: 'Cluster' },
                { name: 'Iris', x: 55, y: 70, stars: 40, type: 'Reflection' }
            ],
            'Core': [
                { name: 'Central Cluster', x: 50, y: 50, stars: 500, type: 'Galactic Core' },
                { name: 'Quintuplet', x: 35, y: 40, stars: 85, type: 'Compact' },
                { name: 'Arches', x: 65, y: 45, stars: 120, type: 'Massive' },
                { name: 'Sagittarius A*', x: 50, y: 60, stars: 200, type: 'Black Hole' },
                { name: 'Nuclear Bulge', x: 40, y: 65, stars: 350, type: 'Old Stars' },
                { name: 'Galactic Center', x: 60, y: 55, stars: 450, type: 'Core Region' }
            ]
        };
        
        const sectors = sectorData[currentRegion] || sectorData['Orion'];
        document.getElementById('sectorCount').textContent = sectors.length + ' sectors';
        
        const totalStars = sectors.reduce((sum, s) => sum + s.stars, 0);
        document.getElementById('totalStars').textContent = totalStars.toLocaleString() + ' stars';
        
        // ===== DRAW STAR MAP BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBackground();
        }
        
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Background stars
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Distant nebulae - extremely faint
            const nebulae = [
                [30, 0.3, 60], [120, 0.35, 70], [210, 0.25, 55],
                [300, 0.4, 65], [80, 0.3, 60], [200, 0.45, 50]
            ];
            
            nebulae.forEach(([angle, dist, size]) => {
                const rad = angle * Math.PI / 180;
                const x = centerX + Math.cos(rad) * (dist * canvas.width * 0.35);
                const y = centerY + Math.sin(rad) * (dist * canvas.height * 0.35);
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, 'rgba(90, 100, 140, 0.03)');
                gradient.addColorStop(0.7, 'rgba(60, 70, 110, 0.01)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw faint connection lines between sectors
            ctx.strokeStyle = 'rgba(100, 120, 160, 0.08)';
            ctx.lineWidth = 0.5;
            
            for (let i = 0; i < sectors.length; i++) {
                for (let j = i + 1; j < sectors.length; j++) {
                    if (Math.random() > 0.4) continue;
                    
                    const x1 = (sectors[i].x / 100) * canvas.width;
                    const y1 = (sectors[i].y / 100) * canvas.height;
                    const x2 = (sectors[j].x / 100) * canvas.width;
                    const y2 = (sectors[j].y / 100) * canvas.height;
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }
        }
        
        // ===== CREATE SECTOR MARKERS =====
        function createSectorMarkers() {
            const container = document.getElementById('sectorMarkers');
            container.innerHTML = '';
            
            sectors.forEach((sector, index) => {
                const marker = document.createElement('div');
                marker.className = 'sector-marker';
                marker.style.left = sector.x + '%';
                marker.style.top = sector.y + '%';
                marker.setAttribute('onclick', `selectSector(${index})`);
                
                marker.innerHTML = `
                    <div class="sector-glow"></div>
                    <div class="sector-core"></div>
                    <span class="sector-label">${sector.name}</span>
                    <span class="star-count">${sector.stars}</span>
                `;
                
                container.appendChild(marker);
            });
        }
        
        // ===== SECTOR SELECTION =====
        function selectSector(index) {
            const sector = sectors[index];
            if (!sector) return;
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Save ALL sector data for the star cluster
            localStorage.setItem('voidfarer_current_nebula', sector.name);
            localStorage.setItem('voidfarer_current_sector_type', sector.type);
            localStorage.setItem('voidfarer_current_sector_stars', sector.stars);
            localStorage.setItem('voidfarer_current_galaxy_sector', currentRegion);
            
            console.log('Saving sector data:', {
                name: sector.name,
                type: sector.type,
                stars: sector.stars,
                region: currentRegion
            });
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'star-cluster.html';
            }, 800);
        }
        
        function returnToGalaxy() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'galaxy-map.html';
        }
        
        // ===== INITIALIZE =====
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            resizeCanvas();
            createSectorMarkers();
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                createSectorMarkers();
            });
        }
        
        init();
    </script>
</body>
</html>
