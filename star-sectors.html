<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Sectors</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .sector-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 25px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .current-location {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 24px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 100px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Sector Info Panel */
        .sector-panel {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 70px);
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            min-width: 240px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .sector-panel.visible {
            display: block;
        }
        
        .sector-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            font-weight: 600;
        }
        
        .sector-type {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .distance-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .distance-label {
            color: #a0c0ff;
        }
        
        .distance-value {
            color: #ffaa4a;
            font-weight: bold;
        }
        
        .fuel-value {
            color: #4affaa;
            font-weight: bold;
        }
        
        .time-value {
            color: #8a6aff;
            font-weight: bold;
        }
        
        .stars-count {
            text-align: center;
            color: #ffd966;
            font-size: 18px;
            margin: 10px 0;
        }
        
        .travel-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.1s;
            font-weight: 600;
        }
        
        .travel-btn:active {
            background: #6aa0e0;
            transform: scale(0.98);
        }
        
        .travel-btn:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Sector markers */
        .sector-marker {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .sector-marker.selected .sector-glow {
            opacity: 0.8;
            transform: scale(1.2);
        }
        
        .sector-marker.selected .sector-core {
            transform: scale(1.3);
            box-shadow: 0 0 40px #ffaa4a;
        }
        
        .sector-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 120, 200, 0.3), transparent 80%);
            animation: breathe 4s infinite ease-in-out;
            z-index: 21;
            pointer-events: none;
        }
        
        .sector-core {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #8a9aff);
            box-shadow: 0 0 20px #8a9aff;
            z-index: 22;
            border: 2px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        
        .sector-label {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Exo 2', sans-serif;
            font-size: 11px;
            text-shadow: 0 0 8px #ffffff;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(2px);
            padding: 4px 8px;
            border-radius: 30px 8px 30px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            z-index: 23;
            pointer-events: none;
            font-weight: 500;
        }
        
        .star-count-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #ffaa4a;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            z-index: 24;
        }
        
        @keyframes breathe {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(1); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .current-location { top: max(80px, env(safe-area-inset-top) + 50px); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .sector-panel { bottom: max(100px, env(safe-area-inset-bottom) + 70px); right: max(15px, env(safe-area-inset-right)); }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sector-view">
        <div class="ui-header" id="regionTitle">Loading Sector...</div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading location...</span>
        </div>
        
        <button class="back-btn" onclick="returnToGalaxy()">← GALAXY</button>
        
        <!-- Sector markers will be added here -->
        <div id="sectorMarkers"></div>
        
        <!-- Sector Info Panel -->
        <div class="sector-panel" id="sectorPanel">
            <div class="sector-name" id="selectedSectorName">Loading...</div>
            <div class="sector-type" id="selectedSectorType">---</div>
            <div class="stars-count" id="selectedStarCount">⭐ -- stars</div>
            <div class="distance-row">
                <span class="distance-label">Distance:</span>
                <span class="distance-value" id="sectorDistance">-- LY</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Warp Cycles:</span>
                <span class="time-value" id="warpCycles">-- cycle</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Travel Time:</span>
                <span class="time-value" id="travelTime">-- sec</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Fuel Required:</span>
                <span class="fuel-value" id="fuelCost">-- ⭐</span>
            </div>
            <button class="travel-btn" id="travelBtn" onclick="travelToSector()">🚀 EXPLORE</button>
        </div>
        
        <canvas id="sectorCanvas"></canvas>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">loading sectors...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const canvas = document.getElementById('sectorCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const sectorPanel = document.getElementById('sectorPanel');
        const markersContainer = document.getElementById('sectorMarkers');

        // ===== STATE =====
        let currentRegion = 'Orion';
        let currentSector = 'Orion Molecular Cloud';
        let currentSectorX = 30;
        let currentSectorY = 40;
        let sectors = [];
        let selectedSector = null;
        let selectedIndex = -1;

        // ===== SECTOR DATA BY REGION =====
        const sectorData = {
            'Orion': [
                { name: 'Orion Molecular Cloud', x: 30, y: 40, stars: 85, type: 'Star-forming' },
                { name: 'Barnard\'s Loop', x: 60, y: 30, stars: 62, type: 'Emission' },
                { name: 'Lambda Orionis', x: 45, y: 60, stars: 48, type: 'Cluster' },
                { name: 'Sigma Orionis', x: 70, y: 55, stars: 55, type: 'Multiple' },
                { name: 'Trapezium', x: 25, y: 65, stars: 120, type: 'Young' },
                { name: 'NGC 1980', x: 55, y: 70, stars: 40, type: 'Reflection' }
            ],
            'Cygnus': [
                { name: 'Cygnus OB2', x: 35, y: 30, stars: 150, type: 'Association' },
                { name: 'Veil Nebula', x: 65, y: 35, stars: 45, type: 'Supernova' },
                { name: 'North America', x: 40, y: 60, stars: 70, type: 'Emission' },
                { name: 'Pelican', x: 60, y: 65, stars: 55, type: 'Emission' },
                { name: 'Crescent', x: 75, y: 45, stars: 35, type: 'Wolf-Rayet' },
                { name: 'Butterfly', x: 25, y: 70, stars: 25, type: 'Planetary' }
            ],
            'Sagittarius': [
                { name: 'Lagoon', x: 30, y: 35, stars: 95, type: 'Emission' },
                { name: 'Trifid', x: 55, y: 30, stars: 65, type: 'Mixed' },
                { name: 'Omega', x: 45, y: 60, stars: 110, type: 'Star-forming' },
                { name: 'Eagle', x: 70, y: 55, stars: 130, type: 'Star-forming' },
                { name: 'M18', x: 25, y: 65, stars: 40, type: 'Cluster' },
                { name: 'M25', x: 60, y: 70, stars: 55, type: 'Cluster' }
            ],
            'Perseus': [
                { name: 'Double Cluster', x: 35, y: 30, stars: 200, type: 'Open Cluster' },
                { name: 'California', x: 60, y: 35, stars: 75, type: 'Emission' },
                { name: 'Heart', x: 45, y: 60, stars: 90, type: 'Emission' },
                { name: 'Soul', x: 70, y: 55, stars: 85, type: 'Emission' },
                { name: 'Little Dumbbell', x: 25, y: 65, stars: 25, type: 'Planetary' },
                { name: 'M34', x: 55, y: 70, stars: 60, type: 'Cluster' }
            ],
            'Carina': [
                { name: 'Eta Carinae', x: 35, y: 30, stars: 180, type: 'Hypergiant' },
                { name: 'Keyhole', x: 60, y: 35, stars: 95, type: 'Emission' },
                { name: 'Homunculus', x: 45, y: 60, stars: 30, type: 'Bipolar' },
                { name: 'Southern Pleiades', x: 70, y: 55, stars: 70, type: 'Cluster' },
                { name: 'Wishing Well', x: 25, y: 65, stars: 85, type: 'Cluster' },
                { name: 'NGC 3293', x: 55, y: 70, stars: 65, type: 'Cluster' }
            ],
            'Outer': [
                { name: 'Ghost', x: 35, y: 30, stars: 45, type: 'Reflection' },
                { name: 'Witch Head', x: 60, y: 35, stars: 55, type: 'Reflection' },
                { name: 'Monkey Head', x: 45, y: 60, stars: 60, type: 'Emission' },
                { name: 'Cone', x: 70, y: 55, stars: 70, type: 'Emission' },
                { name: 'Christmas Tree', x: 25, y: 65, stars: 50, type: 'Cluster' },
                { name: 'Iris', x: 55, y: 70, stars: 40, type: 'Reflection' }
            ],
            'Core': [
                { name: 'Central Cluster', x: 50, y: 50, stars: 500, type: 'Galactic Core' },
                { name: 'Quintuplet', x: 35, y: 40, stars: 85, type: 'Compact' },
                { name: 'Arches', x: 65, y: 45, stars: 120, type: 'Massive' },
                { name: 'Sagittarius A*', x: 50, y: 60, stars: 200, type: 'Black Hole' },
                { name: 'Nuclear Bulge', x: 40, y: 65, stars: 350, type: 'Old Stars' },
                { name: 'Galactic Center', x: 60, y: 55, stars: 450, type: 'Core Region' }
            ]
        };

        // ===== LOAD REGION DATA =====
        async function loadRegionData() {
            try {
                // Load data
                const region = typeof getCurrentRegion === 'function' ? await getCurrentRegion() : 'Orion';
                const sector = typeof getCurrentSectorName === 'function' ? await getCurrentSectorName() : 'Orion Molecular Cloud';
                const x = typeof getCurrentSectorX === 'function' ? await getCurrentSectorX() : 30;
                const y = typeof getCurrentSectorY === 'function' ? await getCurrentSectorY() : 40;

                currentRegion = region || 'Orion';
                currentSector = sector || 'Orion Molecular Cloud';
                currentSectorX = x || 30;
                currentSectorY = y || 40;

                // Update UI
                document.getElementById('regionTitle').textContent = currentRegion + ' Sector';
                document.getElementById('currentLocationText').textContent = currentSector;

                // Get sectors for this region
                sectors = sectorData[currentRegion] || sectorData['Orion'];

                return true;

            } catch (error) {
                console.error('Error loading region data:', error);
                // Use defaults
                currentRegion = 'Orion';
                sectors = sectorData['Orion'];
                document.getElementById('regionTitle').textContent = 'Orion Sector';
                document.getElementById('currentLocationText').textContent = 'Orion Molecular Cloud';
                return false;
            }
        }

        // ===== SELECT SECTOR =====
        function selectSector(index) {
            const sector = sectors[index];
            if (!sector) return;
            
            // Remove previous selection
            document.querySelectorAll('.sector-marker').forEach(m => {
                m.classList.remove('selected');
            });
            
            // Add selection
            const marker = document.getElementById('sector-' + index);
            if (marker) {
                marker.classList.add('selected');
            }
            
            selectedSector = sector;
            selectedIndex = index;
            
            // Calculate distance from current location
            const distance = calculateDistance(
                currentSectorX, currentSectorY,
                sector.x, sector.y
            );
            const cycles = calculateWarpCycles(distance);
            const fuel = calculateFuel(distance);
            const time = cycles * 2;
            
            // Update panel
            document.getElementById('selectedSectorName').textContent = sector.name;
            document.getElementById('selectedSectorType').textContent = sector.type;
            document.getElementById('selectedStarCount').innerHTML = '⭐ ' + sector.stars + ' stars';
            document.getElementById('sectorDistance').textContent = distance.toFixed(1) + ' LY';
            document.getElementById('warpCycles').textContent = cycles + ' cycle' + (cycles > 1 ? 's' : '');
            document.getElementById('travelTime').textContent = time + ' sec';
            document.getElementById('fuelCost').innerHTML = fuel + ' ⭐';
            
            // Enable/disable based on whether it's current location
            const travelBtn = document.getElementById('travelBtn');
            if (sector.name === currentSector) {
                travelBtn.disabled = true;
                travelBtn.textContent = '📍 CURRENT LOCATION';
            } else {
                travelBtn.disabled = false;
                travelBtn.textContent = '🚀 EXPLORE';
            }
            
            sectorPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== DISTANCE CALCULATION =====
        function calculateDistance(x1, y1, x2, y2) {
            const dx = (x1 - x2) / 10;
            const dy = (y1 - y2) / 10;
            return Math.sqrt(dx*dx + dy*dy) * 5;
        }

        function calculateWarpCycles(distance) {
            if (distance <= 2) return 1;
            if (distance <= 4) return 2;
            if (distance <= 6) return 3;
            if (distance <= 8) return 4;
            return 5;
        }

        function calculateFuel(distance) {
            return Math.floor(distance * 3) + 5;
        }

        // ===== TRAVEL TO SECTOR =====
        async function travelToSector() {
            if (!selectedSector || selectedSector.name === currentSector) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'calculating warp...';
            
            try {
                // Calculate warp details
                const distance = calculateDistance(
                    currentSectorX, currentSectorY,
                    selectedSector.x, selectedSector.y
                );
                const cycles = calculateWarpCycles(distance);
                const fuel = calculateFuel(distance);
                
                // Save destination
                if (typeof setCurrentNebula === 'function') {
                    await setCurrentNebula(
                        selectedSector.name,
                        selectedSector.type,
                        selectedSector.stars,
                        selectedSector.x,
                        selectedSector.y
                    );
                } else {
                    localStorage.setItem('voidfarer_current_nebula', selectedSector.name);
                    localStorage.setItem('voidfarer_current_sector_name', selectedSector.name);
                    localStorage.setItem('voidfarer_current_sector_type', selectedSector.type);
                    localStorage.setItem('voidfarer_current_sector_stars', selectedSector.stars);
                }
                
                // Save warp data
                if (typeof setWarpData === 'function') {
                    setWarpData(selectedSector.name, 'star-sectors.html', cycles, distance, fuel);
                } else {
                    localStorage.setItem('voidfarer_warp_destination', selectedSector.name);
                    localStorage.setItem('voidfarer_warp_return', 'star-sectors.html');
                    localStorage.setItem('voidfarer_warp_cycles', cycles);
                }
                
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);

            } catch (error) {
                console.error('Error traveling to sector:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to travel. Please try again.');
            }
        }

        // ===== RETURN TO GALAXY =====
        function returnToGalaxy() {
            window.location.href = 'galaxy-map.html';
        }

        // ===== CREATE SECTOR MARKERS =====
        function createSectorMarkers() {
            markersContainer.innerHTML = '';
            
            sectors.forEach((sector, index) => {
                const marker = document.createElement('div');
                marker.className = 'sector-marker';
                marker.id = 'sector-' + index;
                marker.style.left = sector.x + '%';
                marker.style.top = sector.y + '%';
                
                // Use onclick directly
                marker.onclick = function() { selectSector(index); };
                
                // Highlight current location
                if (sector.name === currentSector) {
                    marker.classList.add('selected');
                }
                
                marker.innerHTML = `
                    <div class="sector-glow"></div>
                    <div class="sector-core"></div>
                    <span class="sector-label">${sector.name}</span>
                    <span class="star-count-badge">${sector.stars}</span>
                `;
                
                markersContainer.appendChild(marker);
            });
        }

        // ===== DRAW BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBackground();
        }

        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Background stars
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Nebula glow based on region
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.4
            );
            
            let color;
            switch(currentRegion) {
                case 'Orion': color = 'rgba(100, 80, 200, 0.1)'; break;
                case 'Cygnus': color = 'rgba(200, 80, 150, 0.1)'; break;
                case 'Sagittarius': color = 'rgba(200, 150, 80, 0.1)'; break;
                default: color = 'rgba(100, 100, 150, 0.1)';
            }
            
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.7, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star sectors...';

                // Check for player data
                const credits = typeof getCredits === 'function' ? await getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load region data
                await loadRegionData();

                // Resize canvas and draw background
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                // Create sector markers
                createSectorMarkers();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>

    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
