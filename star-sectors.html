<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Sectors</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .sector-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 25px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .current-location {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .journey-info {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
        }
        
        .journey-distance {
            color: #4affaa;
            font-weight: 600;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 24px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 100px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Sector Info Panel */
        .sector-panel {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 70px);
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            min-width: 240px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .sector-panel.visible {
            display: block;
        }
        
        .sector-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            font-weight: 600;
        }
        
        .sector-type {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .info-label {
            color: #a0c0ff;
        }
        
        .info-value {
            color: #ffd966;
            font-weight: bold;
        }
        
        .distance-value {
            color: #4affaa;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stars-count {
            text-align: center;
            color: #4affaa;
            font-size: 18px;
            margin: 10px 0;
        }
        
        .travel-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.1s;
            font-weight: 600;
        }
        
        .travel-btn:active {
            background: #6aa0e0;
            transform: scale(0.98);
        }
        
        .travel-btn:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Sector markers */
        .sector-marker {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .sector-marker.selected .sector-glow {
            opacity: 0.8;
            transform: scale(1.2);
        }
        
        .sector-marker.selected .sector-core {
            transform: scale(1.3);
            box-shadow: 0 0 40px #ffaa4a;
        }
        
        .sector-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 120, 200, 0.3), transparent 80%);
            animation: breathe 4s infinite ease-in-out;
            z-index: 21;
            pointer-events: none;
        }
        
        .sector-core {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #8a9aff);
            box-shadow: 0 0 20px #8a9aff;
            z-index: 22;
            border: 2px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        
        .sector-label {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Exo 2', sans-serif;
            font-size: 11px;
            text-shadow: 0 0 8px #ffffff;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(2px);
            padding: 4px 8px;
            border-radius: 30px 8px 30px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            z-index: 23;
            pointer-events: none;
            font-weight: 500;
        }
        
        .distance-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #ffaa4a;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            z-index: 24;
        }
        
        @keyframes breathe {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(1); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .current-location { top: max(80px, env(safe-area-inset-top) + 50px); left: max(20px, env(safe-area-inset-left)); }
            .journey-info { top: max(80px, env(safe-area-inset-top) + 50px); right: max(20px, env(safe-area-inset-right)); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .sector-panel { bottom: max(100px, env(safe-area-inset-bottom) + 70px); right: max(15px, env(safe-area-inset-right)); }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>

        // ===== LOAD JOURNEY DISTANCE =====
        function loadJourneyDistance() {
            const saved = localStorage.getItem('voidfarer_journey_distance');
            journeyDistance = saved ? parseFloat(saved) : 0;
            document.getElementById('journeyDistance').textContent = journeyDistance.toFixed(1);
        }

        // ===== LOAD REGION DATA =====
        async function loadRegionData() {
            try {
                // Load data from storage - get both sector ID and display name

                const regionName = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                
                // Also try storage functions if available
                if (typeof getCurrentSector === 'function') {
                    const storedSector = await getCurrentSector();
                    if (storedSector) currentSectorId = storedSector;
                }
                if (typeof getCurrentRegion === 'function') {
                    const storedRegion = await getCurrentRegion();
                    if (storedRegion) currentRegion = storedRegion;
                }
                
                // Set current values
                currentSectorId = sectorId;
                currentRegion = regionName;
                
                // Get the first sector name as current location
                const regionSectors = sectorData[currentRegion] || sectorData['Orion Arm'];
                currentSectorName = regionSectors[0]?.name || 'Orion Molecular Cloud';

                // Update UI
                document.getElementById('regionTitle').textContent = currentRegion;
                document.getElementById('currentLocationText').textContent = currentSectorName;

                // Get sectors for this region using the display name
                sectors = sectorData[currentRegion] || sectorData['Orion Arm'];

                // Load journey distance
                loadJourneyDistance();

                return true;

            } catch (error) {
                console.error('Error loading region data:', error);
                currentRegion = 'Orion Arm';
                sectors = sectorData['Orion Arm'];
                document.getElementById('regionTitle').textContent = 'Orion Arm';
                document.getElementById('currentLocationText').textContent = 'Orion Molecular Cloud';
                return false;
            }
        }

        // ===== SELECT SECTOR =====
        function selectSector(index) {
            const sector = sectors[index];
            if (!sector) return;
            
            // Remove previous selection
            document.querySelectorAll('.sector-marker').forEach(m => {
                m.classList.remove('selected');
            });
            
            // Add selection
            const marker = document.getElementById('sector-' + index);
            if (marker) {
                marker.classList.add('selected');
            }
            
            selectedSector = sector;
            selectedIndex = index;
            
            // Update panel
            document.getElementById('selectedSectorName').textContent = sector.name;
            document.getElementById('selectedSectorType').textContent = sector.type;
            document.getElementById('selectedStarCount').textContent = sector.stars;
            document.getElementById('sectorDistance').textContent = sector.distance.toFixed(1) + ' LY';
            
            // Enable/disable based on whether it's current location
            const travelBtn = document.getElementById('travelBtn');
            if (sector.name === currentSectorName) {
                travelBtn.disabled = true;
                travelBtn.textContent = '📍 CURRENT LOCATION';
            } else {
                travelBtn.disabled = false;
                travelBtn.textContent = '🚀 EXPLORE';
            }
            
            sectorPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== TRAVEL TO SECTOR =====
        async function travelToSector() {
            if (!selectedSector || selectedSector.name === currentSectorName) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'entering star cluster...';
            
            try {
                // Add this sector's distance to journey total
                const newTotal = journeyDistance + selectedSector.distance;
                localStorage.setItem('voidfarer_journey_distance', newTotal.toString());
                
                // Save destination - store both the nebula name and the region it belongs to
                if (typeof setCurrentNebula === 'function') {
                    await setCurrentNebula(
                        selectedSector.name,
                        selectedSector.type,
                        selectedSector.stars,
                        selectedSector.x || 50,
                        selectedSector.y || 50,
                        currentRegion // Pass the region name
                    );
                } else {
                    localStorage.setItem('voidfarer_current_nebula', selectedSector.name);
                    localStorage.setItem('voidfarer_current_sector_name', selectedSector.name);
                    localStorage.setItem('voidfarer_current_sector_type', selectedSector.type);
                    localStorage.setItem('voidfarer_current_sector_stars', selectedSector.stars.toString());
                    localStorage.setItem('voidfarer_current_region', currentRegion); // Keep region
                }
                
                // Navigate to star cluster
                setTimeout(() => {
                    window.location.href = 'star-cluster.html';
                }, 500);

            } catch (error) {
                console.error('Error traveling to sector:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to enter sector. Please try again.');
            }
        }

        // ===== RETURN TO GALAXY =====
        function returnToGalaxy() {
            window.location.href = 'galaxy-map.html';
        }

        // ===== CREATE SECTOR MARKERS =====
        function createSectorMarkers() {
            markersContainer.innerHTML = '';
            
            sectors.forEach((sector, index) => {
                const marker = document.createElement('div');
                marker.className = 'sector-marker';
                marker.id = 'sector-' + index;
                marker.style.left = (sector.x || 30 + index * 10) + '%';
                marker.style.top = (sector.y || 40 + index * 5) + '%';
                
                // Use onclick directly
                marker.onclick = function() { selectSector(index); };
                
                // Highlight current location
                if (sector.name === currentSectorName) {
                    marker.classList.add('selected');
                }
                
                marker.innerHTML = `
                    <div class="sector-glow"></div>
                    <div class="sector-core"></div>
                    <span class="sector-label">${sector.name}</span>
                    <span class="distance-badge">${sector.distance.toFixed(1)} LY</span>
                `;
                
                markersContainer.appendChild(marker);
            });
        }

        // ===== DRAW BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawBackground();
        }

        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Background stars
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Nebula glow based on region
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.4
            );
            
            let color;
            if (currentRegion.includes('Cygnus')) color = 'rgba(200, 80, 150, 0.1)';
            else if (currentRegion.includes('Perseus')) color = 'rgba(74, 255, 170, 0.1)';
            else if (currentRegion.includes('Core')) color = 'rgba(200, 150, 80, 0.15)';
            else if (currentRegion.includes('Orion')) color = 'rgba(138, 106, 255, 0.1)';
            else if (currentRegion.includes('Sagittarius')) color = 'rgba(192, 106, 255, 0.1)';
            else if (currentRegion.includes('Carina')) color = 'rgba(106, 138, 255, 0.1)';
            else color = 'rgba(100, 100, 150, 0.1)';
            
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.7, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star sectors...';

                // Check for player data
                const credits = typeof getCredits === 'function' ? await getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load region data
                await loadRegionData();

                // Resize canvas and draw background
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                // Create sector markers
                createSectorMarkers();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
