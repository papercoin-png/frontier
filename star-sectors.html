<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Star Sectors</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .sector-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 25px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .current-location {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .journey-info {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
        }
        
        .journey-distance {
            color: #4affaa;
            font-weight: 600;
        }
        
        .journey-total {
            position: absolute;
            top: max(130px, env(safe-area-inset-top) + 100px);
            right: 20px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 10px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: none;
        }
        
        .journey-total.visible {
            display: block;
        }
        
        .journey-total-label {
            color: #a0c0ff;
            margin-right: 5px;
        }
        
        .journey-total-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 24px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 100px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Star Sector Info Panel */
        .sector-panel {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 70px);
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            min-width: 260px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .sector-panel.visible {
            display: block;
        }
        
        .sector-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            font-weight: 600;
        }
        
        .sector-type {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .info-label {
            color: #a0c0ff;
        }
        
        .info-value {
            color: #ffd966;
            font-weight: bold;
        }
        
        .distance-value {
            color: #4affaa;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stars-count {
            text-align: center;
            color: #4affaa;
            font-size: 18px;
            margin: 10px 0;
        }
        
        /* NEW: Discovery History Panel */
        .discovery-panel {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .discovery-title {
            color: #ffaa4a;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 170, 74, 0.3);
            padding-bottom: 4px;
        }
        
        .discovery-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
        }
        
        .discovery-player {
            color: #4affaa;
            font-weight: 500;
        }
        
        .discovery-date {
            color: #a0c0ff;
        }
        
        .discovery-badge {
            font-size: 8px;
            background: rgba(255, 215, 0, 0.2);
            padding: 2px 5px;
            border-radius: 20px;
            color: #ffd700;
            margin-left: 5px;
        }
        
        /* NEW: Rights Status Panel */
        .rights-status {
            background: rgba(74, 255, 170, 0.1);
            border: 1px solid #4affaa;
            border-radius: 40px 10px 40px 10px;
            padding: 8px 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .rights-status.expiring {
            border-color: #ffaa4a;
            background: rgba(255, 170, 74, 0.1);
        }
        
        .rights-status.expired {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }
        
        .rights-label {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .rights-value {
            font-size: 12px;
            font-weight: 600;
            color: #4affaa;
        }
        
        .rights-value.warning {
            color: #ffaa4a;
        }
        
        .rights-value.danger {
            color: #ff4444;
        }
        
        /* NEW: Scan Button */
        .scan-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 10px;
        }
        
        .scan-btn:active {
            background: #6aa0e0;
            transform: scale(0.96);
        }
        
        .warp-info {
            background: rgba(74, 138, 192, 0.2);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #4a8ac0;
        }
        
        .warp-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 13px;
        }
        
        .warp-label {
            color: #a0c0ff;
        }
        
        .warp-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        .action-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.1s;
            font-weight: 600;
        }
        
        .action-btn:active {
            background: #6aa0e0;
            transform: scale(0.98);
        }
        
        .action-btn:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .action-btn.primary {
            background: #ffaa4a;
            color: #0a0a1a;
        }
        
        .action-btn.primary:active {
            background: #ffcc6a;
        }
        
        /* Star Sector markers */
        .sector-marker {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .sector-marker.selected .sector-glow {
            opacity: 0.8;
            transform: scale(1.2);
        }
        
        .sector-marker.selected .sector-core {
            transform: scale(1.3);
            box-shadow: 0 0 40px #ffaa4a;
        }
        
        /* NEW: Hidden sector style */
        .sector-marker.hidden .sector-core {
            background: radial-gradient(circle at 30% 30%, #888888, #444444);
            box-shadow: 0 0 10px #ff4444;
        }
        
        .sector-marker.hidden .sector-label {
            color: #ff8888;
            border-color: #ff4444;
        }
        
        .sector-marker.hidden .distance-badge {
            background: #ff4444;
            color: white;
        }
        
        .sector-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 120, 200, 0.3), transparent 80%);
            animation: breathe 4s infinite ease-in-out;
            z-index: 21;
            pointer-events: none;
        }
        
        .sector-core {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #8a9aff);
            box-shadow: 0 0 20px #8a9aff;
            z-index: 22;
            border: 2px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        
        .sector-label {
            position: absolute;
            top: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Exo 2', sans-serif;
            font-size: 11px;
            text-shadow: 0 0 8px #ffffff;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(2px);
            padding: 4px 8px;
            border-radius: 30px 8px 30px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            z-index: 23;
            pointer-events: none;
            font-weight: 500;
        }
        
        .distance-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #ffaa4a;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            z-index: 24;
        }
        
        @keyframes breathe {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(1); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* NEW: Rediscovery Notification */
        .rediscovery-notification {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 255, 170, 0.95);
            color: #0a0a1a;
            padding: 10px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            font-weight: 600;
            z-index: 5000;
            display: none;
            animation: slideUp 0.3s ease-out;
            white-space: nowrap;
            font-family: 'Exo 2', sans-serif;
        }
        
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .current-location { top: max(80px, env(safe-area-inset-top) + 50px); left: max(20px, env(safe-area-inset-left)); }
            .journey-info { top: max(80px, env(safe-area-inset-top) + 50px); right: max(20px, env(safe-area-inset-right)); }
            .journey-total { top: max(130px, env(safe-area-inset-top) + 100px); right: max(20px, env(safe-area-inset-right)); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .sector-panel { bottom: max(100px, env(safe-area-inset-bottom) + 70px); right: max(15px, env(safe-area-inset-right)); }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sector-view">
        <div class="ui-header" id="regionTitle">Loading Star Sectors...</div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading location...</span>
        </div>
        
        <div class="journey-info" id="journeyInfo">
            <span>Journey: <span class="journey-distance" id="journeyDistance">0.0</span> LY</span>
        </div>
        
        <div class="journey-total" id="journeyTotal">
            <span class="journey-total-label">Total so far:</span>
            <span class="journey-total-value" id="totalJourneyDistance">0.0 LY</span>
        </div>
        
        <button class="back-btn" onclick="window.returnToGalaxy()">← GALAXY</button>
        
        <!-- Star Sector markers will be added here -->
        <div id="sectorMarkers"></div>
        
        <!-- Star Sector Info Panel -->
        <div class="sector-panel" id="sectorPanel">
            <div class="sector-name" id="selectedSectorName">Loading...</div>
            <div class="sector-type" id="selectedSectorType">---</div>
            <div class="info-row">
                <span class="info-label">Stars:</span>
                <span class="info-value" id="selectedStarCount">0</span>
            </div>
            
            <!-- NEW: Rights Status Panel -->
            <div class="rights-status" id="rightsStatus" style="display: none;">
                <span class="rights-label">⚡ MINING RIGHTS</span>
                <span class="rights-value" id="rightsValue">Loading...</span>
            </div>
            
            <!-- NEW: Discovery History Panel -->
            <div class="discovery-panel" id="discoveryPanel" style="display: none;">
                <div class="discovery-title">📜 DISCOVERY HISTORY</div>
                <div id="discoveryList"></div>
            </div>
            
            <!-- Warp Information -->
            <div class="warp-info">
                <div class="warp-row">
                    <span class="warp-label">Distance:</span>
                    <span class="warp-value" id="sectorDistance">0.0 LY</span>
                </div>
                <div class="warp-row">
                    <span class="warp-label">Warp cycles:</span>
                    <span class="warp-value" id="warpCycles">0</span>
                </div>
            </div>
            
            <!-- NEW: Scan Button (for hidden sectors) -->
            <button class="scan-btn" id="scanBtn" onclick="window.scanStarSector()" style="display: none;">🔭 SCAN STAR SECTOR</button>
            
            <!-- Dynamic button based on mode -->
            <button class="action-btn" id="actionBtn" onclick="window.handleSectorAction()">🚀 EXPLORE</button>
        </div>
        
        <canvas id="sectorCanvas"></canvas>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">loading star sectors...</div>
        </div>
        
        <!-- NEW: Rediscovery Notification -->
        <div class="rediscovery-notification" id="rediscoveryNotification"></div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <!-- CRITICAL FIX: Added type="module" to all script tags -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/planet-status.js"></script>

    <script type="module">
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const canvas = document.getElementById('sectorCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const sectorPanel = document.getElementById('sectorPanel');
        const markersContainer = document.getElementById('sectorMarkers');
        const journeyTotalEl = document.getElementById('journeyTotal');
        const totalJourneyDistanceEl = document.getElementById('totalJourneyDistance');
        
        // NEW: Discovery and Rights Elements
        const rightsStatus = document.getElementById('rightsStatus');
        const rightsValue = document.getElementById('rightsValue');
        const discoveryPanel = document.getElementById('discoveryPanel');
        const discoveryList = document.getElementById('discoveryList');
        const scanBtn = document.getElementById('scanBtn');
        const rediscoveryNotification = document.getElementById('rediscoveryNotification');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToGalaxy = returnToGalaxy;
        window.handleSectorAction = handleSectorAction;
        window.scanStarSector = scanStarSector;

        // ===== STATE =====
        let currentRegion = 'Orion Arm';
        let currentSectorId = 'B2';
        let currentStarSector = 'Orion Molecular Cloud';
        let starSectors = [];
        let filteredStarSectors = [];
        let selectedStarSector = null;
        let selectedIndex = -1;
        let journeyDistance = 0;
        let hiddenSectors = [];
        let scannedStarSectors = [];
        
        // APPROVED CHANGE: Load galaxy tier for filtering
        let currentGalaxyTier = 1;
        
        // ===== CHECK FOR PLOT MODE =====
        const urlParams = new URLSearchParams(window.location.search);
        const isPlotMode = urlParams.get('mode') === 'plot';
        
        // ===== PLOT MODE DATA =====
        let plotData = {
            fromSector: null,
            fromRegion: null,
            fromStarSector: null,
            fromStar: null,
            fromPlanet: null,
            destSector: null,
            destRegion: null,
            sectorDistance: 0
        };

        // ===== DISCOVERY LOCK FUNCTIONS =====
        
        async function loadHiddenStarSectors() {
            try {
                const hidden = JSON.parse(localStorage.getItem('voidfarer_hidden_star_sectors') || '[]');
                hiddenSectors = hidden;
            } catch (error) {
                console.error('Error loading hidden star sectors:', error);
                hiddenSectors = [];
            }
        }
        
        async function loadScannedStarSectors() {
            const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
            try {
                const scanned = JSON.parse(localStorage.getItem(`voidfarer_scanned_star_sectors_${playerId}`) || '[]');
                scannedStarSectors = scanned;
            } catch (error) {
                console.error('Error loading scanned star sectors:', error);
                scannedStarSectors = [];
            }
        }
        
        async function isStarSectorHidden(sectorName) {
            return hiddenSectors.includes(sectorName);
        }
        
        async function isStarSectorVisible(sectorName) {
            // Star sector is visible if it's been scanned
            if (scannedStarSectors.includes(sectorName)) return true;
            // Or if it's not hidden
            return !(await isStarSectorHidden(sectorName));
        }
        
        async function scanStarSector() {
            if (!selectedStarSector) return;
            
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'scanning star sector...';
                
                const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
                const playerName = localStorage.getItem('voidfarer_player_name') || 'Voidfarer';
                
                // Mark star sector as scanned
                const key = `voidfarer_scanned_star_sectors_${playerId}`;
                const scanned = JSON.parse(localStorage.getItem(key) || '[]');
                if (!scanned.includes(selectedStarSector.name)) {
                    scanned.push(selectedStarSector.name);
                    localStorage.setItem(key, JSON.stringify(scanned));
                }
                
                await loadScannedStarSectors();
                
                // Remove from hidden list if present

        function getWarpCyclesFromDistance(distance) {
            if (distance <= 1.0) return 1;
            if (distance <= 2.5) return 2;
            if (distance <= 4.5) return 3;
            if (distance <= 7.0) return 4;
            return 5;
        }

        // ===== SELECT STAR SECTOR =====
        async function selectStarSector(index) {
            const starSector = starSectors[index];
            if (!starSector) return;
            
            const isHidden = await isStarSectorHidden(starSector.name);
            const isVisible = await isStarSectorVisible(starSector.name);
            
            // Remove previous selection
            document.querySelectorAll('.sector-marker').forEach(m => {
                m.classList.remove('selected');
            });
            
            // Add selection
            const marker = document.getElementById('sector-' + index);
            if (marker) {
                marker.classList.add('selected');
            }
            
            selectedStarSector = starSector;
            selectedIndex = index;
            
            // Calculate warp info
            const cycles = getWarpCyclesFromDistance(starSector.distance);
            
            // Update panel
            document.getElementById('selectedSectorName').textContent = starSector.name;
            document.getElementById('selectedSectorType').textContent = starSector.type;
            document.getElementById('selectedStarCount').textContent = starSector.stars;
            document.getElementById('sectorDistance').textContent = starSector.distance.toFixed(1) + ' LY';
            document.getElementById('warpCycles').textContent = cycles;
            
            // Load discovery history and rights status
            await loadDiscoveryHistory(starSector.name);
            await loadRightsStatus(starSector.name);
            
            // Show/hide scan button
            if (isHidden && !isVisible) {
                scanBtn.style.display = 'block';
                scanBtn.textContent = '🔭 SCAN STAR SECTOR (Reveal)';
            } else {
                scanBtn.style.display = 'none';
            }
            
            // Update action button based on mode
            const actionBtn = document.getElementById('actionBtn');
            
            if (isPlotMode) {
                actionBtn.disabled = false;
                actionBtn.classList.add('primary');
                actionBtn.textContent = '⭐ SELECT THIS STAR SECTOR';
            } else {
                actionBtn.classList.remove('primary');
                if (!isVisible) {
                    actionBtn.disabled = true;
                    actionBtn.textContent = '🔒 SECTOR HIDDEN';
                } else if (starSector.name === currentStarSector) {
                    actionBtn.disabled = true;
                    actionBtn.textContent = '📍 CURRENT LOCATION';
                } else {
                    actionBtn.disabled = false;
                    actionBtn.textContent = '🚀 EXPLORE STAR SECTOR';
                }
            }
            
            sectorPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HANDLE SECTOR ACTION =====
        function handleSectorAction() {
            if (!selectedStarSector) return;
            
            if (isPlotMode) {
                selectStarSectorForJourney();
            } else {
                exploreStarSector();
            }
        }

        // ===== EXPLORE STAR SECTOR (normal mode) =====
        async function exploreStarSector() {
            if (!selectedStarSector) return;
            
            const isVisible = await isStarSectorVisible(selectedStarSector.name);
            if (!isVisible) {
                alert('This star sector is hidden. Scan it first to reveal its location.');
                return;
            }
            
            if (selectedStarSector.name === currentStarSector) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'entering star cluster...';
            
            try {
                // Add this star sector's distance to journey total
                const newTotal = journeyDistance + selectedStarSector.distance;
                localStorage.setItem('voidfarer_journey_distance', newTotal.toString());
                
                // Save sector tier for downstream pages
                const sectorTier = selectedStarSector.tier || currentGalaxyTier;
                localStorage.setItem('voidfarer_current_sector_tier', sectorTier.toString());
                console.log(`📍 Saved star sector tier: ${sectorTier} to localStorage`);
                
                // Save destination
                if (typeof window.setCurrentNebula === 'function') {
                    await window.setCurrentNebula(
                        selectedStarSector.name,
                        selectedStarSector.type,
                        selectedStarSector.stars,
                        selectedStarSector.x || 50,
                        selectedStarSector.y || 50,
                        currentRegion
                    );
                } else {
                    localStorage.setItem('voidfarer_current_nebula', selectedStarSector.name);
                    localStorage.setItem('voidfarer_current_sector_name', selectedStarSector.name);
                    localStorage.setItem('voidfarer_current_sector_type', selectedStarSector.type);
                    localStorage.setItem('voidfarer_current_sector_stars', selectedStarSector.stars.toString());
                }
                
                // Navigate to star cluster
                setTimeout(() => {
                    window.location.href = 'star-cluster.html';
                }, 500);

            } catch (error) {
                console.error('Error exploring star sector:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to enter star sector. Please try again.');
            }
        }

            if (!selectedStarSector) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'adding star sector leg...';
            
            try {
                // Get current cumulative distance
                const currentCumulative = parseFloat(localStorage.getItem('voidfarer_plot_cumulative_distance') || '0');
                
                // Calculate new cumulative
                const newCumulative = currentCumulative + selectedStarSector.distance;
                
                console.log('Star sector leg:', {
                    starSector: selectedStarSector.name,
                    distance: selectedStarSector.distance,
                    previousCumulative: currentCumulative,
                    newCumulative: newCumulative,
                    tier: selectedStarSector.tier
                });
                
                // Save sector tier for downstream pages
                const sectorTier = selectedStarSector.tier || currentGalaxyTier;
                localStorage.setItem('voidfarer_current_sector_tier', sectorTier.toString());
                console.log(`📍 Saved star sector tier: ${sectorTier} to localStorage`);
                
                // Save star sector data
                localStorage.setItem('voidfarer_plot_nebula', selectedStarSector.name);
                localStorage.setItem('voidfarer_plot_nebula_type', selectedStarSector.type);
                localStorage.setItem('voidfarer_plot_nebula_distance', selectedStarSector.distance.toString());
                localStorage.setItem('voidfarer_plot_nebula_stars', selectedStarSector.stars.toString());
                
                // CRITICAL: Update cumulative distance
                localStorage.setItem('voidfarer_plot_cumulative_distance', newCumulative.toString());
                
                // Navigate to star cluster in plot mode
                setTimeout(() => {
                    window.location.href = 'star-cluster.html?mode=plot';
                }, 500);
                
            } catch (error) {
                console.error('Error selecting star sector:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to select star sector. Please try again.');
            }
        }

        // ===== CREATE STAR SECTOR MARKERS =====
        async function createMarkers() {
            markersContainer.innerHTML = '';
            
            console.log('Creating markers for', starSectors.length, 'star sectors in', currentRegion);
            
            for (let index = 0; index < starSectors.length; index++) {
                const sector = starSectors[index];
                const isHidden = await isStarSectorHidden(sector.name);
                const isVisible = await isStarSectorVisible(sector.name);
                
                const marker = document.createElement('div');
                marker.className = 'sector-marker';
                marker.id = 'sector-' + index;
                
                if (isHidden && !isVisible) {
                    marker.classList.add('hidden');
                }
                
                // Use the predefined coordinates from starSectorData
                marker.style.left = sector.x + '%';
                marker.style.top = sector.y + '%';
                
                marker.onclick = function() { selectStarSector(index); };
                
                // Mark current location
                if (!isPlotMode && sector.name === currentStarSector) {
                    marker.classList.add('selected');
                }
                
                let distanceDisplay = sector.distance.toFixed(1) + ' LY';
                if (isHidden && !isVisible) {
                    distanceDisplay = '🔒 HIDDEN';
                }
                
                marker.innerHTML = `
                    <div class="sector-glow"></div>
                    <div class="sector-core"></div>
                    <span class="sector-label">${sector.name}</span>
                    <span class="distance-badge">${distanceDisplay}</span>
                `;
                
                markersContainer.appendChild(marker);
            }
            
            console.log('First marker position:', starSectors[0]?.x + '%', starSectors[0]?.y + '%');
        }

        }

        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Draw stars
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw region-specific glow
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.4
            );
            
            let color;
            if (currentRegion.includes('Cygnus')) color = 'rgba(200, 80, 150, 0.1)';
            else if (currentRegion.includes('Perseus')) color = 'rgba(74, 255, 170, 0.1)';
            else if (currentRegion.includes('Core')) color = 'rgba(200, 150, 80, 0.15)';
            else if (currentRegion.includes('Orion')) color = 'rgba(138, 106, 255, 0.1)';
            else if (currentRegion.includes('Sagittarius')) color = 'rgba(192, 106, 255, 0.1)';
            else if (currentRegion.includes('Carina')) color = 'rgba(106, 138, 255, 0.1)';
            else if (currentRegion.includes('Singularity')) color = 'rgba(255, 100, 100, 0.15)';
            else if (currentRegion.includes('Event Horizon')) color = 'rgba(255, 50, 50, 0.2)';
            else color = 'rgba(100, 100, 150, 0.1)';
            
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.7, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star sectors...';

                const credits = typeof window.getCredits === 'function' ? await window.getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                await loadRegionData();

                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                await createMarkers();

                // Clear selected sector data after loading (keep plot data for navigation)
                if (!isPlotMode) {
                    localStorage.removeItem('voidfarer_selected_sector');
                    localStorage.removeItem('voidfarer_selected_region');
                }

                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
