<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - My Orders</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* All your existing CSS styles - kept exactly the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0B0E14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #0B0E14;
        }
        
        .orders-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0B0E14;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 100px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0B0E14;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #F0B90B;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .orders-logo {
            font-size: 24px;
            font-weight: 800;
            color: #F0B90B;
            letter-spacing: -0.5px;
        }
        
        .orders-badge {
            background: #2B2F36;
            color: #848E9C;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;

        }
        
        .header-actions {

        }
        
        .refresh-btn {
            background: #2B2F36;
            border: none;
            color: #EAECEF;

            height: 36px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 18px;
        }
        
        .refresh-btn:active {
            background: #3A3F4A;
            transform: scale(0.95);
        }
        
        .account-bar {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2B2F36;
        }
        
        .player-info {

        }
        
        .player-name {

        }

        }
        
        .credits-value {

        .credits-value span {

        .summary-grid {

        .summary-card {

        .order-tabs {

        .order-tab {

        .filter-bar {

        .filter-btn {

        .filter-btn.active {

        }

        .orders-list {

        .order-card {

        .element-info {
            display: flex;

        .element-icon {
            font-size: 28px;
            width: 48px;
            height: 48px;
            background: #2B2F36;
            border-radius: 40px 10px 40px 10px;

            justify-content: center;
        }
        
        .element-name-symbol {

        }
        
        .element-name {

            font-weight: 600;
            font-size: 16px;
        }
        
        .element-symbol {

        .order-price-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #2B2F36;

        }
        
        .price-item {
            text-align: center;
        }
        
        .price-label {
            color: #848E9C;
            font-size: 10px;
            text-transform: uppercase;

        .price-value {

        .quantity-info {

            border-radius: 40px 10px 40px 10px;

        }
        
        .quantity-item {
            text-align: center;

        }
        
        .quantity-label {
            color: #848E9C;
            font-size: 10px;
            text-transform: uppercase;

        }
        
        .quantity-value {

        }
        
        .quantity-filled {

        }
        
        .quantity-remaining {

        .progress-bar {
            grid-column: span 2;

        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2B2F36;
        }
        
        .order-time {
            color: #848E9C;

            display: flex;

        .order-actions {

        .action-btn {
            padding: 6px 14px;

        .cancel-btn {
            background: rgba(246, 70, 93, 0.2);

        .cancel-btn:active {

            background: rgba(74, 138, 192, 0.2);

        .cancel-btn.disabled {

        .history-section {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #2B2F36;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;

            margin-bottom: 16px;
        }
        
        .section-title {

        .view-all-link {

        }
        
        .history-list {
            display: flex;
            flex-direction: column;

        }
        
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;

            border-bottom: 1px solid #2B2F36;

        .history-icon {

            border-radius: 50%;
            display: flex;

        .history-icon.buy {

        .history-icon.sell {

        .history-title {

        .history-price {

        .history-value {

        .history-date {

        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);

            border: 2px solid #F0B90B;
            color: #EAECEF;
            padding: 14px 25px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: fit-content;
            min-width: 220px;
            box-shadow: 0 0 20px rgba(240, 185, 11, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #2B2F36;
        }
        
        .back-arrow {
            font-size: 20px;
            color: #F0B90B;
        }
        
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E2026;
            border: 2px solid #F0B90B;
            color: #EAECEF;
            padding: 12px 20px;
            border-radius: 60px 20px 60px 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 3000;
            animation: toast-slide 3s ease-in-out forwards;
            text-align: center;
            min-width: 250px;
        }
        
        .toast-notification.error {
            border-color: #F6465D;
        }
        
        .toast-notification.success {
            border-color: #0ECB81;

        @keyframes toast-slide {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            10% { transform: translateX(-50%) translateY(0); opacity: 1; }
            90% { transform: translateX(-50%) translateY(0); opacity: 1; }

<body>
    <div class="phone-frame">
        <div class="orders-view" id="ordersView">
            <div class="orders-header">
                <div class="logo-area">
                    <span class="orders-logo">MY ORDERS</span>
                    <span class="orders-badge">VOIDEX</span>
                </div>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="window.refreshOrders()">↻</button>
                </div>
            </div>
            
            <div class="account-bar">
                <div class="player-info">
                    <span class="player-name" id="playerName">VOIDFARER #1234</span>
                    <span class="player-id" id="playerId">ID: 0x7f3a...b9c2</span>
                </div>
                <div class="credits-value" id="totalBalance">0 <span>⭐</span></div>
            </div>
            
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="summary-label">Active Orders</div>
                    <div class="summary-number" id="activeOrdersCount">0</div>
                    <div class="summary-sub">Buy / Sell</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Total Value</div>
                    <div class="summary-number" id="totalOrderValue">0</div>
                    <div class="summary-sub">⭐ locked</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Filled</div>
                    <div class="summary-number" id="filledOrdersCount">0</div>
                    <div class="summary-sub">completed</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Volume 24h</div>
                    <div class="summary-number" id="userVolume24h">0</div>
                    <div class="summary-sub">elements</div>
                </div>
            </div>
            
            <div class="order-tabs">
                <button class="order-tab active" onclick="window.switchOrderTab('all')">ALL</button>
                <button class="order-tab" onclick="window.switchOrderTab('buy')">BUY</button>
                <button class="order-tab" onclick="window.switchOrderTab('sell')">SELL</button>
                <button class="order-tab" onclick="window.switchOrderTab('history')">HISTORY</button>
            </div>
            
            <div class="filter-bar" id="filterBar"></div>
            <div id="ordersContainer"></div>
            
            <button class="back-button" onclick="window.returnToMarket()">
                <span class="back-arrow">←</span>
                <span class="back-text">RETURN TO MARKET</span>
            </button>
        </div>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">LOADING ORDERS...</div>
        </div>
    </div>

    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/elements-data.js"></script>
    <script type="module" src="js/market-dynamics.js"></script>
    <script type="module" src="js/market-engine.js"></script>

    <script type="module">
        import { getElementByName, getElementsByRarity, ELEMENTS } from './js/elements-data.js';
        import { getCurrentPrices, getBidPrice, getAskPrice } from './js/market-dynamics.js';
        import { getUserOrders, getUserTrades, cancelOrder, ORDER_TYPES, ORDER_SIDES, ORDER_STATUS } from './js/market-engine.js';
        import { getPlayer, getCollection, getCredits } from './js/storage.js';

        // ===== TELEGRAM =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== STATE =====
        let playerId = null;
        let playerName = 'VOIDFARER';
        let currentCredits = 5000;
        let currentCollection = {};
        let currentTab = 'all';
        let currentFilter = 'all';
        let orders = [];
        let trades = [];

        // ===== UPDATE BALANCE USING STORAGE.JS =====
        async function updateBalance() {
            try {
                const actualPlayerId = localStorage.getItem('voidfarer_player_id') || playerId || 'main';
                const credits = await getCredits(actualPlayerId);
                currentCredits = credits;
                
                const balanceElement = document.getElementById('totalBalance');
                if (balanceElement) {
                    balanceElement.innerHTML = `${currentCredits.toLocaleString()} <span>⭐</span>`;
                }
                
                return credits;
            } catch (error) {
                console.error('Error updating balance:', error);
                return currentCredits;
            }
        }

        // ===== SWITCH ORDER TAB (FIXED - Added this function) =====
        window.switchOrderTab = function(tab) {
            currentTab = tab;
            
            // Update active tab styling
            document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
            const buttons = document.querySelectorAll('.order-tab');
            for (let i = 0; i < buttons.length; i++) {
                const btnText = buttons[i].textContent.toLowerCase();
                if (btnText === tab || (tab === 'all' && btnText === 'all') ||
                    (tab === 'buy' && btnText === 'buy') ||
                    (tab === 'sell' && btnText === 'sell') ||
                    (tab === 'history' && btnText === 'history')) {
                    buttons[i].classList.add('active');
                    break;
                }
            }
            
            currentFilter = 'all';
            renderFilterBar();
            renderOrders();
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        // ===== INIT =====
        async function init() {
            showLoading(true);
            
            try {
                playerId = localStorage.getItem('voidfarer_player_id');
                if (!playerId) {
                    playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('voidfarer_player_id', playerId);
                }
                
                const storedName = localStorage.getItem('voidfarer_player_name');
                playerName = storedName ? storedName : `VOIDFARER #${playerId.slice(-4)}`;
                
                await updateBalance();
                currentCollection = await getCollection();
                
                await loadUserOrders();
                await loadUserTrades();
                
                updatePlayerInfo();
                updateSummaryCards();
                renderFilterBar();
                renderOrders();
                
                setInterval(async () => {
                    await updateBalance();
                    await loadUserOrders();
                    await loadUserTrades();
                    updateSummaryCards();
                    renderOrders();
                }, 5000);
                
                showLoading(false);
                
            } catch (error) {
                console.error('Init error:', error);
                showToast('Error loading orders', 'error');
                showLoading(false);
            }
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        function updatePlayerInfo() {
            document.getElementById('playerName').textContent = playerName;
            document.getElementById('playerId').textContent = `ID: ${playerId.slice(0, 6)}...${playerId.slice(-4)}`;
        }

        async function loadUserOrders() {
            try {
                orders = await getUserOrders(playerId) || [];
                
                orders = orders.map(order => {
                    const element = getElementByName(order.element) || {
                        name: order.element,
                        symbol: '??',
                        icon: '📦',
                        rarity: 'common'
                    };
                    
                    return {
                        ...order,
                        elementData: element
                    };
                });
                
                orders.sort((a, b) => b.createdAt - a.createdAt);
                
            } catch (error) {
                console.error('Error loading orders:', error);
                orders = [];
            }
        }

        async function loadUserTrades() {
            try {
                trades = await getUserTrades(playerId, 20) || [];
                
                trades = trades.map(trade => {
                    const element = getElementByName(trade.element) || {
                        name: trade.element,
                        icon: '📦'
                    };
                    
                    return {
                        ...trade,
                        elementData: element
                    };
                });
                
            } catch (error) {
                console.error('Error loading trades:', error);
                trades = [];
            }
        }

        function updateSummaryCards() {
            const activeOrders = orders.filter(o => 
                o.status === ORDER_STATUS.ACTIVE || o.status === ORDER_STATUS.PARTIAL
            );
            
            const filledOrders = orders.filter(o => o.status === ORDER_STATUS.FILLED);
            
            const totalValue = activeOrders.reduce((sum, o) => {
                const price = o.price || 0;
                return sum + (price * o.remainingQuantity);
            }, 0);
            
            const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
            const recentTrades = trades.filter(t => t.timestamp >= oneDayAgo);
            const volume24h = recentTrades.reduce((sum, t) => sum + t.quantity, 0);
            
            document.getElementById('activeOrdersCount').textContent = activeOrders.length;
            document.getElementById('totalOrderValue').textContent = totalValue.toLocaleString();
            document.getElementById('filledOrdersCount').textContent = filledOrders.length;
            document.getElementById('userVolume24h').textContent = volume24h.toLocaleString();
        }

        function renderFilterBar() {
            const filterBar = document.getElementById('filterBar');
            
            if (currentTab === 'history') {
                filterBar.innerHTML = `
                    <span class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="window.setFilter('all')">ALL</span>
                    <span class="filter-btn ${currentFilter === 'today' ? 'active' : ''}" onclick="window.setFilter('today')">TODAY</span>
                    <span class="filter-btn ${currentFilter === 'week' ? 'active' : ''}" onclick="window.setFilter('week')">THIS WEEK</span>
                    <span class="filter-btn ${currentFilter === 'month' ? 'active' : ''}" onclick="window.setFilter('month')">THIS MONTH</span>
                `;
            } else {
                filterBar.innerHTML = `
                    <span class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="window.setFilter('all')">ALL</span>
                    <span class="filter-btn ${currentFilter === 'active' ? 'active' : ''}" onclick="window.setFilter('active')">ACTIVE</span>
                    <span class="filter-btn ${currentFilter === 'partial' ? 'active' : ''}" onclick="window.setFilter('partial')">PARTIAL</span>
                    <span class="filter-btn ${currentFilter === 'filled' ? 'active' : ''}" onclick="window.setFilter('filled')">FILLED</span>
                `;
            }
        }

        window.setFilter = function(filter) {
            currentFilter = filter;
            renderFilterBar();
            renderOrders();
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (currentTab === 'history') {
                renderTradeHistory(container);
                return;
            }
            
            let filteredOrders = orders;
            
            if (currentTab !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.side === currentTab);
            }
            
            if (currentFilter !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.status === currentFilter);
            }
            
            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">No orders found</div>
                        <div class="empty-sub">Visit VoidEx to place your first order</div>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="orders-list">';
            filteredOrders.forEach(order => {
                html += renderOrderCard(order);
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderOrderCard(order) {
            const element = order.elementData;
            const icon = element.icon || '📦';
            const progressPercent = (order.filledQuantity / order.originalQuantity) * 100;
            const canCancel = order.status === ORDER_STATUS.ACTIVE || order.status === ORDER_STATUS.PARTIAL;
            
            let statusText = order.status;
            if (order.status === ORDER_STATUS.ACTIVE) statusText = 'ACTIVE';
            else if (order.status === ORDER_STATUS.PARTIAL) statusText = 'PARTIAL';
            else if (order.status === ORDER_STATUS.FILLED) statusText = 'FILLED';
            else if (order.status === ORDER_STATUS.CANCELLED) statusText = 'CANCELLED';
            
            let statusClassname = 'status-active';
            if (order.status === ORDER_STATUS.PARTIAL) statusClassname = 'status-partial';
            else if (order.status === ORDER_STATUS.FILLED) statusClassname = 'status-filled';
            else if (order.status === ORDER_STATUS.CANCELLED) statusClassname = 'status-cancelled';
            
            const date = new Date(order.createdAt);
            const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const orderType = order.side === ORDER_SIDES.BUY ? 'BUY' : 'SELL';
            const orderClass = order.side === ORDER_SIDES.BUY ? 'buy' : 'sell';
            
            return `
                <div class="order-card ${order.status.toLowerCase()}" data-order-id="${order.id}">
                    <div class="order-header">
                        <div class="order-type-badge">
                            <div class="order-icon ${orderClass}">${order.side === ORDER_SIDES.BUY ? '↓' : '↑'}</div>
                            <span class="order-type ${orderClass}">${orderType}</span>
                        </div>
                        <span class="order-status ${statusClassname}">${statusText}</span>
                    </div>
                    
                    <div class="order-details">
                        <div class="element-info">
                            <div class="element-icon">${icon}</div>
                            <div class="element-name-symbol">
                                <div class="element-name">${order.element}</div>
                                <div class="element-symbol">${element.symbol || '??'}</div>
                            </div>
                        </div>
                        
                        <div class="order-price-info">
                            <div class="price-item">
                                <div class="price-label">PRICE</div>
                                <div class="price-value">${order.price}⭐</div>
                            </div>
                            <div class="price-item">
                                <div class="price-label">TYPE</div>
                                <div class="price-value">${order.type.toUpperCase()}</div>
                            </div>
                        </div>
                        
                        <div class="quantity-info">
                            <div class="quantity-item">
                                <div class="quantity-label">ORIGINAL</div>
                                <div class="quantity-value">${order.originalQuantity}</div>
                            </div>
                            <div class="quantity-item">
                                <div class="quantity-label">FILLED</div>
                                <div class="quantity-value quantity-filled">${order.filledQuantity}</div>
                            </div>
                            <div class="quantity-item">
                                <div class="quantity-label">REMAINING</div>
                                <div class="quantity-value quantity-remaining">${order.remainingQuantity}</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                    
                    <div class="order-footer">
                        <div class="order-time">
                            <span>🕒</span> ${dateStr}
                        </div>
                        <div class="order-actions">
                            ${canCancel ? `
                                <button class="action-btn cancel-btn" onclick="window.cancelOrder('${order.id}')">CANCEL</button>
                            ` : ''}
                            <button class="action-btn view-btn" onclick="window.viewOrder('${order.id}')">VIEW</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTradeHistory(container) {
            if (trades.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📜</div>
                        <div class="empty-title">No trade history</div>
                        <div class="empty-sub">Your completed trades will appear here</div>
                    </div>
                `;
                return;
            }
            
            let filteredTrades = trades;
            const now = Date.now();
            
            if (currentFilter === 'today') {
                const startOfDay = new Date().setHours(0, 0, 0, 0);
                filteredTrades = trades.filter(t => t.timestamp >= startOfDay);
            } else if (currentFilter === 'week') {
                const weekAgo = now - (7 * 24 * 60 * 60 * 1000);
                filteredTrades = trades.filter(t => t.timestamp >= weekAgo);
            } else if (currentFilter === 'month') {
                const monthAgo = now - (30 * 24 * 60 * 60 * 1000);
                filteredTrades = trades.filter(t => t.timestamp >= monthAgo);
            }
            
            let html = '<div class="history-section"><div class="section-header"><span class="section-title">RECENT TRADES</span></div><div class="history-list">';
            
            filteredTrades.slice(0, 10).forEach(trade => {
                const date = new Date(trade.timestamp);
                const dateStr = date.toLocaleDateString();
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const side = trade.buyOrderId?.includes(playerId) ? 'BUY' : 'SELL';
                const icon = trade.elementData?.icon || '📦';
                
                html += `
                    <div class="history-item">
                        <div class="history-icon ${side.toLowerCase()}">${side === 'BUY' ? '↓' : '↑'}</div>
                        <div class="history-details">
                            <div class="history-title">${side} ${trade.quantity}x ${trade.element}</div>
                            <div class="history-sub">${icon} ${trade.price}⭐ each</div>
                        </div>
                        <div class="history-price">
                            <div class="history-value">${trade.total}⭐</div>
                            <div class="history-date">${dateStr} ${timeStr}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            container.innerHTML = html;
        }

        window.cancelOrder = async function(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;
            
            showLoading(true);
            document.getElementById('loadingText').textContent = 'CANCELLING ORDER...';
            
            try {
                const result = await cancelOrder(playerId, orderId);
                
                if (result.success) {
                    showToast('Order cancelled successfully', 'success');
                    await loadUserOrders();
                    updateSummaryCards();
                    renderOrders();
                    
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred?.('success');
                    }
                } else {
                    showToast(result.error || 'Failed to cancel order', 'error');
                }
                
            } catch (error) {
                console.error('Cancel error:', error);
                showToast('Error cancelling order', 'error');
            }
            
            showLoading(false);
        };

        window.viewOrder = function(orderId) {
            window.location.href = `element-market.html?order=${orderId}`;
        };

        window.refreshOrders = async function() {
            showLoading(true);
            document.getElementById('loadingText').textContent = 'REFRESHING...';
            
            try {
                await updateBalance();
                await loadUserOrders();
                await loadUserTrades();
                currentCollection = await getCollection();
                
                updatePlayerInfo();
                updateSummaryCards();
                renderOrders();
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
                
                showToast('Orders updated', 'success');
                
            } catch (error) {
                console.error('Refresh error:', error);
                showToast('Error refreshing orders', 'error');
            }
            
            showLoading(false);
        };

        window.returnToMarket = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'element-market.html';
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
