<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Element Exchange</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0B0E14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #0B0E14;
        }
        
        .exchange-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0B0E14;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px 100px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0B0E14;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #F0B90B;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Header */
        .exchange-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .exchange-logo {
            font-size: 24px;
            font-weight: 800;
            color: #F0B90B;
            letter-spacing: -0.5px;
        }
        
        .exchange-badge {
            background: #2B2F36;
            color: #848E9C;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1E2026;
            padding: 6px 12px;
            border-radius: 30px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #F0B90B;
            border-radius: 50%;
            box-shadow: 0 0 10px #F0B90B;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .status-text {
            color: #F0B90B;
            font-size: 11px;
            font-weight: 600;
        }
        
        /* Account Bar */
        .account-bar {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2B2F36;
        }
        
        .balance-info {
            display: flex;
            flex-direction: column;
        }
        
        .balance-label {
            color: #848E9C;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .balance-value {
            color: #F0B90B;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
        }
        
        .balance-value span {
            font-size: 14px;
            color: #848E9C;
            margin-left: 2px;
        }
        
        .portfolio-btn {
            background: #2B2F36;
            border: none;
            color: #EAECEF;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .portfolio-btn:active {
            background: #3A3F4A;
            transform: scale(0.96);
        }
        
        /* Market Ticker */
        .market-ticker {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 12px;
            margin-bottom: 16px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        
        .ticker-items {
            display: inline-flex;
            gap: 20px;
        }
        
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .ticker-item:hover {
            background: #2B2F36;
            border-radius: 30px;
        }
        
        .ticker-symbol {
            color: #EAECEF;
            font-weight: 600;
            font-size: 13px;
        }
        
        .ticker-price {
            color: #F0B90B;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            font-size: 13px;
        }
        
        .ticker-change {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 20px;
        }
        
        .ticker-change.positive {
            background: rgba(14, 203, 129, 0.1);
            color: #0ECB81;
        }
        
        .ticker-change.negative {
            background: rgba(246, 70, 93, 0.1);
            color: #F6465D;
        }
        
        /* Chart Section */
        .chart-container {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2B2F36;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .chart-title {
            color: #EAECEF;
            font-weight: 600;
            font-size: 16px;
        }
        
        .chart-timeframes {
            display: flex;
            gap: 4px;
        }
        
        .timeframe-btn {
            background: #2B2F36;
            border: none;
            color: #848E9C;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .timeframe-btn:hover {
            background: #3A3F4A;
        }
        
        .timeframe-btn.active {
            background: #F0B90B;
            color: #0B0E14;
        }
        
        .chart-wrapper {
            height: 180px;
            position: relative;
        }
        
        /* Chart Toolbar */
        .chart-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2B2F36;
        }
        
        .chart-type-btn, .indicator-btn {
            background: #2B2F36;
            border: none;
            color: #848E9C;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .chart-type-btn.active, .indicator-btn.active {
            background: #F0B90B;
            color: #0B0E14;
        }
        
        .chart-type-btn:hover, .indicator-btn:hover {
            background: #3A3F4A;
        }
        
        /* Market Stats Grid */
        .market-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            background: #1E2026;
            border-radius: 40px 15px 40px 15px;
            padding: 12px;
            border: 1px solid #2B2F36;
        }
        
        .stat-label {
            color: #848E9C;
            font-size: 11px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .stat-value {
            color: #EAECEF;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Roboto Mono', monospace;
        }
        
        .stat-change {
            font-size: 11px;
            margin-top: 4px;
        }
        
        .stat-change.positive {
            color: #0ECB81;
        }
        
        .stat-change.negative {
            color: #F6465D;
        }
        
        /* Tab Navigation */
        .market-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 4px;
            overflow-x: auto;
        }
        
        .market-tab {
            flex: 0 0 auto;
            padding: 8px 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #848E9C;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .market-tab.active {
            background: #F0B90B;
            color: #0B0E14;
        }
        
        /* Search Bar */
        .search-container {
            position: relative;
            margin-bottom: 12px;
        }
        
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #848E9C;
            font-size: 14px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            background: #1E2026;
            border: 1px solid #2B2F36;
            border-radius: 60px 20px 60px 20px;
            color: #EAECEF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #F0B90B;
        }
        
        .search-input::placeholder {
            color: #5E6673;
        }
        
        /* Market Table */
        .market-table-container {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #2B2F36;
        }
        
        .market-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .market-table th {
            text-align: left;
            padding: 8px 4px;
            color: #848E9C;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2B2F36;
        }
        
        .market-table td {
            padding: 10px 4px;
            border-bottom: 1px solid #2B2F36;
        }
        
        .market-row {
            cursor: pointer;
            transition: background 0.1s;
        }
        
        .market-row:hover {
            background: #2B2F36;
        }
        
        .market-row.selected {
            background: rgba(240, 185, 11, 0.1);
        }
        
        .element-symbol {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            font-size: 14px;
        }
        
        .element-name {
            color: #EAECEF;
            font-weight: 600;
            font-size: 14px;
        }
        
        .element-price {
            color: #F0B90B;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
        }
        
        .element-change {
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            font-size: 13px;
        }
        
        .element-change.positive {
            color: #0ECB81;
        }
        
        .element-change.negative {
            color: #F6465D;
        }
        
        .element-volume {
            color: #848E9C;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
        }
        
        .rarity-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .rarity-common { background: #A0A0A0; }
        .rarity-uncommon { background: #4affaa; }
        .rarity-rare { background: #4169E1; }
        .rarity-very-rare { background: #e0b0ff; }
        .rarity-legendary { background: #ffd700; box-shadow: 0 0 8px gold; }
        
        /* Order Book */
        .order-book {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #2B2F36;
        }
        
        .order-book-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #848E9C;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        
        .bid-price {
            color: #0ECB81;
            font-weight: 600;
        }
        
        .ask-price {
            color: #F6465D;
            font-weight: 600;
        }
        
        .order-size {
            color: #EAECEF;
            font-family: 'Roboto Mono', monospace;
        }
        
        .order-total {
            color: #848E9C;
        }
        
        .spread-indicator {
            margin: 8px 0;
            text-align: center;
            color: #F0B90B;
            font-size: 11px;
            font-weight: 600;
        }
        
        /* Trading Panel */
        .trading-panel {
            background: #1E2026;
            border-radius: 60px 20px 60px 20px;
            padding: 20px;
            margin: 12px 0 20px 0;
            border: 1px solid #F0B90B;
            box-shadow: 0 0 20px rgba(240, 185, 11, 0.2);
            display: none;
        }
        
        .trading-panel.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .panel-element {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .panel-icon {
            font-size: 32px;
            background: #2B2F36;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px 10px 40px 10px;
        }
        
        .panel-info h3 {
            color: #EAECEF;
            font-size: 18px;
            font-weight: 700;
        }
        
        .panel-info span {
            color: #848E9C;
            font-size: 12px;
            font-family: 'Roboto Mono', monospace;
        }
        
        .panel-price {
            text-align: right;
        }
        
        .panel-price .current {
            color: #F0B90B;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
        }
        
        .panel-price .change {
            font-size: 12px;
        }
        
        .order-types {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .order-type-btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.1s;
        }
        
        .order-type-btn.buy {
            background: #0ECB81;
            color: #fff;
        }
        
        .order-type-btn.sell {
            background: #F6465D;
            color: #fff;
        }
        
        .order-type-btn.active {
            transform: scale(0.98);
            box-shadow: 0 0 15px currentColor;
        }
        
        .price-input-group {
            background: #2B2F36;
            border-radius: 40px 10px 40px 10px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .price-input-label {
            color: #848E9C;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .price-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .price-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #EAECEF;
            font-size: 20px;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            outline: none;
        }
        
        .price-unit {
            color: #F0B90B;
            font-weight: 600;
        }
        
        /* Buy/Sell Amount Fields Container */
        .amount-fields-container {
            margin-bottom: 12px;
        }
        
        .amount-field {
            background: #2B2F36;
            border-radius: 40px 10px 40px 10px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .amount-field.hidden {
            display: none;
        }
        
        .amount-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .amount-label {
            color: #848E9C;
            font-size: 12px;
        }
        
        .amount-max {
            color: #F0B90B;
            font-size: 11px;
            background: rgba(240, 185, 11, 0.1);
            padding: 2px 8px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .amount-max:active {
            background: rgba(240, 185, 11, 0.3);
            transform: scale(0.95);
        }
        
        .amount-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .amount-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1E2026;
            border: 1px solid #3A3F4A;
            color: #EAECEF;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .amount-btn:active {
            background: #3A3F4A;
            transform: scale(0.9);
        }
        
        .amount-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .amount-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #EAECEF;
            font-size: 20px;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        
        /* Sell All Button */
        .sell-all-btn {
            width: 100%;
            background: rgba(246, 70, 93, 0.2);
            border: 2px solid #F6465D;
            color: #F6465D;
            padding: 12px;
            border-radius: 60px 20px 60px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .sell-all-btn:active {
            background: #F6465D;
            color: #fff;
            transform: scale(0.98);
        }
        
        .sell-all-btn.hidden {
            display: none;
        }
        
        .order-summary {
            background: #2B2F36;
            border-radius: 40px 10px 40px 10px;
            padding: 16px;
            margin: 16px 0;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #848E9C;
            font-size: 13px;
        }
        
        .summary-value {
            color: #EAECEF;
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
        }
        
        .summary-total {
            font-size: 18px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #3A3F4A;
            color: #F0B90B;
        }
        
        .fee-info {
            font-size: 11px;
            color: #848E9C;
            text-align: right;
            margin-bottom: 12px;
        }
        
        .execute-btn {
            width: 100%;
            background: #F0B90B;
            border: none;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            color: #0B0E14;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .execute-btn:active {
            transform: scale(0.96);
        }
        
        .execute-btn.buy {
            background: #0ECB81;
            color: #fff;
        }
        
        .execute-btn.sell {
            background: #F6465D;
            color: #fff;
        }
        
        .execute-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Portfolio Modal */
        .portfolio-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .portfolio-modal-overlay.active {
            display: flex;
        }
        
        .portfolio-modal-content {
            background: #1E2026;
            border: 3px solid #F0B90B;
            border-radius: 60px 20px 60px 20px;
            padding: 25px;
            width: 320px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: #ffffff;
            box-shadow: 0 0 30px #F0B90B;
            position: relative;
        }
        
        .portfolio-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3A3F4A;
        }
        
        .portfolio-modal-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;

            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: fit-content;
            min-width: 220px;

            display: flex;
            align-items: center;
            justify-content: center;

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E2026;
            border: 2px solid #F0B90B;
            color: #EAECEF;
            padding: 12px 20px;
            border-radius: 60px 20px 60px 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            z-index: 3000;
            animation: toast-slide 3s ease-in-out forwards;
            text-align: center;
            min-width: 250px;
        }
        
        .toast-notification.error {
            border-color: #F6465D;
        }
        
        .toast-notification.success {
            border-color: #0ECB81;
        }
        
        @keyframes toast-slide {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            10% { transform: translateX(-50%) translateY(0); opacity: 1; }
            90% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;

        }
        
        ::-webkit-scrollbar-track {
            background: #1E2026;

        ::-webkit-scrollbar-thumb {
            background: #F0B90B;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
    </style>
</head>
<body>

            <!-- Portfolio Modal -->
            <div class="portfolio-modal-overlay" id="portfolioModal">
                <div class="portfolio-modal-content">

    <!-- Script imports -->
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/elements-data.js"></script>
    <script type="module" src="js/market-data.js"></script>
    <script type="module" src="js/order-book.js"></script>
    <script type="module" src="js/portfolio.js"></script>
    <script type="module" src="js/trading-engine.js"></script>
    <script type="module" src="js/chart-manager.js"></script>
    
    <script type="module">
        import { ELEMENTS, getElementByName, getElementIcon, getElementRarity, getElementValue } from './js/elements-data.js';
        import { marketData, formatPrice, formatChange, formatVolume, getChangeClass } from './js/market-data.js';
        import { orderBook, OrderSide, OrderType } from './js/order-book.js';
        import { portfolio, formatCurrency, formatPercentage, getPnLClass } from './js/portfolio.js';
        import { getEstimatedPrice } from './js/trading-engine.js';
        import { chartManager, ChartType, Indicators, createChartToolbar } from './js/chart-manager.js';
        import { getCollection } from './js/storage.js';

        // ===== TELEGRAM =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== STATE =====
        let allElements = ELEMENTS;
        let filteredElements = [...ELEMENTS];
        let selectedElement = null;
        let currentFilter = 'all';
        let searchTerm = '';
        let orderType = 'buy';
        let currentCredits = 5000;
        let currentCollection = {};
        let currentTimeframe = '1h';
        let updateInterval = null;
        
        // Portfolio trade state
        let portfolioTradeElement = null;
        let portfolioTradeMode = 'buy';
        let portfolioTradeQuantity = 1;

        // ===== FUNCTION DECLARATIONS =====
        let filterMarket, returnToHub, selectElement, setOrderType, 
            incrementBuyAmount, decrementBuyAmount, incrementSellAmount, decrementSellAmount,
            setMaxBuyAmount, setMaxSellAmount, sellAll, executeTrade, searchMarket, setTimeframe,
            quickBuy, quickSell, updateTradingPanel, updateBalance,
            openPortfolioModal, closePortfolioModal, updatePortfolioModal,
            openPortfolioTrade, closePortfolioTrade, executePortfolioTrade;

        // ===== HELPER FUNCTIONS =====
        function calculateMaxBuy(credits, price) {
            return Math.floor(credits / price);
        }

        function calculateMaxSell(collection, elementName) {
            return collection[elementName]?.count || 0;
        }

        // ===== INIT =====
        async function init() {
            showLoading(true);
            
            try {
                // Load player data
                currentCredits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                currentCollection = await getCollection();
                
                // Update displays
                updateBalance();
                renderMarketTicker();
                renderMarketTable();
                renderOrderBook();
                updateMarketStats();
                
                // Create chart for default element
                setTimeout(() => {
                    setupChart('Gold');
                }, 100);
                
                // Setup timeframe buttons
                setupTimeframeButtons();
                
                // Start real-time updates
                startRealTimeUpdates();
                
                showLoading(false);
                
            } catch (error) {
                console.error('Init error:', error);
                showToast('Error loading market data', 'error');
                showLoading(false);
            }
        }

        // ===== LOADING =====
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // ===== BALANCE =====
        updateBalance = function() {
            const balanceElement = document.getElementById('totalBalance');
            if (balanceElement) {
                balanceElement.innerHTML = `${currentCredits.toLocaleString()} <span>⭐</span>`;
            }
        };

        // ===== MARKET TICKER =====
        function renderMarketTicker() {
            const topElements = ELEMENTS.slice(0, 8);
            const ticker = document.getElementById('marketTicker');
            
            ticker.innerHTML = topElements.map(el => {
                const price = marketData.getCurrentPrice(el.name);
                const change = marketData.getDailyChange(el.name);
                const changeClass = change >= 0 ? 'positive' : 'negative';
                const changeSymbol = change > 0 ? '+' : '';
                
                return `
                    <div class="ticker-item" onclick="window.selectElement('${el.name}')">
                        <span class="ticker-symbol">${el.symbol}</span>
                        <span class="ticker-price">${formatPrice(price)}</span>
                        <span class="ticker-change ${changeClass}">${changeSymbol}${change.toFixed(1)}%</span>
                    </div>
                `;
            }).join('');
        }

        // ===== MARKET TABLE =====
        function renderMarketTable() {
            const tbody = document.getElementById('marketTableBody');
            
            tbody.innerHTML = filteredElements.map(el => {
                const price = marketData.getCurrentPrice(el.name);
                const change = marketData.getDailyChange(el.name);
                const volume = marketData.getVolume24h(el.name);
                const changeClass = change >= 0 ? 'positive' : 'negative';
                const changeSymbol = change > 0 ? '+' : '';
                const rarityClass = `rarity-${el.rarity}`;
                
                return `
                    <tr class="market-row ${selectedElement?.name === el.name ? 'selected' : ''}" onclick="window.selectElement('${el.name}')">
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="rarity-badge ${rarityClass}"></span>
                                <span class="element-symbol">${el.symbol}</span>
                                <span class="element-name">${el.name}</span>
                            </div>
                        </td>
                        <td><span class="element-price">${formatPrice(price)}</span></td>
                        <td><span class="element-change ${changeClass}">${changeSymbol}${change.toFixed(1)}%</span></td>
                        <td><span class="element-volume">${formatVolume(volume)}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // ===== ORDER BOOK =====
        function renderOrderBook() {
            if (!selectedElement) {
                document.getElementById('orderBookBids').innerHTML = '<div class="order-row">Select an element</div>';
                document.getElementById('orderBookAsks').innerHTML = '<div class="order-row">to view order book</div>';
                return;
            }
            
            const book = orderBook.getOrderBook(selectedElement.name, 5);
            const bids = document.getElementById('orderBookBids');
            const asks = document.getElementById('orderBookAsks');
            const spreadDisplay = document.getElementById('spreadDisplay');
            
            let bidHtml = '';
            let askHtml = '';
            
            book.bids.forEach(level => {
                bidHtml += `
                    <div class="order-row">
                        <span class="bid-price">${level.price}</span>
                        <span class="order-size">${level.quantity}</span>
                        <span class="order-total">${(level.price * level.quantity).toLocaleString()}</span>
                    </div>
                `;
            });
            
            book.asks.forEach(level => {
                askHtml += `
                    <div class="order-row">
                        <span class="ask-price">${level.price}</span>
                        <span class="order-size">${level.quantity}</span>
                        <span class="order-total">${(level.price * level.quantity).toLocaleString()}</span>
                    </div>
                `;
            });
            
            bids.innerHTML = bidHtml || '<div class="order-row">No bids</div>';
            asks.innerHTML = askHtml || '<div class="order-row">No asks</div>';
            
            spreadDisplay.innerHTML = `▼ SPREAD ${book.spreadPercentage.toFixed(2)}% ▼`;
        }

        // ===== MARKET STATS =====
        function updateMarketStats() {
            const stats = marketData.getMarketStatistics();
            
            document.getElementById('volume24h').textContent = formatVolume(stats.totalVolume);
            document.getElementById('marketCap').textContent = formatVolume(stats.marketCap);
            document.getElementById('trades24h').textContent = '0';
            
            if (stats.topGainer) {
                document.getElementById('topGainer').textContent = stats.topGainer.name;
                document.getElementById('gainerChange').textContent = `+${stats.topGainer.change.toFixed(1)}%`;
            }
            
            document.getElementById('volumeChange').textContent = `+${(Math.random() * 10).toFixed(1)}%`;
            document.getElementById('tradesChange').textContent = `+${(Math.random() * 8).toFixed(1)}%`;
        }

        // ===== CHART SETUP =====
        function setupChart(elementName) {
            chartManager.destroyChart(elementName);
            chartManager.createChart('priceChart', elementName, ChartType.CANDLESTICK, currentTimeframe);
            
            const element = getElementByName(elementName);
            document.getElementById('chartTitle').textContent = `${elementName.toUpperCase()}/${element?.symbol || '??'}`;
            
            const toolbar = createChartToolbar(elementName, ChartType.CANDLESTICK);
            document.getElementById('chartToolbar').innerHTML = toolbar;
        }

        // ===== TIMEFRAME BUTTONS =====
        function setupTimeframeButtons() {
            const timeframes = ['1m', '5m', '15m', '1h', '4h', '1d', '1w'];
            const container = document.getElementById('timeframeButtons');
            
            container.innerHTML = timeframes.map(tf => `
                <button class="timeframe-btn ${tf === currentTimeframe ? 'active' : ''}" onclick="window.setTimeframe('${tf}')">${tf}</button>
            `).join('');
        }

        // ===== SET TIMEFRAME =====
        setTimeframe = function(tf) {
            currentTimeframe = tf;
            setupTimeframeButtons();
            if (selectedElement) {
                chartManager.setTimeframe(selectedElement.name, tf);
            }
        };

        // ===== SELECT ELEMENT =====
        selectElement = function(elementName) {
            if (selectedElement?.name === elementName) {
                selectedElement = null;
                document.getElementById('tradingPanelContainer').innerHTML = '';
                renderMarketTable();
                renderOrderBook();
                return;
            }
            
            selectedElement = getElementByName(elementName);
            renderMarketTable();
            setupChart(elementName);
            renderOrderBook();
            createTradingPanel();
        };

        // ===== UPDATE TRADING PANEL =====
        updateTradingPanel = function() {
            if (!selectedElement) return;
            
            const tradingPanel = document.getElementById('tradingPanel');
            if (!tradingPanel || !tradingPanel.classList.contains('active')) return;
            
            const price = marketData.getCurrentPrice(selectedElement.name);
            const change = marketData.getDailyChange(selectedElement.name);
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const changeSymbol = change > 0 ? '+' : '';
            const ownedQuantity = currentCollection[selectedElement.name]?.count || 0;
            const maxBuy = calculateMaxBuy(currentCredits, price);
            
            const panelPrice = document.getElementById('panelPrice');
            const panelChange = document.getElementById('panelChange');
            const panelName = document.getElementById('panelName');
            const panelSymbol = document.getElementById('panelSymbol');
            
            if (panelPrice) panelPrice.textContent = price + '⭐';
            if (panelChange) {
                panelChange.textContent = `${changeSymbol}${change.toFixed(1)}%`;
                panelChange.className = `change ${changeClass}`;
            }
            if (panelName) panelName.textContent = selectedElement.name;
            if (panelSymbol) panelSymbol.textContent = selectedElement.symbol;
            
            const buyMaxLabel = document.querySelector('.amount-max[onclick*="setMaxBuyAmount"]');
            const sellMaxLabel = document.querySelector('.amount-max[onclick*="setMaxSellAmount"]');
            if (buyMaxLabel) buyMaxLabel.textContent = `MAX: ${maxBuy}`;
            if (sellMaxLabel) sellMaxLabel.textContent = `MAX: ${ownedQuantity}`;
            
            const feeDisplay = document.getElementById('feeDisplay');
            if (feeDisplay) {
                const amount = orderType === 'buy' 
                    ? parseInt(document.getElementById('buyAmount')?.value || '1')
                    : parseInt(document.getElementById('sellAmount')?.value || '1');
                const total = price * amount;
                const fee = Math.floor(total * 0.001);
                feeDisplay.textContent = `Fee: 0.1% (${fee}⭐)`;
            }
            
            updateOrderSummary();
            updateAmountButtons();
        };

        // ===== SET ORDER TYPE =====
        setOrderType = function(type) {
            orderType = type;
            
            document.querySelectorAll('.order-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const buyField = document.getElementById('buyAmountField');
            const sellField = document.getElementById('sellAmountField');
            const sellAllBtn = document.getElementById('sellAllBtn');
            const executeBtn = document.getElementById('executeBtn');
            
            if (buyField && sellField && sellAllBtn && executeBtn) {
                if (type === 'buy') {
                    buyField.classList.remove('hidden');
                    sellField.classList.add('hidden');
                    sellAllBtn.classList.add('hidden');
                    executeBtn.className = 'execute-btn buy';
                    executeBtn.textContent = `BUY ${selectedElement?.symbol || ''}`;
                } else {
                    buyField.classList.add('hidden');
                    sellField.classList.remove('hidden');
                    sellAllBtn.classList.remove('hidden');
                    executeBtn.className = 'execute-btn sell';
                    executeBtn.textContent = `SELL ${selectedElement?.symbol || ''}`;
                }
            }
            
            updateOrderSummary();
            updateAmountButtons();
            updateFee();
        };

        // ===== BUY AMOUNT CONTROLS =====
        incrementBuyAmount = function() {

            let val = parseInt(input.value) || 1;
            val = Math.max(val - 1, 1);
            input.value = val;
            updateAmountButtons();
            updateOrderSummary();
            updateFee();

        setMaxBuyAmount = function() {

            if (!input) return;
            
            const maxBuy = calculateMaxBuy(currentCredits, parseInt(document.getElementById('orderPrice')?.value || '0'));

            updateAmountButtons();
            updateOrderSummary();
            updateFee();

        incrementSellAmount = function() {

            if (!input) return;
            
            let val = parseInt(input.value) || 1;
            const maxSell = calculateMaxSell(currentCollection, selectedElement?.name);
            val = Math.min(val + 1, maxSell, 9999);

        decrementSellAmount = function() {

        // ===== COMMON FUNCTIONS =====
        function updateAmountButtons() {
            if (orderType === 'buy') {
                const val = parseInt(document.getElementById('buyAmount')?.value || '1');
                const decrementBtn = document.getElementById('buyDecrementBtn');
                const incrementBtn = document.getElementById('buyIncrementBtn');
                
                if (decrementBtn && incrementBtn) {
                    decrementBtn.disabled = val <= 1;
                    const maxBuy = calculateMaxBuy(currentCredits, parseInt(document.getElementById('orderPrice')?.value || '0'));
                    incrementBtn.disabled = val >= maxBuy || val >= 9999;
                }
            } else {
                const val = parseInt(document.getElementById('sellAmount')?.value || '1');
                const decrementBtn = document.getElementById('sellDecrementBtn');
                const incrementBtn = document.getElementById('sellIncrementBtn');
                
                if (decrementBtn && incrementBtn) {
                    decrementBtn.disabled = val <= 1;
                    const maxSell = calculateMaxSell(currentCollection, selectedElement?.name);
                    incrementBtn.disabled = val >= maxSell || val >= 9999;
                }
            }
        }

            if (!selectedElement) return;
            
            const orderPrice = document.getElementById('orderPrice');
            const summaryPrice = document.getElementById('summaryPrice');
            const summaryAmount = document.getElementById('summaryAmount');
            const summaryTotal = document.getElementById('summaryTotal');
            
            if (!orderPrice) return;

        function updateFee() {

            const orderPrice = document.getElementById('orderPrice');
            const feeDisplay = document.getElementById('feeDisplay');
            
            if (!orderPrice || !feeDisplay) return;
            
            const price = parseInt(orderPrice.value);
            let amount = 1;
            
            if (orderType === 'buy') {
                amount = parseInt(document.getElementById('buyAmount')?.value || '1');
            } else {
                amount = parseInt(document.getElementById('sellAmount')?.value || '1');
            }
            
            const total = price * amount;
            const fee = Math.floor(total * 0.001);
            
            feeDisplay.textContent = `Fee: 0.1% (${fee}⭐)`;

        // ===== EXECUTE TRADE =====
        executeTrade = async function() {
            if (!selectedElement) return;
            
            const orderPrice = document.getElementById('orderPrice');
            let amount = 1;
            
            if (orderType === 'buy') {
                amount = parseInt(document.getElementById('buyAmount')?.value || '1');
            } else {
                amount = parseInt(document.getElementById('sellAmount')?.value || '1');
            }
            
            if (!orderPrice) return;
            
            const side = orderType === 'buy' ? OrderSide.BUY : OrderSide.SELL;
            const quantity = amount;
            const price = parseInt(orderPrice.value);
            const total = quantity * price;
            
            showLoading(true);
            
            try {
                let success = false;
                
                if (side === OrderSide.BUY) {
                    if (currentCredits < total) {
                        showToast('Insufficient credits', 'error');
                        showLoading(false);
                        return;
                    }
                    
                    localStorage.setItem('voidfarer_credits', (currentCredits - total).toString());
                    await window.addElementToCollection(selectedElement.name, quantity, {
                        source: 'market',
                        price: price
                    });
                    
                    success = true;
                    
                } else {
                    const owned = currentCollection[selectedElement.name]?.count || 0;
                    if (owned < quantity) {
                        showToast('Insufficient elements', 'error');
                        showLoading(false);
                        return;
                    }
                    
                    await window.removeElementFromCollection(selectedElement.name, quantity);
                    localStorage.setItem('voidfarer_credits', (currentCredits + total).toString());
                    
                    success = true;
                }
                
                if (success) {
                    showToast(`${side === OrderSide.BUY ? 'Bought' : 'Sold'} ${quantity}x ${selectedElement.name}`, 'success');
                    
                    currentCredits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                    currentCollection = await getCollection();
                    
                    updateBalance();
                    updateAmountButtons();
                    updateOrderSummary();
                    renderMarketTable();
                    renderOrderBook();
                    
                    const currentPrice = marketData.getCurrentPrice(selectedElement.name);
                    const newMaxBuy = calculateMaxBuy(currentCredits, currentPrice);
                    const newOwnedQuantity = currentCollection[selectedElement.name]?.count || 0;
                    
                    const buyMaxLabel = document.querySelector('.amount-max[onclick*="setMaxBuyAmount"]');
                    const sellMaxLabel = document.querySelector('.amount-max[onclick*="setMaxSellAmount"]');
                    if (buyMaxLabel) buyMaxLabel.textContent = `MAX: ${newMaxBuy}`;
                    if (sellMaxLabel) sellMaxLabel.textContent = `MAX: ${newOwnedQuantity}`;
                    
                    if (document.getElementById('buyAmount')) document.getElementById('buyAmount').value = '1';
                    if (document.getElementById('sellAmount')) document.getElementById('sellAmount').value = '1';
                    
                    // Update portfolio modal if open
                    if (document.getElementById('portfolioModal').classList.contains('active')) {
                        updatePortfolioModal();
                    }
                }
                
            } catch (error) {
                console.error('Trade error:', error);
                showToast('Trade failed', 'error');
            }
            
            showLoading(false);
        };

        // ===== PORTFOLIO MODAL FUNCTIONS =====
        openPortfolioModal = function() {
            updatePortfolioModal();
            document.getElementById('portfolioModal').classList.add('active');
        };

        closePortfolioModal = function() {
            document.getElementById('portfolioModal').classList.remove('active');
            closePortfolioTrade();
        };

        function updatePortfolioModal() {
            const positions = [];
            let totalValue = 0;
            
            for (const [elementName, data] of Object.entries(currentCollection)) {
                const count = data.count || 0;
                if (count > 0) {
                    const price = marketData.getCurrentPrice(elementName);
                    const value = count * price;
                    totalValue += value;
                    
                    positions.push({
                        name: elementName,
                        symbol: getElementByName(elementName)?.symbol || '??',
                        icon: getElementIcon(elementName),
                        quantity: count,
                        price: price,
                        value: value
                    });
                }
            }
            
            document.getElementById('modalTotalValue').textContent = formatCurrency(totalValue);
            
            const listElement = document.getElementById('portfolioItemList');
            
            if (positions.length === 0) {
                listElement.innerHTML = '<div class="empty-state">No elements owned</div>';
                return;
            }
            
            let html = '';
            positions.forEach(pos => {
                html += `
                    <div class="portfolio-item">
                        <div class="portfolio-item-info">
                            <span class="portfolio-item-icon">${pos.icon}</span>
                            <span class="portfolio-item-name">${pos.name}</span>
                            <span class="portfolio-item-quantity">x${pos.quantity}</span>
                        </div>
                        <div class="portfolio-item-value">
                            <div class="portfolio-item-price">${formatPrice(pos.price)}</div>
                            <div class="portfolio-item-total">${formatCurrency(pos.value)}</div>
                        </div>
                        <div class="portfolio-item-actions">
                            <button class="portfolio-action-btn portfolio-buy-btn" onclick="window.openPortfolioTrade('${pos.name}', 'buy')">BUY</button>
                            <button class="portfolio-action-btn portfolio-sell-btn" onclick="window.openPortfolioTrade('${pos.name}', 'sell')">SELL</button>
                        </div>
                    </div>
                `;
            });
            
            listElement.innerHTML = html;
        }

        openPortfolioTrade = function(elementName, mode) {
            portfolioTradeElement = getElementByName(elementName);
            portfolioTradeMode = mode;
            portfolioTradeQuantity = 1;
            
            const price = marketData.getCurrentPrice(elementName);
            const maxBuy = calculateMaxBuy(currentCredits, price);
            const maxSell = calculateMaxSell(currentCollection, elementName);
            
            const tradeHtml = `
                <div class="trade-modal" id="portfolioTradeModal">
                    <div class="trade-modal-header">
                        <span class="trade-modal-title">${mode.toUpperCase()} ${elementName}</span>
                        <button class="trade-modal-close" onclick="window.closePortfolioTrade()">✕</button>
                    </div>
                    
                    <div class="trade-modal-price">${formatPrice(price)}</div>
                    
                    <div class="trade-modal-amount">
                        <button class="trade-modal-qty-btn" id="portfolioTradeDecrement" onclick="window.decrementPortfolioTrade()" disabled>−</button>
                        <input type="text" class="trade-modal-input" id="portfolioTradeQuantity" value="1" readonly>
                        <button class="trade-modal-qty-btn" id="portfolioTradeIncrement" onclick="window.incrementPortfolioTrade()">+</button>
                    </div>
                    
                    <div style="text-align: center; margin-bottom: 10px;">
                        <button class="trade-modal-max-btn" onclick="window.setMaxPortfolioTrade()">
                            ${mode === 'buy' ? 'MAX BUY' : 'MAX SELL'}
                        </button>
                    </div>
                    
                    <div class="trade-modal-total">
                        <span class="trade-modal-total-label">Total:</span>
                        <span class="trade-modal-total-value" id="portfolioTradeTotal">${formatPrice(price)}</span>
                    </div>
                    
                    <button class="trade-modal-execute ${mode}" onclick="window.executePortfolioTrade()">
                        ${mode.toUpperCase()} ${elementName}
                    </button>
                </div>
            `;
            
            document.getElementById('portfolioTradeContainer').innerHTML = tradeHtml;
            
            // Update max button state based on mode
            updatePortfolioTradeButtons();
        };

        closePortfolioTrade = function() {
            document.getElementById('portfolioTradeContainer').innerHTML = '';
            portfolioTradeElement = null;
        };

        incrementPortfolioTrade = function() {
            if (!portfolioTradeElement) return;
            
            const price = marketData.getCurrentPrice(portfolioTradeElement.name);
            const maxBuy = calculateMaxBuy(currentCredits, price);
            const maxSell = calculateMaxSell(currentCollection, portfolioTradeElement.name);
            const max = portfolioTradeMode === 'buy' ? maxBuy : maxSell;
            
            portfolioTradeQuantity = Math.min(portfolioTradeQuantity + 1, max, 9999);
            document.getElementById('portfolioTradeQuantity').value = portfolioTradeQuantity;
            
            const total = portfolioTradeQuantity * price;
            document.getElementById('portfolioTradeTotal').textContent = formatPrice(total);
            
            updatePortfolioTradeButtons();
        };

        decrementPortfolioTrade = function() {
            if (!portfolioTradeElement) return;
            
            portfolioTradeQuantity = Math.max(portfolioTradeQuantity - 1, 1);
            document.getElementById('portfolioTradeQuantity').value = portfolioTradeQuantity;
            
            const price = marketData.getCurrentPrice(portfolioTradeElement.name);
            const total = portfolioTradeQuantity * price;
            document.getElementById('portfolioTradeTotal').textContent = formatPrice(total);
            
            updatePortfolioTradeButtons();
        };

        setMaxPortfolioTrade = function() {
            if (!portfolioTradeElement) return;
            
            const price = marketData.getCurrentPrice(portfolioTradeElement.name);
            const maxBuy = calculateMaxBuy(currentCredits, price);
            const maxSell = calculateMaxSell(currentCollection, portfolioTradeElement.name);
            
            portfolioTradeQuantity = portfolioTradeMode === 'buy' ? maxBuy : maxSell;
            document.getElementById('portfolioTradeQuantity').value = portfolioTradeQuantity;
            
            const total = portfolioTradeQuantity * price;
            document.getElementById('portfolioTradeTotal').textContent = formatPrice(total);
            
            updatePortfolioTradeButtons();
        };

        function updatePortfolioTradeButtons() {
            if (!portfolioTradeElement) return;
            
            const decrementBtn = document.getElementById('portfolioTradeDecrement');
            const incrementBtn = document.getElementById('portfolioTradeIncrement');
            
            if (!decrementBtn || !incrementBtn) return;
            
            decrementBtn.disabled = portfolioTradeQuantity <= 1;
            
            const price = marketData.getCurrentPrice(portfolioTradeElement.name);
            const maxBuy = calculateMaxBuy(currentCredits, price);
            const maxSell = calculateMaxSell(currentCollection, portfolioTradeElement.name);
            const max = portfolioTradeMode === 'buy' ? maxBuy : maxSell;
            
            incrementBtn.disabled = portfolioTradeQuantity >= max || portfolioTradeQuantity >= 9999;
        }

        executePortfolioTrade = async function() {
            if (!portfolioTradeElement) return;
            
            const quantity = portfolioTradeQuantity;
            const price = marketData.getCurrentPrice(portfolioTradeElement.name);
            const total = quantity * price;
            
            showLoading(true);
            
            try {
                if (portfolioTradeMode === 'buy') {
                    if (currentCredits < total) {
                        showToast('Insufficient credits', 'error');
                        showLoading(false);
                        return;
                    }
                    
                    localStorage.setItem('voidfarer_credits', (currentCredits - total).toString());
                    await window.addElementToCollection(portfolioTradeElement.name, quantity, {
                        source: 'market',
                        price: price
                    });
                    
                } else {
                    const owned = currentCollection[portfolioTradeElement.name]?.count || 0;
                    if (owned < quantity) {
                        showToast('Insufficient elements', 'error');
                        showLoading(false);
                        return;
                    }
                    
                    await window.removeElementFromCollection(portfolioTradeElement.name, quantity);
                    localStorage.setItem('voidfarer_credits', (currentCredits + total).toString());
                }
                
                showToast(`${portfolioTradeMode === 'buy' ? 'Bought' : 'Sold'} ${quantity}x ${portfolioTradeElement.name}`, 'success');
                
                currentCredits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                currentCollection = await getCollection();
                
                updateBalance();
                renderMarketTable();
                renderOrderBook();
                
                closePortfolioTrade();
                updatePortfolioModal();
                
            } catch (error) {
                console.error('Portfolio trade error:', error);
                showToast('Trade failed', 'error');
            }
            
            showLoading(false);
        };

        quickBuy = function(elementName) {
            selectElement(elementName);
            setTimeout(() => {
                const buyBtn = document.querySelector('.order-type-btn.buy');
                if (buyBtn) buyBtn.click();
            }, 100);
        };

        quickSell = function(elementName) {
            selectElement(elementName);
            setTimeout(() => {
                const sellBtn = document.querySelector('.order-type-btn.sell');
                if (sellBtn) sellBtn.click();
            }, 100);
        };

        // ===== FILTER =====
        filterMarket = function(rarity) {
            currentFilter = rarity;
            
            document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            applyFilters();
        };

        searchMarket = function() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        };

        function applyFilters() {
            filteredElements = ELEMENTS.filter(el => {
                if (currentFilter !== 'all' && el.rarity !== currentFilter) return false;
                if (searchTerm) {
                    return el.name.toLowerCase().includes(searchTerm) || 
                           el.symbol.toLowerCase().includes(searchTerm);
                }
                return true;
            });
            
            renderMarketTable();
            
            if (selectedElement && !filteredElements.some(el => el.name === selectedElement.name)) {
                selectedElement = null;
                document.getElementById('tradingPanelContainer').innerHTML = '';
            }
        }

        // ===== REAL-TIME UPDATES =====
        function startRealTimeUpdates() {
            updateInterval = setInterval(() => {
                renderMarketTicker();
                renderMarketTable();
                
                const tradingPanel = document.getElementById('tradingPanel');
                if (selectedElement && tradingPanel && tradingPanel.classList.contains('active')) {
                    updateTradingPanel();
                    renderOrderBook();
                } else if (selectedElement) {
                    renderOrderBook();
                }
                
                updateMarketStats();
                
                if (document.getElementById('portfolioModal').classList.contains('active')) {
                    updatePortfolioModal();
                }
            }, 5000);
        }

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== RETURN TO HUB =====
        returnToHub = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'market-hub.html';
        };

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
            if (selectedElement) {
                chartManager.destroyChart(selectedElement.name);
            }
        });

        // ===== ATTACH ALL FUNCTIONS TO WINDOW =====
        window.filterMarket = filterMarket;
        window.returnToHub = returnToHub;
        window.selectElement = selectElement;
        window.setOrderType = setOrderType;
        window.incrementBuyAmount = incrementBuyAmount;
        window.decrementBuyAmount = decrementBuyAmount;
        window.incrementSellAmount = incrementSellAmount;
        window.decrementSellAmount = decrementSellAmount;
        window.setMaxBuyAmount = setMaxBuyAmount;
        window.setMaxSellAmount = setMaxSellAmount;
        window.sellAll = sellAll;
        window.executeTrade = executeTrade;
        window.searchMarket = searchMarket;
        window.setTimeframe = setTimeframe;
        window.quickBuy = quickBuy;
        window.quickSell = quickSell;
        window.updateBalance = updateBalance;
        
        // Portfolio modal functions
        window.openPortfolioModal = openPortfolioModal;
        window.closePortfolioModal = closePortfolioModal;
        window.openPortfolioTrade = openPortfolioTrade;
        window.closePortfolioTrade = closePortfolioTrade;
        window.incrementPortfolioTrade = incrementPortfolioTrade;
        window.decrementPortfolioTrade = decrementPortfolioTrade;
        window.setMaxPortfolioTrade = setMaxPortfolioTrade;
        window.executePortfolioTrade = executePortfolioTrade;

        window.chartManager = chartManager;

        console.log('✅ Window functions attached');

        // ===== START =====
        init();
    </script>
</body>
</html>
