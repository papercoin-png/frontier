<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - Main Menu</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .menu-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 30px 20px;
        }
        
        /* Window Frame */
        .window-frame {
            background: #1a2a3a;
            border-radius: 60px 20px 60px 20px;
            padding: 15px;
            margin-bottom: 30px;
            border: 3px solid #4a8a9a;
            box-shadow: 0 0 40px #2a5a6a80;
        }
        
        .window-view {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
            background: #0a1a2a;
        }
        
        .earth-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) saturate(1.2) hue-rotate(10deg);
            animation: slow-rotate 60s linear infinite;
        }
        
        @keyframes slow-rotate {
            from { transform: scale(1.2) rotate(0deg); }
            to { transform: scale(1.2) rotate(360deg); }
        }
        
        .window-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(10, 26, 42, 0.4) 100%);
            pointer-events: none;
        }
        
        .window-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #ffffff;
            font-size: 20px;
            font-family: 'Exo 2', sans-serif;
            text-shadow: 0 0 15px #000, 0 0 30px #4a8a9a;
            background: rgba(0,0,0,0.3);
            padding: 5px 20px;
            border-radius: 40px 5px 40px 5px;
            backdrop-filter: blur(5px);
            border: 1px solid #8ac0d0;
            font-weight: 500;
        }
        
        /* Title */
        .game-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 48px;
            color: #e0f0ff;
            text-shadow: 0 0 30px #4a8a9a, 0 0 60px #2a5a6a;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 4px;
            font-weight: 700;
        }
        
        /* Menu Buttons */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .menu-button {
            background: rgba(30, 60, 80, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a9a;
            border-radius: 60px 15px 60px 15px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        
        .menu-button:active {
            background: rgba(50, 100, 120, 0.8);
            transform: scale(0.98);
            border-color: #8ac8c8;
            box-shadow: 0 0 30px #3a8a8a;
        }
        
        .button-icon {
            font-size: 32px;
            min-width: 50px;
            text-align: center;
            filter: drop-shadow(0 0 10px #4a9a9a);
        }
        
        .button-text {
            flex: 1;
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: left;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* Start Button (special styling) */
        .start-button {
            background: rgba(74, 154, 138, 0.8);
            border: 2px solid #4affaa;
            box-shadow: 0 0 30px #4affaa;
            margin-bottom: 20px;
        }
        
        .start-button .button-icon {
            filter: drop-shadow(0 0 10px #4affaa);
        }
        
        /* Settings Button */
        .settings-button {
            background: rgba(30, 60, 80, 0.6);
            border: 2px solid #4a9a9a;
        }
        
        /* Credits Button */
        .credits-button {
            background: rgba(30, 60, 80, 0.6);
            border: 2px solid #ffd966;
        }
        
        .credits-button .button-icon {
            filter: drop-shadow(0 0 10px #ffd966);
        }
        
        /* Tagline */
        .tagline {
            color: #a0c0d0;
            font-size: 16px;
            text-align: center;
            font-style: italic;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #2a5a6a;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* Version */
        .version {
            color: #608080;
            font-size: 12px;
            text-align: center;
            margin-top: auto;
            font-family: 'Exo 2', sans-serif;
        }
        
        /* Loading overlay for transitions */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a8a9a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #4a8a9a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Progress bar for migration */
        .migration-progress {
            width: 250px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .migration-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a8a9a, #8ac0d0);
            transition: width 0.3s;
        }
        
        .migration-status {
            color: #a0c0d0;
            font-size: 14px;
            margin-top: 10px;
        }
        
        /* Error message */
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="menu-view" id="menuView">
            <!-- Window with Earth view -->
            <div class="window-frame">
                <div class="window-view">
                    <img src="assets/images/earth-view.jpg" class="earth-image" alt="Earth view" onerror="this.src='https://i.postimg.cc/tTj6V9HV/grok-image-1773016193832.jpg'">
                    <div class="window-overlay"></div>
                    <div class="window-label">Earth • home</div>
                </div>
            </div>
            
            <!-- Game Title -->
            <div class="game-title">VOIDFARER</div>
            
            <!-- Menu Buttons -->
            <div class="menu-buttons">
                <div class="menu-button start-button" onclick="startGame()">
                    <span class="button-icon">🚀</span>
                    <span class="button-text">START JOURNEY</span>
                </div>
                
                <div class="menu-button" onclick="continueGame()">
                    <span class="button-icon">📦</span>
                    <span class="button-text">LOAD GAME</span>
                </div>
                
                <div class="menu-button settings-button" onclick="openSettings()">
                    <span class="button-icon">⚙️</span>
                    <span class="button-text">SETTINGS</span>
                </div>
                
                <div class="menu-button credits-button" onclick="openCredits()">
                    <span class="button-icon">📜</span>
                    <span class="button-text">CREDITS</span>
                </div>
            </div>
            
            <!-- Tagline -->
            <div class="tagline">✦ explore • mine • trade ✦</div>
            
            <!-- Version -->
            <div class="version">v0.5.0 • deep space</div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">initializing...</div>
            <div class="migration-progress" id="migrationProgress">
                <div class="migration-progress-fill" id="migrationProgressFill"></div>
            </div>
            <div class="migration-status" id="migrationStatus"></div>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <!-- Load all JS files -->
    <script src="js/db.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/migration.js"></script>
    <script src="js/navigation.js"></script>

    <script>
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a1a2a');
            tg.setBackgroundColor('#0a1a2a');
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationProgress = document.getElementById('migrationProgress');
        const migrationProgressFill = document.getElementById('migrationProgressFill');
        const migrationStatus = document.getElementById('migrationStatus');
        const errorMessage = document.getElementById('errorMessage');

        // ===== INITIALIZE DATABASE ON LOAD =====
        async function initializeGame() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'initializing database...';
                
                // Initialize database
                if (typeof initializeDatabase === 'function') {
                    await initializeDatabase();
                    console.log('Database initialized');
                }
                
                loadingText.textContent = 'loading storage...';
                
                // Initialize storage
                if (typeof initializeStorage === 'function') {
                    await initializeStorage();
                    console.log('Storage initialized');
                }
                
                // Check if migration is needed
                if (typeof isMigrationComplete === 'function') {
                    const migrated = await isMigrationComplete();
                    
                    if (!migrated && typeof migrateFromLocalStorage === 'function') {
                        loadingText.textContent = 'migrating data...';
                        migrationProgress.style.display = 'block';
                        
                        // Simulate migration progress
                        let progress = 0;
                        const interval = setInterval(() => {
                            progress += 10;
                            migrationProgressFill.style.width = progress + '%';
                            migrationStatus.textContent = `Migrating... ${progress}%`;
                            
                            if (progress >= 100) {
                                clearInterval(interval);
                            }
                        }, 200);
                        
                        await migrateFromLocalStorage();
                        
                        setTimeout(() => {
                            migrationProgress.style.display = 'none';
                            migrationStatus.textContent = '';
                        }, 1000);
                    }
                }
                
                // Hide loading after initialization
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Initialization error:', error);
                errorMessage.textContent = 'Failed to initialize game. Please refresh.';
                errorMessage.classList.add('visible');
                loadingText.textContent = 'error';
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 3000);
            }
        }

        // ===== START GAME (New Game) =====
        async function startGame() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'starting new game...';
            
            try {
                // Check if player exists, create if not
                if (typeof getPlayer === 'function') {
                    const player = await getPlayer();
                    
                    if (!player && typeof createDefaultPlayer === 'function') {
                        await createDefaultPlayer();
                        console.log('Created new player');
                    }
                }
                
                // Set default location
                if (typeof setCurrentLocation === 'function') {
                    setCurrentLocation('Orion Arm', 'B2', 'Orion Molecular Cloud', 'Star-forming', 85, 30, 40);
                }
                
                // Set default planet
                if (typeof setCurrentPlanet === 'function') {
                    setCurrentPlanet('Earth', 'lush', ['Iron', 'Carbon', 'Silicon', 'Oxygen']);
                }
                
                // Navigate to ship bridge
                setTimeout(() => {
                    window.location.href = 'ship-bridge.html';
                }, 500);
                
            } catch (error) {
                console.error('Error starting game:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to start game. Please try again.');
            }
        }

        // ===== CONTINUE GAME (Load existing) =====
        async function continueGame() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'loading game...';
            
            try {
                // Just navigate to ship bridge - data will load from there
                setTimeout(() => {
                    window.location.href = 'ship-bridge.html';
                }, 500);
                
            } catch (error) {
                console.error('Error loading game:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to load game. Please try again.');
            }
        }

        // ===== OPEN SETTINGS =====
        function openSettings() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            alert('Settings will be available in the next update!');
        }

        // ===== OPEN CREDITS =====
        function openCredits() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            alert('Voidfarer\n\nCreated by: You\n\nSpecial thanks to all players!');
        }

        // ===== START INITIALIZATION =====
        initializeGame();
    </script>
</body>
</html>
