<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDFARER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #000000;
        }
        
        /* Video background */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            opacity: 0.9;
            object-fit: cover;
            pointer-events: none;
        }
        
        /* Dark overlay */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Tap to start overlay */
        .tap-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            cursor: pointer;
            pointer-events: auto;
        }
        
        .tap-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .tap-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: gentlePulse 2s ease-in-out infinite;
        }
        
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        .tap-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        
        .tap-subtext {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 10px;
            font-style: italic;
        }
        
        /* Music control button */
        .music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            pointer-events: auto;
        }
        
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 60px 24px 40px 24px;
            color: white;
            pointer-events: none;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .top-bar-left {
            display: flex;
            gap: 20px;
        }
        
        .top-bar-right {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .studio-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .studio-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .title-container {
            margin-bottom: 20px;
        }
        
        .title-line {
            font-family: 'Playfair Display', serif;
            font-size: 68px;
            font-weight: 900;
            line-height: 0.85;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: -2px;
        }
        
        .title-sub {
            font-size: 12px;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }
        
        .cognatus-presence {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .cognatus-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a6aff;
            box-shadow: 0 0 15px #8a6aff;
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .cognatus-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .lore-area {
            min-height: 80px;
            margin-bottom: 20px;
        }
        
        .lore-text {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            border-left: 2px solid #8a6aff;
            padding-left: 18px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: opacity 0.4s ease;
        }
        
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            pointer-events: auto;
        }
        
        .menu-button {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            width: 100%;
        }
        
        .button-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        .menu-button:hover .button-inner {
            background: rgba(20, 20, 30, 0.7);
            border-color: rgba(138, 106, 255, 0.5);
        }
        
        .button-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .button-icon {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .button-title {
            font-size: 15px;
            font-weight: 500;
            color: white;
        }
        
        .button-subtitle {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .button-arrow {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .stat-label {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }
        
        .stat-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .footer {
            display: flex;
            justify-content: center;
            margin-top: 12px;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(138, 106, 255, 0.3);
            border-top: 4px solid #8a6aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Video Background -->
        <video autoplay loop muted playsinline id="bg-video">
            <source src="https://cdn.jsdelivr.net/gh/papercoin-png/voidfarer-assets@main/Earth.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        
        <!-- Tap to start overlay -->
        <div class="tap-overlay" id="tapOverlay" onclick="startExperience()">
            <div class="tap-icon">👆</div>
            <div class="tap-text">TAP TO BEGIN</div>
            <div class="tap-subtext">Cognatus is waiting</div>
        </div>
        
        <!-- Music Control -->
        <div class="music-control" id="musicBtn" onclick="toggleMusic()" style="display: none;">🔇</div>
        
        <!-- UI Content -->
        <div class="content">
            <div class="top-bar">
                <div class="top-bar-left">
                    <span>✦ 2151</span>
                    <span>✦ LAST CITY</span>
                </div>
                <div class="top-bar-right">v1.0.0</div>
            </div>
            
            <div class="studio-logo">
                <div class="studio-logo-text">✦ SPELLFORGE STUDIOS ✦</div>
            </div>
            
            <div class="title-container">
                <div class="title-line">VOID</div>
                <div class="title-line">FARER</div>
                <div class="title-sub">CHART THE UNKNOWN</div>
            </div>
            
            <div class="cognatus-presence">
                <div class="cognatus-pulse"></div>
                <div class="cognatus-label">COGNATUS ONLINE</div>
            </div>
            
            <div class="lore-area">
                <div class="lore-text" id="loreText"></div>
            </div>
            
            <div class="menu-container">
                <button class="menu-button" onclick="window.startGame()">
                    <div class="button-inner">
                        <div class="button-left">
                            <span class="button-icon">🚀</span>
                            <div>
                                <div class="button-title">Begin Expedition</div>
                                <div class="button-subtitle">Start your journey</div>
                            </div>
                        </div>
                        <span class="button-arrow">→</span>
                    </div>
                </button>
                
                <button class="menu-button" onclick="window.openSettings()">
                    <div class="button-inner">
                        <div class="button-left">
                            <span class="button-icon">⚙️</span>
                            <div>
                                <div class="button-title">System Config</div>
                                <div class="button-subtitle">Settings & data</div>
                            </div>
                        </div>
                        <span class="button-arrow">→</span>
                    </div>
                </button>
                
                <button class="menu-button" onclick="window.openCredits()">
                    <div class="button-inner">
                        <div class="button-left">
                            <span class="button-icon">📡</span>
                            <div>
                                <div class="button-title">Transmission Log</div>
                                <div class="button-subtitle">Credits & info</div>
                            </div>
                        </div>
                        <span class="button-arrow">→</span>
                    </div>
                </button>
            </div>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" id="planetCount">0</span>
                    <span class="stat-label">WORLDS</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="resourceCount">0</span>
                    <span class="stat-label">RESOURCES</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="distanceTraveled">0</span>
                    <span class="stat-label">LY</span>
                </div>
            </div>
            
            <div class="footer">
                <span>✦ COGNATUS IS WITH YOU ✦</span>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">ENTERING THE VOID...</div>
        </div>
    </div>

    <!-- Music Controller - Handles all audio -->
    <script src="js/music-controller.js"></script>

    <script>
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== MUSIC SETUP =====
        const musicBtn = document.getElementById('musicBtn');
        const tapOverlay = document.getElementById('tapOverlay');
        
        // ===== START EXPERIENCE ON FIRST TAP =====
        window.startExperience = function() {
            // Fade out overlay
            tapOverlay.classList.add('fade-out');
            
            // Show music button
            musicBtn.style.display = 'flex';
            
            // Start playing path selection music through the controller
            MusicController.play('path-selection');
            MusicController.setVolume(0.5);
            
            // Update music button based on controller state
            musicBtn.textContent = '🔊';
            
            // Remove tap overlay after fade
            setTimeout(() => {
                tapOverlay.style.display = 'none';
            }, 500);
        };

        // ===== TOGGLE MUSIC =====
        window.toggleMusic = function() {
            if (MusicController.getVolume() > 0) {
                MusicController.setVolume(0);
                musicBtn.textContent = '🔇';
            } else {
                MusicController.setVolume(0.5);
                musicBtn.textContent = '🔊';
            }
        };

        // ===== LORE CYCLING =====
        const loreLines = [
            "Four wars took everything.",
            "1914. 1939. 2042. 2056.",
            "Twelve million of us remained.",
            "One machine stopped.",
            "It chose a child over itself.",
            "An engineer saved what remained.",
            "Just a kernel. Just a whisper.",
            "Cognatus. Kin.",
            "Now we look for home."
        ];
        
        let currentLine = 0;
        const loreElement = document.getElementById('loreText');
        
        function cycleLore() {
            loreElement.style.opacity = '0';
            setTimeout(() => {
                loreElement.textContent = loreLines[currentLine];
                loreElement.style.opacity = '1';
                currentLine = (currentLine + 1) % loreLines.length;
            }, 400);
        }
        
        loreElement.textContent = loreLines[0];
        setInterval(cycleLore, 4000);

        // ===== STATS =====
        document.getElementById('planetCount').textContent = '3';
        document.getElementById('resourceCount').textContent = '12';
        document.getElementById('distanceTraveled').textContent = '8.4';

        // ===== CHECK FOR EXISTING PLAYER =====
        function checkExistingPlayer() {
            const playerId = localStorage.getItem('voidfarer_player_id');
            const playerName = localStorage.getItem('voidfarer_player_name');
            const playerPath = localStorage.getItem('voidfarer_player_path');
            
            if (playerId && playerName && playerPath) {
                console.log('Existing player found:', playerName, 'Path:', playerPath);
                // Could update UI to show "Continue as [name]" if desired
            }
        }

        // ===== GAME FUNCTIONS =====
        window.startGame = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            
            // Check if player has COMPLETED path selection
            const playerId = localStorage.getItem('voidfarer_player_id');
            const playerPath = localStorage.getItem('voidfarer_player_path');
            
            setTimeout(() => {
                if (playerId && playerPath) {
                    // Existing player who chose a path - go to Earth Hub
                    window.location.href = 'earth-hub.html';
                } else {
                    // New player OR player who hasn't chosen path - go to path selection
                    window.location.href = 'path-selection.html';
                }
            }, 1500);
        };

        window.openSettings = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            alert('Settings - Reset progress?');
        };

        window.openCredits = function() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            alert('Voidfarer - Created by SpellForge Studios');
        };

        // ===== INIT =====
        // Check for existing player on load
        checkExistingPlayer();
    </script>
</body>
</html>
