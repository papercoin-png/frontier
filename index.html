<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Frontier</title>
    
    <!-- Telegram Mini App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0B1026;
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      #app {
        width: 100%;
        padding: 20px;
      }
      
      #loading {
        text-align: center;
        color: #4a90e2;
        font-size: 18px;
      }
      
      .pod-screen {
        background: #1a1f3a;
        border-radius: 32px;
        padding: 32px 24px;
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        border: 2px solid #4a90e2;
        box-shadow: 0 0 30px rgba(74, 144, 226, 0.3);
        position: relative;
        overflow: hidden;
      }
      
      .pod-screen::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #4a90e2, transparent);
        animation: scan 3s linear infinite;
      }
      
      @keyframes scan {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      
      .pod-window {
        text-align: center;
        position: relative;
        z-index: 1;
      }
      
      .pod-window h1 {
        color: #4a90e2;
        font-size: 24px;
        margin-bottom: 24px;
        letter-spacing: 2px;
      }
      
      .pod-window p {
        margin: 16px 0;
        font-size: 18px;
      }
      
      .status {
        color: #8e9ab0;
        font-family: monospace;
        border-top: 1px solid #2a2f4a;
        padding-top: 12px;
      }
      
      .wake-button {
        background: #4a90e2;
        color: white;
        border: none;
        font-size: 20px;
        padding: 16px 32px;
        border-radius: 16px;
        margin-top: 24px;
        width: 100%;
        font-weight: bold;
        cursor: pointer;
      }
      
      .wake-button:hover {
        background: #357abd;
      }
      
      .planet-view {
        text-align: center;
        color: white;
        max-width: 500px;
        margin: 0 auto;
      }
      
      .planet-view h2 {
        color: #4a90e2;
        margin-bottom: 16px;
      }
      
      .planet-view p {
        line-height: 1.6;
        color: #c0c0c0;
        margin: 20px 0;
      }
      
      .environment {
        font-style: italic;
        color: #8e9ab0;
        padding: 20px;
        border: 1px dashed #2a2f4a;
        border-radius: 16px;
      }
      
      .back-button {
        background: transparent;
        color: #8e9ab0;
        border: 1px solid #2a2f4a;
        font-size: 16px;
        padding: 12px 24px;
        border-radius: 30px;
        margin-top: 20px;
        cursor: pointer;
      }
      
      .back-button:hover {
        border-color: #4a90e2;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="loading">🪐 Establishing connection...</div>
    <div id="app"></div>
    
    <!-- Your script -->
    <script src="script.js"></script>
  </body>
</html>
