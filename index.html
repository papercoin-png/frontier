<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Frontier</title>
    
    <!-- Telegram Mini App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
      /* Simple loading state while app loads */
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0B1026;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #4a90e2;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This shows while React loads -->
      <div class="loading">
        <div>🪐 Establishing connection...</div>
      </div>
    </div>
    
    <!-- Your React app loads here -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
