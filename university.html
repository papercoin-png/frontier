<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Voidfarer - University</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            font-family: 'Libre Baskerville', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            min-height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
            margin: 0 auto;
        }
        
        .university-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 100px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title {
            font-family: 'Exo 2', sans-serif;
            font-size: 28px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 600;
        }
        
        .subtitle {
            color: #a0c0ff;
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        /* Earnings Card */
        .earnings-card {
            background: linear-gradient(135deg, #1a3a4a, #0a2a3a);
            border: 2px solid #ffaa4a;
            border-radius: 60px 20px 60px 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .earnings-label {
            font-size: 12px;
            color: #a0c0ff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .earnings-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffd966;
            font-family: 'Exo 2', sans-serif;
        }
        
        .earnings-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,170,74,0.3);
            font-size: 12px;
            color: #a0c0ff;
        }
        
        .claim-btn {
            background: rgba(74, 255, 170, 0.2);
            border: 2px solid #4affaa;
            color: #4affaa;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
        }
        
        .claim-btn:active {
            background: #4affaa;
            color: #0a0a1a;
            transform: scale(0.97);
        }
        
        /* Certificate Card */
        .cert-card {
            background: rgba(20, 30, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px 15px 30px 15px;
            margin-bottom: 12px;
            overflow: hidden;
            border-left: 4px solid;
        }
        
        .cert-card.earned {
            border-left-color: #4affaa;
        }
        
        .cert-card.available {
            border-left-color: #8a6aff;
        }
        
        .cert-card.locked {
            border-left-color: #4a4a6a;
            opacity: 0.8;
        }
        
        .cert-card.maxed {
            border-left-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        
        .cert-header {
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
        }
        
        .cert-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        
        .cert-icon {
            font-size: 28px;
            width: 44px;
            text-align: center;
        }
        
        .cert-name {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
            color: white;
        }
        
        .cert-tier {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .cert-level {
            text-align: right;
            margin-right: 12px;
        }
        
        .level-number {
            font-size: 20px;
            font-weight: 700;
            color: #ffd966;
        }
        
        .level-max {
            font-size: 11px;
            color: #6a8ac0;
        }
        
        .next-gain {
            font-size: 11px;
            color: #4affaa;
        }
        
        .expand-icon {
            font-size: 14px;
            color: #6a8ac0;
        }
        
        /* Expanded Content */
        .cert-content {
            padding: 0 14px 14px 14px;
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .cert-card.expanded .cert-content {
            display: block;
        }
        
        .gain-preview {
            background: rgba(74, 255, 170, 0.1);
            border-radius: 20px;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }
        
        .gain-amount {
            font-size: 20px;
            font-weight: 700;
            color: #4affaa;
        }
        
        .gain-label {
            font-size: 10px;
            color: #a0c0ff;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin: 12px 0 6px;
            color: #a0c0ff;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8a6aff, #b8a6ff);
            border-radius: 4px;
            width: 0%;
        }
        
        .donation-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin: 12px 0;
        }
        
        .donation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .rarity-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .rarity-common { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid #fff; }
        .rarity-uncommon { background: rgba(176,255,176,0.2); color: #b0ffb0; border: 1px solid #b0ffb0; }
        .rarity-rare { background: rgba(65,105,225,0.2); color: #4169E1; border: 1px solid #4169E1; }
        .rarity-very-rare { background: rgba(224,176,255,0.2); color: #e0b0ff; border: 1px solid #e0b0ff; }
        .rarity-legendary { background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid #ffd700; }
        
        .donate-btn {
            background: rgba(138, 106, 255, 0.3);
            border: 1px solid #8a6aff;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #8a6aff;
            cursor: pointer;
        }
        
        .donate-btn:active {
            transform: scale(0.95);
        }
        
        .inventory-text {
            font-size: 10px;
            color: #a0c0ff;
            margin-top: 8px;
            text-align: center;
        }
        
        .unlock-requirement {
            background: rgba(255,170,74,0.1);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            margin: 10px 0;
        }
        
        /* Back Button */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: white;
            padding: 14px 28px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: fit-content;
            min-width: 260px;
            text-align: center;
            z-index: 100;
            font-family: 'Exo 2', sans-serif;
        }
        
        .back-btn:active {
            transform: translateX(-50%) scale(0.96);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="university-view">
            <div class="header">
                <div class="title">✦ UNIVERSITY ✦</div>
                <div class="subtitle">MASTERY & LABOR SHARE</div>
            </div>
            
            <!-- Earnings Card -->
            <div class="earnings-card">
                <div class="earnings-label">⭐ YOUR EARNINGS TODAY ⭐</div>
                <div class="earnings-amount" id="todayEarnings">0⭐</div>
                <div class="earnings-row">
                    <span>💰 LABOR POOL</span>
                    <span id="poolAmount">0⭐</span>
                </div>
                <div class="earnings-row">
                    <span>👥 ACTIVE WORKERS</span>
                    <span id="activeWorkers">0</span>
                </div>
                <button class="claim-btn" id="claimBtn">💰 CLAIM EARNINGS</button>
            </div>
            
            <!-- Certificates Container - All 10 Tiers -->
            <div id="certificatesContainer"></div>
            
            <!-- Back Button -->
            <div class="back-btn" onclick="window.location.href='earth-hub.html'">← EARTH HUB</div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">PROCESSING...</div>
    </div>
    
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        // ===== CERTIFICATE DATA - ALL 10 TIERS =====
        const certificates = [
            { tier: 1, name: 'NOVICE', icon: '🌱', rarity: 'common', sharePerLevel: 5, galaxyTier: 1,
              unitsPerDonation: 10, xpPerDonation: 1, xpPerLevel: 5000, totalLevels: 10 },
            { tier: 2, name: 'APPRENTICE', icon: '📘', rarity: 'uncommon', sharePerLevel: 10, galaxyTier: 2,
              unitsPerDonation: 10, xpPerDonation: 1, xpPerLevel: 10000, totalLevels: 10 },
            { tier: 3, name: 'JOURNEYMAN', icon: '⚙️', rarity: 'rare', sharePerLevel: 15, galaxyTier: 3,
              unitsPerDonation: 10, xpPerDonation: 2, xpPerLevel: 20000, totalLevels: 10 },
            { tier: 4, name: 'ADEPT', icon: '🔮', rarity: 'very-rare', sharePerLevel: 20, galaxyTier: 4,
              unitsPerDonation: 10, xpPerDonation: 5, xpPerLevel: 40000, totalLevels: 10 },
            { tier: 5, name: 'EXPERT', icon: '💎', rarity: 'very-rare', sharePerLevel: 25, galaxyTier: 5,
              unitsPerDonation: 10, xpPerDonation: 10, xpPerLevel: 80000, totalLevels: 10 },
            { tier: 6, name: 'MASTER', icon: '🏆', rarity: 'very-rare', sharePerLevel: 30, galaxyTier: 6,
              unitsPerDonation: 10, xpPerDonation: 20, xpPerLevel: 160000, totalLevels: 10 },
            { tier: 7, name: 'GRANDMASTER', icon: '👑', rarity: 'very-rare', sharePerLevel: 35, galaxyTier: 7,
              unitsPerDonation: 5, xpPerDonation: 50, xpPerLevel: 320000, totalLevels: 10 },
            { tier: 8, name: 'SAGE', icon: '🧠', rarity: 'very-rare', sharePerLevel: 40, galaxyTier: 8,
              unitsPerDonation: 5, xpPerDonation: 100, xpPerLevel: 640000, totalLevels: 10 },
            { tier: 9, name: 'ELDER', icon: '🌟', rarity: 'very-rare', sharePerLevel: 45, galaxyTier: 9,
              unitsPerDonation: 5, xpPerDonation: 200, xpPerLevel: 1280000, totalLevels: 10 },
            { tier: 10, name: 'VOIDFARER', icon: '🌌', rarity: 'legendary', sharePerLevel: 50, galaxyTier: 10,
              unitsPerDonation: 1, xpPerDonation: 500, xpPerLevel: 2560000, totalLevels: 10 }
        ];
        
        // Player Progress: level (1-10) and XP for each certificate
        let playerProgress = [
            { level: 5, xp: 12500 },      // Novice Lv 5
            { level: 3, xp: 15000 },      // Apprentice Lv 3
            { level: 0, xp: 0 },          // Journeyman locked
            { level: 0, xp: 0 },          // Adept locked
            { level: 2, xp: 40000 },      // Expert Lv 2
            { level: 0, xp: 0 },          // Master locked
            { level: 0, xp: 0 },          // Grandmaster locked
            { level: 0, xp: 0 },          // Sage locked
            { level: 0, xp: 0 },          // Elder locked
            { level: 0, xp: 0 }           // Voidfarer locked
        ];
        
        // Player inventory
        let playerInventory = {
            common: 125000,
            uncommon: 45000,
            rare: 12000,
            'very-rare': 3200,
            legendary: 85
        };
        
        // Global stats
        let totalPlayerShares = 8450; // Sum of all players' shares
        let laborPool = 10000;
        let activeWorkers = 847;
        
        let expandedIndex = null;
        
        // Calculate player's total share
        function calculatePlayerShares() {
            let total = 0;
            certificates.forEach((cert, i) => {
                if (playerProgress[i].level > 0) {
                    total += cert.sharePerLevel * playerProgress[i].level;
                }
            });
            return total;
        }
        
        // Calculate daily earnings
        function calculateDailyEarnings() {
            const playerShares = calculatePlayerShares();
            if (totalPlayerShares === 0) return 0;
            return Math.floor(laborPool * (playerShares / totalPlayerShares));
        }
        
        // Calculate gain from next level
        function calculateNextLevelGain(certIndex) {
            const cert = certificates[certIndex];
            const progress = playerProgress[certIndex];
            if (progress.level >= cert.totalLevels) return 0;
            
            const currentShares = cert.sharePerLevel * progress.level;
            const nextShares = cert.sharePerLevel * (progress.level + 1);
            const sharesGain = nextShares - currentShares;
            
            const playerShares = calculatePlayerShares();
            const newPlayerShares = playerShares + sharesGain;
            
            const currentEarnings = Math.floor(laborPool * (playerShares / totalPlayerShares));
            const newEarnings = Math.floor(laborPool * (newPlayerShares / totalPlayerShares));
            
            return newEarnings - currentEarnings;
        }
        
        // Calculate gain from unlocking a certificate
        function calculateUnlockGain(certIndex) {
            const cert = certificates[certIndex];
            const sharesGain = cert.sharePerLevel * 1;
            const playerShares = calculatePlayerShares();
            const newPlayerShares = playerShares + sharesGain;
            
            const currentEarnings = Math.floor(laborPool * (playerShares / totalPlayerShares));
            const newEarnings = Math.floor(laborPool * (newPlayerShares / totalPlayerShares));
            
            return newEarnings - currentEarnings;
        }
        
        // Get XP needed for next level
        function getXpNeeded(certIndex) {
            const cert = certificates[certIndex];
            const progress = playerProgress[certIndex];
            if (progress.level >= cert.totalLevels) return 0;
            
            const currentLevelXp = progress.xp % cert.xpPerLevel;
            return cert.xpPerLevel - currentLevelXp;
        }
        
        // Get donations needed for next level
        function getDonationsNeeded(certIndex) {
            const cert = certificates[certIndex];
            const xpNeeded = getXpNeeded(certIndex);
            return Math.ceil(xpNeeded / cert.xpPerDonation) * cert.unitsPerDonation;
        }
        
        // Get progress percentage for current level
        function getProgressPercent(certIndex) {
            const cert = certificates[certIndex];
            const progress = playerProgress[certIndex];
            if (progress.level >= cert.totalLevels) return 100;
            
            const currentLevelXp = progress.xp % cert.xpPerLevel;
            return (currentLevelXp / cert.xpPerLevel) * 100;
        }
        
        // Check if certificate is unlocked (previous tier maxed)
        function isUnlocked(certIndex) {
            if (certIndex === 0) return true;
            const prevProgress = playerProgress[certIndex - 1];
            return prevProgress.level >= certificates[certIndex - 1].totalLevels;
        }
        
        // Get certificate status
        function getStatus(certIndex) {
            const progress = playerProgress[certIndex];
            if (progress.level >= certificates[certIndex].totalLevels) return 'maxed';
            if (progress.level > 0) return 'earned';
            if (isUnlocked(certIndex)) return 'available';
            return 'locked';
        }
        
        function getRarityClass(rarity) {
            return `rarity-${rarity}`;
        }
        
        function renderCertificates() {
            const container = document.getElementById('certificatesContainer');
            const dailyEarnings = calculateDailyEarnings();
            
            document.getElementById('todayEarnings').innerHTML = `${dailyEarnings}⭐`;
            document.getElementById('poolAmount').innerHTML = `${laborPool.toLocaleString()}⭐`;
            document.getElementById('activeWorkers').innerHTML = activeWorkers.toLocaleString();
            
            let html = '';
            
            certificates.forEach((cert, i) => {
                const status = getStatus(i);
                const progress = playerProgress[i];
                const isEarned = status === 'earned' || status === 'maxed';
                const isMaxed = status === 'maxed';
                const nextLevelGain = isEarned && !isMaxed ? calculateNextLevelGain(i) : 0;
                const unlockGain = status === 'available' ? calculateUnlockGain(i) : 0;
                const xpNeeded = isEarned && !isMaxed ? getXpNeeded(i) : 0;
                const donationsNeeded = isEarned && !isMaxed ? getDonationsNeeded(i) : 0;
                const progressPercent = isEarned ? getProgressPercent(i) : 0;
                
                let statusClass = '';
                if (status === 'maxed') statusClass = 'maxed';
                else if (status === 'earned') statusClass = 'earned';
                else if (status === 'available') statusClass = 'available';
                else statusClass = 'locked';
                
                html += `
                    <div class="cert-card ${statusClass} ${expandedIndex === i ? 'expanded' : ''}" data-index="${i}">
                        <div class="cert-header" onclick="toggleCard(${i})">
                            <div class="cert-info">
                                <div class="cert-icon">${cert.icon}</div>
                                <div>
                                    <div class="cert-name">${cert.name}</div>
                                    <div class="cert-tier">Tier ${cert.tier} · ${cert.rarity.toUpperCase()}</div>
                                </div>
                            </div>
                            <div class="cert-level">
                `;
                
                if (isMaxed) {
                    html += `<div class="level-number">MAX</div>`;
                } else if (isEarned) {
                    html += `<div class="level-number">${progress.level}/10</div>`;
                    if (nextLevelGain > 0) {
                        html += `<div class="next-gain">+${nextLevelGain}⭐</div>`;
                    }
                } else {
                    html += `<div class="level-number">🔒</div>`;
                    if (status === 'available' && unlockGain > 0) {
                        html += `<div class="next-gain">+${unlockGain}⭐</div>`;
                    }
                }
                
                html += `
                            </div>
                            <div class="expand-icon">${expandedIndex === i ? '▼' : '▶'}</div>
                        </div>
                        
                        <div class="cert-content">
                `;
                
                // Gain preview for upgrades
                if ((isEarned && !isMaxed && nextLevelGain > 0) || (status === 'available' && unlockGain > 0)) {
                    const gainAmount = isEarned ? nextLevelGain : unlockGain;
                    const gainText = isEarned ? `Level ${progress.level + 1}` : `Unlock ${cert.name}`;
                    html += `
                        <div class="gain-preview">
                            <div class="gain-amount">+${gainAmount}⭐</div>
                            <div class="gain-label">per day after ${gainText}</div>
                        </div>
                    `;
                }
                
                // Progress bar for earned certificates
                if (isEarned && !isMaxed) {
                    html += `
                        <div class="progress-header">
                            <span>PROGRESS TO LEVEL ${progress.level + 1}</span>
                            <span>${Math.floor(xpNeeded)} XP needed</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    `;
                }
                
                // Donation section for available/earned certificates
                if (status !== 'locked') {
                    html += `
                        <div class="donation-section">
                            <div class="donation-row">
                                <div class="donation-info">
                                    <span class="rarity-badge ${getRarityClass(cert.rarity)}">${cert.rarity.toUpperCase()}</span>
                                    <span>+${cert.xpPerDonation} XP per ${cert.unitsPerDonation} units</span>
                                </div>
                                <div>
                                    <button class="donate-btn" onclick="event.stopPropagation(); donate(${i}, ${cert.unitsPerDonation})">DONATE ${cert.unitsPerDonation}</button>
                                    <button class="donate-btn" onclick="event.stopPropagation(); donate(${i}, ${cert.unitsPerDonation * 10})">×10</button>
                                </div>
                            </div>
                            <div class="inventory-text">
                                📦 You have: ${playerInventory[cert.rarity]?.toLocaleString() || 0} ${cert.rarity.toUpperCase()} units
                                ${isEarned && !isMaxed ? `<br>🎯 Need: ${donationsNeeded.toLocaleString()} more units to level up` : ''}
                            </div>
                        </div>
                    `;
                }
                
                // Unlock requirement for locked certificates
                if (status === 'locked' && i > 0) {
                    const prevCert = certificates[i-1];
                    html += `
                        <div class="unlock-requirement">
                            🔒 Requires ${prevCert.name} Level 10
                            <div style="font-size: 11px; margin-top: 4px;">Reach max level in ${prevCert.name} to unlock</div>
                        </div>
                    `;
                }
                
                html += `</div></div>`;
            });
            
            container.innerHTML = html;
        }
        
        window.toggleCard = function(index) {
            if (expandedIndex === index) {
                expandedIndex = null;
            } else {
                expandedIndex = index;
            }
            renderCertificates();
        };
        
        window.donate = function(certIndex, quantity) {
            const cert = certificates[certIndex];
            const progress = playerProgress[certIndex];
            const status = getStatus(certIndex);
            
            if (status === 'locked') {
                alert(`Complete ${certificates[certIndex-1].name} Level 10 first.`);
                return;
            }
            
            if (status === 'maxed') {
                alert(`${cert.name} is already at max level!`);
                return;
            }
            
            const available = playerInventory[cert.rarity] || 0;
            if (available < quantity) {
                alert(`Not enough ${cert.rarity.toUpperCase()}! Need ${quantity - available} more.`);
                return;
            }
            
            // Deduct inventory
            playerInventory[cert.rarity] -= quantity;
            
            // Calculate XP gain
            const xpGain = (quantity / cert.unitsPerDonation) * cert.xpPerDonation;
            let newXp = progress.xp + xpGain;
            
            // Check for level ups
            let leveledUp = false;
            while (newXp >= (progress.level + 1) * cert.xpPerLevel && progress.level < cert.totalLevels) {
                progress.level++;
                leveledUp = true;
            }
            progress.xp = Math.min(progress.level * cert.xpPerLevel, newXp);
            
            if (leveledUp) {
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                const gain = calculateNextLevelGain(certIndex);
                alert(`🎉 ${cert.name} reached Level ${progress.level}! +${gain}⭐ more per day!`);
            } else {
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
            
            renderCertificates();
        };
        
        // Claim earnings
        document.getElementById('claimBtn').onclick = () => {
            const earnings = calculateDailyEarnings();
            if (earnings <= 0) {
                alert('No earnings to claim yet. Keep donating to earn!');
                return;
            }
            alert(`✅ Claimed ${earnings}⭐ from labor pool!`);
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        };
        
        // Demo inventory button
        const demoBtn = document.createElement('button');
        demoBtn.textContent = '+ DEMO INVENTORY';
        demoBtn.style.position = 'fixed';
        demoBtn.style.bottom = '100px';
        demoBtn.style.right = '10px';
        demoBtn.style.background = '#8a6aff';
        demoBtn.style.border = 'none';
        demoBtn.style.borderRadius = '30px';
        demoBtn.style.padding = '6px 12px';
        demoBtn.style.fontSize = '10px';
        demoBtn.style.color = 'white';
        demoBtn.style.zIndex = '200';
        demoBtn.style.cursor = 'pointer';
        demoBtn.onclick = () => {
            playerInventory.common += 50000;
            playerInventory.uncommon += 20000;
            playerInventory.rare += 5000;
            playerInventory['very-rare'] += 1000;
            playerInventory.legendary += 50;
            renderCertificates();
        };
        document.body.appendChild(demoBtn);
        
        renderCertificates();
    </script>
</body>
</html>
