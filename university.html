<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDFARER - UNIVERSITY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #000000;
        }
        
        /* Animated background */
        .phone-frame::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(138, 106, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 40px 20px;
            color: white;
            min-height: 100%;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .top-bar-left {
            display: flex;
            gap: 20px;
        }
        
        .top-bar-right {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .university-title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title-icon {
            font-size: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(138, 106, 255, 0.5));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .title-main {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: white;
            text-shadow: 0 0 30px rgba(138, 106, 255, 0.5);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }
        
        .title-sub {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }
        
        .cognatus-presence {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }
        
        .cognatus-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a6aff;
            box-shadow: 0 0 15px #8a6aff;
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .cognatus-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Player Stats Card */
        .player-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .player-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .player-badge {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #8a6aff;
        }
        
        .donation-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .donation-value {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        /* Path Selector */
        .path-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .path-btn {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        
        .path-btn.active {
            background: rgba(138, 106, 255, 0.2);
            border-color: #8a6aff;
            color: #8a6aff;
        }
        
        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .section-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Certificate Cards - Flip Animation */
        .certificates-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: auto;
            cursor: pointer;
        }
        
        .card-flip {
            position: relative;
            width: 100%;
            height: auto;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .card-container.flipped .card-flip {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: relative;
            width: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .card-front {
            transform: rotateY(0deg);
        }
        
        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
            background: rgba(20, 10, 30, 0.9);
            border-color: #8a6aff;
            min-height: 100%;
        }
        
        .card-flip-hint {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            margin-top: 8px;
        }
        
        /* Mastery Card Styles */
        .mastery-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .mastery-icon {
            font-size: 32px;
            min-width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(138, 106, 255, 0.15);
            border-radius: 16px;
        }
        
        .mastery-title {
            flex: 1;
        }
        
        .mastery-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .mastery-tier {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .mastery-level {
            text-align: right;
        }
        
        .level-number {
            font-size: 24px;
            font-weight: 700;
            color: #8a6aff;
            line-height: 1;
        }
        
        .level-max {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Progress Section */
        .progress-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .progress-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .progress-value {
            font-size: 14px;
            font-weight: 600;
            color: #8a6aff;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8a6aff, #b8a6ff);
            border-radius: 4px;
        }
        
        .xp-details {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: #8a6aff;
        }
        
        .stat-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }
        
        /* Donation Section */
        .donation-section {
            background: rgba(138, 106, 255, 0.1);
            border: 1px solid rgba(138, 106, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
        }
        
        .donation-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #8a6aff;
        }
        
        .donation-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .donation-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .donation-element {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .element-icon {
            font-size: 20px;
        }
        
        .element-info {
            display: flex;
            flex-direction: column;
        }
        
        .element-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .element-xp {
            font-size: 10px;
            color: #8a6aff;
        }
        
        .donation-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .donation-amount {
            font-size: 14px;
            font-weight: 600;
            color: #ffd966;
            min-width: 45px;
            text-align: right;
        }
        
        .donate-btn {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #8a6aff;
            cursor: pointer;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        
        .donate-btn:active {
            transform: scale(0.94);
            background: rgba(138, 106, 255, 0.3);
        }
        
        /* Back Button */
        .back-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        
        .back-btn:active {
            transform: scale(0.96);
            background: rgba(138, 106, 255, 0.1);
            border-color: #8a6aff;
        }
        
        .back-icon {
            font-size: 18px;
        }
        
        .back-text {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(138, 106, 255, 0.3);
            border-top: 4px solid #8a6aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // ===== PATH SWITCHING =====
        window.switchPath = function(path) {
            // Update active button
            document.querySelectorAll('.path-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const certContainer = document.getElementById('certificatesContainer');
            const sectionTitle = document.getElementById('sectionTitle');
            
            if (path === 'mining') {
                certContainer.innerHTML = getMiningMasteryCards();
                sectionTitle.textContent = 'MINING MASTERY';
            } else if (path === 'trading') {
                certContainer.innerHTML = getTradingMasteryCards();
                sectionTitle.textContent = 'TRADING MASTERY';
            } else if (path === 'science') {
                certContainer.innerHTML = getScienceMasteryCards();
                sectionTitle.textContent = 'SCIENCE MASTERY';
            } else if (path === 'engineering') {
                certContainer.innerHTML = getEngineeringMasteryCards();
                sectionTitle.textContent = 'ENGINEERING MASTERY';
            }
            
            // Attach flip functionality to new cards
            document.querySelectorAll('.card-container').forEach(card => {
                card.onclick = function(e) {
                    // Don't flip if clicking on donate button
                    if (!e.target.classList.contains('donate-btn') && 
                        !e.target.closest('.donate-btn')) {
                        this.classList.toggle('flipped');
                    }
                };
            });
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        // ===== DONATION FUNCTION =====
        window.donate = function(element, xp, btn) {
            // Stop event from bubbling up to card flip
            event.stopPropagation();
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = `DONATING ${element.toUpperCase()}...`;
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            // Simulate donation processing
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
                
                // Show success feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                // Update button or show success message
                if (btn) {
                    const originalText = btn.textContent;
                    btn.textContent = '✓';
                    btn.style.background = 'rgba(74, 255, 170, 0.2)';
                    btn.style.borderColor = '#4affaa';
                    btn.style.color = '#4affaa';
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = 'rgba(138, 106, 255, 0.2)';
                        btn.style.borderColor = 'rgba(138, 106, 255, 0.3)';
                        btn.style.color = '#8a6aff';
                    }, 1000);
                }
            }, 800);
        };

        // ===== NAVIGATION =====
        window.goBack = function() {
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'RETURNING TO HUB...';
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Navigate back to Earth Hub
            setTimeout(() => {
                window.location.href = 'earth-hub.html';
            }, 500);
        };
