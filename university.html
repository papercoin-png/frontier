<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDFARER - UNIVERSITY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #000000;
        }
        
        /* Animated background */
        .phone-frame::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(138, 106, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 40px 20px;
            color: white;
            min-height: 100%;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .top-bar-left {
            display: flex;
            gap: 20px;
        }
        
        .top-bar-right {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .university-title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title-icon {
            font-size: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(138, 106, 255, 0.5));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .title-main {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: white;
            text-shadow: 0 0 30px rgba(138, 106, 255, 0.5);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }
        
        .title-sub {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }
        
        .cognatus-presence {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }
        
        .cognatus-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a6aff;
            box-shadow: 0 0 15px #8a6aff;
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .cognatus-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Player Stats Card */
        .player-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .player-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .player-badge {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #8a6aff;
        }
        
        .donation-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .donation-value {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        /* Path Selector */
        .path-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .path-btn {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        
        .path-btn.active {
            background: rgba(138, 106, 255, 0.2);
            border-color: #8a6aff;
            color: #8a6aff;
        }
        
        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .section-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Skills Grid */
        .skills-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .skill-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
        }
        
        .skill-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .skill-icon {
            font-size: 20px;
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(138, 106, 255, 0.1);
            border-radius: 10px;
        }
        
        .skill-info {
            flex: 1;
        }
        
        .skill-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .skill-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .skill-level {
            font-size: 12px;
            color: #8a6aff;
        }
        
        .skill-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #8a6aff, #b8a6ff);
            border-radius: 2px;
        }
        
        .skill-stats {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Certificate Cards - Flip Animation */
        .certificates-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 180px;
            cursor: pointer;
        }
        
        .card-flip {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .card-container.flipped .card-flip {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .card-front {
            transform: rotateY(0deg);
        }
        
        .card-back {
            transform: rotateY(180deg);
            background: rgba(20, 10, 30, 0.8);
            border-color: #8a6aff;
        }
        
        .card-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .card-tier {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            color: #8a6aff;
        }
        
        .card-earned {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(74, 255, 170, 0.2);
            border: 1px solid rgba(74, 255, 170, 0.3);
            color: #4affaa;
        }
        
        .card-locked {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .card-subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }
        
        .card-requirements {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .requirement-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        
        .requirement-icon {
            font-size: 14px;
            min-width: 20px;
        }
        
        .requirement-text {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .requirement-value {
            margin-left: auto;
            color: #8a6aff;
        }
        
        .card-progress {
            margin-top: 8px;
        }
        
        .progress-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .progress-bar-small {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, #8a6aff, #b8a6ff);
        }
        
        .card-flip-hint {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Back of card - Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }
        
        .stat-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-label-small {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .stat-value-small {
            font-size: 16px;
            font-weight: 600;
            color: #8a6aff;
        }
        
        .stat-desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }
        
        .unlock-item {
            background: rgba(138, 106, 255, 0.1);
            border-radius: 10px;
            padding: 8px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .unlock-icon {
            font-size: 18px;
        }
        
        .unlock-name {
            font-weight: 500;
            font-size: 13px;
        }
        
        .unlock-type {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Training Section */
        .training-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .training-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .training-icon {
            font-size: 20px;
        }
        
        .donation-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .donation-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .donation-element {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .element-icon {
            font-size: 18px;
        }
        
        .element-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        .donation-rate {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 4px;
        }
        
        .donation-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .donation-amount {
            font-size: 14px;
            font-weight: 600;
            color: #8a6aff;
            min-width: 40px;
            text-align: center;
        }
        
        .donate-btn {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #8a6aff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .donate-btn:active {
            transform: scale(0.94);
            background: rgba(138, 106, 255, 0.3);
        }
        
        /* Back Button */
        .back-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        
        .back-btn:active {
            transform: scale(0.96);
            background: rgba(138, 106, 255, 0.1);
            border-color: #8a6aff;
        }
        
        .back-icon {
            font-size: 18px;
        }
        
        .back-text {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(138, 106, 255, 0.3);
            border-top: 4px solid #8a6aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <span>✦ UNIVERSITY</span>
                    <span>✦ EARTH HUB</span>
                </div>
                <div class="top-bar-right">v1.0.0</div>
            </div>
            
            <!-- Title -->
            <div class="university-title">
                <div class="title-icon">🎓</div>
                <div class="title-main">UNIVERSITY</div>
                <div class="title-sub">CENTER OF KNOWLEDGE</div>
            </div>
            
            <div class="cognatus-presence">
                <div class="cognatus-pulse"></div>
                <div class="cognatus-label">COGNATUS ONLINE</div>
            </div>
            
            <!-- Player Stats Card -->
            <div class="player-card">
                <div class="player-row">
                    <span class="player-name">VOIDFARER #1234</span>
                    <span class="player-badge">SCHOLAR</span>

                <div class="donation-total">
                    <span>Total Donations</span>
                    <span class="donation-value">12,450</span>
                </div>
            </div>
            
            <!-- Path Selector -->
            <div class="path-selector">
                <span class="path-btn active" onclick="switchPath('mining')">⛏️ MINING</span>
                <span class="path-btn" onclick="switchPath('trading')">💹 TRADING</span>
                <span class="path-btn" onclick="switchPath('science')">🔬 SCIENCE</span>
                <span class="path-btn" onclick="switchPath('engineering')">🔧 ENGINEERING</span>
            </div>
            
            <!-- Current Skill (changes based on path) -->
            <div class="skills-grid" id="currentSkill">
                <div class="skill-item">
                    <div class="skill-header">
                        <div class="skill-icon">⛏️</div>
                        <div class="skill-info">
                            <div class="skill-name-row">

            <!-- Certificates Section -->
            <div class="section-header">
                <div class="section-line"></div>
                <span class="section-title" id="sectionTitle">MINING CERTIFICATES</span>

            </div>
            
            <!-- Certificate Cards Container -->
            <div class="certificates-grid" id="certificatesContainer"></div>
            
            <!-- Training Section -->
            <div class="training-section" id="trainingSection">

                    <span class="training-icon">⛏️</span>
                    <span>Mining Lab · Training</span>

                <div class="donation-options" id="donationOptions"></div>

            <!-- Back Button -->
            <div class="back-btn" onclick="goBack()">
                <span class="back-icon">←</span>
                <span class="back-text">RETURN TO HUB</span>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">PROCESSING...</div>
        </div>
    </div>

        if (tg) {

            tg.expand();

            const skillDisplay = document.getElementById('currentSkill');
            const certContainer = document.getElementById('certificatesContainer');
            const sectionTitle = document.getElementById('sectionTitle');
            const trainingTitle = document.querySelector('.training-title');

            const donationOptions = document.getElementById('donationOptions');
            
            if (path === 'mining') {
                skillDisplay.innerHTML = `<div class="skill-item"><div class="skill-header"><div class="skill-icon">⛏️</div><div class="skill-info"><div class="skill-name-row"><span class="skill-name">Mining</span><span class="skill-level">Level 35</span></div><div class="skill-bar"><div class="skill-progress" style="width: 70%"></div></div><div class="skill-stats"><span>Progress to Level 36</span><span>350/500</span></div></div></div></div>`;

        // ===== DONATION FUNCTION =====
        window.donate = function(element) {
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = `DONATING ${element.toUpperCase()}...`;
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            // Simulate donation processing
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
                
                // Show success feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                // In real implementation, would update skill progress and inventory
            }, 800);

            document.getElementById('loadingOverlay').classList.add('active');

            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Navigate back to Earth Hub
            setTimeout(() => {
                window.location.href = 'earth-hub.html';
            }, 500);
        };

        document.addEventListener('DOMContentLoaded', function() {
            // Load initial certificates (mining)
            document.getElementById('certificatesContainer').innerHTML = getMiningCertificates();
            document.getElementById('donationOptions').innerHTML = getMiningDonations();
            
            // Attach flip functionality
            document.querySelectorAll('.card-container').forEach(card => {
                card.onclick = function() {
                    this.classList.toggle('flipped');

            });
            
            // Load player data
