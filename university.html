<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Voidfarer - University (Test)</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Libre Baskerville', serif;
        }
        .phone-frame {
            width: 100%;
            max-width: 390px;
            min-height: 844px;
            background: #0a1a2a;
            border-radius: 40px;
            overflow: hidden;
            padding: 20px;
        }
        .cert-card {
            background: rgba(20,30,45,0.9);
            border-radius: 30px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #4affaa;
        }
        .cert-name {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .cert-level {
            font-size: 14px;
            color: #ffd966;
            margin: 5px 0;
        }
        .progress-bar {
            height: 8px;
            background: #2a2a3a;
            border-radius: 4px;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #8a6aff;
            border-radius: 4px;
            width: 0%;
        }
        .donate-btn {
            background: #8a6aff;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        .inventory-text {
            color: #a0c0ff;
            font-size: 12px;
            margin-top: 8px;
        }
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a4a7a;
            border: 2px solid #ffaa4a;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div id="app">
            <div class="cert-card">
                <div class="cert-name">NOVICE (Tier 1)</div>
                <div class="cert-level" id="level">Level: 0/10</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
                <div class="inventory-text" id="inventory">📦 Common units: 125,000</div>
                <button class="donate-btn" id="donateBtn">DONATE 10 COMMON</button>
            </div>
        </div>
        <button class="back-btn" onclick="window.location.href='earth-hub.html'">← EARTH HUB</button>
    </div>

    <script type="module">
        import { getCredits } from './js/storage.js';
        import { 
            getCertificates, 
            addDonationXP,
            CERTIFICATE_TIERS 
        } from './js/certificates.js';

        const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
        let certificates = [];
        let playerInventory = { common: 125000, uncommon: 45000, rare: 12000, 'very-rare': 3200, legendary: 85 };
        
        async function loadData() {
            certificates = await getCertificates(playerId);
            render();
        }
        
        function render() {
            const prog = certificates[0];
            const level = prog?.level || 0;
            const xp = prog?.xp || 0;
            const cert = CERTIFICATE_TIERS[0];
            const levelXp = cert.xpPerLevel;
            const currentLevelXp = xp % levelXp;
            const percent = (currentLevelXp / levelXp) * 100;
            
            document.getElementById('level').innerHTML = `Level: ${level}/10`;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('inventory').innerHTML = `📦 Common units: ${playerInventory.common.toLocaleString()}`;
        }
        
        window.donate = async function() {
            console.log('Donate clicked!');
            
            if (playerInventory.common < 10) {
                alert('Not enough common elements!');
                return;
            }
            
            playerInventory.common -= 10;
            console.log('Inventory deducted, now:', playerInventory.common);
            
            const result = await addDonationXP(playerId, 0, 10);
            console.log('AddDonationXP result:', result);
            
            if (result.success) {
                certificates = await getCertificates(playerId);
                console.log('Certificates updated:', certificates[0]);
                render();
                
                if (result.leveledUp) {
                    alert(`🎉 Level ${result.newLevel} reached!`);
                } else {
                    alert(`+${result.xpGained} XP added!`);
                }
            } else {
                playerInventory.common += 10;
                alert(result.error || 'Failed to add XP');
                render();
            }
        };
        
        document.getElementById('donateBtn').onclick = window.donate;
        
        loadData();
    </script>
</body>
</html>
