<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDFARER - UNIVERSITY</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: #000000;
        }
        
        /* Animated background */
        .phone-frame::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(138, 106, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 120px 20px;
            color: white;
            min-height: 100%;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        .top-bar-left {
            display: flex;
            gap: 20px;
        }
        
        .top-bar-right {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .university-title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title-icon {
            font-size: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(138, 106, 255, 0.5));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .title-main {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: white;
            text-shadow: 0 0 30px rgba(138, 106, 255, 0.5);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }
        
        .title-sub {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }
        
        .cognatus-presence {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }
        
        .cognatus-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a6aff;
            box-shadow: 0 0 15px #8a6aff;
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        
        .cognatus-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Player Stats Card */
        .player-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .player-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .player-badge {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            color: #8a6aff;
        }
        
        .player-stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .stat-highlight {
            font-size: 18px;
            font-weight: 600;
            color: #ffd966;
        }
        
        /* Path Selector */
        .path-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .path-btn {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        
        .path-btn.active {
            background: rgba(138, 106, 255, 0.2);
            border-color: #8a6aff;
            color: #8a6aff;
        }
        
        /* Earnings Card */
        .earnings-card {
            background: rgba(138, 106, 255, 0.15);
            border: 1px solid rgba(138, 106, 255, 0.3);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        
        .earnings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .earnings-title {
            font-size: 14px;
            font-weight: 600;
            color: #8a6aff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .earnings-amount {
            font-size: 24px;
            font-weight: 700;
            color: #ffd966;
        }
        
        .claim-btn {
            background: rgba(138, 106, 255, 0.3);
            border: 1px solid #8a6aff;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #8a6aff;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 12px;
        }
        
        .claim-btn:active {
            transform: scale(0.97);
            background: rgba(138, 106, 255, 0.4);
        }
        
        .claim-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .earnings-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-top: 8px;
        }
        
        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .section-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }
        
        /* Certificate Cards - Flip Animation */
        .certificates-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: auto;
            cursor: pointer;
        }
        
        .card-flip {
            position: relative;
            width: 100%;
            height: auto;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .card-container.flipped .card-flip {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: relative;
            width: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .card-front {
            transform: rotateY(0deg);
        }
        
        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
            background: rgba(20, 10, 30, 0.9);
            border-color: #8a6aff;
            min-height: 100%;
        }
        
        .card-flip-hint {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            margin-top: 8px;
        }
        
        /* Certificate Status Badges */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .status-earned {
            background: rgba(74, 255, 170, 0.2);
            border: 1px solid rgba(74, 255, 170, 0.3);
            color: #4affaa;
        }
        
        .status-available {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            color: #8a6aff;
        }
        
        .status-locked {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Mastery Card Styles */
        .mastery-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .mastery-icon {
            font-size: 32px;
            min-width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(138, 106, 255, 0.15);
            border-radius: 16px;
        }
        
        .mastery-title {
            flex: 1;
        }
        
        .mastery-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .mastery-tier {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .mastery-level {
            text-align: right;
        }
        
        .level-number {
            font-size: 24px;
            font-weight: 700;
            color: #8a6aff;
            line-height: 1;
        }
        
        .level-max {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Progress Section */
        .progress-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .progress-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .progress-value {
            font-size: 14px;
            font-weight: 600;
            color: #8a6aff;
        }
        
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8a6aff, #b8a6ff);
            border-radius: 4px;
        }
        
        .xp-details {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Requirements List */
        .requirements-list {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .requirement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .requirement-icon {
            font-size: 14px;
            min-width: 20px;
        }
        
        .requirement-text {
            flex: 1;
            font-size: 13px;
        }
        
        .requirement-status {
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-met {
            color: #4affaa;
        }
        
        .status-unmet {
            color: #ff6b6b;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: #8a6aff;
        }
        
        .stat-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }
        
        /* Earnings Display on Card Back */
        .earnings-block {
            background: rgba(74, 255, 170, 0.1);
            border: 1px solid rgba(74, 255, 170, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .earnings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .earnings-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .earnings-value {
            font-size: 14px;
            font-weight: 600;
            color: #4affaa;
        }
        
        /* Donation Section */
        .donation-section {
            background: rgba(138, 106, 255, 0.1);
            border: 1px solid rgba(138, 106, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
        }
        
        .donation-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #8a6aff;
        }
        
        .donation-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .donation-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .donation-element {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .element-icon {
            font-size: 20px;
        }
        
        .element-info {
            display: flex;
            flex-direction: column;
        }
        
        .element-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .element-xp {
            font-size: 10px;
            color: #8a6aff;
        }
        
        .donation-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .donation-amount {
            font-size: 14px;
            font-weight: 600;
            color: #ffd966;
            min-width: 45px;
            text-align: right;
        }
        
        .donate-btn {
            background: rgba(138, 106, 255, 0.2);
            border: 1px solid rgba(138, 106, 255, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #8a6aff;
            cursor: pointer;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        
        .donate-btn:active {
            transform: scale(0.94);
            background: rgba(138, 106, 255, 0.3);
        }
        
        /* Tier Separator */
        .tier-separator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 10px 0;
        }
        
        .tier-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .tier-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }
        
        /* Fixed Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 390px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(138, 106, 255, 0.3);
            padding: 12px 20px;
            z-index: 1000;
            margin: 0 auto;
            right: 0;
        }
        
        .back-btn-fixed {
            background: rgba(138, 106, 255, 0.15);
            border: 1px solid #8a6aff;
            border-radius: 40px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        
        .back-btn-fixed:active {
            transform: scale(0.97);
            background: rgba(138, 106, 255, 0.3);
        }
        
        .back-icon {
            font-size: 20px;
            color: #8a6aff;
        }
        
        .back-text {
            font-size: 16px;
            font-weight: 600;
            color: #8a6aff;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(138, 106, 255, 0.3);
            border-top: 4px solid #8a6aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <span>✦ UNIVERSITY</span>
                    <span>✦ EARTH HUB</span>
                </div>
                <div class="top-bar-right">v1.0.0</div>
            </div>
            
            <!-- Title -->
            <div class="university-title">
                <div class="title-icon">🎓</div>
                <div class="title-main">UNIVERSITY</div>
                <div class="title-sub">MASTERY & KNOWLEDGE</div>
            </div>
            
            <div class="cognatus-presence">
                <div class="cognatus-pulse"></div>
                <div class="cognatus-label">COGNATUS ONLINE</div>
            </div>
            
            <!-- Player Stats Card -->
            <div class="player-card">
                <div class="player-row">
                    <span class="player-name" id="playerName">VOIDFARER #1234</span>
                    <span class="player-badge">CITIZEN</span>
                </div>
                <div class="player-stats-row">
                    <span>Total Donations</span>
                    <span class="stat-highlight" id="totalDonations">12,450</span>
                </div>
            </div>
            
            <!-- Unclaimed Earnings Card -->
            <div class="earnings-card" id="earningsCard">
                <div class="earnings-header">
                    <span class="earnings-title">📈 Unclaimed Labor Earnings</span>
                    <span class="earnings-amount" id="unclaimedEarnings">0 ⭐</span>
                </div>
                <button class="claim-btn" id="claimBtn" onclick="claimAllEarnings()">CLAIM ALL EARNINGS</button>
                <div class="earnings-note">Earned from ships built by other players</div>
            </div>
            
            <!-- Path Selector -->
            <div class="path-selector">
                <span class="path-btn active" onclick="switchPath('mining')">⛏️ MINING</span>
                <span class="path-btn" onclick="switchPath('trading')">💹 TRADING</span>
                <span class="path-btn" onclick="switchPath('science')">🔬 SCIENCE</span>
                <span class="path-btn" onclick="switchPath('engineering')">🔧 ENGINEERING</span>
            </div>
            
            <!-- Certificates Section -->
            <div class="section-header">
                <div class="section-line"></div>
                <span class="section-title" id="sectionTitle">MINING MASTERY</span>
                <div class="section-line"></div>
            </div>
            
            <!-- Certificate Mastery Cards Container -->
            <div class="certificates-grid" id="certificatesContainer">
                <!-- Dynamically filled by JavaScript -->
            </div>
        </div>
        
        <!-- Fixed Bottom Navigation Bar -->
        <div class="bottom-nav">
            <div class="back-btn-fixed" onclick="returnToEarthHub()">
                <span class="back-icon">←</span>
                <span class="back-text">RETURN TO EARTH HUB</span>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">PROCESSING...</div>
        </div>
    </div>

    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/labor-pool.js"></script>

    <script>
        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== PLAYER DATA =====
        const playerData = {
            name: 'VOIDFARER #1234',
            totalDonations: 12450,
            skills: {
                mining: 35,
                trading: 22,
                science: 48,
                engineering: 17
            },
            certificates: {
                mining: ['prospector'], // Earned certificates
                trading: ['merchant'],
                science: ['observer'],
                engineering: ['builder']
            },
            mastery: {
                prospector: { level: 3, xp: 450, nextLevelXp: 1000 },
                excavator: { level: 2, xp: 180, nextLevelXp: 500 },
                merchant: { level: 4, xp: 180, nextLevelXp: 250 },
                trader: { level: 1, xp: 45, nextLevelXp: 100 },
                observer: { level: 5, xp: 620, nextLevelXp: 1200 },
                analyst: { level: 2, xp: 220, nextLevelXp: 500 },
                builder: { level: 3, xp: 380, nextLevelXp: 800 },
                engineer: { level: 1, xp: 25, nextLevelXp: 100 }

        // ===== HELPER FUNCTION TO CHECK IF CERTIFICATE IS EARNED =====
        function hasCertificate(certId) {
            for (const path in playerData.certificates) {
                if (playerData.certificates[path].includes(certId)) {
                    return true;
                }
            }
            return false;
        }

        // ===== HELPER FUNCTION TO GET CERTIFICATE STATUS =====
        function getCertificateStatus(certData, path) {
            const certId = certData.id;
            
            // Check if earned
            if (hasCertificate(certId)) {
                return 'earned';
            }
            
            // Check if requires previous tier
            if (certData.requires) {
                if (hasCertificate(certData.requires)) {
                    return 'available';
                } else {
                    return 'locked';
                }
            }
            
            // Tier 1 is always available
            return 'available';
        }

        // ===== GENERATE ALL CERTIFICATES FOR A PATH =====
        function generatePathCertificates(path) {
            const certs = certificateData[path];
            let html = '';
            let lastStatus = 'earned';
            
            for (let tier = 1; tier <= 10; tier++) {
                const certKey = `tier${tier}`;
                const certData = certs[certKey];
                const status = getCertificateStatus(certData, path);
                
                // Add tier separator when moving from earned/available to locked
                if (tier > 1 && lastStatus === 'earned' && status === 'locked') {
                    html += `
                        <div class="tier-separator">
                            <div class="tier-line"></div>
                            <span class="tier-label">✧ HIGHER TIERS LOCKED ✧</span>
                            <div class="tier-line"></div>
                        </div>
                    `;
                }
                
                html += generateCertificateCard(certData, path, tier);
                lastStatus = status;
            }
            
            return html;
        }

        // ===== PATH SWITCHING =====
        window.switchPath = function(path) {
            // Update active button
            document.querySelectorAll('.path-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const certContainer = document.getElementById('certificatesContainer');
            const sectionTitle = document.getElementById('sectionTitle');
            
            // Generate certificates for selected path
            certContainer.innerHTML = generatePathCertificates(path);
            sectionTitle.textContent = path.toUpperCase() + ' MASTERY';
            
            // Attach flip functionality to new cards
            document.querySelectorAll('.card-container').forEach(card => {
                card.onclick = function(e) {
                    // Don't flip if clicking on donate button
                    if (!e.target.classList.contains('donate-btn') && 
                        !e.target.closest('.donate-btn')) {
                        this.classList.toggle('flipped');
                    }
                };
            });
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        // ===== DONATION FUNCTION =====
        window.donate = function(element, xp, path, btn) {
            // Stop event from bubbling up to card flip
            event.stopPropagation();
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = `DONATING ${element.toUpperCase()}...`;
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            // Simulate donation processing
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
                
                // Show success feedback
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred?.('success');
                }
                
                // Update button
                if (btn) {
                    const originalText = btn.textContent;
                    btn.textContent = '✓';
                    btn.style.background = 'rgba(74, 255, 170, 0.2)';
                    btn.style.borderColor = '#4affaa';
                    btn.style.color = '#4affaa';
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = 'rgba(138, 106, 255, 0.2)';
                        btn.style.borderColor = 'rgba(138, 106, 255, 0.3)';
                        btn.style.color = '#8a6aff';
                    }, 1000);
                }
            }, 800);
        };

        // ===== CLAIM EARNINGS =====
        window.claimAllEarnings = function() {
            const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'CLAIMING EARNINGS...';
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            // Call labor pool claim function
            setTimeout(() => {
                let claimed = 0;
                if (typeof window.claimEarnings === 'function') {
                    const result = window.claimEarnings(playerId);
                    claimed = result.claimed || 0;
                } else {
                    // Simulate for demo
                    claimed = Math.floor(Math.random() * 500) + 100;
                }
                
                document.getElementById('loadingOverlay').classList.remove('active');
                
                if (claimed > 0) {
                    alert(`✅ Successfully claimed ${claimed}⭐!`);
                    document.getElementById('unclaimedEarnings').textContent = '0 ⭐';
                    
                    // Update credits display
                    const credits = parseInt(localStorage.getItem('voidfarer_credits') || '5000') + claimed;
                    localStorage.setItem('voidfarer_credits', credits.toString());
                    
                    if (tg?.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred?.('success');
                    }
                } else {
                    alert('No earnings to claim.');
                }
            }, 1000);
        };

        // ===== UPDATE UNCLAIMED EARNINGS DISPLAY =====
        function updateUnclaimedEarnings() {
            const playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
            let earnings = 0;
            
            if (typeof window.getPlayerEarnings === 'function') {
                earnings = window.getPlayerEarnings(playerId);
            } else {
                // Simulate for demo
                earnings = 345;
            }
            
            document.getElementById('unclaimedEarnings').textContent = earnings + ' ⭐';
        }

        // ===== NAVIGATION =====
        window.returnToEarthHub = function() {
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('loadingText').textContent = 'RETURNING TO HUB...';
            
            // Haptic feedback
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Navigate back to Earth Hub
            setTimeout(() => {
                window.location.href = 'earth-hub.html';
            }, 500);
        };

        // ===== INITIAL LOAD =====
        document.addEventListener('DOMContentLoaded', function() {
            // Load initial certificates (mining)
            document.getElementById('certificatesContainer').innerHTML = generatePathCertificates('mining');
            
            // Attach flip functionality to initial cards
            document.querySelectorAll('.card-container').forEach(card => {
                card.onclick = function(e) {
                    // Don't flip if clicking on donate button
                    if (!e.target.classList.contains('donate-btn') && 
                        !e.target.closest('.donate-btn')) {
                        this.classList.toggle('flipped');
                    }
                };
            });
            
            // Update unclaimed earnings
            updateUnclaimedEarnings();
            
            // Load player data
            loadPlayerData();
        });

        // ===== LOAD PLAYER DATA =====
        async function loadPlayerData() {
            try {
                // Update player name
                const playerId = localStorage.getItem('voidfarer_player_id') || '1234';
                document.getElementById('playerName').textContent = `VOIDFARER #${playerId.slice(-4)}`;
                
                // Update total donations
                const donations = localStorage.getItem('voidfarer_total_donations') || '12450';
                document.getElementById('totalDonations').textContent = parseInt(donations).toLocaleString();
                
            } catch (error) {
                console.error('Error loading player data:', error);
            }
        }
    </script>
</body>
</html>
