<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .system-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Central Star - MUCH SMALLER */
        .star-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
        }
        
        .star {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff5b0, #ffd700);
            box-shadow: 0 0 40px #ffd700;
            animation: pulse 4s infinite alternate;
        }
        
        .star-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 20px;
            white-space: nowrap;
            text-shadow: 0 0 15px #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #ffd700;
        }
        
        /* Planets Container */
        .planets-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(160, 176, 192, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .planet-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0.5;
        }
        
        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 15px currentColor;
        }
        
        .planet-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 8px black;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 15px #6a8ac0;
            background: rgba(10,10,26,0.7);
            padding: 8px 22px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid #6a8ac0;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 24px;
            border-radius: 40px 15px 40px 15px;
            font-size: 16px;
            cursor: pointer;
            z-index: 30;
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        .system-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 18px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 30;
            font-size: 14px;
        }
        
        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            display: none;
            min-width: 260px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .planet-info.visible {
            display: block;
        }
        
        .planet-info h2 {
            font-family: 'WindSong', cursive;
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .planet-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #d0e0ff;
        }
        
        .planet-info button {
            margin-top: 15px;
            padding: 10px 25px;
            background: #4a8ac0;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
        }
        
        .planet-info button:active {
            transform: scale(0.95);
        }
        
        .planet-info button:last-child {
            background: transparent;
            border: 1px solid #6a8ac0;
            margin-left: 10px;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 15px #6a8ac0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0.95; }
        }
        
        /* Planet type colors */
        .planet-lush .planet-core { background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57); }
        .planet-lush .planet-glow { background: rgba(100, 200, 100, 0.4); }
        
        .planet-barren .planet-core { background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a); }
        .planet-barren .planet-glow { background: rgba(160, 140, 120, 0.4); }
        
        .planet-frozen .planet-core { background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4); }
        .planet-frozen .planet-glow { background: rgba(150, 200, 255, 0.4); }
        
        .planet-scorched .planet-core { background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c); }
        .planet-scorched .planet-glow { background: rgba(255, 150, 100, 0.4); }
        
        .planet-gas .planet-core { background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db); }
        .planet-gas .planet-glow { background: rgba(200, 150, 255, 0.4); }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="system-view">
        <!-- Central Star -->
        <div class="star-container">
            <div class="star" id="star"></div>
            <div class="star-label" id="starName">Loading...</div>
        </div>
        
        <!-- Planets Container -->
        <div class="planets-container" id="planetsContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="systemName">Loading System...</div>
        <button class="back-btn" onclick="goBack()">← Cluster</button>
        
        <div class="system-info" id="systemInfo">
            <div id="planetCount">-- planets</div>
        </div>
        
        <!-- Planet Info Panel -->
        <div class="planet-info" id="planetInfo">
            <h2 id="planetName"></h2>
            <p id="planetType"></p>
            <p id="planetTemp"></p>
            <p id="planetAtmos"></p>
            <p id="planetGravity"></p>
            <p id="planetResources" style="color: #ffd966;"></p>
            <div>
                <button onclick="landOnPlanet()">🚀 LAND</button>
                <button onclick="hidePlanetInfo()">CLOSE</button>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">loading system...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script type="module">
        // ===== IMPORTS =====
        import { 
            getCurrentStar,
            getCurrentStarType,
            getCurrentStarIndex,
            getCurrentStarPlanets,
            setCurrentPlanet,
            getCurrentNebula,
            getCurrentSector,
            getCredits
        } from './js/storage.js';
        import { 
            generateStarSystem,
            UNIVERSE_SEED,
            seededRandom
        } from './js/procedural-universe.js';
        import { isMigrationComplete } from './js/db.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        // ===== DOM ELEMENTS =====
        const planetsContainer = document.getElementById('planetsContainer');
        const planetInfo = document.getElementById('planetInfo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // ===== STATE =====
        let starData = null;
        let planets = [];
        let currentPlanet = null;

        // ===== LOAD STAR DATA =====
        async function loadStarData() {
            try {
                // Load star data from storage
                const [
                    starName,
                    starType,
                    starIndex,
                    starPlanets,
                    nebula,
                    sector
                ] = await Promise.all([
                    getCurrentStar(),
                    getCurrentStarType(),
                    getCurrentStarIndex(),
                    getCurrentStarPlanets(),
                    getCurrentNebula(),
                    getCurrentSector()
                ]);

                // Generate star system using procedural generation
                // Use a deterministic seed based on star name and universe seed
                const starSeed = UNIVERSE_SEED + (starName ? hashString(starName) : 0);
                const system = generateStarSystem(starSeed, starIndex || 0);
                
                starData = system.star;
                planets = system.planets;

                // Update UI
                document.getElementById('starName').textContent = starName || 'Unknown Star';
                document.getElementById('systemName').textContent = (starName || 'Unknown') + ' System';
                document.getElementById('planetCount').textContent = planets.length + ' planets';

                // Set star color based on type
                const starEl = document.getElementById('star');
                const starColors = {
                    'main': '#ffd700',
                    'red': '#ff6b6b',
                    'blue': '#6ba5ff',
                    'neutron': '#ffffff',
                    'blackhole': '#4a4a4a'
                };
                const color = starColors[starData?.type] || '#ffd700';
                starEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
                starEl.style.boxShadow = `0 0 40px ${color}`;

                return { starName, nebula, sector };

            } catch (error) {
                console.error('Error loading star data:', error);
                // Generate fallback data
                const fallbackSeed = UNIVERSE_SEED + Math.floor(Math.random() * 1000);
                const system = generateStarSystem(fallbackSeed, 0);
                starData = system.star;
                planets = system.planets;

                document.getElementById('starName').textContent = 'Unknown Star';
                document.getElementById('systemName').textContent = 'Unknown System';
                document.getElementById('planetCount').textContent = planets.length + ' planets';

                return { starName: 'Unknown', nebula: 'Unknown', sector: 'Unknown' };
            }
        }

        // ===== HASH FUNCTION =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        // ===== CREATE ORBIT RINGS =====
        function createOrbitRings() {
            planets.forEach(planet => {
                const ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = (planet.orbitRadius * 2) + 'px';
                ring.style.height = (planet.orbitRadius * 2) + 'px';
                planetsContainer.appendChild(ring);
            });
        }

        // ===== CREATE PLANETS =====
        function createPlanets() {
            planets.forEach((planet, index) => {
                const planetEl = document.createElement('div');
                planetEl.className = `planet planet-${planet.type}`;
                planetEl.id = `planet-${index}`;
                planetEl.onclick = () => showPlanetInfo(index);
                
                planetEl.innerHTML = `
                    <div class="planet-glow"></div>
                    <div class="planet-core"></div>
                    <span class="planet-label">${planet.name}</span>
                `;
                
                planetsContainer.appendChild(planetEl);
                
                // Store position for animation
                planet.element = planetEl;
                planet.angle = Math.random() * Math.PI * 2; // Random start position
            });
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            planets.forEach(planet => {
                planet.angle += planet.orbitSpeed;
                
                const x = Math.cos(planet.angle) * planet.orbitRadius;
                const y = Math.sin(planet.angle) * planet.orbitRadius * 0.6; // Flatten for perspective
                
                if (planet.element) {
                    planet.element.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                }
            });
            
            requestAnimationFrame(animate);
        }

        // ===== SHOW PLANET INFO =====
        function showPlanetInfo(index) {
            const planet = planets[index];
            if (!planet) return;
            
            currentPlanet = planet;
            
            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = 'Type: ' + planet.typeName;
            document.getElementById('planetTemp').textContent = 'Temperature: ' + planet.temp;
            document.getElementById('planetAtmos').textContent = 'Atmosphere: ' + planet.atmos;
            document.getElementById('planetGravity').textContent = 'Gravity: ' + planet.gravity;
            document.getElementById('planetResources').textContent = 'Resources: ' + (planet.resources.length ? planet.resources.join(', ') : 'None');
            
            planetInfo.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HIDE PLANET INFO =====
        window.hidePlanetInfo = function() {
            planetInfo.classList.remove('visible');
            currentPlanet = null;
        };

        // ===== LAND ON PLANET =====
        window.landOnPlanet = async function() {
            if (!currentPlanet) return;
            
            if (!currentPlanet.landable) {
                alert('Cannot land on gas giant!');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'descending to surface...';
            
            try {
                // Save current planet to storage
                await setCurrentPlanet(
                    currentPlanet.name,
                    currentPlanet.type,
                    currentPlanet.resources
                );
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                    window.location.href = 'surface.html';
                }, 800);
            } catch (error) {
                console.error('Error landing:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to land. Please try again.');
            }
        };

        // ===== GO BACK =====
        window.goBack = function() {
            window.location.href = 'star-cluster.html';
        };

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star system...';

                // Check for player data
                const credits = await getCredits();
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load star data
                await loadStarData();

                // Create orbit rings
                createOrbitRings();

                // Create planets
                createPlanets();

                // Start animation
                animate();

                // Check migration status
                const migrated = await isMigrationComplete();
                migrationStatus.textContent = migrated ? '✓ DB Ready' : '⚡ Loading';
                migrationStatus.style.display = 'block';
                setTimeout(() => {
                    migrationStatus.style.display = 'none';
                }, 3000);

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
