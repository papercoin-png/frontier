<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .system-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Central Star */
        .star-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
        }
        
        .star {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff5b0, #ffd700);
            box-shadow: 0 0 40px #ffd700;
            animation: pulse 4s infinite alternate;
        }
        
        .star-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 20px;
            white-space: nowrap;
            text-shadow: 0 0 15px #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            font-weight: 500;
        }
        
        /* Planets Container */
        .planets-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(160, 176, 192, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .planet:hover {
            filter: brightness(1.2);
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .planet-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0.5;
        }
        
        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 15px currentColor;
        }
        
        .planet-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 8px black;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            font-weight: 500;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            text-shadow: 0 0 15px #6a8ac0;
            background: rgba(10,10,26,0.7);
            padding: 8px 22px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid #6a8ac0;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 24px;
            border-radius: 40px 15px 40px 15px;
            font-size: 16px;
            cursor: pointer;
            z-index: 30;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        .system-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 18px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 30;
            font-size: 14px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        /* Planet Info Panel - Now with SET COURSE button */
        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #ffaa4a;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            display: none;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 170, 74, 0.3);
        }
        
        .planet-info.visible {
            display: block;
        }
        
        .planet-info h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 600;
        }
        
        .planet-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #d0e0ff;
        }
        
        .planet-info .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .distance-calculator {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #4a8ac0;
        }
        
        .distance-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .distance-label {
            color: #a0c0ff;
        }
        
        .distance-value {
            color: #4affaa;
            font-weight: 600;
        }
        
        .total-distance {
            font-size: 18px;
            border-top: 1px solid #4a8ac0;
            padding-top: 10px;
            margin-top: 10px;
        }
        
        .total-distance .distance-value {
            color: #ffd966;
            font-size: 20px;
        }
        
        .warp-estimate {
            background: rgba(74, 138, 192, 0.2);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .warp-cycles {
            color: #ffaa4a;
            font-size: 24px;
            font-weight: 700;
        }
        
        .planet-info .warning-text {
            color: #ffaa4a;
            font-size: 12px;
            margin: 5px 0;
        }
        
        .planet-info .set-course-btn {
            width: 100%;
            background: #4affaa;
            border: none;
            color: #0a0a1a;
            padding: 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px #4affaa;
        }
        
        .planet-info .set-course-btn:active {
            transform: scale(0.96);
            background: #6affcc;
        }
        
        .planet-info .set-course-btn:disabled {
            background: #2a4a6a;
            color: #a0c0ff;
            box-shadow: none;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .planet-info .close-btn {
            background: transparent;
            border: 1px solid #6a8ac0;
            color: white;
            padding: 10px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            margin-top: 10px;
        }
        
        .planet-info .close-btn:active {
            background: rgba(106, 138, 192, 0.3);
        }
        
        /* Location badge - shows current sector/region */
        .location-badge {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #4affaa;
            border-radius: 30px 8px 30px 8px;
            padding: 6px 12px;
            color: #4affaa;
            font-size: 12px;
            font-family: 'Exo 2', sans-serif;
            z-index: 25;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 15px #6a8ac0;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0.95; }
        }
        
        /* Planet type colors */
        .planet-lush .planet-core { background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57); }
        .planet-lush .planet-glow { background: rgba(100, 200, 100, 0.4); }
        
        .planet-barren .planet-core { background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a); }
        .planet-barren .planet-glow { background: rgba(160, 140, 120, 0.4); }
        
        .planet-frozen .planet-core { background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4); }
        .planet-frozen .planet-glow { background: rgba(150, 200, 255, 0.4); }
        
        .planet-scorched .planet-core { background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c); }
        .planet-scorched .planet-glow { background: rgba(255, 150, 100, 0.4); }
        
        .planet-gas .planet-core { background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db); }
        .planet-gas .planet-glow { background: rgba(200, 150, 255, 0.4); }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="system-view">
        <!-- Central Star -->
        <div class="star-container">
            <div class="star" id="star"></div>
            <div class="star-label" id="starName">Loading...</div>
        </div>
        
        <!-- Planets Container -->
        <div class="planets-container" id="planetsContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="systemName">Loading System...</div>
        <button class="back-btn" onclick="goBack()">← CLUSTER</button>
        
        <div class="system-info" id="systemInfo">
            <div id="planetCount">-- planets</div>
        </div>
        
        <!-- Location Badge - Shows current sector -->
        <div class="location-badge" id="locationBadge">
            <span id="currentSector">Orion Arm</span>
        </div>
        
        <!-- Planet Info Panel with SET COURSE button -->
        <div class="planet-info" id="planetInfo">
            <h2 id="planetName"></h2>
            <p id="planetType"></p>
            <p id="planetTemp"></p>
            <p id="planetAtmos"></p>
            <p id="planetGravity"></p>
            <p class="planet-resources" id="planetResources"></p>
            
            <!-- Distance Calculator -->
            <div class="distance-calculator">
                <div class="distance-row">
                    <span class="distance-label">From current location:</span>
                    <span class="distance-value" id="distanceFromCurrent">0.0 LY</span>
                </div>
                <div class="distance-row">
                    <span class="distance-label">Orbital descent:</span>
                    <span class="distance-value" id="descentDistance">0.5 LY</span>
                </div>
                <div class="distance-row total-distance">
                    <span class="distance-label">TOTAL JOURNEY:</span>
                    <span class="distance-value" id="totalDistance">0.0 LY</span>
                </div>
            </div>
            
            <!-- Warp Estimate -->
            <div class="warp-estimate">
                <span>Warp cycles: </span>
                <span class="warp-cycles" id="warpCycles">0</span>
                <span> | Fuel: </span>
                <span class="warp-cycles" id="fuelCost">0</span><span>⭐</span>
            </div>
            
            <p class="warning-text" id="planetWarning"></p>
            
            <!-- ONE BUTTON - SET COURSE -->
            <button class="set-course-btn" id="setCourseBtn" onclick="setCourseToPlanet()">🚀 SET COURSE</button>
            <button class="close-btn" onclick="hidePlanetInfo()">CLOSE</button>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">plotting course...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        // ===== DOM ELEMENTS =====
        const planetsContainer = document.getElementById('planetsContainer');
        const planetInfo = document.getElementById('planetInfo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const locationBadge = document.getElementById('currentSector');

        // ===== STATE =====
        let starData = null;
        let planets = [];
        let currentPlanet = null;
        let currentSector = 'B2';
        let currentRegion = 'Orion';
        let currentStarName = '';

        // ===== CONSTANTS =====
        const UNIVERSE_SEED = 42793;
        const ORBITAL_DESCENT = 0.5; // Fixed descent distance

        // ===== SECTOR NAMES =====
        const sectorNames = {
            'A1': 'Cygnus Arm', 'B1': 'Perseus Arm', 'C1': 'Galactic Core',
            'A2': 'Outer Arm', 'B2': 'Orion Arm', 'C2': 'Sagittarius Arm',
            'A3': 'Carina Arm', 'B3': 'Norma Arm', 'C3': 'Scutum Arm',
            'A4': 'Far Arm', 'B4': 'Outer Reach', 'C4': 'The Fringe'
        };

        // ===== HASH FUNCTION =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        // ===== SEEDED RANDOM =====
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }

        function seededRandomRange(seed, index, min, max) {
            return Math.floor(seededRandom(seed, index) * (max - min + 1)) + min;
        }

        function seededRandomChoice(seed, index, array) {
            const choice = Math.floor(seededRandom(seed, index) * array.length);
            return array[choice];
        }

        // ===== STAR TYPES =====
        const starTypes = [
            { type: 'main', name: 'Main Sequence', prob: 0.60, color: '#ffd700', minPlanets: 3, maxPlanets: 8 },
            { type: 'red', name: 'Red Dwarf', prob: 0.25, color: '#ff6b6b', minPlanets: 2, maxPlanets: 5 },
            { type: 'blue', name: 'Blue Giant', prob: 0.10, color: '#6ba5ff', minPlanets: 5, maxPlanets: 12 },
            { type: 'neutron', name: 'Neutron Star', prob: 0.03, color: '#ffffff', minPlanets: 0, maxPlanets: 0 },
            { type: 'blackhole', name: 'Black Hole', prob: 0.02, color: '#000000', minPlanets: 0, maxPlanets: 0 }
        ];

        function getStarType(seed, index) {
            const rand = seededRandom(seed, index);
            let cumulative = 0;
            
            for (const type of starTypes) {
                cumulative += type.prob;
                if (rand < cumulative) {
                    return { ...type };
                }
            }
            return { ...starTypes[0] };
        }

        // ===== PLANET TYPES =====
        const planetTypes = [
            { type: 'scorched', name: 'Scorched', prob: 0.15, temp: '450°C', atmos: 'Toxic', gravity: '1.2g', landable: true, icon: '🔥' },
            { type: 'barren', name: 'Barren', prob: 0.25, temp: '-50°C', atmos: 'Thin', gravity: '0.8g', landable: true, icon: '🪨' },
            { type: 'lush', name: 'Lush', prob: 0.15, temp: '22°C', atmos: 'Breathable', gravity: '0.9g', landable: true, icon: '🌱' },
            { type: 'frozen', name: 'Frozen', prob: 0.20, temp: '-80°C', atmos: 'Thin', gravity: '0.7g', landable: true, icon: '❄️' },
            { type: 'gas', name: 'Gas Giant', prob: 0.25, temp: '-120°C', atmos: 'Dense', gravity: '2.1g', landable: false, icon: '🌪️' }
        ];

        function getPlanetType(seed, index) {
            const rand = seededRandom(seed, index);
            let cumulative = 0;
            
            for (const type of planetTypes) {
                cumulative += type.prob;
                if (rand < cumulative) {
                    return { ...type };
                }
            }
            return { ...planetTypes[1] };
        }

        // ===== NAME GENERATION =====
        const planetPrefixes = [
            'Verdant', 'Pyros', 'Glacier', 'Aether', 'Ignis', 'Terra', 'Aqua', 'Ventus',
            'Saxum', 'Silva', 'Desertum', 'Lux', 'Umbra', 'Crystal', 'Eden',
            'Nova', 'Prime', 'Secundus', 'Tertius', 'Quartus'
        ];

        function generatePlanetName(seed, index) {
            const prefix = planetPrefixes[Math.floor(seededRandom(seed, index * 5) * planetPrefixes.length)];
            const number = Math.floor(seededRandom(seed, index * 5 + 1) * 12) + 1;
            return prefix + '-' + number;
        }

        // ===== CORRECTED DISTANCE CALCULATION =====
        // Now matches warp-calculator.js and coordinates.js
        function calculateWarpCycles(distance) {
            // Use the authoritative formula from warp-calculator.js
            if (distance <= 1.0) return 1;
            if (distance <= 2.5) return 2;
            if (distance <= 4.5) return 3;
            if (distance <= 7.0) return 4;
            return 5;
        }

        function calculateFuelCost(distance) {
            return Math.floor(distance * 4) + 5;
        }

        // ===== LOAD CURRENT LOCATION =====
        async function loadCurrentLocation() {
            try {
                // Try to get from storage functions
                if (typeof getCurrentSector === 'function') {
                    currentSector = await getCurrentSector() || 'B2';
                } else {
                    currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                }
                
                if (typeof getCurrentRegion === 'function') {
                    currentRegion = await getCurrentRegion() || 'Orion';
                } else {
                    currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion';
                }
                
                // Update location badge
                locationBadge.textContent = sectorNames[currentSector] || currentRegion + ' Arm';
                
            } catch (error) {
                console.error('Error loading current location:', error);
                currentSector = 'B2';
                currentRegion = 'Orion';
                locationBadge.textContent = 'Orion Arm';
            }
        }

        // ===== LOAD STAR DATA =====
        async function loadStarData() {
            try {
                // Load star data from storage
                currentStarName = typeof getCurrentStar === 'function' ? await getCurrentStar() : 'Unknown Star';
                const starType = typeof getCurrentStarType === 'function' ? await getCurrentStarType() : 'Main Sequence';
                const starIndex = typeof getCurrentStarIndex === 'function' ? await getCurrentStarIndex() : 0;

                // Generate star system
                const starSeed = UNIVERSE_SEED + (currentStarName ? hashString(currentStarName) : 0);
                
                // Generate star
                const starTypeObj = getStarType(starSeed, 0);
                starData = {
                    type: starTypeObj.type,
                    typeName: starTypeObj.name,
                    color: starTypeObj.color
                };
                
                // Generate planets
                const planetCount = Math.floor(Math.random() * 6) + 3; // 3-8 planets
                planets = [];
                
                const orbitRadii = [70, 110, 150, 190, 230, 270, 310, 350];
                
                for (let i = 0; i < planetCount; i++) {
                    const planetSeed = starSeed + i * 100;
                    const planetType = getPlanetType(planetSeed, i);
                    
                    // Generate resources
                    const possibleResources = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Silver', 'Platinum', 
                                              'Uranium', 'Titanium', 'Oxygen', 'Hydrogen', 'Helium', 'Copper'];
                    const resourceCount = Math.floor(Math.random() * 3) + 2; // 2-4 resources
                    const resources = [];
                    
                    for (let r = 0; r < resourceCount; r++) {
                        const resource = possibleResources[Math.floor(Math.random() * possibleResources.length)];
                        if (!resources.includes(resource)) {
                            resources.push(resource);
                        }
                    }
                    
                    // Random distance from current location (simulated)
                    const distanceFromCurrent = (Math.random() * 5 + 1).toFixed(1);
                    
                    planets.push({
                        index: i,
                        name: generatePlanetName(planetSeed, i),
                        type: planetType.type,
                        typeName: planetType.name,
                        icon: planetType.icon,
                        temp: planetType.temp,
                        atmos: planetType.atmos,
                        gravity: planetType.gravity,
                        landable: planetType.landable,
                        resources: resources,
                        distanceFromCurrent: parseFloat(distanceFromCurrent),
                        orbitRadius: orbitRadii[i],
                        orbitSpeed: 0.002 - (i * 0.0002),
                        angle: Math.random() * Math.PI * 2,
                        // CRITICAL: Store which sector this planet belongs to!
                        sector: currentSector,
                        region: currentRegion
                    });
                }

                // Update UI
                document.getElementById('starName').textContent = currentStarName || 'Unknown Star';
                document.getElementById('systemName').textContent = (currentStarName || 'Unknown') + ' System';
                document.getElementById('planetCount').textContent = planets.length + ' planets';

                // Set star color
                const starEl = document.getElementById('star');
                const color = starData?.color || '#ffd700';
                starEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
                starEl.style.boxShadow = `0 0 40px ${color}`;

                return true;

            } catch (error) {
                console.error('Error loading star data:', error);
                return false;
            }
        }

        // ===== CREATE ORBIT RINGS =====
        function createOrbitRings() {
            planets.forEach(planet => {
                const ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = (planet.orbitRadius * 2) + 'px';
                ring.style.height = (planet.orbitRadius * 2) + 'px';
                planetsContainer.appendChild(ring);
            });
        }

        // ===== CREATE PLANETS =====
        function createPlanets() {
            planets.forEach((planet, index) => {
                const planetEl = document.createElement('div');
                planetEl.className = `planet planet-${planet.type}`;
                planetEl.id = `planet-${index}`;
                planetEl.onclick = () => showPlanetInfo(index);
                
                planetEl.innerHTML = `
                    <div class="planet-glow"></div>
                    <div class="planet-core"></div>
                    <span class="planet-label">${planet.name}</span>
                `;
                
                planetsContainer.appendChild(planetEl);
                
                // Store position for animation
                planet.element = planetEl;
            });
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            planets.forEach(planet => {
                planet.angle += planet.orbitSpeed;
                
                const x = Math.cos(planet.angle) * planet.orbitRadius;
                const y = Math.sin(planet.angle) * planet.orbitRadius * 0.6;
                
                if (planet.element) {
                    planet.element.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                }
            });
            
            requestAnimationFrame(animate);
        }

        // ===== SHOW PLANET INFO =====
        function showPlanetInfo(index) {
            const planet = planets[index];
            if (!planet) return;
            
            currentPlanet = planet;
            
            // Calculate total journey distance
            const totalDistance = planet.distanceFromCurrent + ORBITAL_DESCENT;
            const warpCycles = calculateWarpCycles(totalDistance);
            const fuelCost = calculateFuelCost(totalDistance);
            
            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = 'Type: ' + planet.typeName;
            document.getElementById('planetTemp').textContent = 'Temperature: ' + planet.temp;
            document.getElementById('planetAtmos').textContent = 'Atmosphere: ' + planet.atmos;
            document.getElementById('planetGravity').textContent = 'Gravity: ' + planet.gravity;
            document.getElementById('planetResources').textContent = 'Resources: ' + (planet.resources.length ? planet.resources.join(', ') : 'None');
            
            // Update distance display
            document.getElementById('distanceFromCurrent').textContent = planet.distanceFromCurrent.toFixed(1) + ' LY';
            document.getElementById('descentDistance').textContent = ORBITAL_DESCENT.toFixed(1) + ' LY';
            document.getElementById('totalDistance').textContent = totalDistance.toFixed(1) + ' LY';
            document.getElementById('warpCycles').textContent = warpCycles;
            document.getElementById('fuelCost').textContent = fuelCost;
            
            // Enable/disable set course button
            const setCourseBtn = document.getElementById('setCourseBtn');
            if (!planet.landable) {
                setCourseBtn.disabled = true;
                setCourseBtn.textContent = '⛔ CANNOT LAND';
                document.getElementById('planetWarning').textContent = 'Gas giants cannot be landed on';
            } else {
                setCourseBtn.disabled = false;
                setCourseBtn.textContent = '🚀 SET COURSE TO ' + planet.name.toUpperCase();
                document.getElementById('planetWarning').textContent = '';
            }
            
            planetInfo.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HIDE PLANET INFO =====
        function hidePlanetInfo() {
            planetInfo.classList.remove('visible');
            currentPlanet = null;
        }

        // ===== SET COURSE TO PLANET (SAVES DESTINATION LOCATION!) =====
        async function setCourseToPlanet() {
            if (!currentPlanet) return;
            
            if (!currentPlanet.landable) {
                alert('Cannot land on gas giant!');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'plotting course...';
            
            try {
                // Calculate total journey distance
                const totalDistance = currentPlanet.distanceFromCurrent + ORBITAL_DESCENT;
                const warpCycles = calculateWarpCycles(totalDistance);
                const fuelCost = calculateFuelCost(totalDistance);
                
                // ===== CRITICAL: Save the destination sector and region! =====
                // This is what updates the galaxy map to show your new location
                const destSector = currentPlanet.sector;
                const destRegion = currentPlanet.region;
                
                console.log('Setting course to planet in sector:', destSector, destRegion);
                
                // Save to localStorage
                localStorage.setItem('voidfarer_current_sector', destSector);
                localStorage.setItem('voidfarer_current_region', destRegion);
                
                // Also use storage function if available
                if (typeof setCurrentSector === 'function') {
                    await setCurrentSector(destSector, destRegion);
                }
                
                // Prepare warp data
                const warpData = {
                    destination: currentPlanet.name,
                    destinationType: currentPlanet.typeName,
                    startLocation: currentStarName + ' System',
                    startLocationType: 'star system',
                    totalDistance: totalDistance,
                    warpCycles: warpCycles,
                    fuelCost: fuelCost,
                    returnPage: 'surface.html'
                };
                
                // Save warp data
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                // Also save planet data for surface
                if (typeof setCurrentPlanet === 'function') {
                    await setCurrentPlanet(
                        currentPlanet.name,
                        currentPlanet.type,
                        currentPlanet.resources
                    );
                } else {
                    localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                    localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                    localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources));
                }
                
                // GO TO WARP!
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error plotting course:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to plot course. Please try again.');
            }
        }

        // ===== GO BACK =====
        function goBack() {
            window.location.href = 'star-cluster.html';
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star system...';

                // Check for player data
                const credits = typeof getCredits === 'function' ? await getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load current location FIRST
                await loadCurrentLocation();

                // Load star data
                await loadStarData();

                // Create orbit rings
                createOrbitRings();

                // Create planets
                createPlanets();

                // Start animation
                animate();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
