<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #4a8a9a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* ===== SYSTEM VIEW ===== */
        .system-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Nebula background */
        .system-nebula {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 80, 160, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(60, 100, 140, 0.2) 0%, transparent 50%);
            filter: blur(40px);
            animation: drift-slow 120s infinite alternate;
            z-index: 1;
        }
        
        @keyframes drift-slow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -5%); }
        }
        
        /* Central Star */
        .central-star {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            z-index: 10;
            animation: star-pulse 8s infinite alternate;
        }
        
        .star-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            filter: blur(15px);
            opacity: 0.8;
        }
        
        @keyframes star-pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
        }
        
        /* Star label */
        .star-label {
            position: absolute;
            top: calc(50% + 70px);
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 20px currentColor;
            white-space: nowrap;
            z-index: 6;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 5px 20px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #a0b0c0;
        }
        
        /* Star type indicator */
        .star-type {
            position: absolute;
            top: calc(50% + 110px);
            left: 50%;
            transform: translateX(-50%);
            color: #a0b0c0;
            font-size: 12px;
            z-index: 6;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 3px 15px;
            border-radius: 20px;
            border: 1px solid #a0b0c0;
        }
        
        /* Container for orbiting bodies */
        .orbit-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }
        
        /* Individual planet/moon container */
        .orbital-body {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            z-index: 30;
            transition: transform 0.1s linear;
            pointer-events: auto;
        }
        
        /* Planet/moon visual */
        .body-visual {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.3s;
            z-index: 35;
        }
        
        .body-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(5px);
            animation: body-pulse 8s infinite alternate;
        }
        
        .body-dot {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 20px currentColor;
            transition: all 0.2s;
        }
        
        .body-label {
            position: absolute;
            left: 25px;
            top: -10px;
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 10px #a0b0c0;
            opacity: 0.7;
            transition: opacity 0.2s;
            pointer-events: none;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 2px 8px;
            border-radius: 20px 5px 20px 5px;
            border: 1px solid #a0b0c0;
        }
        
        .body-visual:hover .body-label {
            opacity: 1;
        }
        
        .body-visual.selected .body-dot {
            transform: scale(1.3);
            box-shadow: 0 0 40px currentColor, 0 0 60px #ffffff;
        }
        
        .body-visual.selected .body-label {
            opacity: 1;
            font-size: 13px;
            color: #ffffff;
        }
        
        @keyframes body-pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(1.1); }
        }
        
        /* Planet type styles */
        .planet-lush .body-glow {
            background: radial-gradient(circle at center, rgba(100, 200, 100, 0.4), transparent 80%);
            width: 40px;
            height: 40px;
            top: -20px;
            left: -20px;
        }
        .planet-lush .body-dot {
            background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57);
            width: 12px;
            height: 12px;
            top: -6px;
            left: -6px;
        }
        
        .planet-barren .body-glow {
            background: radial-gradient(circle at center, rgba(160, 140, 120, 0.4), transparent 80%);
            width: 30px;
            height: 30px;
            top: -15px;
            left: -15px;
        }
        .planet-barren .body-dot {
            background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a);
            width: 10px;
            height: 10px;
            top: -5px;
            left: -5px;
        }
        
        .planet-frozen .body-glow {
            background: radial-gradient(circle at center, rgba(150, 200, 255, 0.4), transparent 80%);
            width: 35px;
            height: 35px;
            top: -17px;
            left: -17px;
        }
        .planet-frozen .body-dot {
            background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4);
            width: 11px;
            height: 11px;
            top: -5.5px;
            left: -5.5px;
        }
        
        .planet-scorched .body-glow {
            background: radial-gradient(circle at center, rgba(255, 150, 100, 0.4), transparent 80%);
            width: 38px;
            height: 38px;
            top: -19px;
            left: -19px;
        }
        .planet-scorched .body-dot {
            background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c);
            width: 12px;
            height: 12px;
            top: -6px;
            left: -6px;
        }
        
        .planet-gas .body-glow {
            background: radial-gradient(circle at center, rgba(200, 150, 255, 0.4), transparent 80%);
            width: 45px;
            height: 45px;
            top: -22px;
            left: -22px;
        }
        .planet-gas .body-dot {
            background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db);
            width: 14px;
            height: 14px;
            top: -7px;
            left: -7px;
        }
        
        .moon .body-glow {
            width: 20px !important;
            height: 20px !important;
            top: -10px !important;
            left: -10px !important;
        }
        .moon .body-dot {
            width: 6px !important;
            height: 6px !important;
            top: -3px !important;
            left: -3px !important;
        }
        
        /* Info Panel */
        .planet-info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid #a0b0c0;
            border-radius: 40% 20% 40% 20%;
            padding: 20px;
            z-index: 100;
            text-align: center;
            color: #d0e0f0;
            display: none;
        }
        
        .planet-info-panel.visible {
            display: block;
            animation: panel-appear 0.3s ease;
        }
        
        @keyframes panel-appear {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        
        .planet-info-name {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px currentColor;
        }
        
        .planet-info-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .planet-info-item {
            background: rgba(10, 10, 26, 0.5);
            border-radius: 30% 20% 30% 20%;
            padding: 8px;
        }
        
        .info-item-label {
            font-size: 10px;
            color: #a0b0c0;
            letter-spacing: 1px;
        }
        
        .info-item-value {
            font-size: 14px;
            font-weight: 700;
        }
        
        .planet-description {
            font-size: 12px;
            color: #b0c0d0;
            margin: 15px 0;
            font-style: italic;
            padding: 0 10px;
        }
        
        .planet-resources {
            font-size: 11px;
            color: #ffd966;
            margin-top: 5px;
        }
        
        .planet-info-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .planet-info-btn {
            flex: 1;
            background: rgba(10, 10, 26, 0.7);
            border: 1.5px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 0;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .planet-info-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.95);
        }
        
        .planet-info-btn.primary {
            background: rgba(160, 176, 192, 0.3);
            border-color: #d0e0f0;
        }
        
        .planet-info-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Back button */
        .back-button {
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 16px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .back-button:active {
            background: #a0b0c0;
            color: #0a0a1a;
        }
        
        /* System name */
        .system-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 20px #a0b0c0;
            white-space: nowrap;
            z-index: 50;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(5px);
            padding: 5px 20px;
            border-radius: 40% 20% 40% 20%;
            border: 1px solid #a0b0c080;
        }
        
        /* System coordinates */
        .system-coords {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #a0b0c0;
            font-size: 10px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(5px);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid #a0b0c0;
            font-family: monospace;
        }
        
        /* Stars background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
            animation: twinkle 8s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="app">
            <!-- System View -->
            <div class="system-view" id="systemView">
                <!-- Stars background -->
                <div class="stars" id="stars"></div>
                
                <!-- Nebula background -->
                <div class="system-nebula" id="systemNebula"></div>
                
                <!-- System name -->
                <div class="system-name" id="systemName">Star System</div>
                <div class="system-coords" id="systemCoords">Sector B2 • Orion Nebula</div>
                
                <!-- Back button -->
                <button class="back-button" onclick="goBackToSector()">← SECTOR</button>
                
                <!-- Central Star -->
                <div class="central-star" id="centralStar">
                    <div class="star-core"></div>
                </div>
                <div class="star-label" id="starLabel">Star Name</div>
                <div class="star-type" id="starType">Main Sequence</div>
                
                <!-- Container for orbiting bodies -->
                <div class="orbit-container" id="orbitContainer"></div>
                
                <!-- Info Panel -->
                <div class="planet-info-panel" id="planetInfoPanel">
                    <div class="planet-info-name" id="planetInfoName">Planet Name</div>
                    <div class="planet-info-details" id="planetInfoDetails">
                        <div class="planet-info-item">
                            <div class="info-item-label">TYPE</div>
                            <div class="info-item-value" id="planetInfoType">Lush</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">TEMP</div>
                            <div class="info-item-value" id="planetInfoTemp">22°C</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">ATMOS</div>
                            <div class="info-item-value" id="planetInfoAtmos">Breathable</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">GRAVITY</div>
                            <div class="info-item-value" id="planetInfoGravity">0.9g</div>
                        </div>
                    </div>
                    <div class="planet-description" id="planetDescription">
                        A lush, green world with abundant flora.
                    </div>
                    <div class="planet-resources" id="planetResources">Resources: Carbon, Iron, Gold</div>
                    <div class="planet-info-buttons">
                        <button class="planet-info-btn" onclick="closeInfo()">BACK</button>
                        <button class="planet-info-btn primary" id="travelButton" onclick="travelToPlanet()">🚀 LAND</button>
                    </div>
                </div>
                
                <!-- Loading Overlay -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-text">warping...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/procedural-universe.js"></script>
    
    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a0a1a');
            tg.setBackgroundColor('#0a0a1a');
        }
        
        // ===== LOAD SELECTED STAR =====
        const starName = localStorage.getItem('voidfarer_current_star') || 'Unknown Star';
        const starIndex = parseInt(localStorage.getItem('voidfarer_current_star_index')) || 0;
        const starType = localStorage.getItem('voidfarer_current_star_type') || 'main';
        const currentSector = getCurrentSector();
        const currentNebula = getCurrentNebula();
        
        // Update UI with star info
        document.getElementById('starLabel').textContent = starName;
        document.getElementById('systemName').textContent = starName + ' System';
        document.getElementById('systemCoords').textContent = `Sector ${currentSector} • ${currentNebula}`;
        
        // Set star type text
        const starTypeMap = {
            'main': 'Main Sequence',
            'red': 'Red Dwarf',
            'blue': 'Blue Giant',
            'neutron': 'Neutron Star',
            'blackhole': 'Black Hole'
        };
        document.getElementById('starType').textContent = starTypeMap[starType] || 'Main Sequence';
        
        // Set star color based on type
        const starElement = document.getElementById('centralStar');
        const starColors = {
            'main': 'radial-gradient(circle at 30% 30%, #fff5b0, #ffd700)',
            'red': 'radial-gradient(circle at 30% 30%, #ffb6b6, #ff6b6b)',
            'blue': 'radial-gradient(circle at 30% 30%, #b0e0ff, #6ba5ff)',
            'neutron': 'radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0)',
            'blackhole': 'radial-gradient(circle at 30% 30%, #000000, #330000)'
        };
        starElement.style.background = starColors[starType] || starColors.main;
        
        // Set star glow
        const starGlowColors = {
            'main': '#ffd700',
            'red': '#ff6b6b',
            'blue': '#6ba5ff',
            'neutron': '#ffffff',
            'blackhole': '#ff4d4d'
        };
        starElement.style.boxShadow = `0 0 60px ${starGlowColors[starType]}, 0 0 120px ${starGlowColors[starType]}`;
        
        // ===== GENERATE PLANETS =====
        function generatePlanets() {
            const planets = [];
            
            // Create seed for this star system
            const systemSeed = UNIVERSE_SEED + 
                              (currentSector.charCodeAt(0) * 100000) + 
                              (parseInt(currentSector[1]) * 10000) +
                              hashString(currentNebula) % 10000 +
                              starIndex * 1000;
            
            // Determine planet count based on star type
            let planetCount = 0;
            if (starType === 'main') planetCount = seededRandomRange(systemSeed, 1, 3, 8);
            else if (starType === 'red') planetCount = seededRandomRange(systemSeed, 2, 2, 5);
            else if (starType === 'blue') planetCount = seededRandomRange(systemSeed, 3, 5, 12);
            else if (starType === 'neutron') planetCount = 0;
            else if (starType === 'blackhole') planetCount = 0;
            
            console.log(`Generating ${planetCount} planets for ${starName}`); // Debug log
            
            // Planet type definitions
            const planetTypes = [
                { type: 'scorched', name: 'Scorched', temp: '450°C', atmos: 'Toxic', gravity: '1.2g', landable: true },
                { type: 'barren', name: 'Barren', temp: '-50°C', atmos: 'Thin', gravity: '0.8g', landable: true },
                { type: 'lush', name: 'Lush', temp: '22°C', atmos: 'Breathable', gravity: '0.9g', landable: true },
                { type: 'frozen', name: 'Frozen', temp: '-80°C', atmos: 'Thin', gravity: '0.7g', landable: true },
                { type: 'gas', name: 'Gas Giant', temp: '-120°C', atmos: 'Dense', gravity: '2.1g', landable: false }
            ];
            
            // Planet name prefixes
            const planetPrefixes = [
                'Verdant', 'Pyros', 'Glacier', 'Aether', 'Ignis', 'Terra', 'Aqua', 'Ventus',
                'Saxum', 'Silva', 'Desertum', 'Lux', 'Umbra', 'Crystal', 'Feral', 'Eden',
                'Nova', 'Prime', 'Secundus', 'Tertius'
            ];
            
            // Generate each planet
            for (let i = 0; i < planetCount; i++) {
                const planetSeed = systemSeed + (i * 100);
                
                // Determine planet type
                const typeRand = seededRandom(planetSeed, 0);
                let planetType;
                if (typeRand < 0.15) planetType = planetTypes[0]; // scorched
                else if (typeRand < 0.4) planetType = planetTypes[1]; // barren
                else if (typeRand < 0.55) planetType = planetTypes[2]; // lush
                else if (typeRand < 0.75) planetType = planetTypes[3]; // frozen
                else planetType = planetTypes[4]; // gas
                
                // Generate resources
                const resources = [];
                const resourceCount = seededRandomRange(planetSeed, 1, 2, 4);
                const resourcePool = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Silver', 'Platinum', 'Uranium', 'Promethium'];
                
                for (let r = 0; r < resourceCount; r++) {
                    const resourceIndex = Math.floor(seededRandom(planetSeed, 100 + r) * resourcePool.length);
                    const resource = resourcePool[resourceIndex];
                    if (!resources.includes(resource)) {
                        resources.push(resource);
                    }
                }
                
                // Generate planet name
                const prefixIndex = Math.floor(seededRandom(planetSeed, 2) * planetPrefixes.length);
                const planetName = planetPrefixes[prefixIndex] + '-' + (i + 1);
                
                // Determine moon count
                let moonCount = 0;
                if (planetType.type === 'gas') {
                    moonCount = seededRandomRange(planetSeed, 3, 3, 8);
                } else {
                    moonCount = seededRandom(planetSeed, 4) < 0.3 ? seededRandomRange(planetSeed, 5, 1, 2) : 0;
                }
                
                planets.push({
                    index: i,
                    name: planetName,
                    type: planetType.type,
                    typeName: planetType.name,
                    temp: planetType.temp,
                    atmos: planetType.atmos,
                    gravity: planetType.gravity,
                    landable: planetType.landable,
                    resources: resources,
                    moonCount: moonCount,
                    orbitRadius: 70 + i * 25,
                    orbitSpeed: 0.001 - (i * 0.0001),
                    description: `A ${planetType.name.toLowerCase()} world orbiting ${starName}.`
                });
            }
            
            return planets;
        }
        
        // ===== RENDER SYSTEM =====
        const orbitContainer = document.getElementById('orbitContainer');
        const planets = generatePlanets();
        const bodyElements = new Map();
        
        console.log(`Rendering ${planets.length} planets`); // Debug log
        
        function createPlanet(planet, index) {
            const container = document.createElement('div');
            container.className = 'orbital-body';
            container.style.left = '50%';
            container.style.top = '50%';
            
            // Create visual element
            const visual = document.createElement('div');
            visual.className = `body-visual planet-${planet.type}`;
            visual.id = `planet-${planet.index}`;
            visual.setAttribute('onclick', `selectPlanet(${planet.index})`);
            
            // Add moon indicator if planet has moons
            const moonIndicator = planet.moonCount > 0 ? ' ✦' : '';
            
            visual.innerHTML = `
                <div class="body-glow"></div>
                <div class="body-dot"></div>
                <span class="body-label">${planet.name}${moonIndicator}</span>
            `;
            
            container.appendChild(visual);
            orbitContainer.appendChild(container);
            
            bodyElements.set(planet.index, {
                element: container,
                visual: visual,
                planet: planet,
                angle: index * 1.5
            });
            
            // Generate moons
            for (let m = 0; m < planet.moonCount; m++) {
                createMoon(planet, m);
            }
        }
        
        function createMoon(planet, moonIndex) {
            const container = document.createElement('div');
            container.className = 'orbital-body';
            container.style.left = '50%';
            container.style.top = '50%';
            
            const visual = document.createElement('div');
            visual.className = 'body-visual planet-barren moon';
            visual.id = `moon-${planet.index}-${moonIndex}`;
            
            // Generate moon name (letter designation)
            const moonLetter = String.fromCharCode(97 + moonIndex);
            
            visual.innerHTML = `
                <div class="body-glow"></div>
                <div class="body-dot"></div>
                <span class="body-label">${planet.name}-${moonLetter}</span>
            `;
            
            container.appendChild(visual);
            orbitContainer.appendChild(container);
            
            bodyElements.set(`moon-${planet.index}-${moonIndex}`, {
                element: container,
                visual: visual,
                planet: {
                    name: `${planet.name}-${moonLetter}`,
                    type: 'barren',
                    landable: true
                },
                parentPlanet: planet,
                moonIndex: moonIndex,
                angle: moonIndex * 2,
                orbitRadius: 20 + moonIndex * 5
            });
        }
        
        // Generate all planets
        if (planets.length > 0) {
            planets.forEach((planet, index) => createPlanet(planet, index));
        } else {
            // Show message if no planets
            const noPlanetsMsg = document.createElement('div');
            noPlanetsMsg.style.position = 'absolute';
            noPlanetsMsg.style.top = '70%';
            noPlanetsMsg.style.left = '50%';
            noPlanetsMsg.style.transform = 'translateX(-50%)';
            noPlanetsMsg.style.color = '#a0b0c0';
            noPlanetsMsg.style.fontSize = '14px';
            noPlanetsMsg.style.textAlign = 'center';
            noPlanetsMsg.style.padding = '20px';
            noPlanetsMsg.style.background = 'rgba(10,10,26,0.6)';
            noPlanetsMsg.style.backdropFilter = 'blur(10px)';
            noPlanetsMsg.style.borderRadius = '40px 10px 40px 10px';
            noPlanetsMsg.style.border = '1px solid #a0b0c0';
            noPlanetsMsg.textContent = 'No planets in this system';
            orbitContainer.appendChild(noPlanetsMsg);
        }
        
        // Animation loop
        function animateOrbits() {
            bodyElements.forEach((data, id) => {
                if (data.planet.orbitRadius !== undefined) {
                    // Planet orbiting star
                    data.angle += data.planet.orbitSpeed || 0.0005;
                    
                    const x = data.planet.orbitRadius * Math.cos(data.angle);
                    const y = data.planet.orbitRadius * Math.sin(data.angle) * 0.6;
                    
                    data.element.style.transform = `translate(${x}px, ${y}px)`;
                    data.x = x;
                    data.y = y;
                } else if (data.parentPlanet) {
                    // Moon orbiting planet
                    data.angle += 0.002;
                    
                    const parent = bodyElements.get(data.parentPlanet.index);
                    if (parent) {
                        const x = parent.x + data.orbitRadius * Math.cos(data.angle);
                        const y = parent.y + data.orbitRadius * Math.sin(data.angle) * 0.6;
                        
                        data.element.style.transform = `translate(${x}px, ${y}px)`;
                    }
                }
            });
            
            requestAnimationFrame(animateOrbits);
        }
        
        if (planets.length > 0) {
            animateOrbits();
        }
        
        // ===== SELECTION HANDLING =====
        let currentPlanet = null;
        const infoPanel = document.getElementById('planetInfoPanel');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function selectPlanet(planetIndex) {
            document.querySelectorAll('.body-visual').forEach(el => {
                el.classList.remove('selected');
            });
            
            const visual = document.getElementById(`planet-${planetIndex}`);
            if (visual) {
                visual.classList.add('selected');
            }
            
            const planetData = planets[planetIndex];
            if (!planetData) return;
            
            currentPlanet = planetData;
            
            document.getElementById('planetInfoName').textContent = planetData.name;
            document.getElementById('planetInfoType').textContent = planetData.typeName;
            document.getElementById('planetInfoTemp').textContent = planetData.temp;
            document.getElementById('planetInfoAtmos').textContent = planetData.atmos;
            document.getElementById('planetInfoGravity').textContent = planetData.gravity;
            document.getElementById('planetDescription').textContent = planetData.description;
            document.getElementById('planetResources').textContent = 'Resources: ' + planetData.resources.join(', ');
            
            const travelBtn = document.getElementById('travelButton');
            if (planetData.landable) {
                travelBtn.textContent = '🚀 LAND';
                travelBtn.classList.remove('disabled');
            } else {
                travelBtn.textContent = '⛔ CANNOT LAND';
                travelBtn.classList.add('disabled');
            }
            
            infoPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function closeInfo() {
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.body-visual').forEach(el => {
                el.classList.remove('selected');
            });
            currentPlanet = null;
        }
        
        function travelToPlanet() {
            if (!currentPlanet) return;
            
            if (!currentPlanet.landable) {
                alert(`Cannot land on gas giant ${currentPlanet.name}`);
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                
                // Save planet data for surface
                localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources));
                
                window.location.href = 'surface.html';
                
                closeInfo();
            }, 1500);
        }
        
        function goBackToSector() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'nebula-sector.html';
        }
        
        // Generate stars background
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Initialize
        function init() {
            const player = getPlayer();
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            generateStars();
        }
        
        init();
    </script>
</body>
</html>
