<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .system-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Central Star */
        .star-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            z-index: 10;
        }
        
        .star {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff5b0, #ffd700);
            box-shadow: 0 0 60px #ffd700;
            animation: pulse 4s infinite alternate;
        }
        
        .star-label {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            white-space: nowrap;
            text-shadow: 0 0 20px #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 5px 20px;
            border-radius: 40px;
            border: 1px solid #ffd700;
        }
        
        /* Planets Container */
        .planets-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(160, 176, 192, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .planet-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.6;
        }
        
        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 20px currentColor;
        }
        
        .planet-label {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 14px;
            white-space: nowrap;
            text-shadow: 0 0 10px black;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        .moon {
            position: absolute;
            width: 20px;
            height: 20px;
        }
        
        .moon-core {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #aaa;
            border: 1px solid white;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #6a8ac0;
            background: rgba(10,10,26,0.8);
            padding: 10px 25px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid #6a8ac0;
            z-index: 30;
            white-space: nowrap;
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.8);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 28px;
            border-radius: 40px 15px 40px 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 30;
        }
        
        .system-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.8);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 14px 20px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 30;
        }
        
        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.9);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            display: none;
            min-width: 250px;
            text-align: center;
        }
        
        .planet-info.visible {
            display: block;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.9; }
        }
        
        /* Planet type colors */
        .planet-lush .planet-core { background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57); }
        .planet-lush .planet-glow { background: rgba(100, 200, 100, 0.4); }
        
        .planet-barren .planet-core { background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a); }
        .planet-barren .planet-glow { background: rgba(160, 140, 120, 0.4); }
        
        .planet-frozen .planet-core { background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4); }
        .planet-frozen .planet-glow { background: rgba(150, 200, 255, 0.4); }
        
        .planet-scorched .planet-core { background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c); }
        .planet-scorched .planet-glow { background: rgba(255, 150, 100, 0.4); }
        
        .planet-gas .planet-core { background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db); }
        .planet-gas .planet-glow { background: rgba(200, 150, 255, 0.4); }
    </style>
</head>
<body>
    <div class="system-view">
        <!-- Central Star -->
        <div class="star-container">
            <div class="star" id="star"></div>
            <div class="star-label" id="starName">Loading...</div>
        </div>
        
        <!-- Planets Container -->
        <div class="planets-container" id="planetsContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="systemName">Star System</div>
        <button class="back-btn" onclick="goBack()">← Cluster</button>
        
        <div class="system-info" id="systemInfo">
            <div id="planetCount">0 planets</div>
        </div>
        
        <!-- Planet Info Panel -->
        <div class="planet-info" id="planetInfo">
            <h2 id="planetName" style="font-family: 'WindSong'; font-size: 24px; margin-bottom: 10px;"></h2>
            <p id="planetType"></p>
            <p id="planetTemp"></p>
            <p id="planetAtmos"></p>
            <p id="planetGravity"></p>
            <p id="planetResources" style="color: #ffd966;"></p>
            <button onclick="landOnPlanet()" style="margin-top: 15px; padding: 10px 20px; background: #4a8ac0; border: none; border-radius: 30px; color: white; cursor: pointer;">🚀 LAND</button>
            <button onclick="hidePlanetInfo()" style="margin-top: 10px; padding: 8px 15px; background: transparent; border: 1px solid #6a8ac0; border-radius: 30px; color: white; cursor: pointer;">CLOSE</button>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        const planetsContainer = document.getElementById('planetsContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const planetInfo = document.getElementById('planetInfo');
        
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();
        
        const UNIVERSE_SEED = 42793;
        
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        // Load star data
        const starName = localStorage.getItem('voidfarer_current_star') || 'Unknown Star';
        const starType = localStorage.getItem('voidfarer_current_star_type') || 'Yellow Star';
        
        document.getElementById('starName').textContent = starName;
        document.getElementById('systemName').textContent = starName + ' System';
        
        // Set star color based on type
        const starEl = document.getElementById('star');
        const starColors = {
            'Blue Giant': '#6ba5ff',
            'White Star': '#ffffff',
            'Yellow Star': '#ffd700',
            'Orange Star': '#ff8c42',
            'Red Dwarf': '#ff6b6b',
            'Neutron Star': '#b0b0ff',
            'Black Hole': '#4a4a4a'
        };
        const color = starColors[starType] || '#ffd700';
        starEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
        starEl.style.boxShadow = `0 0 60px ${color}`;
        
        // Generate planets
        const planetTypes = [
            { type: 'lush', name: 'Lush', temp: '22°C', atmos: 'Breathable', gravity: '0.9g', prob: 0.15 },
            { type: 'barren', name: 'Barren', temp: '-50°C', atmos: 'Thin', gravity: '0.8g', prob: 0.25 },
            { type: 'frozen', name: 'Frozen', temp: '-80°C', atmos: 'Thin', gravity: '0.7g', prob: 0.20 },
            { type: 'scorched', name: 'Scorched', temp: '450°C', atmos: 'Toxic', gravity: '1.2g', prob: 0.15 },
            { type: 'gas', name: 'Gas Giant', temp: '-120°C', atmos: 'Dense', gravity: '2.1g', prob: 0.25 }
        ];
        
        const resources = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Silver', 'Platinum', 'Uranium', 'Titanium'];
        const planetCount = Math.floor(Math.random() * 6) + 3; // 3-8 planets
        
        document.getElementById('planetCount').textContent = planetCount + ' planets';
        
        const planets = [];
        const orbitRadii = [80, 120, 160, 200, 240, 280, 320, 360];
        
        for (let i = 0; i < planetCount; i++) {
            // Pick random planet type
            const rand = Math.random();
            let cum = 0;
            let planetType = planetTypes[0];
            for (const pt of planetTypes) {
                cum += pt.prob;
                if (rand < cum) {
                    planetType = pt;
                    break;
                }
            }
            
            // Generate resources
            const planetResources = [];
            for (let r = 0; r < 3; r++) {
                if (Math.random() > 0.3) {
                    planetResources.push(resources[Math.floor(Math.random() * resources.length)]);
                }
            }
            
            const planet = {
                index: i,
                name: ['Verdant', 'Pyros', 'Glacier', 'Aether', 'Terra', 'Aqua'][Math.floor(Math.random() * 6)] + '-' + (i + 1),
                type: planetType.type,
                typeName: planetType.name,
                temp: planetType.temp,
                atmos: planetType.atmos,
                gravity: planetType.gravity,
                resources: planetResources,
                landable: planetType.type !== 'gas',
                orbitRadius: orbitRadii[i],
                speed: 0.002 - (i * 0.0002),
                angle: Math.random() * Math.PI * 2
            };
            
            planets.push(planet);
        }
        
        // Create orbit rings
        planets.forEach(planet => {
            const ring = document.createElement('div');
            ring.className = 'orbit-ring';
            ring.style.width = (planet.orbitRadius * 2) + 'px';
            ring.style.height = (planet.orbitRadius * 2) + 'px';
            planetsContainer.appendChild(ring);
        });
        
        // Create planets
        planets.forEach(planet => {
            const planetEl = document.createElement('div');
            planetEl.className = `planet planet-${planet.type}`;
            planetEl.id = `planet-${planet.index}`;
            planetEl.onclick = () => showPlanetInfo(planet.index);
            
            planetEl.innerHTML = `
                <div class="planet-glow"></div>
                <div class="planet-core"></div>
                <span class="planet-label">${planet.name}</span>
            `;
            
            planetsContainer.appendChild(planetEl);
            
            // Store position for animation
            planet.element = planetEl;
        });
        
        // Animation loop
        function animate() {
            planets.forEach(planet => {
                planet.angle += planet.speed;
                
                const x = Math.cos(planet.angle) * planet.orbitRadius;
                const y = Math.sin(planet.angle) * planet.orbitRadius * 0.6; // Flatten for perspective
                
                if (planet.element) {
                    planet.element.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                }
            });
            
            requestAnimationFrame(animate);
        }
        animate();
        
        // Planet info
        function showPlanetInfo(index) {
            const planet = planets[index];
            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = 'Type: ' + planet.typeName;
            document.getElementById('planetTemp').textContent = 'Temperature: ' + planet.temp;
            document.getElementById('planetAtmos').textContent = 'Atmosphere: ' + planet.atmos;
            document.getElementById('planetGravity').textContent = 'Gravity: ' + planet.gravity;
            document.getElementById('planetResources').textContent = 'Resources: ' + (planet.resources.length ? planet.resources.join(', ') : 'None');
            
            planetInfo.classList.add('visible');
            window.currentPlanet = planet;
        }
        
        function hidePlanetInfo() {
            planetInfo.classList.remove('visible');
        }
        
        function landOnPlanet() {
            if (!window.currentPlanet) return;
            
            loadingOverlay.classList.add('active');
            
            localStorage.setItem('voidfarer_current_planet', window.currentPlanet.name);
            localStorage.setItem('voidfarer_current_planet_type', window.currentPlanet.type);
            localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(window.currentPlanet.resources));
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'surface.html';
            }, 500);
        }
        
        function goBack() {
            window.location.href = 'star-cluster.html';
        }
    </script>
</body>
</html>
