<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .system-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Central Star */
        .star-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
        }
        
        .star {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff5b0, #ffd700);
            box-shadow: 0 0 40px #ffd700;
            animation: pulse 4s infinite alternate;
        }
        
        .star-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 20px;
            white-space: nowrap;
            text-shadow: 0 0 15px #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            font-weight: 500;
        }
        
        /* Planets Container */
        .planets-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(160, 176, 192, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .planet:hover {
            filter: brightness(1.2);
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .planet-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0.5;
        }
        
        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 15px currentColor;
        }
        
        .planet-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 8px black;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            font-weight: 500;
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            text-shadow: 0 0 15px #6a8ac0;
            background: rgba(10,10,26,0.7);
            padding: 8px 22px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid #6a8ac0;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 24px;
            border-radius: 40px 15px 40px 15px;
            font-size: 16px;
            cursor: pointer;
            z-index: 30;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        .system-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 18px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 30;
            font-size: 14px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            display: none;
            min-width: 260px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .planet-info.visible {
            display: block;
        }
        
        .planet-info h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 600;
        }
        
        .planet-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #d0e0ff;
        }
        
        .planet-info .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .planet-info .warning-text {
            color: #ffaa4a;
            font-size: 12px;
            margin: 5px 0;
        }
        
        .planet-info button {
            margin-top: 15px;
            padding: 10px 25px;
            background: #4a8ac0;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.1s;
        }
        
        .planet-info button:hover {
            background: #5a9ad0;
        }
        
        .planet-info button:active {
            transform: scale(0.95);
        }
        
        .planet-info button:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .planet-info button.secondary {
            background: transparent;
            border: 1px solid #6a8ac0;
            margin-left: 10px;
        }
        
        .planet-info button.secondary:active {
            background: rgba(106, 138, 192, 0.3);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 15px #6a8ac0;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0.95; }
        }
        
        /* Planet type colors */
        .planet-lush .planet-core { background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57); }
        .planet-lush .planet-glow { background: rgba(100, 200, 100, 0.4); }
        
        .planet-barren .planet-core { background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a); }
        .planet-barren .planet-glow { background: rgba(160, 140, 120, 0.4); }
        
        .planet-frozen .planet-core { background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4); }
        .planet-frozen .planet-glow { background: rgba(150, 200, 255, 0.4); }
        
        .planet-scorched .planet-core { background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c); }
        .planet-scorched .planet-glow { background: rgba(255, 150, 100, 0.4); }
        
        .planet-gas .planet-core { background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db); }
        .planet-gas .planet-glow { background: rgba(200, 150, 255, 0.4); }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="system-view">
        <!-- Central Star -->
        <div class="star-container">
            <div class="star" id="star"></div>
            <div class="star-label" id="starName">Loading...</div>
        </div>
        
        <!-- Planets Container -->
        <div class="planets-container" id="planetsContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="systemName">Loading System...</div>
        <button class="back-btn" onclick="goBack()">← CLUSTER</button>
        
        <div class="system-info" id="systemInfo">
            <div id="planetCount">-- planets</div>
        </div>
        
        <!-- Planet Info Panel -->
        <div class="planet-info" id="planetInfo">
            <h2 id="planetName"></h2>
            <p id="planetType"></p>
            <p id="planetTemp"></p>
            <p id="planetAtmos"></p>
            <p id="planetGravity"></p>
            <p class="planet-resources" id="planetResources"></p>
            <p class="warning-text" id="planetWarning"></p>
            <div>
                <button id="landBtn" onclick="landOnPlanet()">🚀 LAND</button>
                <button class="secondary" onclick="hidePlanetInfo()">CLOSE</button>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">preparing descent...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        // ===== DOM ELEMENTS =====
        const planetsContainer = document.getElementById('planetsContainer');
        const planetInfo = document.getElementById('planetInfo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // ===== STATE =====
        let starData = null;
        let planets = [];
        let currentPlanet = null;

        // ===== CONSTANTS =====
        const UNIVERSE_SEED = 42793;
        const CARGO_MASS_LIMIT = 1000; // Must match storage.js

        // ===== HASH FUNCTION =====
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        // ===== SEEDED RANDOM =====
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }

        function seededRandomRange(seed, index, min, max) {
            return Math.floor(seededRandom(seed, index) * (max - min + 1)) + min;
        }

        function seededRandomChoice(seed, index, array) {
            const choice = Math.floor(seededRandom(seed, index) * array.length);
            return array[choice];
        }

        // ===== STAR TYPES =====
        const starTypes = [
            { type: 'main', name: 'Main Sequence', prob: 0.60, color: '#ffd700', minPlanets: 3, maxPlanets: 8 },
            { type: 'red', name: 'Red Dwarf', prob: 0.25, color: '#ff6b6b', minPlanets: 2, maxPlanets: 5 },
            { type: 'blue', name: 'Blue Giant', prob: 0.10, color: '#6ba5ff', minPlanets: 5, maxPlanets: 12 },
            { type: 'neutron', name: 'Neutron Star', prob: 0.03, color: '#ffffff', minPlanets: 0, maxPlanets: 0 },
            { type: 'blackhole', name: 'Black Hole', prob: 0.02, color: '#000000', minPlanets: 0, maxPlanets: 0 }
        ];

        function getStarType(seed, index) {
            const rand = seededRandom(seed, index);
            let cumulative = 0;
            
            for (const type of starTypes) {
                cumulative += type.prob;
                if (rand < cumulative) {
                    return { ...type };
                }
            }
            return { ...starTypes[0] };
        }

        // ===== PLANET TYPES =====
        const planetTypes = [
            { type: 'scorched', name: 'Scorched', prob: 0.15, temp: '450°C', atmos: 'Toxic', gravity: '1.2g', landable: true, icon: '🔥' },
            { type: 'barren', name: 'Barren', prob: 0.25, temp: '-50°C', atmos: 'Thin', gravity: '0.8g', landable: true, icon: '🪨' },
            { type: 'lush', name: 'Lush', prob: 0.15, temp: '22°C', atmos: 'Breathable', gravity: '0.9g', landable: true, icon: '🌱' },
            { type: 'frozen', name: 'Frozen', prob: 0.20, temp: '-80°C', atmos: 'Thin', gravity: '0.7g', landable: true, icon: '❄️' },
            { type: 'gas', name: 'Gas Giant', prob: 0.25, temp: '-120°C', atmos: 'Dense', gravity: '2.1g', landable: false, icon: '🌪️' }
        ];

        function getPlanetType(seed, index) {
            const rand = seededRandom(seed, index);
            let cumulative = 0;
            
            for (const type of planetTypes) {
                cumulative += type.prob;
                if (rand < cumulative) {
                    return { ...type };
                }
            }
            return { ...planetTypes[1] };
        }

        // ===== NAME GENERATION =====
        const planetPrefixes = [
            'Verdant', 'Pyros', 'Glacier', 'Aether', 'Ignis', 'Terra', 'Aqua', 'Ventus',
            'Saxum', 'Silva', 'Desertum', 'Lux', 'Umbra', 'Crystal', 'Eden',
            'Nova', 'Prime', 'Secundus', 'Tertius', 'Quartus'
        ];

        function generatePlanetName(seed, index) {
            const prefix = planetPrefixes[Math.floor(seededRandom(seed, index * 5) * planetPrefixes.length)];
            const number = Math.floor(seededRandom(seed, index * 5 + 1) * 12) + 1;
            return prefix + '-' + number;
        }

        // ===== ELEMENT MASS DATABASE =====
        const elementMass = {
            'Hydrogen': 1.008, 'Helium': 4.003, 'Lithium': 6.94, 'Carbon': 12.01,
            'Oxygen': 16.00, 'Iron': 55.85, 'Gold': 197.0, 'Uranium': 238.0,
            'Promethium': 145.0, 'Technetium': 98.0, 'Silver': 107.9, 'Platinum': 195.1,
            'Titanium': 47.87, 'Copper': 63.55, 'Lead': 207.2, 'Nickel': 58.69
        };

        function getElementMass(elementName) {
            return elementMass[elementName] || 100.0;
        }

        // ===== LOAD STAR DATA =====
        async function loadStarData() {
            try {
                // Load star data from storage
                const starName = typeof getCurrentStar === 'function' ? await getCurrentStar() : 'Unknown Star';
                const starType = typeof getCurrentStarType === 'function' ? await getCurrentStarType() : 'Main Sequence';
                const starIndex = typeof getCurrentStarIndex === 'function' ? await getCurrentStarIndex() : 0;

                // Generate star system
                const starSeed = UNIVERSE_SEED + (starName ? hashString(starName) : 0);
                
                // Generate star
                const starTypeObj = getStarType(starSeed, 0);
                starData = {
                    type: starTypeObj.type,
                    typeName: starTypeObj.name,
                    color: starTypeObj.color
                };
                
                // Generate planets
                const planetCount = Math.floor(Math.random() * 6) + 3; // 3-8 planets
                planets = [];
                
                const orbitRadii = [70, 110, 150, 190, 230, 270, 310, 350];
                
                for (let i = 0; i < planetCount; i++) {
                    const planetSeed = starSeed + i * 100;
                    const planetType = getPlanetType(planetSeed, i);
                    
                    // Generate resources
                    const possibleResources = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Silver', 'Platinum', 
                                              'Uranium', 'Titanium', 'Oxygen', 'Hydrogen', 'Helium', 'Copper'];
                    const resourceCount = Math.floor(Math.random() * 3) + 2; // 2-4 resources
                    const resources = [];
                    
                    for (let r = 0; r < resourceCount; r++) {
                        const resource = possibleResources[Math.floor(Math.random() * possibleResources.length)];
                        if (!resources.includes(resource)) {
                            resources.push(resource);
                        }
                    }
                    
                    // Calculate total mass of resources for cargo check
                    let totalMass = 0;
                    resources.forEach(r => {
                        totalMass += getElementMass(r);
                    });
                    
                    planets.push({
                        index: i,
                        name: generatePlanetName(planetSeed, i),
                        type: planetType.type,
                        typeName: planetType.name,
                        icon: planetType.icon,
                        temp: planetType.temp,
                        atmos: planetType.atmos,
                        gravity: planetType.gravity,
                        landable: planetType.landable,
                        resources: resources,
                        resourceMass: totalMass,
                        orbitRadius: orbitRadii[i],
                        orbitSpeed: 0.002 - (i * 0.0002),
                        angle: Math.random() * Math.PI * 2
                    });
                }

                // Update UI
                document.getElementById('starName').textContent = starName || 'Unknown Star';
                document.getElementById('systemName').textContent = (starName || 'Unknown') + ' System';
                document.getElementById('planetCount').textContent = planets.length + ' planets';

                // Set star color
                const starEl = document.getElementById('star');
                const color = starData?.color || '#ffd700';
                starEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
                starEl.style.boxShadow = `0 0 40px ${color}`;

                return true;

            } catch (error) {
                console.error('Error loading star data:', error);
                return false;
            }
        }

        // ===== CHECK CARGO SPACE =====
        async function checkCargoSpace(planet) {
            try {
                let currentMass = 0;
                if (typeof getTotalCargoMass === 'function') {
                    currentMass = await getTotalCargoMass();
                }
                
                const remainingSpace = CARGO_MASS_LIMIT - currentMass;
                const canLand = remainingSpace >= planet.resourceMass * 0.5; // Need at least half the planet's resource mass in space
                
                return {
                    canLand,
                    remainingSpace,
                    requiredSpace: planet.resourceMass * 0.5,
                    warning: remainingSpace < planet.resourceMass * 0.5 ? 
                        '⚠️ Low cargo space. Some resources may be left behind.' : ''
                };
            } catch (error) {
                console.error('Error checking cargo space:', error);
                return { canLand: true, remainingSpace: 1000, requiredSpace: 0, warning: '' };
            }
        }

        // ===== CREATE ORBIT RINGS =====
        function createOrbitRings() {
            planets.forEach(planet => {
                const ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = (planet.orbitRadius * 2) + 'px';
                ring.style.height = (planet.orbitRadius * 2) + 'px';
                planetsContainer.appendChild(ring);
            });
        }

        // ===== CREATE PLANETS =====
        function createPlanets() {
            planets.forEach((planet, index) => {
                const planetEl = document.createElement('div');
                planetEl.className = `planet planet-${planet.type}`;
                planetEl.id = `planet-${index}`;
                planetEl.onclick = () => showPlanetInfo(index);
                
                planetEl.innerHTML = `
                    <div class="planet-glow"></div>
                    <div class="planet-core"></div>
                    <span class="planet-label">${planet.name}</span>
                `;
                
                planetsContainer.appendChild(planetEl);
                
                // Store position for animation
                planet.element = planetEl;
            });
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            planets.forEach(planet => {
                planet.angle += planet.orbitSpeed;
                
                const x = Math.cos(planet.angle) * planet.orbitRadius;
                const y = Math.sin(planet.angle) * planet.orbitRadius * 0.6;
                
                if (planet.element) {
                    planet.element.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                }
            });
            
            requestAnimationFrame(animate);
        }

        // ===== SHOW PLANET INFO =====
        async function showPlanetInfo(index) {
            const planet = planets[index];
            if (!planet) return;
            
            currentPlanet = planet;
            
            // Check cargo space
            const cargoCheck = await checkCargoSpace(planet);
            
            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = 'Type: ' + planet.typeName;
            document.getElementById('planetTemp').textContent = 'Temperature: ' + planet.temp;
            document.getElementById('planetAtmos').textContent = 'Atmosphere: ' + planet.atmos;
            document.getElementById('planetGravity').textContent = 'Gravity: ' + planet.gravity;
            document.getElementById('planetResources').textContent = 'Resources: ' + (planet.resources.length ? planet.resources.join(', ') : 'None');
            document.getElementById('planetWarning').textContent = cargoCheck.warning;
            
            // Enable/disable land button
            const landBtn = document.getElementById('landBtn');
            if (!planet.landable) {
                landBtn.disabled = true;
                landBtn.textContent = '⛔ CANNOT LAND';
            } else if (!cargoCheck.canLand) {
                landBtn.disabled = true;
                landBtn.textContent = '⚠️ CARGO FULL';
            } else {
                landBtn.disabled = false;
                landBtn.textContent = '🚀 LAND';
            }
            
            planetInfo.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HIDE PLANET INFO =====
        function hidePlanetInfo() {
            planetInfo.classList.remove('visible');
            currentPlanet = null;
        }

        // ===== LAND ON PLANET (ONLY WARP HERE!) =====
        async function landOnPlanet() {
            if (!currentPlanet) return;
            
            if (!currentPlanet.landable) {
                alert('Cannot land on gas giant!');
                return;
            }
            
            // Double-check cargo space
            const cargoCheck = await checkCargoSpace(currentPlanet);
            if (!cargoCheck.canLand) {
                alert('Cargo hold full! Cannot land.');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'preparing descent...';
            
            try {
                // Save current planet to storage
                if (typeof setCurrentPlanet === 'function') {
                    await setCurrentPlanet(
                        currentPlanet.name,
                        currentPlanet.type,
                        currentPlanet.resources
                    );
                } else {
                    localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                    localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                    localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources));
                }
                
                // Calculate warp data (short descent)
                const distance = 0.5; // Close approach
                const cycles = 1;
                const fuel = Math.floor(distance * 4) + 5;
                
                // Save warp data - ONLY TIME WE WARP!
                if (typeof setWarpData === 'function') {
                    setWarpData(currentPlanet.name, 'surface.html', cycles, distance, fuel);
                } else {
                    localStorage.setItem('voidfarer_warp_destination', currentPlanet.name);
                    localStorage.setItem('voidfarer_warp_return', 'surface.html');
                    localStorage.setItem('voidfarer_warp_cycles', cycles);
                    localStorage.setItem('voidfarer_warp_distance', distance);
                    localStorage.setItem('voidfarer_warp_fuel', fuel);
                }
                
                // Navigate to warp screen
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error landing:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to land. Please try again.');
            }
        }

        // ===== GO BACK =====
        function goBack() {
            window.location.href = 'star-cluster.html';
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star system...';

                // Check for player data
                const credits = typeof getCredits === 'function' ? await getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                // Load star data
                await loadStarData();

                // Create orbit rings
                createOrbitRings();

                // Create planets
                createPlanets();

                // Start animation
                animate();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/warp-calculator.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
