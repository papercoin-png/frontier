<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 30px #4a8a9a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* ===== SYSTEM VIEW ===== */
        .system-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Nebula background */
        .system-nebula {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 80, 160, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(60, 100, 140, 0.2) 0%, transparent 50%);
            filter: blur(40px);
            animation: drift-slow 120s infinite alternate;
            z-index: 1;
        }
        
        @keyframes drift-slow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -5%); }
        }
        
        /* Central Star */
        .central-star {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            z-index: 10;
            animation: star-pulse 8s infinite alternate;
        }
        
        .star-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            filter: blur(15px);
            opacity: 0.8;
        }
        
        @keyframes star-pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
        }
        
        /* Star label */
        .star-label {
            position: absolute;
            top: calc(50% + 70px);
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 20px currentColor;
            white-space: nowrap;
            z-index: 6;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 5px 20px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid #a0b0c0;
        }
        
        /* Star type indicator */
        .star-type {
            position: absolute;
            top: calc(50% + 110px);
            left: 50%;
            transform: translateX(-50%);
            color: #a0b0c0;
            font-size: 12px;
            z-index: 6;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 3px 15px;
            border-radius: 20px;
            border: 1px solid #a0b0c0;
        }
        
        /* Container for orbiting bodies */
        .orbit-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
        }
        
        /* Individual planet/moon container */
        .orbital-body {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            z-index: 30;
            transition: transform 0.1s linear;
        }
        
        /* Planet/moon visual */
        .body-visual {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.3s;
            z-index: 35;
        }
        
        .body-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(5px);
            animation: body-pulse 8s infinite alternate;
        }
        
        .body-dot {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 20px currentColor;
            transition: all 0.2s;
        }
        
        .body-label {
            position: absolute;
            left: 25px;
            top: -10px;
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 10px #a0b0c0;
            opacity: 0.7;
            transition: opacity 0.2s;
            pointer-events: none;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 2px 8px;
            border-radius: 20px 5px 20px 5px;
            border: 1px solid #a0b0c0;
        }
        
        .body-visual:hover .body-label {
            opacity: 1;
        }
        
        .body-visual.selected .body-dot {
            transform: scale(1.3);
            box-shadow: 0 0 40px currentColor, 0 0 60px #ffffff;
        }
        
        .body-visual.selected .body-label {
            opacity: 1;
            font-size: 13px;
            color: #ffffff;
        }
        
        @keyframes body-pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(1.1); }
        }
        
        /* Planet type styles */
        .planet-lush .body-glow {
            background: radial-gradient(circle at center, rgba(100, 200, 100, 0.4), transparent 80%);
            width: 40px;
            height: 40px;
            top: -20px;
            left: -20px;
        }
        .planet-lush .body-dot {
            background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57);
            width: 12px;
            height: 12px;
            top: -6px;
            left: -6px;
        }
        
        .planet-barren .body-glow {
            background: radial-gradient(circle at center, rgba(160, 140, 120, 0.4), transparent 80%);
            width: 30px;
            height: 30px;
            top: -15px;
            left: -15px;
        }
        .planet-barren .body-dot {
            background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a);
            width: 10px;
            height: 10px;
            top: -5px;
            left: -5px;
        }
        
        .planet-frozen .body-glow {
            background: radial-gradient(circle at center, rgba(150, 200, 255, 0.4), transparent 80%);
            width: 35px;
            height: 35px;
            top: -17px;
            left: -17px;
        }
        .planet-frozen .body-dot {
            background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4);
            width: 11px;
            height: 11px;
            top: -5.5px;
            left: -5.5px;
        }
        
        .planet-scorched .body-glow {
            background: radial-gradient(circle at center, rgba(255, 150, 100, 0.4), transparent 80%);
            width: 38px;
            height: 38px;
            top: -19px;
            left: -19px;
        }
        .planet-scorched .body-dot {
            background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c);
            width: 12px;
            height: 12px;
            top: -6px;
            left: -6px;
        }
        
        .planet-gas .body-glow {
            background: radial-gradient(circle at center, rgba(200, 150, 255, 0.4), transparent 80%);
            width: 45px;
            height: 45px;
            top: -22px;
            left: -22px;
        }
        .planet-gas .body-dot {
            background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db);
            width: 14px;
            height: 14px;
            top: -7px;
            left: -7px;
        }
        
        .moon .body-glow {
            width: 20px !important;
            height: 20px !important;
            top: -10px !important;
            left: -10px !important;
        }
        .moon .body-dot {
            width: 6px !important;
            height: 6px !important;
            top: -3px !important;
            left: -3px !important;
        }
        
        /* Info Panel */
        .planet-info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid #a0b0c0;
            border-radius: 40% 20% 40% 20%;
            padding: 20px;
            z-index: 100;
            text-align: center;
            color: #d0e0f0;
            display: none;
        }
        
        .planet-info-panel.visible {
            display: block;
            animation: panel-appear 0.3s ease;
        }
        
        @keyframes panel-appear {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        
        .planet-info-name {
            font-family: 'WindSong', cursive;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px currentColor;
        }
        
        .planet-info-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .planet-info-item {
            background: rgba(10, 10, 26, 0.5);
            border-radius: 30% 20% 30% 20%;
            padding: 8px;
        }
        
        .info-item-label {
            font-size: 10px;
            color: #a0b0c0;
            letter-spacing: 1px;
        }
        
        .info-item-value {
            font-size: 14px;
            font-weight: 700;
        }
        
        .planet-description {
            font-size: 12px;
            color: #b0c0d0;
            margin: 15px 0;
            font-style: italic;
            padding: 0 10px;
        }
        
        .planet-info-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .planet-info-btn {
            flex: 1;
            background: rgba(10, 10, 26, 0.7);
            border: 1.5px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 0;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .planet-info-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.95);
        }
        
        .planet-info-btn.primary {
            background: rgba(160, 176, 192, 0.3);
            border-color: #d0e0f0;
        }
        
        .planet-info-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Back button */
        .back-button {
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid #a0b0c0;
            color: #d0e0f0;
            padding: 8px 16px;
            border-radius: 40% 20% 40% 20%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .back-button:active {
            background: #a0b0c0;
            color: #0a0a1a;
        }
        
        /* System name */
        .system-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d0e0f0;
            font-family: 'WindSong', cursive;
            font-size: 22px;
            text-shadow: 0 0 20px #a0b0c0;
            white-space: nowrap;
            z-index: 50;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(5px);
            padding: 5px 20px;
            border-radius: 40% 20% 40% 20%;
            border: 1px solid #a0b0c080;
        }
        
        /* System coordinates */
        .system-coords {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #a0b0c0;
            font-size: 10px;
            z-index: 50;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(5px);
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid #a0b0c0;
            font-family: monospace;
        }
        
        /* Stars background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
            animation: twinkle 8s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="app">
            <!-- System View -->
            <div class="system-view" id="systemView">
                <!-- Stars background -->
                <div class="stars" id="stars"></div>
                
                <!-- Nebula background -->
                <div class="system-nebula" id="systemNebula"></div>
                
                <!-- System name -->
                <div class="system-name" id="systemName">Verdant System</div>
                <div class="system-coords" id="systemCoords">Sector B2 • Orion Nebula</div>
                
                <!-- Back button -->
                <button class="back-button" onclick="goBackToSector()">← SECTOR</button>
                
                <!-- Central Star -->
                <div class="central-star" id="centralStar">
                    <div class="star-core"></div>
                </div>
                <div class="star-label" id="starLabel">Sol</div>
                <div class="star-type" id="starType">G-type Main Sequence</div>
                
                <!-- Container for orbiting bodies -->
                <div class="orbit-container" id="orbitContainer"></div>
                
                <!-- Info Panel -->
                <div class="planet-info-panel" id="planetInfoPanel">
                    <div class="planet-info-name" id="planetInfoName">Verdant Prime</div>
                    <div class="planet-info-details" id="planetInfoDetails">
                        <div class="planet-info-item">
                            <div class="info-item-label">TYPE</div>
                            <div class="info-item-value" id="planetInfoType">Lush</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">TEMP</div>
                            <div class="info-item-value" id="planetInfoTemp">22°C</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">ATMOS</div>
                            <div class="info-item-value" id="planetInfoAtmos">Breathable</div>
                        </div>
                        <div class="planet-info-item">
                            <div class="info-item-label">GRAVITY</div>
                            <div class="info-item-value" id="planetInfoGravity">0.9g</div>
                        </div>
                    </div>
                    <div class="planet-description" id="planetDescription">
                        A lush, green world with abundant flora and breathable atmosphere.
                    </div>
                    <div class="planet-info-buttons">
                        <button class="planet-info-btn" onclick="closeInfo()">BACK</button>
                        <button class="planet-info-btn primary" id="travelButton" onclick="travelToPlanet()">🚀 LAND</button>
                    </div>
                </div>
                
                <!-- Loading Overlay -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-text">warping...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a0a1a');
            tg.setBackgroundColor('#0a0a1a');
        }
        
        // ===== CONSTANTS =====
        const UNIVERSE_SEED = 42793;
        
        // ===== LOAD SELECTED STAR =====
        const starName = localStorage.getItem('voidfarer_current_star') || 'Sol';
        const starIndex = parseInt(localStorage.getItem('voidfarer_current_star_index')) || 7;
        const starType = localStorage.getItem('voidfarer_current_star_type') || 'main';
        const currentSector = localStorage.getItem('voidfarer_current_galaxy_sector') || 'B2';
        const currentNebula = localStorage.getItem('voidfarer_current_nebula') || 'Orion Nebula';
        
        // Update UI with star info
        document.getElementById('starLabel').textContent = starName;
        document.getElementById('systemName').textContent = starName + ' System';
        document.getElementById('systemCoords').textContent = `Sector ${currentSector} • ${currentNebula}`;
        
        // Set star type text
        const starTypeMap = {
            'main': 'G-type Main Sequence',
            'red': 'M-type Red Dwarf',
            'blue': 'B-type Blue Giant',
            'neutron': 'Neutron Star'
        };
        document.getElementById('starType').textContent = starTypeMap[starType] || 'Main Sequence';
        
        // Set star color based on type
        const starElement = document.getElementById('centralStar');
        const starColors = {
            'main': 'radial-gradient(circle at 30% 30%, #fff5b0, #ffd700)',
            'red': 'radial-gradient(circle at 30% 30%, #ffb6b6, #ff6b6b)',
            'blue': 'radial-gradient(circle at 30% 30%, #b0e0ff, #6ba5ff)',
            'neutron': 'radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0)'
        };
        starElement.style.background = starColors[starType] || starColors.main;
        
        // Set star glow
        const starGlowColors = {
            'main': '#ffd700',
            'red': '#ff6b6b',
            'blue': '#6ba5ff',
            'neutron': '#ffffff'
        };
        starElement.style.boxShadow = `0 0 60px ${starGlowColors[starType]}, 0 0 120px ${starGlowColors[starType]}`;
        
        // ===== SEEDED RANDOM FUNCTION =====
        function seededRandom(seed, index) {
            const x = Math.sin(seed * (index + 1)) * 10000;
            return x - Math.floor(x);
        }
        
        // ===== GENERATE PLANETS =====
        function generatePlanets() {
            // Create seed for this star system
            const systemSeed = UNIVERSE_SEED + 
                              (currentSector.charCodeAt(0) * 100000) + 
                              (parseInt(currentSector[1]) * 10000) +
                              currentNebula.length * 1000 +
                              starIndex * 100;
            
            // Determine planet count based on star type
            let planetCount = 0;
            if (starType === 'main') planetCount = Math.floor(seededRandom(systemSeed, 1) * 6) + 3; // 3-8
            else if (starType === 'red') planetCount = Math.floor(seededRandom(systemSeed, 2) * 4) + 2; // 2-5
            else if (starType === 'blue') planetCount = Math.floor(seededRandom(systemSeed, 3) * 8) + 5; // 5-12
            else if (starType === 'neutron') planetCount = 0; // No planets
            
            const planets = [];
            
            // Planet type probabilities
            const planetTypes = [
                { type: 'scorched', prob: 0.15, temp: '450°C', atmos: 'Toxic', gravity: '1.2g' },
                { type: 'barren', prob: 0.25, temp: '-50°C', atmos: 'Thin', gravity: '0.8g' },
                { type: 'lush', prob: 0.15, temp: '22°C', atmos: 'Breathable', gravity: '0.9g' },
                { type: 'frozen', prob: 0.2, temp: '-80°C', atmos: 'Thin', gravity: '0.7g' },
                { type: 'gas', prob: 0.25, temp: '-120°C', atmos: 'Dense', gravity: '2.1g' }
            ];
            
            // Generate planet names
            const prefixes = ['Verdant', 'Pyros', 'Glacier', 'Aether', 'Ignis', 'Terra', 'Aqua', 'Ventus', 
                             'Saxum', 'Silva', 'Desertum', 'Lux', 'Umbra', 'Crystal', 'Feral', 'Eden'];
            
            for (let i = 0; i < planetCount; i++) {
                // Determine planet type
                const typeRand = seededRandom(systemSeed, i * 10 + 5);
                let cumulative = 0;
                let planetType = planetTypes[0];
                
                for (const pt of planetTypes) {
                    cumulative += pt.prob;
                    if (typeRand < cumulative) {
                        planetType = pt;
                        break;
                    }
                }
                
                // Generate moon count
                const moonCount = planetType.type === 'gas' ? 
                    Math.floor(seededRandom(systemSeed, i * 10 + 6) * 8) + 3 : // 3-10 moons for gas giants
                    Math.floor(seededRandom(systemSeed, i * 10 + 7) * 3); // 0-2 moons for others
                
                // Generate planet name
                const prefixIndex = Math.floor(seededRandom(systemSeed, i * 10 + 8) * prefixes.length);
                const name = prefixes[prefixIndex] + '-' + (i + 1);
                
                // Generate resources
                const resourceCount = Math.floor(seededRandom(systemSeed, i * 10 + 9) * 4) + 2; // 2-5 resources
                const resources = [];
                const possibleResources = ['Carbon', 'Iron', 'Silicon', 'Gold', 'Silver', 'Uranium', 'Platinum', 'Promethium'];
                
                for (let r = 0; r < resourceCount; r++) {
                    const resIndex = Math.floor(seededRandom(systemSeed, i * 100 + r * 10) * possibleResources.length);
                    resources.push(possibleResources[resIndex]);
                }
                
                planets.push({
                    id: `planet-${i}`,
                    name: name,
                    type: planetType.type,
                    temp: planetType.temp,
                    atmos: planetType.atmos,
                    gravity: planetType.gravity,
                    orbitRadius: 80 + i * 25, // Increasing distance from star
                    orbitSpeed: 0.0008 - (i * 0.0001), // Slower for outer planets
                    startAngle: i * 1.5,
                    landable: planetType.type !== 'gas',
                    resources: [...new Set(resources)], // Remove duplicates
                    description: `A ${planetType.type} world orbiting ${starName}. ${resources.slice(0, 3).join(', ')} present.`,
                    moons: moonCount
                });
            }
            
            return planets;
        }
        
        // ===== RENDER SYSTEM =====
        const orbitContainer = document.getElementById('orbitContainer');
        const planets = generatePlanets();
        const bodyElements = new Map();
        
        function createPlanet(planet, index) {
            const container = document.createElement('div');
            container.className = 'orbital-body';
            container.style.left = '50%';
            container.style.top = '50%';
            
            // Create visual element
            const visual = document.createElement('div');
            visual.className = `body-visual planet-${planet.type}`;
            visual.id = planet.id;
            visual.setAttribute('onclick', `selectPlanet('${planet.id}')`);
            
            // Add moon indicator if planet has moons
            const moonIndicator = planet.moons > 0 ? ' ✦' : '';
            
            visual.innerHTML = `
                <div class="body-glow"></div>
                <div class="body-dot"></div>
                <span class="body-label">${planet.name}${moonIndicator}</span>
            `;
            
            container.appendChild(visual);
            orbitContainer.appendChild(container);
            
            bodyElements.set(planet.id, {
                element: container,
                visual: visual,
                planet: planet,
                angle: planet.startAngle || 0
            });
            
            // Generate moons as separate orbiting bodies
            for (let m = 0; m < planet.moons; m++) {
                createMoon(planet, m, index);
            }
        }
        
        function createMoon(planet, moonIndex, planetIndex) {
            const container = document.createElement('div');
            container.className = 'orbital-body';
            container.style.left = '50%';
            container.style.top = '50%';
            
            const visual = document.createElement('div');
            visual.className = 'body-visual planet-barren moon';
            visual.id = `moon-${planet.id}-${moonIndex}`;
            
            visual.innerHTML = `
                <div class="body-glow"></div>
                <div class="body-dot"></div>
                <span class="body-label">${planet.name}-${String.fromCharCode(97 + moonIndex)}</span>
            `;
            
            container.appendChild(visual);
            orbitContainer.appendChild(container);
            
            bodyElements.set(`moon-${planet.id}-${moonIndex}`, {
                element: container,
                visual: visual,
                planet: {
                    name: `${planet.name}-${String.fromCharCode(97 + moonIndex)}`,
                    type: 'barren',
                    temp: '-50°C',
                    atmos: 'None',
                    gravity: '0.2g',
                    landable: true
                },
                parentPlanet: planet,
                moonIndex: moonIndex,
                angle: moonIndex * 2,
                orbitRadius: 15 + moonIndex * 5
            });
        }
        
        // Generate all planets
        planets.forEach((planet, index) => createPlanet(planet, index));
        
        // Animation loop
        function animateOrbits() {
            bodyElements.forEach((data, id) => {
                if (data.planet.orbitRadius) {
                    // Planet orbiting star
                    data.angle += data.planet.orbitSpeed || 0.0005;
                    
                    const x = data.planet.orbitRadius * Math.cos(data.angle);
                    const y = data.planet.orbitRadius * Math.sin(data.angle) * 0.6; // Flatten for perspective
                    
                    data.element.style.transform = `translate(${x}px, ${y}px)`;
                    data.x = x;
                    data.y = y;
                } else {
                    // Moon orbiting planet
                    data.angle += 0.002;
                    
                    const parent = bodyElements.get(data.parentPlanet.id);
                    if (parent) {
                        const x = parent.x + data.orbitRadius * Math.cos(data.angle);
                        const y = parent.y + data.orbitRadius * Math.sin(data.angle) * 0.6;
                        
                        data.element.style.transform = `translate(${x}px, ${y}px)`;
                    }
                }
            });
            
            requestAnimationFrame(animateOrbits);
        }
        
        animateOrbits();
        
        // ===== SELECTION HANDLING =====
        let currentPlanet = null;
        const infoPanel = document.getElementById('planetInfoPanel');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function selectPlanet(planetId) {
            document.querySelectorAll('.body-visual').forEach(el => {
                el.classList.remove('selected');
            });
            
            const visual = document.getElementById(planetId);
            if (visual) {
                visual.classList.add('selected');
            }
            
            const planetData = bodyElements.get(planetId)?.planet;
            if (!planetData) return;
            
            currentPlanet = planetData;
            
            document.getElementById('planetInfoName').textContent = planetData.name;
            document.getElementById('planetInfoType').textContent = 
                planetData.type.charAt(0).toUpperCase() + planetData.type.slice(1);
            document.getElementById('planetInfoTemp').textContent = planetData.temp;
            document.getElementById('planetInfoAtmos').textContent = planetData.atmos;
            document.getElementById('planetInfoGravity').textContent = planetData.gravity;
            document.getElementById('planetDescription').textContent = planetData.description;
            
            const travelBtn = document.getElementById('travelButton');
            if (planetData.landable) {
                travelBtn.textContent = '🚀 LAND';
                travelBtn.classList.remove('disabled');
            } else {
                travelBtn.textContent = '⛔ CANNOT LAND';
                travelBtn.classList.add('disabled');
            }
            
            infoPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function closeInfo() {
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.body-visual').forEach(el => {
                el.classList.remove('selected');
            });
            currentPlanet = null;
        }
        
        function travelToPlanet() {
            if (!currentPlanet) return;
            
            if (!currentPlanet.landable) {
                alert(`Cannot land on gas giant ${currentPlanet.name}`);
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                
                localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources));
                
                window.location.href = 'surface.html';
                
                closeInfo();
            }, 1500);
        }
        
        function goBackToSector() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'nebula-sector.html';
        }
        
        // Generate stars background
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Initialize
        function init() {
            const player = localStorage.getItem('voidfarer_player');
            if (!player) {
                window.location.href = 'index.html';
                return;
            }
            
            generateStars();
        }
        
        init();
    </script>
</body>
</html>
