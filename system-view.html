<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - System View</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .system-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }
        
        /* Central Star */
        .star-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
        }
        
        .star {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff5b0, #ffd700);
            box-shadow: 0 0 40px #ffd700;
            animation: pulse 4s infinite alternate;
        }
        
        .star-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 20px;
            white-space: nowrap;
            text-shadow: 0 0 15px #ffd700;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            font-weight: 500;
        }
        
        /* Planets Container */
        .planets-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(160, 176, 192, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease-in-out;
        }
        
        .planet:hover {
            filter: brightness(1.2);
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .planet-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0.5;
            transition: all 0.5s ease-in-out;
        }
        
        .planet-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 15px currentColor;
            transition: all 0.5s ease-in-out;
        }
        
        .planet-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 12px;
            white-space: nowrap;
            text-shadow: 0 0 8px black;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            font-weight: 500;
            transition: all 0.5s ease-in-out;
        }
        
        /* ===== PLANET STATUS STYLES ===== */
        /* Unexplored */
        .planet-unexplored {
            filter: grayscale(1) brightness(0.5);
            opacity: 0.8;
        }
        
        .planet-unexplored .planet-core {
            background: #555555 !important;
            box-shadow: none !important;
        }
        
        .planet-unexplored .planet-glow {
            display: none;
        }
        
        .planet-unexplored .planet-label {
            background: rgba(30, 30, 30, 0.8);
            border-color: #777777;
            color: #cccccc;
        }
        
        .planet-unexplored .planet-label::after {
            content: "???";
            margin-left: 5px;
            font-size: 10px;
            color: #aaaaaa;
            font-style: italic;
        }
        
        /* Common */
        .planet-common .planet-core {
            background: radial-gradient(circle at 30% 30%, #ffffff, #e0e0e0) !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3) !important;
        }
        
        .planet-common .planet-glow {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Uncommon */
        .planet-uncommon .planet-core {
            background: radial-gradient(circle at 30% 30%, #b0ffb0, #80d080) !important;
            box-shadow: 0 0 20px rgba(176, 255, 176, 0.3) !important;
        }
        
        .planet-uncommon .planet-glow {
            background: rgba(176, 255, 176, 0.2);
        }
        
        /* Rare */
        .planet-rare .planet-core {
            background: radial-gradient(circle at 30% 30%, #b0b0ff, #8080d0) !important;
            box-shadow: 0 0 20px rgba(176, 176, 255, 0.3) !important;
        }
        
        .planet-rare .planet-glow {
            background: rgba(176, 176, 255, 0.2);
        }
        
        /* Very Rare */
        .planet-very-rare .planet-core {
            background: radial-gradient(circle at 30% 30%, #e0b0ff, #b080d0) !important;
            box-shadow: 0 0 20px rgba(224, 176, 255, 0.3) !important;
        }
        
        .planet-very-rare .planet-glow {
            background: rgba(224, 176, 255, 0.2);
        }
        
        /* Legendary */
        .planet-legendary .planet-core {
            background: radial-gradient(circle at 30% 30%, #ffd700, #d4af37) !important;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4) !important;
        }
        
        .planet-legendary .planet-glow {
            background: rgba(255, 215, 0, 0.3);
        }
        
        /* Complete (all resources found) - SHARED WITH CLAIMED */
        .planet-complete {
            position: relative;
        }
        
        .planet-complete .planet-core {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6) !important;
        }
        
        .planet-complete::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.2) 0%, transparent 70%);
            animation: gentle-glow 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }
        
        /* Claimed planets keep the same golden glow as complete planets */
        .planet-claimed {
            position: relative;
        }
        
        .planet-claimed .planet-core {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6) !important;
        }
        
        .planet-claimed::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.2) 0%, transparent 70%);
            animation: gentle-glow 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 5;
        }
        
        @keyframes gentle-glow {
            0% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.05);
            }
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
        }
        
        /* UI Elements */
        .ui-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            text-shadow: 0 0 15px #6a8ac0;
            background: rgba(10,10,26,0.7);
            padding: 8px 22px;
            border-radius: 40px 15px 40px 15px;
            border: 2px solid #6a8ac0;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 24px;
            border-radius: 40px 15px 40px 15px;
            font-size: 16px;
            cursor: pointer;
            z-index: 30;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        .back-btn:active {
            background: rgba(106, 138, 192, 0.3);
            transform: scale(0.96);
        }
        
        .system-info {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #6a8ac0;
            color: white;
            padding: 12px 18px;
            border-radius: 30px 10px 30px 10px;
            text-align: center;
            z-index: 30;
            font-size: 14px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 500;
        }
        
        /* Journey Total Display */
        .journey-total {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa4a;
            color: white;
            padding: 10px 18px;
            border-radius: 40px 10px 40px 10px;
            z-index: 35;
            display: none;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(255, 170, 74, 0.3);
        }
        
        .journey-total.visible {
            display: block;
        }
        
        .journey-total-label {
            color: #a0c0ff;
            margin-right: 5px;
        }
        
        .journey-total-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        /* Planet Info Panel */
        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #ffaa4a;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            display: none;
            min-width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 170, 74, 0.3);
        }
        
        .planet-info.visible {
            display: block;
        }
        
        .planet-info h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 600;
        }
        
        .planet-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #d0e0ff;
        }
        
        .planet-info .planet-resources {
            color: #ffd966;
            font-weight: 600;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 20px;
        }
        
        .planet-info .resource-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin: 5px 0;
        }
        
        .resource-badge {
            background: rgba(74, 138, 192, 0.3);
            border: 1px solid #4a8ac0;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            color: #ffd966;
        }
        
        .planet-info .exploration-status {
            margin: 10px 0;
            padding: 8px;
            border-radius: 20px;
            font-size: 13px;
            background: rgba(0,0,0,0.2);
        }
        
        .planet-info .claim-btn {
            width: 100%;
            background: #ffd700;
            border: none;
            color: #0a0a1a;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 10px;
            display: none;
        }
        
        .planet-info .claim-btn.visible {
            display: block;
        }
        
        .planet-info .claim-btn:active {
            transform: scale(0.96);
            background: #ffaa4a;
        }
        
        .planet-info .claim-btn:disabled {
            background: #2a4a6a;
            color: #a0c0ff;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .distance-calculator {
            background: rgba(0,0,0,0.3);
            border-radius: 30px 8px 30px 8px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #4a8ac0;
        }
        
        .distance-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .distance-label {
            color: #a0c0ff;
        }
        
        .distance-value {
            color: #4affaa;
            font-weight: 600;
        }
        
        .total-distance {
            font-size: 18px;
            border-top: 1px solid #4a8ac0;
            padding-top: 10px;
            margin-top: 10px;
        }
        
        .total-distance .distance-value {
            color: #ffd966;
            font-size: 20px;
        }
        
        .warp-estimate {
            background: rgba(74, 138, 192, 0.2);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .warp-cycles {
            color: #ffaa4a;
            font-size: 24px;
            font-weight: 700;
        }
        
        .cumulative-info {
            background: rgba(255, 170, 74, 0.15);
            border-radius: 30px 8px 30px 8px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ffaa4a;
            display: none;
        }
        
        .cumulative-info.visible {
            display: block;
        }
        
        .cumulative-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .cumulative-label {
            color: #a0c0ff;
        }
        
        .cumulative-value {
            color: #ffaa4a;
            font-weight: 600;
        }
        
        .total-journey {
            background: rgba(74, 255, 170, 0.15);
            border-radius: 30px 8px 30px 8px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #4affaa;
            display: none;
        }
        
        .total-journey.visible {
            display: block;
        }
        
        .total-journey-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 16px;
        }
        
        .total-journey-label {
            color: white;
            font-weight: 600;
        }
        
        .total-journey-value {
            color: #4affaa;
            font-weight: 700;
            font-size: 20px;
        }
        
        .planet-info .warning-text {
            color: #ffaa4a;
            font-size: 12px;
            margin: 5px 0;
        }
        
        .planet-info .action-btn {
            width: 100%;
            background: #4affaa;
            border: none;
            color: #0a0a1a;
            padding: 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px #4affaa;
        }
        
        .planet-info .action-btn.primary {
            background: #ffaa4a;
            box-shadow: 0 0 20px #ffaa4a;
        }
        
        .planet-info .action-btn:active {
            transform: scale(0.96);
            background: #6affcc;
        }
        
        .planet-info .action-btn.primary:active {
            background: #ffcc6a;
        }
        
        .planet-info .action-btn:disabled {
            background: #2a4a6a;
            color: #a0c0ff;
            box-shadow: none;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .planet-info .close-btn {
            background: transparent;
            border: 1px solid #6a8ac0;
            color: white;
            padding: 10px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            margin-top: 10px;
        }
        
        .planet-info .close-btn:active {
            background: rgba(106, 138, 192, 0.3);
        }
        
        /* Location badge */
        .location-badge {
            position: absolute;
            top: 100px;
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #4affaa;
            border-radius: 30px 8px 30px 8px;
            padding: 6px 12px;
            color: #4affaa;
            font-size: 12px;
            font-family: 'Exo 2', sans-serif;
            z-index: 25;
        }
        
        /* Planet type colors (base styles) */
        .planet-scorched .planet-core { background: radial-gradient(circle at 30% 30%, #ffb090, #cd5c5c); }
        .planet-scorched .planet-glow { background: rgba(255, 150, 100, 0.4); }
        
        .planet-barren .planet-core { background: radial-gradient(circle at 30% 30%, #c0b0a0, #8b6b4a); }
        .planet-barren .planet-glow { background: rgba(160, 140, 120, 0.4); }
        
        .planet-lush .planet-core { background: radial-gradient(circle at 30% 30%, #a0ffa0, #2e8b57); }
        .planet-lush .planet-glow { background: rgba(100, 200, 100, 0.4); }
        
        .planet-frozen .planet-core { background: radial-gradient(circle at 30% 30%, #d0f0ff, #4682b4); }
        .planet-frozen .planet-glow { background: rgba(150, 200, 255, 0.4); }
        
        .planet-gas .planet-core { background: radial-gradient(circle at 30% 30%, #e0c0ff, #9370db); }
        .planet-gas .planet-glow { background: rgba(200, 150, 255, 0.4); }
        
        .planet-oceanic .planet-core { background: radial-gradient(circle at 30% 30%, #4aa0ff, #1a4a8a); }
        .planet-oceanic .planet-glow { background: rgba(74, 160, 255, 0.4); }
        
        .planet-toxic .planet-core { background: radial-gradient(circle at 30% 30%, #b0ff4a, #5a8a1a); }
        .planet-toxic .planet-glow { background: rgba(176, 255, 74, 0.4); }
        
        .planet-asteroid .planet-core { background: radial-gradient(circle at 30% 30%, #c0c0c0, #6a6a6a); }
        .planet-asteroid .planet-glow { background: rgba(192, 192, 192, 0.4); }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #6a8ac0;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #ffffff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 15px #6a8ac0;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.05); opacity: 0.95; }
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="system-view">
        <!-- Central Star -->
        <div class="star-container">
            <div class="star" id="star"></div>
            <div class="star-label" id="starName">Loading...</div>
        </div>
        
        <!-- Planets Container -->
        <div class="planets-container" id="planetsContainer"></div>
        
        <!-- UI Elements -->
        <div class="ui-header" id="systemName">Loading System...</div>
        <button class="back-btn" onclick="window.goBack()">← STAR CLUSTER</button>
        
        <div class="system-info" id="systemInfo">
            <div id="planetCount">-- planets</div>
        </div>
        
        <!-- Location Badge -->
        <div class="location-badge" id="locationBadge">
            <span id="currentSector">Orion Arm</span>
        </div>
        
        <!-- Journey Total Display (for plot mode) -->
        <div class="journey-total" id="journeyTotal">
            <span class="journey-total-label">Previous legs:</span>
            <span class="journey-total-value" id="previousLegsTotal">0.0 LY</span>
        </div>
        
        <!-- Planet Info Panel -->
        <div class="planet-info" id="planetInfo">
            <h2 id="planetName"></h2>
            <p id="planetType"></p>
            <p id="planetTemp"></p>
            <p id="planetAtmos"></p>
            <p id="planetGravity"></p>
            
            <!-- Exploration Status -->
            <div class="exploration-status" id="explorationStatus"></div>
            
            <div class="planet-resources" id="planetResources">
                <div>Resources:</div>
                <div class="resource-list" id="resourceList"></div>
            </div>
            
            <!-- Distance Calculator -->
            <div class="distance-calculator">
                <div class="distance-row">
                    <span class="distance-label">From current location:</span>
                    <span class="distance-value" id="distanceFromCurrent">0.0 LY</span>
                </div>
                <div class="distance-row">
                    <span class="distance-label">Orbital descent:</span>
                    <span class="distance-value" id="descentDistance">0.5 LY</span>
                </div>
                <div class="distance-row total-distance">
                    <span class="distance-label">THIS LEG:</span>
                    <span class="distance-value" id="legDistance">0.0 LY</span>
                </div>
            </div>
            
            <!-- Cumulative Info (for plot mode) -->
            <div class="cumulative-info" id="cumulativeInfo">
                <div class="cumulative-row">
                    <span class="cumulative-label">Previous legs (sector + star sector + star):</span>
                    <span class="cumulative-value" id="previousDistance">0.0 LY</span>
                </div>
            </div>
            
            <!-- Total Journey (for plot mode) -->
            <div class="total-journey" id="totalJourney">
                <div class="total-journey-row">
                    <span class="total-journey-label">TOTAL JOURNEY:</span>
                    <span class="total-journey-value" id="totalDistance">0.0 LY</span>
                </div>
                <div class="total-journey-row">
                    <span class="total-journey-label">Warp cycles:</span>
                    <span class="total-journey-value" id="totalCycles">0</span>
                </div>
                <div class="total-journey-row">
                    <span class="total-journey-label">Fuel cost:</span>
                    <span class="total-journey-value" id="totalFuel">0⭐</span>
                </div>
            </div>
            
            <p class="warning-text" id="planetWarning"></p>
            
            <!-- Dynamic Action Button -->
            <button class="action-btn" id="actionBtn" onclick="window.handlePlanetAction()">🚀 SET COURSE</button>
            <button class="close-btn" onclick="window.hidePlanetInfo()">CLOSE</button>
        </div>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">plotting course...</div>
        </div>

        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <!-- CRITICAL: All scripts loaded as modules -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/warp-calculator.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/planet-utils.js"></script>
    <script type="module" src="js/planet-names.js"></script>
    <script type="module" src="js/planet-status.js"></script>

    <script type="module">
        import { PLANET_TYPE_DATA } from './js/planet-utils.js';
        import { generatePlanetName } from './js/planet-names.js';
        import { 
            getPlanetStatus, 
            isPlanetReadyToClaim, 
            claimPlanet,
            getPlanetCssClass,
            getPlanetLabel
        } from './js/planet-status.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        // ===== DOM ELEMENTS =====
        const planetsContainer = document.getElementById('planetsContainer');
        const planetInfo = document.getElementById('planetInfo');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const locationBadge = document.getElementById('currentSector');
        const journeyTotalEl = document.getElementById('journeyTotal');
        const previousLegsTotalEl = document.getElementById('previousLegsTotal');
        const cumulativeInfoEl = document.getElementById('cumulativeInfo');
        const previousDistanceEl = document.getElementById('previousDistance');
        const totalJourneyEl = document.getElementById('totalJourney');
        const totalDistanceEl = document.getElementById('totalDistance');
        const totalCyclesEl = document.getElementById('totalCycles');
        const totalFuelEl = document.getElementById('totalFuel');
        const resourceList = document.getElementById('resourceList');
        const explorationStatus = document.getElementById('explorationStatus');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.goBack = goBack;
        window.handlePlanetAction = handlePlanetAction;
        window.hidePlanetInfo = hidePlanetInfo;

        // ===== STATE =====
        let systemData = null;
        let planets = [];
        let currentPlanet = null;
        let currentSector = 'B2';
        let currentRegion = 'Orion Arm';
        let currentStarName = '';
        let planetStatusCache = new Map(); // Cache planet statuses

        // ===== CONSTANTS =====
        const ORBITAL_DESCENT = 0.5;

        // ===== CHECK FOR PLOT MODE =====
        const urlParams = new URLSearchParams(window.location.search);
        const isPlotMode = urlParams.get('mode') === 'plot';
        
        // ===== PLOT MODE DATA =====
        let plotData = {
            fromSector: null,
            fromRegion: null,
            fromStarSector: null,
            fromStar: null,
            fromPlanet: null,
            destSector: null,
            destRegion: null,
            destStarSector: null,
            destStar: null,
            sectorDistance: 0,
            starSectorDistance: 0,
            starDistance: 0,
            cumulativeBeforePlanet: 0
        };

        // ===== REFRESH PLANET DISPLAY AFTER CLAIM =====
        async function refreshPlanetDisplay() {
            console.log('Refreshing planet display after claim...');
            
            // Clear the cache
            planetStatusCache.clear();
            
            // Reload statuses for all planets
            await loadPlanetStatuses();
            
            // Update the visual appearance of all planets
            planets.forEach((planet, index) => {
                const planetEl = document.getElementById(`planet-${index}`);
                if (planetEl) {
                    const status = planetStatusCache.get(planet.name);
                    let cssClass = 'planet-unexplored';
                    
                    if (status) {
                        if (status.claimed) {
                            cssClass = `planet-${status.highestRarity || 'common'} planet-claimed`;
                        } else if (status.fullyExplored) {
                            cssClass = `planet-${status.highestRarity || 'common'} planet-complete`;
                        } else if (status.explored) {
                            cssClass = `planet-${status.highestRarity || 'common'}`;
                        }
                    }
                    
                    planetEl.className = `planet planet-${planet.type} ${cssClass}`;
                    
                    // Update label
                    const labelEl = planetEl.querySelector('.planet-label');
                    if (labelEl) {
                        const label = status ? getPlanetLabel(planet.name, status) : `${planet.name} ???`;
                        labelEl.textContent = label;
                    }
                }
            });
            
            // If planet info panel is currently showing a claimed planet, update it
            if (currentPlanet) {
                const status = planetStatusCache.get(currentPlanet.name);
                if (status && status.claimed) {
                    // Update the exploration status text
                    explorationStatus.textContent = '✅ Claimed';
                }
            }
        }

        // ===== WARP CALCULATION FUNCTIONS =====
        function getWarpCyclesFromDistance(distance) {
            if (distance <= 1.0) return 1;
            if (distance <= 2.5) return 2;
            if (distance <= 4.5) return 3;
            if (distance <= 7.0) return 4;
            return 5;
        }

        function getFuelCostFromDistance(distance) {
            return Math.floor(distance * 4) + 5;
        }

        // ===== LOAD PLOT DATA =====
        function loadPlotData() {
            // Get all cumulative data from localStorage
            const cumulative = parseFloat(localStorage.getItem('voidfarer_plot_cumulative_distance') || '0');
            
            plotData = {
                fromSector: localStorage.getItem('voidfarer_plot_from_sector'),
                fromRegion: localStorage.getItem('voidfarer_plot_from_region'),
                fromStarSector: localStorage.getItem('voidfarer_plot_from_nebula'),
                fromStar: localStorage.getItem('voidfarer_plot_from_star'),
                fromPlanet: localStorage.getItem('voidfarer_plot_from_planet'),
                
                destSector: localStorage.getItem('voidfarer_plot_sector'),
                destRegion: localStorage.getItem('voidfarer_plot_region'),
                destStarSector: localStorage.getItem('voidfarer_plot_nebula'),
                destStar: localStorage.getItem('voidfarer_plot_star'),
                
                sectorDistance: parseFloat(localStorage.getItem('voidfarer_plot_sector_distance') || '0'),
                starSectorDistance: parseFloat(localStorage.getItem('voidfarer_plot_nebula_distance') || '0'),
                starDistance: parseFloat(localStorage.getItem('voidfarer_plot_star_distance') || '0'),
                cumulativeBeforePlanet: cumulative
            };
            
            // Show total so far
            if (plotData.cumulativeBeforePlanet > 0) {
                journeyTotalEl.classList.add('visible');
                previousLegsTotalEl.textContent = plotData.cumulativeBeforePlanet.toFixed(1) + ' LY';
            }
            
            console.log('Plot data loaded:', plotData);
        }

        // ===== LOAD CURRENT LOCATION =====
        async function loadCurrentLocation() {
            try {
                if (typeof window.getCurrentSector === 'function') {
                    currentSector = await window.getCurrentSector() || 'B2';
                } else {
                    currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
                }
                
                if (typeof window.getCurrentRegion === 'function') {
                    currentRegion = await window.getCurrentRegion() || 'Orion Arm';
                } else {
                    currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion Arm';
                }
                
                locationBadge.textContent = currentRegion;
                
            } catch (error) {
                console.error('Error loading current location:', error);
                currentSector = 'B2';
                currentRegion = 'Orion Arm';
                locationBadge.textContent = 'Orion Arm';
            }
        }

        // ===== LOAD SYSTEM DATA =====
        async function loadSystemData() {
            try {
                // Try to load pre-generated system data from localStorage
                const savedSystemData = localStorage.getItem('voidfarer_system_data');
                
                if (savedSystemData) {
                    systemData = JSON.parse(savedSystemData);
                    
                    // Extract data
                    const star = systemData.star;
                    planets = systemData.planets || [];
                    currentStarName = star.name;
                    
                    console.log('Loaded pre-generated system:', {
                        star: star.name,
                        planetCount: planets.length,
                        samplePlanet: planets[0]
                    });
                    
                    // Update UI
                    document.getElementById('starName').textContent = star.name;
                    document.getElementById('systemName').textContent = star.name + ' System';
                    document.getElementById('planetCount').textContent = planets.length + ' planets';
                    
                    // Style the star
                    const starEl = document.getElementById('star');
                    const color = star.color || '#ffd700';
                    starEl.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
                    starEl.style.boxShadow = `0 0 40px ${color}`;
                    
                    // Load planet statuses
                    await loadPlanetStatuses();
                    
                    return true;
                } else {
                    console.error('No system data found in localStorage');
                    // Fallback: generate a simple system
                    return generateFallbackSystem();
                }
            } catch (error) {
                console.error('Error loading system data:', error);
                return generateFallbackSystem();
            }
        }

        // ===== LOAD PLANET STATUSES =====
        async function loadPlanetStatuses() {
            for (const planet of planets) {
                try {
                    const status = await getPlanetStatus(planet.name);
                    planetStatusCache.set(planet.name, status);
                } catch (error) {
                    console.error(`Error loading status for ${planet.name}:`, error);
                }
            }
        }

        // ===== GENERATE FALLBACK SYSTEM (if no data) =====
        function generateFallbackSystem() {
            console.warn('Generating fallback system');
            
            currentStarName = 'Unknown Star';
            planets = [];
            
            // Generate 3-6 random planets
            const planetCount = Math.floor(Math.random() * 4) + 3;
            const planetTypes = ['scorched', 'barren', 'lush', 'frozen', 'gas', 'oceanic', 'toxic', 'asteroid'];
            
            for (let i = 0; i < planetCount; i++) {
                const type = planetTypes[Math.floor(Math.random() * planetTypes.length)];
                const planetData = PLANET_TYPE_DATA[type];
                
                planets.push({
                    index: i,
                    name: `Planet-${i + 1}`,
                    type: type,
                    typeName: planetData.name,
                    icon: planetData.icon,
                    color: planetData.color,
                    temp: planetData.temp,
                    atmos: planetData.atmos,
                    gravity: planetData.gravity,
                    landable: type !== 'gas',
                    description: planetData.description,
                    resources: ['Iron', 'Carbon', 'Silicon'].slice(0, Math.floor(Math.random() * 3) + 1),
                    distanceFromStar: 0.5 + (i * 0.8),
                    orbitRadius: 70 + i * 40,
                    orbitSpeed: 0.002 - (i * 0.0002)
                });
            }
            
            document.getElementById('starName').textContent = currentStarName;
            document.getElementById('systemName').textContent = 'Unknown System';
            document.getElementById('planetCount').textContent = planets.length + ' planets';
            
            return true;
        }

        // ===== CREATE ORBIT RINGS =====
        function createOrbitRings() {
            planets.forEach(planet => {
                const ring = document.createElement('div');
                ring.className = 'orbit-ring';
                ring.style.width = (planet.orbitRadius * 2) + 'px';
                ring.style.height = (planet.orbitRadius * 2) + 'px';
                planetsContainer.appendChild(ring);
            });
        }

        // ===== CREATE PLANETS =====
        function createPlanets() {
            planets.forEach((planet, index) => {
                const planetEl = document.createElement('div');
                
                // Get planet status and determine CSS class
                const status = planetStatusCache.get(planet.name);
                let cssClass = 'planet-unexplored';
                
                if (status) {
                    if (status.claimed) {
                        // Claimed planets keep their color + golden glow
                        cssClass = `planet-${status.highestRarity || 'common'} planet-claimed`;
                    } else if (status.fullyExplored) {
                        cssClass = `planet-${status.highestRarity || 'common'} planet-complete`;
                    } else if (status.explored) {
                        cssClass = `planet-${status.highestRarity || 'common'}`;
                    }
                }
                
                planetEl.className = `planet planet-${planet.type} ${cssClass}`;
                planetEl.id = `planet-${index}`;
                planetEl.onclick = () => showPlanetInfo(index);
                
                // Get label (with ??? if unexplored)
                const label = status ? getPlanetLabel(planet.name, status) : `${planet.name} ???`;
                
                planetEl.innerHTML = `
                    <div class="planet-glow"></div>
                    <div class="planet-core"></div>
                    <span class="planet-label">${label}</span>
                `;
                
                planetsContainer.appendChild(planetEl);
                planet.element = planetEl;
            });
        }

        // ===== ANIMATION LOOP =====
        function animate() {
            planets.forEach(planet => {
                if (!planet.angle) planet.angle = Math.random() * Math.PI * 2;
                planet.angle += planet.orbitSpeed || 0.001;
                
                const x = Math.cos(planet.angle) * planet.orbitRadius;
                const y = Math.sin(planet.angle) * planet.orbitRadius * 0.6;
                
                if (planet.element) {
                    planet.element.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                }
            });
            
            requestAnimationFrame(animate);
        }

        // ===== SHOW PLANET INFO =====
        async function showPlanetInfo(index) {
            const planet = planets[index];
            if (!planet) return;
            
            currentPlanet = planet;
            
            // Get latest planet status
            const status = await getPlanetStatus(planet.name);
            planetStatusCache.set(planet.name, status);
            
            // Update planet visual if needed (in case status changed)
            const planetEl = document.getElementById(`planet-${index}`);
            if (planetEl) {
                let cssClass = 'planet-unexplored';
                
                if (status) {
                    if (status.claimed) {
                        cssClass = `planet-${status.highestRarity || 'common'} planet-claimed`;
                    } else if (status.fullyExplored) {
                        cssClass = `planet-${status.highestRarity || 'common'} planet-complete`;
                    } else if (status.explored) {
                        cssClass = `planet-${status.highestRarity || 'common'}`;
                    }
                }
                
                planetEl.className = `planet planet-${planet.type} ${cssClass}`;
                
                const label = status ? getPlanetLabel(planet.name, status) : `${planet.name} ???`;
                const labelEl = planetEl.querySelector('.planet-label');
                if (labelEl) labelEl.textContent = label;
            }
            
            // Calculate this leg distance (star to planet + descent)
            const legDistance = planet.distanceFromStar + ORBITAL_DESCENT;
            
            // Update basic planet info
            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = 'Type: ' + planet.typeName;
            document.getElementById('planetTemp').textContent = 'Temperature: ' + planet.temp;
            document.getElementById('planetAtmos').textContent = 'Atmosphere: ' + planet.atmos;
            document.getElementById('planetGravity').textContent = 'Gravity: ' + planet.gravity;
            
            // Update exploration status
            if (status) {
                let statusText = '';
                if (!status.explored) {
                    statusText = '✨ Unexplored';
                } else {
                    statusText = `🔍 Explored (${status.resourceCount}/${status.totalResources} resources)`;
                    if (status.fullyExplored) {
                        statusText = status.claimed ? '✅ Claimed' : '✅ Fully Explored - Ready to Claim';
                    }
                }
                explorationStatus.textContent = statusText;
            } else {
                explorationStatus.textContent = '✨ Unexplored';
            }
            
            // Update resources
            const resourceList = document.getElementById('resourceList');
            resourceList.innerHTML = '';
            
            if (planet.resources && planet.resources.length > 0) {
                planet.resources.forEach(resource => {
                    const badge = document.createElement('span');
                    badge.className = 'resource-badge';
                    badge.textContent = resource;
                    resourceList.appendChild(badge);
                });
            } else {
                resourceList.innerHTML = '<span style="color: #a0c0ff;">No resources detected</span>';
            }
            
            // Update distance display
            document.getElementById('distanceFromCurrent').textContent = planet.distanceFromStar.toFixed(1) + ' LY';
            document.getElementById('descentDistance').textContent = ORBITAL_DESCENT.toFixed(1) + ' LY';
            document.getElementById('legDistance').textContent = legDistance.toFixed(1) + ' LY';
            
            // Handle plot mode vs normal mode
            if (isPlotMode && plotData.cumulativeBeforePlanet > 0) {
                // Calculate total journey
                const totalDistance = plotData.cumulativeBeforePlanet + legDistance;
                const totalCycles = getWarpCyclesFromDistance(totalDistance);
                const totalFuel = getFuelCostFromDistance(totalDistance);
                
                // Update cumulative info
                cumulativeInfoEl.classList.add('visible');
                previousDistanceEl.textContent = plotData.cumulativeBeforePlanet.toFixed(1) + ' LY';
                
                // Update total journey
                totalJourneyEl.classList.add('visible');
                totalDistanceEl.textContent = totalDistance.toFixed(1) + ' LY';
                totalCyclesEl.textContent = totalCycles;
                totalFuelEl.textContent = totalFuel + '⭐';
                
                // Update action button
                const actionBtn = document.getElementById('actionBtn');
                actionBtn.classList.add('primary');
                actionBtn.textContent = '🚀 COMPLETE JOURNEY TO ' + planet.name;
            } else {
                // Hide plot mode sections
                cumulativeInfoEl.classList.remove('visible');
                totalJourneyEl.classList.remove('visible');
                
                // Normal mode button
                const actionBtn = document.getElementById('actionBtn');
                actionBtn.classList.remove('primary');
                actionBtn.textContent = '🚀 SET COURSE TO ' + planet.name;
            }
            
            // Disable button if planet is not landable
            if (!planet.landable) {
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('actionBtn').textContent = '⛔ CANNOT LAND';
                document.getElementById('planetWarning').textContent = 'Gas giants cannot be landed on';
            } else {
                document.getElementById('actionBtn').disabled = false;
                document.getElementById('planetWarning').textContent = '';
            }
            
            planetInfo.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== HIDE PLANET INFO =====
        function hidePlanetInfo() {
            planetInfo.classList.remove('visible');
            currentPlanet = null;
        }

        // ===== HANDLE PLANET ACTION =====
        function handlePlanetAction() {
            if (!currentPlanet) return;
            
            if (isPlotMode && plotData.cumulativeBeforePlanet > 0) {
                completeJourney();
            } else {
                setCourseToPlanet();
            }
        }

        // ===== SET COURSE TO PLANET (normal mode) =====
        async function setCourseToPlanet() {
            if (!currentPlanet || !currentPlanet.landable) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'plotting course...';
            
            try {
                const legDistance = currentPlanet.distanceFromStar + ORBITAL_DESCENT;
                const warpCycles = getWarpCyclesFromDistance(legDistance);
                const fuelCost = getFuelCostFromDistance(legDistance);
                
                // Save planet data to localStorage
                localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources || []));
                
                // Save star and sector data
                localStorage.setItem('voidfarer_current_star', currentStarName);
                localStorage.setItem('voidfarer_current_sector', currentSector);
                localStorage.setItem('voidfarer_current_region', currentRegion);
                localStorage.setItem('voidfarer_current_starSector', systemData?.clusterName || 'Unknown');
                
                console.log('Saved planet data:', {
                    planet: currentPlanet.name,
                    type: currentPlanet.type,
                    resources: currentPlanet.resources
                });
                
                // Prepare warp data
                const warpData = {
                    destination: currentPlanet.name,
                    destinationType: currentPlanet.type,
                    startLocation: currentStarName + ' System',
                    startLocationType: 'star system',
                    totalDistance: legDistance,
                    warpCycles: warpCycles,
                    fuelCost: fuelCost,
                    returnPage: 'surface.html',
                    destPlanet: currentPlanet.name,
                    destPlanetType: currentPlanet.type,
                    destPlanetResources: currentPlanet.resources || [],
                    destStar: currentStarName,
                    destStarSector: systemData?.clusterName || 'Unknown',
                    destSector: currentSector,
                    destRegion: currentRegion
                };
                
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                // DO NOT clear system data - we want to keep it for returning to system view
                // localStorage.removeItem('voidfarer_system_data');
                
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error plotting course:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to plot course. Please try again.');
            }
        }

        // ===== COMPLETE JOURNEY (plot mode) =====
        async function completeJourney() {
            if (!currentPlanet || !currentPlanet.landable) return;
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'calculating total journey...';
            
            try {
                // Calculate this leg (star to planet + descent)
                const planetLeg = currentPlanet.distanceFromStar + ORBITAL_DESCENT;
                
                // Get all distances
                const sectorDist = plotData.sectorDistance;
                const starSectorDist = plotData.starSectorDistance;
                const starDist = plotData.starDistance;
                
                // Calculate total journey
                const totalDistance = plotData.cumulativeBeforePlanet + planetLeg;
                const totalCycles = getWarpCyclesFromDistance(totalDistance);
                const totalFuel = getFuelCostFromDistance(totalDistance);
                
                console.log('COMPLETE JOURNEY CALCULATION:');
                console.log(`  Sector: ${sectorDist.toFixed(1)} LY`);
                console.log(`  Star Sector: ${starSectorDist.toFixed(1)} LY`);
                console.log(`  Star: ${starDist.toFixed(1)} LY`);
                console.log(`  Planet: ${planetLeg.toFixed(1)} LY`);
                console.log(`  TOTAL: ${totalDistance.toFixed(1)} LY`);
                console.log(`  Cycles: ${totalCycles}, Fuel: ${totalFuel}⭐`);
                
                // Save planet data
                localStorage.setItem('voidfarer_current_planet', currentPlanet.name);
                localStorage.setItem('voidfarer_current_planet_type', currentPlanet.type);
                localStorage.setItem('voidfarer_current_planet_resources', JSON.stringify(currentPlanet.resources || []));
                
                // Prepare warp data for complete journey
                const warpData = {
                    destination: currentPlanet.name,
                    destinationType: currentPlanet.type,
                    startLocation: plotData.fromPlanet || 'Unknown',
                    startLocationType: 'planet',
                    totalDistance: totalDistance,
                    warpCycles: totalCycles,
                    fuelCost: totalFuel,
                    returnPage: 'surface.html',
                    
                    // Store all destination info
                    destSector: plotData.destSector,
                    destRegion: plotData.destRegion,
                    destStarSector: plotData.destStarSector,
                    destStar: plotData.destStar,
                    destPlanet: currentPlanet.name,
                    destPlanetType: currentPlanet.type,
                    destPlanetResources: currentPlanet.resources || [],
                    
                    // Store leg distances for display
                    sectorDistance: sectorDist,
                    starSectorDistance: starSectorDist,
                    starDistance: starDist,
                    planetDescent: planetLeg
                };
                
                // Save and go to warp
                localStorage.setItem('voidfarer_warp_data', JSON.stringify(warpData));
                
                // Clear all plot data
                const plotKeys = [
                    'voidfarer_plot_from_sector', 'voidfarer_plot_from_region', 'voidfarer_plot_from_nebula',
                    'voidfarer_plot_from_star', 'voidfarer_plot_from_planet', 'voidfarer_plot_sector',
                    'voidfarer_plot_region', 'voidfarer_plot_nebula', 'voidfarer_plot_nebula_type',
                    'voidfarer_plot_nebula_distance', 'voidfarer_plot_nebula_stars', 'voidfarer_plot_star',
                    'voidfarer_plot_star_distance', 'voidfarer_plot_sector_distance', 'voidfarer_plot_cumulative_distance'
                ];
                plotKeys.forEach(key => localStorage.removeItem(key));
                
                // DO NOT clear system data
                // localStorage.removeItem('voidfarer_system_data');
                
                // GO TO WARP!
                setTimeout(() => {
                    window.location.href = 'warp.html';
                }, 500);
                
            } catch (error) {
                console.error('Error completing journey:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to complete journey. Please try again.');
            }
        }

        // ===== GO BACK =====
        function goBack() {
            if (isPlotMode) {
                window.location.href = 'star-cluster.html?mode=plot';
            } else {
                window.location.href = 'star-cluster.html';
            }
        }

        // ===== SETUP EVENT LISTENERS =====
        window.addEventListener('planet-claimed', async (event) => {
            console.log('Planet claimed event received:', event.detail);
            await refreshPlanetDisplay();
            
            // Also update the claim button in the info panel if it's open
            if (currentPlanet && currentPlanet.name === event.detail.planetName) {
                const claimBtn = document.querySelector('.planet-info .claim-btn');
                if (claimBtn) {
                    claimBtn.classList.remove('visible');
                }
            }
        });

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading star system...';

                const credits = typeof window.getCredits === 'function' ? await window.getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }

                await loadCurrentLocation();
                const loaded = await loadSystemData();
                
                if (!loaded) {
                    throw new Error('Failed to load system data');
                }
                
                if (isPlotMode) {
                    loadPlotData();
                }

                createOrbitRings();
                createPlanets();
                animate();

                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
