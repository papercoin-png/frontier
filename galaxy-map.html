<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Galaxy Map</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .galaxy-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-overlay {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: clamp(20px, 7vw, 28px);
            text-shadow: 0 0 30px #8a6aff, 0 0 60px #4a2a8a;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 10;
            white-space: nowrap;
            max-width: 90%;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(20px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 20px;
            border-radius: 60px 20px 60px 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 10;
            min-width: 120px;
            text-align: center;
        }
        
        .back-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .info-panel {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(20px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 16px;
            border-radius: 40px 10px 40px 10px;
            font-size: 13px;
            z-index: 10;
            text-align: center;
            min-width: 130px;
            max-width: 200px;
        }
        
        .info-title {
            font-family: 'WindSong', cursive;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Region boxes for clickable areas */
        .region-box {
            position: absolute;
            border: 2px solid rgba(160, 176, 192, 0.5);
            border-radius: 30% 15% 30% 15%;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.3), inset 0 0 20px rgba(160, 176, 192, 0.1);
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-glow 3s infinite alternate;
        }
        
        .region-box:hover {
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        
        .region-box:active {
            transform: scale(0.98);
            border-color: #ffffff;
        }
        
        .region-box::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            border-radius: 35% 20% 35% 20%;
            pointer-events: none;
        }
        
        .region-label {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: clamp(14px, 4vw, 18px);
            text-shadow: 0 0 20px #ffffff, 0 0 40px #8a6aff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid rgba(255,255,255,0.5);
            white-space: nowrap;
            pointer-events: none;
        }
        
        .region-count {
            position: absolute;
            bottom: -8px;
            right: -8px;
            background: #ffaa4a;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 0 15px #ffaa4a;
        }
        
        @keyframes pulse-glow {
            0% { border-color: rgba(160, 176, 192, 0.5); box-shadow: 0 0 15px rgba(160, 176, 192, 0.2); }
            100% { border-color: rgba(200, 216, 255, 0.8); box-shadow: 0 0 30px rgba(160, 176, 192, 0.5); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #8a6aff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 20px;
            text-shadow: 0 0 20px #8a6aff;
            text-align: center;
            padding: 0 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Safe area adjustments */
        @supports (padding: max(0px)) {
            .ui-overlay {
                top: max(20px, env(safe-area-inset-top));
            }
            .back-btn {
                bottom: max(20px, env(safe-area-inset-bottom));
                left: max(20px, env(safe-area-inset-left));
            }
            .info-panel {
                bottom: max(20px, env(safe-area-inset-bottom));
                right: max(20px, env(safe-area-inset-right));
            }
        }
        
        /* Mobile adjustments */
        @media (max-width: 480px) {
            .region-label {
                font-size: 14px;
                padding: 4px 10px;
            }
            .region-count {
                font-size: 10px;
                min-width: 20px;
                height: 20px;
            }
            .back-btn {
                padding: 10px 16px;
                font-size: 13px;
                min-width: 100px;
            }
            .info-panel {
                padding: 10px 12px;
                min-width: 110px;
                font-size: 12px;
            }
            .info-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="galaxy-container">
        <div class="ui-overlay">✦ MILKY WAY ✦</div>
        <button class="back-btn" onclick="window.location.href='ship-bridge.html'">← SHIP</button>
        
        <!-- Clickable region boxes -->
        <div class="region-box" id="regionOrion" style="left: 35%; top: 40%; width: 130px; height: 90px;" onclick="zoomToRegion('Orion')">
            <span class="region-label">Orion Arm</span>
            <span class="region-count">410</span>
        </div>
        
        <div class="region-box" id="regionCygnus" style="left: 60%; top: 30%; width: 120px; height: 80px;" onclick="zoomToRegion('Cygnus')">
            <span class="region-label">Cygnus Arm</span>
            <span class="region-count">380</span>
        </div>
        
        <div class="region-box" id="regionSagittarius" style="left: 45%; top: 60%; width: 140px; height: 100px;" onclick="zoomToRegion('Sagittarius')">
            <span class="region-label">Sagittarius</span>
            <span class="region-count">395</span>
        </div>
        
        <div class="region-box" id="regionPerseus" style="left: 65%; top: 55%; width: 130px; height: 90px;" onclick="zoomToRegion('Perseus')">
            <span class="region-label">Perseus Arm</span>
            <span class="region-count">450</span>
        </div>
        
        <div class="region-box" id="regionCarina" style="left: 30%; top: 65%; width: 110px; height: 80px;" onclick="zoomToRegion('Carina')">
            <span class="region-label">Carina Arm</span>
            <span class="region-count">340</span>
        </div>
        
        <div class="region-box" id="regionOuter" style="left: 70%; top: 70%; width: 120px; height: 80px;" onclick="zoomToRegion('Outer')">
            <span class="region-label">Outer Arm</span>
            <span class="region-count">280</span>
        </div>
        
        <div class="region-box" id="regionCore" style="left: 50%; top: 50%; width: 160px; height: 120px;" onclick="zoomToRegion('Core')">
            <span class="region-label">Galactic Core</span>
            <span class="region-count">850</span>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <div class="info-title">Milky Way</div>
            <div>3,105 star systems</div>
            <div style="font-size:10px; margin-top:5px;">tap a region</div>
        </div>
        
        <canvas id="galaxyCanvas"></canvas>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">warping to sector...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // Region data for info panel
        const regionData = {
            'Orion': { name: 'Orion Arm', systems: 410 },
            'Cygnus': { name: 'Cygnus Arm', systems: 380 },
            'Sagittarius': { name: 'Sagittarius Arm', systems: 395 },
            'Perseus': { name: 'Perseus Arm', systems: 450 },
            'Carina': { name: 'Carina Arm', systems: 340 },
            'Outer': { name: 'Outer Arm', systems: 280 },
            'Core': { name: 'Galactic Core', systems: 850 }
        };
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGalaxy();
        }
        
        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // === 1. BACKGROUND STARFIELD ===
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.5;
                const opacity = Math.random() * 0.2 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 2. GALACTIC CORE ===
            const coreGlow = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.3
            );
            coreGlow.addColorStop(0, 'rgba(255, 240, 200, 0.15)');
            coreGlow.addColorStop(0.3, 'rgba(200, 180, 220, 0.1)');
            coreGlow.addColorStop(0.6, 'rgba(100, 80, 150, 0.05)');
            coreGlow.addColorStop(1, 'transparent');
            
            ctx.fillStyle = coreGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dense stars in core
            for (let i = 0; i < 4000; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.pow(Math.random(), 1.2) * canvas.width * 0.25;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                
                const brightness = Math.random() * 0.8 + 0.2;
                const size = Math.random() * 2 + 0.5;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.8})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 3. SPIRAL ARMS ===
            const armCount = 4;
            
            for (let arm = 0; arm < armCount; arm++) {
                const armOffset = (arm / armCount) * Math.PI * 2;
                
                for (let s = 0; s < 1500; s++) {
                    const distance = 80 + Math.pow(Math.random(), 1.3) * canvas.width * 0.4;
                    const spiralAngle = armOffset + distance * 0.018;
                    
                    const randomAngle = (Math.random() - 0.5) * 0.4;
                    const randomDist = (Math.random() - 0.5) * 20;
                    
                    const angle = spiralAngle + randomAngle;
                    const finalDist = distance + randomDist;
                    
                    const x = centerX + Math.cos(angle) * finalDist;
                    const y = centerY + Math.sin(angle) * finalDist;
                    
                    if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                        const brightness = Math.random() * 0.5 + 0.2;
                        const size = Math.random() * 2 + 0.5;
                        
                        ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // === 4. NEBULAE ===
            const nebulae = [
                { angle: 30, dist: 0.3, size: 50 },
                { angle: 120, dist: 0.35, size: 60 },
                { angle: 210, dist: 0.25, size: 45 },
                { angle: 300, dist: 0.4, size: 65 },
                { angle: 80, dist: 0.3, size: 50 },
                { angle: 200, dist: 0.45, size: 40 }
            ];
            
            nebulae.forEach(neb => {
                const angleRad = neb.angle * Math.PI / 180;
                const dist = neb.dist * canvas.width * 0.4;
                const x = centerX + Math.cos(angleRad) * dist;
                const y = centerY + Math.sin(angleRad) * dist;
                
                const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, neb.size * 2);
                glowGradient.addColorStop(0, 'rgba(150, 150, 180, 0.15)');
                glowGradient.addColorStop(0.5, 'rgba(100, 100, 130, 0.05)');
                glowGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(x, y, neb.size * 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Zoom to star sectors
        function zoomToRegion(region) {
            loadingOverlay.classList.add('active');
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            
            // Save region data
            localStorage.setItem('voidfarer_current_region', region);
            localStorage.setItem('voidfarer_current_galaxy_sector', region);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                // Navigate to star sectors map
                window.location.href = 'star-sectors.html';
            }, 1200);
        }
        
        // Update info panel on hover
        document.querySelectorAll('.region-box').forEach(box => {
            box.addEventListener('mouseenter', (e) => {
                const label = box.querySelector('.region-label').textContent;
                const count = box.querySelector('.region-count').textContent;
                document.getElementById('infoPanel').innerHTML = `
                    <div class="info-title">${label}</div>
                    <div>${count} star systems</div>
                    <div style="font-size:10px; margin-top:5px;">tap to explore</div>
                `;
            });
            
            box.addEventListener('touchstart', (e) => {
                const label = box.querySelector('.region-label').textContent;
                const count = box.querySelector('.region-count').textContent;
                document.getElementById('infoPanel').innerHTML = `
                    <div class="info-title">${label}</div>
                    <div>${count} star systems</div>
                    <div style="font-size:10px; margin-top:5px;">tap to explore</div>
                `;
            });
        });
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
