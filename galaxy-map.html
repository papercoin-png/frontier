<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Galaxy Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .galaxy-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none; /* Prevents pinch zoom */
        }
        
        .ui-overlay {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: clamp(18px, 5vw, 24px);
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 40px 15px 40px 15px;
            border: 1px solid #a0b0c0;
            z-index: 10;
            white-space: nowrap;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(15px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #a0b0c0;
            color: #d0e0f0;
            padding: 10px 18px;
            border-radius: 40px 15px 40px 15px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 10;
            min-width: 90px;
            text-align: center;
        }
        
        .back-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .info-panel {
            position: absolute;
            bottom: max(15px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #a0b0c0;
            color: #d0e0f0;
            padding: 10px 14px;
            border-radius: 30px 10px 30px 10px;
            font-size: 12px;
            z-index: 10;
            text-align: center;
            min-width: 110px;
        }
        
        .info-title {
            font-family: 'WindSong', cursive;
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 2px;
        }
        
        /* Smaller, more subtle boxes for clickable regions */
        .region-box {
            position: absolute;
            border: 1px solid rgba(160, 176, 192, 0.4);
            border-radius: 20% 10% 20% 10%;
            box-shadow: 0 0 15px rgba(160, 176, 192, 0.2);
            backdrop-filter: blur(1px);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        .region-box:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .region-box:active {
            transform: scale(0.97);
            border-color: #ffffff;
        }
        
        .region-label {
            color: rgba(255, 255, 255, 0.9);
            font-family: 'WindSong', cursive;
            font-size: clamp(11px, 3vw, 14px);
            text-shadow: 0 0 10px #ffffff;
            background: rgba(10,10,26,0.2);
            backdrop-filter: blur(2px);
            padding: 3px 8px;
            border-radius: 30px 8px 30px 8px;
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            pointer-events: none;
        }
        
        .region-count {
            position: absolute;
            bottom: -6px;
            right: -6px;
            background: #8a6aff;
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid white;
            box-shadow: 0 0 10px #8a6aff;
            opacity: 0.8;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 15px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 2px solid #8a6aff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 16px;
            text-shadow: 0 0 15px #8a6aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile adjustments */
        @media (max-width: 480px) {
            .region-label {
                font-size: 11px;
                padding: 2px 6px;
            }
            
            .region-count {
                font-size: 8px;
                min-width: 16px;
                height: 16px;
            }
            
            .back-btn {
                padding: 8px 14px;
                font-size: 12px;
                min-width: 80px;
            }
            
            .info-panel {
                padding: 8px 12px;
                min-width: 100px;
                font-size: 11px;
            }
            
            .info-title {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="galaxy-container">
        <div class="ui-overlay">✦ MILKY WAY ✦</div>
        <button class="back-btn" onclick="window.location.href='ship-bridge.html'">← SHIP</button>
        
        <!-- Smaller, more subtle boxes -->
        <div class="region-box" id="regionOrion" style="left: 35%; top: 40%; width: 90px; height: 60px;" onclick="zoomToRegion('Orion')">
            <span class="region-label">Orion</span>
            <span class="region-count">300</span>
        </div>
        
        <div class="region-box" id="regionCygnus" style="left: 60%; top: 30%; width: 85px; height: 55px;" onclick="zoomToRegion('Cygnus')">
            <span class="region-label">Cygnus</span>
            <span class="region-count">350</span>
        </div>
        
        <div class="region-box" id="regionSagittarius" style="left: 45%; top: 60%; width: 95px; height: 65px;" onclick="zoomToRegion('Sagittarius')">
            <span class="region-label">Sagittarius</span>
            <span class="region-count">280</span>
        </div>
        
        <div class="region-box" id="regionPerseus" style="left: 65%; top: 55%; width: 90px; height: 60px;" onclick="zoomToRegion('Perseus')">
            <span class="region-label">Perseus</span>
            <span class="region-count">400</span>
        </div>
        
        <div class="region-box" id="regionCarina" style="left: 30%; top: 65%; width: 80px; height: 55px;" onclick="zoomToRegion('Carina')">
            <span class="region-label">Carina</span>
            <span class="region-count">320</span>
        </div>
        
        <div class="region-box" id="regionOuter" style="left: 70%; top: 70%; width: 85px; height: 55px;" onclick="zoomToRegion('Outer')">
            <span class="region-label">Outer</span>
            <span class="region-count">250</span>
        </div>
        
        <div class="region-box" id="regionCore" style="left: 50%; top: 50%; width: 110px; height: 80px;" onclick="zoomToRegion('Core')">
            <span class="region-label">Core</span>
            <span class="region-count">500</span>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <div class="info-title">Milky Way</div>
            <div>2,400 systems</div>
            <div style="font-size:9px; margin-top:4px;">tap region</div>
        </div>
        
        <canvas id="galaxyCanvas"></canvas>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">warping...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGalaxy();
        }
        
        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // === 1. VERY SUBTLE BACKGROUND STARFIELD ===
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.2;
                const opacity = Math.random() * 0.1 + 0.02; // Much dimmer
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 2. GALACTIC CORE (very subtle) ===
            // Core glow - very faint
            const coreGlow = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.25
            );
            coreGlow.addColorStop(0, 'rgba(200, 180, 150, 0.08)');
            coreGlow.addColorStop(0.4, 'rgba(100, 80, 120, 0.04)');
            coreGlow.addColorStop(1, 'transparent');
            
            ctx.fillStyle = coreGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Sparse stars in core (much dimmer)
            for (let i = 0; i < 1500; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.pow(Math.random(), 1.3) * canvas.width * 0.22;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                
                const brightness = Math.random() * 0.2 + 0.1; // Dimmer
                const size = Math.random() * 1.5 + 0.3;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 3. SPIRAL ARMS (very subtle) ===
            const armCount = 4;
            
            for (let arm = 0; arm < armCount; arm++) {
                const armOffset = (arm / armCount) * Math.PI * 2;
                
                for (let s = 0; s < 1000; s++) {
                    const distance = 100 + Math.pow(Math.random(), 1.4) * canvas.width * 0.35;
                    const spiralAngle = armOffset + distance * 0.015;
                    
                    const randomAngle = (Math.random() - 0.5) * 0.5;
                    const randomDist = (Math.random() - 0.5) * 15;
                    
                    const angle = spiralAngle + randomAngle;
                    const finalDist = distance + randomDist;
                    
                    const x = centerX + Math.cos(angle) * finalDist;
                    const y = centerY + Math.sin(angle) * finalDist;
                    
                    if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                        const brightness = Math.random() * 0.15 + 0.05; // Very dim
                        const size = Math.random() * 1.2 + 0.3;
                        
                        ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // === 4. NEBULAE (extremely subtle) ===
            const nebulae = [
                { angle: 30, dist: 0.3, size: 60 },
                { angle: 120, dist: 0.35, size: 70 },
                { angle: 210, dist: 0.25, size: 55 },
                { angle: 300, dist: 0.4, size: 75 },
                { angle: 80, dist: 0.3, size: 60 },
                { angle: 200, dist: 0.45, size: 50 }
            ];
            
            nebulae.forEach(neb => {
                const angleRad = neb.angle * Math.PI / 180;
                const dist = neb.dist * canvas.width * 0.4;
                const x = centerX + Math.cos(angleRad) * dist;
                const y = centerY + Math.sin(angleRad) * dist;
                
                const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, neb.size * 1.5);
                glowGradient.addColorStop(0, 'rgba(120, 120, 140, 0.06)');
                glowGradient.addColorStop(0.6, 'rgba(80, 80, 100, 0.02)');
                glowGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(x, y, neb.size * 1.5, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function zoomToRegion(region) {
            loadingOverlay.classList.add('active');
            
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
            
            localStorage.setItem('voidfarer_current_galaxy_sector', region);
            localStorage.setItem('voidfarer_current_region', region);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'nebulae-map.html';
            }, 1200);
        }
        
        // Update info panel on hover/tap
        document.querySelectorAll('.region-box').forEach(box => {
            box.addEventListener('mouseenter', (e) => {
                const label = box.querySelector('.region-label').textContent;
                const count = box.querySelector('.region-count').textContent;
                document.getElementById('infoPanel').innerHTML = `
                    <div class="info-title">${label}</div>
                    <div>${count} systems</div>
                `;
            });
            
            box.addEventListener('touchstart', (e) => {
                const label = box.querySelector('.region-label').textContent;
                const count = box.querySelector('.region-count').textContent;
                document.getElementById('infoPanel').innerHTML = `
                    <div class="info-title">${label}</div>
                    <div>${count} systems</div>
                `;
            });
        });
        
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        resizeCanvas();
    </script>
</body>
</html>
