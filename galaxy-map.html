<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Galaxy Map</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=WindSong&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .galaxy-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 25px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
        }
        
        .current-location {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa4a;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 24px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 100px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Region Info Panel */
        .region-panel {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 70px);
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            min-width: 220px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .region-panel.visible {
            display: block;
        }
        
        .region-name {
            font-family: 'WindSong', cursive;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }
        
        .distance-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .distance-label {
            color: #a0c0ff;
        }
        
        .distance-value {
            color: #ffaa4a;
            font-weight: bold;
        }
        
        .fuel-value {
            color: #4affaa;
            font-weight: bold;
        }
        
        .time-value {
            color: #8a6aff;
            font-weight: bold;
        }
        
        .travel-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-family: 'Libre Baskerville', serif;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.1s;
        }
        
        .travel-btn:active {
            background: #6aa0e0;
            transform: scale(0.98);
        }
        
        .travel-btn:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Region boxes */
        .region-box {
            position: absolute;
            border: 2px solid rgba(160, 176, 192, 0.4);
            border-radius: 30% 15% 30% 15%;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.2);
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .region-box:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .region-box.selected {
            border-color: #ffaa4a;
            box-shadow: 0 0 30px #ffaa4a;
        }
        
        .region-label {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: clamp(14px, 4vw, 18px);
            text-shadow: 0 0 15px #ffffff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(2px);
            padding: 5px 12px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            pointer-events: none;
        }
        
        .region-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #8a6aff;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .current-location { top: max(80px, env(safe-area-inset-top) + 50px); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .region-panel { bottom: max(100px, env(safe-area-inset-bottom) + 70px); right: max(15px, env(safe-area-inset-right)); }
        }
    </style>
</head>
<body>
    <div class="galaxy-container">
        <div class="ui-header">✦ MILKY WAY ✦</div>
        
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Orion Arm (B2)</span>
        </div>
        
        <button class="back-btn" onclick="returnToShip()">← SHIP</button>
        
        <!-- Region boxes -->
        <div class="region-box" id="regionOrion" style="left: 35%; top: 40%; width: 130px; height: 90px;" onclick="selectRegion('Orion', 'B2')">
            <span class="region-label">Orion Arm</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionCygnus" style="left: 60%; top: 30%; width: 120px; height: 80px;" onclick="selectRegion('Cygnus', 'A1')">
            <span class="region-label">Cygnus Arm</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionSagittarius" style="left: 45%; top: 60%; width: 140px; height: 100px;" onclick="selectRegion('Sagittarius', 'C2')">
            <span class="region-label">Sagittarius</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionPerseus" style="left: 65%; top: 55%; width: 130px; height: 90px;" onclick="selectRegion('Perseus', 'B1')">
            <span class="region-label">Perseus Arm</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionCarina" style="left: 30%; top: 65%; width: 110px; height: 80px;" onclick="selectRegion('Carina', 'C3')">
            <span class="region-label">Carina Arm</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionOuter" style="left: 70%; top: 70%; width: 120px; height: 80px;" onclick="selectRegion('Outer', 'A4')">
            <span class="region-label">Outer Arm</span>
            <span class="region-count">6</span>
        </div>
        
        <div class="region-box" id="regionCore" style="left: 50%; top: 50%; width: 180px; height: 120px;" onclick="selectRegion('Core', 'C1')">
            <span class="region-label">Galactic Core</span>
            <span class="region-count">6</span>
        </div>
        
        <!-- Region Info Panel -->
        <div class="region-panel" id="regionPanel">
            <div class="region-name" id="selectedRegionName">Orion Arm</div>
            <div class="distance-row">
                <span class="distance-label">Distance:</span>
                <span class="distance-value" id="regionDistance">2.3 LY</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Warp Cycles:</span>
                <span class="time-value" id="warpCycles">1 cycle</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Travel Time:</span>
                <span class="time-value" id="travelTime">2 sec</span>
            </div>
            <div class="distance-row">
                <span class="distance-label">Fuel Required:</span>
                <span class="fuel-value" id="fuelCost">10 ⭐</span>
            </div>
            <button class="travel-btn" id="travelBtn" onclick="travelToRegion()">🚀 TRAVEL</button>
        </div>
        
        <canvas id="galaxyCanvas"></canvas>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">warping...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const regionPanel = document.getElementById('regionPanel');
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ===== CURRENT LOCATION =====
        // Default to Orion Arm (B2) if not set
        let currentSector = localStorage.getItem('voidfarer_current_sector') || 'B2';
        let currentRegion = localStorage.getItem('voidfarer_current_region') || 'Orion';
        
        document.getElementById('currentLocationText').textContent = 
            currentRegion + ' Arm (' + currentSector + ')';
        
        // ===== SECTOR COORDINATES =====
        const sectorCoordinates = {
            'A1': { x: 0, y: 0, name: 'Cygnus' },
            'B1': { x: 1, y: 0, name: 'Perseus' },
            'C1': { x: 2, y: 0, name: 'Core' },
            'A2': { x: 0, y: 1, name: 'Outer' },
            'B2': { x: 1, y: 1, name: 'Orion' },
            'C2': { x: 2, y: 1, name: 'Sagittarius' },
            'A3': { x: 0, y: 2, name: 'Carina' },
            'B3': { x: 1, y: 2, name: 'Norma' },
            'C3': { x: 2, y: 2, name: 'Scutum' },
            'A4': { x: 0, y: 3, name: 'Far' },
            'B4': { x: 1, y: 3, name: 'Reach' },
            'C4': { x: 2, y: 3, name: 'Fringe' }
        };
        
        // ===== SELECTED REGION =====
        let selectedRegion = null;
        let selectedSector = null;
        
        function selectRegion(region, sector) {
            // Remove previous selection
            document.querySelectorAll('.region-box').forEach(box => {
                box.classList.remove('selected');
            });
            
            // Add selection to clicked box
            const box = document.getElementById('region' + region);
            if (box) {
                box.classList.add('selected');
            }
            
            selectedRegion = region;
            selectedSector = sector;
            
            // Calculate distance from current location
            const distance = calculateSectorDistance(currentSector, sector);
            const cycles = calculateWarpCycles(distance);
            const fuel = calculateFuel(distance);
            const time = cycles * 2; // 2 seconds per cycle
            
            // Update panel
            document.getElementById('selectedRegionName').textContent = region + ' Arm';
            document.getElementById('regionDistance').textContent = distance.toFixed(1) + ' LY';
            document.getElementById('warpCycles').textContent = cycles + ' cycle' + (cycles > 1 ? 's' : '');
            document.getElementById('travelTime').textContent = time + ' sec';
            document.getElementById('fuelCost').innerHTML = fuel + ' ⭐';
            
            // Enable/disable travel button based on whether it's current location
            const travelBtn = document.getElementById('travelBtn');
            if (sector === currentSector) {
                travelBtn.disabled = true;
                travelBtn.textContent = '📍 CURRENT LOCATION';
            } else {
                travelBtn.disabled = false;
                travelBtn.textContent = '🚀 TRAVEL';
            }
            
            regionPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ===== DISTANCE CALCULATION =====
        function calculateSectorDistance(sector1, sector2) {
            const s1 = sectorCoordinates[sector1] || { x: 1, y: 1 };
            const s2 = sectorCoordinates[sector2] || { x: 1, y: 1 };
            
            // Manhattan distance + some factor for "light years"
            const gridDistance = Math.abs(s1.x - s2.x) + Math.abs(s1.y - s2.y);
            
            // Convert to "light years" (abstract)
            return gridDistance * 2.5;
        }
        
        function calculateWarpCycles(distance) {
            if (distance <= 2.5) return 1;      // Same or adjacent sector
            if (distance <= 5) return 2;         // 2 sectors away
            if (distance <= 7.5) return 3;       // 3 sectors away
            if (distance <= 10) return 4;         // 4 sectors away
            return 5;                              // Max
        }
        
        function calculateFuel(distance) {
            return Math.floor(distance * 4) + 5;
        }
        
        // ===== TRAVEL =====
        function travelToRegion() {
            if (!selectedRegion || !selectedSector) return;
            if (selectedSector === currentSector) return;
            
            loadingOverlay.classList.add('active');
            
            // Calculate warp details
            const distance = calculateSectorDistance(currentSector, selectedSector);
            const cycles = calculateWarpCycles(distance);
            
            // Save destination
            localStorage.setItem('voidfarer_warp_destination', selectedRegion);
            localStorage.setItem('voidfarer_warp_destination_sector', selectedSector);
            localStorage.setItem('voidfarer_warp_cycles', cycles);
            localStorage.setItem('voidfarer_warp_return', 'galaxy-map.html');
            
            // Navigate to warp
            setTimeout(() => {
                window.location.href = 'warp.html';
            }, 500);
        }
        
        function returnToShip() {
            window.location.href = 'ship-bridge.html';
        }
        
        // ===== DRAW GALAXY BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGalaxy();
        }
        
        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Background stars
            for (let i = 0; i < 1000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Galactic core glow
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.3
            );
            gradient.addColorStop(0, 'rgba(255, 220, 180, 0.1)');
            gradient.addColorStop(0.5, 'rgba(160, 140, 200, 0.05)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
