<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Galaxy Map</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .galaxy-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            touch-action: none;
        }
        
        .ui-header {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 25px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 30;
            white-space: nowrap;
            letter-spacing: 1px;
            pointer-events: none;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .current-location {
            position: absolute;
            top: max(80px, env(safe-area-inset-top) + 50px);
            left: 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #4affaa;
            color: white;
            padding: 8px 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 12px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-dot {
            width: 10px;
            height: 10px;
            background: #4affaa;
            border-radius: 50%;
            box-shadow: 0 0 15px #4affaa;
        }
        
        .back-btn {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: max(15px, env(safe-area-inset-left));
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(8px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 24px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.1s;
            z-index: 30;
            min-width: 100px;
            text-align: center;
        }
        
        .back-btn:active {
            background: rgba(160, 176, 192, 0.3);
            transform: scale(0.96);
        }
        
        /* Region Info Panel */
        .region-panel {
            position: absolute;
            bottom: max(100px, env(safe-area-inset-bottom) + 70px);
            right: max(15px, env(safe-area-inset-right));
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: white;
            padding: 20px;
            border-radius: 40px 15px 40px 15px;
            z-index: 40;
            min-width: 220px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .region-panel.visible {
            display: block;
        }
        
        .region-name {
            font-family: 'Exo 2', sans-serif;
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            font-weight: 600;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .info-label {
            color: #a0c0ff;
        }
        
        .info-value {
            color: #ffd966;
            font-weight: bold;
        }
        
        .travel-btn {
            width: 100%;
            background: #4a8ac0;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 40px 10px 40px 10px;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.1s;
            font-weight: 600;
        }
        
        .travel-btn:active {
            background: #6aa0e0;
            transform: scale(0.98);
        }
        
        .travel-btn:disabled {
            background: #2a4a6a;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Region boxes */
        .region-box {
            position: absolute;
            border: 2px solid rgba(160, 176, 192, 0.4);
            border-radius: 30% 15% 30% 15%;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.2);
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .region-box:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .region-box.selected {
            border-color: #ffaa4a;
            box-shadow: 0 0 30px #ffaa4a;
        }
        
        .region-label {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: clamp(14px, 4vw, 18px);
            text-shadow: 0 0 15px #ffffff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(2px);
            padding: 5px 12px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            pointer-events: none;
            font-weight: 500;
        }
        
        .region-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #8a6aff;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #8a6aff;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @supports (padding: max(0px)) {
            .ui-header { top: max(15px, env(safe-area-inset-top)); }
            .current-location { top: max(80px, env(safe-area-inset-top) + 50px); }
            .back-btn { bottom: max(20px, env(safe-area-inset-bottom)); left: max(15px, env(safe-area-inset-left)); }
            .region-panel { bottom: max(100px, env(safe-area-inset-bottom) + 70px); right: max(15px, env(safe-area-inset-right)); }
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="galaxy-container">
        <div class="ui-header">✦ MILKY WAY ✦</div>
        <div class="current-location" id="currentLocation">
            <span class="current-dot"></span>
            <span id="currentLocationText">Loading location...</span>
        </div>
        <button class="back-btn" onclick="returnToShip()">← SHIP</button>
        
        <!-- Region boxes will be dynamically created -->
        <div id="regionBoxes"></div>
        
        <!-- Region Info Panel -->
        <div class="region-panel" id="regionPanel">
            <div class="region-name" id="selectedRegionName">Loading...</div>
            <div class="info-row">
                <span class="info-label">Sector:</span>
                <span class="info-value" id="sectorId">---</span>
            </div>
            <div class="info-row">
                <span class="info-label">Nebulae:</span>
                <span class="info-value" id="nebulaeCount">6</span>
            </div>
            <div class="info-row">
                <span class="info-label">Stars:</span>
                <span class="info-value" id="starsCount">300</span>
            </div>
            <button class="travel-btn" id="travelBtn" onclick="travelToSector()">🚀 ENTER SECTOR</button>
        </div>
        
        <canvas id="galaxyCanvas"></canvas>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">loading galaxy...</div>
        </div>
        
        <!-- Migration status (debug) -->
        <div class="migration-status" id="migrationStatus"></div>
    </div>

    <script>
        // ===== MAKE SURE idb IS AVAILABLE =====
        const { openDB } = idb;

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');
        const regionPanel = document.getElementById('regionPanel');
        const regionBoxes = document.getElementById('regionBoxes');

        // ===== STATE =====
        let currentSector = 'B2';
        let currentRegion = 'Orion';
        let selectedRegion = null;
        let selectedSector = null;

        // ===== SECTOR COORDINATES =====
        const sectorCoordinates = {
            'A1': { x: 0, y: 0, name: 'Cygnus', displayName: 'Cygnus Arm', color: '#ff6a9a', nebulae: 6, stars: 300 },
            'B1': { x: 1, y: 0, name: 'Perseus', displayName: 'Perseus Arm', color: '#4affaa', nebulae: 6, stars: 300 },
            'C1': { x: 2, y: 0, name: 'Core', displayName: 'Galactic Core', color: '#8a8aaa', nebulae: 6, stars: 300 },
            'A2': { x: 0, y: 1, name: 'Outer', displayName: 'Outer Arm', color: '#ffaa4a', nebulae: 6, stars: 300 },
            'B2': { x: 1, y: 1, name: 'Orion', displayName: 'Orion Arm', color: '#8a6aff', nebulae: 6, stars: 300 },
            'C2': { x: 2, y: 1, name: 'Sagittarius', displayName: 'Sagittarius Arm', color: '#c06aff', nebulae: 6, stars: 300 },
            'A3': { x: 0, y: 2, name: 'Carina', displayName: 'Carina Arm', color: '#6a8aff', nebulae: 6, stars: 300 },
            'B3': { x: 1, y: 2, name: 'Norma', displayName: 'Norma Arm', color: '#ff8a6a', nebulae: 6, stars: 300 },
            'C3': { x: 2, y: 2, name: 'Scutum', displayName: 'Scutum Arm', color: '#6aff8a', nebulae: 6, stars: 300 },
            'A4': { x: 0, y: 3, name: 'Far', displayName: 'Far Arm', color: '#ff6aff', nebulae: 6, stars: 300 },
            'B4': { x: 1, y: 3, name: 'Reach', displayName: 'Outer Reach', color: '#8aff6a', nebulae: 6, stars: 300 },
            'C4': { x: 2, y: 3, name: 'Fringe', displayName: 'The Fringe', color: '#ff8a8a', nebulae: 6, stars: 300 }
        };

        // ===== SECTOR NAMES MAPPING =====
        const sectorNames = {
            'A1': 'Cygnus Arm', 'B1': 'Perseus Arm', 'C1': 'Galactic Core',
            'A2': 'Outer Arm', 'B2': 'Orion Arm', 'C2': 'Sagittarius Arm',
            'A3': 'Carina Arm', 'B3': 'Norma Arm', 'C3': 'Scutum Arm',
            'A4': 'Far Arm', 'B4': 'Outer Reach', 'C4': 'The Fringe'
        };

        // ===== REGION BOX POSITIONS =====
        const regionPositions = {
            'Cygnus': { left: '60%', top: '30%', width: '120px', height: '80px' },
            'Perseus': { left: '65%', top: '55%', width: '130px', height: '90px' },
            'Core': { left: '50%', top: '50%', width: '180px', height: '120px' },
            'Outer': { left: '70%', top: '70%', width: '120px', height: '80px' },
            'Orion': { left: '35%', top: '40%', width: '130px', height: '90px' },
            'Sagittarius': { left: '45%', top: '60%', width: '140px', height: '100px' },
            'Carina': { left: '30%', top: '65%', width: '110px', height: '80px' },
            'Norma': { left: '20%', top: '55%', width: '120px', height: '80px' },
            'Scutum': { left: '25%', top: '45%', width: '120px', height: '80px' },
            'Far': { left: '15%', top: '70%', width: '110px', height: '80px' },
            'Reach': { left: '10%', top: '30%', width: '120px', height: '80px' },
            'Fringe': { left: '75%', top: '20%', width: '120px', height: '80px' }
        };

        // ===== LOAD CURRENT LOCATION =====
        async function loadCurrentLocation() {
            try {
                // Try to get from storage functions first
                if (typeof getCurrentSector === 'function') {
                    currentSector = await getCurrentSector();
                } else {
                    currentSector = localStorage.getItem('voidfarer_current_sector');
                }
                
                if (typeof getCurrentRegion === 'function') {
                    currentRegion = await getCurrentRegion();
                } else {
                    currentRegion = localStorage.getItem('voidfarer_current_region');
                }
                
                // If still null, use defaults
                if (!currentSector) currentSector = 'B2';
                if (!currentRegion) currentRegion = 'Orion';
                
                // Log for debugging
                console.log('Galaxy Map loading sector:', currentSector);
                console.log('Galaxy Map loading region:', currentRegion);
                
                // Update display with friendly name
                const displayName = sectorNames[currentSector] || sectorCoordinates[currentSector]?.displayName || 'Orion Arm';
                document.getElementById('currentLocationText').textContent = displayName;
                
            } catch (error) {
                console.error('Error loading location:', error);
                // Use defaults on error
                currentSector = 'B2';
                currentRegion = 'Orion';
                document.getElementById('currentLocationText').textContent = 'Orion Arm';
            }
        }

        // ===== CREATE REGION BOXES =====
        function createRegionBoxes() {
            regionBoxes.innerHTML = '';
            
            Object.entries(sectorCoordinates).forEach(([sectorId, data]) => {
                const pos = regionPositions[data.name];
                if (!pos) return;
                
                const box = document.createElement('div');
                box.className = 'region-box';
                box.id = `region-${data.name}`;
                box.style.left = pos.left;
                box.style.top = pos.top;
                box.style.width = pos.width;
                box.style.height = pos.height;
                
                // FIXED: Pass both the display name AND the sector ID
                box.onclick = function() { selectRegion(data.displayName, sectorId); };
                
                // Highlight current sector
                if (sectorId === currentSector) {
                    box.style.borderColor = '#4affaa';
                    box.style.boxShadow = '0 0 30px #4affaa';
                    box.style.borderWidth = '3px';
                }
                
                box.innerHTML = `
                    <span class="region-label">${data.displayName}</span>
                    <span class="region-count">${data.nebulae}</span>
                `;
                
                regionBoxes.appendChild(box);
            });
        }

        // ===== SELECT REGION =====
        function selectRegion(displayName, sector) {
            // Remove previous selection
            document.querySelectorAll('.region-box').forEach(box => {
                box.classList.remove('selected');
            });
            
            // Add selection to clicked box
            const regionName = sectorCoordinates[sector]?.name;
            const box = document.getElementById('region-' + regionName);
            if (box) {
                box.classList.add('selected');
            }
            
            selectedRegion = displayName;
            selectedSector = sector;
            
            const sectorData = sectorCoordinates[sector];
            
            // Update panel - now using the correct display name!
            document.getElementById('selectedRegionName').textContent = displayName;
            document.getElementById('sectorId').textContent = sector;
            document.getElementById('nebulaeCount').textContent = sectorData.nebulae;
            document.getElementById('starsCount').textContent = sectorData.stars;
            
            // Change button based on whether it's current location
            const travelBtn = document.getElementById('travelBtn');
            if (sector === currentSector) {
                // You're already here - allow viewing
                travelBtn.disabled = false;
                travelBtn.textContent = '👁️ VIEW SECTOR';
            } else {
                travelBtn.disabled = false;
                travelBtn.textContent = '🚀 ENTER SECTOR';
            }
            
            regionPanel.classList.add('visible');
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== TRAVEL TO SECTOR =====
        async function travelToSector() {
            if (!selectedRegion || !selectedSector) return;
            
            // If it's the current sector, just view it
            if (selectedSector === currentSector) {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'viewing sector...';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                    // Just close the loading overlay, no navigation
                }, 500);
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'entering sector...';
            
            try {
                // Save current location for next screen
                if (typeof setCurrentSector === 'function') {
                    await setCurrentSector(selectedSector, selectedRegion);
                } else {
                    localStorage.setItem('voidfarer_current_sector', selectedSector);
                    localStorage.setItem('voidfarer_current_region', selectedRegion);
                }
                
                // Navigate to star sectors
                setTimeout(() => {
                    window.location.href = 'star-sectors.html';
                }, 500);
                
            } catch (error) {
                console.error('Error entering sector:', error);
                loadingOverlay.classList.remove('active');
                alert('Failed to enter sector. Please try again.');
            }
        }

        // ===== RETURN TO SHIP =====
        function returnToShip() {
            window.location.href = 'ship-bridge.html';
        }

        // ===== DRAW GALAXY BACKGROUND =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGalaxy();
        }

        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Background stars
            for (let i = 0; i < 1000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                const opacity = Math.random() * 0.15 + 0.05;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Galactic core glow
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.3
            );
            gradient.addColorStop(0, 'rgba(255, 220, 180, 0.1)');
            gradient.addColorStop(0.5, 'rgba(160, 140, 200, 0.05)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw spiral arm hints
            ctx.strokeStyle = 'rgba(100, 100, 150, 0.1)';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                ctx.beginPath();
                
                for (let r = 0.1; r < 0.9; r += 0.1) {
                    const spiralAngle = angle + r * 10;
                    const x = centerX + Math.cos(spiralAngle) * r * canvas.width * 0.4;
                    const y = centerY + Math.sin(spiralAngle) * r * canvas.height * 0.4;
                    
                    if (r === 0.1) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading galaxy map...';
                
                // Check for player data
                const credits = typeof getCredits === 'function' ? await getCredits() : 5000;
                if (!credits) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Load current location FIRST - this gets your actual sector!
                await loadCurrentLocation();
                
                // Resize canvas and draw background
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                // Create region boxes - now with current sector highlighted!
                createRegionBoxes();
                
                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
    
    <!-- Load all JS files -->
    <script src="js/storage.js"></script>
    <script src="js/db.js"></script>
    <script src="js/migration.js"></script>
</body>
</html>
