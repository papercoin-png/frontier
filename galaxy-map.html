<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidfarer - Galaxy Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
        }
        
        .galaxy-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #e0f0ff;
            font-family: 'WindSong', cursive;
            font-size: 28px;
            text-shadow: 0 0 30px #8a6aff, 0 0 60px #4a2a8a;
            background: rgba(10,10,26,0.4);
            backdrop-filter: blur(5px);
            padding: 8px 30px;
            border-radius: 60px 20px 60px 20px;
            border: 2px solid #a0b0c0;
            z-index: 10;
            white-space: nowrap;
        }
        
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 30px;
            border-radius: 60px 20px 60px 20px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.1s;
            z-index: 10;
        }
        
        .back-btn:active {
            background: #a0b0c0;
            color: #0a0a1a;
            transform: scale(0.96);
        }
        
        .info-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10,10,26,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #a0b0c0;
            color: #d0e0f0;
            padding: 12px 20px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            z-index: 10;
            text-align: center;
            min-width: 150px;
        }
        
        .info-title {
            font-family: 'WindSong', cursive;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 5px;
        }
        
        /* Aesthetic boxes for clickable regions */
        .region-box {
            position: absolute;
            border: 2px solid rgba(160, 176, 192, 0.6);
            border-radius: 30% 15% 30% 15%;
            box-shadow: 0 0 20px rgba(160, 176, 192, 0.3), inset 0 0 20px rgba(160, 176, 192, 0.1);
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 20;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-glow 3s infinite alternate;
        }
        
        .region-box:hover {
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        
        .region-box::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            border-radius: 35% 20% 35% 20%;
            pointer-events: none;
        }
        
        .region-label {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 18px;
            text-shadow: 0 0 20px #ffffff, 0 0 40px #8a6aff;
            background: rgba(10,10,26,0.3);
            backdrop-filter: blur(5px);
            padding: 5px 15px;
            border-radius: 40px 10px 40px 10px;
            border: 1px solid rgba(255,255,255,0.5);
            white-space: nowrap;
            pointer-events: none;
        }
        
        .region-count {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #ffaa4a;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 50%;
            min-width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 0 20px #ffaa4a;
        }
        
        @keyframes pulse-glow {
            0% { border-color: rgba(160, 176, 192, 0.5); box-shadow: 0 0 15px rgba(160, 176, 192, 0.2); }
            100% { border-color: rgba(200, 216, 255, 0.8); box-shadow: 0 0 30px rgba(160, 176, 192, 0.5); }
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #8a6aff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: white;
            font-family: 'WindSong', cursive;
            font-size: 24px;
            text-shadow: 0 0 20px #8a6aff;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="galaxy-container">
        <div class="ui-overlay">✦ MILKY WAY ✦</div>
        <button class="back-btn" onclick="window.location.href='ship-bridge.html'">← RETURN TO SHIP</button>
        
        <!-- Aesthetic boxes for clickable regions -->
        <div class="region-box" id="regionOrion" style="left: 35%; top: 40%; width: 140px; height: 100px;" onclick="zoomToRegion('Orion')">
            <span class="region-label">Orion Arm</span>
            <span class="region-count">300</span>
        </div>
        
        <div class="region-box" id="regionCygnus" style="left: 60%; top: 30%; width: 130px; height: 90px;" onclick="zoomToRegion('Cygnus')">
            <span class="region-label">Cygnus Arm</span>
            <span class="region-count">350</span>
        </div>
        
        <div class="region-box" id="regionSagittarius" style="left: 45%; top: 60%; width: 150px; height: 110px;" onclick="zoomToRegion('Sagittarius')">
            <span class="region-label">Sagittarius</span>
            <span class="region-count">280</span>
        </div>
        
        <div class="region-box" id="regionPerseus" style="left: 65%; top: 55%; width: 140px; height: 100px;" onclick="zoomToRegion('Perseus')">
            <span class="region-label">Perseus Arm</span>
            <span class="region-count">400</span>
        </div>
        
        <div class="region-box" id="regionCarina" style="left: 30%; top: 65%; width: 120px; height: 90px;" onclick="zoomToRegion('Carina')">
            <span class="region-label">Carina Arm</span>
            <span class="region-count">320</span>
        </div>
        
        <div class="region-box" id="regionOuter" style="left: 70%; top: 70%; width: 130px; height: 90px;" onclick="zoomToRegion('Outer')">
            <span class="region-label">Outer Arm</span>
            <span class="region-count">250</span>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <div class="info-title">Galactic Core</div>
            <div>12 sectors • 1,900 star systems</div>
            <div style="font-size:10px; margin-top:5px;">Click a region to explore</div>
        </div>
        
        <canvas id="galaxyCanvas"></canvas>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">warping to sector...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawGalaxy();
        }
        
        function drawGalaxy() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // === 1. BACKGROUND STARFIELD ===
            for (let i = 0; i < 2000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.5;
                const opacity = Math.random() * 0.3 + 0.1;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 2. GALACTIC CORE (dense star cluster) ===
            // Core glow
            const coreGlow = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, canvas.width * 0.25
            );
            coreGlow.addColorStop(0, '#ffeedd30');
            coreGlow.addColorStop(0.3, '#ffaa3340');
            coreGlow.addColorStop(0.6, '#8a6aff20');
            coreGlow.addColorStop(1, 'transparent');
            
            ctx.fillStyle = coreGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Individual stars in core (dense packing)
            for (let i = 0; i < 3000; i++) {
                // Polar coordinates - more stars near center
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.pow(Math.random(), 1.2) * canvas.width * 0.2;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                
                // Star color based on distance from center
                let color;
                if (distance < canvas.width * 0.05) {
                    // Core center - hot, young stars (blue-white)
                    color = `rgba(180, 200, 255, ${Math.random() * 0.8 + 0.2})`;
                } else if (distance < canvas.width * 0.1) {
                    // Intermediate - yellow-white
                    color = `rgba(255, 240, 200, ${Math.random() * 0.7 + 0.2})`;
                } else {
                    // Outer core - cooler, redder
                    color = `rgba(255, 200, 150, ${Math.random() * 0.6 + 0.1})`;
                }
                
                const size = Math.random() * 2.5 + 0.5;
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // === 3. SPIRAL ARMS (formed by star density) ===
            const armCount = 4;
            
            for (let arm = 0; arm < armCount; arm++) {
                const armOffset = (arm / armCount) * Math.PI * 2;
                
                // Generate stars along this arm
                for (let s = 0; s < 800; s++) {
                    // Distance from center (farther = more spread)
                    const distance = 50 + Math.pow(Math.random(), 1.5) * canvas.width * 0.4;
                    
                    // Spiral angle increases with distance
                    const spiralAngle = armOffset + distance * 0.02;
                    
                    // Add some randomness to make arm fuzzy
                    const randomAngle = (Math.random() - 0.5) * 0.3;
                    const randomDist = (Math.random() - 0.5) * 15;
                    
                    const angle = spiralAngle + randomAngle;
                    const finalDist = distance + randomDist;
                    
                    const x = centerX + Math.cos(angle) * finalDist;
                    const y = centerY + Math.sin(angle) * finalDist;
                    
                    // Only draw if within canvas
                    if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                        // Color based on arm and distance
                        let color;
                        if (arm === 0) color = `rgba(180, 200, 255, ${Math.random() * 0.5 + 0.2})`; // Blue
                        else if (arm === 1) color = `rgba(255, 200, 200, ${Math.random() * 0.5 + 0.2})`; // Pink
                        else if (arm === 2) color = `rgba(200, 255, 200, ${Math.random() * 0.5 + 0.2})`; // Green
                        else color = `rgba(255, 220, 180, ${Math.random() * 0.5 + 0.2})`; // Yellow
                        
                        const size = Math.random() * 2 + 0.5;
                        
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // === 4. NEBULAE (stellar nurseries) ===
            const nebulae = [
                { name: 'Orion', angle: 30, dist: 0.3, color: '#8a6aff', size: 40, x: 35, y: 40 },
                { name: 'Cygnus', angle: 120, dist: 0.35, color: '#ff6a9a', size: 45, x: 60, y: 30 },
                { name: 'Sagittarius', angle: 210, dist: 0.25, color: '#ffaa4a', size: 35, x: 45, y: 60 },
                { name: 'Perseus', angle: 300, dist: 0.4, color: '#4affaa', size: 50, x: 65, y: 55 },
                { name: 'Carina', angle: 80, dist: 0.3, color: '#c06aff', size: 40, x: 30, y: 65 },
                { name: 'Outer', angle: 200, dist: 0.45, color: '#8a8aaa', size: 30, x: 70, y: 70 }
            ];
            
            nebulae.forEach(neb => {
                const angleRad = neb.angle * Math.PI / 180;
                const dist = neb.dist * canvas.width * 0.4;
                const x = centerX + Math.cos(angleRad) * dist;
                const y = centerY + Math.sin(angleRad) * dist;
                
                // Nebula glow (just a cloud, no stars inside)
                const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, neb.size * 2.5);
                glowGradient.addColorStop(0, neb.color + '40');
                glowGradient.addColorStop(0.5, neb.color + '15');
                glowGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(x, y, neb.size * 2.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Add a few very young stars (proto-stars) within the nebula
                for (let s = 0; s < 20; s++) {
                    const clusterAngle = Math.random() * Math.PI * 2;
                    const clusterDist = Math.random() * neb.size * 1.5;
                    const nx = x + Math.cos(clusterAngle) * clusterDist;
                    const ny = y + Math.sin(clusterAngle) * clusterDist;
                    
                    const size = Math.random() * 2 + 0.5;
                    const opacity = Math.random() * 0.5 + 0.3;
                    
                    // Parse color - young stars are hot and blue
                    ctx.fillStyle = `rgba(200, 220, 255, ${opacity})`;
                    ctx.beginPath();
                    ctx.arc(nx, ny, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // === 5. DUST LANES (dark patches) ===
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * canvas.width * 0.35;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                const radius = Math.random() * 40 + 20;
                
                const dustGradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                dustGradient.addColorStop(0, '#0a0a1a80');
                dustGradient.addColorStop(0.6, '#0a0a1a40');
                dustGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = dustGradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Zoom to region map
        function zoomToRegion(region) {
            loadingOverlay.classList.add('active');
            
            // Haptic feedback if available
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
            
            // Save region data
            localStorage.setItem('voidfarer_current_galaxy_sector', region);
            localStorage.setItem('voidfarer_current_region', region);
            
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = 'nebulae-map.html';
            }, 1500);
        }
        
        // Update info panel on hover (simplified)
        document.querySelectorAll('.region-box').forEach(box => {
            box.addEventListener('mouseenter', (e) => {
                const label = box.querySelector('.region-label').textContent;
                const count = box.querySelector('.region-count').textContent;
                document.getElementById('infoPanel').innerHTML = `
                    <div class="info-title">${label}</div>
                    <div>${count} star systems</div>
                    <div style="font-size:10px; margin-top:5px;">Click to explore</div>
                `;
            });
        });
        
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
