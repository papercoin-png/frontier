<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Transfer Items</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .transfer-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a2a3a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #4a9a8a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #4a9a8a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .transfer-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .transfer-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 32px;
            color: #c0e0ff;
            text-shadow: 0 0 20px #4a8a6a, 0 0 40px #2a5a4a;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .transfer-subtitle {
            color: #a0d0c0;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Property Info */
        .property-info {
            background: rgba(30, 60, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .property-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Exo 2', sans-serif;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .property-stats {
            display: flex;
            justify-content: space-between;
            color: #a0d0c0;
            font-size: 14px;
        }
        
        .property-capacity {
            color: #ffd966;
            font-weight: 600;
        }
        
        .property-capacity-unit {
            color: #4affaa;
            font-size: 11px;
            margin-left: 2px;
        }
        
        /* Transfer Controls */
        .transfer-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .direction-btn {
            flex: 1;
            background: rgba(30, 60, 70, 0.6);
            border: 2px solid #4a9a8a;
            color: #a0d0c0;
            padding: 12px;
            border-radius: 40px 10px 40px 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .direction-btn.active {
            background: #4a9a8a;
            color: #ffffff;
            border-color: #7ac0b0;
        }
        
        .direction-btn:active {
            transform: scale(0.97);
        }
        
        /* Items Grid */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .item-card {
            background: rgba(30, 60, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #4a9a8a;
            border-radius: 40px 12px 40px 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .item-icon {
            font-size: 32px;
            min-width: 45px;
            text-align: center;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .item-quantity {
            color: #ffd966;
            font-size: 14px;
        }
        
        .item-mass {
            color: #4affaa;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .quantity-input {
            width: 60px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 8px;
            border-radius: 20px;
            text-align: center;
            font-family: 'Exo 2', sans-serif;
        }
        
        .transfer-item-btn {
            background: rgba(74, 154, 138, 0.3);
            border: 1px solid #4a9a8a;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 30px 8px 30px 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
            min-width: 70px;
            font-family: 'Exo 2', sans-serif;
        }
        
        .transfer-item-btn:active {
            background: #4a9a8a;
            transform: scale(0.95);
        }
        
        .transfer-item-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Mass Summary */
        .mass-summary {
            background: rgba(30, 60, 70, 0.5);
            border: 2px solid #4a9a8a;
            border-radius: 40px 10px 40px 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .mass-summary-label {
            color: #a0d0c0;
        }
        
        .mass-summary-value {
            color: #4affaa;
            font-weight: 600;
        }
        
        .mass-summary-unit {
            color: #a0d0c0;
            font-size: 11px;
            margin-left: 2px;
        }
        
        .mass-summary-warning {
            color: #ffaa4a;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .mass-summary-critical {
            color: #ff6b6b;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .quick-btn {
            background: rgba(255, 170, 74, 0.2);
            border: 1px solid #ffaa4a;
            color: #ffffff;
            padding: 14px;
            border-radius: 40px 10px 40px 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .quick-btn:active {
            background: #ffaa4a;
            transform: scale(0.97);
        }
        
        .quick-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0b0c0;
            background: rgba(30, 60, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #4a9a8a;
            font-style: italic;
        }
        
        /* Scroll Hint */
        .scroll-hint {
            text-align: center;
            color: #a0c0ff;
            font-size: 14px;
            margin: 20px 0 80px;
            font-style: italic;
            font-family: 'Exo 2', sans-serif;
            animation: fade-in-out 2s infinite;
            letter-spacing: 1px;
        }
        
        @keyframes fade-in-out {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Enhanced Back Button - Fixed positioning */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
            pointer-events: auto;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }

        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="transfer-view" id="transferView">
            <!-- Header -->
            <div class="transfer-header">
                <div class="transfer-title">Transfer Items</div>
                <div class="transfer-subtitle">✦ mass-based transfer ✦</div>
            </div>
            
            <!-- Property Info -->
            <div class="property-info" id="propertyInfo">
                <div class="property-name" id="propertyName">Loading...</div>
                <div class="property-stats">
                    <span>Used: <span class="property-capacity" id="propertyUsed">0</span> <span class="property-capacity-unit">AMU</span></span>
                    <span>Capacity: <span class="property-capacity" id="propertyCapacity">0</span> <span class="property-capacity-unit">AMU</span></span>
                </div>
            </div>
            
            <!-- Mass Summary -->
            <div class="mass-summary" id="massSummary">
                <span class="mass-summary-label">Transfer Mass:</span>
                <span>
                    <span class="mass-summary-value" id="transferMass">0</span>
                    <span class="mass-summary-unit">AMU</span>
                </span>
                <span class="mass-summary-warning" id="massWarning"></span>
            </div>
            
            <!-- Transfer Direction -->
            <div class="transfer-controls">
                <button class="direction-btn active" id="toPropertyBtn" onclick="window.setDirection('toProperty')">🚀 TO PROPERTY</button>
                <button class="direction-btn" id="toShipBtn" onclick="window.setDirection('toShip')">🚢 TO SHIP</button>
            </div>
            
            <!-- Items Grid -->
            <div class="items-grid" id="itemsGrid">
                <div class="empty-state">Loading items...</div>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" id="moveAllBtn" onclick="window.moveAll()">📦 MOVE ALL</button>
                <button class="quick-btn" id="resetBtn" onclick="window.resetQuantities()">⟲ RESET</button>
            </div>
            
            <!-- Scroll Hint -->
            <div class="scroll-hint">▼ scroll down to return to properties ▼</div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToRealEstate()">
                <span class="back-arrow">←</span>
                <span class="back-text">BACK TO PROPERTIES</span>
                <span class="back-icon">🏢</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">transferring...</div>
            </div>

            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- CRITICAL FIX: Added type="module" to all script tags -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/migration.js"></script>

    <script type="module">
        import { openDB } from 'https://cdn.jsdelivr.net/npm/idb@8/build/umd.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a2a3a');
            tg.setBackgroundColor('#0a2a3a');
        }

        // ===== CONSTANTS =====
        const CARGO_MASS_LIMIT = 1000; // Must match storage.js

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const migrationStatus = document.getElementById('migrationStatus');

        // Make functions available globally for onclick handlers
        window.returnToRealEstate = returnToRealEstate;
        window.setDirection = setDirection;
        window.transferItem = transferItem;
        window.moveAll = moveAll;
        window.resetQuantities = resetQuantities;

        // ===== GET PROPERTY ID FROM URL =====
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('property');

        // ===== STATE =====
        let currentProperty = null;
        let shipItems = [];
        let propertyItems = [];
        let currentDirection = 'toProperty'; // 'toProperty' or 'toShip'
        let propertyData = null;
        let currentShipMass = 0;
        let transferTotalMass = 0;

        // ===== ELEMENT DATABASE WITH MASS =====
        const elementDatabase = {
            // Common
            'Hydrogen': { icon: '💧', rarity: 'common', mass: 1.008 },
            'Helium': { icon: '🎈', rarity: 'common', mass: 4.003 },
            'Lithium': { icon: '🔋', rarity: 'common', mass: 6.94 },
            'Beryllium': { icon: '💎', rarity: 'common', mass: 9.012 },
            'Boron': { icon: '🧪', rarity: 'common', mass: 10.81 },
            'Sodium': { icon: '🧂', rarity: 'common', mass: 22.99 },
            'Magnesium': { icon: '✨', rarity: 'common', mass: 24.31 },
            'Aluminum': { icon: '🥫', rarity: 'common', mass: 26.98 },
            'Silicon': { icon: '💻', rarity: 'common', mass: 28.09 },
            'Potassium': { icon: '🍌', rarity: 'common', mass: 39.10 },
            'Calcium': { icon: '🥛', rarity: 'common', mass: 40.08 },
            
            // Uncommon
            'Carbon': { icon: '⚫', rarity: 'uncommon', mass: 12.01 },
            'Nitrogen': { icon: '🌬️', rarity: 'uncommon', mass: 14.01 },
            'Oxygen': { icon: '💨', rarity: 'uncommon', mass: 16.00 },
            'Fluorine': { icon: '🧪', rarity: 'uncommon', mass: 19.00 },
            'Neon': { icon: '💡', rarity: 'uncommon', mass: 20.18 },
            'Phosphorus': { icon: '✨', rarity: 'uncommon', mass: 30.97 },
            'Sulfur': { icon: '🟡', rarity: 'uncommon', mass: 32.06 },
            'Chlorine': { icon: '🧪', rarity: 'uncommon', mass: 35.45 },
            'Argon': { icon: '🎈', rarity: 'uncommon', mass: 39.95 },
            'Iron': { icon: '⚙️', rarity: 'uncommon', mass: 55.85 },
            'Nickel': { icon: '🔩', rarity: 'uncommon', mass: 58.69 },
            'Lead': { icon: '🔘', rarity: 'uncommon', mass: 207.2 },
            
            // Rare
            'Gold': { icon: '🟡', rarity: 'rare', mass: 197.0 },
            'Silver': { icon: '⚪', rarity: 'rare', mass: 107.9 },
            'Platinum': { icon: '⬜', rarity: 'rare', mass: 195.1 },
            'Titanium': { icon: '🔷', rarity: 'rare', mass: 47.87 },
            'Copper': { icon: '🔴', rarity: 'rare', mass: 63.55 },
            'Zinc': { icon: '⚪', rarity: 'rare', mass: 65.38 },
            'Tin': { icon: '🥫', rarity: 'rare', mass: 118.7 },
            'Cobalt': { icon: '🔵', rarity: 'rare', mass: 58.93 },
            'Chromium': { icon: '✨', rarity: 'rare', mass: 52.00 },
            
            // Very Rare
            'Uranium': { icon: '🟣', rarity: 'very-rare', mass: 238.0 },
            'Thorium': { icon: '🔮', rarity: 'very-rare', mass: 232.0 },
            'Plutonium': { icon: '☢️', rarity: 'very-rare', mass: 244.0 },
            'Radium': { icon: '💀', rarity: 'very-rare', mass: 226.0 },
            'Polonium': { icon: '💀', rarity: 'very-rare', mass: 209.0 },
            
            // Legendary
            'Promethium': { icon: '✨', rarity: 'legendary', mass: 145.0 },
            'Technetium': { icon: '🧪', rarity: 'legendary', mass: 98.0 },
            'Astatine': { icon: '☣️', rarity: 'legendary', mass: 210.0 },
            'Francium': { icon: '💥', rarity: 'legendary', mass: 223.0 }
        };

        // Default icon for unknown elements
        const DEFAULT_ICON = '🔹';

        // ===== GET ELEMENT MASS =====
        function getElementMass(elementName) {
            return elementDatabase[elementName]?.mass || 100.0;
        }

        // ===== GET ELEMENT ICON =====
        function getElementIcon(elementName) {
            return elementDatabase[elementName]?.icon || DEFAULT_ICON;
        }

        // ===== NAVIGATION =====
        function returnToRealEstate() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'real-estate.html';
        }

        // ===== CALCULATE SHIP MASS =====
        async function calculateShipMass(collection) {
            let totalMass = 0;
            for (const [name, data] of Object.entries(collection)) {
                const count = data.count || 1;
                const mass = getElementMass(name);
                totalMass += count * mass;
            }
            return totalMass;
        }

        // ===== UPDATE TRANSFER MASS DISPLAY =====
        function updateTransferMass() {
            const inputs = document.querySelectorAll('.quantity-input');
            let totalMass = 0;
            
            inputs.forEach(input => {
                const itemName = input.id.replace('qty_', '').replace(/_/g, ' ');
                const item = [...shipItems, ...propertyItems].find(i => i.name === itemName);
                if (item && input.value) {
                    const qty = parseInt(input.value) || 0;
                    totalMass += qty * item.mass;
                }
            });
            
            transferTotalMass = totalMass;
            document.getElementById('transferMass').textContent = totalMass.toFixed(1);
            
            const warningEl = document.getElementById('massWarning');
            if (currentDirection === 'toProperty') {
                const remainingSpace = (currentProperty?.capacity || 0) - (currentProperty?.used || 0);
                if (totalMass > remainingSpace) {
                    warningEl.textContent = '⚠️ Exceeds capacity!';
                    warningEl.classList.add('mass-summary-critical');
                } else {
                    warningEl.textContent = '';
                    warningEl.classList.remove('mass-summary-critical');
                }
            } else {
                const remainingSpace = CARGO_MASS_LIMIT - currentShipMass;
                if (totalMass > remainingSpace) {
                    warningEl.textContent = '⚠️ Exceeds cargo limit!';
                    warningEl.classList.add('mass-summary-critical');
                } else {
                    warningEl.textContent = '';
                    warningEl.classList.remove('mass-summary-critical');
                }
            }
        }

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                if (!propertyId) {
                    alert('No property selected');
                    returnToRealEstate();
                    return;
                }

                // Load all data with fallbacks
                let collection = {};
                if (typeof window.getCollection === 'function') {
                    collection = await window.getCollection();
                } else {
                    try {
                        collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                    } catch (e) {
                        collection = {};
                    }
                }

                let propertyDataResult = { properties: [] };
                if (typeof window.getRealEstate === 'function') {
                    propertyDataResult = await window.getRealEstate();
                } else {
                    try {
                        propertyDataResult = JSON.parse(localStorage.getItem('voidfarer_real_estate')) || { properties: [] };
                    } catch (e) {
                        propertyDataResult = { properties: [] };
                    }
                }

                propertyData = propertyDataResult;
                currentProperty = propertyData.properties?.find(p => p.id === propertyId);

                if (!currentProperty) {
                    alert('Property not found');
                    returnToRealEstate();
                    return;
                }

                // Calculate ship mass
                currentShipMass = await calculateShipMass(collection);

                // Initialize items if not exists
                if (!currentProperty.items) {
                    currentProperty.items = {};
                }

                // Calculate used space in mass
                let propertyUsed = 0;
                for (const [name, item] of Object.entries(currentProperty.items)) {
                    const mass = getElementMass(name);
                    propertyUsed += (item.count || 1) * mass;
                }
                currentProperty.used = propertyUsed;

                // Update UI
                document.getElementById('propertyName').textContent = currentProperty.name;
                document.getElementById('propertyUsed').textContent = propertyUsed.toFixed(1);
                document.getElementById('propertyCapacity').textContent = currentProperty.capacity;

                // Load items
                loadItems(collection);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('itemsGrid').innerHTML = 
                    '<div class="empty-state">Error loading items</div>';
            }
        }

        // ===== LOAD ITEMS =====
        function loadItems(collection) {
            shipItems = Object.keys(collection).map(name => ({
                name: name,
                count: collection[name].count || 1,
                icon: getElementIcon(name),
                mass: getElementMass(name)
            }));

            propertyItems = Object.keys(currentProperty.items || {}).map(name => ({
                name: name,
                count: currentProperty.items[name].count || 1,
                icon: getElementIcon(name),
                mass: getElementMass(name)
            }));

            renderItems();
        }

        // ===== RENDER ITEMS =====
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';

            const sourceItems = currentDirection === 'toProperty' ? shipItems : propertyItems;
            
            const targetUsed = currentDirection === 'toProperty' ? 
                (currentProperty.used || 0) : 
                currentShipMass;

            const targetCapacity = currentDirection === 'toProperty' ? 
                currentProperty.capacity : 
                CARGO_MASS_LIMIT;

            if (sourceItems.length === 0) {
                grid.innerHTML = '<div class="empty-state">No items available to transfer</div>';
                return;
            }

            sourceItems.sort((a, b) => a.name.localeCompare(b.name));

            sourceItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';

                const availableSpace = targetCapacity - targetUsed;
                const maxTransferByMass = Math.floor(availableSpace / item.mass);
                const maxTransfer = Math.min(item.count, maxTransferByMass);

                card.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-quantity">Available: ${item.count} <span class="item-mass">(⚖️ ${item.mass.toFixed(1)} AMU each)</span></div>
                    </div>
                    <div class="item-controls">
                        <input type="number" class="quantity-input" id="qty_${item.name.replace(/\s/g, '_')}" value="1" min="1" max="${item.count}" ${maxTransfer <= 0 ? 'disabled' : ''}>
                        <button class="transfer-item-btn" 
                            onclick="window.transferItem('${item.name}')"
                            ${maxTransfer <= 0 ? 'disabled' : ''}>
                            TRANSFER
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            // Add input event listeners to update mass summary
            document.querySelectorAll('.quantity-input').forEach(input => {
                input.addEventListener('input', updateTransferMass);
            });
            
            updateTransferMass();
        }

        // ===== SET TRANSFER DIRECTION =====
        async function setDirection(direction) {
            currentDirection = direction;

            document.getElementById('toPropertyBtn').classList.remove('active');
            document.getElementById('toShipBtn').classList.remove('active');

            if (direction === 'toProperty') {
                document.getElementById('toPropertyBtn').classList.add('active');
            } else {
                document.getElementById('toShipBtn').classList.add('active');
            }

            // Reload data to refresh items
            if (typeof window.getCollection === 'function') {
                const collection = await window.getCollection();
                loadItems(collection);
            } else {
                try {
                    const collection = JSON.parse(localStorage.getItem('voidfarer_collection')) || {};
                    loadItems(collection);
                } catch (e) {
                    loadItems({});
                }
            }

            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== TRANSFER ITEM =====
        async function transferItem(itemName) {
            const safeName = itemName.replace(/\s/g, '_');
            const qtyInput = document.getElementById(`qty_${safeName}`);
            
            if (!qtyInput) {
                console.error('Input not found for:', itemName);
                return;
            }

            const quantity = parseInt(qtyInput.value);

            if (!quantity || quantity < 1) {
                alert('Please enter a valid quantity');
                return;
            }

            // Check mass limits
            const itemMass = getElementMass(itemName);
            const transferMass = quantity * itemMass;

            if (currentDirection === 'toProperty') {
                const remainingSpace = (currentProperty?.capacity || 0) - (currentProperty?.used || 0);
                if (transferMass > remainingSpace) {
                    alert(`Transfer failed: Exceeds property capacity by ${(transferMass - remainingSpace).toFixed(1)} AMU`);
                    return;
                }
            } else {
                const remainingSpace = CARGO_MASS_LIMIT - currentShipMass;
                if (transferMass > remainingSpace) {
                    alert(`Transfer failed: Exceeds ship cargo limit by ${(transferMass - remainingSpace).toFixed(1)} AMU`);
                    return;
                }
            }

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'transferring...';

            try {
                let result;
                
                if (currentDirection === 'toProperty') {
                    if (typeof window.transferToProperty === 'function') {
                        result = await window.transferToProperty(propertyId, itemName, quantity);
                    } else {
                        // Fallback transfer
                        result = { success: false, reason: 'function not available' };
                    }
                } else {
                    if (typeof window.transferFromProperty === 'function') {
                        result = await window.transferFromProperty(propertyId, itemName, quantity);
                    } else {
                        // Fallback transfer
                        result = { success: false, reason: 'function not available' };
                    }
                }

                if (result && result.success) {
                    // Reload data
                    if (typeof window.getCollection === 'function' && typeof window.getRealEstate === 'function') {
                        const collection = await window.getCollection();
                        const propertyDataResult = await window.getRealEstate();
                        
                        propertyData = propertyDataResult;
                        currentProperty = propertyData.properties?.find(p => p.id === propertyId);
                        
                        if (currentProperty) {
                            // Recalculate property used mass
                            let propertyUsed = 0;
                            for (const [name, item] of Object.entries(currentProperty.items || {})) {
                                const mass = getElementMass(name);
                                propertyUsed += (item.count || 1) * mass;
                            }
                            currentProperty.used = propertyUsed;
                            
                            document.getElementById('propertyUsed').textContent = propertyUsed.toFixed(1);
                        }

                        currentShipMass = await calculateShipMass(collection);
                        loadItems(collection);
                    }

                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    alert('Transfer failed: ' + ((result && result.reason) || 'unknown error'));
                }

            } catch (error) {
                console.error('Transfer error:', error);
                alert('Error during transfer');
            }

            loadingOverlay.classList.remove('active');
        }

        // ===== MOVE ALL ITEMS =====
        async function moveAll() {
            const sourceItems = currentDirection === 'toProperty' ? shipItems : propertyItems;

            if (sourceItems.length === 0) {
                alert('No items to move');
                return;
            }

            // Calculate total mass to move
            let totalMass = 0;
            sourceItems.forEach(item => {
                totalMass += item.count * item.mass;
            });

            // Check mass limits
            if (currentDirection === 'toProperty') {
                const remainingSpace = (currentProperty?.capacity || 0) - (currentProperty?.used || 0);
                if (totalMass > remainingSpace) {
                    if (!confirm(`Warning: Transfer requires ${totalMass.toFixed(1)} AMU but only ${remainingSpace.toFixed(1)} AMU available. Transfer as much as possible?`)) {
                        return;
                    }
                }
            } else {
                const remainingSpace = CARGO_MASS_LIMIT - currentShipMass;
                if (totalMass > remainingSpace) {
                    if (!confirm(`Warning: Transfer requires ${totalMass.toFixed(1)} AMU but only ${remainingSpace.toFixed(1)} AMU available on ship. Transfer as much as possible?`)) {
                        return;
                    }
                }
            }

            loadingOverlay.classList.add('active');
            loadingText.textContent = 'moving all items...';

            try {
                let successCount = 0;
                let failCount = 0;

                for (const item of sourceItems) {
                    const quantity = item.count;
                    
                    let result;
                    if (currentDirection === 'toProperty') {
                        if (typeof window.transferToProperty === 'function') {
                            result = await window.transferToProperty(propertyId, item.name, quantity);
                        } else {
                            result = { success: false };
                        }
                    } else {
                        if (typeof window.transferFromProperty === 'function') {
                            result = await window.transferFromProperty(propertyId, item.name, quantity);
                        } else {
                            result = { success: false };
                        }
                    }

                    if (result && result.success) {
                        successCount++;
                    } else {
                        failCount++;
                        console.warn(`Failed to transfer ${item.name}:`, result?.reason);
                    }
                }

                // Reload data
                if (typeof window.getCollection === 'function' && typeof window.getRealEstate === 'function') {
                    const collection = await window.getCollection();
                    const propertyDataResult = await window.getRealEstate();

                    propertyData = propertyDataResult;
                    currentProperty = propertyData.properties?.find(p => p.id === propertyId);

                    if (currentProperty) {
                        // Recalculate property used mass
                        let propertyUsed = 0;
                        for (const [name, item] of Object.entries(currentProperty.items || {})) {
                            const mass = getElementMass(name);
                            propertyUsed += (item.count || 1) * mass;
                        }
                        currentProperty.used = propertyUsed;
                        document.getElementById('propertyUsed').textContent = propertyUsed.toFixed(1);
                    }

                    currentShipMass = await calculateShipMass(collection);
                    loadItems(collection);
                }

                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                if (failCount > 0) {
                    alert(`Moved ${successCount} items, ${failCount} failed (mass limit reached)`);
                } else {
                    alert(`Successfully moved ${successCount} items`);
                }

            } catch (error) {
                console.error('Move all error:', error);
                alert('Error during bulk transfer');
            }

            loadingOverlay.classList.remove('active');
        }

        // ===== RESET QUANTITIES =====
        function resetQuantities() {
            const inputs = document.querySelectorAll('.quantity-input');
            inputs.forEach(input => {
                input.value = '1';
            });
            updateTransferMass();

            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                // Show loading
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'loading transfer interface...';

                // Check if property ID exists
                if (!propertyId) {
                    alert('No property selected');
                    window.location.href = 'real-estate.html';
                    return;
                }

                // Load data
                await loadData();

                // Hide loading
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error - redirecting...';
                setTimeout(() => {
                    window.location.href = 'real-estate.html';
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
