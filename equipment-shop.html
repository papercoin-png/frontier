<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voidfarer - Equipment Shop</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Libre Baskerville', serif;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        
        .shop-view {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0a1a2a;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ffaa4a;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #e0f0ff;
            font-family: 'Exo 2', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 30px #ffaa4a;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Header */
        .shop-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .shop-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 36px;
            color: #e0f0ff;
            text-shadow: 0 0 20px #ffaa4a, 0 0 40px #aa5a2a;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .shop-subtitle {
            color: #a0c0ff;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(30, 45, 70, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #ffaa4a;
            border-radius: 60px 20px 60px 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        
        .credits {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .credits span {
            color: #ffd966;
            font-size: 22px;
        }
        
        .location {
            font-size: 14px;
            color: #a0c0ff;
            text-align: right;
        }
        
        .location span {
            color: #4affaa;
            font-weight: 600;
        }
        
        /* Labor Pool Contribution Banner */
        .labor-banner {
            background: rgba(255, 170, 74, 0.15);
            border: 2px solid #ffaa4a;
            border-radius: 40px 10px 40px 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .labor-banner:active {
            background: rgba(255, 170, 74, 0.3);
            transform: scale(0.99);
        }
        
        .labor-icon {
            font-size: 24px;
        }
        
        .labor-content {
            flex: 1;
        }
        
        .labor-title {
            color: #ffaa4a;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .labor-message {
            color: #ffffff;
            font-size: 12px;
        }
        
        /* Category Navigation */
        .category-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        
        .category-nav-btn {
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(30, 45, 70, 0.7);
            border: 2px solid #ffaa4a;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.1s;
            white-space: nowrap;
        }
        
        .category-nav-btn.active {
            background: #ffaa4a;
            color: #0a1a2a;
        }
        
        .category-nav-btn:active {
            transform: scale(0.95);
        }
        
        /* Equipment Grid */
        .equipment-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        
        .equipment-card {
            background: rgba(30, 45, 70, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #ffaa4a;
            border-radius: 40px 15px 40px 15px;
            padding: 18px;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .equipment-card.owned {
            border-color: #ffd966;
            opacity: 0.8;
        }
        
        .equipment-card.unqualified {
            border-color: #6a8ac0;
            opacity: 0.7;
        }
        
        .owned-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffd966;
            color: #0a1a2a;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            z-index: 2;
        }
        
        .equipment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .equipment-name {
            font-size: 22px;
            font-weight: 700;
            font-family: 'Exo 2', sans-serif;
            color: #ffffff;
        }
        
        .equipment-type {
            color: #a0c0ff;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 30px;
        }
        
        .equipment-icon {
            font-size: 32px;
            margin-right: 10px;
            float: left;
        }
        
        .equipment-description {
            color: #a0d0c0;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.4;
            clear: both;
        }
        
        .equipment-specs {
            background: rgba(0,0,0,0.2);
            border-radius: 30px 8px 30px 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        .spec-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 13px;
        }
        
        .spec-label {
            color: #a0c0ff;
        }
        
        .spec-value {
            color: #ffd966;
            font-weight: 600;
        }
        
        .spec-value.highlight {
            color: #4affaa;
        }
        
        .price-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .price-label {
            color: #a0c0ff;
            font-size: 14px;
        }
        
        .price-amount {
            font-size: 24px;
            font-weight: 700;
            color: #ffd966;
        }
        
        .price-original {
            font-size: 16px;
            color: #a0c0ff;
            text-decoration: line-through;
            margin-right: 8px;
        }
        
        .price-multiplier {
            font-size: 12px;
            color: #4affaa;
            margin-left: 5px;
        }
        
        .qualification-bar {
            margin-bottom: 15px;
        }
        
        .qualification-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #a0c0ff;
            margin-bottom: 4px;
        }
        
        .qualification-progress {
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .qualification-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a8ac0, #8ac0ff);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .qualification-fill.qualified {
            background: linear-gradient(90deg, #ffaa4a, #ffcc66);
        }
        
        .skill-requirements {
            background: rgba(0,0,0,0.2);
            border-radius: 30px 8px 30px 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        .skill-req-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            color: #a0c0ff;
        }
        
        .skill-req-value {
            color: #ffd966;
        }
        
        .skill-req-current {
            color: #4affaa;
            margin-left: 5px;
        }
        
        .purchase-btn {
            width: 100%;
            background: rgba(255, 170, 74, 0.2);
            border: 2px solid #ffaa4a;
            color: #ffaa4a;
            padding: 16px;
            border-radius: 60px 20px 60px 20px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            font-family: 'Exo 2', sans-serif;
        }
        
        .purchase-btn:active {
            background: #ffaa4a;
            color: #0a1a2a;
            transform: scale(0.97);
        }
        
        .purchase-btn.owned {
            background: rgba(255, 217, 102, 0.2);
            border-color: #ffd966;
            color: #ffd966;
            cursor: default;
        }
        
        .purchase-btn.owned:active {
            transform: none;
        }
        
        .purchase-btn.unqualified {
            background: rgba(106, 138, 192, 0.2);
            border-color: #6a8ac0;
            color: #a0c0ff;
            cursor: not-allowed;
        }
        
        .purchase-btn.unqualified:active {
            transform: none;
        }
        
        .purchase-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #a0b0c0;
            background: rgba(30, 45, 70, 0.4);
            border-radius: 60px 20px 60px 20px;
            border: 2px dashed #ffaa4a;
            font-style: italic;
        }
        
        /* Back button */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a4a7a, #1a3a5a);
            border: 3px solid #ffaa4a;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 60px 20px 60px 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
            width: fit-content;
            min-width: 280px;
            box-shadow: 0 0 30px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1px;
            margin: 0;
            animation: subtle-pulse 3s infinite;
        }
        
        @keyframes subtle-pulse {
            0% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
            50% { border-color: #ffd966; box-shadow: 0 0 40px #ffd966, 0 10px 20px rgba(0,0,0,0.5); }
            100% { border-color: #ffaa4a; box-shadow: 0 0 20px #ffaa4a, 0 10px 20px rgba(0,0,0,0.5); }
        }
        
        .back-button:active {
            transform: translateX(-50%) scale(0.96);
            background: #3a5a8a;
        }
        
        .back-arrow {
            font-size: 28px;
            color: #ffd966;
            font-weight: bold;
        }
        
        .back-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ffaa4a);
        }
        
        .back-text {
            flex: 0 1 auto;
        }
        
        /* Migration status (debug) */
        .migration-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #a0c0ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            z-index: 1001;
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="shop-view" id="shopView">
            <!-- Header -->
            <div class="shop-header">
                <div class="shop-title">Equipment Shop</div>
                <div class="shop-subtitle">✦ gear up for adventure ✦</div>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="credits" id="creditsDisplay">
                    <span>⭐</span> --
                </div>
                <div class="location" id="locationDisplay">
                    <span id="currentPlanet">Earth</span> • Equipment Shop
                </div>
            </div>
            
            <!-- Labor Pool Contribution Banner -->
            <div class="labor-banner" onclick="window.navigateTo('labor-exchange.html')">
                <div class="labor-icon">💰</div>
                <div class="labor-content">
                    <div class="labor-title">50% of purchase goes to Labor Pool</div>
                    <div class="labor-message" id="laborMessage">Your skills determine your share</div>
                </div>
                <div class="labor-icon">→</div>
            </div>
            
            <!-- Category Navigation -->
            <div class="category-nav" id="categoryNav">
                <button class="category-nav-btn active" onclick="window.filterByCategory('all')">ALL</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Mining')">⛏️ MINING</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Propulsion')">🚀 PROPULSION</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Shields')">🛡️ SHIELDS</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Weapons')">⚔️ WEAPONS</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Cargo')">📦 CARGO</button>
                <button class="category-nav-btn" onclick="window.filterByCategory('Life Support')">💨 LIFE SUPPORT</button>
            </div>
            
            <!-- Equipment Grid -->
            <div class="equipment-grid" id="equipmentGrid">
                <!-- Filled by JavaScript -->
                <div class="empty-state">Loading equipment inventory...</div>
            </div>
            
            <!-- Back button -->
            <button class="back-button" onclick="window.returnToEarthHub()">
                <span class="back-arrow">←</span>
                <span class="back-text">EARTH HUB</span>
                <span class="back-icon">🌍</span>
            </button>
            
            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loadingText">loading equipment shop...</div>
            </div>
            
            <!-- Migration status (debug) -->
            <div class="migration-status" id="migrationStatus"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/migration.js"></script>
    <script type="module" src="js/alchemy.js"></script>
    <script type="module" src="js/product-catalog.js"></script>
    <script type="module" src="js/market-dynamics.js"></script>

    <script type="module">
        import { PRODUCT_CATALOG, getProductsByCategory, getProductById } from './js/product-catalog.js';
        import { getProductPrice, canAffordProduct, purchaseProduct, getPriceMultiplier } from './js/market-dynamics.js';
        import { getAlchemyProgress } from './js/alchemy.js';

        // ===== TELEGRAM INITIALIZATION =====
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ===== DOM ELEMENTS =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const equipmentGrid = document.getElementById('equipmentGrid');
        const creditsDisplay = document.getElementById('creditsDisplay');
        const laborMessage = document.getElementById('laborMessage');

        // ===== EXPOSE FUNCTIONS TO GLOBAL SCOPE =====
        window.returnToEarthHub = returnToEarthHub;
        window.filterByCategory = filterByCategory;
        window.purchaseEquipment = purchaseEquipment;
        window.navigateTo = navigateTo;

        // ===== STATE =====
        let allEquipment = [];
        let filteredEquipment = [];
        let currentFilter = 'all';
        let playerCredits = 0;
        let playerId = '';
        let playerSkills = {};
        let ownedProducts = [];

        // ===== EQUIPMENT CATEGORIES =====
        const EQUIPMENT_CATEGORIES = {
            'Mining': { icon: '⛏️', color: '#ffaa4a', order: 1 },
            'Propulsion': { icon: '🚀', color: '#4affaa', order: 2 },
            'Shields': { icon: '🛡️', color: '#4a8ac0', order: 3 },
            'Weapons': { icon: '⚔️', color: '#ff6b6b', order: 4 },
            'Cargo': { icon: '📦', color: '#ffd966', order: 5 },
            'Life Support': { icon: '💨', color: '#4affaa', order: 6 }
        };

        // ===== LOAD SHOP DATA =====
        async function loadShopData() {
            try {
                loadingText.textContent = 'loading equipment...';
                
                // Get player ID
                playerId = localStorage.getItem('voidfarer_player_id') || 'player_default';
                
                // Get credits
                if (typeof window.getCredits === 'function') {
                    playerCredits = await window.getCredits();
                } else {
                    playerCredits = parseInt(localStorage.getItem('voidfarer_credits')) || 5000;
                }
                creditsDisplay.innerHTML = `<span>⭐</span> ${playerCredits.toLocaleString()}`;
                
                // Get player skills (alchemy progress)
                if (typeof getAlchemyProgress === 'function') {
                    playerSkills = getAlchemyProgress();
                } else if (typeof window.getAlchemyProgress === 'function') {
                    playerSkills = await window.getAlchemyProgress();
                } else {
                    playerSkills = JSON.parse(localStorage.getItem('voidfarer_alchemy_progress') || '{}');
                }
                
                // Get owned products
                if (typeof window.getPlayerProducts === 'function') {
                    ownedProducts = await window.getPlayerProducts(playerId);
                } else {
                    const products = JSON.parse(localStorage.getItem('voidfarer_player_products') || '{}');
                    ownedProducts = products[playerId] || [];
                }
                
                // Get equipment from catalog (Equipment and Ship Upgrades)
                const equipment = getProductsByCategory('Equipment');
                const upgrades = getProductsByCategory('Ship Upgrades');
                allEquipment = [...equipment, ...upgrades];
                
                // Add current prices and ownership status
                allEquipment = allEquipment.map(item => ({
                    ...item,
                    currentPrice: getProductPrice(item.id),
                    priceMultiplier: getPriceMultiplier(item.id),
                    owned: ownedProducts.some(p => p.productId === item.id)
                }));
                
                // Apply filter
                applyFilter();
                
                // Update labor message with random fact
                updateLaborMessage();
                
            } catch (error) {
                console.error('Error loading shop data:', error);
                equipmentGrid.innerHTML = '<div class="empty-state">Error loading equipment shop</div>';
            }
        }

        // ===== APPLY FILTER =====
        function applyFilter() {
            if (currentFilter === 'all') {
                filteredEquipment = [...allEquipment];
            } else {
                filteredEquipment = allEquipment.filter(item => item.equipmentType === currentFilter);
            }
            
            // Sort by category order then price
            filteredEquipment.sort((a, b) => {
                const orderA = EQUIPMENT_CATEGORIES[a.equipmentType]?.order || 999;
                const orderB = EQUIPMENT_CATEGORIES[b.equipmentType]?.order || 999;
                if (orderA !== orderB) return orderA - orderB;
                return a.basePrice - b.basePrice;
            });
            
            renderEquipment();
        }

        // ===== FILTER BY CATEGORY =====
        function filterByCategory(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.category-nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilter();
            
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // ===== RENDER EQUIPMENT =====
        function renderEquipment() {
            if (filteredEquipment.length === 0) {
                equipmentGrid.innerHTML = '<div class="empty-state">No equipment available in this category</div>';
                return;
            }
            
            let html = '';
            
            filteredEquipment.forEach(item => {
                const categoryData = EQUIPMENT_CATEGORIES[item.equipmentType] || { icon: '🔧', color: '#ffaa4a' };
                const canAfford = playerCredits >= item.currentPrice;
                const owned = item.owned;
                
                // Check skill qualifications
                const qualification = checkQualification(item);
                const qualified = qualification.qualified;
                const qualPercent = qualification.percent;
                
                // Determine card class
                let cardClass = '';
                if (owned) cardClass = 'owned';
                else if (!qualified) cardClass = 'unqualified';
                
                // Determine button state
                let buttonClass = 'purchase-btn';
                let buttonText = 'PURCHASE';
                let disabled = false;
                
                if (owned) {
                    buttonClass += ' owned';
                    buttonText = '✓ OWNED';
                    disabled = true;
                } else if (!qualified) {
                    buttonClass += ' unqualified';
                    buttonText = 'SKILLS INSUFFICIENT';
                    disabled = true;
                } else if (!canAfford) {
                    disabled = true;
                }
                
                // Format price
                const priceDisplay = item.currentPrice.toLocaleString();
                const basePriceDisplay = item.basePrice.toLocaleString();
                const priceTrend = item.priceMultiplier > 1 ? '📈' : item.priceMultiplier < 1 ? '📉' : '📊';
                
                html += `
                    <div class="equipment-card ${cardClass}">
                        ${owned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
                        <div class="equipment-header">
                            <span class="equipment-name">${categoryData.icon} ${item.name}</span>
                            <span class="equipment-type">${item.equipmentType}</span>
                        </div>
                        <div class="equipment-description">${item.description}</div>
                        <div class="equipment-specs">
                            ${renderSpecs(item.specs)}
                        </div>
                        
                        ${!owned ? `
                            <div class="qualification-bar">
                                <div class="qualification-header">
                                    <span>Skill Qualification</span>
                                    <span>${qualPercent}%</span>
                                </div>
                                <div class="qualification-progress">
                                    <div class="qualification-fill ${qualified ? 'qualified' : ''}" style="width: ${qualPercent}%"></div>
                                </div>
                            </div>
                            
                            <div class="skill-requirements">
                                ${renderSkillRequirements(item.skillRequirements)}
                            </div>
                        ` : ''}
                        
                        <div class="price-container">
                            <span class="price-label">Price ${priceTrend}</span>
                            <div>
                                ${item.priceMultiplier !== 1.0 ? `<span class="price-original">${basePriceDisplay}⭐</span>` : ''}
                                <span class="price-amount">${priceDisplay}⭐</span>
                                ${item.priceMultiplier !== 1.0 ? `<span class="price-multiplier">${Math.round(item.priceMultiplier * 100)}%</span>` : ''}
                            </div>
                        </div>
                        
                        <button class="${buttonClass}" 
                            onclick="window.purchaseEquipment('${item.id}')" 
                            ${disabled ? 'disabled' : ''}>
                            ${buttonText}
                        </button>
                    </div>
                `;
            });
            
            equipmentGrid.innerHTML = html;
        }

        // ===== RENDER SPECS =====
        function renderSpecs(specs) {
            if (!specs) return '';
            
            let html = '';
            for (const [key, value] of Object.entries(specs)) {
                const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                html += `
                    <div class="spec-row">
                        <span class="spec-label">${label}:</span>
                        <span class="spec-value">${value}</span>
                    </div>
                `;
            }
            return html;
        }

        // ===== RENDER SKILL REQUIREMENTS =====
        function renderSkillRequirements(requirements) {
            if (!requirements) return '<div>No specific requirements</div>';
            
            let html = '<div class="skill-req-title" style="color: #a0c0ff; margin-bottom: 5px;">Required Skills:</div>';
            
            for (const [skill, required] of Object.entries(requirements)) {
                const current = playerSkills[skill] || 0;
                const level = getSkillLevel(current);
                const met = current >= required * 10;
                
                html += `
                    <div class="skill-req-row">
                        <span>${skill}:</span>
                        <span>
                            <span class="skill-req-value">${required}</span>
                            <span class="skill-req-current" style="color: ${met ? '#4affaa' : '#ff6b6b'}">
                                (${level})
                            </span>
                        </span>
                    </div>
                `;
            }
            
            return html;
        }

        // ===== GET SKILL LEVEL NAME =====
        function getSkillLevel(progress) {
            if (progress >= 1000000) return 'Transcendent';
            if (progress >= 500000) return 'Mythic';
            if (progress >= 250000) return 'Legendary';
            if (progress >= 100000) return 'Sage';
            if (progress >= 50000) return 'Grand Master';
            if (progress >= 25000) return 'Master';
            if (progress >= 10000) return 'Expert';
            if (progress >= 5000) return 'Journeyman';
            if (progress >= 1000) return 'Apprentice';
            if (progress >= 100) return 'Novice';
            return 'Untrained';
        }

        // ===== CHECK QUALIFICATION =====
        function checkQualification(item) {
            if (!item.skillRequirements) {
                return { qualified: true, percent: 100 };
            }
            
            let totalQualification = 0;
            let maxPossible = 0;
            
            for (const [skill, required] of Object.entries(item.skillRequirements)) {
                const current = playerSkills[skill] || 0;
                const qualification = Math.min(1.0, current / (required * 10));
                totalQualification += qualification;
                maxPossible += 1;
            }
            
            const percent = maxPossible > 0 ? (totalQualification / maxPossible) * 100 : 100;
            
            return {
                qualified: percent >= 50,
                percent: Math.min(100, Math.round(percent))
            };
        }

        // ===== PURCHASE EQUIPMENT =====
        async function purchaseEquipment(itemId) {
            const item = getProductById(itemId);
            if (!item) return;
            
            // Double-check ownership
            if (ownedProducts.some(p => p.productId === itemId)) {
                alert('You already own this item!');
                return;
            }
            
            // Check qualification
            const qualification = checkQualification(item);
            if (!qualification.qualified) {
                alert('You do not meet the skill requirements for this item!');
                return;
            }
            
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'processing purchase...';
            
            try {
                // Process purchase
                const result = await purchaseProduct(itemId, playerId, playerCredits);
                
                if (result.success) {
                    // Reload data
                    await loadShopData();
                    
                    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    // Show success message with labor pool info
                    alert(`✅ Purchase successful!\n\n${item.name}\nPrice: ${result.price.toLocaleString()}⭐\n\n💰 ${result.laborContribution.toLocaleString()}⭐ added to Labor Pool\nYour skills will earn a share!`);
                } else {
                    alert(`Purchase failed: ${result.reason}`);
                }
                
            } catch (error) {
                console.error('Purchase error:', error);
                alert('Error processing purchase');
            }
            
            loadingOverlay.classList.remove('active');
        }

        // ===== UPDATE LABOR MESSAGE =====
        function updateLaborMessage() {
            const messages = [
                'Your skills determine your share of the labor pool',
                '50% of every purchase goes to skilled workers',
                'Higher mastery = larger labor pool share',
                'Every craft increases your labor multiplier',
                'Grand Masters earn 32x more from labor pool'
            ];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            laborMessage.textContent = randomMsg;
        }

        // ===== NAVIGATION =====
        function navigateTo(screen) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            loadingOverlay.classList.add('active');
            loadingText.textContent = 'navigating...';
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                window.location.href = screen;
            }, 300);
        }

        function returnToEarthHub() {
            navigateTo('earth-hub.html');
        }

        // ===== INITIALIZE =====
        async function init() {
            try {
                loadingOverlay.classList.add('active');
                loadingText.textContent = 'opening equipment shop...';
                
                await loadShopData();
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 500);
                
                // Refresh every 30 seconds
                setInterval(async () => {
                    await loadShopData();
                }, 30000);
                
            } catch (error) {
                console.error('Init error:', error);
                loadingText.textContent = 'error loading shop';
                setTimeout(() => {
                    loadingOverlay.classList.remove('active');
                }, 2000);
            }
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
